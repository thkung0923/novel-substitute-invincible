<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>替身無極 - 線上閱讀</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg-sidebar: #16213e;
      --bg-content: #0f3460;
      --text: #e0e0e0;
      --text-muted: #8899aa;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --border: #1a3a5c;
      --chapter-hover: #1a3a5c;
      --chapter-active: #e94560;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Microsoft JhengHei', '微軟正黑體', 'PingFang TC', 'Noto Sans TC', sans-serif;
      font-size: 18px;
      line-height: 1.9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--bg-sidebar);
      border-bottom: 2px solid var(--accent);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 24px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .status-badge {
      background: var(--accent);
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    #menu-toggle {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .nav-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn {
      background: var(--bg-content);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }

    #chapter-counter {
      color: var(--text-muted);
      font-size: 14px;
      min-width: 80px;
      text-align: center;
    }

    /* Layout */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      height: calc(100vh - 64px);
      position: sticky;
      top: 64px;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: bold;
      color: var(--accent);
      font-size: 16px;
    }

    .chapter-list {
      list-style: none;
    }

    .chapter-list li {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .chapter-list a {
      display: block;
      padding: 10px 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.15s;
      cursor: pointer;
    }
    .chapter-list a:hover {
      background: var(--chapter-hover);
      color: var(--text);
    }
    .chapter-list a.active {
      background: var(--accent);
      color: #fff;
      font-weight: bold;
    }

    /* Content */
    .content-area {
      flex: 1;
      overflow-y: auto;
      height: calc(100vh - 64px);
      padding: 40px;
    }

    .content-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    #chapter-title {
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
      line-height: 1.4;
    }

    #chapter-content {
      font-size: 18px;
      line-height: 2;
    }

    #chapter-content p {
      margin-bottom: 1em;
      text-indent: 2em;
    }

    #chapter-content h1, #chapter-content h2, #chapter-content h3 {
      color: var(--accent);
      margin: 1.5em 0 0.8em;
    }

    #chapter-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    #chapter-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 1em 0;
      color: var(--text-muted);
    }

    #chapter-content strong {
      color: var(--accent-hover);
    }

    /* Welcome screen */
    .welcome {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .welcome h2 { color: var(--accent); font-size: 32px; margin-bottom: 16px; }
    .welcome p { font-size: 16px; margin-bottom: 8px; }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    /* Scroll to top */
    #scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: background 0.2s;
    }
    #scroll-top:hover { background: var(--accent-hover); }
    #scroll-top.visible { display: flex; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    /* Mobile */
    @media (max-width: 768px) {
      #menu-toggle { display: block; }

      .sidebar {
        position: fixed;
        left: -300px;
        top: 0;
        height: 100vh;
        z-index: 300;
        transition: left 0.3s;
      }
      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 250;
      }
      .sidebar-overlay.open { display: block; }

      .content-area {
        height: calc(100vh - 64px);
        padding: 24px 16px;
      }

      h1 { font-size: 18px; }
      #chapter-title { font-size: 22px; }
      #chapter-content { font-size: 16px; }
    }
  </style>
</head>

let currentIndex = -1;
const cache = {};

function getDisplayName(filename) {
  return filename.replace('.md', '').replace(/_/g, ' ');
}

function init() {
  const list = document.getElementById('chapter-list');
  chapters.forEach((ch, i) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = getDisplayName(ch);
    a.dataset.index = i;
    a.onclick = () => loadChapter(i);
    li.appendChild(a);
    list.appendChild(li);
  });

  // Check URL hash
  const hash = location.hash.replace('#', '');
  if (hash) {
    const idx = parseInt(hash) - 1;
    if (idx >= 0 && idx < chapters.length) loadChapter(idx);
  }
}

async function loadChapter(index) {
  if (index < 0 || index >= chapters.length) return;
  currentIndex = index;

  const filename = chapters[index];
  const title = getDisplayName(filename);

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('chapter-title').style.display = 'block';
  document.getElementById('chapter-title').textContent = title;
  document.getElementById('bottom-nav').style.display = 'flex';

  // Update active state in sidebar
  document.querySelectorAll('.chapter-list a').forEach(a => a.classList.remove('active'));
  const activeLink = document.querySelector(`.chapter-list a[data-index="${index}"]`);
  if (activeLink) {
    activeLink.classList.add('active');
    activeLink.scrollIntoView({ block: 'nearest' });
  }

  // Update navigation
  updateNav();
  location.hash = index + 1;

  // Load content
  const contentEl = document.getElementById('chapter-content');
  if (cache[filename]) {
    contentEl.innerHTML = cache[filename];
  } else {
    contentEl.innerHTML = '<div class="loading">載入中...</div>';
    try {
      const resp = await fetch(encodeURI(filename));
      if (!resp.ok) throw new Error('載入失敗');
      const md = await resp.text();
      // Remove first heading if it matches chapter title
      const html = marked.parse(md);
      cache[filename] = html;
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = `<div class="loading">載入失敗：${e.message}</div>`;
    }
  }

  document.getElementById('content-area').scrollTo({ top: 0 });

  // Close sidebar on mobile
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function navigate(dir) {
  loadChapter(currentIndex + dir);
}

function updateNav() {
  const hasPrev = currentIndex > 0;
  const hasNext = currentIndex < chapters.length - 1;
  document.getElementById('prev-btn').disabled = !hasPrev;
  document.getElementById('next-btn').disabled = !hasNext;
  document.getElementById('prev-btn-b').disabled = !hasPrev;
  document.getElementById('next-btn-b').disabled = !hasNext;
  const counter = `${currentIndex + 1} / ${chapters.length}`;
  document.getElementById('chapter-counter').textContent = counter;
  document.getElementById('chapter-counter-b').textContent = counter;
}

function toggleSidebar(forceState) {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = typeof forceState === 'boolean' ? !forceState : sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

// Scroll to top button
document.getElementById('content-area').addEventListener('scroll', function() {
  document.getElementById('scroll-top').classList.toggle('visible', this.scrollTop > 300);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

init();
