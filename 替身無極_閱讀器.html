p>\n<p>「天生的。」蘇念卿重複了一遍，語氣很平。</p>\n<p>「對。」</p>\n<p>「你天生能讓人在同一秒同一刻全部倒地。」</p>\n<p>「……差不多這意思。」</p>\n<p>「然後你的解釋是：天賦。」</p>\n<p>「對。」</p>\n<p>又是一段沉默。</p>\n<p>霜翎從蘇念卿身旁繞過來，用銀白色的大尾巴掃了一下白無極的腿，像在表達某種動物界的「你說的話連我都不信」。白無極低頭看了看這隻靈狐，友善地摸了摸它的耳朵——霜翎本能地想躲，但沒完全躲掉，被摸到了半截。</p>\n<p>蘇念卿最終還是沒有繼續追問。</p>\n<p>她直起身，看了一眼峽谷四周，淡淡說：「走吧，這裡不適合久留，慕容家後續可能還有人跟來確認情況。」</p>\n<p>「好。」</p>\n<p>這件事就這樣過去了——表面上。</p>\n<p>白無極知道蘇念卿沒信他，她只是選擇暫時擱置，這個問題會在某個她認為合適的時機重新被提起。但眼下他有更重要的事情想做。</p>\n<p>他要測試。</p>\n<p>---</p>\n<p>繼續趕路的途中，走在蘇念卿後面的白無極一直處於一種心不在焉的狀態。</p>\n<p>他在腦子裡整理那一秒的感覺。</p>\n<p>時停。</p>\n<p>Over Drive覺醒之後，白金之星擁有了一個全新的能力——讓時間停止一秒鐘。從他喊出「Star Platinum: The World」的那一刻起，外界的一切都會靜止，只有他自己，以及白金之星，可以在那個凝固的世界裡自由移動。</p>\n<p>一秒鐘。</p>\n<p>聽起來很短。但在峽谷裡，那一秒他做了什麼？</p>\n<p>走位、定位、七個目標——白金之星在靜止的世界裡以超高速依次找準每個人的要害，七擊在一秒內完成，然後時間重啟，所有人同時倒地。</p>\n<p>那一秒裡，白金之星能做多少事？</p>\n<p>他需要數據。</p>\n<p>「等一下。」</p>\n<p>蘇念卿停下腳步，回頭，用眼神問他什麼事。</p>\n<p>「我測試個東西，你站著別動，五秒鐘。」</p>\n<p>蘇念卿：「……」</p>\n<p>她沒有說話，就這樣站著，把「你在搞什麼」這四個字全部壓縮進了眼神裡。</p>\n<p>白無極不管，他在原地站定，往四周看了看——前後各二十步，左側是峽谷壁，右側是已經走出峽谷範圍的開闊坡地。好，他默默記下位置，然後：</p>\n<p>「Star Platinum: The World。」</p>\n<p>世界靜止了。</p>\n<p>風停了，蘇念卿的衣角停在半空，霜翎的尾巴就那樣懸在空中，連光塵都凝固在空氣裡，整個世界變成一幅精密的靜態畫。</p>\n<p>白無極立刻開始跑。</p>\n<p>他從站定的位置全速往前跑，大步衝刺，一步兩步三步，在靜止的世界裡他的速度是正常的，但周遭一切都是靜態的，所以效果就像是他一個人在靜畫裡穿行。他跑了大概十五步，感覺到一秒快到了，立刻停下，標記位置——</p>\n<p>時間重啟，他站在距離出發點大約十二、三米的地方。</p>\n<p>蘇念卿眨了一下眼睛，下一秒白無極就在她前面十幾米外了。</p>\n<p>她轉頭，看著他。</p>\n<p>「十三米。」白無極喃喃自語，往回走，然後搖搖頭，「不對，還沒用白金之星加速，只是我自己跑的，如果加速——」</p>\n<p>「你剛才去哪裡了。」蘇念卿的聲音不是很高，但很清楚。</p>\n<p>「測試移動距離。」白無極已經走回她身邊，「一秒鐘我自己跑的話，大概十三米，以後記住了。」</p>\n<p>「你剛才……消失了。」</p>\n<p>「對。」</p>\n<p>「然後出現在那裡。」</p>\n<p>「對。」</p>\n<p>「這也是天賦。」</p>\n<p>「對。」</p>\n<p>蘇念卿深呼吸了一下，轉回頭繼續走，背影完全沒有情緒，但霜翎低鳴了一聲，那種聲調翻譯出來大概是「我家主人現在很想把你踢下山坡」。</p>\n<p>白無極繼續他的測試，邊走邊想。</p>\n<p>之後又陸陸續續找了幾個藉口停下來——一次測試了一秒內白金之星能打幾拳，答案是大概四十到五十拳的有效輸出，品質不打折的那種。一次把路邊一顆石頭在時停裡移動到蘇念卿前面三米，時間重啟，石頭就這樣「瞬移」到了那個位置。一次讓黃金體驗把一塊木頭變成一隻小鳥，然後在時停狀態裡把這隻鳥放到半空中，看它時間重啟後飛起來——成功，時停的狀態變化在時間重啟後依然有效。</p>\n<p>到最後，蘇念卿已經不再對他突然停下或突然出現在別的地方表示任何反應了。</p>\n<p>她只是走她的路，讓他測試他的「天賦」。</p>\n<p>「我想清楚了，」白無極跑步趕上蘇念卿，「一秒時停有幾個核心用法：第一，快速位移，可以在對手反應之前出現在任意位置。第二，大量輸出，一秒裡白金之星打四十拳夠用了。第三，可以在靜止世界裡做準備動作，比如設置陷阱或者找到對手的弱點，時間重啟的時候直接生效。」</p>\n<p>蘇念卿沒有轉頭，只是說：「你在自言自語。」</p>\n<p>「跟你說的。你是我目前唯一的交流對象，不跟你說跟誰說。」</p>\n<p>「……我不需要聽這些。」</p>\n<p>「你可能需要，以後如果要配合作戰的話。」</p>\n<p>蘇念卿走了幾步，沒有繼續否認。</p>\n<p>這算是默認了。</p>\n<p>白無極嘴角微彎，繼續整理他的時停使用手冊。頭上是乾淨的晴天，遠處已經能看到天契城方向的地平線上，那道若隱若現的巨大城牆輪廓——像一道山脈，橫臥在世界的盡頭。</p>\n<p>他把一秒的時停研究得很仔細，像個剛得到新玩具、恨不得把每個功能都摸透的孩子。</p>\n<p>這是他的風格。</p>\n<p>在這個世界裡，他沒有靈契，沒有等級，沒有所謂的修行體系。</p>\n<p>但他有替身，有一秒鐘靜止的世界，還有充沛到有點離譜的好奇心。</p>\n<p>前方，天契城的輪廓越來越清晰。</p>"}, {"title": "第52章_天契城", "content": "<p>第52章　天契城</p>\n<p>天契城，第一眼。</p>\n<p>白無極在山坡上停下腳步，往前看，沉默了大概五秒鐘。</p>\n<p>這座城市……不對，這個東西很難用「城市」這個詞來形容。更像是把一整座山脈削平了，然後在上面建造了一個文明。城牆本身就高達三十米，延伸出去的長度讓人看不到盡頭，整體呈現一種深沉的灰黑色，但這種灰黑不是普通石料的顏色——它會微微發光，像是有什麼東西封印在石頭裡。</p>\n<p>城牆之上，靈契塔林立，那是靈契者的城市標誌，塔身細長，頂部放射出柔和的光暈，白色的、金色的、青色的、紅色的，在清晨的霧氣裡混在一起，遠看像是一片流動的光之森林。</p>\n<p>城門有八個，每一個都能並排通過十輛馬車。</p>\n<p>人流，像河一樣湧進湧出。</p>\n<p>「……」白無極看了很長時間，最後吐出一句，「蒼雲城是鄉下。」</p>\n<p>蘇念卿站在他旁邊，表情沒有什麼變化：「天契城是大陸中心，蒼雲城是北方邊城，當然不能比。」</p>\n<p>「我的意思是，蒼雲城在天契城面前，就是一個非常非常遙遠的鄉下。」</p>\n<p>「我知道你的意思。」</p>\n<p>「規模大概是……十倍？」</p>\n<p>「人口大概是二十倍，面積大概是十五倍。」</p>\n<p>白無極點了點頭，繼續往前走，但走了幾步，他停下來，往城門方向指了指：「那邊排隊的是怎麼回事？」</p>\n<p>蘇念卿：「入城要查驗身份，繳進城稅。」</p>\n<p>「等一下。」白無極轉頭，臉上是那種「我沒聽錯吧」的表情，「這城門收入場費？」</p>\n<p>「是進城稅，不是入場費。」</p>\n<p>「有什麼差別？」</p>\n<p>「入場費是商業活動，進城稅是行政管理，性質不同。」</p>\n<p>「結果都是給錢啊？」</p>\n<p>蘇念卿沉默了一秒，選擇不回答這個問題。</p>\n<p>白無極摸了摸下巴，感嘆道：「靈契文明，刀劍飛靈，契師滿地走，契王可以移山——但是人頭稅照樣收。果然跟地球一樣，萬般皆下品，惟有稅收高。」</p>\n<p>蘇念卿側頭，面色平靜地看他：「地球是哪裡？」</p>\n<p>白無極一愣，才想起來自己又說漏了嘴。他咳了一聲：「……我老家。」</p>\n<p>「你老家叫地球。」</p>\n<p>「對。」</p>\n<p>「地球是哪個州域的地名？」</p>\n<p>「……很遠的地方，不在天衍大陸版圖內，你們地圖上找不到的。」</p>\n<p>蘇念卿看了他一眼，眼神裡有一種「這個人的來歷越來越奇怪」的靜默評估，但她沒有繼續問，轉回頭往城門走。</p>\n<p>霜翎跟在她身後，路過白無極的時候又用尾巴掃了他一下。白無極感覺這隻靈狐已經把這個動作發展成了一種習慣性問候，只是他到現在還是分不清楚這是友好還是嫌棄。</p>\n<p>---</p>\n<p>進城的隊伍移動得比預想中快。</p>\n<p>城門處有十幾個穿著統一制服的查驗官，每個窗口都在快速處理入城者的身份核驗。白無極站在隊伍裡，觀察周圍。</p>\n<p>光這個入城隊伍，他就已經刷新了認知。</p>\n<p>蒼雲城的普通靈契者，契士級別就算得上是小有身份，契師已經是中堅力量，契將以上就是各家族重點供養的核心人物。但在天契城的入城隊伍裡，隨便掃一眼，契師級別的靈契者跟普通市民混在一起排隊，有說有笑，毫無「高人一等」的架子——因為在天契城，契師確實不算什麼特別稀罕的存在。</p>\n<p>他身邊一個扛著大包袱的中年男人，背上掛著一個靈契器具，那器具上的紋路顯示至少是契師中階以上的能量刻印，但這個男人打扮跟普通商販沒什麼兩樣，一臉風塵僕僕地站著等待，時不時打個哈欠。</p>\n<p>「這個城市的靈契者密度……」白無極在蘇念卿耳邊低聲，「比蒼雲城高了不止一個檔次。」</p>\n<p>「天契城是四大家族的根據地，」蘇念卿同樣低聲，「赫連、慕容、司徒、夜凌，四大家族的主宅都在城內，各家的族人、門客、附屬勢力全部匯聚於此，加上各地來的游修、商旅，靈契者密度自然高。」</p>\n<p>「四大家族住在同一座城？」</p>\n<p>「四大家族共同治理天契城，這是大陸政治平衡的一部分，誰也不能獨佔。」</p>\n<p>白無極想了想：「那不就是四個老大共享一個地盤，然後互相盯著對方？」</p>\n<p>「你這個比喻……粗俗了一點，但大意沒錯。」</p>\n<p>「哦。那挺複雜的。」</p>\n<p>輪到他們了。</p>\n<p>查驗官是個三十多歲的中年人，面色平靜地接過蘇念卿的身份玉牌，掃了一眼，神情沒什麼變化，但稍微挺直了一下背——蘇家嫡女的牌面還是有的。他迅速完成登記，轉向白無極。</p>\n<p>「身份玉牌。」</p>\n<p>白無極掏了掏，然後笑了一下：「沒有。」</p>\n<p>查驗官看著他：「沒有玉牌？」</p>\n<p>「沒有。」</p>\n<p>「哪個州域的戶籍？」</p>\n<p>「……地球。」</p>\n<p>查驗官：「……」</p>\n<p>他在書冊上翻了翻，顯然沒找到地球這個地名，然後抬頭打量白無極一眼——這個男人穿著普通，沒有靈契波動，不像靈契者，不像商人，也不像遊俠。他身上唯一顯眼的大概就是……沒什麼顯眼的。</p>\n<p>「外來務工人員，沒有大陸戶籍。」白無極補充了一句，「你們有沒有類似臨時通行的制度？」</p>\n<p>查驗官看了他一眼，又看了看蘇念卿，後者站在旁邊，表情平靜，也沒有替他解釋的意思，只是伸手，把一個小袋子放在窗口上。</p>\n<p>袋子裡是靈石。</p>\n<p>查驗官掂了掂重量，登記了一個「臨時訪客」的名額，把一個簡單的灰色臨時牌子推了出來：「三天有效期，若要延期需重新繳費。」</p>\n<p>白無極接過牌子，點點頭：「合理，跟地球一模一樣。」</p>\n<p>查驗官沒聽懂，但也沒追問。</p>\n<p>---</p>\n<p>城內的第一感受是：大，和吵。</p>\n<p>人聲、靈契器具的啟動聲、各種商販的叫賣聲混在一起，城內的主街道比蒼雲城最寬的街道還要寬三倍，兩側的建築高達五六層，每一棟的外牆都刻著靈紋，有裝飾性的，有功能性的，還有那種只有懂行的人才能看出意義的家族標記。</p>\n<p>白無極邊走邊看，腦子裡忙著消化這些資訊。</p>\n<p>蘇念卿在前面帶路，她顯然來過天契城，走路帶著一股目標明確、不四處張望的篤定感。霜翎縮小了身形，化作一道白色流光跟在她腳邊——在人流密集的地方，靈狐通常不會保持完整形態。</p>\n<p>「我們住哪裡？」白無極問。</p>\n<p>「蘇家在城內有宅院，我先去那裡安置，你——」蘇念卿轉頭，看了他一眼，「你有地方去嗎？」</p>\n<p>「我？」白無極想了想，「我可以去哪裡？」</p>\n<p>「客棧，或者——」</p>\n<p>「蘇家宅院有多餘的客房嗎？」</p>\n<p>蘇念卿沉默了一下。</p>\n<p>「我不是不付錢，我付住宿費，正常市場價。」白無極補充，「而且你說你家在天契城，所以我順理成章地認識了一個本地人，這很合理。」</p>\n<p>「……」</p>\n<p>「你如果說沒有，我立刻自己去找客棧，不強求。」</p>\n<p>又是短暫的沉默，然後蘇念卿轉回頭，繼續走：「有客房。」</p>\n<p>白無極跟上，嘴角彎了一下。</p>\n<p>往蘇家宅院的方向走的途中，他繼續觀察城市。幾個大型廣場上，已經可以看到一些比較特殊的佈置——彩旗、告示板、劃定的區域，還有工人在搭建什麼臺子結構。</p>\n<p>「那是什麼？」他問。</p>\n<p>「天契大比的預備工事，」蘇念卿說，「大比再過三天就開始，城內每年這個時候都是這樣的。」</p>\n<p>「天契大比。」白無極重複這個名字，「大陸最大的比武大會？」</p>\n<p>「不只是比武。是靈契者最大的競技與交流平台，也是四大家族和各方勢力每年最重要的名利場。」蘇念卿的語氣很平，「今年各方的天才都會到，規模比往年更大，因為四大家族今年有些事要在大比之後公開談，所以各方都派出了份量更重的人。」</p>\n<p>白無極點點頭，眼睛在那個搭建中的高台上停了一下。</p>\n<p>很大的擂台。</p>\n<p>能坐很多觀眾。</p>\n<p>「聽起來，」他說，「很熱鬧。」</p>\n<p>蘇念卿沒有回頭，但走了幾步之後，說了一句：「是很熱鬧。」</p>\n<p>語氣裡有什麼東西，不是期待，也不是緊張，是那種在某件重要事情開始之前，把所有情緒壓得很平的靜定。</p>\n<p>白無極聽出來了，但沒有說。</p>\n<p>他往前走，天契城的輪廓在他四周展開，這個大陸最重要的舞台，此時此刻是熱鬧的，嘈雜的，充滿生氣的。</p>\n<p>而他，一個從地球穿越過來的上班族，拎著一個包，跟在一個面癱女主後面，邁進了這場盛宴的入口。</p>"}, {"title": "第53章_天契大比", "content": "<p>第53章　天契大比</p>\n<p>蘇家在天契城的宅院，規模說是「宅院」，其實更像一個小型城堡。</p>\n<p>白無極被安置在西廂的客房，推開窗往外看，能直接看到宅院內的演武場和兩棵據說有三百年樹齡的銀杏。他在窗邊站了一會兒，把蘇念卿臨走前說的「好好休息，不要亂跑」這句話，在腦子裡翻了一個個兒，然後裝作沒聽到，換了一身衣服，去找蘇念卿。</p>\n<p>蘇念卿在書房。</p>\n<p>她坐在窗邊，桌上攤開一卷文書，大概是關於大比的相關資料。霜翎縮成一個白色球體睡在角落，聽到動靜睜開眼，確認是白無極，又閉上了。</p>\n<p>「你說大比，」白無極在門邊站定，「我可以報名嗎？」</p>\n<p>蘇念卿沒有抬頭：「你有靈契嗎？」</p>\n<p>「沒有。」</p>\n<p>「有靈契等級登記嗎？」</p>\n<p>「沒有。」</p>\n<p>「有任何正式認證的戰鬥資質嗎？」</p>\n<p>「……也沒有。」</p>\n<p>「那不能報名，」蘇念卿說，語氣像在報告天氣，「大比的正式參賽資格要求最低契師級別，需要有登記在案的靈契等級，或者有認可勢力的推薦信。三樣你一樣都沒有。」</p>\n<p>白無極走進書房，在桌子對面坐下：「沒有辦法嗎？」</p>\n<p>蘇念卿這次抬起頭，看了他一眼，然後重新低下去，繼續看文書，但她確實在思考，白無極能看出來——她眼神裡那種飛快運轉的感覺。</p>\n<p>「有。」她說，「但很麻煩。」</p>\n<p>「說來聽聽。」</p>\n<p>「大比有兩種名額，一種是正式名額，需要等級認證和推薦信，比賽過程有資歷評比，晉級加分，結果跟聲名和家族利益直接掛鉤。另一種是無名額，也叫散修名額，」蘇念卿停頓了一下，「沒有任何背景要求，任何人繳費就能報，但沒有推薦信的情況下，無名額不能直接進正式賽制——他們有自己的預賽。」</p>\n<p>「預賽內容？」</p>\n<p>「在一個獨立的賽場裡，所有無名額的參賽者相互競爭，打出一定名次後才能進入主賽場，跟正式名額的選手同台。」蘇念卿說到這裡，語氣稍微頓了一下，「而且，無名額的預賽沒有任何等級分組，所有人在同一個賽場裡，不管你是契士還是契將。」</p>\n<p>「同一個賽場，不分等級。」白無極理解了，「所以預賽基本上是混戰，誰命硬誰晉級。」</p>\n<p>「大概是這個意思。」</p>\n<p>白無極沉默了幾秒鐘，做出了一個讓他自己都覺得合理的決定：「那就這樣。」</p>\n<p>蘇念卿放下手裡的文書，正式看向他，眼神裡是一種乾淨的、不帶評判的評估：「你知道這意味著什麼嗎？」</p>\n<p>「預賽比較難打唄。」</p>\n<p>「不只是難打，」蘇念卿說，「無名額的預賽，每年都有人死。規則上是點到即止，但實際上，那個賽場的控場官數量有限，而且各方無名選手背景複雜，有亡命之徒，有仇殺，有私下雇的殺手。歷年下來沒有哪一屆預賽是沒死人的。」</p>\n<p>「有多少名額能晉級？」</p>\n<p>「視預賽人數而定，大約前十分之一可以晉入主賽場。今年預計無名額報名人數在兩百人左右，也就是說二十人晉級。」</p>\n<p>白無極點了點頭，算了算：「那晉級率百分之十，其餘百分之九十的人要麼被打敗，要麼……」</p>\n<p>「被殺，或者重傷棄賽。」蘇念卿說，語氣很平，「大陸的規矩，比武台上的生死各安天命，主辦方不負責任。」</p>\n<p>「好，」白無極說，「我明白了。」</p>\n<p>「然後你的決定是？」</p>\n<p>「還是那樣，」白無極說，嘴角沒有特別的弧度，語氣很普通，就像在說「今天吃什麼」，「報名。」</p>\n<p>蘇念卿看著他，維持了大概三秒鐘的沉默，然後轉回頭，重新拿起文書：「隨便你。」</p>\n<p>霜翎在角落動了一下，從白色球體的姿勢伸了個懶腰，然後用一種莫名其妙的眼神看了白無極一眼——那眼神翻譯出來大概是：「這個人的腦迴路到底是怎麼長的。」</p>\n<p>---</p>\n<p>晚飯的時候，宅院的管事在飯廳佈置了一頓相當豐盛的接風宴。大概是蘇家宅院對嫡女回城這件事的標準歡迎程序，但也沒有多誇張，家常菜式，四個菜一個湯，簡單而考究。</p>\n<p>白無極吃飯的時候，翻來覆去地想大比的事。</p>\n<p>不是因為他特別在意輸贏——這個動機是次要的。他在意的是：自從穿越以來，他一直是在一個相對被動的狀態裡展示替身的能力，對象要麼是敵人，要麼是突發情況。他需要一個主動的、開放的場合，來更完整地理解白金之星和黃金體驗在有組織的戰鬥環境裡的表現。</p>\n<p>簡單說：他需要實戰數據。</p>\n<p>而且，他有一個更直接的理由——好奇心。</p>\n<p>「天契大比，大陸最大的舞台，各路強者齊聚，」他在心裡盤了一下，「不去打一場說不過去啊。」</p>\n<p>這個理由比什麼戰略考量都充分。</p>\n<p>「明天，」他放下筷子，對蘇念卿說，「大比報名在哪裡？」</p>\n<p>蘇念卿往他的方向看了一眼，把最後一口湯喝完，站起來，說了一句：「明天早上我帶你去，免得你找錯地方。」</p>\n<p>然後就離開飯廳了。</p>\n<p>白無極看著她走出去的背影，想了想，覺得這算是一種……相當含蓄的友好。</p>\n<p>他再喝了一口湯，感覺不錯。</p>\n<p>---</p>\n<p>第二天早上，蘇念卿果然在宅院門口等他。</p>\n<p>天契城的天契大比報名處設在城中心的靈契總署，一棟五層高的白色建築，外牆刻著整個天衍大陸最複雜的靈契紋路，一看就是官方機構那種肅穆感。</p>\n<p>門口的人龍比昨天進城的隊伍還長，但移動速度更快，因為有十幾個報名窗口同時開放。</p>\n<p>蘇念卿走正式報名的窗口，白無極在旁邊找到了一個角落裡貼著「散修無名額報名」小牌子的窗口，那裡的人相對少一些，但等待的人看起來都是一副江湖味很重的模樣——雜亂的穿著、或多或少的刀傷疤痕，還有那種常年走邊境的人才有的沉默警覺感。</p>\n<p>白無極站進去排隊，前面是一個高壯漢子，後面是一個長相陰鬱的年輕人，雙方都沒有說話，但眼神都是那種「在打量你」的感覺。</p>\n<p>白無極回以友善的微笑，兩個人同時移開了視線。</p>\n<p>輪到他了。</p>\n<p>窗口後面是一個年約四十的登記員，留著短鬍子，眼神沉穩，顯然是見過各種人的老手。他抬起頭，問：「報名，名字。」</p>\n<p>「白無極。」</p>\n<p>登記員提筆，繼續問：「所屬勢力或家族？」</p>\n<p>「無。」</p>\n<p>提筆的動作頓了一下，他繼續：「靈契類型？」</p>\n<p>「無。」</p>\n<p>這次筆停了比較久，登記員抬起頭，看了白無極一眼：「靈契等級？」</p>\n<p>「無。」</p>\n<p>「……」</p>\n<p>登記員放下筆，把桌上的文書翻了一下，像是在確認這種情況的填寫規範，臉色已經變得有點精彩——說「精彩」是因為他是個見過世面的人，所以他沒有露出太明顯的「你在開玩笑嗎」表情，但眉毛還是往上走了一截。</p>\n<p>「推薦信？」他問，語氣保持專業，但那種「我在等你說沒有」的感覺非常明顯。</p>\n<p>「沒有。」</p>\n<p>登記員深吸了一口氣，在表格上的「推薦」欄寫下「無」，然後往旁邊推了一下，讓白無極看：「靈契無，等級無，背景無，推薦無，你確認以無名額報名，直接參加散修預賽？」</p>\n<p>「確認。」</p>\n<p>「預賽無任何保護措施，生死自負——」</p>\n<p>「知道，簽哪裡？」</p>\n<p>登記員把表格推過來，白無極在簽名欄簽了字。</p>\n<p>這個登記員做了這行大概不下十年，見過各種背景的報名者，但「四個欄位全是無，還神色自若地簽字」的，他還是第一次見。他重新打量了白無極一眼，沒有看出什麼特別的，然後把報名憑證推了過去：「報名費三枚靈石，預賽後天開始，早上巳時，南場。」</p>\n<p>白無極把靈石放上去，接過憑證，點了點頭：「謝了。」</p>\n<p>他轉身的時候，身後排隊的幾個人都沉默地往後退了半步——方才那段對話不算小，大家都聽見了。</p>\n<p>四個無。</p>\n<p>還報了。</p>\n<p>這人要麼是天才，要麼是瘋子。</p>\n<p>白無極走回蘇念卿那邊，後者已經辦完了正式名額的報名，正在等他，手裡拿著自己的參賽憑證。她看了一眼白無極手裡的憑證，再看他的臉，他的臉上是一種很普通的「辦完了，走吧」的表情。</p>\n<p>「辦好了？」</p>\n<p>「辦好了。登記員的臉很精彩。」</p>\n<p>蘇念卿：「……」</p>\n<p>她轉身，往回走，說了一句：「南場，後天。」</p>\n<p>「知道，登記員說了。」</p>\n<p>「你知道無名額預賽的南場今年會有多少人嗎？」</p>\n<p>「剛才你說兩百左右？」</p>\n<p>「收到的報名，目前是兩百三十七人。」蘇念卿的語氣很平，「晉級人數是二十五人，剩下兩百一十二人，後天的南場——你會在那兩百一十二人裡面。」</p>\n<p>白無極算了一下，點頭：「好，沒問題。」</p>\n<p>蘇念卿沒有再說什麼。</p>\n<p>但她走路的時候，霜翎低聲嗚了一聲，那聲音翻譯出來大概是：「這個人是真的沒救了。」</p>"}, {"title": "第54章_報名", "content": "<p>第54章　報名</p>\n<p>報名後第二天，天契城因為大比在即，整座城市的氣氛都跟著升溫。</p>\n<p>大街上多了很多從外地趕來的參賽選手和看客，客棧一屋難求，各個茶館酒肆已經開始做起了「大比預測」的生意，那種公開押注的賭盤在城中幾個特定位置擺開，上面列著各方熱門選手的名字。</p>\n<p>白無極晃悠著走了一圈，在一個賭盤前停下來，研究了一會兒。</p>\n<p>上面列了大概二十個名字，旁邊附著各人的靈契類型、等級、所屬家族、歷屆成績。熱門人選裡有幾個已經在坊間很有名頭的：赫連家的赫連烈，契王初階，大地靈契，磐石領域，全場賠率最低，也就是最被看好的那一個。蘇念卿的名字在第三位，旁邊標著「蘇家嫡女，獸契師，銀狐霜翎，契師巔峰，本屆最受矚目女性參賽者」。</p>\n<p>司徒家有個叫司徒雲棠的女子，賠率比蘇念卿還低一點，夜凌家也有個叫夜凌淵的年輕人，拿過上屆大比亞軍。</p>\n<p>白無極把這些名字記了一遍，然後往下翻，看看有沒有他的名字。</p>\n<p>沒有。</p>\n<p>合理，他報名才剛辦完，而且四個「無」的背景，沒有任何公開資料可以支撐，賭盤不知道他的存在是正常的。</p>\n<p>他轉身準備走，聽到旁邊幾個人在說話。</p>\n<p>「聽說今年散修預賽有個奇葩，什麼都沒有就報名了，」其中一人說，「靈契無，等級無，背景無，推薦也無，搞不清楚是哪裡來的瘋子。」</p>\n<p>「真的假的？這種也能報名？」</p>\n<p>「散修名額就是這樣，只要交錢就能進，但預賽會把這種人清掉的，兩百多個人，就算他有點小能耐，也很難撐過去——」</p>\n<p>白無極沒有停下腳步，繼續往前走，臉上帶著一點點說不清是微笑還是無語的表情。</p>\n<p>消息傳得還挺快的。</p>\n<p>---</p>\n<p>回到蘇家宅院，蘇念卿在演武場練習，霜翎在旁邊配合，兩人——準確說是一人一狐——配合得相當默契。白無極在回廊上站著看了一會兒，沒有出聲打擾。</p>\n<p>蘇念卿的戰鬥方式跟他見過的一般靈契者不一樣。</p>\n<p>大多數靈契者會很依賴本人的靈契輸出，靈契越強，攻擊越猛，本人的戰鬥力主要由靈契等級和靈契技能決定。但蘇念卿明顯是個例外——她的個人身法很好，步伐的移動邏輯不是普通的閃避和迂迴，而是帶著一種算計的感覺，每一步都在把自己放到一個更有利的位置，每一步都在讓霜翎的攻擊覆蓋到最大化的區域。</p>\n<p>霜翎放出冰系靈氣的時候，蘇念卿的位置永遠不在冰氣的影響範圍內，同時永遠在她能最快接近或牽制對手的地方。</p>\n<p>人和獸的協調程度，讓白無極有點想鼓掌。</p>\n<p>不過他沒有鼓掌，因為他覺得蘇念卿大概不需要這個，還可能會白了他一眼。</p>\n<p>他轉身回房，繼續整理自己的思路。</p>\n<p>---</p>\n<p>預賽前一晚，白無極睡得很好。</p>\n<p>這是他一個比較奇特的特質：越是大事在即，他越睡得著。這個習慣從地球就帶過來了——工作有重要截止日期？睡得很好。明天有大型會議？也睡得很好。現在是穿越到異世界、明天要打修羅場預賽？依然睡得很好。</p>\n<p>他的腦子對「壓力」這個概念有一種天然的隔離傾向，壓力到了大腦邊界就會自動被分類為「明天的事」然後存檔，晚上不開啟。</p>\n<p>早上起來，在院子裡打了一套八極拳。</p>\n<p>老母雞步、大纏絲、鐵山靠——他已經在這個世界繼續練習了幾個月，加上替身帶來的身體素質提升，現在打出來的八極拳比在地球的時候更有力道，每一式落地都帶著一種實質性的沉重感。</p>\n<p>蘇念卿從廊下走過，停下來看了他幾秒鐘，沒有說話，繼續走了。</p>\n<p>早飯吃完，白無極換好衣服，往南場的方向走。</p>\n<p>路上，他遇到了蘇念卿。</p>\n<p>她站在宅院外的街口，手邊沒有帶什麼，但很顯然是在等他。白無極走到她面前，對視了一秒：「你也去南場方向？」</p>\n<p>「正式賽場在東場，我先去看看預賽的情況，」蘇念卿說，轉身，「走吧。」</p>\n<p>白無極跟上：「你去替我加油？」</p>\n<p>「我去確認你沒有當場丟掉性命。」</p>\n<p>「……這也叫加油，只是措辭有點直接。」</p>\n<p>南場比起東場正式賽場確實要小很多，但「小」也是相對而言，能容納的觀眾席大概有兩千人。白無極到的時候，觀眾席已經坐了大半，大多數是來看熱鬧的，也有一些是特意來物色人才的——各大勢力的人，坐在各自的席位上，手裡拿著名冊，在參賽者入場的時候打量。</p>\n<p>參賽者入場的通道口，白無極登記了一下憑證，換了一個入場牌，進入等待區。</p>\n<p>等待區裡，他掃了一圈。</p>\n<p>兩百多個人，魚龍混雜。</p>\n<p>有穿著破舊但氣息淩厲的游修，有打扮成江湖人模樣的年輕人，有幾個一看就是某個家族私下派來、假裝散修參加預賽的選手，還有幾個……白無極定了定，看向角落裡的三個人。</p>\n<p>那三個人坐在一起，靈契氣息很沉，壓得很穩，是那種刻意壓住不外露的感覺，但壓得再深，有一定敏感度的人都能感覺到——那是契將級的氣息。</p>\n<p>兩百多個人裡，至少有幾個是契將級的。</p>\n<p>預賽，果然是修羅場。</p>\n<p>白無極找了個空位坐下，閉上眼，讓白金之星在靈識層面掃了一遍——整個等待區裡，他大致感應到：契師級的人大概佔六成，契將級的大概佔三成，剩下一成不確定，有的比較弱，有的氣息奇特，看不清深淺。</p>\n<p>然後他感應到自己周圍的一些目光。</p>\n<p>幾個人在悄悄打量他，那眼神是認出他的感覺——大概是昨天登記員的事情流傳出去了，「四個無還來報名的那個傻子」，在等待區這種消息流通很快的地方，他已經帶著一頂無形的標籤了。</p>\n<p>他睜開眼，環顧了一圈，跟其中幾個打量他的人的視線對了一下，然後衝著每個人都友善地點了個頭。</p>\n<p>幾個人扭開了眼神，有的帶著一種「這人挺不正常的」困惑，有的是「懶得搭理」的模樣。</p>\n<p>旁邊等待區的走道上，蘇念卿出現了。</p>\n<p>她站在走道的邊緣，往等待區掃了一眼，找到白無極，看了他一眼，確認他在，然後——就這樣站著等開場。</p>\n<p>白無極看著她，忽然想到，她說是來「確認他沒有當場丟命」，但實際上，她特意繞過來確認他在，然後在這裡等——</p>\n<p>他把這個想法扔開，不分析了，分析太多沒意思。</p>\n<p>裁判台上，一個穿著官服的裁判站起來，清了清嗓子，等場內安靜下來：</p>\n<p>「天契大比，散修預賽，即刻開始。規則簡述：所有參賽者在預賽賽場內競技，靠台邊擊落賽場外，或者主動認輸，或者失去戰鬥能力，判定出局。剩餘在場的前二十五名，晉入主賽場。」</p>\n<p>「生死規則：本賽事不禁絕性命之爭，出手輕重各自負責，主辦方不追究戰鬥中的傷亡責任。」</p>\n<p>「——預賽，開始。」</p>\n<p>兩百多個人同時踏上了那個寬敞的預賽賽場，像一群蓄勢待發的猛獸被集體放進了同一個圈，空氣裡頃刻間充滿了靈契波動的交織感。</p>\n<p>白無極踏進去，感覺腳下的地面有一種微微的震動。</p>\n<p>他往四周看了一眼，白金之星在靈識裡安靜地站著，星空色的鎧甲在他的感知裡微微發光。</p>\n<p>然後，第一個人朝他衝過來了。</p>"}, {"title": "第55章_預賽屠殺", "content": "<p>第55章　預賽屠殺</p>\n<p>預賽賽場的混亂，在「開始」二字落下的瞬間就徹底爆發了。</p>\n<p>兩百三十七個人，不分等級，不分背景，全部集中在同一個賽場裡。這種規則的直接後果是：最初的五分鐘，就已經決定了大半人的命運。強者找位置，弱者找庇護，無頭蒼蠅找任何一個能讓自己撐過去的角落——而那些真正的狠人，在人群中以一種讓人意外的冷靜，找準目標，出手。</p>\n<p>白無極往旁邊走了幾步，讓開了最初的人潮衝撞，站到一個相對開闊的位置。</p>\n<p>第一個朝他衝來的人是個年紀大約三十出頭的粗獷漢子。</p>\n<p>身形高大，足有一米九的塊頭，一件皮甲，腰上別著兩把短刀，他的靈契在奔跑之間已經展開，是土系靈契，氣息沉厚有力——契將初階，不是小角色。</p>\n<p>他大概在開場之前就已經鎖定了白無極，目標明確地衝過來，連招呼都不打，直接抬手，土系靈契凝成一塊暗黃色的衝擊波，往白無極的正面砸下去。</p>\n<p>周圍有幾個人瞟了一眼，繼續忙自己的事。</p>\n<p>四個無的那個傻子遇上契將，第一局就結束了，有什麼好看的。</p>\n<p>衝擊波砸了個空。</p>\n<p>白無極往旁邊踏了半步，靠著一個非常微小的側移把那股靈契衝擊完全讓過去，落地的土系靈契在他站過的位置砸出一個坑，揚起一圈灰塵。</p>\n<p>粗獷漢子的眼睛微微瞇了一下。</p>\n<p>比他預計的要快。</p>\n<p>但這種速度在他打過的對手裡算不上頂尖，他調整方向，繼續衝，這次右拳貼著土系靈契一起打過來，力量和靈契同時輸出——是個訓練有素的組合技。</p>\n<p>白無極往前踏了一步，沒有往後退。</p>\n<p>這個選擇讓粗獷漢子微微一愣——面對他的衝拳，大多數人的本能是往後躲，但這個人是往前走。</p>\n<p>然後他感覺自己的右臂被一股巨大的力量「崩」了一下。</p>\n<p>不是硬擋，是一種奇特的接觸方式，對方的左手搭上他的前臂，然後是一個角度很刁鑽的貼身切進，瞬間把他的進攻力道化掉了一多半，同時對方的右肘已經從他腋下的空隙切了進來——</p>\n<p>八極拳，崩拳接頂肘。</p>\n<p>力道不大，但角度精準，正好打在腋下的神經叢。</p>\n<p>粗獷漢子的整條右臂瞬間麻了，他幾乎本能地想用靈契填補這個空隙，但對方已經跟著跨步貼上，右肩一沉——</p>\n<p>鐵山靠。</p>\n<p>一百七八十斤的力道不是靠肌肉，是靠整個身體的重心轉移，像一座移動的山牆轟了上去。粗獷漢子被那一靠砸得整個人橫移了兩步，背脊上傳來的震動讓他的氣息瞬間亂了，腳下踉蹌，沒能站穩——</p>\n<p>第四步，白無極右腳踢出，是個掃踢，不算花俏，但時機掐得很準，正好在對方重心不穩的那一刻掃中了他的左膝後側。</p>\n<p>粗獷漢子膝蓋一軟，往前倒。</p>\n<p>白無極在他倒地之前，右手掌根往對方後頸輕輕一推。</p>\n<p>這一推幾乎沒有力氣，但角度和時機讓它的效果被放大到了極致——粗獷漢子加速落地，臉朝下趴在賽場上，靈契完全亂掉，一時間無法重新整合。</p>\n<p>從衝上來到倒地。</p>\n<p>三秒。</p>\n<p>周圍少數看著這邊的人沉默了一下。</p>\n<p>白無極沒有追擊，轉了個身，往另一個方向走。</p>\n<p>他需要維持體力，這是預賽，不是決戰。最省力、最快速地處理掉每一個對手，才是正確策略。</p>\n<p>---</p>\n<p>預賽進行到二十分鐘，賽場上的局面已經初步清晰。</p>\n<p>強者之間的博弈在幾個區域同時展開，弱一點的人不是倒地就是躲在角落拖延，試圖等到強者相互消耗完再出頭——這是預賽的常見策略，但今年的預賽強人比例偏高，這種拖延策略撐不了多久。</p>\n<p>白無極在賽場上走出的路線，對旁觀者來說有點奇怪。</p>\n<p>他沒有刻意找強手打，也沒有找弱的欺負，他走路的軌跡是一種非常隨性的直線，然後是誰擋了這條直線，他就把誰處理掉，然後繼續走。</p>\n<p>第二個，是個靈契弓手，契師中階，在人群外圍佔了個有利位置開始放靈契箭矢。他選的目標是白無極，大概是看他單獨行走、又感應不到明顯靈契波動，覺得是個軟目標，射了三箭。</p>\n<p>第一箭白無極側身讓開，第二箭他用白金之星的精密感知在箭矢快到的瞬間伸出手，手指捏住箭桿，拿在手裡。</p>\n<p>第三箭他把第二箭扔了回去。</p>\n<p>弓手下意識地躲，在躲的過程中重心偏移，白無極已經在他反應的空隙裡貼身衝進了射程以內，弓手在近距離完全沒有優勢，被一個反手擒拿把持弓的手腕扭住，往外一旋，扔出了賽場邊線。</p>\n<p>第三個，第四個。</p>\n<p>節奏越來越快。</p>\n<p>有個契師中階的女子用風系靈契包住全身，飛速衝刺，是那種依靠速度突破近戰防禦的戰法。白無極讓她衝進了近身範圍，在她認為「貼身了就能打」的距離，白金之星以那種讓人難以置信的速度先行一步，一個反應快到像殘影的格擋把她的右拳卸掉，接著八極拳出手，一個崩拳打在她的靈契防護核心上，靈契護罩直接碎了——</p>\n<p>她停住腳步，臉色瞬間難看，看了看自己散掉的靈契護罩，然後看向白無極，後者已經轉頭往別的方向走了。</p>\n<p>她判斷了一秒鐘，選擇認輸。</p>\n<p>不值得硬撐。</p>\n<p>---</p>\n<p>觀眾席上，蘇念卿站在走道邊緣，視線跟著白無極的移動。</p>\n<p>她一開始是以防他出意外的心態在看，但很快就意識到這種擔心是多餘的。她靜靜地看著他在預賽場上那種幾乎讓人覺得「過於隨意」的行走方式，然後一個接一個地把擋路的人打倒——不同的對手，不同的靈契類型，他用的方式都略有不同，但有一個共同點：快，準，省力。</p>\n<p>他在用最小的代價換取最大的結果。</p>\n<p>這種戰鬥意識，不是蠻力能解釋的。</p>\n<p>旁邊有個觀眾湊到她旁邊，低聲問：「姑娘，你認識那個在賽場上閒庭信步的人嗎？那個一直在走直線的。」</p>\n<p>蘇念卿看了他一眼，沒有回答。</p>\n<p>觀眾也看出她不想搭話，縮了回去，繼續看。</p>\n<p>預賽進行到四十分鐘，賽場上已經剩下不到六十人，倒地的、出界的、主動棄賽的佔了大多數，還在場上的都是能打的，強者之間的博弈越來越激烈。</p>\n<p>角落裡那三個契將級的，已經開始動了。</p>\n<p>其中一個，高個子，靈契是水系，出手精準狠辣，把三個對手同時困在水系靈契的包圍圈裡，一個一個地清掉，效率很高。</p>\n<p>他清掉第三個對手的時候，往四周看了一眼，視線落在白無極身上，停了下來。</p>\n<p>他認出了那個「四個無」的標籤人物——如果這人此刻仍然站在場上，就代表他不是軟柿子。高個子靜默地評估了一下，轉身，朝白無極的方向走去。</p>\n<p>白無極早就感應到了他的目光和移動方向。</p>\n<p>高個子走近，開口，直接問：「你有沒有靈契？」</p>\n<p>「沒有。」</p>\n<p>高個子眼神微變：「那你靠什麼打的？」</p>\n<p>「手。」</p>\n<p>對方沉默了一秒，然後說：「沒有靈契的人能走到現在，要麼你很強，要麼你很運氣。我不是來找麻煩的，我的提議是，你跟我合作過這一關。」</p>\n<p>白無極想了一下：「你想要什麼？」</p>\n<p>「晉級。我一個人也能晉，但效率更高如果有人配合——你打近戰，我打中遠程，剩下的這些人，二十分鐘內我們可以一起清掉大半。」</p>\n<p>白無極轉頭，看了看賽場上剩下的局面，然後回頭，說：「好。」</p>\n<p>接下來的二十分鐘，確實像他說的那樣高效。</p>\n<p>白無極打近戰，高個子的水系靈契在中遠程封鎖退路和牽制，兩人配合起來的效果讓剩下的參賽者很不好過。白無極甚至有一刻覺得，這個高個子的配合意識相當好，戰鬥語境下的判斷都很準確。</p>\n<p>但他沒有放鬆對他的警覺。</p>\n<p>預賽，很難說誰是真的盟友。</p>\n<p>最後一個對手被高個子的水系靈契困住，白無極進去打了最後一擊，對方倒地，裁判台上的計數響起。</p>\n<p>賽場上還站著的，包括白無極和高個子在內，一共二十七人。</p>\n<p>超出晉級名額兩個人，需要再打兩局。</p>\n<p>白無極環顧一圈，高個子已經悄然往旁邊移了半步——友好的合作在晉級名額確定之前，就已經結束了。</p>\n<p>白無極對此沒有任何意見，轉身，找到最近的對手。</p>\n<p>「下一個。」</p>\n<p>全場的觀眾席，從沉默中爆發出一陣高聲的嘈雜。他們看了近一個小時的預賽，那個一直在走直線的無名選手，在沒有任何靈契波動的情況下，打到了現在。</p>\n<p>「那個人——」</p>\n<p>「他有靈契嗎？我怎麼感應不到任何波動？」</p>\n<p>「根本看不懂他在用什麼，但那些人就是被打倒了——」</p>\n<p>「四個無，怎麼可能走到這一步？」</p>\n<p>蘇念卿在走道邊緣，把這些嘈雜聲屏蔽掉，靜靜地看著賽場上那個正在走向最後兩個對手的人。</p>\n<p>他走路的姿勢很普通，不快，也不慢。</p>\n<p>但那個姿勢裡有一種讓人說不清楚的篤定，不是張揚，不是囂張，是那種「我知道我會走到終點」的，安靜的，自然的確信。</p>\n<p>霜翎在她腳邊，抬起頭，低鳴了一聲。</p>\n<p>蘇念卿沒有說話，但她看著那個身影，沒有移開視線。</p>"}, {"title": "第56章_蘇念卿的戰鬥", "content": "<p>第56章　蘇念卿的戰鬥</p>\n<p>正式賽場在東場。</p>\n<p>東場的規模比南場的散修預賽場大了三倍不止，能容納兩萬人的觀眾席圍繞著中央擂台依次抬高，最高處的貴賓包廂距離地面有十五米，那裡是四大家族高層和各方勢力代表的觀戰席位。</p>\n<p>蘇念卿走進選手通道的時候，東場已經坐滿了人。</p>\n<p>她今天穿的是蘇家的正式參賽服，深青色的底，袖口和衣領有細密的靈紋刺繡，那是蘇家獨有的靈契紋路，有護體和靈氣輔助的功效。霜翎在她身旁，今天沒有縮小形態，完整的銀白靈狐體形，尾巴上有冰晶在光線下折射出微微的寒光。</p>\n<p>她走進選手等待區，周圍有幾道目光轉過來。</p>\n<p>都是打量，都是評估，有的帶著競爭的意思，有的帶著試探。蘇念卿對這些視線一一掃過，面色平靜，都是見過的，都是處理過的，這種場合她已經不是第一次了。</p>\n<p>同一個區域裡，她認出了幾張臉。</p>\n<p>司徒家的司徒雲棠，坐在角落，手邊放著一個小小的靈契法器，眼睛閉著像在調息，但蘇念卿知道她在感應周圍的每一個人——這是司徒家的靈感系靈契的特性，閉眼的時候感知反而更強。</p>\n<p>夜凌家的夜凌淵，上屆亞軍，站在角落，看起來就是一個普通的青年，輪廓清秀，靈契氣息壓得很深，讓人感應不到深淺。</p>\n<p>還有幾個她不認識的臉，但從氣息來判斷，都不是弱者。</p>\n<p>霜翎在她腳邊靜靜地坐著，銀色的眸子往各個方向掃了一遍，然後回到蘇念卿的臉旁邊，低聲鳴了一下——那是牠在說「都打量清楚了，沒有超出我們能應對範圍的對手」。</p>\n<p>蘇念卿輕輕撫了一下霜翎的耳朵。</p>\n<p>---</p>\n<p>正式賽的第一輪，蘇念卿對的是一個來自西域修學院的年輕男子，靈契是雷系，契師中階，速度和爆發力都不錯，一上來就靠著雷系加速往她猛衝。</p>\n<p>他在距離她五步的地方停住了。</p>\n<p>霜翎走出了一步。</p>\n<p>就只是走出一步，但那一步帶出的冰系靈氣把方圓三米的空氣溫度壓低了十幾度，地面的霜跡在瞬間蔓延，整個前場區域彌漫著一層薄薄的白霧。</p>\n<p>雷系和冰系的相剋特性讓對方的速度加成瞬間被壓低，他嘗試突破，靈契輸出加大，但冰系的領域壓制不是正面阻擋，它是環境性的，全方位的，沒有盲點——</p>\n<p>蘇念卿在白霧後面站著，面色平靜：「認輸？」</p>\n<p>對方看了看自己腿上已經薄薄結了一層冰晶的靴子，選擇了主動離場。</p>\n<p>第一場，五十秒結束。</p>\n<p>---</p>\n<p>第二場對手是個契師高階的女子，顯然做了功課，選擇了針對冰系的火屬性戰術——把靈契輸出調成高溫，先破環境，再進攻。</p>\n<p>她的策略沒有錯，冰系和火系相克，高溫確實能有效化解冰系的領域壓制，如果全力輸出，霜翎的環境控制會被一定程度地削弱。</p>\n<p>但她高估了自己突破之後能做什麼，同時低估了蘇念卿本人的近戰應對能力。</p>\n<p>霜翎往後退了兩步，讓出了一定的空間，讓火系的高溫在中場形成一個緩衝區。這看起來像是在示弱，但實際上是在等——等對方進入那個溫度差最大的過渡地帶，那裡是火系能量和冰系能量的邊界，靈契者在這個位置的輸出效率最低。</p>\n<p>對方踏入那個地帶，前衝，火拳蓄力。</p>\n<p>蘇念卿在霜翎後方走出，步法輕盈，腳下是蘇家的獨門步法——不是普通的閃避步法，是主動收縮距離的切進步，三步之內貼近對手右側，右手兩指夾住對方的手腕靈脈節點，輕輕一扣。</p>\n<p>靈脈節點被封住的感覺，像是水流突然被卡住，對方的火系靈契輸出瞬間停滯，蓄力中的火拳沒有完成——力量沒有出口，反震回她自己身上，對方悶哼一聲，退了兩步。</p>\n<p>蘇念卿退回了霜翎身邊，保持原有的站位。</p>\n<p>就這樣。</p>\n<p>第二場，兩分鐘出頭結束。</p>\n<p>---</p>\n<p>第三場。</p>\n<p>對手是赫連家的一個旁系弟子，靈契是土系，契師高階接近巔峰，而且他顯然是有備而來——他的靈契護盾極其厚重，採取先守後攻的策略，試圖用持久戰耗盡霜翎的靈氣輸出。</p>\n<p>這個策略也沒有錯，冰系的領域維持需要持續消耗，如果戰鬥拖得足夠長，霜翎遲早會力竭。</p>\n<p>但他不知道的是，霜翎今天的靈力儲備比預賽時充足得多——昨晚蘇念卿給了牠一枚上品靈晶補充。</p>\n<p>兩分鐘、三分鐘、五分鐘，他在厚重的土系護盾後面緩緩移動，時不時試探性地出手，但每次都被霜翎的冰系靈氣壓制。他看著冰系領域的範圍，在計算霜翎的輸出曲線——</p>\n<p>十分鐘過去，他的表情開始有點不對了。</p>\n<p>霜翎的輸出沒有衰減的跡象。</p>\n<p>他還在等，但那種等待背後的自信已經開始動搖——</p>\n<p>霜翎突然換了輸出方式。</p>\n<p>從環境型的冰系靈氣，切換成了定向的冰刃。</p>\n<p>六道冰刃，從六個方向同時向他的護盾射去，不是真正要打穿護盾——是要破壞護盾的均勻分佈，讓它出現薄弱點。土系護盾的特性是均勻厚實，抗正面衝擊的能力極強，但如果多個方向同時受力，厚度就會被分攤，某個方向會比其他方向薄。</p>\n<p>霜翎的六道冰刃是在找那個薄的地方。</p>\n<p>蘇念卿走出，速度不快，像是很隨意地往前走了幾步，但腳下的步法讓她恰好出現在土系護盾最薄的那一側，兩指照例點了上去。</p>\n<p>土系護盾，核心節點，一扣。</p>\n<p>護盾碎了。</p>\n<p>第三場，十二分鐘結束，全場晉級。</p>\n<p>---</p>\n<p>觀眾席上的嘈雜聲這幾場都沒有停過，只是性質不同。</p>\n<p>第一場是「這麼快？」的驚訝，第二場是「這個技法……」的讚歎，第三場是沉默——那種在看完某種讓人難以用語言形容的東西之後的沉默。</p>\n<p>「蘇家嫡女，」坐在觀眾席上的某人低聲說，「名不虛傳。」</p>\n<p>「她跟霜翎的配合，幾乎沒有任何多餘動作，每一步都是在精確計算之後的最優解——」</p>\n<p>「這種程度的獸契師配合，整個大陸恐怕都是頂尖的。」</p>\n<p>白無極坐在觀眾席的普通區，他是預賽晉級之後換的位置，正式選手也可以在主賽場觀看其他人的比賽，但普通名額只有普通觀眾席的座位。</p>\n<p>他坐在一群陌生人中間，聽著四周關於蘇念卿的討論，沒有加入，只是靜靜地看著擂台。</p>\n<p>霜翎在擂台上的那種威懾感，他是第一次見到完整版。平日裡霜翎縮著形態，大多數時候像隻普通的大白狐，但在今天的賽場上，牠是一隻真正的銀色靈狐，冰系靈力在牠周圍流動，每一個動作都帶著一種讓對手本能地感到壓迫的氣勢。</p>\n<p>而蘇念卿——</p>\n<p>在整個比賽過程中，她說的話加起來不超過十句。她幾乎沒有主動出手過，每一次出手都是在最精確的時機，做最小的事，產生最大的效果。</p>\n<p>看她打架，像在看精密機械運轉——不多一個零件，不少一個步驟，準確到讓人有點害怕。</p>\n<p>旁邊的人在說「今年的奪冠熱門」。</p>\n<p>白無極聽著，嘴角微微彎了一下。</p>\n<p>他沒有評論，也沒有炫耀「我認識她」的意思，只是——這個彎弧出現的很自然，帶著一點說不清楚的性質，大概是那種：「你們說的那個人，我認識。」</p>\n<p>的那種。</p>\n<p>霜翎在賽場上抬起頭，銀色的眸子往觀眾席的方向掃了一眼，不確定是不是掃到了白無極的位置，然後轉回去，跟在蘇念卿身後走出了賽場。</p>\n<p>三場，全勝，輕鬆晉級。</p>"}, {"title": "第57章_八強", "content": "<p>第57章　八強</p>\n<p>晉級八強的名單，第二天早上就在天契城的各個公告欄張貼出來。</p>\n<p>白無極在宅院的門口看到宅院管事拿著一份抄錄版本進來，他湊過去看了一眼，在上面找到了自己的名字——「白無極，無名，散修預賽晉級」，就這幾個字，旁邊其他人的名字後面都跟著一長串的靈契類型、等級、所屬勢力，只有他那行後面是空白的。</p>\n<p>管事看了他一眼，有點不確定地說：「白……白公子，這上面……是您？」</p>\n<p>「是我。」</p>\n<p>「您……晉級了八強？」</p>\n<p>「對。」</p>\n<p>管事重新低頭看了看名單，再看白無極，臉上的表情是一種相當努力地嘗試維持禮貌的樣子，但在那個禮貌後面有一層掩蓋得不太好的困惑：「……恭喜。」</p>\n<p>白無極點了點頭，自己回房去了。</p>\n<p>---</p>\n<p>八強的賽程安排在第三天，也就是今天下午。</p>\n<p>上午的時候，蘇念卿在書房繼續研究賽程資料，白無極推門進來，端著兩杯茶，放了一杯在她桌上，自己在對面坐下。</p>\n<p>「我的對手是誰？」</p>\n<p>蘇念卿看了他一眼，把一份資料推過去：「孟天浩，江湖游修，年齡三十一，契將中階，靈契類型：風雷，正式名額選手，赫連家的外圍訓練出身，後來自立，擅長遠程高速輸出。」</p>\n<p>白無極翻了翻資料，「風雷，就是說遠程靈契的速度很快？」</p>\n<p>「風系加速，雷系轟炸，他的攻擊模式是：保持距離，高頻率遠程靈契轟炸，同時借助風系靈契做快速位移，讓你無法近身。」蘇念卿說，語氣平靜，像在報告天氣，「他在預賽之前就看過你的所有預賽錄像，他知道你的核心戰術是近身格鬥，所以他會針對這一點。」</p>\n<p>「觀察過了。」</p>\n<p>「你有辦法嗎？」</p>\n<p>白無極想了想：「有，但需要用到黃金體驗。」</p>\n<p>蘇念卿知道「黃金體驗」這個名字——他之前提過一次，說是另一個靈契，但她見過的靈契者裡，同時擁有兩個替身的人，她以前完全沒有聽說過。這件事她暫時把它歸類在「白無極的謎」裡，跟時停和那一秒同一個文件夾，等她找到合適的時機和切入點，再去拆解。</p>\n<p>「黃金體驗，」她說，「那個讓無機物變成生物的能力？」</p>\n<p>「對。」白無極喝了一口茶，「賽場上的石磚，都是無機物。」</p>\n<p>蘇念卿沉默了一下，然後說：「去打吧。」</p>\n<p>---</p>\n<p>下午的八強賽，東場的觀眾席坐得比前幾場更滿。</p>\n<p>八強的名字每一個都有來頭：赫連烈、司徒雲棠、夜凌淵，這三個是最受矚目的，被賭盤列在最高熱門的位置。蘇念卿是女子組裡最受關注的，其餘幾個八強選手也都是各方勢力的代表人物。</p>\n<p>然後是白無極。</p>\n<p>坐在觀眾席上的人裡，已經有不少是昨天在南場看過預賽的，或者是聽說了「四個無晉入八強」這件事趕來見識的。白無極的名字在天契城裡已經是一個話題，但「話題」的性質更像是「你聽說了嗎有個傻子」而不是「你聽說了嗎有個強者」。</p>\n<p>孟天浩是個高挑的中年男人，臉上有一道不顯眼的舊疤，氣質沉穩，是那種打過很多架、見過很多事的人特有的沉靜。他踏上擂台的時候，先往白無極的位置看了一眼，打量，然後移開視線，開始調整自己的狀態。</p>\n<p>他已經做好了準備。</p>\n<p>從昨天的預賽看到結束，他把白無極的戰鬥模式分析得相當清楚：這個人沒有任何遠程手段，完全依賴近身格鬥，速度不慢，對時機的把握很準，但只要讓他靠不了身，他就是個沒有任何輸出的普通人。</p>\n<p>策略很明確：保持距離，全程遠程壓制，讓他跑到精疲力竭。</p>\n<p>「開始。」裁判的聲音落下。</p>\n<p>孟天浩第一時間啟動風系靈契，整個人的速度加成打開，同時拉開了和白無極之間的距離，在擂台的另一端站定，雙手靈契印訣結起，第一道雷系靈契轟炸已經成型，帶著刺耳的電流聲往白無極砸去。</p>\n<p>白無極往旁邊一躲，雷電落在他剛才的位置，擂台砸出一個焦黑坑。</p>\n<p>第二道、第三道，連綿不斷，孟天浩的雙手靈契凝形速度相當快，幾乎沒有停頓的空隙，同時他本人在持續移動，靠著風系加速讓自己的位置隨時在變化，不給白無極判斷出固定方向的機會。</p>\n<p>白無極在擂台上跑著躲著，看起來相當狼狽。</p>\n<p>觀眾席上，「要輸了吧」的聲音悄悄響起來。</p>\n<p>「你看，他靠近不了。」</p>\n<p>「遠程被壓制，這局可能撐不了多久。」</p>\n<p>「距離太遠，他除了跑，能做什麼？」</p>\n<p>孟天浩也感覺到了主動權在自己手上，輸出穩定，步法穩定，這種打法他練了很多年，只要對方靠不上來，他不會出問題。</p>\n<p>白無極在躲第七道雷系轟炸的時候，側步踏了一下，腳踩在擂台的一塊石磚上，這個石磚被他踩到的瞬間——</p>\n<p>沒有人注意到，他的腳踩的方式稍微特別了一點，那種金色的光芒在他腳底悄悄一閃，然後消失了。</p>\n<p>黃金體驗，啟動。</p>\n<p>那塊石磚，在靈識層面開始發生變化。</p>\n<p>無機物轉化，細胞層面的重構，白無極繼續在擂台上跑，但他的注意力一部分已經分給了那個轉化過程——他需要讓這個過程在某個時機完成，然後是另外幾塊磚，在他跑過的時候，腳踩的方式稍微刻意了一點，一塊，兩塊，三塊。</p>\n<p>孟天浩的視線一直盯著他，沒有注意到地面的變化——這種微小的靈能波動在雷系靈契的電流噪音中被完全覆蓋掉了。</p>\n<p>第十五道雷系轟炸落下的時候。</p>\n<p>白無極停下來了。</p>\n<p>孟天浩眼神微微一動——停下來？</p>\n<p>他調整方向，繼續打，但白無極不躲了，站在原地，垂著手，像是——</p>\n<p>像是等著被打。</p>\n<p>孟天浩的直覺告訴他有問題，但他找不到問題在哪裡，這個人站在那裡，前方什麼都沒有，後方什麼都沒有，靈契感應掃了一遍——什麼也沒有。</p>\n<p>他猶豫了半秒，繼續出手。</p>\n<p>雷系靈契凝成最大輸出，往白無極的正面轟去。</p>\n<p>在那道閃電抵達的前一刻，擂台的地面，在孟天浩的腳邊，三塊石磚同時碎了。</p>\n<p>從碎石中飛出的，是三隻鳥。</p>\n<p>灰褐色，翅膀硬而有力，眼神銳利，鳥類的本能讓它們在破石飛出的瞬間本能地尋找空中的威脅——而孟天浩的雷系靈契正好是最明顯的靈能目標。</p>\n<p>三隻鳥一起衝向那道雷系閃電。</p>\n<p>靈能體和生物體的碰撞，生物體會被靈能摧毀，但靈能衝擊也會被生物體的本能反應吸收一部分——三隻鳥用自身抵消了這道雷系轟炸的大半能量。</p>\n<p>孟天浩瞳孔縮了一下。</p>\n<p>他的手還沒有重新蓄力，白無極已經在他短暫的愣神空隙裡，全速衝刺，從擂台對角跨越了三分之二的距離。</p>\n<p>孟天浩啟動風系加速試圖拉距離，但他慌亂了一下，加速方向的選擇稍微慢了一拍，那一拍的間隙，已經被白無極抓住。</p>\n<p>八極拳，第一步，貼身。</p>\n<p>崩拳出手，打在孟天浩的靈契護盾正面，護盾硬扛了一下，沒有碎，但孟天浩的腳步被震退了一步。</p>\n<p>白金之星的精密感知已經在這個近身距離內找到了護盾最薄的一點，第二拳，角度切進——</p>\n<p>護盾碎。</p>\n<p>第三拳，鐵山靠，一沉一推。</p>\n<p>孟天浩被推出了擂台邊線，落地，站穩，沒有倒，但他已經出界了。</p>\n<p>裁判台：「白無極，勝。」</p>\n<p>全場沉默了大概三秒鐘，然後炸開。</p>\n<p>「他又多了一個能力？」</p>\n<p>「那些鳥是哪裡來的？剛才那個地方明明什麼都沒有——」</p>\n<p>「他是怎麼——地面裡的？」</p>\n<p>「他的靈契到底是什麼？」</p>\n<p>「根本看不懂！」</p>\n<p>觀眾席上的混亂討論聲交織在一起，孟天浩在擂台外站定，表情複雜地看了一眼已經轉身走向選手通道的白無極，那個眼神裡有一種說不清楚是佩服還是困惑的東西——他做了充分的準備，他的針對性策略是對的，但對方……</p>\n<p>對方的應對方式不在任何他能預計的範圍內。</p>\n<p>蘇念卿在選手等待區，聽到了觀眾席的嘈雜，她轉頭往擂台方向看了一眼，剛好看到白無極的背影走進通道口。</p>\n<p>她沒有說話。</p>\n<p>霜翎在她腳邊，用尾尖輕輕碰了一下她的腳踝，那個動作的意思是：「你剛才是不是在看他。」</p>\n<p>蘇念卿低頭，看了霜翎一眼，然後重新把視線放回到自己面前的等待區，面色如常。</p>\n<p>霜翎無聲地哼了一下，然後優雅地把尾巴收回去，把「我沒說什麼」的姿態擺得非常標準。</p>"}, {"title": "第58章_四強_赫連家的契王", "content": "<p>第58章　四強：赫連家的契王</p>\n<p>四強賽的賽程安排在次日。</p>\n<p>那一晚，天契城沸騰。</p>\n<p>四強的名單在傍晚確定，貼出來的瞬間就在整座城市引發了議論——赫連烈、司徒雲棠、蘇念卿，還有最後一個，讓所有人都有點說不出話的名字：白無極。</p>\n<p>在天契大比的歷史上，從散修預賽一路打進四強的，每隔幾屆會有一兩個，但通常都是有實力有背景、只是礙於某種原因沒有正式登記的强人。「靈契無，等級無，背景無」一路打進四強，在有記錄的大比歷史裡——沒有先例。</p>\n<p>各大茶館酒樓的話題，從「今年的奪冠熱門」一下子轉移到了「那個無名選手到底是什麼人」。</p>\n<p>各方勢力的情報系統已經在悄悄運作，試圖挖掘白無極的背景，但什麼都沒挖到——在整個天衍大陸的人口記錄裡，這個人是不存在的。</p>\n<p>白無極完全不知道有人在查他。</p>\n<p>他睡得很好，第二天起來照樣打了一套八極拳，然後吃了早飯，出門去看賭盤——他想知道大家對這場四強賽的預測是什麼。</p>\n<p>他的對手，赫連烈的賠率，幾乎是清一色的「必勝」。</p>\n<p>白無極這邊，「赤賠」——沒有人押他能贏，賭盤甚至沒有給他設開盤的必要。</p>\n<p>他看了一會兒，轉身回宅院，路上順便買了兩個煎餅，在街口吃完，覺得還不錯。</p>\n<p>---</p>\n<p>四強第一場，赫連烈對白無極。</p>\n<p>東場的觀眾席，從開場前一個時辰就已經填滿了，連走道的縫隙都站了人，那種密度讓整個場館的空氣都帶著一種壓縮的熱氣。赫連烈的名字在天契城不需要介紹，赫連家的嫡系天才，契王初階，大地元素，「磐石領域」的使用者，這個名字代表的是赫連家未來二十年的希望。</p>\n<p>他踏上擂台的時候，全場的聲音都高了一截。</p>\n<p>白無極在他身後踏上擂台，聲音——</p>\n<p>幾乎是一段沉默，然後是嗡嗡的議論聲，帶著一種「他真的上來了」的奇異感。</p>\n<p>赫連烈站在擂台中央，看著對面走上來的白無極。</p>\n<p>他比白無極高半個頭，比白無極壯了一圈，眉目冷峻，靈契氣息沉厚，那是大地元素靈契特有的重量感，像一座山靜靜地壓在那裡。他打量白無極的眼神，不是輕視，是那種在評估一個資訊缺失的變量時的謹慎——他也看了昨天的比賽，也不知道白無極的能力邊界在哪裡，但他有一張底牌，讓他不需要太擔心。</p>\n<p>「開始。」</p>\n<p>裁判的聲音落下。</p>\n<p>赫連烈沒有立刻出手，他往下一沉，雙腳踏地，右手結了一個印訣：</p>\n<p>「磐石領域。」</p>\n<p>這三個字說出來的同時，整個擂台的性質發生了改變。</p>\n<p>從擂台地面向上，大地元素的靈能以一種緩慢但不可抗拒的速度蔓延開，那不是一般的靈契攻擊，是一種環境改造型的領域——赫連烈把擂台範圍內的所有靈能環境重新定義為「他的主場」，在這個主場裡，重力加倍，靈能密度壓縮，所有在這個領域內的生命體都會感受到一種無形的下壓力。</p>\n<p>更關鍵的是：磐石領域對靈契者有壓制效果，任何在領域內的靈能輸出效率都會被壓低到六成。</p>\n<p>這對蘇念卿那樣的靈契者，是致命的削弱。</p>\n<p>觀眾席上，有懂行的人低聲道：「磐石領域展開了，在這個領域裡，靈契者的力量和靈能輸出都會被壓縮，契師對上赫連烈基本上不可能贏——」</p>\n<p>「但他對面的那個好像也感應不到靈契？」</p>\n<p>「那就更糟了，沒有靈契的人，肉身在磐石領域裡同樣會受到重力加倍的壓制，力量輸出最多六成——」</p>\n<p>赫連烈感受到領域穩定展開，往白無極的方向踏了一步，冷眼看著他：</p>\n<p>「體契者，在我的領域裡，你的肉身力量會被壓到六成，你還能打嗎？」</p>\n<p>這句話說得不算囂張，是一種很直接的陳述，帶著一個問句，像是在給對手一個主動棄賽的機會。</p>\n<p>白無極站在領域裡，試了試站姿。</p>\n<p>他往下沉了一下重心，感受了一下腳下的感覺，又轉了轉右腕，拍了拍自己的左臂——</p>\n<p>「壓了嗎？」他說，表情帶著一點點認真思考的樣子，「感覺還好。」</p>\n<p>赫連烈皺眉。</p>\n<p>領域沒有展開？</p>\n<p>不對，領域是展開的，他能感受到自己的大地靈能在整個擂台範圍內流動，那種掌控感是真實的。但眼前這個人的反應——</p>\n<p>「你的領域應該對靈能有壓制效果，」白無極繼續說，語氣很隨意，像是在和人討論天氣，「但我感覺沒什麼差別，這個……正常嗎？」</p>\n<p>赫連烈的眉頭皺得更深了。</p>\n<p>他的領域是沒有問題的，他能感知到領域在正常運作，重力加倍的效果是覆蓋整個擂台的，包括眼前這個人所站的位置。但對方說「感覺還好」——這句話是在撒謊，還是……</p>\n<p>在貴賓包廂裡，一個老者低聲說：「赫連烈的磐石領域，對靈能有壓制效果，但……」</p>\n<p>他旁邊的人問：「但什麼？」</p>\n<p>老者沉默了一下：「如果那個人的能力不是靈契性質的呢？」</p>\n<p>「那什麼是靈契，什麼不是靈契？」</p>\n<p>「我也不知道，」老者說，「但我在觀察台上觀戰這麼多年，第一次看到有人在磐石領域裡說『感覺還好』——而且那個表情，不像是在逞強。」</p>\n<p>擂台上，赫連烈決定不繼續等了。</p>\n<p>他往前踏，雙手靈契輸出，第一道磐石法術成型——從地面衝出的巨型岩柱，直指白無極的站位。</p>\n<p>白無極側身，岩柱從他旁邊轟起，他往左移了三步。</p>\n<p>赫連烈緊跟著第二道，第三道，磐石法術連綿，每一道都帶著壓倒性的力量，整個擂台在轟炸中開始出現裂縫。</p>\n<p>白無極持續在躲。</p>\n<p>觀眾席上的聲音又開始了：「他只能躲，完全在被壓制——」</p>\n<p>「是，但他躲得住，這個反應速度……」</p>\n<p>「但躲能躲多久？赫連烈的磐石法術輸出沒有看到衰減，他能一直這樣轟下去——」</p>\n<p>赫連烈追得很穩，氣息穩定，輸出穩定，在自己的主場，他沒有任何慌亂的理由。但他開始注意到一個細節：這個人躲避的角度，每一次都很精準，不是那種依靠本能的隨機閃避，而是在每一道法術成型的瞬間就已經判斷出落點，提前做了最優的位移選擇。</p>\n<p>這不是普通人的反應速度。</p>\n<p>而且……在自己的磐石領域裡，這個人的移動速度，好像真的沒有受到任何影響。</p>\n<p>赫連烈的眉頭，皺得越來越深。</p>"}, {"title": "第59章_一秒足矣", "content": "<p>第59章　一秒足矣</p>\n<p>戰鬥持續了七分鐘。</p>\n<p>七分鐘裡，白無極一共躲了四十一道磐石法術。</p>\n<p>從岩柱到石板、到地裂、到一整面從地面掀起的石牆，赫連烈的大地元素靈契在自己的領域裡發揮到了極致，每一道法術都是以壓倒性的力量投放，打在擂台上的轟鳴聲讓觀眾席的地板都在微微震動。</p>\n<p>白無極躲完了每一道。</p>\n<p>這本身是一件讓人難以理解的事。</p>\n<p>不是說白無極有多強，而是——在磐石領域裡，這個人的反應速度和移動靈活性，和領域啟動之前完全沒有差別。任何靈契者在磐石領域裡都會感受到那種無形的下壓感，哪怕是契王級別的也一樣，只是壓制效果程度不同。但白無極的移動，像是那個領域對他來說不存在一樣。</p>\n<p>赫連烈早就意識到這個問題，但他找不到解釋。</p>\n<p>他的領域在運作，他能感覺到，但對方完全不受影響——</p>\n<p>這只有兩種可能：一，這個人的肉身強到連契王的領域也壓制不住，但這種程度的體修在整個大陸屈指可數，不可能是個無名無姓的散修；二，他使用的力量，根本不在靈契系統的範疇之內，磐石領域對靈能有壓制效果，但如果他的力量不屬於靈能……</p>\n<p>這個想法讓赫連烈感到一種他不習慣的困惑。</p>\n<p>他加大輸出，法術的頻率更快了，密度更高了，整個擂台在他的攻勢下像是快要沸騰的地面，石塊飛濺，裂縫蔓延，那種壓倒性的氣勢讓觀眾席前排的人都往後縮了縮。</p>\n<p>白無極繼續在躲。</p>\n<p>觀眾席的聲音，漸漸地，統一到了同一個方向。</p>\n<p>「看起來快撐不住了——」</p>\n<p>「他能躲到現在已經很厲害了，但赫連烈還沒有全力——」</p>\n<p>「這樣下去，他只能跑，連反擊的機會都沒有——」</p>\n<p>「要輸了。」</p>\n<p>不只是普通觀眾，連選手等待區的人也在悄悄做這個判斷。</p>\n<p>司徒雲棠往擂台方向瞟了一眼，眸光閃了一下，收回視線。</p>\n<p>夜凌淵沉默地看著擂台，表情沒有什麼波動，但他的手指輕輕動了一下——某種評估和計算的本能反應。</p>\n<p>蘇念卿站在等待區的邊緣，視線一直在擂台上。</p>\n<p>她看了七分鐘，看白無極在密集的磐石法術轟炸裡躲閃，看赫連烈的領域越發穩固，看場面越來越像是單方面的壓制——</p>\n<p>但她沒有移開視線。</p>\n<p>因為她看出來了：他在等什麼。</p>\n<p>不是真的被壓制，是在等。</p>\n<p>她不知道他在等什麼時機，也不知道他的底牌是什麼，但七分鐘裡她看的不是「他能不能躲開」——他每一次的躲閃都太精準了，不是被動的倉皇閃避，是一種主動選擇最優位置的移動。</p>\n<p>他在用七分鐘的「被壓制」，換取某個她還看不懂的東西。</p>\n<p>擂台上，赫連烈吐出一口氣，往前走了一步。</p>\n<p>他決定結束了。</p>\n<p>七分鐘的消耗輸出不算輕，他要收尾，用最直接的方式——磐石領域的核心能力，全域強壓。他凝聚了整個領域的大地靈能，往最終的一擊聚集，這一擊出去之後，擂台上任何角落都會被大地元素覆蓋，沒有任何閃躲空間。</p>\n<p>他踏出那一步，右手高舉，靈能在拳面凝聚成灼灼的土黃色——</p>\n<p>白無極停下來了。</p>\n<p>不再躲了。</p>\n<p>就站在那裡。</p>\n<p>赫連烈的動作頓了一下，那種「等著被打」的站姿讓他的直覺再次響起警報——但他找不到問題在哪裡，周圍的環境全在他的掌控之下，白無極的面前什麼都沒有，他沒有靈契蓄力的跡象，沒有任何進攻的預備動作——</p>\n<p>他只是，靜靜地站著，低著頭，像在想什麼事。</p>\n<p>然後，他慢慢抬起頭，直視赫連烈。</p>\n<p>那個眼神，沒有緊張，沒有掙扎，就是很安靜，很平靜，帶著一種說不清楚的東西——</p>\n<p>赫連烈後來回想這個場面的時候，唯一能形容那個眼神的詞，是：</p>\n<p>「從容。」</p>\n<p>白無極輕輕說了一句話，聲音不大，在磐石領域的沉重壓迫感裡，聽起來像是最不相稱的平靜：</p>\n<p>「Star Platinum: The World。」</p>\n<p>這一刻，時間停止了。</p>\n<p>---</p>\n<p>靜止。</p>\n<p>整個世界，在赫連烈踏出那一步的瞬間，凝固了。</p>\n<p>他的腳懸在半空，沒有落地。他高舉的右手，停在最高點，土黃色的靈能在拳面像一幅靜態畫。觀眾席上，兩萬個人的表情、動作、呼吸，全部凍在了那一刻。</p>\n<p>空氣裡的灰塵，停在半空。</p>\n<p>只有白無極，和他靈識裡的白金之星，在這個靜止的世界裡，自由地動著。</p>\n<p>白金之星在他身邊完整展開，星空色的鎧甲在凝固的世界裡沉默地燃著光，那雙眼睛，在靜止的時間裡顯得格外清醒。</p>\n<p>白無極往前走。</p>\n<p>不快，也不慢，就是很平靜地走。</p>\n<p>在靜止的世界裡，赫連烈是一座凝固的雕像，高舉著拳，踏著那個沒有落地的步子，定格在那個「準備終結戰鬥」的姿勢裡。</p>\n<p>白無極走到他面前，停下，站在赫連烈的正前方，兩個人相距不到半米。</p>\n<p>他低頭看了看赫連烈凝固的表情——那個眉頭緊皺、眼神凌厲的表情，在靜止的狀態裡帶著一種奇異的認真感，讓白無極有點沒辦法評論。</p>\n<p>他把視線移到赫連烈的腳下。</p>\n<p>磐石領域的核心，是領域使用者最穩固的站位點——大地元素靈契使用者在啟動領域時，靈能最密集的地方是使用者雙腳接觸地面的核心節點，那個節點是整個領域能量的根，也是最脆弱的地方：只要這個核心被摧毀，整個磐石領域的能量結構就會從根部瓦解，就像把一棵樹的根砍斷，整棵樹都會倒。</p>\n<p>白無極在靜止的世界裡，慢慢蹲下，看了看赫連烈雙腳附近的地面，那裡有一種肉眼不可見但在替身感知裡相當清晰的能量流：大地靈能從地脈匯入赫連烈的雙腳，然後向上傳遞，再向四周輻射，成為磐石領域的循環系統。</p>\n<p>循環的入口節點，在右腳腳跟後方，大概二十公分的地面裡，有一個靈能密度最高的能量核。</p>\n<p>白無極站起來，轉過身，面對那個位置，白金之星的右拳蓄力——</p>\n<p>這是一秒鐘裡最重要的那一擊。</p>\n<p>不是最有力的，是最精準的。</p>\n<p>白金之星的拳頭往那個地面節點轟下去，那種精準度，超越了任何靠感知和訓練能達到的水準，是一種純粹的「我看到了，我打它」的直接——</p>\n<p>轟。</p>\n<p>靜止的地面，在白金之星的拳頭接觸的瞬間，那個靈能核被精確地擊碎了。</p>\n<p>能量結構從根部開始崩解，連鎖反應在整個磐石領域的循環系統裡蔓延。</p>\n<p>一秒鐘，到了。</p>\n<p>---</p>\n<p>時間重啟。</p>\n<p>赫連烈的腳落地。</p>\n<p>但就在他的腳踩到地面的那個瞬間，他眼前——</p>\n<p>閃光。</p>\n<p>不是普通的閃光，是一種讓他完全無法反應的視覺衝擊，像是某種力量直接繞過了他的所有感知預警，在他完全沒有準備的狀態下，「出現」在他面前——</p>\n<p>同時，他腳下的磐石領域，從核心開始碎裂。</p>\n<p>那種感覺，像是他精心搭建的城堡，被某個他完全沒有感知到的東西，從地基處抽走了承重柱。</p>\n<p>磐石領域的能量結構從內部瓦解，土黃色的靈能從他的腳底往上反衝，那種反噬的力量讓他的氣息驟然一亂——</p>\n<p>整個磐石領域，垮了。</p>\n<p>不是被外力打碎，是從內部崩潰。</p>\n<p>赫連烈的視線在那一刻，終於看清楚了面前的白無極——</p>\n<p>他站在離他半米的地方，就在他的正前方，白金之星的右拳還帶著餘震，帶著剛剛全力一擊之後的沉甸甸的重量感。</p>\n<p>然後，赫連烈意識到，他的腳在位移。</p>\n<p>不是他主動的，是領域崩潰的衝擊把他整個人往後送了出去，他的雙腳在地面拖出兩道深痕，一步、兩步、三步——</p>\n<p>他試圖用大地元素穩住身形，但靈能剛剛被反噬，這一刻的輸出極不穩定，勉強穩住，但重心已經越過了擂台邊線。</p>\n<p>最後一步，他的後腳跟踏出了邊線。</p>\n<p>裁判台上，整個天契城最資深的判定師，盯著那個落點，看了整整三秒鐘，然後開口：</p>\n<p>「白無極——勝。」</p>\n<p>---</p>\n<p>東場，兩萬人。</p>\n<p>半分鐘沒有任何聲音。</p>\n<p>是真的沒有任何聲音。</p>\n<p>像是兩萬個人同時忘記了怎麼說話，忘記了怎麼呼吸，整個東場的空氣凝固在那個裁判宣布結果的瞬間，就像——</p>\n<p>像是時間再度停止了一次，但這次停住的，是所有人。</p>"}, {"title": "第60章_天契城沸騰", "content": "<p>第60章　天契城沸騰</p>\n<p>那半分鐘的靜默，比任何喧囂都要震撼。</p>\n<p>兩萬個人，坐在各自的位置上，無聲地看著擂台。</p>\n<p>赫連烈站在擂台邊線外，他的後腳跟明確踏出了那條線，磐石領域的殘跡在他周圍緩緩消散，像大霧在陽光裡蒸發，只是這個過程裡沒有陽光，只有沉默。</p>\n<p>他站在那裡，沒有倒下，沒有大叫，沒有任何誇張的反應，只是靜靜地站著，看著擂台中央那個正在讓白金之星收回的男人——</p>\n<p>白無極低著頭，右手輕輕垂下，他的指節還有一點點餘震，那是白金之星全力擊碎領域核心之後留下的細微顫動。他站在擂台中央，周圍是赫連烈磐石法術留下的滿地裂縫和碎石，亂得像被龍捲風掃過，但他站的那個位置，乾淨，沒有任何痕跡。</p>\n<p>他慢慢抬起頭。</p>\n<p>擂台裁判走上前，看了看邊線，看了看赫連烈的位置，往裁判台的方向點了一下頭。</p>\n<p>判定師再開口，聲音平穩，但在這段靜默之後，那幾個字像一塊石頭落進了靜水裡：</p>\n<p>「四強，第一場，白無極，勝。」</p>\n<p>然後，東場炸了。</p>\n<p>---</p>\n<p>不是一種整齊的聲音，是幾十種聲音同時爆發，交織在一起，變成一種讓人分不清方向的巨大聲浪。</p>\n<p>「什麼能力？！」</p>\n<p>「他怎麼瞬移的？！我剛才——他還在那邊，下一秒他就在赫連烈面前——」</p>\n<p>「不是瞬移，是……」</p>\n<p>「不是瞬移是什麼！我看得很清楚，他沒有動！他站在那邊沒有動，然後赫連烈領域就崩了！」</p>\n<p>「我沒看到他移動，但他在赫連烈面前——他的拳是從哪裡打的？！」</p>\n<p>「根本看不見！完全看不見！」</p>\n<p>議論聲、驚呼聲、爭論聲混成一團，兩萬個人同時在說話，每一個人說的都不太一樣，但每一個人說的核心都是同一件事：</p>\n<p>他們不知道發生了什麼。</p>\n<p>他們眼睜睜地看著這場戰鬥，看了整整七分鐘的壓制，然後看著白無極停下來，然後——</p>\n<p>就這樣。</p>\n<p>磐石領域崩了，赫連烈出界了。</p>\n<p>中間的過程，任何人都沒有看清楚。</p>\n<p>---</p>\n<p>貴賓包廂裡，沉默維持了比普通觀眾席長一點的時間。</p>\n<p>赫連家的主席位上，一個中年男人緩緩站起來，他的臉上看不出憤怒，也看不出震驚，更像是一種費勁壓住情緒之後的靜默。他身後，幾個赫連家的高層也跟著站了起來，沒有說話，但每個人的臉色都說了很多。</p>\n<p>司徒家的席位上，一個老婦人靜靜地往下看著擂台，手指輕輕敲了一下桌面，轉向身旁的人，低聲說了一個字：「查。」</p>\n<p>她旁邊的人立刻起身，悄悄退了出去。</p>\n<p>夜凌家的包廂，最安靜，一個鬚髮皆白的老者，在裁判宣布結果的時候，把手裡的茶杯放下，那個聲音在他們包廂裡很清晰，但在外面的嘈雜裡完全聽不到。他看了一眼擂台上的白無極，沒有說話，重新拿起茶杯，繼續喝茶，但他的眼睛裡有某種東西亮了一下，又熄了。</p>\n<p>還有一個獨立包廂，沒有任何家族標誌，坐著一個穿著普通的老人，看起來就是個普通的商旅觀客，但他的身旁沒有任何隨從，他看完整場比賽，在裁判宣布結果的時候，慢慢站了起來，往窗邊走，低頭看著擂台上那個正在拍手掌灰的年輕人，半晌沒有說話。</p>\n<p>然後他轉身，走出了包廂，沒有人注意到他什麼時候來，什麼時候走。</p>\n<p>---</p>\n<p>選手等待區，相對於觀眾席的嘈雜，這裡的聲音要低一些，但氣氛一點也不平靜。</p>\n<p>司徒雲棠站在原地，把剛才的場面在腦海裡從頭過了一遍，那雙眼裡有思考的光，她的靈感系靈契在剛才的最後一刻感應到了一些異常——一種讓她說不清楚的、不屬於靈契的能量在某個瞬間突然出現，然後消失，消失的速度快到她都不確定自己是不是感應錯了。</p>\n<p>夜凌淵沒有說話，往擂台方向看了一眼，收回視線，垂著眼，不知道在想什麼。</p>\n<p>等待區裡，散修名額的幾個晉級選手大多是一臉「看傻了」的表情，沒什麼人說話，都在消化剛才那場。</p>\n<p>蘇念卿站在等待區的角落。</p>\n<p>她一直站在那裡，從戰鬥開始就沒有動過。</p>\n<p>當裁判宣布結果的那一刻，她的眼皮輕輕跳了一下——不是因為驚訝，是因為確認。她已經感覺到那個結果了，在赫連烈出界的前一刻，她就知道了，那種前一刻的「知道」不是預測，是感知——</p>\n<p>她感知到了什麼，她說不清楚，但她知道。</p>\n<p>霜翎在她腳邊，往上抬頭看了她一眼，那雙銀色的眼睛裡是一種靈狐特有的、比人類更細膩的感知，牠看到了蘇念卿的臉，然後把頭轉回去，尾巴輕輕掃了一下地面，沒有做任何評論。</p>\n<p>蘇念卿往擂台上看。</p>\n<p>白無極站在擂台中央，周圍是滿地的碎石和裂縫，觀眾席的嘈雜聲在他四周炸開，像是把整個天契城都捲進來了。但他站在那個嘈雜的中心，姿勢很普通，沒有勝利的張揚，沒有收割的霸氣，就是一個很普通的站姿，垂著手，略微低著頭，像是在思考接下來要去哪裡吃飯。</p>\n<p>然後他往觀眾席掃了一眼，最後輕輕拍了兩下手——不是鼓勵自己，更像是一個「好，完成了，現在走吧」的收尾動作。</p>\n<p>蘇念卿看著那兩下拍手的動作，看著那個普通的、沒有任何多餘成分的收尾，看著他轉身往選手通道的方向走——</p>\n<p>她低下頭。</p>\n<p>她的嘴角，很輕，很慢，動了一下。</p>\n<p>不是明顯的笑，不是讓人一眼能看到的那種，只是嘴角的那個弧度，悄悄往上走了一點點，然後很快地，又落回了原來的位置。</p>\n<p>霜翎的耳朵抖了一下。</p>\n<p>牠沒有轉頭，只是把尾巴往蘇念卿的腳邊靠了靠，輕輕蹭了一下，沒有聲音，就這樣。</p>\n<p>蘇念卿沒有理它，但她沒有讓霜翎移開。</p>\n<p>---</p>\n<p>白無極從選手通道走出來，進了等待區，第一眼就看到了蘇念卿。</p>\n<p>她還是那個姿勢，站在角落，面色平靜，臉上什麼都沒有，就是蘇念卿平時的那種面癱臉，就算整個天契城正在為剛才那場比賽沸騰，她臉上的表情也顯示出「我很正常，我沒有任何情緒波動，你不要多想」。</p>\n<p>白無極走過去，在她旁邊站定，往觀眾席的方向看了一眼，那邊還在吵，好像能吵很長時間。</p>\n<p>他說：「這城市挺熱鬧的。」</p>\n<p>蘇念卿：「嗯。」</p>\n<p>「是因為我剛才那場？」</p>\n<p>「部分是。」</p>\n<p>「另一部分是什麼？」</p>\n<p>「四大家族加在一起，在大比上輸掉的面子。」蘇念卿說，語氣很平，「赫連烈是赫連家這一代最重要的人，他輸給一個四個無的散修——這件事帶來的後續，不只是一場比賽的結果。」</p>\n<p>白無極想了想：「麻煩？」</p>\n<p>「會有人想查你的底細，」蘇念卿說，「查不到的話，可能會有人想讓你消失。」</p>\n<p>「那就讓他們查，反正查不到，」白無極說，「消失的話，麻煩他們先把體力提升到契聖以上，否則消失的可能是他們。」</p>\n<p>蘇念卿看了他一眼，沒有說話。</p>\n<p>霜翎在她腳邊輕輕鳴了一聲，那個音調翻譯出來大概是：「他說話還挺直接的。」</p>\n<p>「你接下來，」白無極轉向蘇念卿，「決賽對手可能是誰？」</p>\n<p>「司徒雲棠，或者夜凌淵，視另一場結果而定。」</p>\n<p>「能贏嗎？」</p>\n<p>蘇念卿側頭，靜默地看了他整整三秒鐘，那種眼神翻譯出來是：「你這個問題問得很沒水準。」</p>\n<p>白無極對上她的視線，然後笑了一下，說：「好，能贏，我知道了。」</p>\n<p>蘇念卿收回視線，重新往前看，沒有回答，但也沒有否認。</p>\n<p>等待區外面，天契城的議論聲還在繼續，像一場沒有停歇的浪，從東場蔓延到城中每一條街道，每一個茶館，每一個酒肆。「白無極」這個名字，從一個人們嘴裡說著「那個傻子」的代稱，在這個下午，變成了某種不同的東西——</p>\n<p>沒有人說得清楚那是什麼。</p>\n<p>但所有人都記住了這個名字。</p>\n<p>還有那一場，沒有人看清楚的，靜止的，一秒鐘。</p>\n<p>---</p>\n<p>【卷二　完】</p>"}, {"title": "第61章_天契大比冠軍", "content": "<p>第61章　天契大比冠軍</p>\n<p>天契大比的決賽日，天契城的廣場從清晨就開始人聲鼎沸。</p>\n<p>這是四大家族數十年難得一見的盛事，每一屆天契大比都會誕生一個讓天衍大陸記住的名字。而今年，所有人都清楚，這一屆不需要決賽就已經誕生了兩個讓人無法忽視的存在。</p>\n<p>擂台上早已鋪好了決賽的陣法結界，陣紋從台面一路延伸至四周的看台，每一條紋路都在微微發光，那是防護用的靈陣，防的是強者出手時的餘波把看客牽連進去。</p>\n<p>今年的陣法比往年更厚實了一倍。</p>\n<p>負責結界的陣師們一邊做最後的測試，一邊低聲交流，神色間有些心有餘悸——四強的那場比賽，赫連烈一個契王，就這樣倒下了，倒得悄無聲息，倒得讓所有人都沒看清楚過程。</p>\n<p>那個少年到底用了什麼手段。</p>\n<p>看台的各家高層席位上，四大家族的代表端坐如常，但空氣的質感不一樣了。蘇家席位上，蘇長淵負手而立，神情平靜，眼睛卻一直在擂台下方的選手通道口附近打轉。赫連家的席位冷冷清清，赫連烈送醫之後，主事的赫連陌沉著一張臉，說話比平日少了一半。</p>\n<p>慕容家的家主慕容玄坐在最角落的高台上，隔著半個廣場的距離，他的眼睛卻像是貼著擂台一樣。</p>\n<p>此刻的他沉默著，手指輕輕敲著椅背扶手，節奏緩慢而規律，像是一個在思考什麼的老人。他身邊的慕容家高手屏氣凝神，沒人敢開口說話。</p>\n<p>他們家主已經三十年沒有這個表情了。</p>\n<p>---</p>\n<p>選手通道裡，白無極靠著牆，兩眼半瞇，正在估算自己還能睡幾分鐘。</p>\n<p>他昨晚睡得不錯，打了幾套八極拳練練手，把地板踢出了幾道裂縫，客棧老闆早上找他理論，他給了點靈石作為補償——還好他這幾場比賽都有獎金，否則要吃虧。</p>\n<p>對面的通道口，蘇念卿站在那裡，銀色的靈契紋路沿著她的手臂延伸，霜翎在她身後輕輕旋繞，尾毛散開如霜雪。她的面孔一如既往的平靜，連看向白無極的眼神也是平靜的，但平靜裡有某種東西在翻動。</p>\n<p>她看著這個人靠著牆，一副隨時會睡著的模樣，心裡不知道是什麼滋味。</p>\n<p>這個人，四強戰的那一秒她記得清清楚楚。赫連烈倒下，廣場靜得像落進了深水，她站在自己的通道口，遠遠看著擂台上的那道身影，心臟跳了一個不符合平時節律的拍子。</p>\n<p>她不動聲色，但她記住了那個拍子。</p>\n<p>裁判走過來，對兩個人點頭示意，神情鄭重得像是在主持一場葬禮：「決賽即將開始，兩位請上台。」</p>\n<p>白無極睜開眼睛，伸了個懶腰，走向擂台。</p>\n<p>他走路的姿勢不快，但步幅穩，每一步都落得很實，像是腳下生了根一樣。蘇念卿看著他先走上台階，微微頓了一下，跟了上去。</p>\n<p>---</p>\n<p>擂台上，兩個人面對面站定。</p>\n<p>看台沸騰了一瞬，然後靜下來。這種靜是一種很奇特的靜，幾萬人同時屏住呼吸，連風吹過旗幟的聲音都顯得格外清晰。</p>\n<p>白無極打量了一下擂台四周的結界，又看了看裁判，最後把目光落回蘇念卿身上。</p>\n<p>蘇念卿就在兩丈外，站得筆直，霜翎垂在她身側，銀色的狐尾輕輕擺了一下，眼睛裡有什麼東西在問他。</p>\n<p>她開口，聲音不大，但在這種靜中聽得很清楚：「讓我看看你到底有多少底牌。」</p>\n<p>不是質問，也不是挑釁。是一種很直接的，帶著某種期待意味的請求。</p>\n<p>白無極看著她，嘴角動了一下：「你確定？」</p>\n<p>蘇念卿：「……確定。」</p>\n<p>她以為他要說什麼，或者做什麼。她做好了準備，霜翎微微收縮，靈契全數凝聚待命，她全身的感官都調動起來，打算在他下一刻出手之前捕捉到一絲先機——</p>\n<p>白無極轉頭看向裁判：「我棄權。」</p>\n<p>現場先是沉默了整整兩秒。</p>\n<p>然後，炸了。</p>\n<p>「什麼？！」</p>\n<p>「他說什麼？棄權？！」</p>\n<p>「決賽！他在決賽棄權！這算怎麼回事！」</p>\n<p>喧嚷聲從四面八方湧來，像一道石子投進平靜水面激起的漣漪，但這漣漪是從小變大、越來越洶湧的那種。看台上有人站起來，有人交頭接耳，有人目瞪口呆——連裁判都愣在那裡，手邊的靈器都忘了收回去，茫然地看著白無極確認了一遍：「你說……棄權？」</p>\n<p>「對。」白無極很平靜，「我棄權，她贏。這有什麼問題嗎？」</p>\n<p>裁判下意識地搖搖頭，又點頭，然後對著天空猛吸一口氣，扯開嗓子：「選手白無極宣布棄權！本屆天契大比冠軍——蘇念卿！」</p>\n<p>話音剛落，白無極已經轉身走向台階了。</p>\n<p>他走得不快，步伐跟上台時一樣穩，像是這件事在他看來跟買燒餅沒什麼區別。台下的騷動他都聽得見，議論聲、質疑聲、甚至還有幾個人在喊讓他給個理由，他都沒有停下來的意思。</p>\n<p>他走到台階邊上，停了一下，沒回頭，聲音不大，剛好夠蘇念卿聽見：</p>\n<p>「贏自己人幹嘛。」</p>\n<p>然後他走下擂台，消失在人群裡。</p>\n<p>---</p>\n<p>蘇念卿站在擂台中央，一動不動。</p>\n<p>四周的聲音遠了，又近了，她聽見裁判在重複宣告，聽見看台的嘩然還沒有平息，聽見霜翎在她身後輕輕叫了一聲，像是疑惑，又像是在確認她的狀態。</p>\n<p>她沒有動。</p>\n<p>「自己人。」</p>\n<p>他說的「自己人」。</p>\n<p>她的右手指節微微收了一下，旋即鬆開，面孔維持著一貫的平靜，但那個鬆開的動作快了一點，快得像是在收藏什麼。</p>\n<p>頒獎在半個時辰後進行。</p>\n<p>蘇長淵親自下台，站在台上接受各方的道賀，但他的眼神不時掃向廣場邊緣，在那裡，白無極正在跟一個賣涼茶的老攤主侃大山，笑得很自然，完全不像一個剛在決賽棄權的人。</p>\n<p>蘇念卿站在頒獎台上，接過代表冠軍的靈器錦匣，神情端正，對著主辦方的人頷首致謝——她做每一個動作都做得妥帖，讓人挑不出毛病。</p>\n<p>但她把錦匣接過來的那一瞬，視線移開了儀式的方向，往廣場邊緣飄了一下。</p>\n<p>白無極還在跟那個老攤主說話，比了個大拇指，好像在稱讚對方的涼茶。</p>\n<p>蘇念卿收回視線，目光落回正前方。</p>\n<p>她的眼神很複雜，複雜到連她自己都沒辦法完全讀懂那裡面裝的是什麼。</p>\n<p>---</p>\n<p>四大家族高層的席位上，氣氛比台下的平民看台要壓抑得多。</p>\n<p>赫連陌端著茶杯，杯壁上的紋路已經被他的指甲掐出了細小的裂痕，他望著擂台上的頒獎典禮，一言不發，但眼底深處有什麼東西在翻湧。</p>\n<p>陳家的代表是個中年男人，面孔清瘦，姓陳名繼，是陳家這一代的二長老，平時以穩重著稱，此刻卻把茶杯放回去的動作重了一點：「這個白無極……」他沒說完，意思卻很明白。</p>\n<p>蘇長淵的眼神沒有放在陳繼身上，只是不緊不慢地說：「大比規則，選手有棄權的權利。」</p>\n<p>「問題不是棄權。」陳繼說，「問題是他為什麼能走進決賽。赫連烈那一場，沒人看清楚他用了什麼手段。」</p>\n<p>「所以？」蘇長淵轉過臉，語氣依然平靜，但眼中帶著某種他平日並不輕易展示的鋒芒，「大比是切磋，不是審判。」</p>\n<p>陳繼嘴唇動了一下，把後半句話咽了回去。</p>\n<p>角落最高處，慕容玄起身了。他站起來的動作沒有特別大，但他周圍的人同時後退了半步，那是一種本能的、身體先於思維作出的反應。</p>\n<p>慕容玄沒看任何人，視線越過半個廣場，落在那個正在廣場邊緣喝涼茶的年輕人身上。</p>\n<p>他的表情很難讀懂，像是某種確認，又像是某種遙遠的、從記憶深處翻出來的認知。</p>\n<p>他轉身離去，沒有說任何話。</p>\n<p>他身邊的慕容家高手面面相觑，沒人知道家主此刻的腦子裡裝著什麼，但每個人都感覺到了——某件事，已經悄悄啟動了。</p>\n<p>---</p>\n<p>廣場邊緣，白無極把最後一口涼茶喝完，把碗還給老攤主，摸了摸口袋裡的靈石付了帳，慢慢往人群裡走。</p>\n<p>白金之星飄在他身後，比手畫腳地比劃了什麼，那個動作在別人眼裡是虛空，在白無極眼裡卻很清楚——替身在模仿他剛才對老攤主說話時的手勢，有那麼一點調侃的意味。</p>\n<p>「行了，知道你覺得我在浪費時間。」白無極低聲說，「但涼茶是真的不錯，老闆說加了什麼草根，去火的。你又不喝東西，哪裡懂。」</p>\n<p>白金之星：「………。」</p>\n<p>「反正贏了也沒意思。」白無極把手插進口袋裡，穿過熙熙攘攘的人群，「今天吃什麼，要不要去找之前那家烤肉。」</p>\n<p>人群裡的人還在議論今天的決賽，議論那個棄權的年輕人，議論蘇念卿的奪冠，議論四大家族的格局……</p>\n<p>白無極穿過這些聲音，腳步悠哉，神情放鬆，像一塊投進水裡的石頭，激起了波紋，然後沉下去，在水底看著波紋自己散開。</p>"}, {"title": "第62章_四大家族會議", "content": "<p>第62章　四大家族會議</p>\n<p>天契大比的最後一天結束之後，天契城的大多數訪客已經開始陸陸續續收拾行囊，準備離城。</p>\n<p>但四大家族的高層沒有走。</p>\n<p>他們在天契城最高的那座塔樓裡坐下來，這座塔樓沒有招牌，沒有守衛，但整個天契城沒有一個人不知道那是什麼地方——那是天契大比的主辦方備用的「論事閣」，只有在最重要的事情需要談的時候才會開放。</p>\n<p>上一次開放，是二十二年前，天衍大陸的靈脈出現了異動。</p>\n<p>今天開放，議題是一個人。</p>\n<p>---</p>\n<p>論事閣的圓桌不大，但圍坐的都是天衍大陸上真正的頂層。</p>\n<p>蘇長淵代表蘇家，他習慣把茶杯放在右手邊，兩手空著，讓人看不透他在想什麼，但那雙眼睛始終是清醒的。陳繼代表陳家，他是陳家的二長老，整個陳家作風一向強硬，從他今天的表情就看得出來，他帶著很明確的立場來的。赫連家的赫連陌沉著臉，他的家族剛剛在大比上吃了一個大虧，說「觀望」不過是還沒想好怎麼動。</p>\n<p>慕容玄坐在他慣常的角落，背後是一扇沒有開著的窗，光從另一側的縫隙斜進來，把他整個人的側影切割成光與暗的兩半。</p>\n<p>論事閣的執事倒了茶，悄無聲息地退出去，把門帶上。</p>\n<p>陳繼等門聲落定，率先開口：「今天把各位請來，議的是什麼事，我想不必我多說。白無極，這個人從何處來，背後站著什麼人，有沒有人知道？」</p>\n<p>沒有人回答。</p>\n<p>陳繼繼續說：「赫連烈是契王，在大比上，在人證物證俱全的擂台上，被一個來歷不明的少年一招非倒地即昏迷的狀態送出擂台，到現在為止沒有一個人看清楚那一招是怎麼打出來的。這件事讓我很不安。」</p>\n<p>赫連陌把茶杯放下，磁碗碰桌的聲音比平時重了一分：「陳二長老，這裡是四家會議，不是陳家的審問場。」</p>\n<p>「我沒有審問的意思。」陳繼的語氣沒有鬆動，「我只是在陳述一個事實。這個人，我們沒有一個人了解他，但他已經在大比上展示了足夠讓契王喪失行動能力的手段。這種人，如果不在掌握之中，對任何家族都是威脅。」</p>\n<p>「所以陳家的意思是？」蘇長淵這才開口，語氣很平。</p>\n<p>「必須除掉。」</p>\n<p>這三個字在圓桌上方沉了一沉，像是一塊鐵落進水盆，激起的漣漪平靜但實在。</p>\n<p>蘇長淵臉上的表情沒有大的變化，但眼中有什麼東西銳利了一下：「陳二長老說話很直接。」</p>\n<p>「現在不是拐彎抹角的時候。」陳繼看向他，「蘇家與此人明顯有所往來，我聽說他此番入城，住的是蘇家的別院？」</p>\n<p>「那是他參賽前的事，是我女兒的個人安排，蘇家礙於面子沒有干涉，這並不代表蘇家的立場。」蘇長淵端起茶杯，喝了一口，「但蘇家的立場我可以明說——白無極在大比上的表現，我認為此人可以重用，而不是除掉。」</p>\n<p>「重用？」陳繼的語氣裡有一絲諷意，「你要重用一個連來歷都說不清楚的人？」</p>\n<p>「來歷說不清楚的人，天衍大陸上少嗎？」蘇長淵放下茶杯，「我說的重用，不是要把他攬進蘇家，是讓他繼續活著。天下英才，能走到今日這個位置的，除掉一個，損失的不只是他一個人的命，是可能改變局面的一種力量。陳家如果有心思，不如放在怎樣把這種力量引為己用，而不是第一念頭就想著殺。」</p>\n<p>陳繼沉默了片刻。</p>\n<p>赫連陌重新端起茶杯，慢慢說：「赫連家的意思，先觀望。赫連烈的事，我們自己會查。在查清楚之前，輕舉妄動不是赫連家的作風。」</p>\n<p>三家的態度都擺出來了，但圓桌上最安靜的那個人一直沒有開口。</p>\n<p>所有人的視線都往角落飄了飄。</p>\n<p>慕容玄放在桌沿的手指動了一下，就這麼一個細微的動作，整個論事閣的空氣似乎都微微一凝，那是一種無形的壓力，不是靈契的壓力，是從那個人本身輻射出來的東西，一種來自積累了太多年的威嚴所自然散發的沉壓感。</p>\n<p>他沉默了很長的一段時間，長到其他三個人都開始考慮要不要主動問他，他才開口。</p>\n<p>「我見過一次那種力量。」</p>\n<p>聲音平靜，像是在說一件很普通的事，但說出口的內容讓圓桌上的另外三個人同時停頓了一下。</p>\n<p>陳繼：「什麼意思？見過……在哪裡見過？」</p>\n<p>慕容玄：「古籍上。」</p>\n<p>寂靜。</p>\n<p>這兩個字落下，比剛才更深沉的沉默蔓延開來，但這一次沉默裡帶著的不是壓力，而是一種說不清楚的迷惑，三個人面面相觑，一時之間沒有人知道應該怎麼接話。</p>\n<p>古籍上……</p>\n<p>「慕容家主，」陳繼選擇了最直接的辦法，「你能說清楚一點嗎？」</p>\n<p>慕容玄把目光從自己面前的茶杯上移開，環視了一下圓桌上的三個人，他的眼神很平靜，卻讓人看不透其中的底：「不能。」</p>\n<p>停頓。</p>\n<p>「不是不願說，是說了你們也看不懂。」他站起來，「今日的事我記下了。白無極的事，慕容家自己來處理，各家不必插手。」</p>\n<p>他說完，也沒等其他人回應，轉身走向論事閣的門，推開，走出去，留下一個背影。</p>\n<p>論事閣裡，剩下三個家族的代表沉默著，沒有人說話，但每個人心裡都有不同的想法在盤旋。</p>\n<p>陳繼看著那扇被推開又自動閉合的門，眉心擰了一下，壓低聲音對赫連陌說：「慕容玄說的……古籍，你有什麼想法？」</p>\n<p>赫連陌搖頭：「我聽不懂。」</p>\n<p>蘇長淵把茶杯裡最後一口茶喝完，起身，淡淡說了一句：「所以這個會議，什麼結論都沒有。」</p>\n<p>他拿起自己的外袍，走向門口，步伐不快不慢，但背影帶著一種讓人無法追問的意味。</p>\n<p>走到門口，他停了一下，沒有回頭，說了最後一句話：「陳繼，蘇家的立場我已經說過了，希望陳家在做任何決定之前，三思。」</p>\n<p>然後他也出去了。</p>\n<p>論事閣裡就剩赫連陌一個人，他坐在圓桌邊，看著滿桌的茶杯，長長地嘆了一口氣。</p>\n<p>---</p>\n<p>與此同時，天契城的東市街頭，白無極正捧著一個油紙包走在人群裡。</p>\n<p>油紙包裡是剛出爐的燒餅，芝麻香料混在一起，一打開就香得讓人走不動，他已經咬了兩口，覺得今天的火候比昨天好，麵皮酥脆的程度剛好在最合適的臨界點上。</p>\n<p>黃金體驗在他旁邊飄著，金色的光芒在街頭的日光下幾乎隱形，白無極側頭看了它一眼，注意到它目光似乎落在了一個從街角走過的少女身上，少女手裡提著一個藥包，步伐匆匆。</p>\n<p>「別看，人家自己的事。」白無極把燒餅往嘴裡塞，嚼了兩下，「你那個觸角現在範圍多大了？」</p>\n<p>黃金體驗比劃了一個大概的形狀，白無極估算了一下，點點頭：「還行，這兩天繼續保持，別讓感知斷。」</p>\n<p>他轉過一個街角，往客棧的方向走。</p>\n<p>街上的人還在議論今天的大比，他走過兩個攤子，都聽見有人說那個棄權的少年的名字，說法各式各樣，有說他是傻子，有說他是故意的，有說他是在向蘇家示好，還有人說他根本就是蘇家的人。</p>\n<p>白無極嚼著燒餅，一句都沒有停下來聽完，走過去就算了。</p>\n<p>不遠的天際，論事閣頂樓的那扇窗透出一線光，在日落的金紅色裡幾乎看不見。</p>\n<p>白無極沒有抬頭看那個方向，也不知道那裡剛剛坐過四個人，那四個人圍著一張桌子，把他的名字翻來覆去地討論了整整一個時辰。</p>\n<p>他只知道燒餅不夠吃，打算回頭再去買一個。</p>\n<p>今天的收穫不錯，吃頓好的是應該的。</p>"}, {"title": "第63章_蘇家的保護", "content": "<p>第63章　蘇家的保護</p>\n<p>天契大比結束後的第二天，白無極收到了一張請帖。</p>\n<p>請帖的材質不算名貴，素白的紙面，上面只有幾個字，筆跡工整：「蘇長淵邀，蘇家別院，午後。」</p>\n<p>落款沒有任何頭銜，只有一個名字。</p>\n<p>白無極把請帖翻過來看了看背面，什麼都沒有，又翻回正面看了一遍，然後拿去給黃金體驗聞了聞——替身搖搖頭，沒有異樣的靈契殘留氣息。</p>\n<p>「行，去看看。」白無極把請帖放進口袋，繼續啃他的早餐。</p>\n<p>白金之星對他比劃了什麼，他側頭看了一眼，那個手勢的意思大概是：你不緊張嗎？</p>\n<p>「緊張幹嘛，他找我，又不是我找他。」白無極喝了一口茶，「蘇家家主能把我怎樣，又不是在自家地盤上。」</p>\n<p>白金之星：「……」</p>\n<p>那個表情的意思翻譯出來大概是：你就是這樣才讓人擔心。</p>\n<p>---</p>\n<p>蘇家在天契城的別院在城北，門匾低調，院子裡種了幾棵老樹，樹冠攤開，把整個院子的光線遮得有些幽暗，但這種幽暗不是壓抑，是一種沉靜的清涼感，讓人進了門就不自覺地把腳步放輕。</p>\n<p>管事把白無極引進去，穿過兩道門，停在一個廳堂前，躬身道：「家主在等候，公子請進。」</p>\n<p>白無極道了個謝，推門進去。</p>\n<p>廳堂不大，但陳設很有條理，沒有堆砌的名貴擺件，只有幾件看得出年頭的器物，安安靜靜地放在那裡。窗邊的茶案上備著兩套茶具，茶是已經泡好的，熱氣還在，說明等候的時間不長，但水溫的把握很準確，是真的在等，不是在趕。</p>\n<p>蘇長淵坐在茶案邊，他今天穿的是一件深藍的常服，沒有什麼家主的排場，看起來就是一個坐在自己院子裡喝茶的普通長輩。他看見白無極進來，指了指對面的位子：「坐。」</p>\n<p>不是「請坐」，不是一堆客套話，就是「坐」，一個字，帶著一種奇怪的平等感。</p>\n<p>白無極在對面坐下，也沒有什麼特別的姿態，就是普通地坐著，等對方說話。</p>\n<p>蘇長淵倒了一杯茶推過去，自己也端起一杯，喝了一口，然後放下，直接說：「你在大比上保護過念卿，在天池渡關的時候，還有在進城的路上。我知道。」</p>\n<p>白無極心裡想了一下，沒有否認：「也沒什麼，正好在場。」</p>\n<p>「正好在場，也要有那個能力才能說這句話。」蘇長淵看著他，眼神平靜，「蘇家欠你一個承諾，這是蘇家的規矩，有恩必還。」</p>\n<p>白無極搖搖頭：「不用，是她先幫過我。我去天契城，當時盤纏被搶，是她讓我一起走的，算起來我欠她的情更多。」</p>\n<p>蘇長淵沉默了一下，這個沉默不是被問倒的那種，而是在認真考量對面這個人說的話是不是真的。</p>\n<p>他在江湖上走了半輩子，見過的人精多了，很多人說話漂亮，但動機藏在後面，一說到蘇家的承諾，臉就不自覺地帶出了一點什麼——貪婪也好，急切也好，算計也好，總是藏不住的。</p>\n<p>眼前這個少年沒有任何那樣的表情，他說「不用」，說「是她先幫過我」，臉上就是這個意思，沒有任何其他東西在後面扒著。</p>\n<p>蘇長淵放下茶杯，停頓了片刻，說：「那就當朋友。」</p>\n<p>白無極也停了一下，然後點頭：「行。」</p>\n<p>就這樣說完了，兩個人都沒有再往下延伸，一個說完，另一個答完，這件事就算落定了，簡單到讓旁觀者覺得不可思議——這是蘇家家主和一個天外來客談定關係的方式，三句話，一杯茶。</p>\n<p>蘇長淵重新端起茶杯，喝了一口，換了個話題：「你昨天棄權，是什麼想法？」</p>\n<p>「沒什麼特別的想法。」白無極也端起茶，「比賽嘛，打自己人沒意思。」</p>\n<p>「自己人？」</p>\n<p>白無極想了想：「大概的意思。就是站在同一邊的人，打起來沒意義。她奪冠對蘇家更有用，我奪冠對我……沒什麼特別用。」</p>\n<p>蘇長淵靜靜地看了他一眼，沒有再追問這個話題，但眉心的那條線鬆開了一些，那是一種心裡某個疑惑被放下的信號。</p>\n<p>他沉吟片刻，說：「你現在的處境，你清楚嗎？」</p>\n<p>白無極放下茶杯：「大概清楚一些，有人想除掉我，這很正常。」</p>\n<p>「這很正常？」</p>\n<p>「我一個來路不明的人，在大比上打到了四強，還讓赫連家的契王沒辦法動，這要是換了我我也想弄死這個人，很合理。」白無極說得輕描淡寫，「但這種事，著急也沒用，來一個應付一個。」</p>\n<p>蘇長淵看著他，沉默了幾秒，這一次沉默裡帶著一點點意料之外的東西，不是震驚，是一種像是遇見了什麼稀奇事物的安靜感慨。</p>\n<p>他在白無極這個年紀的時候，第一次遇見真正的殺局，那一晚他失眠到天亮，把棋盤上的每一顆棋子反覆推算，生怕漏掉一個可能的威脅。</p>\n<p>眼前這個人說「來一個應付一個」，說得跟說今天天氣不錯一樣。</p>\n<p>「蘇家在天契城有些安排，你住的地方，我讓人注意一下。」蘇長淵說，聲音平靜，像是在說一件很小的事，「不是監視，是保護，有什麼異動，人手會第一時間告知你。你要不要，你自己決定。」</p>\n<p>白無極考慮了一下：「那就謝謝了，但有一個要求——只要通知，不需要他們直接幫我動手，那樣我反而不習慣。」</p>\n<p>蘇長淵點頭：「可以。」</p>\n<p>又是這麼簡單，白無極點了頭，兩人又喝了半盞茶，話題轉到天衍大陸的風俗上去了，蘇長淵問了他幾個外鄉人才會問的問題，白無極一一作答，答得不算流暢但都過得去，偶爾露出幾個奇怪的問題讓蘇長淵側目，但沒有繼續深問。</p>\n<p>這一個下午就這樣說過去了，平靜，沒有任何殺機或算計的氣息，就只是兩個人喝茶說話。</p>\n<p>---</p>\n<p>廳堂的側門處，有人一直站著。</p>\n<p>蘇念卿靠在門框邊，霜翎盤在她腳下，安靜地趴著打盹。她的手裡拿著一卷典籍，但那卷典籍的翻頁動作在她父親說出「當朋友」之後就停住了，停了很長一段時間，一頁都沒有再翻過去。</p>\n<p>她側耳聽著廳堂裡的聲音，聽見父親說保護，聽見白無極說「不需要他們直接幫我動手」，嘴角不受控制地動了一下，往上翹了一點，但幅度微小到幾乎可以忽略不計——如果不是非常熟悉她的人，根本看不出來那是一個表情的變化。</p>\n<p>霜翎睜開一隻眼，抬頭看主人，尾巴輕輕甩了一下。</p>\n<p>蘇念卿垂下眼，繼續看那一頁停住的典籍。</p>\n<p>霜翎閉上眼，繼續趴著，尾巴不甩了，但扭了個方向，往主人的腳邊靠近了一點。</p>\n<p>廳堂裡，說話的聲音還在繼續，白無極正在問天契城有什麼特別的小吃，他說他今天吃了燒餅，覺得很不錯，但想換個口味。</p>\n<p>蘇長淵回答他說城西有一家賣糯米糕的老字號，做了五十年。</p>\n<p>白無極說那要去嚐嚐。</p>\n<p>蘇念卿聽著這個完全不知道應該怎麼形容的對話，側過臉，把嘴角那個細微的弧度對著沒有任何人的門框方向，安靜地保留了兩秒，然後收起來。</p>\n<p>她的耳朵，微微有些熱。</p>\n<p>她沒有去摸，但耳根的那一片粉，在側門的陰影裡，靜靜地存在著，沒有消散。</p>"}, {"title": "第64章_慕容家的殺手", "content": "<p>第64章　慕容家的殺手</p>\n<p>第三天的深夜，天契城的月色很好。</p>\n<p>白無極早已習慣在這個世界獨居的生活，客棧的房間他住了快十天，已經把被子的折角整理成自己習慣的樣子，睡前練幾套拳，讓身體的疲憊達到一個剛好可以入睡的臨界點，然後躺下去，五分鐘之內睡著，這是他多年養成的規律。</p>\n<p>但這一晚，他沒有睡著。</p>\n<p>不是睡不著，是黃金體驗提前告訴他，不要睡。</p>\n<p>---</p>\n<p>黃金體驗的感知網絡是它自發鋪開的東西，從白無極踏進天契城的第一天開始，它就把城裡所有能感應到的有機物——路邊的雜草、縫隙裡的苔蘚、不知道從哪裡鑽進來的小蟲子——都納入了它那個靜默的感知體系裡。</p>\n<p>不需要消耗太多靈力，只需要輕輕觸碰那些生命的邊緣，就夠了。</p>\n<p>那些微小的存在感知不到太多，但它們感知到的那一點點，已經足夠。</p>\n<p>深夜第三個更鼓剛敲過的時候，黃金體驗輕輕碰了一下白無極的手臂。</p>\n<p>白無極正在閉目養神，感受到那個觸碰，眼睛沒有睜開，但意識立刻清醒：「方向？」</p>\n<p>黃金體驗比了個手勢，北面，客棧後院的方向，越來越近。</p>\n<p>「幾個？」</p>\n<p>一個手指。</p>\n<p>白無極側臉，嘴角微微扯了一下：「一個人就來了。」他靜靜地估算了一下氣息的距離，沉默了片刻，「這個人的氣息……很奇怪。」</p>\n<p>黃金體驗表情嚴肅地點頭——不是一般的奇怪，是那種讓它都需要格外集中注意力才能維持感知的奇怪，像是在察覺一個幾乎不存在的存在。</p>\n<p>氣息接近於無。</p>\n<p>白無極在黑暗的房間裡靜靜地想了一下，那是什麼概念——一個氣息接近於零的人，靠近到這個距離，連黃金體驗的感知網絡都差點捕捉不到，如果不是因為這個人要穿過後院的草叢，踩在那些草葉上留下了一點點細微的震動，黃金體驗可能要到更近的距離才能察覺。</p>\n<p>這種程度的隱匿能力，在這個世界的戰力體系裡，至少是契王級別以上才能做到的事。</p>\n<p>也就是說，慕容家動真格的了。</p>\n<p>白無極坐起來，沒有點燈，讓房間繼續保持黑暗，把椅子拖到房間正中，坐下去，兩手搭在膝蓋上，讓自己的呼吸完全平穩下來，眼睛適應了黑暗之後，盯著房間的門口，等著。</p>\n<p>黃金體驗和白金之星都在他身邊，黃金體驗繼續追蹤那個靠近的氣息，白金之星站在他右後方，星空色的甲胄在黑暗裡靜靜地閃著極微弱的光澤，那是一種蓄而未發的狀態，像是一台已經啟動但還沒有扣下扳機的精密機器。</p>\n<p>---</p>\n<p>「影」到達天契城是當天下午的事。</p>\n<p>他沒有走正門，沒有走任何有人登記的通道，他從城牆的一條排水溝鑽進來，全程沒有一個守衛察覺到他的存在，連蘇家在城裡佈置的消息網也沒有感應到任何異動。</p>\n<p>這是他的本事，也是慕容家之所以養著他的原因。</p>\n<p>「影」的靈契叫做「虛體」，是一種極少見的特殊靈契，能將自身所有的氣息——靈契波動、呼吸聲、甚至心跳產生的微弱震動——全數壓縮到一個常人無法察覺的極低閾值。契王級別的強者用最靈敏的感知去察覺，也只能感覺到一點若有若無的東西，但往往來不及確認，已經晚了。</p>\n<p>他的暗殺成功率是慕容家歷任暗殺者裡最高的一個，從入行十三年來，從未失手。</p>\n<p>他跨過了後院的院牆，落地無聲，腳步順著客棧建築的陰影滑動，從一根柱子的背面穿過，從另一道窗前掠過。他做了詳細的偵查，知道這個房間的主人是白無極，知道白無極習慣把燈熄了之後靜坐片刻再入睡，知道他的房間在二樓，從後院的木牆攀上去，推開那扇沒有上閂的窗……</p>\n<p>他推開窗，側身滑進去。</p>\n<p>房間裡沒有點燈，黑暗，安靜，床上有人的輪廓，那是被子堆出來的形狀，但那個形狀太規整，太平——</p>\n<p>等等。</p>\n<p>影停下來。</p>\n<p>一個習慣了感知細節的暗殺者，會在某些瞬間發動一種本能的危機感知，不需要理由，就是後頸一涼，全身的感知神經在那個瞬間急劇收縮，把周圍所有細節一下子全部拉進來。</p>\n<p>床上的形狀太規整了，規整到不像是一個睡著的人自然形成的。</p>\n<p>他同時感覺到了，房間中央，有人坐著。</p>\n<p>他的靈契全開，虛體之外的第二重壓制力量擴散出去，同時雙手的黑刃顯形，準備以最快的速度——</p>\n<p>「坐了很久了，你才來。」</p>\n<p>那個聲音從黑暗中央傳出來，平靜，甚至帶著一點懶散，像是一個在自己家裡等客人等到有些無聊的人說的話。</p>\n<p>影的手刃停住了。</p>\n<p>那一瞬間，他感受到的東西超出了他所有過往的暗殺經驗——他甚至連這個人是從什麼時候就知道他要來的都不清楚，那個聲音說「坐了很久了」，是什麼意思？他是怎麼感知到的？他的「虛體」靈契……</p>\n<p>腳下有東西動了。</p>\n<p>影低頭——</p>\n<p>他沒有來得及看清楚，腳踝和小腿已經被什麼東西纏住了，那是細的，像是植物的藤蔓，從地板的紋路裡冒出來，瘋狂地生長，以一種不自然的速度蔓延，轉眼間已經蔓延到了他的腰部，把他困在了原地。</p>\n<p>那是活的。</p>\n<p>那是真的活的植物，從木地板的紋路裡生長出來的。</p>\n<p>影試圖啟動靈契切斷那些藤蔓，但那些東西的韌性不像普通植物，它們柔韌而有彈性，靠靈契的刀刃砍上去有一種吸納的回彈感，反而讓他的動作幅度受到了限制。</p>\n<p>在他試圖掙扎的那一秒半裡，他沒有注意到另一個東西已經出現在了他的視野邊緣。</p>\n<p>那個東西的拳頭，正確落在了他的頸側。</p>\n<p>精準到可怕的落點，力道控制得恰到好處——不是要殺他，就只是讓他失去意識的那個分寸，也就是說，這個人在打他之前，就已經決定了要讓他活著。</p>\n<p>黑暗在影的意識裡加深，然後他就什麼都不知道了。</p>\n<p>---</p>\n<p>白無極坐回椅子上，看著倒在地板上的黑衣人，把藤蔓收回去，地板上留了幾條細小的裂縫。</p>\n<p>他站起來，走到床邊，把被子整理了一下被剛才搬動過的位置扯亂的角，然後走去敲了敲牆。</p>\n<p>客棧的走廊裡有夜班的小夥計，那個少年揉著眼睛探頭進來：「公子，有……有什麼吩咐？」他的視線落在地板上那個昏迷的黑衣人身上，表情立刻僵住了。</p>\n<p>「這個人打算入侵，已經處理好了。」白無極指了指地板，「麻煩你去叫一下，讓城衛的人來帶走，他不會死，只是睡著了，一兩個時辰後會醒。」</p>\n<p>小夥計看著那個人，嚥了口口水，聲音有些飄：「是……是。」</p>\n<p>「還有一件事。」白無極環視了一下房間的地板，「客棧老闆，明天幫我換個房間，這間地板壞了。」</p>\n<p>他指著那幾條被藤蔓擠出的裂縫，表情平靜，就像是在說「窗簾壞了要換」一樣。</p>\n<p>小夥計腦子裡有七八個問題想問，但看著那個躺在地板上的人，一個字都問不出來，只能把腦子裡的問號全部壓下去，連連點頭。</p>\n<p>白無極點了點頭，把窗戶重新關上，回到椅子上坐下，閉上眼睛，讓自己的心跳繼續穩下去。</p>\n<p>黃金體驗在他身旁盤旋，金色的光在黑暗裡漾開又收攏，像是一個把一晚上的工作整理完畢、準備休息的夥伴。</p>\n<p>白無極輕聲說：「辛苦了。」</p>\n<p>黃金體驗的光芒輕輕閃爍了一下，無聲地回應。</p>\n<p>窗外，天契城的月色依舊很好。</p>"}, {"title": "第65章_黃金蛇網", "content": "<p>第65章　黃金蛇網</p>\n<p>「影」被城衛帶走了。</p>\n<p>他醒來之後沒有說任何有用的話，只是在那把椅子上坐著，沉默地看著面前的一切，臉上是一種暗殺者才有的那種鈍化了的神情——在這個行當裡待了太長時間，什麼反應都不必再有了，輸了就是輸了，接受它，等待下一個命令，或者接受沒有下一個命令的結局。</p>\n<p>城衛的負責人問了他半個時辰，什麼都沒問到，最後把白無極叫來，讓他看確認一下。</p>\n<p>白無極站在那個黑衣人面前，看了他一眼，轉向城衛負責人：「他背後是誰我沒辦法替你確認，但這種隱匿手段，你們在天契城近年遇見過嗎？」</p>\n<p>城衛負責人沉默了一下：「沒有。」</p>\n<p>「那你們自己判斷。」白無極說，「我沒有什麼訴求，也不需要你們怎樣，這個人怎麼處理是你們的事。」</p>\n<p>他轉身就走，城衛負責人在身後追問：「公子，萬一還有後續……」</p>\n<p>「會有，」白無極沒有回頭，「但先把這個弄清楚再說。」</p>\n<p>他走出城衛的院子，換了一個方向，往客棧新分配的房間走去。</p>\n<p>一個人不夠，慕容家不會就此作罷，他清楚得很。</p>\n<p>他需要想想接下來幾天怎麼安排。</p>\n<p>---</p>\n<p>這個「想想」其實不需要太長時間，因為黃金體驗的感知網絡是全天候運作的，白無極只需要把它「覆蓋範圍」稍微再往外推一點，確保任何接近的威脅都有足夠的預警時間，其他的，就等著看。</p>\n<p>他換了房間之後，在新客房裡把黃金體驗叫出來，讓它把整個房間的木頭結構輕輕「觸碰」了一遍——不是改變，只是接觸，讓那些有機物留有一點黃金體驗的感知介面，就像把一條很細很細的神經線埋進去，隨時傳遞信息。</p>\n<p>黃金體驗認真地做完這件事，又把窗台的木框、地板的每一條縫隙都過了一遍，然後抬頭看白無極，金色的光芒沉穩而安定。</p>\n<p>「好，」白無極點了個頭，「你辛苦。」</p>\n<p>替身沒有表情，但那個光的方式改變了一下，像是一種回應。</p>\n<p>白無極躺到床上，閉眼，這一次睡得很踏實。</p>\n<p>---</p>\n<p>第四天，沒有異動。</p>\n<p>第五天的傍晚，黃金體驗輕輕動了一下，但它傳遞的信號不是「危險接近」，而更像是「注意，有什麼東西在觀察你」。</p>\n<p>白無極在東市的街上走著，感受到那個信號，繼續往前走，腳步沒有任何變化，找了一家燒臘鋪子，進去選了幾樣，讓老闆包好，付了錢，慢慢走出來。</p>\n<p>黃金體驗持續追蹤那個觀察的氣息，白無極在腦海裡畫出它的大概位置——在他斜後方，距離約三十丈，氣息平穩，沒有攻擊的前兆，只是在看。</p>\n<p>這不是殺手，殺手的氣息即使壓制得再好，在決定出手的那一刻也會有一個微小的收縮，那是身體本能的蓄力反應，瞞不過黃金體驗的感知。</p>\n<p>但這個人只是在看。</p>\n<p>白無極在街頭轉了個角，往客棧的方向走，那個氣息跟了一截，然後消失了。</p>\n<p>他側過臉，低聲說：「記住那個氣息。」</p>\n<p>黃金體驗點頭。</p>\n<p>---</p>\n<p>第六天深夜。</p>\n<p>這一次，黃金體驗給出的信號是「兩個」。</p>\n<p>兩個氣息，從不同方向接近，一個走的是客棧前門的方向，一個在後院——這個方案設計得很合理，前後夾擊，讓人無從選擇逃跑方向，而且兩個氣息都壓制到了極低，比那個「影」的氣息還要再低一點點。</p>\n<p>但白無極在看見信號的時候，是在街上。</p>\n<p>他正在燒餅攤前等自己的燒餅，老闆從爐子裡夾出剛烤好的一個，用紙包好，遞給他，他接過來，往口袋裡摸靈石找零，手上的動作不緊不慢。</p>\n<p>黃金體驗在他身邊輕輕扯了一下他的衣袖。</p>\n<p>白無極往手心裡數出零錢，頭也不抬，輕輕說了一個字：「等。」</p>\n<p>等什麼？</p>\n<p>等他把零錢找好。</p>\n<p>那個動作他做得非常慢，不是刻意的慢，就是正常速度的把零錢從口袋裡拿出來，從一把散錢裡找出對應的面值，遞給燒餅老闆，接過老闆找回的餘數，把那個餘數仔細捻了捻，確認無誤，放回口袋，然後捧著燒餅往前走。</p>\n<p>他的靈感精確地感知到那兩個氣息的位置——它們已經進入了客棧，一個在二樓走廊，一個在後院的牆角，正在分別向他的房間靠近。</p>\n<p>等他們到達房間，發現他不在房間裡的那一刻——</p>\n<p>白無極停住腳步。</p>\n<p>白金之星出現了。</p>\n<p>沒有蓄力，沒有準備動作，就只是出現在他身後，然後在白無極心裡那個無聲的「現在」的指令落下來的同時——</p>\n<p>時停。</p>\n<p>世界靜止了一秒。</p>\n<p>在那一秒裡，白無極感知到了兩個靜止的人形，一個在他右前方二十七丈，剛剛從客棧的二樓側窗探出半個身子，右手的短刃向外持著；另一個在他左後方三十一丈，正貼著客棧後院的外牆，準備翻牆入院，左腳剛剛抬起。</p>\n<p>白金之星在靜止的世界裡移動的速度超出了任何人的認知邊界——它到達第一個目標的時候，精確地在對方太陽穴的位置落下一拳，落點和角度都計算好了，確保在時間重啟之後他倒下的方向不會傷到任何無辜的路人。</p>\n<p>然後它到第二個目標，同樣的一拳，同樣的落點，同樣的角度。</p>\n<p>時間恢復。</p>\n<p>一秒之後。</p>\n<p>白無極正在往客棧方向走的那條街上，右前方的客棧側窗有一道人影無聲地墜落，被窗台的勾角掛住了，沒有落地，就那樣掛在窗框上，靠著牆；後院的方向傳來一聲輕響，是一個人倒在院牆邊的聲音。</p>\n<p>路上的行人沒有幾個，有一個婦人抱著孩子走過，看了一眼那個掛在窗台的人影，站住了，驚呼了一聲，往後退了兩步。</p>\n<p>白無極從她身邊走過，沒有停，捏了捏口袋裡的那把零錢，扯開燒餅的油紙，咬了一口。</p>\n<p>然後他把右手的零錢整理了一下，捏出幾枚擺在手心，掂了掂，很仔細地把它們一枚一枚地放回口袋裡的固定位置。</p>\n<p>「謝謝老闆。」</p>\n<p>他輕聲說，對著已經不在身邊的燒餅老闆，感謝了一聲。</p>\n<p>找零找得準，這種老闆值得道謝。</p>\n<p>他繼續往前走，燒餅的芝麻味在夜風裡散開，客棧的門就在前面，一盞燈籠在門廊下晃了一晃，照出一小片暖色的地方。</p>\n<p>白無極踩上台階，推開門，進去了。</p>\n<p>---</p>\n<p>窗台上那個人和後院牆邊那個人，兩個契王級的強者，躺在各自的位置，心跳平穩，呼吸均勻，只是意識已經不在了。</p>\n<p>他們什麼都不知道。</p>\n<p>沒有感覺到疼痛，沒有感覺到恐懼，沒有看見任何東西——在他們的感知裡，時間是連續的，他們的上一刻是正在接近目標，他們的下一刻，就是什麼都沒有了，意識消失得比睡著還要乾脆。</p>\n<p>他們沒有看見那個拳頭。</p>\n<p>他們不知道這個世界上有一種力量，可以讓一秒鐘的時間停下來，讓一雙手在那一秒裡去任何地方，打任何人，讓那個人帶著完全的茫然，跌入無意識的黑暗。</p>\n<p>城衛第二天清早來帶人的時候，面對這兩個人，和前一晚面對「影」時一樣，問不出任何有用的東西。</p>\n<p>不同的是這一次，連他們自己也不知道發生了什麼。</p>"}, {"title": "第66章_時停獵殺", "content": "<p>第66章　時停獵殺</p>\n<p>慕容家的消息傳回去的時候，一共三個人，三個被送進城衛的契王級暗殺者，沒有一個人能夠說清楚自己是怎麼敗的。</p>\n<p>慕容家的高層在得知這個消息的那個晚上，沉默了很長時間。</p>\n<p>他們不是沒有動用過契王級的暗殺者，這個等級的強者對付普通目標幾乎是萬無一失的，契師、契將、甚至有些剛踏入契王門檻的強者，面對他們都難有反抗之力。</p>\n<p>但這一次，三個人，沒有一個人清楚自己是怎麼倒下去的。</p>\n<p>「影」能夠說出來的最多只是「腳被藤蔓纏住，然後失去意識」，他確認自己看見了那些藤蔓，確認了那不是幻覺，但他說不出那是什麼靈契，也說不出那個擊打他頸部的力量是從何而來，因為他連那個力量的輪廓都沒有看見。</p>\n<p>後來的那兩個人，什麼都說不出來。他們的記憶在最後一個有意識的瞬間就終止了，那之後的事情，對他們來說根本不存在。</p>\n<p>這件事令慕容家的高層感到的不只是困惑，而是一種更底層的、更難以名狀的不安。</p>\n<p>不知道對手用了什麼手段，不知道對手的戰力上限在哪裡，不知道下一批人派過去會不會遭遇一樣的結果——這種「不知道」是最危險的狀態，因為在不知道的情況下做的任何決定都是瞎子摸象。</p>\n<p>---</p>\n<p>慕容家的高層把這個消息呈報給了慕容玄。</p>\n<p>慕容玄聽完，沉默了。</p>\n<p>這種沉默和他在論事閣聽到消息時的沉默不一樣，那時的沉默是思考，這一次的沉默帶著一種他自己都難以解釋的確認感，像是某個他在古籍上見過的東西，正在一點一點地從文字裡走出來，變成真實。</p>\n<p>他揮手讓所有人退出去，獨自在書房裡坐了很長時間。</p>\n<p>書架的最高層，有一卷已經封存了不知道多少年的殘卷，那卷書的材質已經泛黃，字跡用的是一種失傳了數百年的書寫方式，慕容家裡能讀懂它的人，只剩他一個。</p>\n<p>他站起來，把那卷書取下來，放在書案上，輕輕攤開。</p>\n<p>殘卷的字跡在燈下顯得更加晦暗，但他盯著那些字，看了很長時間，眼神裡有什麼東西慢慢從深處浮了上來。</p>\n<p>那些字裡有一個詞，兩個字，他在第一次讀到它的時候以為那只是某種比喻，是古人在誇大一種力量時慣用的修辭。</p>\n<p>但那不是修辭。</p>\n<p>他現在確定了。</p>\n<p>他重新把那卷書封好，放回原位，回到書案前坐下，提筆，在一張素白的紙上寫了幾個字，端詳了一下，折好，封緘，讓人送出去。</p>\n<p>這一回，他不會再派殺手了。</p>\n<p>---</p>\n<p>與此同時，天契城的西市，白無極正在跟一個賣炒栗子的老大爺聊天。</p>\n<p>那個老大爺是從南邊的小城遷來天契城的，已經在這個攤子上賣了快二十年，見過無數的天契大比，每一屆都說「今年的選手不行」，但今年大比一結束，就逢人說「今年這個少年有點意思」。</p>\n<p>白無極買了一紙袋炒栗子，站在攤子邊，聽老大爺講了十幾分鐘天契大比的歷史沿革，偶爾搭兩句，把栗子一顆一顆地剝開，吃得很專心。</p>\n<p>黃金體驗在他身邊，感知網絡一直開著，街面上的每一個角落它都在掃描，城東城西城南城北的每一個細微動靜它都在接收。</p>\n<p>白無極在老大爺講到某一屆大比一個少年衝關的段落時，左手的剝栗子動作微微停了一下。</p>\n<p>感知到了。</p>\n<p>不是一個，不是之前那種壓制氣息的隱匿者，這兩個人的氣息反而沒有特別壓制，就是兩道普通行人的氣息，混在街上的人群裡，從兩個不同的方向往他靠近。</p>\n<p>但白無極的感知不只是靠氣息——黃金體驗感知的是有機物的動靜，是那些人腳底踩過的路面傳遞出來的細微壓力差異，是他們呼吸頻率改變的那一個微小時刻，是他們的目光在他身上聚焦的那個方向。</p>\n<p>這兩個人的目光，都在他身上。</p>\n<p>他繼續聽老大爺說話，把手裡的栗子剝完，在心裡估算了一下距離，繼續剝下一顆。</p>\n<p>「那一屆的冠軍後來去了哪裡？」他問老大爺。</p>\n<p>老大爺嘆了口氣：「聽說去了北邊的封地，再沒回來。」</p>\n<p>「可惜。」白無極說，把最後那顆栗子放進嘴裡，嚼了兩下。</p>\n<p>兩道氣息靠近到了他認為合適的距離，他感受到那個距離，把紙袋攏了攏，往口袋裡摸零錢。</p>\n<p>他的動作很慢。</p>\n<p>找出零錢，從一把散錢裡認真地一枚一枚地挑出需要的面值，遞給老大爺，等老大爺找錢，接過找零，把找零收好，然後把紙袋夾在腋下，抬起頭，衝老大爺道了個謝。</p>\n<p>老大爺擺手說不客氣，讓他有空再來。</p>\n<p>白無極點頭，轉身，往前走了兩步。</p>\n<p>他的視線平視前方的街道，平靜，鬆弛，就是一個剛剛買完栗子、正要回去的普通人的表情。</p>\n<p>那兩道氣息就在他斜後方，一左一右，正在悄然加速——</p>\n<p>「現在。」</p>\n<p>沒有說出口，只是心裡的一個字，落在白金之星與他共同維繫的那個無聲的頻道裡。</p>\n<p>時停。</p>\n<p>一秒。</p>\n<p>世界靜止。</p>\n<p>白金之星的速度在靜止的世界裡是一種完全不同維度的存在，它不受靜止的約束，它本身就是那個「時間停著的一秒」裡唯一還在動著的東西——</p>\n<p>一秒後。</p>\n<p>街面上，兩道人影同時倒下去了。</p>\n<p>沒有聲音，沒有叫喊，沒有任何聽起來像是打鬥的動靜，兩個人就那樣，在各自的腳步裡，在各自的動作的中途，忽然無聲地軟倒，像是兩根蠟燭同時被一陣沒有風的風熄滅了。</p>\n<p>周圍的路人愣了一下，然後嘩然起來，有人去查看，有人喊城衛，街面上頓時亂了起來。</p>\n<p>白無極已經走遠了。</p>\n<p>他夾著那紙袋栗子，走在人群的前面，把零錢在口袋裡整理了一下，把面值相同的放在一起，這樣下次找錢的時候方便一點。</p>\n<p>走了十幾步，他忽然停下來，回頭看了一眼那邊嘈雜的人群，沉默了一秒，繼續往前走。</p>\n<p>街上的事，跟他買栗子這件事，不相關。</p>\n<p>---</p>\n<p>慕容家得到這個消息的時候，是當天黃昏。</p>\n<p>那兩個人，是慕容家暗殺者系統裡屬於第二梯隊的契王級強者，不是最頂尖的，但絕對是足以對付絕大多數目標的存在。</p>\n<p>他們倒下的方式和之前三個一模一樣——失去意識，毫無預警，甚至沒有任何掙扎的痕跡。</p>\n<p>傳遞消息的人在慕容玄面前說完，停住了，等著家主的反應。</p>\n<p>慕容玄沒有什麼反應，只是把手邊的那封已經封緘好的信件往前推了一推，說：「送出去。」</p>\n<p>那人沒有看清楚那封信的收信人，但認出了那個信封上的一個印章。</p>\n<p>那是論道書的印章。</p>\n<p>用於契聖正式邀請一個人的論道書。</p>"}, {"title": "第67章_戰書", "content": "<p>第67章　戰書</p>\n<p>那封信在第二天清早送到了白無極的客棧。</p>\n<p>他當時正在用早飯，小夥計把一個深色的信封放在桌子上，說是有人委托城中的信差送來的，送信的人不知道是誰，信差也說不清楚委托者的長相。</p>\n<p>白無極端著碗，把信封拿起來，翻了翻，沒有感受到任何異樣的靈契波動，打開，取出裡面的紙。</p>\n<p>紙是很好的材質，厚而細密，墨色飽滿，就幾行字，寫的是邀請他在三日後的辰時在天契城廣場「切磋」，落款只有兩個字：「慕容玄」。</p>\n<p>白無極把這封信重新折好，放回信封，繼續喝湯。</p>\n<p>「所謂論道書，就是契聖的邀請？」他低聲問黃金體驗。</p>\n<p>黃金體驗點頭。</p>\n<p>「然後全城的人都會知道？」</p>\n<p>黃金體驗又點頭，比劃了一個「正在擴散」的手勢。</p>\n<p>白無極喝完了最後一口湯，把碗放下，拿起信封，盯著「慕容玄」這兩個字看了幾秒，然後仰頭，對著天花板想了想，把信封塞進口袋裡，起身，抓起外袍走出客棧。</p>\n<p>---</p>\n<p>消息比他走得快。</p>\n<p>論道書這個東西，在天衍大陸上是有特定儀式意義的——它代表一個高位強者對另一個人的正式認可，認可到足以親自下場「指點」的程度。這種事情平時幾十年難遇一回，更不用說發出論道書的是慕容家的家主，是天衍大陸上現存的幾位契聖之一。</p>\n<p>這封信的內容在送達之前就已經有人知道了，不知道是慕容家自己放出去的風聲，還是消息本身的份量讓它自己流傳出去——不到半個上午，天契城的主要街市都在議論這件事。</p>\n<p>「慕容家主發了論道書？」</p>\n<p>「接邀者是那個白無極，就是大比棄權的那個！」</p>\n<p>「契聖邀請他？他一個不知來路的少年？」</p>\n<p>「你說他是什麼境界？大比上赫連烈那個契王……」</p>\n<p>聲音越來越多，越來越雜，白無極走在街上，把這些議論聲從耳邊過濾掉，往蘇家別院的方向走。</p>\n<p>他在路上拐進了一個包子鋪買了幾個包子，邊走邊吃。</p>\n<p>蘇念卿找到他，是在他剛出包子鋪門口的那一刻。</p>\n<p>她從街的另一端走過來，霜翎在她身邊，今天沒有展開，就只是靜靜地隨著她，銀色的狐耳貼著。蘇念卿的步伐比平時快了一點，那個細節在旁人眼中幾乎看不出來，但她的裙擺動的幅度比正常走路稍微大了一些，說明她是真的在趕路。</p>\n<p>「你知道了？」她在他面前停住，問得很直接。</p>\n<p>「剛剛看了，早上送到的。」白無極把包子包遞給她，示意她拿一個，「你吃了嗎？」</p>\n<p>蘇念卿沒有接，看著他：「你可以不去。」</p>\n<p>白無極把包子往自己嘴裡塞了一口，嚼了兩下，若有所思地點了點頭，像是在認真考慮她說的話——然後說：「不去才奇怪。」</p>\n<p>「白無極，」蘇念卿微微皺了一下眉，這個表情她平時不太會有，「你知道契聖是什麼概念嗎？」</p>\n<p>「就是很強的意思嗎？」</p>\n<p>沉默。</p>\n<p>蘇念卿盯著他，那個眼神複雜到一時之間找不到合適的詞來形容它——有急切，有無奈，有某種她自己都說不清楚是什麼的東西混在裡面，最外面那一層還包著她一貫的冷淡，這幾種東西同時在她眼睛裡，讓她的眼神變得很深，像一塊寒潭，表面是冰，底下的水還在流動。</p>\n<p>「契聖，」她說，字一個一個說得很清晰，「是天衍大陸上頂點的戰力，是契王之上難以逾越的鴻溝，是連我父親見到都要保持距離的層次，你明白嗎？」</p>\n<p>白無極嚥下那口包子，擦了擦嘴，認真地看著她，停了一下，說：「你在擔心我。」</p>\n<p>不是問句。</p>\n<p>蘇念卿的眼神動了一下，沒有否認，但也沒有說話。</p>\n<p>「我知道契聖很強，」白無極把包子包紮緊，夾在手肘下，「但他用論道書的方式，不是用殺手的方式，說明他現在不是要殺我，是要看看我是什麼東西。既然是看，那不去才顯得我怕了他，那反而不好。」</p>\n<p>蘇念卿盯著他看了三秒。</p>\n<p>三秒後，她說：「你的邏輯，和普通人的邏輯不一樣。」</p>\n<p>「有嗎？」白無極聳了聳肩，「我覺得挺合理的。」</p>\n<p>「正常人面對契聖的邀請，第一反應是跑路或者找後台，」蘇念卿說，「你第一反應是去買包子。」</p>\n<p>白無極低頭看了一眼手裡的包子包：「……那是因為剛好路過包子鋪。」</p>\n<p>蘇念卿沉默了一小段時間，然後她說：「我和你一起去。」</p>\n<p>白無極側過臉看她：「你去幹嘛？」</p>\n<p>「監場。」</p>\n<p>「那不是約定只有我們兩個的論道……」</p>\n<p>「論道書沒有規定不能帶人。」蘇念卿把「不容置疑」這四個字用眼神表達得很清楚，「而且慕容玄見過的世面我父親也見過，我父親說，見到慕容玄的時候，旁邊最好有人。」</p>\n<p>白無極看著她，她回視他，目光沒有讓開。</p>\n<p>他停了一下，把包子包換了個手，對她點了個頭：「行。」</p>\n<p>蘇念卿收回視線，轉過身，並肩往街上走去。</p>\n<p>她的側臉很平靜，呼吸也是平的，但夾在身側的那隻手，指節悄悄用力扣緊了一下，然後鬆開，恢復正常。</p>\n<p>霜翎側頭看了看她，尾巴低垂著往前走，沒有說什麼——或者說，作為一隻靈契，它用它的方式把那個觀察到的細節，安安靜靜地收進了自己的記憶裡。</p>\n<p>---</p>\n<p>三天的時間，天契城像是被一塊石頭投入的水面，波紋一圈圈向外擴散，沒有停下的意思。</p>\n<p>四大家族的人沒有走，等著看這場「論道」。赫連家的赫連陌私下說了一句話，被手下傳出來：「不管結果怎樣，這個少年是真的不怕死。」陳家的陳繼沒有說話，只是讓家裡的探子把白無極這幾天的行蹤都記了下來。</p>\n<p>蘇長淵在收到消息的那個傍晚，在書房裡站了很長時間，最後在案上寫了幾個字，讓人傳給蘇念卿。</p>\n<p>蘇念卿把那張紙看了一眼，折好，放進袖中，神情沒有什麼變化，但握著那張紙的手指，握得比平時用了更多的力氣。</p>\n<p>那張紙上，蘇長淵只寫了一句話：「念卿，看情況，護自身為先。」</p>\n<p>蘇念卿把那張紙折好，放在梳妝台的抽屜裡，對著鏡子裡的自己看了幾秒，然後站起來，繼續去做她要做的準備。</p>"}, {"title": "第68章_契聖的壓迫感", "content": "<p>第68章　契聖的壓迫感</p>\n<p>論道的日子，辰時初刻，天契城廣場上已經聚滿了人。</p>\n<p>不是一般的多，是那種從廣場邊緣一路延伸到周圍街巷的密度，人頭攢動，遠處的建築上也有人爬上去看，連附近攤子的老闆都關了鋪子，把自己的長板凳搬出來站著，抻著脖子往廣場的方向張望。</p>\n<p>但廣場的中央，是空的。</p>\n<p>那個空圈子是自然形成的，沒有任何人刻意驅趕那些想靠近的人，那些人靠近到某個距離，就自動停住腳步了，像是有一條無形的邊界線，越過那條線的空氣與人群這邊不一樣——那邊的空氣更重，更冷，帶著一種讓人下意識想要後退的壓迫感。</p>\n<p>慕容玄已經到了。</p>\n<p>他站在廣場中央，就這樣站著，雙手攏在袖中，臉上沒有任何刻意擺出來的威嚴表情，就是一個很普通的站姿。</p>\n<p>但他站在那裡的感覺，讓那個空圈子在他周圍自然而然地形成了。</p>\n<p>這就是一個契聖到場的方式——不需要任何表演，不需要任何刻意的靈契展示，就只是站在那裡，他幾十年修為所形成的那種對天地靈氣的深度浸透，會自然而然地向外散發，讓所有比他低幾個層次的感知者在靠近那個範圍的時候，感受到一種說不清楚的、卻是真實的壓力。</p>\n<p>那不是靈威，那是境界本身的重量。</p>\n<p>四大家族的人分散在廣場四周，保持著各自的距離，沒有一家主動靠近慕容玄，連赫連家平時最強硬的人，在今天也只是站在遠處，臉色有些不自然。</p>\n<p>蘇長淵在蘇家席位的最前面，他的位置比其他人靠近廣場中央一點，但也就是「靠近一點」，離那個空圈子的邊界還有十幾丈的距離。他的神情平靜，但平靜之下有一種收緊的東西，眼神一直往廣場入口的方向看。</p>\n<p>時辰到了。</p>\n<p>白無極從廣場東邊的入口走進來。</p>\n<p>他今天穿的是普通的青色常服，沒有任何靈器防護的裝備，就是一個普通走路的人進了廣場，往前走。</p>\n<p>蘇念卿跟在他身側，霜翎展開了，銀色的尾毛在她身旁輕輕搖曳，那是一種備戰的狀態，但也是一種陪伴的狀態，兩種氣息混在一起。</p>\n<p>白無極感覺到那股壓力的時候，是在他踏入廣場之後走出大概五丈的位置。</p>\n<p>那東西不像普通的靈威，普通的靈威是向外擴散的，像波浪，你走進去感覺到的是衝擊；這個不是，這個更像是一種重力，一種讓空氣本身變得更厚重的東西，走進去，你感覺到的是壓在自己身上的東西多了，不是猛烈地撞過來，而是緩慢地、持續地、向四面八方均勻地往你身上加壓。</p>\n<p>白無極的腳步停了嗎？</p>\n<p>沒有。</p>\n<p>他停了半秒，把那個壓力評估了一下，然後繼續走。</p>\n<p>他的步伐沒有加速，也沒有刻意減慢，就是正常往前走，一步一步，踩在廣場的地磚上，腳步聲在這個安靜的空圈子裡顯得清晰。</p>\n<p>那一段路大概走了不到三十秒。</p>\n<p>但廣場四周的幾萬個人都在看，看這個年輕人用三十秒走過那段別人不敢走進去的路，走到了廣場的中央。</p>\n<p>沒有人做聲。</p>\n<p>安靜得讓那三十秒變得很長。</p>\n<p>---</p>\n<p>白無極在距離慕容玄大約五丈的位置停住了。</p>\n<p>他沉默地打量著面前這個人，打量的方式不是那種學徒看宗師的仰視，也不是同輩人互相試探的平視，就是一種很普通的、在評估一個陌生情況的眼神，帶著注意力，但沒有恐懼。</p>\n<p>慕容玄比他想像中看起來更像一個普通的老人。</p>\n<p>他大概是蘇長淵的兩倍年紀，臉上的皺紋不深，但眼睛的神態有一種看慣了太多事情的平靜，那種平靜不是淡漠，是一種沉積了幾十年的、真正意義上不再需要依靠外在刺激來維持自我的安定感。</p>\n<p>但那雙眼睛裡，此刻有什麼東西在動著，很細微，像是久未被點燃的東西，有一點點火星在跳。</p>\n<p>慕容玄看了他很長一段時間，然後開口，聲音不大，不需要大，整個廣場都能聽見：「你不怕。」</p>\n<p>這不是讚揚，也不是懷疑，就是一個陳述，把觀察到的事實說出來。</p>\n<p>白無極停了一下，說：「怕有用嗎？」</p>\n<p>四個字，從容，帶著一種說不清楚是天真還是看透的東西，乾乾淨淨，沒有修飾。</p>\n<p>廣場的四周，壓抑的靜默裡，有一道很輕的聲音傳出來，說不清楚是什麼，像是一聲輕嘆，又像是一個笑聲被憋住了。</p>\n<p>慕容玄沉默了片刻。</p>\n<p>那片刻的沉默是真實的，不是刻意拉長，他就是在沉默，在看眼前這個人，在認真打量，從頭到腳，從一個人外在的氣息到他站在這個位置時腳踩地的方式，到他說那四個字時嘴角的角度，到他的手放在身側時鬆緊的程度……</p>\n<p>慕容玄看了很長時間，然後說了兩個字：「有趣。」</p>\n<p>那兩個字說出口的方式不像是隨口一說，它帶著一種分量，像是一個很少說出「有趣」這兩個字的人，今天說出來了。</p>\n<p>蘇念卿站在白無極身後兩步，她的眼神一直在慕容玄身上，感知全開，霜翎的全部靈能都凝聚在待命狀態，但她聽見慕容玄說那兩個字的時候，手指微微鬆了一點。</p>\n<p>只是一點。</p>\n<p>她沒有往前走，也沒有開口說話，但那一點的放鬆，是真實的。</p>\n<p>白無極沒有回答「有趣」這兩個字，他只是繼續站著，等對方說他要說的話。</p>\n<p>這種等法，是一種他自己的特質——他不需要用說話來填充沉默，他可以在沉默裡待得很久，讓對方把話說完，他再開口，而這種等法看在別人眼裡，有時候顯得比說話更沉穩。</p>\n<p>慕容玄在那個有趣之後，真的停了很長時間。</p>\n<p>然後他的手從袖中取出，放在身側，那個動作輕描淡寫，像是準備迎接一件事，也像是準備開始什麼。</p>\n<p>廣場的空氣，更重了。</p>\n<p>那種「重」，不是靈威爆發的那種衝擊性的壓力，而是在慕容玄的手從袖中緩緩取出的那個動作的過程裡，廣場的溫度像是下降了一度，所有人的呼吸在那一刻都不自覺地放輕了，像是在面對某個古老的東西，在它開口說話之前的那一段沉默。</p>\n<p>白無極的腳踩著地，在心裡對自己說：穩住。</p>\n<p>他腳下的地感覺比剛才更重了一點——不是地真的更重，是他自己的腳踩得更實了，是一種本能的在壓力下找穩定支點的反應，他讓自己的重心往下沉，讓每一個腳趾都感受到地面的存在。</p>\n<p>然後他繼續看著慕容玄，沒有說話，沒有動，就是站著。</p>\n<p>站著這件事，有時候比做什麼都難。</p>\n<p>但他站住了。</p>"}, {"title": "第69章_不可逾越的牆", "content": "<p>第69章　不可逾越的牆</p>\n<p>慕容玄出手了。</p>\n<p>他沒有任何前搖，沒有靈契爆發時應有的可見徵兆，就只是抬起右手，掌心朝前，輕輕向外推送，就這樣一個動作，輕得像是在把一縷煙霧吹散。</p>\n<p>但那一掌帶出來的東西，不像煙霧。</p>\n<p>那是一道壓力波。</p>\n<p>如果用視覺形容的話，那個東西是透明的，是看不見的，但它到達的地方，空氣的密度在那一瞬間急劇改變，廣場地面的細沙在那個波動經過時被向四周推移，形成一個向外擴散的痕跡，像是投石入水的漣漪，但那個「水面」是空氣本身。</p>\n<p>這是契聖境界的靈契精純度壓縮到一定程度之後所能做到的事——不需要招式，不需要對戰的形式，就是把自身的靈力通過最本質的方式向外輸出，那個輸出的力量，對於大多數境界以下的強者來說，已經是一道不可能正面硬接的牆。</p>\n<p>---</p>\n<p>白無極感知到那一掌的時候，它已經在往他身上來的路上了。</p>\n<p>他沒有退。</p>\n<p>「現在。」</p>\n<p>時停。</p>\n<p>一秒。</p>\n<p>在靜止的世界裡，那道壓力波凝固在半空，像一道透明的牆，停在他身前三丈的位置，紋絲不動，而白無極站在它面前，呼吸在靜止的世界裡也是靜止的，只有他的意識還在動，還在算。</p>\n<p>白金之星出現在他身側，那副星空色的鎧甲在時停的世界裡發出深沉的光，那種光不刺眼，但沉重，帶著一種壓得下任何事物的厚度。</p>\n<p>白無極對它點了頭：「全力。」</p>\n<p>白金之星的拳頭蓄力，在靜止的世界裡蓄滿了，然後往那道凝固的壓力波打去。</p>\n<p>時間恢復。</p>\n<p>兩力在那個瞬間對撞，發生的事只有一個字可以形容：轟。</p>\n<p>不是聲音的轟，是感覺的轟——廣場地面的地磚在白無極腳下以一個明顯可見的速度向外炸裂了幾塊，白無極的身形向後滑出了三步，那三步踩在碎裂的地磚上，每一步都帶出一聲清脆的砸裂聲。</p>\n<p>他的右臂，在第一步滑出的時候就感覺到了——從手腕到肩膀，一種電流般的傳導，是震麻，是骨骼在那個衝擊下傳達出來的、接近但沒有達到極限的警示信號。</p>\n<p>他停住了，停在第三步的位置，腳踩地，穩住，沒有第四步。</p>\n<p>三步。</p>\n<p>廣場上的靜默深得像是所有聲音都被抽走了，幾萬個人在那一秒裡都沒有聲音，不是沒人想說話，是說不出來，是那個對撞帶來的震動把人的聲帶都震住了一瞬。</p>\n<p>然後，所有的目光慢慢往慕容玄的方向轉。</p>\n<p>慕容玄站在他的位置，看著白無極，他的掌心朝著自己反過來，垂在身側。</p>\n<p>他的掌心有一條紅痕。</p>\n<p>那條紅痕不深，比一道輕刮傷略重一點，就是紅色的，在他皮膚上，清晰地存在著。</p>\n<p>全場死寂。</p>\n<p>那個死寂不是恐懼，是震驚——不是因為白無極被震退了三步，而是因為慕容玄的掌心有一條紅痕。</p>\n<p>蘇念卿的眼睛是第一個在那個死寂裡找到焦點的，她的視線釘在那條紅痕上，沒有說話，但眼神的深度變了，像是看見了一件她知道意味著什麼卻還沒準備好去完全處理它的事情。</p>\n<p>蘇長淵在遠處，低聲說了一個字：「……」那個字太輕，沒有人聽見，但他說出那個字的時候，攏在袖中的手鬆開了，鬆得很徹底，像是某根繃緊的弦在那一刻找到了一個能夠允許自己鬆動的理由。</p>\n<p>四大家族的席位上，陳繼的茶杯停在半空，沒有放下去，也沒有繼續拿著，就那麼定住了。</p>\n<p>赫連陌把扶手上的手移開，低頭，對身邊的人說了什麼，對方點頭，匆匆離去——他在讓人去把這個情況記錄下來，他聽說過慕容玄這個人幾十年都沒有在任何正面交鋒中受過傷，他不確定這條資訊的準確性，但如果是真的，那今天這條紅痕，就是一件需要被記錄的事情。</p>\n<p>---</p>\n<p>慕容玄看著掌心的那條紅痕，看了幾秒，然後抬起眼，看向白無極。</p>\n<p>那個眼神裡有幾分東西在裡面，有評估，有確認，有某種比評估更複雜的思考，但最外面一層依然是平靜的，那種他才有的、沉積了太多年的平靜。</p>\n<p>「你確實不是凡物，」他說，聲音平靜，「但還不夠。」</p>\n<p>白無極站在他停下的那個位置，搖了搖自己的右臂，那個搖晃的幅度不大，就是讓那個麻的感覺散一散，然後他把手臂放下來，活動了一下手指。</p>\n<p>他說：「知道了，就是差一口氣。」</p>\n<p>這六個字說出口，帶著一種不可思議的從容——不是強裝，不是硬撐出來的，就是真的在承認，承認得很自然，承認得像是在確認一件已知的事情。</p>\n<p>廣場四周響起了一種很奇怪的聲音，不是某個人的聲音，是幾萬個人的呼吸聲同時輕了一點又重了一點形成的那種聲音，帶著某種集體的鬆動——</p>\n<p>他們中的很多人原本以為那三步之後還有後續，以為他們會看見一場他們這輩子可能再也看不見第二次的碾壓，但那個碾壓沒有到來，有的只是一個少年搖了搖手臂，說了六個字。</p>\n<p>「差一口氣。」</p>\n<p>就是差一口氣。</p>\n<p>他說的是今天，但那六個字裡面裝著的，是某種更長遠的東西，某種在承認現在的差距的同時，隱隱含著的不服輸的方向感——不是橫衝直撞的，而是他本人獨特的那種，悠然的，穩實的，不慌不忙的，像是說：我知道，我記住了，等我補上那口氣。</p>\n<p>慕容玄看著他，比剛才多看了兩秒，然後慢慢移開目光，往他的右側看去，那裡是白無極背後，稍微遠一點的位置。</p>\n<p>他的眼神在那個方向停了一下，那個「一下」的時間很短，但慕容玄感知力超過了在場幾乎所有人，他在那個方向感受到了某個東西的存在——不是靈契，不是他熟悉的任何一種靈能的形式，但確實有什麼在那裡。</p>\n<p>那個東西帶著一種他在古籍上見過描述的氣質。</p>\n<p>他把目光收回來，重新放在白無極身上，眼神的深處，那一點火星跳得更明顯了一點。</p>\n<p>「你讓我想起一個傳說中的力量。」他說。</p>\n<p>這句話說出口，他沒有繼續解釋，也沒有等白無極回答，就這樣把這句話放在空氣裡。</p>\n<p>白無極看著他，表情平靜，心裡在想：他說的「傳說中的力量」是什麼？</p>\n<p>但他沒有問出來——他有一種直覺，這不是現在問的時機，而且問了對方也不一定會說，或者說了他也不一定能聽懂。</p>\n<p>所以他就站著，等著。</p>\n<p>慕容玄做了一個他在場的所有人都沒有想到的事情：他的靈契壓力，收了。</p>\n<p>不是緩緩收，是乾淨地收，像一個開著的爐子被關掉，那種廣場上彌漫的厚重壓迫感在那一刻消退，廣場的溫度回升了一點，周圍人群的呼吸輕了一點，連遠處的旗幟都重新動起來了，在風裡慢慢飄。</p>\n<p>他準備再出一掌。</p>\n<p>白無極感知到了那個蓄力的方向，他的身體重心開始調整，準備再度啟動時停——</p>\n<p>然後，一道聲音從他身後傳來。</p>\n<p>「夠了。」</p>"}, {"title": "第70章_蘇念卿擋在前面", "content": "<p>第70章　蘇念卿擋在前面</p>\n<p>蘇念卿走進場中了。</p>\n<p>她不是跑進來的，不是衝進來的，就是走，走得很快，但每一步都是穩的，落地無聲，銀色的霜翎在她身側迅速展開，靈能凝聚，在她面前形成了一道半透明的冰盾——那個盾不是防禦姿態的那種，冰面平整，稜角清晰，是一種宣示性的存在，說的是：我到了，我在這裡，你要繼續，先過我這一關。</p>\n<p>她站到了白無極身前。</p>\n<p>是身前，不是身側。</p>\n<p>就是正正地站在他的前面，一步的距離，背對著他，面向慕容玄。</p>\n<p>廣場四周的人群在那個瞬間又靜了一次，比之前任何一次靜得都更深，靜得讓那一陣恰好吹過廣場的風都顯得格外清晰，把她的裙角掀了一下，把她身旁霜翎的尾毛吹散了一片。</p>\n<p>慕容玄看著她。</p>\n<p>他的蓄力停住了，沒有釋放，但也沒有收回，就停在那個蓄力的狀態，慢慢打量眼前這個走進來的人。</p>\n<p>他認識她。</p>\n<p>蘇家的嫡女，蘇念卿，此次天契大比的冠軍，契師巔峰，靈契「霜翎」，是這一輩的蘇家人裡最被看好的一個，蘇長淵為她布下的未來，是整個天衍大陸的格局裡一顆重要的棋。</p>\n<p>他看著她，語氣平靜，帶著一種能夠說明他在這個世界上屹立了多久的古舊從容：「蘇家的女兒，你要為一個來歷不明的人擋契聖？」</p>\n<p>蘇念卿看著他，眼神沒有任何恐懼，也沒有任何慌亂，就是直視，清醒，平靜，帶著一種比她的年齡應有的更沉的鎮定：「我擋的不是契聖。」</p>\n<p>停頓了半秒，她繼續說：「我擋的是不必要的戰鬥。」</p>\n<p>她說得很漂亮，說得讓人挑不出毛病——她沒有跟慕容玄正面叫板，沒有說「你不能打他」，她繞過了那個衝突的核心，給了慕容玄一個台階，同時也給了自己一個站在這裡的理由，那個理由聽起來是中立的，是理性的，是任何人聽了都能在邏輯上接受的。</p>\n<p>但她站的位置，是白無極的身前。</p>\n<p>所有人都看見了那個位置。</p>\n<p>「不必要的戰鬥。」慕容玄重複了她的話，語氣裡帶著什麼，不是諷刺，不是讚許，就是在聽，在把這四個字放進去慢慢考量，「你認為這場論道，到了結束的時候？」</p>\n<p>「足夠了。」蘇念卿的聲音沒有鬆動，「慕容家主想看的，已經看到了。再繼續，傷了哪邊，都是天契城今天不需要的結果。」</p>\n<p>慕容玄沉默了。</p>\n<p>那個沉默裡，有評估，有某種緩慢的、內部的計算，也有一種旁觀者很難看透的、比計算更深的思考。</p>\n<p>他看了蘇念卿很長時間，然後把視線移到她身後，落在白無極身上。</p>\n<p>白無極站在蘇念卿身後，就那麼站著，沒有繞開她站到她旁邊，沒有開口說話，讓她的話完整地說完，讓她的位置完整地保持著。他的表情很平靜，右臂還帶著那個微微的麻意，但他站著的方式沒有任何異樣，就是站著，看著前面的兩個人，等著。</p>\n<p>慕容玄把這個場景看了幾秒。</p>\n<p>然後，他的手鬆了。</p>\n<p>靈能收回，乾淨，沒有任何殘留的壓力，廣場上最後那一層如同凝固的空氣，在那個收的動作裡徹底散開，廣場重新變成了一個正常的、陽光照得進來的、風吹過旗幟發出聲音的廣場。</p>\n<p>「好。」</p>\n<p>就一個字。</p>\n<p>他轉身了。</p>\n<p>走的方向是廣場西側的出口，步伐不快，不慢，帶著一種很從容的離去的樣子，像是一個下完棋的老人，棋局告一段落，把茶喝完，起身離開棋室，那樣的平靜。</p>\n<p>他走出廣場的範圍了，但走了七八步，在即將要穿過那道廣場邊緣的時候，他停住了，沒有回頭，聲音不大，但清晰，讓廣場上的人都能聽見：</p>\n<p>「你讓我想起一個傳說中的力量。」</p>\n<p>和剛才說的一樣的話。</p>\n<p>但這一次，他說完，停了一下，繼續說：「下次再談。」</p>\n<p>然後他就走了，真的走了，穿過廣場邊緣的那道空隙，消失在天契城的街道上，他身後的慕容家人跟上去，幾個人的背影依次穿過那個出口，消失。</p>\n<p>廣場上，沉默了幾秒，然後嘩地一聲，說話聲炸開，像是被人拿開了一個蓋住的鍋蓋，被壓制已久的聲音一起往外湧，激動的，議論的，呼氣的，喊叫的，混成一片。</p>\n<p>---</p>\n<p>蘇念卿站在原地。</p>\n<p>她的冰盾沒有立刻收，就這樣保持著，她維持著那個面向前方的站姿，等到慕容玄的背影完全消失在視野之外，她的肩膀，很輕很輕地下沉了一點。</p>\n<p>那一點的下沉，是很小的動作，小到廣場上沒有幾個人能夠注意到，因為廣場上所有的注意力此刻都在議論聲裡流動，沒有人在這個時候緊盯著她一個人的肩膀。</p>\n<p>但那個小小的下沉，是真實的。</p>\n<p>是維持了整段時間的緊繃，在那個最後的背影消失之後，找到了一個允許自己鬆開一點點的空間。</p>\n<p>只是一點點。</p>\n<p>她的手指，一直攥著霜翎的靈能，這時候也慢慢鬆開，霜翎感受到那個鬆開，在她身側輕輕蹭了蹭她的手背，毛茸茸的，溫熱的，不像一個靈契，更像是一個細心的、陪伴了她很久的朋友，在說：沒事了，沒事了。</p>\n<p>衣袖被風吹起來，她沒有動，就讓那個風把衣袖掀著，把霜翎的尾毛吹散著，讓廣場的陽光落在她面前空了出來的那一段地面上。</p>\n<p>慕容玄不在了。</p>\n<p>她沒有動。</p>\n<p>不是因為腿軟，不是因為害怕，就是站著，讓自己在這個位置再多站一會，讓剛才那段時間裡身體裡所有緊繃的東西，慢慢地、安靜地落回去。</p>\n<p>---</p>\n<p>白無極走到她身後。</p>\n<p>他沒有繞到她前面來，沒有走到她旁邊，就是走到了她的身後，停下，在她背後大概半步的距離站定。</p>\n<p>沒有說話。</p>\n<p>他沒有說「謝謝」，沒有說「你幹嘛擋在我前面」，沒有說任何話。</p>\n<p>他就只是站到了她的後面，讓他的影子在陽光的角度下，輕輕地落在她的背上，那個影子不完整，不能擋住什麼，但它在那裡。</p>\n<p>蘇念卿感覺到了身後的那個存在。</p>\n<p>她沒有回頭。</p>\n<p>風繼續吹，廣場的嘩然聲繼續在他們周圍流動，霜翎轉了個方向，把腦袋輕輕頂了一下蘇念卿的手心，然後抬起頭，往白無極的方向看了一眼，那雙銀色的眼睛裡有什麼東西，安靜的，帶著某種只有陪伴了主人很多年才會有的透徹。</p>\n<p>然後霜翎把頭收回來，趴在蘇念卿的腳邊，尾巴環繞著她的踝，低下去，安靜了。</p>\n<p>蘇念卿站在那裡，白無極站在她身後，兩個人都沒有說話。</p>\n<p>他們就是這樣站著，廣場的聲音在他們周圍，陽光在他們周圍，風在他們周圍，天契城此刻所有的熱鬧和議論都在他們周圍，而他們站在那些東西的中間，有一種奇怪的、安靜的、不需要用語言確認的東西，在兩個人之間，輕輕地存在著。</p>\n<p>---</p>\n<p>遠處的高台上，蘇長淵收回了他望向廣場中央的視線，轉過身去，沒有說話，但嘴角動了一下，那個動的幅度很小，帶著一種只有他自己才知道意味著什麼的東西。</p>\n<p>身後有人問：「家主，現在怎麼辦？」</p>\n<p>蘇長淵說：「等。」</p>\n<p>「等什麼？」</p>\n<p>「等他們自己想明白。」他往出口的方向走，聲音很平，「比我催有用。」</p>\n<p>---</p>\n<p>另一個方向，天契城的某條街道上，慕容玄停住了腳步。</p>\n<p>他站在那裡，看著手掌心的那條紅痕，那條痕跡已經開始淡去，這種程度的傷對他來說是一件幾乎不值得被注意的事情，但他看著它，心裡在轉動的，是另外的東西。</p>\n<p>那個「傳說中的力量」。</p>\n<p>那不是比喻，那是一個他在一卷殘篇裡讀到過的記載，那卷殘篇的年代比天衍大陸有可靠記憶的歷史還要更早，是一個用那個時代的語言描述的記錄，描述的是一種不屬於這個世界的力量，一種讓世界靜止的力量，一種賜予無機物生命的力量，一種從另一個地方來的東西。</p>\n<p>殘篇說那種力量叫做——</p>\n<p>慕容玄把這個念頭收起來，繼續往前走。</p>\n<p>有些事，不是今天可以談清楚的。</p>\n<p>但有一件事，他今天已經確定了：</p>\n<p>那個少年，不是天衍大陸上生長出來的。</p>\n<p>他帶著某種他自己可能都還不完全清楚的力量，從某個地方來到了這裡，踩在這片土地上，在天契大比上展示了那個力量的一角，讓慕容玄自己的掌心出現了幾十年來的第一條傷痕。</p>\n<p>下次再談。</p>\n<p>慕容玄的腳步重新走起來，穿過天契城的街道，往他的方向去，身後是剛才廣場上的餘波還沒有完全消散的熱鬧，身前是他自己的路。</p>\n<p>那條路的終點，他還不知道，但他已經確認了，有什麼東西，正在開始。</p>"}, {"title": "第71章_憤怒", "content": "<p>第71章　憤怒</p>\n<p>廣場上的人散了。</p>\n<p>不是一下子散的，是慢慢散的。慕容玄那道背影消失在長街拐角之後，圍觀的人先是呆了幾息，然後竊竊私語，然後陸陸續續往後退，往旁邊走，往四面八方分流——像一池水找到了缺口，安靜地瀉走。</p>\n<p>沒有人敢大聲說話。</p>\n<p>天契城今夜發生的事，已經超出絕大多數人能消化的範疇。契聖親自出手，然後又親自撤退。那個穿灰布衣的少年，拿著一把像是純靠蠻力打出來的拳頭，硬生生撐住了。</p>\n<p>這不合邏輯。但它就發生了。</p>\n<p>最後，廣場上只剩兩個人。</p>\n<p>白無極站在原地，低頭看著自己的右臂。</p>\n<p>袖子半捲著，小臂上青紫已經從撞擊點往兩端蔓延，像幾條分叉的河流。他把手臂舉起來，試著握了握拳——指節都能動，骨頭應該沒斷，但那股麻意從肘關節一路竄到肩膀，像有什麼東西在裡面持續震盪，不肯散去。</p>\n<p>「白金之星。」他在心裡開口。</p>\n<p>「嗯。」</p>\n<p>「你當時是不是打了全力？」</p>\n<p>沉默了一秒。</p>\n<p>「九成。」</p>\n<p>「你能打出的力量，讓一個契聖受了傷。」</p>\n<p>「他也傷了你。」</p>\n<p>「但他是契聖。」白無極把手臂放下，袖子還是半捲著，沒整理。「我只是個……」他頓了頓，沒把那句話說完。</p>\n<p>身後有腳步聲。</p>\n<p>蘇念卿走過來，站在他斜後方兩步的位置。她的劍還在，霜翎已經收縮回她肩頭，尾巴攏在胸前，銀色眼睛依然睜著，往廣場四角掃。</p>\n<p>沒有人了。都走了。</p>\n<p>白無極靜默了片刻，然後回頭。</p>\n<p>蘇念卿的臉色比平時更白，但那種白不是嚇到的白——是繃緊的白，是把所有情緒都壓死在表情底下之後呈現出來的那種靜。她的手仍然搭在劍柄上，還沒收。</p>\n<p>白無極開口，聲音很平：「下次不用擋。」</p>\n<p>蘇念卿看著他。</p>\n<p>「我沒在幫你。」</p>\n<p>白無極挑了一下眉。</p>\n<p>「我是在阻止不必要的傷亡。」她的語氣不帶任何波動，像在敘述一件客觀事實，「場面已經夠難看了，再讓它繼續下去，天契城廣場就得重建。」</p>\n<p>白無極：「那個傷亡是指哪個？」</p>\n<p>停頓。</p>\n<p>蘇念卿：「他的。」</p>\n<p>白無極愣了整整一秒。</p>\n<p>他看著蘇念卿的臉，那張臉一如既往地面無表情，眼神是她一貫的那種淡漠——像隔著一層毛玻璃，看得見輪廓，摸不著溫度。她說這句話的方式和說「我沒在幫你」完全一樣，平靜，直接，不帶任何修飾。</p>\n<p>但意思完全不一樣。</p>\n<p>她是說：她衝進來不是為了保護他，是因為她覺得他已經有了壓倒慕容玄的實力，而她需要攔住他，不讓他把一個契聖打出什麼意外。</p>\n<p>她是說：她相信他贏得了。</p>\n<p>白無極沉默了兩秒，然後笑了。</p>\n<p>不是那種哈哈大笑，是從嘴角開始的那種笑，很輕，有點無奈，帶一點說不清楚的東西。他低下頭，右手捏了捏左手手指，讓那股麻意稍微散一點。</p>\n<p>「行。」他說，「那下次繼續阻止不必要的傷亡。」</p>\n<p>蘇念卿沒說話。</p>\n<p>但霜翎輕輕晃了一下尾巴。</p>\n<p>---</p>\n<p>就在這一刻，腦海深處有什麼東西動了。</p>\n<p>白無極第一反應是皺眉——他已經習慣精神金球的存在，那顆沉在意識最底層的球形結構，平時安靜地待在那裡，像一顆壓艙石。偶爾共鳴，偶爾震動，但今晚這一下，不一樣。</p>\n<p>像是什麼東西在用力推一扇門。</p>\n<p>從裡面推。</p>\n<p>「白金之星。」</p>\n<p>「我感覺到了。」</p>\n<p>「這是什麼？」</p>\n<p>白金之星的聲音比平時低沉了一個音調，帶著一種白無極從未從它身上聽到過的東西——不是緊張，是某種很接近期待的情緒：「是進化的前兆。」</p>\n<p>「什麼進化？」</p>\n<p>「你現在問這個太早了。」白金之星說，「睡一覺。你受傷了，今晚不要繼續動。」</p>\n<p>白無極把那股震盪壓下去，重新捲好袖子。</p>\n<p>他抬頭，蘇念卿還站在那裡，沒走。</p>\n<p>「回去了嗎？」他問。</p>\n<p>「嗯。」</p>\n<p>兩個人並排往出口走，霜翎縮在蘇念卿肩上，步伐很安靜。廣場的地磚在夜風下透著一股涼意，白無極右手習慣性地插進口袋，左手自然地垂著，走路的樣子比剛才輕鬆了很多——好像剛才什麼都沒發生過。</p>\n<p>蘇念卿從眼角瞥了他一下。</p>\n<p>他的肩膀還帶著傷，她看得出來，但他不說。</p>\n<p>她沒問。</p>\n<p>快到街口的時候，白無極突然說：「蘇念卿。」</p>\n<p>她沒停，繼續走：「什麼。」</p>\n<p>「謝謝。」</p>\n<p>很短，兩個字，說得很快，幾乎是在說完之後馬上接了另一句話：「雖然你說不是在幫我，但還是謝謝。」</p>\n<p>蘇念卿沒有回頭。</p>\n<p>她走了三步，才開口，聲音很平：「你記錯了，我說我是在阻止傷亡。」</p>\n<p>「對，謝謝你相信我能傷他。」</p>\n<p>又一個沉默。</p>\n<p>然後蘇念卿說了一個字：「走。」</p>\n<p>她往前走，步伐比剛才快了半拍。</p>\n<p>霜翎側過頭，銀色的眼睛從蘇念卿肩上往白無極方向看了一眼，然後很快看回去，像是什麼都沒瞧見。</p>\n<p>白無極跟上。</p>\n<p>腦海深處，那扇門繼續在被推著，穩定，持續，不急不躁——像潮水，像某個已經啟動了的機關，在等待合適的時機，將它完全打開。</p>\n<p>他把右手從口袋裡拿出來，搓了搓，把那股殘餘的麻意揉散。</p>\n<p>「白金之星，」他在心裡說，「你說進化，進化成什麼？」</p>\n<p>沉默了幾秒。</p>\n<p>「更快的你。」</p>\n<p>白無極在夜風裡，沒說話，但嘴角又往上動了一下。</p>\n<p>街道燈籠的橘光灑在石板路上，把兩道影子拉得很長，幾乎重疊在一起。</p>"}, {"title": "第72章_白金之星TheWorld", "content": "<p>第72章　白金之星：The World</p>\n<p>深夜。</p>\n<p>客棧三樓的房間窗戶半開，夜風從天契城北面吹進來，帶著街道最後一點人聲散盡之後的那種安靜。燈油燃到一半，燈芯結了一個小小的燈花，火苗在微風中輕輕偏了一下，又站直。</p>\n<p>白無極側躺在床上，一隻手臂壓在枕頭下，一隻手臂順著身體放著。</p>\n<p>他在淺眠。</p>\n<p>受傷之後他睡得比平時輕，這不是第一次了——八極拳練到他這個程度，身體受到重擊之後有一套自己的修復機制，他知道，所以讓黃金體驗慢慢工作，自己閉上眼睛，等天亮。</p>\n<p>然後金球動了。</p>\n<p>不是輕輕動，是猛地一震。</p>\n<p>白無極幾乎是被整個彈起來的——他人還在睡，但那個震動直接穿透了意識的表層，像誰在他腦袋正中間拍了一掌。他睜開眼睛，呼吸急促，瞳孔收縮了一秒才重新放大，把屋頂的木樑看清楚。</p>\n<p>腦海裡面，精神金球在發光。</p>\n<p>不是平時那種隱約的光暈，是真正在發光，像是一顆縮小版的太陽被壓縮在顱骨裡面，金色的輻射把意識空間的每個角落都照得刺目。白金之星的共鳴聲已經到了他前所未有的頻率——那聲音不像聲音，更像是振動，直接作用在他的每一個神經上。</p>\n<p>「白金之星——」</p>\n<p>「別說話。感受它。」</p>\n<p>白無極閉上嘴。</p>\n<p>他仰著，盯著屋頂，讓那道光在腦海裡擴散。</p>\n<p>它往外推，推那扇昨天就開始在動的門，這次的力道比昨天大了十倍。白無極感覺到一種很奇異的感覺——像是骨骼在延伸，像是皮膚之外還有一層什麼東西在成形，像是他的感知半徑突然往外擴了一圈，把周圍幾十米的空氣、溫度、氣流全部都納了進來。</p>\n<p>然後，時間停了。</p>\n<p>他知道這個感覺。</p>\n<p>但這一次不一樣。</p>\n<p>一秒過去了——他數著，一，意識清晰地計數——時間沒有重啟。</p>\n<p>兩秒。</p>\n<p>三秒。</p>\n<p>燈火靜止在那裡，火焰像一片被按住的橘色絲綢，紋絲不動。窗外的夜風在推開窗扇的那個瞬間被定格了，窗扇停在半空中，木框的影子斜切在地板上，像一幅畫。</p>\n<p>四秒。</p>\n<p>白無極從床上坐起來。</p>\n<p>動作很慢，像不確定自己的腳踩下去會不會破壞什麼。他站起身，走到窗邊，把窗扇推開——它在他手裡移動，然後停在新的位置，繼續靜止。他把手伸出窗外。</p>\n<p>外面的世界是靜的。</p>\n<p>不是安靜，是「靜止」。</p>\n<p>街道上有一個夜巡的兵丁，正好走到客棧門口正前方，他提著一盞燈籠，燈籠在行走的慣性裡往前盪著，現在定格在最高點，那抹橘光灑在青石板路上，一寸都沒移動。那個兵丁的腳踩在半空中，靴子尖朝下，離地大概三寸。</p>\n<p>有一隻飛蟲，在燈籠旁邊，翅膀展開，懸在空中。</p>\n<p>有三片葉子從路邊的樹上脫落，三片葉子都在空中，最高的那片離樹幹還有半臂遠，最低的那片距地面只剩一拳。它們靜止在墜落軌跡的各自節點，像三個小小的逗號，斷在句子的中間。</p>\n<p>街道盡頭，一個提著燈的老人走到門口，正要伸手去夠門閂，手懸在半空。</p>\n<p>天上，一隻夜鳥。</p>\n<p>夜鳥的翅膀在下拍的弧度裡停住，羽毛張開，每一片羽毛的紋路都清晰到白無極幾乎能在這個距離看見。</p>\n<p>五秒。</p>\n<p>白無極輕輕呼出一口氣。</p>\n<p>時間重啟了。</p>\n<p>燈籠繼續盪，兵丁的腳踩下去，三片葉子繼續落，老人的手摸到門閂，夜鳥拍翅飛走。飛蟲繞了半圈，落到燈籠框上，停了一會兒，又飛走了。</p>\n<p>什麼都沒有改變。</p>\n<p>世界繼續往前走，完全不知道它剛才停了整整五秒。</p>\n<p>白無極站在窗口，把手臂收回來，放在窗框上，身體微微前傾，看著底下的街道，看著燈籠繼續搖，看著夜風把三片葉子帶著吹遠，落在排水溝邊上。</p>\n<p>他說了一句話，聲音很輕，但很清楚：</p>\n<p>「五秒。」</p>\n<p>腦海裡，白金之星沒說話。</p>\n<p>但那道共鳴的振動在這一刻，以一種白無極只能用「滿足」來形容的頻率，慢慢低了下去。</p>\n<p>---</p>\n<p>白無極把窗扇重新帶上，回到床邊坐下。</p>\n<p>黃金體驗的光在他周身輕輕流動著，修復著手臂深處那條還未完全癒合的青紫，速度比平時快了一些——像是精神金球進化之後，連帶著把旁邊的鄰居也帶動了一下。</p>\n<p>他把右手翻過來，手心向上。</p>\n<p>金色的光在掌心聚了一下，然後散開，像一個很輕的呼吸。</p>\n<p>「進化了？」他問。</p>\n<p>「是。」白金之星說，聲音比平時沉，但穩，「The World。時間停止，從一秒到五秒。」</p>\n<p>「The World。」白無極把這個名字在嘴裡過了一遍，「是個新名字嗎？」</p>\n<p>「是它告訴我的。」白金之星說，語氣裡有什麼說不清楚的東西，「這個力量有自己的名字。它叫The World。」</p>\n<p>白無極沉默了一會兒。</p>\n<p>「停五秒，」他說，「那五秒裡我能做什麼？」</p>\n<p>「任何事。」</p>\n<p>他把這兩個字消化了一秒，然後問了一個很實際的問題：「我能打多少拳？」</p>\n<p>白金之星停頓了一下：「……你明天去找個石壁試試。」</p>\n<p>「好，」白無極說，躺回去，把手臂蓋上被子，閉上眼睛，「睡了。」</p>\n<p>他睡著得很快。</p>\n<p>受傷的手臂在黃金體驗的流光裡慢慢修復，精神金球安靜地停在意識深處，像一顆真正的星球，在內部完成了某次地殼的重組之後，重新恢復了平靜。</p>\n<p>窗外，夜鳥叫了一聲，又飛遠了。</p>\n<p>天契城的夜，繼續往前走。</p>\n<p>沒有什麼人知道，在這個普通夜晚的三樓窗口，世界曾經靜止了五秒。</p>\n<p>---</p>\n<p>那五秒裡，只有一個人是醒的。</p>\n<p>他站在那個靜止的世界裡，看著夜風定格，看著燈火凝固，看著一隻翅膀展開的飛蟲停在空中——什麼也沒做，只是看著。</p>\n<p>只是站在靜止的世界的中央，感受那種完全的、絕對的，屬於他一個人的靜。</p>\n<p>這不是力量的震撼，這是某種更深的東西。</p>\n<p>他說「五秒」的時候，語氣很輕，像是在確認一個數字。</p>\n<p>但那兩個字裡面，有一種他自己也說不清楚的重量。</p>\n<p>像是某扇門，開了。</p>\n<p>門的後面，是他完全還不知道的東西。</p>\n<p>但他站在那裡，沒有退縮，只是靜靜地看著門開，然後在五秒後，讓世界繼續走。</p>"}, {"title": "第73章_五秒的暴風雨", "content": "<p>第73章　五秒的暴風雨</p>\n<p>天契城東郊有一片廢棄的採石場。</p>\n<p>不知道是多少年前的東西了，石壁被切得七零八落，留下幾面最難啃的料石豎在那裡沒人動，風吹日曬了幾十年，表面長了一層苔蘚，縫隙裡紮了幾株野草，看起來很穩重，也很無辜。</p>\n<p>清晨，天剛亮，薄霧還沒散，白無極一個人走進採石場，在最大的那面石壁前站定。</p>\n<p>石壁大概三米高，五米寬，全是實心石料，比城牆薄，但也不是隨便什麼力道能動搖的東西。他在石壁前站了一會兒，把距離估了估，往後退了三步。</p>\n<p>「白金之星，準備。」</p>\n<p>「你確定不需要暖身？」</p>\n<p>「打拳本身就是暖身。」</p>\n<p>白金之星停頓了一下：「……有道理。」</p>\n<p>白無極把右腳往後撤半步，站定，把手臂抖了抖——昨晚的傷養了一個整覺，黃金體驗的修復讓手臂恢復了八成，剩下兩成還有點隱痛，但不影響動作。他把受傷那條手臂繞了兩圈，感覺了一下，沒什麼問題。</p>\n<p>他深呼一口氣。</p>\n<p>「啟動。」</p>\n<p>時間停止了。</p>\n<p>世界驟然靜默下來，晨霧凝在空中，那些細碎的水霧顆粒全部停在各自的位置，採石場裡連蟲叫聲都消失了，只剩下白無極自己的呼吸聲和心跳聲，在這個絕對靜止的世界裡顯得異常清晰。</p>\n<p>白金之星出現了。</p>\n<p>準確說是白金之星完全顯形了——那道星空色的光在白無極周身鋪開，鎧甲的輪廓在一秒之內成形，膝蓋、脅腹、肩甲、前臂，一片片扣上，表面有細密的紋路在流光裡明滅，像是把星圖刻在了金屬表面。</p>\n<p>沒有人看得見。</p>\n<p>只有白無極感覺得到。</p>\n<p>然後他動了。</p>\n<p>第一拳——貫頂。八極拳根式，發力從腳跟起，過腰，穿肩，整條脊柱的力量在肘關節一折疊就全部出來，拳面打在石壁正中央，石屑四濺，一個碗口大小的坑洞出現了，就這樣靜靜地停在那裡，因為時間停了，連石屑都飛出去半臂遠就停住，凝在空中，每一片都清晰得像是標本。</p>\n<p>第二拳，第三拳，第四拳。</p>\n<p>他打得很快，比平時更快——白金之星的鎧甲不是裝飾，是他的力量本體，穿上它的時候他的速度和爆發力都在提升，現在又加上時停的五秒，他在這個沒有任何阻力的靜止世界裡全力輸出，身形快到幾乎只剩殘影。</p>\n<p>他沿著石壁往右移，打完一條線，往上移半臂高，繼續。</p>\n<p>五，六，七，八。</p>\n<p>石壁在沉默中被啃掉一層又一層，每個坑洞都精確地出現在它被打到的位置，停在那裡，沒有聲音，沒有回響，就像是在一塊泥板上用手指一個一個戳出來的。</p>\n<p>白無極打到十五拳的時候，右側的石壁上出現了一條細縫。</p>\n<p>他注意到了，停了一下，往旁邊移了半步，繼續打。</p>\n<p>二十，二十五，三十。</p>\n<p>四十。</p>\n<p>五十。</p>\n<p>石屑停在空中，越積越多，已經形成了一層薄薄的懸浮霧靄，蓋在石壁面前，把整個場景弄得有點像古畫裡的山水——有墨，有塵，有靜，有某種說不清楚的壯觀。</p>\n<p>白無極在六十拳的時候手腕有一點發酸。</p>\n<p>他把發力方式調了一下，從直拳換成鑽拳，速度稍微降了一點，穿透力提上去。</p>\n<p>六十五，七十，七十五。</p>\n<p>第八十拳打出去的瞬間——時間重啟了。</p>\n<p>聲音轟然炸開。</p>\n<p>那八十拳的力道在時間恢復的一瞬間全部釋放出來，所有凝固在空中的石屑像炮彈一樣往四面八方飛射，白無極本能地往後跳了一步，用手臂護著臉，石塊噼裡啪啦打在地上、打在旁邊的石壁上、打在他的手臂上，劈得袖子上全是白點。</p>\n<p>然後是石壁倒塌的聲音。</p>\n<p>不是整面倒，是中央那大半被打空了，剩下的石料支撐不住，「轟」的一聲往右邊垮下去，揚起一大片灰塵。</p>\n<p>白無極站在灰塵裡，拍了拍袖子上的石粉，把手臂翻過來，看著一個個淺淺的紅印——石屑打的，不深，但不少。</p>\n<p>他數了數面前那片廢墟上的坑洞——石壁已經大半崩了，他只能數沒完全崩掉的那部分殘餘，比照著估算了一下。</p>\n<p>「大概八十拳。」他說。</p>\n<p>白金之星：「精確一點，七十八。」</p>\n<p>「差不多。」</p>\n<p>他把手拍了兩下，把石粉抖掉，轉身往採石場外走，神態跟剛才打完一趟套路差不多。</p>\n<p>---</p>\n<p>第二天早上，天契城裡傳開了一個消息：東郊廢棄採石場不知道昨晚發生了什麼，最大的那面石壁垮了大半，石料散了一地，還有幾十個形狀奇怪的坑洞。有人說是採礦的工人幹的，有人說是有契師在那裡試法術，眾說紛紜。</p>\n<p>蘇念卿聽說這件事是在吃早飯的時候。</p>\n<p>負責採購的下人回來，順口說了幾句，說外面都在議論。蘇念卿放下筷子，想了一下，然後把筷子重新拿起來，繼續吃。</p>\n<p>霜翎趴在她腳邊，把一塊肉咬碎，抬頭看了她一眼。</p>\n<p>蘇念卿沒說話，但表情微微變了一下——那種變化非常細微，只有一直盯著她看的人才能察覺，像是某個想法在腦子裡落了地，然後被她壓下去了。</p>\n<p>飯後，她把白無極叫過來，在客棧廊下站著。</p>\n<p>白無極正在啃一個燒餅，見她過來，往旁邊讓了讓。</p>\n<p>蘇念卿站在他面前，從他臉上往下看了一遍，最後把視線落在他袖子上。</p>\n<p>他袖子上有幾個小紅點，石屑打的，沒怎麼處理，結了薄薄的痂。</p>\n<p>「東郊的石壁，」她說，「你做的？」</p>\n<p>白無極把燒餅咬了一口，嚼了嚼，嚥下去：「測試。」</p>\n<p>蘇念卿：「……」</p>\n<p>她看著他一秒，然後看了看他手臂，然後往廊柱上靠了靠：「測試什麼？」</p>\n<p>「五秒裡能打多少拳。」</p>\n<p>「幾拳？」</p>\n<p>「八十。」</p>\n<p>蘇念卿沉默了。</p>\n<p>白無極繼續啃燒餅：「準確說是七十八，白金之星說我數錯了。」</p>\n<p>蘇念卿的視線在他臉上停了很久，像是在做一道計算題——把七十八這個數字，代入她對白金之星力量的了解，代入她昨晚看到他震退慕容玄的畫面，算一個結果出來。</p>\n<p>算完，她的表情沒有什麼特別大的變化，但沉默的質量不一樣了。</p>\n<p>「……五秒。」她最後說。</p>\n<p>「對。」</p>\n<p>「原來是一秒的。」</p>\n<p>「進化了。」白無極把燒餅最後一口吃掉，拍了拍手上的芝麻，「昨晚進化的。」</p>\n<p>蘇念卿：「昨晚。」</p>\n<p>「嗯，」白無極說，「你說你讓我想起傳說中的力量，那句話你知道是什麼意思嗎？」</p>\n<p>蘇念卿沉默了片刻：「慕容玄說的是你，不是我。」</p>\n<p>「我是說——」</p>\n<p>「我知道你說的是什麼。」她看著他，「我不知道那句話的意思。但我覺得你最好也弄清楚。」</p>\n<p>白無極把她這句話收進去，沒有繼續問。</p>\n<p>霜翎從廊下跑出來，往白無極腳邊嗅了嗅，找到了一塊他沒注意掉在地上的燒餅碎屑，低頭吃掉了，然後抬頭看了他一眼，又看了看蘇念卿。</p>\n<p>蘇念卿：「你測試得挺起勁的。」</p>\n<p>白無極：「有石壁不用白不用。」</p>\n<p>「那面石壁現在是廢墟。」</p>\n<p>「它本來就是廢棄的，」白無極理直氣壯，「我替它完成了最後的使命。」</p>\n<p>蘇念卿看了他一眼，沒說話，往屋裡走。</p>\n<p>走到廊門口，她頓了一下，沒回頭：「手臂那幾個石屑傷，回頭讓霜翎給你處理一下。」</p>\n<p>白無極低頭看了看袖子上那幾個痂：「不用，小傷，自己會好。」</p>\n<p>停頓。</p>\n<p>「讓霜翎處理。」她說，語氣比剛才平了一個度，不容置疑，然後走進去了。</p>\n<p>霜翎在旁邊看了白無極一眼，尾巴搭搭地擺了擺，轉身跟著蘇念卿進去了，走得很自然，像是在說：你聽見了，你知道怎麼做。</p>\n<p>白無極站在廊下，看著霜翎的小銀色尾巴消失在門口，摸了摸袖子上的石屑痂，笑了笑。</p>\n<p>採石場的廢墟在城東，正好迎著早晨的太陽，光把那些新鮮的斷口照得很亮，石英的碎片在陽光裡閃著細碎的光。</p>\n<p>沒有人知道那些坑洞是怎麼來的。</p>\n<p>只有白無極和一把看不見的替身知道。</p>"}, {"title": "第74章_黃金體驗Life", "content": "<p>第74章　黃金體驗：Life</p>\n<p>那隻蜥蜴是十天前召喚出來的。</p>\n<p>白無極召喚它的時候沒想太多，只是需要一個偵查用的小東西，在一次探查慕容家布置的時候把它丟出去讓它繞場地跑了一圈，用完之後就讓它在口袋裡待著——他以為它會像之前所有被黃金體驗召喚出的生物一樣，幾分鐘之後慢慢暗淡，然後消失，回歸成一把金光散掉。</p>\n<p>但它沒有消失。</p>\n<p>它在口袋裡待了一個整天，偶爾動一下，白無極睡覺的時候它跑出來，在床板上繞了幾圈，清晨白無極醒的時候它趴在他枕頭邊上，眼睛圓溜溜的，直直地看著他。</p>\n<p>白無極當時愣了一秒，然後把它拿起來：「……你怎麼還在？」</p>\n<p>蜥蜴沒有回答，但是把他拇指蹭了一下。</p>\n<p>這是第一個訊號。</p>\n<p>然後是更多的跡象：它開始自己找東西吃。白無極早上出門的時候把它放在房間裡，回來發現窗臺上少了幾隻小蟲，盤子邊上有一小塊沒吃完的餅，被啃了個角。它能在房間裡自己活動，能自己喝水，能在白無極回來的時候爬到他手上蹭。</p>\n<p>它有自己的意志了。</p>\n<p>白無極把這件事翻來覆去想了兩天，把黃金體驗叫出來問：「它是怎麼回事？」</p>\n<p>黃金體驗的聲音比白金之星更暖，帶著一種說不清楚的生機感：「它是活的。」</p>\n<p>「它一開始就是活的。」</p>\n<p>「不，」黃金體驗說，「它一開始是我創造的一個功能性的存在，它的心跳、呼吸、爬行，都是我維持的。現在，它有了自己的生命力，不再需要我維持了。」</p>\n<p>「你是說它獨立了？」</p>\n<p>「算是。但它還和你有連結，因為它本來就是從你的精神力生出的。這個連結不會斷，除非你主動斷它，或者它自然死亡。」</p>\n<p>白無極把那隻蜥蜴放在掌心，它在他手心裡轉了個方向，把腦袋對著他，吐了一下舌頭。</p>\n<p>「那它能活多久？」白無極問。</p>\n<p>「說不準，」黃金體驗說，「它是新物種，沒有參考。但我猜，至少比同類的野生蜥蜴長。」</p>\n<p>白無極把這個資訊消化了一下，然後問了更重要的問題：「那它還能幫我偵查嗎？」</p>\n<p>「可以，」黃金體驗說，「而且現在更好用了。你能感知到它的狀態，它看到的東西你能感受到，它受的傷你也能感受到——像是多了一雙眼睛，一副耳朵，但不在你的頭上，在它身上。」</p>\n<p>白無極想了想：「那我多召喚幾隻——」</p>\n<p>「你想的我知道，」黃金體驗說，話音裡有一絲輕巧的什麼，「只要你願意，是可以召喚更多的，每一隻都能和你有這樣的連結。你的感知可以分配到每一隻上面，但同時接收太多個體的訊號會讓你頭疼。建議不要超過三隻。」</p>\n<p>「四隻。」</p>\n<p>「……三隻。」</p>\n<p>「我試試四隻。」</p>\n<p>黃金體驗沉默了一秒：「隨你。頭疼了別來找我抱怨。」</p>\n<p>白無極把蜥蜴放回手背，它沿著他的手臂往上爬，到了肩膀的位置停下來，把腦袋搭在他頸側，待著不動，曬太陽。</p>\n<p>---</p>\n<p>他給蜥蜴起了個名字，叫「偵查兵一號」。</p>\n<p>蜥蜴不在意這個名字，它在意的事情主要是：白無極的手背比窗臺暖，白無極的口袋裡偶爾有吃的，以及霜翎靠近的時候要記得往白無極頭頂跑。</p>\n<p>霜翎對這隻蜥蜴的態度很微妙——不是想吃，但看著不太順眼，像是一種莫名的領地意識被輕微冒犯了。第一次正式照面是在廊下，霜翎從旁邊走過，停下來，和蜥蜴大眼瞪小眼了足足有十秒，然後繼續走，走了兩步，回頭又看了一眼，才走掉。</p>\n<p>白無極當時把這個過程全看在眼裡，沒說話，但憋著笑。</p>\n<p>蘇念卿比他看得早，她側過臉，表情一絲不動：「霜翎是在宣示主權。」</p>\n<p>白無極：「主誰的權？」</p>\n<p>「這個院子的。」蘇念卿說，話說完，把視線移回去，繼續看手裡的書。</p>\n<p>白無極覺得這個答案可能不完全準確，但他沒說。</p>\n<p>---</p>\n<p>進化還不止這些。</p>\n<p>白金之星進化完之後的第二天，白無極發現治療能力也有了變化。</p>\n<p>他在採石場留下的那幾個石屑傷，輕微的小劃口，在被霜翎的冰晶敷過之後，他用黃金體驗輔助了一下——原本他預計這種程度的傷需要一個上午慢慢收口，但他的手按上去，金光流過，傷口在二十秒之內就閉合了。</p>\n<p>連痂都沒結，直接長好了。</p>\n<p>白無極把袖子擼起來確認了三遍。</p>\n<p>「治療能力也進化了？」他問黃金體驗。</p>\n<p>「是，輕傷的處理快了大概六到八倍，重傷也能加速，但重傷涉及到的組織量大，加速有限，大概是原來的兩倍。」黃金體驗說，「骨折、臟器損傷之類的，依然需要時間，但會比以前快很多。」</p>\n<p>「那昨晚慕容玄震我的那條手臂——」</p>\n<p>「如果是昨晚發生的，今天應該已經全好了。」黃金體驗說，「你進化的時機正好，在傷養好之前完成了，所以修復的後半段是新的速度，比你預計的快了一天。」</p>\n<p>白無極翻了翻手臂，確認了一下，確實沒有任何殘留的麻意了。</p>\n<p>他把手臂放下，坐在窗邊，讓偵查兵一號在他手上爬了一圈。</p>\n<p>蜥蜴爬到他手背，停下來，把下巴貼在他拇指關節上，眼睛細細的縫了起來，享受著手背的溫度。</p>\n<p>白無極低頭看著它，想到一個問題：「我能用黃金體驗治療它嗎？」</p>\n<p>「它是你精神力生出的，它和你有連結，所以理論上可以，」黃金體驗說，「但它應該不需要，它現在挺健康的。」</p>\n<p>白無極把蜥蜴的腦袋戳了一下，蜥蜴動了一下，把頭偏向旁邊，繼續曬太陽。</p>\n<p>「挺好的。」白無極說。</p>\n<p>---</p>\n<p>黃金體驗進化的消息，白無極沒有主動告訴蘇念卿，但蘇念卿察覺了。</p>\n<p>她是怎麼察覺的，白無極沒問，但大概能猜到——她是獸契師，對生命力的感知比普通人更敏感，偵查兵一號從一個「功能性創造物」變成一個「真正的生命體」，她很可能很早就感覺到了，只是沒說。</p>\n<p>她說的是另一件事。</p>\n<p>「你手上那隻蜥蜴，」她在某個下午，頭也不抬地說，「不是普通的創造物了。」</p>\n<p>白無極：「對。」</p>\n<p>「它現在算是你的契約獸嗎？」</p>\n<p>白無極想了想：「不是，它和我的關係比契約更深，又比契約更鬆散。它有自己的意志，我們只是有連結。」</p>\n<p>蘇念卿抬起頭，看了他一眼，然後看了看偵查兵一號。</p>\n<p>偵查兵一號此刻趴在白無極的肩膀上，回看了蘇念卿一眼，然後把腦袋轉向旁邊，裝沒看見。</p>\n<p>蘇念卿：「……」</p>\n<p>「它有點社交恐懼，」白無極說，「不太理陌生人。」</p>\n<p>「它才存在十天。」</p>\n<p>「天賦。」</p>\n<p>蘇念卿重新把視線放回書上，沉默了片刻，然後說：「你在進化。」</p>\n<p>不是疑問句，是陳述。</p>\n<p>「是，」白無極說，「兩個替身都是。」</p>\n<p>「進化的節點，」她說，聲音沒什麼起伏，「和慕容玄那場有關係嗎？」</p>\n<p>白無極把這個問題想了一下：「可能有。但主要是那天蘇念卿你衝進來，」他說，「然後說了一句那個傷亡是指他的。我笑了。就是那個時機。」</p>\n<p>蘇念卿的手在書頁上停了一下。</p>\n<p>她沒有回頭，繼續翻頁：「牽強。」</p>\n<p>「不牽強，」白無極說，「我親歷的。」</p>\n<p>蘇念卿沒說話了。</p>\n<p>霜翎從她懷裡抬起頭，往白無極方向看了一眼，又往蘇念卿臉上看了一眼，然後重新把頭靠回去，閉上了眼睛。</p>\n<p>窗外，天契城的午後陽光把院子裡的石板路照得白亮，偵查兵一號在白無極肩上動了一下，往脖子的陰涼處挪了挪，繼續曬著能照到的那一半陽光。</p>\n<p>黃金體驗的光在白無極掌心輕輕流動著，不被人看見，金色而安靜，像一顆種子，在等待下一次需要它的時候，緩緩生長。</p>"}, {"title": "第75章_退場", "content": "<p>第75章　退場</p>\n<p>慕容玄拜訪蘇家的事，沒有任何人提前知道。</p>\n<p>不是大張旗鼓的拜訪，沒有侍從，沒有宣告，他一個人在清晨進了蘇家的正門，被門房引到客廳，等待了不到一盞茶的時間，蘇長淵就出來了。</p>\n<p>兩人談了多久，沒有外人知道。</p>\n<p>蘇家的下人們只知道蘇長淵在書房待了整整一個上午，連飯都是在裡面吃的，平時慣常午後處理的事務全部往後推。出來的時候，他臉色平靜，和往常沒有什麼不同，但有一個在蘇家服侍了二十年的老管家說，蘇家主今天抬頭看了很久的天。</p>\n<p>就這些。</p>\n<p>至於慕容玄說了什麼，沒有人知道。</p>\n<p>蘇念卿問過一次，蘇長淵只說：「他此行是為了表個態。」</p>\n<p>「什麼態？」</p>\n<p>「不為敵的態。」他停頓了一下，「他是個聰明人。」</p>\n<p>蘇念卿把這兩句話記下來，沒有繼續問。</p>\n<p>---</p>\n<p>慕容玄離開天契城是在同一天的下午。</p>\n<p>他走得和來時一樣，沒有任何排場，一個人，一匹馬，從天契城南門出。天契城的守門兵連他的臉都沒看清楚，只記得那匹馬走得很穩，馬上的人背脊很直，像一根插入地面的標杆，往前走，不回頭。</p>\n<p>但他在南門外停了一下。</p>\n<p>不是因為忘了什麼，是因為前面的路上，有一個人正好在走。</p>\n<p>白無極當時在南市買了幾個燒餅，準備回去，肩上趴著偵查兵一號，走得很悠閒，手裡拿著一個剛咬了一口的燒餅。他沒有事先知道慕容玄要走，也沒有預料到這次照面，只是路過，就這麼走到了慕容玄馬前三步的距離。</p>\n<p>兩個人對看了一眼。</p>\n<p>馬沒有停，但慢下來了。</p>\n<p>慕容玄在馬上低頭看著他，那雙眼睛和那天在廣場上沒有任何不同——沒有殺意，沒有憤怒，是一種比憤怒更深遠、也更複雜的東西。像是某個很老的人看著某個他不完全理解的事物的眼神。</p>\n<p>白無極站在路中間，把燒餅在手裡換了個位，等著。</p>\n<p>慕容玄開口，聲音不大，正好夠兩個人聽到：「那種力量，千年前曾讓整個大陸顫抖。」</p>\n<p>白無極沒說話。</p>\n<p>「你最好弄清楚自己是什麼，」慕容玄繼續說，語調是陳述，不是警告，更不是威脅，「在它吞噬你之前。」</p>\n<p>白無極把燒餅咬了最後一口，嚼了嚼，嚥下去。</p>\n<p>然後說：「謝謝提醒，」他說，「但我覺得是我在用它，不是它在用我。」</p>\n<p>慕容玄沉默了。</p>\n<p>他看著白無極，那個眼神從複雜慢慢變成了一種很難形容的東西，白無極想了一下，覺得那個東西最接近的詞大概是：「惋惜」。</p>\n<p>但不是為白無極惋惜，更像是為那句話本身，為這個答案，感到某種他一個人才能理解的、沉甸甸的嘆息。</p>\n<p>他沒有再說什麼。</p>\n<p>馬重新走起來，步伐平穩，往南門外走，走上官道，朝著遠處的山影馳去。蹄聲越來越遠，越來越輕，最後消失在道路的轉彎處。</p>\n<p>白無極站在原地，等那個背影完全消失，才把視線收回來。</p>\n<p>偵查兵一號在他肩上動了一下，把腦袋從他頸側挪出來，望了一眼遠處，然後縮回去，繼續趴著。</p>\n<p>白無極把燒餅剩下的那一塊放在手背，讓蜥蜴自己去決定要不要吃，低頭想了一會兒。</p>\n<p>腦海裡，白金之星開口了：「他說的『吞噬』——」</p>\n<p>「我知道。」白無極說，「我聽進去了。」</p>\n<p>「你剛才的答案是真心的嗎？」</p>\n<p>白無極沒有立刻回答，他把那句話在心裡翻了一下：「我覺得是我在用它，不是它在用我。」</p>\n<p>這是真心的，但它是不是事實，他不確定。</p>\n<p>「我不知道，」他最後說，「但我是這麼打算的。」</p>\n<p>白金之星沉默了一下：「我知道了。」</p>\n<p>偵查兵一號把白無極手背上的燒餅碎啃了一半，剩下一半推到邊上，顯然不打算全吃，又把腦袋蹭回他脖頸，安靜地趴著。</p>\n<p>白無極把燒餅碎捏起來彈掉，轉身往回走。</p>\n<p>---</p>\n<p>那天晚上，蘇念卿把慕容玄離開的消息告訴白無極，用的是很平靜的語氣，像是在說一件普通的事務。</p>\n<p>白無極說：「我知道了，今天下午碰上了。」</p>\n<p>蘇念卿：「他說了什麼？」</p>\n<p>「他說那種力量千年前讓整個大陸顫抖，讓我弄清楚自己是什麼，在它吞噬我之前。」白無極一字不差地複述，然後補了一句，「他說話很有氣勢。」</p>\n<p>蘇念卿沉默了片刻，沒有評論「有氣勢」這一句，她問：「然後呢？」</p>\n<p>「我說謝謝提醒，但我覺得是我在用它，不是它在用我。」</p>\n<p>蘇念卿的視線在他臉上停了一下。</p>\n<p>「他有什麼反應？」</p>\n<p>「看了我很久，走了。」</p>\n<p>她低下頭，沉默。</p>\n<p>白無極看著她：「你覺得他說的是真的嗎？那個傳說？」</p>\n
