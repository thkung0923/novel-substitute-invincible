<p>蘇念卿沉默的時間比平時長了一點，然後才開口：「慕容玄見識過的東西比大多數人多，他不會拿空話說事。」</p>\n<p>「那千年前的那個力量——」</p>\n<p>「不知道。」她打斷，但聲音沒有不耐煩，「但我覺得你父親說的沒錯，」她說，說完停了一下，似乎意識到自己說錯人了，「我說的是蘇長淵，他說有個古籍你應該看看。」</p>\n<p>白無極挑眉：「什麼古籍？」</p>\n<p>「他沒說細節，他說明天請你過去。」蘇念卿站起來，把杯子放到桌上，「睡吧，明天早點過去。」</p>\n<p>她往門口走，走到一半，霜翎從角落裡跑出來跟上她，步伐輕盈得幾乎沒有聲音。</p>\n<p>白無極坐在原地，把慕容玄那句話又過了一遍：「在它吞噬你之前。」</p>\n<p>這個「它」，究竟指的是什麼？</p>\n<p>精神力的具現？還是別的什麼？</p>\n<p>還有那個「千年前讓整個大陸顫抖」，那個人最後去了哪裡，消失了嗎？消失在那場大戰裡了嗎？</p>\n<p>問題比答案多太多了。</p>\n<p>偵查兵一號從他口袋裡探出頭，把腦袋搭在口袋邊緣，用眼睛看著他，神情看起來頗為悠閒，完全不關心這些讓人頭疼的問題。</p>\n<p>「你真是條鹹魚，」白無極說，把它撈出來放在手心，「一點沒用的擔憂能力都沒有。」</p>\n<p>蜥蜴吐了一下舌頭，然後把頭靠在他拇指上，打了個哈欠。</p>\n<p>白無極把它放回口袋，起身，吹了燈。</p>\n<p>窗外，天契城的夜很安靜，慕容玄已經走了，不知走向何處，走去再不回頭的遠方，帶走了那個他一個人知道的沉甸甸的答案。</p>\n<p>留下的，是一個還沒弄清楚自己是什麼的少年，和幾個比問題更多的問題。</p>"}, {"title": "第76章_療傷", "content": "<p>第76章　療傷</p>\n<p>蘇念卿是第三天才發現的。</p>\n<p>不是沒有更早發現的機會。白無極一直表現得很正常，走路的步伐沒有問題，說話沒問題，搶燒餅沒問題，甚至拿東西也沒問題——他很小心地讓右手做所有看起來需要力道的事，讓受傷的左臂一直處於自然垂著或者插在口袋裡的狀態，偶爾用的時候也很輕，像是在刻意避免讓人注意。</p>\n<p>黃金體驗在持續修復，這他知道，他也知道修復需要時間，所以他等著，但他沒想讓任何人知道他比當時表現出來的更傷。</p>\n<p>慕容玄的那道衝擊波不是普通的力道，那是一個契聖的本源力量直接催動的打擊，雖然白無極在接觸瞬間用白金之星擋了一部分，但剩下的那部分透過手臂骨膜震進來，在肌肉深層留了幾條暗傷，不是表面的青紫那麼簡單。</p>\n<p>他進化之後的黃金體驗在加速修復，但「加速」是相對的，重傷就是重傷。</p>\n<p>他估計要三天才能完全好，他打算讓它好，不說。</p>\n<p>但第三天的下午，蘇念卿過來，帶著霜翎，像往常一樣坐在廊下喝茶。</p>\n<p>她沒有立刻說話，只是坐著，偶爾喝茶，偶爾往院子裡看。偵查兵一號在牆根下曬太陽，霜翎趴在她腳邊打盹。白無極靠著廊柱坐，手裡拿著一卷從蘇家借的雜書翻著，左手翻書，右手端著杯子，頗有閒適的樣子。</p>\n<p>蘇念卿看了他一會兒。</p>\n<p>然後她說：「把手給我看看。」</p>\n<p>白無極沒抬頭：「哪隻手？」</p>\n<p>「左手。」</p>\n<p>白無極翻過一頁書：「沒事。」</p>\n<p>蘇念卿放下茶杯，站起來，走到他旁邊，直接坐下，在他左側。</p>\n<p>「讓我看。」</p>\n<p>她的聲音比平時低了一點，沒有了往常那種漫不經心的輕，是另一種質地，不重，但壓過來，讓人沒辦法繼續假裝沒聽見。</p>\n<p>白無極把書放下，沉默了一秒。</p>\n<p>然後，他把左手袖子挽起來。</p>\n<p>從腕關節往上，三分之一處開始，一條青紫從皮下漫出來，顏色不是新鮮的紅紫，是沉下去了的、帶著墨色的深紫，往肘關節延伸，過了肘，還有一截往上去，被袖子遮著。白無極把袖子往上再挽了一截——肘上也是青紫，比下面的顏色更深，中心有一小塊是那種近乎黑的色調，那是衝擊力最集中的落點。</p>\n<p>他把手臂平放在腿上，沒說話。</p>\n<p>蘇念卿也沒說話。</p>\n<p>她看著那條手臂，視線沿著青紫的走向看了一遍，臉上什麼表情都沒有，但她的手在旁邊握了一下，握成拳，沒讓白無極注意到。</p>\n<p>霜翎感覺到了什麼，從她腳邊站起來，走了兩步，靠到她旁邊，把腦袋搭在她膝上。</p>\n<p>「黃金體驗在修復，」白無極說，聲音很平，「估計今天晚上就全好了。」</p>\n<p>蘇念卿沒有回應這句話。</p>\n<p>她站起來，走回廊的另一頭，從她帶來的小藥袋裡找了一會兒，找出一支細長的、半透明的晶狀物——冰晶，從霜翎身上取下的，帶著細微的寒意，是用來消散深層淤傷的東西。</p>\n<p>她回來，坐在白無極旁邊，伸手，把那支冰晶敷在他手臂上。</p>\n<p>她的手指壓著冰晶，沿著淤傷的走向緩緩移動，不快，也不慢，力道很輕，剛好夠讓寒意透進去而不造成新的刺激。白無極的手臂在接觸的一瞬間微微抖了一下——不是疼，是冰——然後放鬆，讓她做。</p>\n<p>廊下很安靜。</p>\n<p>院子裡，偵查兵一號從牆根下爬出來，在石板路上走了幾步，找到了一塊曬著太陽的位置，趴下去繼續。霜翎靠著蘇念卿，沒動，頭壓在她腿上，眼睛虛虛地開著，望著院子裡不知道什麼方向。</p>\n<p>蘇念卿的手繼續移動，晶體過處留下淡淡的白霜，在皮膚表面停了幾息，然後被體溫慢慢融化，滲進去。</p>\n<p>白無極把那隻手臂順著放著，讓她弄，沒有說謝謝，也沒有說什麼多餘的話。</p>\n<p>她也沒說話。</p>\n<p>整個廊下就這樣安靜著，只有偶爾的風聲，只有霜翎偶爾翻動一下身子的微小聲響，只有冰晶碰在皮膚上的那一點輕微的觸感，沿著傷痕的走向，一寸一寸地往前。</p>\n<p>白無極低頭，看著她的手。</p>\n<p>她的指節很細，手掌不大，但把持東西的方式很穩，是獸契師練出來的那種穩——她從小要捧著霜翎，要調配藥劑，要做很多要求精準的事，所以她的手很有力氣，卻能做很輕的動作。</p>\n<p>他沒有說什麼。</p>\n<p>但他把這個細節記住了。</p>\n<p>蘇念卿在肘關節的深紫那裡停了一下，多停了幾息，讓冰晶在那裡多待了一會兒。然後繼續往上，把袖子再往上挽了一截，把剩下的部分也處理了。</p>\n<p>等她做完，白無極的整條左臂都有一層很薄的冰意，那種深層的酸脹感被壓下去很多，比黃金體驗單獨工作輕鬆了不少。</p>\n<p>她把那支冰晶放回藥袋，拍了拍手，站起來，走回自己的位置，重新坐下，端起茶杯。</p>\n<p>霜翎跟著她移動，重新靠在她腳邊，打盹。</p>\n<p>白無極把袖子放下，整了整，拿起書，翻回剛才看到的地方。</p>\n<p>沉默持續著。</p>\n<p>不是尷尬的沉默，是另一種，比說任何話都更自然的沉默。</p>\n<p>過了很長一段時間，天邊的光開始往橘色偏，蘇念卿站起來，準備走。</p>\n<p>她走到廊下的門口，站了一下，沒有回頭，聲音很平：「下次受傷了就說。」</p>\n<p>不是問句，也不是命令，介於兩者之間。</p>\n<p>「沒說是因為黃金體驗真的在修，」白無極說，沒有辯解，只是陳述，「不是在逞強。」</p>\n<p>蘇念卿：「逞強和沒說是兩件事。」</p>\n<p>白無極沉默了一秒。</p>\n<p>「好，」他說，「下次說。」</p>\n<p>蘇念卿走了。</p>\n<p>霜翎在門口最後回頭看了白無極一眼，那雙銀色的眼睛對著他停了一秒，然後跟著蘇念卿消失在廊門後面。</p>\n<p>白無極把書闔上，放在腿上，低頭看著自己的左手臂。</p>\n<p>袖子放下去了，看不見裡面的青紫，但那一層薄薄的冰意還在，覆在皮膚表面，很輕，很涼，像是什麼東西留下的痕跡，不打算立刻散去。</p>\n<p>黃金體驗在他掌心輕輕流動了一下，像是在呼應著什麼，又像是在確認什麼。</p>\n<p>金色的光，在夕陽的橘光裡，幾乎看不見。</p>\n<p>但它在。</p>"}, {"title": "第77章_你真的很煩", "content": "<p>第77章　你真的很煩</p>\n<p>第四天，蘇念卿過來了。</p>\n<p>和前兩天一樣，霜翎跟著，帶了藥袋，走進白無極住的客棧，上了三樓，敲了門，很平靜地說：「確認一下傷況。」</p>\n<p>白無極把門開著，坐回床沿：「沒事了，昨晚黃金體驗把剩下的都修完了。」</p>\n<p>蘇念卿走進來，在燈光下看了看他的臉色，然後說：「把袖子挽上去。」</p>\n<p>「真的好了——」</p>\n<p>「挽上去。」</p>\n<p>白無極挽了袖子。</p>\n<p>手臂上乾乾淨淨，青紫全消，連最深的那一塊也全部散去了，皮膚的顏色和另一條手臂沒有任何區別，摸起來也沒有任何硬塊或者壓痛。</p>\n<p>蘇念卿看了幾秒，把手拿回來，站起來：「好了。」</p>\n<p>她轉身走。</p>\n<p>白無極把袖子放下：「說真的，謝謝你這兩天——」</p>\n<p>「不用謝，」她說，走到門口，「我只是確認沒有感染。」</p>\n<p>「感染什麼？」白無極說，「冰晶敷的，哪裡有感染的機會？」</p>\n<p>她沒有回答這個問題，走了。</p>\n<p>---</p>\n<p>第五天，她又來了。</p>\n<p>白無極這次有了準備，在她敲門之前就把袖子挽好，一開門就把手臂伸出去：「你看，全好了。」</p>\n<p>蘇念卿看了一眼手臂，然後看了看他的臉，然後走進去，在原來的位置坐下，霜翎跟進來，找到它喜歡的那個角落，趴了。</p>\n<p>「你要喝茶嗎？」白無極問。</p>\n<p>「不用。」</p>\n<p>她從藥袋裡拿出一個小瓶，打開蓋子，這是一種透明的膏狀藥物，白無極以前沒見過：「這是活絡膏，深層衝擊的後遺症，肌肉恢復之後還要用這個揉一遍，不然以後天冷的時候那裡會酸。」</p>\n<p>白無極：「黃金體驗已經——」</p>\n<p>「你的黃金體驗修的是傷，不是防止後遺症，」她打斷，把藥膏推給他，「我不知道你那個東西具體能做什麼，但你受的是契聖的衝擊，不是普通的淤傷，能修復不代表沒有後遺症。」</p>\n<p>白無極拿著那個瓶子，沉默了一秒，然後開了蓋子。</p>\n<p>味道是薄荷和某種草藥的混合，帶著一點清涼的苦味，不難聞。他倒了一點在手心，按著她說的位置揉——肘上那一截，順著肌肉走向，慢慢推進去。</p>\n<p>蘇念卿在旁邊坐著，不說話，看著，偶爾說「再往上一點」或者「那裡多揉幾下」，語氣很平，像是在指導一個學生做對的動作。</p>\n<p>揉完一遍，她讓他把袖子放下，確認了一下滲透效果，說「明天再揉一遍」，站起來準備走。</p>\n<p>白無極：「你每天過來，要繞多少路？」</p>\n<p>她的腳步沒有停：「不遠。」</p>\n<p>「我住的客棧在城北，」白無極說，「你住在城南蘇家，城北城南正好對角，天契城不小。」</p>\n<p>「我有事要辦。」</p>\n<p>「你每天辦的事都在城北？」</p>\n<p>「不一定。」</p>\n<p>「那你每天過來都要專程繞路。」</p>\n<p>蘇念卿走到了門口，停住。</p>\n<p>沉默了兩秒。</p>\n<p>她轉過半個身，沒看他，往廊上看：「天契城比你想的小。」</p>\n<p>白無極：「天契城有六條主街、二十四條支街，城北到城南走完要半個時辰——」</p>\n<p>「你真的很煩。」</p>\n<p>她說完，走了，步伐比剛才快了半拍，下樓的腳步聲很清晰，霜翎跟在後面，跑了幾步才追上。</p>\n<p>白無極坐在屋裡，沉默了兩秒。</p>\n<p>然後笑出來了。</p>\n<p>不是那種哈哈大笑，是從喉嚨裡出來的那種笑聲，帶著點憋著的意思，像是笑到一半想起要收著，但沒完全收住。</p>\n<p>偵查兵一號從口袋邊緣探出頭，看了看他，然後看了看空蕩蕩的門口，又看了看他，表情——如果蜥蜴有表情的話——頗有一種「我親眼目睹了某件大事」的意思。</p>\n<p>---</p>\n<p>第三天，早上。</p>\n<p>白無極一醒，確認了手臂，完全沒有任何殘餘，揉了揉，也沒有不適。他把活絡膏按昨天的方式又揉了一遍，把小瓶收好，收進包裡。</p>\n<p>然後他出門，往蘇家走。</p>\n<p>他走了半個城，到蘇家側門，讓門房通報，進去，在院子裡找到了蘇念卿——她在練劍，長劍從鞘裡抽出來，在早上的光裡一道亮色。</p>\n<p>白無極在院子門口站住，等她收招。</p>\n<p>蘇念卿的最後一式收在身前，劍刃橫在左臂外側，靜了一息，然後把劍歸鞘。她轉過身，看見白無極。</p>\n<p>白無極走進去，把左手臂挽好袖子，伸給她看：「好了。」</p>\n<p>蘇念卿看了一眼。</p>\n<p>「你可以不用再來了，」白無極說，臉上的表情很正，「傷全好了，後遺症防了，活絡膏還剩一點我今天也揉了。你繞路繞了這麼多天，辛苦了。」</p>\n<p>蘇念卿把手擦在劍穗上，沒說話。</p>\n<p>「當然，」白無極繼續說，「如果你覺得天契城真的很小，順路的話繼續來也可以。」</p>\n<p>他說完，等著。</p>\n<p>蘇念卿收好劍，往廊下走，走了三步，開口：「誰說我要來了，我只是順路。」</p>\n<p>「你每次來都要繞半個天契城的路。」</p>\n<p>「天契城很小。」</p>\n<p>白無極笑了出來。</p>\n<p>真正的笑，從眼睛到嘴角，全都是，乾乾淨淨，沒有任何遮掩。</p>\n<p>「天契城很小，」他說，跟著她往廊下走，「好，天契城很小，我記住了。」</p>\n<p>蘇念卿坐下，倒了一杯水，臉上一絲波紋都沒有，像是一面非常成功的鏡子，把所有感情都反射了出去，留給觀眾自己解讀。</p>\n<p>霜翎從廊角出來，跑到院子裡，往偵查兵一號的方向走了幾步，停下，大眼瞪小眼地對峙了大概五秒，然後都各自移開視線，若無其事地往別的方向走。</p>\n<p>白無極：「它們倆一直這樣？」</p>\n<p>蘇念卿：「霜翎在嘗試建立外交關係。」</p>\n<p>「看起來談判破裂了。」</p>\n<p>「還在進行中。」</p>\n<p>白無極在她旁邊坐下，把藥膏瓶子推給她：「剩了一半，還你。謝謝。」</p>\n<p>她把瓶子拿回去，放進藥袋，合上。</p>\n<p>廊下安靜了一會兒，早上的光從屋簷邊透進來，照在院子的石板路上，把兩個人的影子拉向不同方向。</p>\n<p>偵查兵一號在院子裡爬了幾步，爬到一個有太陽的石板上，趴下去，把腹部完全貼著石板，享受著石板吸收了半個上午的熱量。</p>\n<p>霜翎在牆角，把一根從院子角落裡叼來的不知道什麼草在嘴裡銜著，低頭咬了咬，丟掉，然後看了看白無極，又看了看蘇念卿，低頭繼續吃肉——白無極進來的時候帶了幾塊從南市買的現烤肉乾，放在院子裡霜翎最喜歡的位置，它已經吃了一半了。</p>\n<p>蘇念卿看了看霜翎，又看了看白無極：「你賄賂它？」</p>\n<p>「通過正式外交渠道提供了一些補給。」</p>\n<p>蘇念卿沉默了一秒。</p>\n<p>嘴角動了一下，非常非常小的幅度，像是某個表情剛要出現就被按回去了，快到不確定是不是看錯。</p>\n<p>白無極沒說話，假裝沒注意到，把視線移到院子裡。</p>\n<p>但他把那個細節記住了。</p>"}, {"title": "第78章_傳說中的無契之人", "content": "<p>第78章　傳說中的無契之人</p>\n<p>蘇長淵私下見白無極，不是在正廳，是在書房。</p>\n<p>書房比白無極想像的更素，沒有什麼名貴的擺設，一張大書桌，幾排書架，靠窗一張長案，案上有一盆還沒開的蘭，和一個放了半壺涼茶的茶壺。蘇長淵坐在桌後，示意白無極在對面的椅子上坐，然後沉默了一會兒，從書桌最下面的抽屜裡取出一本書。</p>\n<p>書很舊。</p>\n<p>不是那種略微泛黃的舊，是那種摸起來紙張像老皮的舊，書脊和書角都磨出了毛邊，翻過無數遍的那種。封面上的字跡是手抄的，墨色深淺不一，字體是白無極在這個世界認識的字，能讀懂：《天衍前志》。</p>\n<p>蘇長淵把書放到桌上，沒有立刻推給他，說：「慕容玄走之前，和我說了一些話。我本來打算等你傷好了再找你，但既然念卿說你手臂昨天就好了，就趁早談。」</p>\n<p>白無極把視線從書上移回到蘇長淵臉上：「他說了什麼？」</p>\n<p>「他說，你身上的力量，不是靈契。」蘇長淵說，語氣很平，但有一種說話之前在心裡過濾過了的感覺，「他說，這種力量在有記載的歷史裡出現過一次，在千年之前，那個人沒有任何靈契師的特徵，靈契堂的試靈石對他沒有反應——」</p>\n<p>「和我一樣。」</p>\n<p>「和你一樣。」蘇長淵點了頭，「那個人獨自一人介入了那個時代最大的一場戰亂，讓雙方的頂尖戰力全部受挫，最後那場大戰沒有打完——他消失了，大戰結束，沒有人說得清楚是什麼原因。」</p>\n<p>白無極看著蘇長淵，等他繼續說。</p>\n<p>蘇長淵把那本書推過來：「這是蘇家珍藏的一本古籍，很多地方記載已殘缺，但其中有幾頁，我標了書簽，你自己看。」</p>\n<p>白無極把書拿起來，翻到第一個書簽。</p>\n<p>紙張在他手下沙沙作響，像是不太願意被翻動但又已經習慣了的感覺。第一個書簽夾在接近書中部的位置，他打開，看到那一頁的標題——是一個小章節，標題只有四個字：「無契之人」。</p>\n<p>記載不長，大概只有兩三百字，而且有好幾處已經殘缺，只剩一半的字，讓人不得不靠上下文猜缺失的部分。</p>\n<p>白無極逐字讀：</p>\n<p>「……天衍第七紀，玄黃亂世之際，有一奇人，無契，試靈石不感，宗師氣感無法察其根骨，然其臨陣，諸契師皆感壓迫……（殘缺三行）……人言其以意念成力，所現之物非人能見，唯感其動……（殘缺）……與玄隕山一役，雙方契聖共計七人，此人以一身之力……（殘缺）……其後不知所蹤，或云遁入荒原，或云化於天地，諸說不一……（殘缺）……其力無形，唯感其動，世人不得見。」</p>\n<p>白無極的手指在最後那句話上停住。</p>\n<p>「其力無形，唯感其動，世人不得見。」</p>\n<p>他把這十二個字在腦子裡過了一遍。</p>\n<p>「世人不得見」——只有他自己看得見的白金之星和黃金體驗。</p>\n<p>「唯感其動」——慕容玄那場，周圍的人不是看見了白金之星，是感受到了衝擊波，是感受到了那個空間裡的壓迫感。</p>\n<p>「以意念成力」——精神力的具現。</p>\n<p>他把書頁翻到第二個書簽，那一頁記載更短，更殘，只有一行完整的字，周圍全是殘缺的字跡和一些看不清楚的圖案痕跡：「其臨敵，如天懸巨石，人在其下，不得喘息。」</p>\n<p>第三個書簽，是一段記載那場大戰的文字，提到那個人的部分只有一句：「奇人入陣，七聖後退，戰局逆轉，然奇人不見，大戰遂止。」</p>\n<p>七個契聖後退。</p>\n<p>白無極把書合上，放在桌上，手按在書面上，沉默。</p>\n<p>腦海裡沒有任何聲音，白金之星和黃金體驗都在，但都很安靜，像是在等他先說話。</p>\n<p>「那個人，」白無極最後說，「他消失了。」</p>\n<p>「是，」蘇長淵說，「記載說的是『不知所蹤』，但有一個細節，慕容玄轉述的——那個人消失之前，被人看見走向了荒原的方向。東荒。」</p>\n<p>白無極抬頭看他。</p>\n<p>「東荒，」蘇長淵說，「天衍大陸最東面，荒原深處，有一片上古遺跡，具體位置無人知曉，但傳說那是靈契之力的起源之地，也有傳說說，那是比靈契更早的一種力量留下的地方。」</p>\n<p>白無極沉默著。</p>\n<p>「慕容玄告訴你的？」</p>\n<p>「不，」蘇長淵說，「慕容玄告訴我的，是那個人的去向。東荒遺跡是這本古籍後半部分有的記載，」他頓了頓，「但已經殘缺了大半，只剩一張地圖，也已殘破。」</p>\n<p>他站起來，把書翻到最後幾頁，推到白無極面前。</p>\n<p>後半部的紙更舊，有幾頁邊角已經缺了，殘存的字跡看得出來當年是很工整的記錄，但時間把絕大多數都侵蝕掉了，現在只剩下零散的詞句，和一張——</p>\n<p>地圖。</p>\n<p>說「地圖」其實是高估了，那是一張用毛筆手繪的簡略示意，比例不一定準確，大部分的路徑標記都已經淡得幾乎不可辨，但有幾個地名還能認出來，其中一個白無極認得，是天衍大陸的東海岸標誌城市，另一個指向更深入荒原的標記，旁邊有四個字：</p>\n<p>「精神力起源。」</p>\n<p>白無極把那四個字看了很久。</p>\n<p>「精神力起源，」他把這四個字說出來，聽聽它的聲音，「這個名字是誰起的？」</p>\n<p>「古籍上就是這麼記的，」蘇長淵說，「我不知道這個名字是那個奇人起的，還是後人記錄的，或者是更早就存在的稱謂。」</p>\n<p>白無極把視線從地圖上移開，看著書房的書架，看著那些排列整齊的書脊，沉默了很長時間。</p>\n<p>他在想什麼，說不清楚。</p>\n<p>太多東西在同一時間試圖落地：千年前的那個人，和他有同樣的力量，獨自推翻了七個契聖的局面，然後消失。消失在荒原的方向，消失在那張殘破地圖上標著「精神力起源」的那個地方。</p>\n<p>然後一千年過去，在一個不知道什麼原因的情況下，他白無極出現了，帶著同樣的力量，同樣對試靈石沒有反應，同樣的「其力無形，唯感其動，世人不得見」。</p>\n<p>這不是巧合。</p>\n<p>但它是什麼，他現在沒有答案。</p>\n<p>「我不知道那裡有什麼，」蘇長淵的聲音把他從思緒裡拉回來，「我也不知道你去了能找到什麼，但如果你想找答案，那是唯一的線索。」</p>\n<p>白無極把那本書從頭到最後一頁重新過了一遍，視線在地圖上停留。</p>\n<p>那張地圖殘破，路徑模糊，標記不全，但那個目的地是清晰的，四個字就在那裡，墨色比其他記載都要深，像是曾經被人特意加描過，讓它比其他文字都更能抵抗歲月。</p>\n<p>「精神力起源。」</p>\n<p>白無極把書合上，拿在手裡。</p>\n<p>然後他看著蘇長淵：「能借我嗎？」</p>\n<p>蘇長淵點頭，沒有任何猶豫：「帶去吧。」</p>\n<p>就在這時，書房的門開了。</p>\n<p>不是硬闖，是推開，蘇念卿站在門口，手扶著門框，視線從蘇長淵移到白無極，移到他手裡那本書，停了一秒，然後她走進來。</p>\n<p>她的臉上沒什麼表情，但她走進來的步伐不是一般進書房的步伐，是有目的地走進來的那種。</p>\n<p>白無極看著她，她看著他，然後她說：「我也去。」</p>\n<p>白無極沉默了一秒：「危險。」</p>\n<p>蘇念卿：「我自己的危險我自己承擔。」</p>\n<p>她說這句話的時候，語氣比平時更平，像是已經想好了說辭，等著這個問題很久了。她站在書房中間，沒有往前走，也沒有往後退，就那樣站著，把她的立場直接放在那裡。</p>\n<p>白無極看著她，把她臉上的每個細節都看了一遍。</p>\n<p>然後他把書舉了一下，在手裡掂了掂，沒說好也沒說不好，把視線轉向蘇長淵。</p>\n<p>蘇長淵的表情很平靜，那種經歷過太多事情之後的平靜，他的視線在女兒臉上停了一下，然後看向白無極：「念卿從小就是這個性子，你攔不住她。」</p>\n<p>蘇念卿：「……」</p>\n<p>她側臉看了她父親一眼，那個眼神很難形容，介於無語和不打算追究之間。</p>\n<p>白無極低頭看了看手裡的書，把地圖那幾頁在腦子裡過了一遍，然後說：「行，一起去。」</p>\n<p>蘇念卿沒說謝謝，只是點了頭。</p>\n<p>門口，霜翎不知道什麼時候也跟過來了，趴在門檻上，把腦袋墊在前爪上，銀色的眼睛往書房裡看了一圈，停在白無極手裡那本書上，又看了看蘇念卿，然後閉上眼睛，把尾巴攏了攏。</p>\n<p>外面，天衍大陸的東面，某個荒原深處，有一片不知道具體位置的上古遺跡，等在那裡，等在地圖那四個褪色的字裡，等在千年前一個消失的人曾走過的路的盡頭。</p>\n<p>它在那裡。</p>\n<p>一直在那裡。</p>"}, {"title": "第79章_上古遺跡", "content": "<p>第79章　上古遺跡</p>\n<p>那張地圖，白無極看了整整兩個晚上。</p>\n<p>不是單純在看路線，是在試圖把地圖上殘存的資訊和他對天衍大陸的地理認知對應起來。他在這個世界生活了有一年多，走過了不少地方，對大致的地理輪廓有基本概念，但東荒是他從未去過的區域，那片荒原在大多數普通人的認知裡只有一個印象：遠，野，幾乎沒有人定居，偶爾有獵人或者探索型的契師深入，大多數人去了就不再提了。</p>\n<p>地圖上能確認的地名有三個，白無極把它們在腦子裡連成一條線，大致估算了一下距離。</p>\n<p>從天契城出發，往東，走到海岸邊的清澈城，然後轉向東南，沿著一條叫做「玄水河」的河道往上游走，走到河道分叉的位置，往更深的荒原進。</p>\n<p>這是能確認的部分。</p>\n<p>不能確認的是，從玄水河分叉往後的路，地圖上只有幾條已經幾乎消失的虛線，和那四個字。</p>\n<p>白無極把地圖放下，在燈下看著這張殘破的東西，腦子裡在算路程、時間、補給、可能的風險。</p>\n<p>「白金之星，」他說，「你對東荒有了解嗎？」</p>\n<p>「我對你的知識以外的地理沒有了解，」白金之星說，「但我的感知在你進化之後更廣了，如果我們走到那個地方，我可能能感知到一些東西。」</p>\n<p>「進去之後再說，」白無極把地圖對折，放進那本古籍的原位，「先到再說。」</p>\n<p>「你已經決定了。」</p>\n<p>「早決定了。」</p>\n<p>---</p>\n<p>第二天，蘇念卿過來找他，帶著一個行囊——不大，一個箱子，比她上次出門精簡了太多。</p>\n<p>白無極上次見過她出遠門的行囊，那是一個需要兩個下人才能搬動的大箱子，蘇家大小姐的標準配置。現在這個，她一隻手提著，看起來不重。</p>\n<p>她把行囊放在白無極房間的桌上，展開，裡面整齊放著：幾件換洗的衣物，一個藥袋，幾包乾糧，一卷記錄東荒路況的手抄筆記——白無極沒見過這個，她看見他盯著看，說：「蘇家有跑商的記載，我整理了一下，只有到清澈城的，更往裡的沒有。」</p>\n<p>「夠用了，」白無極說，「清澈城到玄水河上游那段我估算了，大概五到七天，玄水河往裡再走多久說不準。」</p>\n<p>「霜翎在荒原的感知比在城市裡強，可以作為偵查用。」</p>\n<p>白無極把偵查兵一號從肩膀上拿下來，在手心裡托著：「這個也可以，而且更小，更不容易被發現。」</p>\n<p>蜥蜴在他手心裡仰頭看了看他，然後看了看蘇念卿，然後看了看自己的爪子，神態十分自持，像個剛收到任命的小將領。</p>\n<p>蘇念卿：「……你給它起名字了嗎？」</p>\n<p>「偵查兵一號。」</p>\n<p>「……」</p>\n<p>霜翎在旁邊嗅了嗅偵查兵一號，偵查兵一號側過頭看了霜翎一眼，雙方再次進行了沉默的外交對峙，然後各自看向別處，假裝沒有對峙過。</p>\n<p>「補給我也整理了，」蘇念卿把行囊裡的幾包東西拿出來，「靈石，藥材，兩套繃帶和縫合材料，防蟲的藥包——荒原的蟲子和城市裡的不一樣，不能不防。」</p>\n<p>白無極看了看她整理出來的東西，再看了看自己的包：「我帶了燒餅。」</p>\n<p>蘇念卿：「……」</p>\n<p>停頓。</p>\n<p>「幾個燒餅？」</p>\n<p>「今天買的，還熱，六個。」</p>\n<p>「帶上，其他的呢？」</p>\n<p>白無極把自己的包展開，裡面是：《天衍前志》，換洗一套，偵查兵一號的備用食物（一小包幹蟲子），一把短刃，一些靈石，還有兩個不知道什麼時候塞進去的糖果。</p>\n<p>蘇念卿把包裡的東西看了一遍，沉默了片刻，把自己準備的備用靈石分了一半塞進他包裡，又把一個藥包分給他，然後說：「夠了，明天出發。」</p>\n<p>白無極：「我就說自己會好。」</p>\n<p>「你自己說的那次差點讓那條手臂沒了，」蘇念卿把行囊收好，語氣非常平靜，「別自信。」</p>\n<p>「我那次是受的契聖的衝擊——」</p>\n<p>「下次你說不定受的是更強的。」她站起來，把行囊拎起，「我走了，明天卯時在蘇家門口集合，不許遲到。」</p>\n<p>白無極：「我幾時遲過到？」</p>\n<p>「第一次出門，你比約定時間晚了整整一刻鐘，站在城門口吃燒餅。」</p>\n<p>「那是在等燒餅出爐，」白無極說，「有些事是不能等的，比如出門的燒餅。」</p>\n<p>蘇念卿沒有回應這個邏輯，往門口走，走到一半，沒回頭：「明天多帶幾個燒餅。」</p>\n<p>白無極：「這是認可了？」</p>\n<p>她走了，只剩門口霜翎的尾巴在消失之前搖了一下。</p>\n<p>---</p>\n<p>白無極把那本書從包裡取出來，又翻到了地圖那一頁。</p>\n<p>他把地圖攤開，在燈下看了很久，把已經記住的標記再過了一遍，然後把視線落在那四個字上，在那裡停了一會兒。</p>\n<p>「精神力起源。」</p>\n<p>這個詞讓他想了很多。</p>\n<p>如果那個地方真的是他這種力量的起源，那去了之後能看到什麼？能找到什麼？千年前那個人去了，消失了，這代表什麼——是他選擇消失，還是遺跡讓他消失？</p>\n<p>問題太多，答案一個都沒有。</p>\n<p>但他知道去哪裡找答案。</p>\n<p>黃金體驗的光在他掌心輕輕溢出來，照亮了那張地圖的一小塊，把那四個字映得更清晰。白無極把手收回，把書合上，放回包裡。</p>\n<p>偵查兵一號爬到書包上，趴在書包頂上，把腦袋枕著包的邊緣，對著白無極，眼睛細細的，像兩條縫，快要睡著的樣子。</p>\n<p>「別睡，」白無極說，「明天要幹活了。」</p>\n<p>蜥蜴吐了一下舌頭，沒有要醒來的意思。</p>\n<p>白無極把燈芯挑了挑，讓燈光更亮一點，把地圖在腦海裡的定位再確認了一遍，然後吹燈，躺下，把問題都壓進意識的底層，等待天亮。</p>\n<p>窗外，天契城的夜一如既往地安靜，但它的東面，越過平原，越過河道，在荒原的深處，有某個地方，靜靜地等在那裡，等了也許一千年，等著某個人重新走到它面前。</p>\n<p>那個人，也許明天就出發了。</p>"}, {"title": "第80章_出發", "content": "<p>第80章　出發</p>\n<p>卯時，天剛蒙蒙亮。</p>\n<p>蘇家的正門還沒有正式開，側門開著，門廊的燈籠已經點上了，在晨霧裡透著一圈橘光。蘇念卿站在門廊下，一個行囊，一把劍，霜翎蜷在她肩頭，銀尾攏著，眼睛還帶著一點剛醒來的惺忪。</p>\n<p>白無極到的時候是卯時整。</p>\n<p>他走過來的時候，手裡拿著一個油紙包，還冒著熱氣。</p>\n<p>蘇念卿打量了他一眼，從頭看到腳——背包，短刃，偵查兵一號趴在他頭頂的發結旁邊，一條小尾巴垂在耳側。她的視線在那隻蜥蜴上停了一秒，移開。</p>\n<p>「沒遲到，」白無極把油紙包舉了一下，「還帶了早飯。」</p>\n<p>蘇念卿：「走吧。」</p>\n<p>她轉身往外走，步伐很穩，行囊背在肩上像沒什麼重量一樣。</p>\n<p>白無極跟上，把油紙包打開，裡面是幾個剛出爐的燒餅，還有兩個用葉子包著的蛋。他把一個燒餅和一個蛋往蘇念卿方向遞過去，她側過頭，沉默地接了。</p>\n<p>兩個人就這樣走進了清晨的天契城。</p>\n<p>街道上這個時辰已經有人了，早市的攤販在支攤子，清掃街道的老人推著車，偶爾有一兩個早起的行人從旁邊走過。天契城的早晨帶著一種特有的溫度，不急，不慢，像一鍋剛開始加熱的水，慢慢往前走。</p>\n<p>他們走的是側街，比主街安靜。</p>\n<p>---</p>\n<p>蘇長淵在城門外等著。</p>\n<p>不是大陣仗，沒有侍從，只有他一個人，站在城門邊的廊柱旁，手背在身後，看著城門外的官道，看著晨光從地平線那一邊往這邊鋪過來。</p>\n<p>他聽見腳步聲，轉過頭，看見蘇念卿和白無極從城門裡走出來。</p>\n<p>蘇念卿走上前，在他面前站住。</p>\n<p>父女兩個人沉默地看了一眼，蘇長淵把視線在蘇念卿臉上停了一會兒，然後看了看她的行囊，看了看她肩上的霜翎，然後，看了一眼白無極。</p>\n<p>他說了一句話：「平安回來。」</p>\n<p>很短，只有四個字。</p>\n<p>是對女兒說的，蘇念卿知道，白無極也知道，所有人都知道。</p>\n<p>但蘇長淵說完這四個字之後，視線在白無極臉上停了一下，那個眼神沒有說任何話，但白無極接收到了。不是囑託，不是命令，只是一個父親在把最重要的東西交出去的時候，最後看了一眼。</p>\n<p>白無極點了頭。</p>\n<p>蘇念卿轉過身，往前走，沒有回頭。</p>\n<p>她走路的步伐和平時沒有什麼不同，很穩，有方向，但白無極注意到她肩上的霜翎輕輕回過頭，往城門的方向看了一眼，然後重新把臉埋回她的頸側。</p>\n<p>白無極也往前走了。</p>\n<p>蘇長淵站在城門邊，看著他們走遠，一直看到轉過街角，看不見了，才把視線收回來。</p>\n<p>天邊，日出了。</p>\n<p>---</p>\n<p>出了天契城的北官道走三里，轉向東，進入鄉野之間的小路。</p>\n<p>路邊是田地，遠處是連綿的低丘，霧氣從低窪的地方往上漫，把整個早晨染成一種朦朦朧朧的藍灰色。偵查兵一號從白無極頭頂滑下來，落到地面，往前跑——不是漫無目的地跑，是往兩個人的前方跑，到一定距離，停下來，等一下，然後再往前。</p>\n<p>它在偵查。</p>\n<p>沒有白無極下令，自動開始工作。</p>\n<p>蘇念卿看著那隻蜥蜴在路上跑，腳步很快，尾巴上翹，偶爾往草叢裡鑽一下又鑽出來：「它知道自己在幹什麼嗎？」</p>\n<p>「知道，」白無極說，「它能感知到我的意圖，我想去哪、想幹什麼，它大概能理解，然後自己決定怎麼配合。」</p>\n<p>「那它現在判斷你想偵查前方，所以自動去了。」</p>\n<p>「對。」</p>\n<p>蘇念卿：「聰明。」</p>\n<p>白無極：「天賦異稟。」</p>\n<p>前方，偵查兵一號跑過一段草地，爬上一塊突出的石頭，在上面站了一下，像個站崗的哨兵，然後跳下去繼續往前。</p>\n<p>霜翎看著那個小小的身影在路上奔跑，動了動身子，從蘇念卿肩上跳下來，在路邊走了幾步，然後也往前走了，沒有跑，但走得有自己的節奏——不是跟著偵查兵一號，是走在路的一側，佔據了不同的偵查位置。</p>\n<p>像是在配合。</p>\n<p>兩個替身的兩個生命體，在誰都沒有指揮的情況下，把前方的偵查路線分成兩條，各走各的。</p>\n<p>白無極看著這個畫面，沒說話，但嘴角動了一下。</p>\n<p>蘇念卿也看著，沉默了一會兒，說：「霜翎在主動合作。」</p>\n<p>「是。」</p>\n<p>「它不喜歡偵查兵一號。」</p>\n<p>「但它決定配合工作。」白無極說，「職業素養。」</p>\n<p>蘇念卿：「……」</p>\n<p>她看了他一眼，沒有回應這個說法，把視線重新放到前路上。</p>\n<p>---</p>\n<p>走了大概兩個時辰，天契城的輪廓已經縮成了遠處地平線上的一條深色線。</p>\n<p>路邊的田地換成了山野，道路從平坦開始起伏，偶爾有石塊突出路面，要繞開。偵查兵一號跑在前面，霜翎走在中間，蘇念卿和白無極並排走在後面。</p>\n<p>沒有人說話。</p>\n<p>不是沉默的那種沒有說話，是另一種——走路的時候路本身就是話題，腳下的石頭，旁邊岔出的野路，偶爾飛過的鳥，這些都是一種對話，不需要用嘴說出來。</p>\n<p>白無極的包在他背上不輕，但走起來沒有什麼問題。他把步伐和蘇念卿的對齊，兩個人的走法不一樣，他走的是八極拳練出來的那種步，重心低，每一步都實，蘇念卿走的是劍法的步，輕，有彈性，腳尖的角度和方向很精準。</p>\n<p>但走著走著，步子就對上了。</p>\n<p>不是誰刻意遷就誰，是自然而然對上的。</p>\n<p>路在一個緩坡上升，兩個人並排往上走，坡道不寬，偶爾要側身讓一讓。走到坡頂，視野突然開闊，往東望去，低丘連著低丘，一直延伸到天邊，最遠處的天邊有一條深色的線，那是還遙遠的荒原的邊際。</p>\n<p>白無極站在坡頂，往東看了一會兒。</p>\n<p>蘇念卿站在他旁邊，也往那個方向看。</p>\n<p>「很遠，」白無極說。</p>\n<p>「知道。」</p>\n<p>「可能很危險。」</p>\n<p>「我說過我自己的危險自己承擔。」她說這句話的時候語氣很平，像是第一次說的時候，沒有任何加重，但也沒有任何動搖。</p>\n<p>白無極把視線從遠處收回來，看了她一眼。</p>\n<p>她沒有看他，繼續看著東方，晨風把她鬢邊的幾縷頭髮吹起來，她伸手壓了壓，又讓風帶起來了，她放棄了，任著它去。</p>\n<p>霜翎從她腳邊跑上來，繞著她的腳轉了一圈，然後繼續往前走。</p>\n<p>偵查兵一號在前方更遠的地方，已經變成了一個很小的點，在岩石和草叢之間穿梭，偶爾停下來，往回看，確認兩個人還在，然後繼續。</p>\n<p>白無極把視線收回到腳下的路，邁步，繼續往前。</p>\n<p>蘇念卿也繼續走。</p>\n<p>兩個人並排，往東，往那個很遠的方向。</p>\n<p>路上的石塊讓道路變窄了一截，兩個人的距離本能地靠近了一點，肩膀靠近，袖子幾乎碰到——</p>\n<p>兩個人都沒有躲開。</p>\n<p>不是特意靠近，也不是特意不躲，就是沒有躲，各自繼續走各自的步子，讓那個肩並肩的距離留在那裡，留著，往前。</p>\n<p>偵查兵一號在前方的石頭上站了一下，回頭看了兩個人一眼，然後跳下去繼續跑。</p>\n<p>霜翎走在中間，把尾巴攏了攏，往前走，步伐很輕，幾乎沒有聲音。</p>\n<p>天契城已經在身後很遠了。</p>\n<p>東荒還在前面很遠的地方。</p>\n<p>但腳下的路是實的，一步一步往前走，會到的。</p>\n<p>白無極把肩膀放鬆，把步伐調均勻，把眼神放遠，讓晨光照進來，照在他和蘇念卿並排走的那段路上，照在那個沒有被躲開的距離上，照在偵查兵一號的小小背影上，照在霜翎銀色的毛上，照在《天衍前志》那本舊書壓著的包上，照在那個很遠很遠的東方地平線上。</p>\n<p>出發了。</p>\n<p>向著那個有答案的地方。</p>\n<p>無論那裡等著的是什麼。</p>"}, {"title": "第81章_遺跡守衛", "content": "<p>第81章　遺跡守衛</p>\n<p>東方荒原的邊緣，空氣就開始不對勁了。</p>\n<p>白無極走在前面，踩著枯黃的草地，鞋底微微發癢——不是正常的刺痛，是那種靈力密度過高、摩擦到皮膚神經末梢的感覺，像是踩進了一個長年無人清掃的老宅，每一步都在踢散積了千年的灰塵。</p>\n<p>只不過這些「灰塵」是靈力。</p>\n<p>「你感覺到沒有？」蘇念卿走在他右側半步，聲音沉靜，眼神卻微微收緊，「這裡的靈力不流動。」</p>\n<p>「嗯。」白無極點頭，「像死水。」</p>\n<p>正確來說，是沉積。</p>\n<p>天衍大陸的正常靈力是流動的，有方向，有起伏，像風一樣在天地間循環，靈獸和靈師汲取的都是這股流動。但荒原深處的靈力，是積的——幾百年、幾千年地慢慢疊加，沉在地底，沉在空氣裡，沉在那座隱隱在霧氣中顯出輪廓的遠處建築裡。</p>\n<p>霜翎趴在蘇念卿肩頭，九條銀白色尾巴收攏，毛髮卻根根豎起，是戒備的訊號。</p>\n<p>「霜翎說，前面有很多東西在動。」蘇念卿翻譯道。</p>\n<p>話音剛落，白無極掌心微熱——</p>\n<p>黃金體驗先反應了。</p>\n<p>幾天前他用Life創造的偵查蜥蜴，那隻從草叢裡鑽出來的鱗甲小生物，沿著他的靈力感知傳回了訊息：前方三百米，契王級靈力波動，數量——七個。</p>\n<p>白無極停下腳步。</p>\n<p>「七頭契王。」他把數字報出來，語氣平靜得像在報氣象，「都是魔獸，不是人。」</p>\n<p>蘇念卿眉頭輕輕一動。「你確定數量？」</p>\n<p>「蜥蜴說七個。」</p>\n<p>她沉默了三秒，視線往前方的霧氣掃過去，然後道：「通常這個等級的遺跡，外圍守衛是自然形成的——遺跡本身的靈力太濃，千百年來不斷吸引高階魔獸聚集，慢慢就形成了自己的『守門人』。這些魔獸不是被人豢養的，沒有指令，也沒有憐憫。」</p>\n<p>「所以它們看到我們會直接衝？」</p>\n<p>「會。」</p>\n<p>「那就清了再進。」白無極活動了一下手腕，骨節咔噠輕響，「你和霜翎守在外圍，我進去。」</p>\n<p>蘇念卿看了他一眼。</p>\n<p>她現在見到他說「我進去」已經不會皺眉了——不是因為習慣了他的口氣，而是她見過他在天契大比的表現，見過白金之星出現的那一刻，見過時間凝固的那個瞬間。</p>\n<p>她知道，他說「我進去」，是有底氣的。</p>\n<p>只是嘴上不肯讓。</p>\n<p>「你清，我補刀。」她淡淡地說。</p>\n<p>霜翎在她肩頭點了點頭，一副「就是這樣」的神情。</p>\n<p>白無極轉過頭看了那隻銀狐一眼，又看了看蘇念卿，無奈地扯了扯嘴角：「行，那你看著。」</p>\n<p>他往前走了兩步，然後回頭補了一句：「真的不用補刀。」</p>\n<p>蘇念卿沒有回答，只是抱起霜翎，退到了一塊大石後面。</p>\n<p>那個動作很默契。</p>\n<p>不是「我不放心你」，而是「我信你，但我也做好了備用準備」——這是兩個人在過去幾個星期的長途跋涉裡，慢慢養出來的東西。不用說，不用解釋，各就各位。</p>\n<p>白無極踩著枯草繼續往前走。</p>\n<p>霧氣在腳踝處打轉，越往裡走越濃，遠處的建築輪廓越來越清晰——</p>\n<p>是石頭堆成的，巨大，粗礪，沒有任何裝飾性的花紋，純粹是厚重的石塊互相咬合，抗拒了千年的風化。大門方向有一片開闊的空地，空地上，七個輪廓正在慢慢從霧氣裡浮現出來。</p>\n<p>白無極站定，看清了。</p>\n<p>最矮的一頭有人的三倍高，像一隻放大版的鬣狗，但渾身覆蓋著黑色的靈力鱗甲，每一步踩下去地面微微震顫。旁邊兩頭是翼型魔獸，翅膀展開將近十米，靈力在羽翼上凝成了刀刃狀的硬翅。再遠處還有四個——蛇型，熊型，還有兩個完全看不出原本形態的，只剩下密集的黑色靈力核心在轉動。</p>\n<p>七頭。</p>\n<p>每一頭，都是契王級。</p>\n<p>白無極把手插進口袋，歪著頭看了幾秒。</p>\n<p>如果用正常方法打——他一個人，七頭契王，這不是打，這是找死。</p>\n<p>但他不是正常的人。</p>\n<p>七頭魔獸感應到了入侵者的氣息，同時發出低沉的嘶吼，契王級的靈力波動像潮水一樣向外翻湧，那股壓力讓荒原上的草地都向外倒伏，霧氣被衝散了一圈。</p>\n<p>白無極在那片壓力裡，輕輕呼了口氣。</p>\n<p>然後，他對白金之星說了一個字。</p>\n<p>「動。」</p>\n<p>---</p>\n<p>蘇念卿守在大石後面，看著前方的霧氣。</p>\n<p>霜翎偎在她懷裡，耳朵豎直，尾巴夾緊，所有感知都往前延伸。</p>\n<p>三秒。</p>\n<p>五秒。</p>\n<p>然後——七聲悶響，前後相差不到兩個呼吸，轟轟轟轟轟轟轟，每一聲都是沉重的東西砸在地上的聲音，地面輕微震動，從腳底一路傳到脊背。</p>\n<p>然後，沒有了。</p>\n<p>寂靜。</p>\n<p>蘇念卿從大石後面走出來，往前走了十幾步，穿過剩下的霧氣，看到了空地上的狀況。</p>\n<p>七頭契王級魔獸，全部倒地。</p>\n<p>每一頭的胸腔正中都有一個精準的破損——那裡是靈核的位置，現在已經是一個洞。靈核被擊碎，魔獸徹底死透，連掙扎的反應都沒有。</p>\n<p>白無極站在七具屍體的正中央，衣服上沾了一點血，是在出手的時候蹭到的，位置在左袖口，一個巴掌大的深色斑點。他的神情很平靜，低頭看了看那個斑點，皺起眉。</p>\n<p>「這件衣服沒了。」他喃喃道。</p>\n<p>蘇念卿走過來，視線在七頭魔獸屍體上掃了一圈，確認沒有活的，然後看向他。</p>\n<p>「需要補刀嗎？」</p>\n<p>「不用了。」白無極抬起頭，看了她一眼，「我說過不用的。」</p>\n<p>蘇念卿看著那七具倒地的龐然大物，沉默了兩秒。</p>\n<p>不是震驚。</p>\n<p>她不是第一次見他這樣了。</p>\n<p>只是……契王，七頭，全部倒地，衣服上沾的血比那七頭魔獸加在一起的損傷還要少，這種事情還是需要消化一下。</p>\n<p>霜翎從她懷裡跳出來，在地上小跑了兩步，湊近其中一頭魔獸的屍體嗅了嗅，用尾巴尖戳了戳，確認死透了，然後回頭朝蘇念卿叫了一聲，那意思非常明確——</p>\n<p>沒問題，可以進了。</p>\n<p>白無極把左袖口的血跡卷進袖管，抬起頭看向前方的石製建築。</p>\n<p>霧氣已經在散，可能是外圍的靈力守衛消失後，遺跡的氣場有所鬆動。建築的輪廓越來越清晰，那是一種說不清來自哪個年代的建築風格——不是現在天衍大陸任何一個國家的樣式，石塊太大，排列太工整，整座建築給人的感覺是：這不是人用來住的地方，這是某種紀念性的東西。</p>\n<p>蘇念卿走到他身邊，兩個人並排看著前方。</p>\n<p>「進去。」她說。</p>\n<p>「進去。」他應。</p>\n<p>兩個人的肩膀靠得很近，蘇念卿沒有往旁邊移，白無極也沒有注意到這個細節——他的注意力全在前方那座沉默了千年的建築上。</p>\n<p>霜翎跑在最前面，尾巴昂起來，引路的架勢。</p>\n<p>三個人踏上了通往遺跡的石板路。</p>\n<p>石板很大，每一塊都有桌子那麼寬，縫隙裡長著不知名的灰色苔蘚，踩上去沒有聲音，只有靈力從腳底緩緩滲入，帶著久遠的，幾乎要讓人窒息的古老氣息。</p>\n<p>白無極走著走著，掌心又微微發熱了。</p>\n<p>他低頭看了看自己的手，黃金體驗的金色光芒從指縫滲出來，輕輕的，像是在呼應什麼——或者說，像是感應到了某種相似的東西。</p>\n<p>他把手握起來。</p>\n<p>「快了。」他輕聲說，沒有說清楚這句話的對象。</p>\n<p>蘇念卿側過頭看了他一眼，沒有問。</p>\n<p>遺跡的大門，已經近在眼前。</p>"}, {"title": "第82章_五秒碾壓", "content": "<p>第82章　五秒碾壓</p>\n<p>空地上的靜止只持續了不到一秒。</p>\n<p>七頭契王級魔獸同時感應到入侵者，七個龐然大物同時動了。</p>\n<p>那個「同時」不是比喻，是真的同時——像是有什麼東西在瞬間發出了指令，七頭形態各異、種族不同的高階魔獸，在同一個呼吸間轉向，鎖定，起步，向白無極衝來。</p>\n<p>大地在顫抖。</p>\n<p>七股契王級靈力波動疊加在一起，那個壓力是真實的、物理的，荒原上的枯草被壓得貼地，霧氣在半空中被衝成了渦狀，白無極站在浪潮的中心，感受到那股壓力從四面八方向他擠壓過來。</p>\n<p>一般的契師站在這裡，在魔獸撲到身上之前，光是靈壓就會把人壓垮。</p>\n<p>但白無極不是一般的契師。</p>\n<p>他深吸一口氣，讓那股壓力填滿肺腔，然後呼出來。</p>\n<p>「白金之星。」</p>\n<p>他沒有大聲說出來，那個名字只是在心裡成形，替身已經收到了。</p>\n<p>白金之星從他身後顯化——那個身形與他相仿、渾身覆蓋著星空色鎧甲的替身，無聲無息地站到了他的身旁，蓄勢待發。</p>\n<p>七頭魔獸距離他還有不到一百米。</p>\n<p>最快的那頭翼型魔獸翅膀展開，靈力刀刃在空中劃過，已經到了七十米。</p>\n<p>白無極看著它衝來，沒有動。</p>\n<p>六十米。</p>\n<p>五十米。</p>\n<p>鬣狗型的從左側包抄，蛇型的從地底鑽出，兩頭形態不明的黑色靈力核心在空中高速旋轉，已經半包圍了他的正前方。</p>\n<p>四十米。</p>\n<p>白無極輕聲說：「The World。」</p>\n<p>---</p>\n<p>世界靜止了。</p>\n<p>不是慢下來，不是減速，是真真正正的——靜止。</p>\n<p>那七頭正在衝鋒的龐然大物，就像被按下了暫停鍵，定格在各自的姿態裡。翼型魔獸的翅膀展在半空，靈力刀刃在它翼尖凝固成一片硬光。鬣狗型的前爪抬起，身形傾斜，靈力鱗甲上的每一片紋路都清晰可辨。蛇型的頭部已經從地底竄出，大嘴張開，靈力腐蝕的霧氣凍結在牙縫間，形狀詭異。</p>\n<p>整個世界停了。</p>\n<p>風停了。草停了。霧氣停了。</p>\n<p>只有白無極，和白金之星，還在動。</p>\n<p>五秒。</p>\n<p>白金之星的速度是什麼概念，白無極第一次感受到完整進化版的The World時，就有了答案：那個速度不是快，是在靜止的時間裡重新定義了「移動」這個詞。靜止的世界沒有阻力，沒有空氣摩擦，沒有任何障礙，白金之星就像一道星光，在凝固的空氣裡劃出殘影。</p>\n<p>第一頭，翼型魔獸。</p>\n<p>白金之星從它的正下方掠過，右拳精準擊向它胸腔中央——靈核的位置在高階魔獸的胸腔深處，有靈力甲殼包裹，但在白金之星的拳頭落下的那一刻，星空色的靈力穿透了所有防護，靈核碎裂，沉悶的破碎聲在靜止的世界裡顯得格外清晰。</p>\n<p>白金之星已經到了第二頭。</p>\n<p>鬣狗型，抬起前爪的姿態，胸腔正對著外側，靈核暴露。白金之星的速度沒有任何停頓，掌刃切入，精準，乾淨。</p>\n<p>三秒。</p>\n<p>第三、第四、第五頭，蛇型和兩頭形態不明的黑色靈力核心——這三頭的靈核位置比較隱蔽，但白無極在觀察它們的時候已經判斷出了大概位置，白金之星一一掠過，拳頭、掌刃、指尖，按著最省時間的順序，逐一出手。</p>\n<p>四秒半。</p>\n<p>第六頭，熊型，靈核位置最深，包裹它的靈力甲殼最厚。白金之星在它面前停了不到半秒，積蓄力道，全力一拳貫穿，靈核碎裂的聲音比前幾頭都要大。</p>\n<p>第七頭——</p>\n<p>五秒。</p>\n<p>時間重啟了。</p>\n<p>---</p>\n<p>白無極站在空地中央，保持著The World發動前的原始姿勢，雙手插在口袋裡，表情平靜。</p>\n<p>然後，七聲轟響。</p>\n<p>轟。</p>\n<p>轟轟。</p>\n<p>轟轟轟轟。</p>\n<p>七頭龐然大物，從各自衝鋒的姿態，直接以那個姿態轟然倒地——沒有掙扎，沒有嘶吼，靈核已經碎了，它們的身體沒有接收到任何來得及反應的時間，就已經死透了，所以倒下去的時候連最後一聲吼叫都發不出來，只有龐大的軀體砸在地面上，激起一片塵土。</p>\n<p>翼型魔獸倒下去的時候翅膀砸在白無極的左側，颳起的氣流把他的頭髮吹亂了，他抬手攏了攏頭髮，低頭看了看左袖口。</p>\n<p>左袖口沾了一點血，是熊型魔獸的靈核碎裂的時候，靈力震波把它胸腔裡的液體往外濺了，蹭到了一點。</p>\n<p>「這件衣服沒了。」他喃喃道。</p>\n<p>換件衣服的預算又要從蘇家報銷了。也不知道人家算不算出行補貼。</p>\n<p>他正在思考這個嚴肅問題的時候，背後傳來腳步聲。</p>\n<p>蘇念卿走過來了。</p>\n<p>她穿過那些倒地的巨大屍體，視線從每一頭掃過，確認無誤，然後看向白無極。</p>\n<p>那個視線停在他臉上停了兩秒，像是在核對什麼。</p>\n<p>「需要補刀嗎？」她問。</p>\n<p>聲音很平靜，但白無極聽出了一點點——被堵了一口氣卻找不到地方發出去的那種，無奈裡帶著一點說不清道不明的情緒。</p>\n<p>「不用了。」他說，「我說過不用的。」</p>\n<p>蘇念卿沒有再說話。</p>\n<p>霜翎從她懷裡跳出來，在地上小跑了兩步，湊近其中一頭魔獸的屍體嗅了嗅，用尾巴尖戳了戳，確認死透了，然後回頭朝蘇念卿叫了一聲。</p>\n<p>「可以進了。」蘇念卿翻譯道。</p>\n<p>白無極往前走了兩步，然後回頭補了一句：「真的不用補刀。」</p>\n<p>「我知道。」蘇念卿跟上他，語氣淡淡的，「我只是問一下。」</p>\n<p>她問那一句「需要補刀嗎」是什麼意思，白無極沒有再去想了。兩個人並排往遺跡的方向走，七頭契王級魔獸的屍體在身後慢慢失去靈力光澤，變成徹底的死物。</p>\n<p>荒原的霧氣在散。</p>\n<p>石製建築的大門已經近在眼前，沉默，厚重，像一個等待了千年的老人，終於等到了有人來敲門。</p>\n<p>白無極把左袖口卷進袖管，抬起頭，看著那扇巨大的石門。</p>\n<p>石門沒有任何開啟機關，縫隙裡有枯草的根系爬進去，看起來已經多年無人踏入。但他往前走了兩步，石門就自己動了——緩緩向兩側退開，發出低沉的石塊摩擦聲，像是在歡迎，又像是在警告。</p>\n<p>一股古老的靈力從裡面溢出來。</p>\n<p>比外面空地上的靈力還要濃，還要沉，還要舊。</p>\n<p>白無極深吸一口氣，踏進去。</p>\n<p>門後是長長的走廊，石板鋪地，兩側牆壁嵌著某種會發微光的礦石，把走廊照得昏黃，走廊的盡頭通向更深處的黑暗。</p>\n<p>霜翎跑在最前面，尾巴昂起，引路。</p>\n<p>「走廊裡還有靈力波動，但比外面的弱。」蘇念卿低聲道，「應該是更深層的守衛還沒有被激活。」</p>\n<p>「那我們快點。」白無極往走廊深處看了一眼，「趁它們還沒醒。」</p>\n<p>兩個人加快了腳步，走廊的燈光在身後亮起又熄滅，像是某種呼吸，遺跡在確認造訪者的身份，判斷是否需要驚醒更深處的東西。</p>\n<p>走廊的盡頭出現了一個拱形的石門。</p>\n<p>白無極伸手推開了它。</p>\n<p>裡面，是一個巨大的石室。</p>"}, {"title": "第83章_遺跡內部", "content": "<p>第83章　遺跡內部</p>\n<p>石室很大。</p>\n<p>大到白無極站在入口，往裡看了一眼，第一個反應不是「這是什麼」，而是「這個遺跡的建造者，花了多少功夫在這上面」。</p>\n<p>天花板很高，至少有十層樓，靠近頂部的位置有一個環形的開口，外面的天光從那個開口透進來，斜斜地打在正中央的地板上，形成一個光柱，照亮了地面上複雜的線條——那些線條是刻進石板裡的，密密麻麻，像是某種圖案的輔助線，但中央最核心的部分已經被時光磨損，看不清楚原本的形狀。</p>\n<p>牆壁。</p>\n<p>白無極的視線轉到牆壁上。</p>\n<p>四面牆壁，從地板到天花板，密密麻麻全是東西。</p>\n<p>不是現在天衍大陸通用的文字——現在的文字他認識，四大家族的書籍他也翻過不少，和牆上的不同。牆上的像是某種更古老的字體，或者說更接近圖形，每個字元都有一個核心的幾何形狀，然後在幾何形狀外面延伸出不同方向的線條，組合成詞，組合成段。</p>\n<p>白無極不認識。</p>\n<p>但圖案他認識。</p>\n<p>因為圖案很具象，古人就算用的文字不同，想表達「人」這個概念的時候，還是會畫一個人形。</p>\n<p>牆上有很多「人形」。</p>\n<p>但不只有人形。</p>\n<p>白無極的腳步放慢了，他沿著最近的一面牆走過去，視線從那些刻進石壁的圖案上掃過，然後在某個位置，停了。</p>\n<p>那裡有一個圖案，比周圍的都要大，刻得比周圍的都要深。</p>\n<p>是一個人，站立的姿態，人形的線條簡潔但清晰——但這個人的身後，跟著一個「影」。</p>\n<p>那個「影」的形態，不是正常的投影，不是跟著光源方向延伸的影子。那個影是獨立的，站在人的身旁，身形比人高大半截，輪廓有著某種力量感，手臂的比例比正常人長，姿態是蓄勢待發的。</p>\n<p>白無極看著那個「影」，呼吸微微停頓了一下。</p>\n<p>那個形態——</p>\n<p>他認識。</p>\n<p>他每天都能看見。</p>\n<p>那個「影」的輪廓，和白金之星的輪廓，幾乎一模一樣。</p>\n<p>「你認識這個？」</p>\n<p>蘇念卿走到他身邊，視線跟著他看向那個圖案，聲音裡帶著職業性的分析冷靜，但如果仔細聽，有一絲輕微的——注意到了什麼的敏銳。</p>\n<p>白無極盯著那個「影」的形態，沉默了兩秒。</p>\n<p>「有點像。」他說。</p>\n<p>「有點像什麼？」</p>\n<p>「有點像……」他抬起手，在空氣裡比劃了一下，比劃的形狀是那個「影」的輪廓，「我見過的東西。」</p>\n<p>蘇念卿沒有再追問。</p>\n<p>她沿著牆壁繼續看，霜翎跟在她身邊，小爪子踩在石板地上，輕輕地嗅著空氣，偶爾在某個位置停下來，用爪子劃一劃地面，像是在核對什麼氣味地圖。</p>\n<p>「這裡不止一幅。」蘇念卿走到另一面牆，「這邊也有。」</p>\n<p>白無極跟過去。</p>\n<p>這一面牆上的圖案更複雜——不是一個人和一個影，而是很多組，每一組人形和影形的配對都不一樣。有的影很小，貼在人的腳邊。有的影和人等大，站在人的側面。有的影大得驚人，把人的身形完全蓋住，只剩一個小小的人的輪廓縮在影的中心。</p>\n<p>「層次，」蘇念卿開口，聲音裡有她思考時特有的抑揚頓挫，「這些圖案在記錄某種層次系統。影越大，代表越高的等級。」</p>\n<p>「就像靈契等級？」白無極問。</p>\n<p>「類似的概念，但不一樣。」她皺起眉，「靈契等級記錄的是契師和契獸之間的紐帶強度，這些圖案記錄的是——」她停頓了一下，「是一個人，和他自己的影，之間的關係。」</p>\n<p>「和自己的影。」</p>\n<p>白無極把這幾個字重複了一遍，心跳節奏莫名地慢了半拍。</p>\n<p>「古籍裡有沒有提到過這種東西？」他問。</p>\n<p>「蘇家古籍有一條記載，我告訴過你的，」蘇念卿回頭看了他一眼，「無契之人。能以精神力驅動力量而無需靈契代價。古籍的描述不詳細，只說這種人在遠古時代曾存在過，後來消失了。」她停頓了一秒，「我以為是誇大的傳說。」</p>\n<p>「現在呢？」</p>\n<p>「現在，」她看著牆上那些人形和影形的圖案，「我覺得蘇家古籍記載的那個傳說，可能是真的。」</p>\n<p>石室很靜。</p>\n<p>靜到白無極能聽見自己的心跳，能聽見霜翎的爪子踩在石板上的細碎聲音，能聽見牆壁上那些圖案散發的古老靈力，在空氣裡輕微地顫動。</p>\n<p>他走到石室的中央，站在那個光柱裡，仰起頭，往天花板的環形開口看。</p>\n<p>「這個地方，建造它的人，是想記錄什麼？」他問，不是問蘇念卿，是問這個石室本身。</p>\n<p>當然沒有人回答。</p>\n<p>但白無極的掌心開始發熱了。</p>\n<p>黃金體驗，Life——那個屬於他的替身，在這個充滿古老靈力的石室裡，開始產生了某種共鳴的反應，金色的光芒從指縫裡溢出來，很淡，像是燭火，但很穩定。</p>\n<p>蘇念卿注意到了他的手，但沒有說話。</p>\n<p>她繼續在牆壁上找。</p>\n<p>遺跡的核心，是在更深處——這個石室只是前廳，是記錄入口，真正完整的記載，應該在更裡面。她沿著石室的牆壁繞了一圈，找到了一個石柱後面隱藏的通道口，入口不大，需要側身才能進去，裡面往深處延伸，有微弱的光芒。</p>\n<p>「找到了，」她招手叫白無極，「繼續往裡。」</p>\n<p>白無極往那個通道看了一眼，點頭，跟上去。</p>\n<p>霜翎已經先鑽進去了，細長的身形完全沒有被通道寬度影響，進去之後立刻加快速度，在前面探路。</p>\n<p>通道不長，走了不到一分鐘，豁然開朗——</p>\n<p>是另一個石室，更小，牆壁上的圖案卻更密集，更複雜，文字的比例比圖案高，有一種密密麻麻的記錄感，像是一個人窮盡一生把所有的知識都刻進這面石壁，不留任何空白。</p>\n<p>但最吸引白無極注意的，是這個石室正中央的台座。</p>\n<p>台座是石頭的，高度到他胸口，台座上放著一個石盒，石盒上落了厚厚一層灰，但灰下面隱約透出某種光澤。</p>\n<p>白無極沒有急著去碰那個石盒。</p>\n<p>他先在這個石室裡掃了一圈，確認沒有新的守衛波動，然後走到最近的一面牆壁前，看著上面的記載。</p>\n<p>雖然那些古老文字他不認識，但圖案他能讀。</p>\n<p>這個石室的牆壁圖案，比前廳的更具體——前廳是人和影的關係圖，這個石室是「如何形成影」的過程圖，每一步都有詳細的圖示，像是操作手冊，像是教學圖解。</p>\n<p>白無極看著那些圖案，看著那個「人」和「影」之間的連線，看著那個影從模糊到清晰，從輪廓到實體的過程，陷入了長達兩分鐘的沉默。</p>\n<p>「你看得懂嗎？」蘇念卿的聲音從旁邊傳來。</p>\n<p>「圖能大致理解，」他說，「文字不行。」他轉過頭，「你能不能拓印下來？你應該有那個材料。」</p>\n<p>蘇念卿從儲物戒指裡取出了一卷薄薄的特製紙張——這是她出發前就準備好的，用於記錄遺跡中的文字和圖案，遇熱貼附，能完整複製石壁上的刻痕。</p>\n<p>「需要多少時間？」</p>\n<p>「把這個石室裡的全拓完，半個時辰。」</p>\n<p>白無極往出口方向看了一眼，然後往台座上那個石盒看了一眼。</p>\n<p>「那我去前廳守著，你拓印。」他說，「有動靜叫我。」</p>\n<p>蘇念卿點頭，已經開始動手了。</p>\n<p>白無極退回前廳，在石室入口的通道旁邊站定，往遺跡的大門方向看。</p>\n<p>荒原的風從外面吹進來，帶著枯草的氣息。</p>\n<p>白無極把手放在側面的牆壁上，石壁的溫度比外面低，有種讓人心定的涼意。他盯著牆上那個大圖案，盯著那個「影」的形態，心裡轉著某些還沒有成形的念頭。</p>\n<p>「你到底是什麼，」他輕聲說，說的對象是白金之星，也是黃金體驗，也是那個牆上古老的影，「我遲早要搞清楚的。」</p>\n<p>白金之星在他身後靜靜站著。</p>\n<p>沒有回應，但也沒有離開。</p>\n<p>就像一直以來那樣，站在他身後，等待下一個命令，或者只是——陪著。</p>\n<p>白無極低下頭，笑了一下。</p>\n<p>這時候，外面有聲音傳來。</p>\n<p>不是魔獸的。</p>\n<p>是人的腳步聲，和壓低嗓音說話的聲音。</p>\n<p>白無極的笑容收了，眼神沉了兩分，他把手從牆壁上收回來，握拳，聽了三秒，確認方向。</p>\n<p>「有人來了。」</p>\n<p>他把聲音壓低，往內室通道的方向說了一句，讓聲音能傳進去讓蘇念卿聽見。</p>\n<p>然後他轉向石室的大門，往外走，去迎接不速之客。</p>"}, {"title": "第84章_赫連家也來了", "content": "<p>第84章　赫連家也來了</p>\n<p>腳步聲從遺跡走廊的方向傳來，不止一個人。</p>\n<p>白無極在大門入口站定，數了一下步伐間距和節奏——至少八到十個人，都訓練有素，走路輕，但不是刻意的靜音，是長期訓練養成的行走習慣，腳跟不硬著地，靈力流動有節制。是戰士。</p>\n<p>是高手。</p>\n<p>然後他們出現了。</p>\n<p>走廊的弧度在前方二十米處轉彎，第一個人影從轉角處出現，黑色戰服，背負長刀，臉上有遮擋下半臉的護具，靈力波動是契師高段，走在最前面的是偵查位。後面跟著兩個，三個，五個，八個——最後出來的，是隊伍正中間的那個人。</p>\n<p>白無極認出他了。</p>\n<p>甚至在那個人認出他之前，就認出了。</p>\n<p>那個背影，那個走路的姿態，那個頭上束起的銀白髮帶——</p>\n<p>赫連烈。</p>\n<p>天契大比，第二名，輸給白無極的那個人。</p>\n<p>赫連烈走在隊伍中央，正在低頭看一塊類似導引石的東西，手裡的導引石發著微弱的光，光的方向指著遺跡深處——他們手裡有指引遺跡位置的東西，而且精確到了室內。</p>\n<p>然後他抬起頭，看到了站在石室入口的白無極。</p>\n<p>兩個人對視。</p>\n<p>一秒。</p>\n<p>兩秒。</p>\n<p>赫連烈的臉色經歷了一個複雜的旅程：從「專注導引石」到「抬頭繼續找路」到「這個人怎麼在這裡」到「等一下我再確認一下」到「確實是他」的全套流程，用了不到三秒。</p>\n<p>然後他的眉頭皺起來了，皺的幅度相當顯著。</p>\n<p>「你怎麼在這？」他開口，聲音沉著，但剋制不住裡面那一層：「偏偏又是你」的情緒。</p>\n<p>白無極把手插進口袋，表情平靜。</p>\n<p>「旅遊。」</p>\n<p>「……」</p>\n<p>赫連烈的臉色更複雜了。他停頓了兩秒，看了看白無極背後的石室，又看了看石室外圍空地上隱約可見的七頭魔獸屍體，眉頭皺得更深。</p>\n<p>「你把外圍守衛解決了？」</p>\n<p>「順路。」</p>\n<p>「七頭契王。」</p>\n<p>「嗯，差不多那麼多。」</p>\n<p>赫連烈沉默了一下，往白無極後方掃了一眼：「你一個人？」</p>\n<p>「帶了朋友。」白無極側了側身，「她在裡面做記錄。」</p>\n<p>這時候，蘇念卿從內室通道裡走出來了。</p>\n<p>她聽到動靜的時候就放下了拓印工作，能拓的已經拓了一部分，剩下的看情況——現在這個情況顯然需要她出來判斷。</p>\n<p>蘇念卿走到白無極身邊，視線從赫連烈身上掃過，又把那八個黑衣戰士都掃了一圈，落回到赫連烈臉上。</p>\n<p>「赫連烈。」她只說了這個名字，語氣平，像是在確認一個信息。</p>\n<p>赫連烈看到蘇念卿，眉頭稍微舒展了一點，躬身行了一個禮。「蘇家姐。」</p>\n<p>「你們來這裡做什麼。」這不是問句，是陳述。</p>\n<p>赫連烈直起身，把手裡的導引石收起來。「赫連家的族志裡有關於這個遺跡的記載，說遺跡深處有一件上古靈器，赫連家的先祖曾試圖取得但失敗了，留下了這塊導引石和部分記錄。族裡這次讓我們來，是為了把那件靈器取回。」</p>\n<p>「靈器。」白無極把這個詞念了一遍，然後看向蘇念卿：「你們的目標不一樣。」</p>\n<p>蘇念卿點頭：「我們要的是遺跡中的文字記載。」</p>\n<p>「那就不衝突了？」</p>\n<p>在場的氣氛微妙地停頓了幾秒。</p>\n<p>赫連烈看著白無極，那個視線裡有一種複雜的情緒——輸給人之後重新見到那個人，而那個人還在笑嘻嘻地說「那就不衝突了」，心情確實複雜。</p>\n<p>天契大比的時候，赫連烈在進入決賽之前幾乎沒有遇到過真正的對手，他的修為紮實，靈獸配合默契，一路過來幾乎全勝。然後在決賽，遇到了白無極。</p>\n<p>那一場比賽他想了很多次，每一次想，都覺得不對勁。</p>\n<p>白無極的表現太奇怪了。不像一個系統訓練出來的靈師，更像一個——有某種奇特天賦的普通人，臨機應變的速度快得異常，而他的「靈獸」——不對，他根本沒有靈獸，他用的是某種完全不同的力量。</p>\n<p>赫連烈至今沒搞清楚那個力量是什麼。</p>\n<p>而且最讓他難以消化的是，那場比賽輸掉的方式太乾脆了，乾脆到讓他懷疑：是不是白無極根本沒有全力出手？</p>\n<p>但這話不好問。</p>\n<p>現在兩個人面對面站著，赫連烈整理了一下思緒，道：「不衝突。我們的目標是靈器，靈器的位置在遺跡最深處，和你們的目標應該是不同區域。」</p>\n<p>「好，」白無極點頭，「那我們各走各的，遇到麻煩各自解決，有需要互相通報一聲。」</p>\n<p>「……你說話怎麼這麼像是在談生意。」赫連烈皺眉。</p>\n<p>「我就是在談生意。」白無極攤手，「有問題嗎？」</p>\n<p>赫連烈沉默了兩秒，然後點頭：「沒有問題。」</p>\n<p>達成了某種临时協議，雙方都鬆了一口氣——蘇念卿鬆氣是因為可以繼續拓印，白無極鬆氣是因為不用打架，赫連烈的八個黑衣戰士集體把手從武器上移開，緊繃的氣氛散了一些。</p>\n<p>赫連烈正要示意隊伍往深處走，又停了一下，轉回頭看向白無極。</p>\n<p>「外圍那七頭，你一個人清的？」他的聲音裡有一種很剋制的，對答案心知肚明但還是要確認的語氣。</p>\n<p>「嗯。」</p>\n<p>「多長時間？」</p>\n<p>白無極想了一下。「五秒。」</p>\n<p>赫連烈的臉部肌肉動了一下，控制得很好，但還是讓白無極看到了那個極微弱的「不是吧」的反應。</p>\n<p>「我知道了。」他說，然後不再問了，示意隊伍往深處走。</p>\n<p>八個黑衣戰士魚貫而過，赫連烈走在中間，從白無極身邊路過的時候，偏頭看了他一眼，沒有說話，但那個眼神裡有一種說不清楚的東西——不是敵意，不是友善，是某種「我們之間的事還沒結束」的平靜聲明。</p>\n<p>白無極目送他們進了走廊，消失在轉角。</p>\n<p>「天契大比輸給你的那個。」蘇念卿的聲音在身邊響起，不是問句。</p>\n<p>「嗯。」</p>\n<p>「他很強。」</p>\n<p>「是啊，」白無極說，「比他自己知道的還要強，就是方法有點死板。」</p>\n<p>蘇念卿斜了他一眼。這句評語，出自一個連自己力量體系都搞不清楚的人，真的很有意思。</p>\n<p>但她沒有說出來。</p>\n<p>「繼續拓印。」她說，「赫連家的人進來就代表遺跡的其他入口也已經被找到了，不知道還有沒有第三方。時間不多。」</p>\n<p>「明白。」</p>\n<p>兩個人重新走進石室，霜翎從牆角的暗處冒出來，顯然剛才一直在觀察，現在見沒有危險，才重新跑出來，在蘇念卿腳邊繞了一圈。</p>\n<p>蘇念卿重新展開拓印材料，繼續工作。</p>\n<p>白無極站在通道入口，一邊守望，一邊把視線放在牆上那個「人和影」的大圖案上。</p>\n<p>他能感覺到，遺跡深處有什麼東西在緩緩醒來。</p>\n<p>不是赫連家帶來的，是遺跡本身的——更深層的守衛，在感應到越來越多的外來者之後，開始蠢蠢欲動。</p>\n<p>靈力波動從地底傳來，低沉，厚重，比外面那七頭契王的波動還要濃郁。</p>\n<p>白無極的手握緊了一下。</p>\n<p>「快點拓印，」他說，「可能要打架了。」</p>"}, {"title": "第85章_三方混戰", "content": "<p>第85章　三方混戰</p>\n<p>守衛醒了。</p>\n<p>不是從某一個方向過來，而是從四面八方——從地板，從牆壁縫隙，從天花板的裂縫，從白無極看不到的黑暗深處。它們不是在外面等待，它們一直在這裡，沉睡在遺跡的結構裡，和石塊融為一體，直到有足夠多的外來者觸動了遺跡的警戒閾值，它們才甦醒。</p>\n<p>第一波出現在前廳。</p>\n<p>三頭，比外圍的守衛形態更奇特——身形細長，像蜥蜴但又不像，四肢的比例有問題，太長，末端是尖銳的靈力結晶，渾身發著暗紅色的光，眼睛是複眼，每個眼珠都在追蹤。</p>\n<p>契王高段，接近契聖邊緣。</p>\n<p>「退後。」白無極對蘇念卿說，他的聲音很平靜，但語速加快了。</p>\n<p>「拓印還差三分之一。」</p>\n<p>「多少時間？」</p>\n<p>「一刻鐘。」</p>\n<p>「給你守。」白無極往前走，「繼續拓。」</p>\n<p>三頭守衛感應到白無極向前的動作，同時動了，速度比外圍的魔獸快一截，奔跑的姿態是撲食動物的低位衝鋒，靈力結晶的末肢在石板地上拖出火花。</p>\n<p>白無極沒有用The World。</p>\n<p>五秒是資源，要省著用。</p>\n<p>他把白金之星顯化，兩人一影，對上三頭守衛。</p>\n<p>白金之星的速度在這個場合顯出了優勢——哪怕不開時停，白金之星的移動速度也遠超一般的契師，那個速度配上近戰格鬥的技巧，是一架精密的戰鬥機器。它先攔住正面衝來的第一頭，白無極繞向側面，截住試圖包抄的第二頭。</p>\n<p>第三頭繞過混戰，直奔後方石室。</p>\n<p>「霜翎。」蘇念卿的聲音響起，短促而沉。</p>\n<p>銀色靈力爆發。</p>\n<p>霜翎從蘇念卿身邊竄出去，九條尾巴全部展開，瞬間膨脹成原本體型的兩倍，那股銀白色的靈力化作冰霜，在第三頭守衛衝過來的路徑上凝成一堵牆——不是攻擊，是阻擋，給蘇念卿的拓印爭取時間。</p>\n<p>守衛撞上冰霜壁，速度減緩，靈力結晶的末肢砍入冰層，層層擊碎，但霜翎的牆是疊加的，一層又一層，每破一層就有新的一層在後面接上。</p>\n<p>蘇念卿手上的動作沒有停。</p>\n<p>前廳混戰的聲音穿過通道傳進來，白無極和白金之星同時對戰兩頭守衛，石板地上被靈力破壞出一道道裂痕，某處牆壁的圖案被波及，掉落了一塊石片。</p>\n<p>就在這時候，遺跡深處傳來爆炸聲。</p>\n<p>赫連家那邊也遇上守衛了。</p>\n<p>不止一聲，是連續的，靈力震波沿著走廊傳過來，把懸在半空的塵埃震得掉落，石室的天花板震出幾條新的裂縫。赫連家那邊遇上的守衛數量應該更多，或者等級更高——爆炸的頻率和震動的力度都比白無極這邊大。</p>\n<p>然後，一個黑衣戰士從走廊深處倉皇退出來，腳步有些踉蹌，右肩受傷，靈力護甲有破損，沿著走廊退到了前廳，看到還在混戰的白無極，愣了半秒：「你們——」</p>\n<p>「守衛多大？」白無極一邊格開身邊那頭守衛的靈力結晶攻擊，一邊分神問了一句。</p>\n<p>「五頭，比這邊的大！」黑衣戰士喘了口氣，「都是契聖邊緣級別，赫連公子讓我們分散——」</p>\n<p>「別分散，」白無極打斷他，「分散是找死，合力打。」</p>\n<p>那個黑衣戰士怔了一下，但他的訓練反應讓他立刻重新站穩，轉身重新投入——但往哪個方向投入成了問題，前廳有白無極在，後方走廊是赫連烈在撐著。</p>\n<p>「幫赫連烈。」白無極做了決定，「他那邊人多守衛也多，你回去。」</p>\n<p>黑衣戰士看了他一眼，點頭，轉身跑回走廊。</p>\n<p>前廳的三頭守衛，白無極和白金之星各負責一頭半——白金之星的節奏不亂，白無極偶爾插手輔助，但更多時候是在觀察，在判斷什麼時候出手最省力。</p>\n<p>八極拳的核心不是花式，是結構破壞——找到對手的重心，在它最穩定的時候用最小的力打出最大的位移。這個原理用在普通人身上有效，用在靈力魔獸身上也有效，只是施力點不同。</p>\n<p>白無極找到了第一頭守衛的靈核位置——就在它最薄的靈力甲殼內側，每次抬前肢的時候暴露出一個持續約半秒的空隙。</p>\n<p>他等了兩個機會，確認規律，第三次空隙出現的時候，白金之星從白無極身後一穿而過，精準擊中那個空隙，靈核碎裂。</p>\n<p>一頭倒地。</p>\n<p>剩下兩頭。</p>\n<p>深處走廊的爆炸聲沒有停，赫連家那邊打得很激烈，偶爾有人影從走廊裡閃過，是黑衣戰士在移動換位。</p>\n<p>蘇念卿的聲音從後方傳來：「還差最後一面，再等我。」</p>\n<p>「給你五分鐘，」白無極應了一聲，把注意力重新放回面前的守衛，「超時加收費。」</p>\n<p>「誰要付費？」</p>\n<p>「你蘇家出，很合理。」</p>\n<p>「……你現在這個時間說這個？」</p>\n<p>「多線任務，習慣了。」</p>\n<p>霜翎在後方又堆了一層冰霜壁，把正在啃冰的那頭守衛繼續釘在原地。蘇念卿的拓印速度不慢，手上動作行雲流水，但那個「最後一面」不是隨便說說的，確實需要時間。</p>\n<p>白無極和白金之星轉向第二頭守衛，新一輪的纏鬥開始了。</p>\n<p>走廊深處，赫連烈的聲音隱約傳來，在指揮他的隊伍——那個聲音沉穩，沒有慌亂，指令乾脆。白無極一邊打一邊承認：赫連烈確實是個合格的隊長，就算遇上了比預計更強的守衛，他的隊伍也沒有崩。</p>\n<p>只是他本人上手的時候偶爾能感受到那股壓制性的靈力波動——赫連烈在動真格的，他的靈力比天契大比的時候展現出的還要強，可能大比的時候他也留了力。</p>\n<p>有點意思。</p>\n<p>「好了。」蘇念卿的聲音傳來，帶著輕微的喘氣聲，「拓印完成。」</p>\n<p>「退後。」白無極立刻說，「往出口方向退，不要往深處走。」</p>\n<p>他和白金之星快速收尾——兩頭剩餘的守衛，白金之星鎖住一頭，白無極打出一個短暫的靈力震波，強行打開另一頭的甲殼缺口，找到靈核位置，白金之星在它靠近的瞬間從側面截入，命中。</p>\n<p>兩頭先後倒地。</p>\n<p>霜翎那邊，被它的冰霜壁釘了許久的守衛在冰層破碎後終於衝出來，但也只衝了半步——蘇念卿出手了，她手中的靈符在空氣裡燃燒成金光，打在守衛的正面，不是致命傷，但把它的攻擊節奏完全打亂，霜翎趁著這個間隙，九條尾巴全部捲緊，纏上守衛的頸部，靈力冰封從裡往外冷卻，把整個靈核的溫度降到臨界點以下，靈核凝固，失去活性。</p>\n<p>守衛徐徐癱倒。</p>\n<p>前廳，清場。</p>\n<p>白無極抹了抹臉，轉向蘇念卿：「拓印材料收好了嗎？」</p>\n<p>「已收。」她拍了拍儲物戒指。</p>\n<p>「好，我們往更深處走，去找核心記載，」白無極說，然後往走廊方向聽了一下，深處的爆炸聲減弱了，戰鬥接近尾聲，「赫連家那邊也快清完了。」</p>\n<p>霜翎已經恢復了正常體型，爬回蘇念卿的肩頭，尾巴上的冰霜晶體還沒完全消退，閃著細碎的光。</p>\n<p>蘇念卿的手放上霜翎的背，感受到那股疲憊的顫動。「沒事。」她低聲說。</p>\n<p>霜翎把頭蹭了蹭她的臉頰，應答。</p>\n<p>三個人重新往遺跡深處走。</p>\n<p>走廊裡有打鬥留下的靈力殘跡，空氣裡飄著焦煳的氣息，石板地上有幾處燒痕，赫連家的人就是在這一段打的。</p>\n<p>再往深處走，走廊分叉了。</p>\n<p>左邊的方向，有一股微弱的靈器波動——赫連家要找的東西應該在左邊。</p>\n<p>右邊的方向，那個古老的靈力氣息更濃，更沉，從遙遠的深處一層一層漫過來，像海底的潮汐，感受不到起伏，只感受到龐大。</p>\n<p>那個方向，才是遺跡的核心。</p>\n<p>白無極往右邊看了一眼，往蘇念卿看了一眼。</p>\n<p>兩個人沒有說話，一起往右邊走。</p>"}, {"title": "第86章_赫連家的契聖長老", "content": "<p>第86章　赫連家的契聖長老</p>\n<p>右邊走廊的靈力濃度在往深處走的過程中持續攀升。</p>\n<p>白無極能感受到這種攀升的方式很特別——不是線性的遞增，而是一種類似台階的感覺，走一段平台，然後猝然上升一個台階，然後又是平台。每上一個台階，周圍的靈力厚度就增加一層，到後來，那股厚度已經讓空氣都有了一種微微的阻力感，呼吸要稍微用力，手腳的動作會有一絲細微的遲滯。</p>\n<p>普通的契師走到這裡，可能已經要靠靈力護體撐著了。</p>\n<p>蘇念卿的狀態沒問題，她的修為足夠，而且霜翎在輔助調節，銀色的靈力形成一個柔和的護罩，把最尖銳的靈力壓力緩衝掉。</p>\n<p>白無極則是另一種狀態——他感受到了那股壓力，但黃金體驗的金色光芒從指縫間溢出，自動形成了某種平衡，那股古老的靈力好像把他的替身認出來了，不推拒，甚至有一點點……歡迎的意思。</p>\n<p>這個感覺很奇怪，但他暫時沒有時間細想。</p>\n<p>右邊走廊在走了大約十五分鐘後，向下傾斜。</p>\n<p>不是緩坡，是台階，一步一步往地底延伸，台階的材質換了，從之前的普通石板變成了一種帶有紋路的深色岩石，每一塊都很厚，踩上去有點空洞的迴響，像是下面有空腔。</p>\n<p>走廊兩側的光源也換了，之前是嵌在牆上的發光礦石，現在是一種懸浮在空中的藍白色光點，沿著走廊的方向等距漂浮，像路燈，像引導，照亮每一步腳下的路。</p>\n<p>「這個光點是什麼？」白無極問。</p>\n<p>「遺跡自帶的靈陣，」蘇念卿看了一眼，「有外人進入核心區域才會啟動的那種，說明遺跡的主控機制還在運作。」</p>\n<p>「主控機制？千年前的遺跡？」</p>\n<p>「越古老的遺跡，主控機制越穩定，因為建造的材料是用靈力石製作的，有自循環能力，可以用天地靈力自我維持。」她抬手摸了一下走廊側面的岩石，「這個材料，比現在天衍大陸能找到的任何靈石都要老。至少三千年。」</p>\n<p>白無極繼續往下走，霜翎在最前面引路，那些懸浮的光點在霜翎靠近的時候微微亮了一下，像是認出了什麼。</p>\n<p>正往下走著，背後的走廊傳來腳步聲。</p>\n<p>不止一個人的。</p>\n<p>赫連家的人跟上來了。</p>\n<p>白無極沒有回頭，繼續往下走。半分鐘後，赫連烈的聲音在身後響起：「你們也往這邊來？」</p>\n<p>「對。」白無極說，「你們的靈器不在左邊？」</p>\n<p>「找到了一部分，但導引石顯示靈器的核心記憶在更深處，」赫連烈說，「也是往下走。」</p>\n<p>「那就一起了。」</p>\n<p>赫連烈跟上來，他的八個黑衣戰士跟在後面，隊伍稍微有些狼狽——打過一場，衣甲有損，但沒有人退場，都撐著。赫連烈本人的狀態要好一些，他在戰鬥裡保存了更多靈力，傷勢不重。</p>\n<p>就這樣，兩組人合流，沿著往地底延伸的走廊繼續往下走。</p>\n<p>台階越走越深。</p>\n<p>白無極估計了一下，他們現在大概已經在地面以下十幾米的位置，周圍的靈力濃度已經讓空氣幾乎可以被手觸摸到一樣，厚實，流動緩慢。</p>\n<p>然後，赫連烈隊伍的後方，有人開口了。</p>\n<p>不是黑衣戰士，是另一個聲音。</p>\n<p>那個聲音很輕，很慢，像是在隨口說話，但那個聲音一開口，走廊裡的所有人都感受到了一股截然不同的靈力波動。</p>\n<p>不是契王。</p>\n<p>不是契聖初段。</p>\n<p>是一個已經在契聖層次深耕了很久的老者，身上的靈力已經沉積成了一種近乎自然的狀態，不外露，不張揚，但就像山一樣——你感受不到它的全貌，但你知道它在那裡，而且移走不了。</p>\n<p>「老了，這地方，靈力還是這麼濃。」</p>\n<p>白無極停住腳步。</p>\n<p>回頭。</p>\n<p>赫連家隊伍的最後方，走出來一個老者。</p>\n<p>銀白長髮，梳得整齊，面容有歲月的痕跡但眉眼鋒利，穿著樸素的灰色長袍，腰間掛著一個普通的木質靈符袋，如果只看外表，你以為這是哪個鄉村的算命老翁。</p>\n<p>但那股靈力波動說明了一切。</p>\n<p>赫連烈低頭：「長老。」</p>\n<p>老者沒有看他，視線在走廊裡掃了一圈，在白無極和蘇念卿身上各停了一下，然後落回到前方的走廊深處。</p>\n<p>「你沒說他們也在。」老者對赫連烈說。</p>\n<p>「我……」赫連烈頓了一下，「沒想到他們會出現在這裡，長老。」</p>\n<p>老者「嗯」了一聲，這個音節裡什麼判斷都有，也什麼都沒有。</p>\n<p>赫連烈往白無極的方向看了一眼，有一絲不自在：「長老，這位是天契大比的冠軍，白無極。他和蘇家這位嫡小姐一起來的。目標是遺跡的文字記載，和我們不衝突。」</p>\n<p>「天契大比的冠軍。」老者把這幾個字念了一遍，聲音平靜，像是在覆述一個統計數字，「就是讓你輸的那個？」</p>\n<p>赫連烈點頭，沒有說話。</p>\n<p>老者終於把視線落在白無極身上，那個視線不是打量，是觀察，是一個在某個領域待了幾十年的老行家看到一個奇怪新品種時的那種觀察。</p>\n<p>「你，」他開口，「沒有契獸。」</p>\n<p>這不是問句。</p>\n<p>「沒有。」白無極應。</p>\n<p>「你的力量，不是靈契體系的。」</p>\n<p>「不清楚，」白無極說，「我自己也在搞清楚。」</p>\n<p>老者沉默了兩秒，那兩秒的沉默裡，走廊周圍的靈力像是被什麼東西擰動了一下，輕微地顫了一下，然後恢復。</p>\n<p>「確實不簡單。」老者說，語氣像在下一個客觀結論，沒有褒貶。</p>\n<p>蘇念卿站在白無極身邊，沒有說話，但她手裡有靈符輕輕激活的微弱光澤——她在備戰，不是攻擊性的備戰，是預備應對的姿態。</p>\n<p>霜翎縮在她肩頭，尾巴緊貼身體，那是認真的戒備。</p>\n<p>白無極把手插在口袋裡，看著那個老者，保持著表情的平靜。</p>\n<p>「您是赫連家的長老。」他說。</p>\n<p>「老夫赫連峰。」老者開口，給了名字，「在契聖境界待了四十年，走過的遺跡比這個年紀的大多數人都多。」</p>\n<p>「那您對這個遺跡的看法？」</p>\n<p>赫連峰看了他一眼，那個眼神裡有一點意外——意外於一個年輕人在他顯出真身之後第一句話是問意見，而不是表態或者退讓。</p>\n<p>「比我預期的要複雜，」老者說，「這個遺跡不只是一個靈器收藏地，它是一個記錄點。」</p>\n<p>「記錄什麼的？」</p>\n<p>老者轉過頭，往走廊深處看，那個方向，藍白色的光點在更遠的地方聚集，形成一片模糊的光暈。</p>\n<p>「去到最深處，你就會知道了。」他說，「不過，到那裡之前，還有守衛。」</p>\n<p>話音剛落，地底的靈力波動猝然放大了一倍。</p>\n<p>那個波動是從深處傳來的，沉悶，如同一聲悶雷——不是雷聲，是某個體型極大的東西在地底移動，帶著遺跡的整個地基都輕微震動了一下。</p>\n<p>白無極感受到腳底的震動從台階傳上來，往深處看了一眼，那個光暈的方向，有什麼東西正在醒來，比前廳的守衛大得多，比外圍的契王也強得多。</p>\n<p>赫連峰站在後方，表情沒有變化，但腰間的靈符袋發出了輕微的光。</p>\n<p>「走，」他說，「老夫在後方。」</p>\n<p>一老一少，加上蘇念卿和霜翎，往遺跡的最深處走去。</p>\n<p>守衛的波動越來越強，台階越走越深，藍白色的光點在前方密集聚集，像是終點線，也像是一個等待已久的試煉。</p>\n<p>白無極的掌心再次發熱，黃金體驗的金色光芒從指縫裡透出來。</p>\n<p>「快了，」他輕聲說。</p>\n<p>沒有人知道他說的是什麼的「快了」。</p>"}, {"title": "第87章_The_World的五秒", "content": "<p>第87章　The World的五秒</p>\n<p>走廊最深處的守衛，只有一個。</p>\n<p>一個，但比外圍七頭加起來還要讓人難以忽視。</p>\n<p>它沒有明確的形狀。</p>\n<p>那是白無極對它的第一印象——當他走下最後一段台階，看到走廊終端那個巨大的存在時，他感受到的不是「某種魔獸」的威懾，而是一種更原始的、更接近自然力量的東西。</p>\n<p>它是一個靈力凝聚體。</p>\n<p>千年的遺跡，千年的靈力積蓄，最終凝聚成了這個存在——沒有固定形態，有時像流體，有時像固體，輪廓不斷在重整，但核心的靈力密度是恆定的，那個密度讓白無極的皮膚感覺到了輕微的麻木，像是站在一個高壓電磁場裡。</p>\n<p>赫連烈的隊伍裡有人倒退了半步，腳步沒穩。</p>\n<p>「契聖，」蘇念卿低聲說，「完整的契聖境界。這個守衛的靈力密度對應的是契聖中段。」</p>\n<p>「嗯，」赫連峰在後方的聲音平靜，帶著久經世事的沉穩，「這個守衛，我四十年前來過一次，沒打過它，退走了。」</p>\n<p>白無極回頭看了老者一眼。</p>\n<p>「現在呢？」</p>\n<p>「現在，」赫連峰的靈符袋完全打開，裡面的靈符飄出來，在他周圍形成一個緩慢旋轉的光環，「老夫可以和它打個平手。代價是傷。」</p>\n<p>他說這個話的方式很平靜，是陳述，不是炫耀，也不是謙虛。</p>\n<p>白無極點了點頭，然後往蘇念卿的方向說：「你和霜翎退後二十步，守出口。」</p>\n<p>「我可以——」</p>\n<p>「你剛才消耗了靈力，」他打斷她，不是強硬，是陳述事實，「守出口是最重要的位置，萬一守衛有分體能力，後方沒人就麻煩了。我這邊有他，不需要你強撐。」</p>\n<p>蘇念卿沉默了兩秒。</p>\n<p>那兩秒的沉默裡，她把他的話過了一遍，確認這是判斷不是藉口，然後退了二十步。</p>\n<p>霜翎跟著退。</p>\n<p>赫連烈的隊伍在兩側散開，形成半包圍，但沒有往前壓，這個等級的戰鬥他們只能起輔助作用，貿然衝進去是添亂。</p>\n<p>白無極往前走了幾步，站在走廊中央，對著那個靈力凝聚體。</p>\n<p>它感應到了他，沒有立刻攻擊——不是猶豫，是這個層次的存在攻擊之前有一個「認定對手」的過程，它在把白無極的靈力特質和自己的守衛指令進行比對，判斷他是否是需要驅逐的存在。</p>\n<p>判定完成了。</p>\n<p>它動了。</p>\n<p>靈力凝聚體的運動方式不是衝鋒，是擴張——它的輪廓向外擴張，像浪，像潮，把走廊裡的空間全部填滿，那股靈力從四面八方向白無極擠壓過來，目的不是物理打擊，是靈力覆蓋，是把外來者的靈力結構直接打散。</p>\n<p>赫連峰的靈符光環緊繃了，他在抵抗那股覆蓋。</p>\n<p>白無極站在那股靈力潮裡，感受到壓力從全身方向同時施來，那個壓力是真實的，讓他的腳步微微往後挫了一個小步——但只有一步。</p>\n<p>黃金體驗的金色光芒從他全身溢出，和那股古老的靈力產生了奇怪的共鳴，不是完全對抗，是……分辨，像是黃金體驗在告訴那個守衛：這個人和你是同一個體系的。</p>\n<p>守衛的靈力覆蓋在接觸到黃金體驗的瞬間，猶豫了不到一秒。</p>\n<p>就一秒。</p>\n<p>但一秒已經足夠了。</p>\n<p>「The World。」</p>\n<p>時間停了。</p>\n<p>---</p>\n<p>靜止的走廊裡，一切都凍結了。</p>\n<p>赫連峰的靈符光環停在半展開的弧度，靈力波動凝固在最高點。赫連烈的身形定格，他正在抬手準備出什麼招，動作停在了半途。那個靈力凝聚體的擴張波動停止，靈力的流動速度歸零，它的龐大輪廓如同凝固的煙霧，靜止在走廊的每一寸空間裡。</p>\n<p>只有白金之星，在靜止的世界裡動了。</p>\n<p>白無極的五秒，是他能掌握的最密集的輸出視窗。</p>\n<p>他對白金之星的指令只有兩個字：打穿。</p>\n<p>不是「打傷」，不是「擊退」，是「打穿它的靈力密度，找到核心，打穿」。</p>\n<p>白金之星的速度在靜止的空間裡展現出了它的極限。</p>\n<p>第一秒，白金之星從正面穿入靈力凝聚體的外層，星空色的拳頭帶著密集的靈力衝擊，每一拳的力道都是白金之星的全力——在靜止的世界裡沒有反擊，沒有躲避，只有輸出。外層靈力密度在一秒內被打薄了一層。</p>\n<p>第二秒，白金之星沿著打薄的缺口往核心衝，靈力的阻力像水一樣在白金之星的衝刺下向兩側分開，走廊的牆壁出現裂縫——不是被守衛打的，是被白金之星的通道衝擊波帶出來的。</p>\n<p>第三秒，白金之星找到了靈力凝聚體的核心位置，那個核心比魔獸的靈核更大，更複雜，是一個多層結構的靈力旋渦，每一層都有獨立的防護。白金之星開始逐層擊打，第一層，第二層，第三層——在靜止的世界裡時間不是問題，問題只有力道夠不夠。</p>\n<p>力道夠。</p>\n<p>第四秒，核心的最外層防護破碎，白金之星的拳頭深入到了第四層，靈力的阻力在核心層驟然增加，白金之星的速度因此下降了一截，但方向沒有偏。</p>\n<p>第五秒——</p>\n<p>白金之星全力一拳，轟入核心的最深處。</p>\n<p>五秒到了。</p>\n<p>---</p>\n<p>時間重啟。</p>\n<p>世界在那一秒重新流動起來，所有的聲音和靈力波動同時回歸。</p>\n<p>靈力凝聚體在時間重啟的一刹那，完成了它的察覺——它的核心在五秒的靜止中被白金之星打中了，那個衝擊波在時間重啟的瞬間擴散開來，一股巨大的靈力爆炸從它的核心向外炸出，走廊的牆壁震裂，天花板落下幾塊碎石，靈力波動把走廊裡所有人都往後推了一步。</p>\n<p>赫連峰退了半步。</p>\n<p>他的靈符光環散了一半，面色微變，急速重整靈力護體。</p>\n<p>赫連烈隊伍裡的黑衣戰士們集體被靈力衝擊波推離了原本站的位置，腳步踉蹌，靠著牆壁才穩住。</p>\n<p>白無極站在走廊中央，沒有退，退了零步。</p>\n<p>他受了一點傷——白金之星打進守衛核心的反震衝擊波波及到了他，右手的虎口有一條靈力灼傷，皮膚破了，滲出一點血，但他站得很穩。</p>\n<p>靈力凝聚體的輪廓在那次爆炸後明顯縮小了，核心層的損傷讓它的靈力維持能力下降，它的輪廓在顫抖，在重整，那個過程比之前任何時刻都要慢——它受了重傷。</p>\n<p>赫連峰盯著那個守衛的狀態，然後轉頭看向白無極，那個視線裡有一種需要克制的東西。</p>\n<p>「五秒，」老者的聲音裡頭一次有了一點不同的韻味，不是讚歎，是不得不承認的認可，「打進了第四層。老夫第一次嘗試，進到第三層。」</p>\n<p>白無極看了看自己的右手，把血用袖口按了一下。</p>\n<p>「還沒打穿，」他說，「差一點。」</p>\n<p>「差一點已經夠了，」赫連峰把靈符重新展開，走上前，「剩下的，老夫來。」</p>\n<p>守衛的核心層已經碎了一半，赫連峰的靈符攻擊在這個情況下的效率倍增，幾輪靈符打出去，守衛的輪廓快速縮小，核心完全崩解，最後一道靈力的顫動消散在走廊的空氣裡。</p>\n<p>沉默。</p>\n<p>走廊終於安靜了。</p>\n<p>赫連峰收回靈符，重新看向白無極，那個視線認真，沒有客套。</p>\n<p>「你那個力量，」他說，「不是這個世界的體系。」</p>\n<p>「我知道。」白無極說。</p>\n<p>「知道，卻不知道來源？」</p>\n<p>「對。」</p>\n<p>「那你來這個遺跡，是來找答案的。」老者說，這次是確定，不是問句。</p>\n<p>白無極沒有回答，但他往走廊深處看了一眼。</p>\n<p>深處，藍白色的光點在前方密集聚集，形成一個光暈，那個光暈的深處，有一扇門。</p>\n<p>蘇念卿走上來，站在白無極身邊，看著那扇門，再看看他虎口的傷：「給我看。」</p>\n<p>「沒事，」他縮了一下手。</p>\n<p>「給我看。」她的語氣沒有起伏，但就是讓人知道不是在提議，是在要求。</p>\n<p>白無極把手伸過去，她快速看了一眼，從儲物戒指裡取出一個小瓶的靈藥，在他虎口的傷口上點了兩滴，靈藥入皮，傷口的灼燒感減退。</p>\n<p>「走，」她把靈藥收回去，看向那扇門，「核心在裡面。」</p>\n<p>三個人往那扇門走去。</p>\n<p>赫連峰跟在後方，沒有搶先，這次罕見地讓白無極走在了最前面。</p>"}, {"title": "第88章_遺跡核心", "content": "<p>第88章　遺跡核心</p>\n<p>那扇門沒有鎖。</p>\n<p>白無極伸手推了一下，石門緩緩向內旋轉，發出低沉的聲響，像是一個長期閉合的機關在重新運作，生澀，緩慢，但每一分都是真實的移動。</p>\n<p>門後的光，是金色的。</p>\n<p>不是篝火的橙黃，不是礦石的冷光，是一種帶著溫度的、從源頭散發出來的金光——不刺眼，不明亮，更像是某個東西在靜靜呼吸，而每一次呼吸都帶著光。</p>\n<p>白無極踏進去。</p>\n<p>核心房間。</p>\n<p>比之前所有的石室都小，大概只有普通臥房兩倍的面積，沒有台座，沒有靈器，沒有任何器物——只有四面牆壁，和牆壁上的記載。</p>\n<p>這個房間的牆壁和走廊不同。</p>\n<p>走廊和外廳的記載是刻進石壁的，線條清晰但是無色的。</p>\n<p>這個核心房間的牆壁，是發光的。</p>\n<p>每一個文字，每一條圖案的線條，都帶著那種金色的呼吸光芒，像是有人把字刻進石壁之後，又往裡面灌入了大量的靈力，讓記載本身永遠活著，永遠發光，永遠等待著某一個能讀懂它的人到來。</p>\n<p>蘇念卿走進來，環視了一圈，聲音輕了：「這個……我沒見過這種技術。」</p>\n<p>「多古老？」</p>\n<p>「不確定，」她的目光在牆壁的圖案上緩緩掃過，「但一定比天衍大陸現在的任何文獻都要古老。這裡的文字和外廳的一樣，不是現用文字，但……」她往其中一面牆走近，眯起眼，「這裡的圖案描述更具體。」</p>\n<p>赫連峰站在門口沒有進來，他的目光在那片金色光芒上停了兩秒，然後垂下眼，像是認出了什麼，又像是在迴避什麼。</p>\n<p>白無極沒有去注意老者的反應，他的目光被最正對著入口的那面主牆吸引住了。</p>\n<p>那面牆，是整個核心房間記載密度最高的一面，從地板到天花板全是密密麻麻的文字和圖案，中央是最大的一幅圖——</p>\n<p>不是一個人和影的組合圖了。</p>\n<p>是一幅宏觀的世界圖。</p>\n<p>白無極看著那幅圖，腳步慢慢往前移，靠得越來越近，直到他的手指能夠碰到那些發光的線條。</p>\n<p>世界圖的結構是同心圓，最外圈是天地，天在上，地在下，中間是萬物——山川、河流、人形、獸形，全都在同心圓的範圍裡。核心圓的中心，是一個人形，人形的身上，沒有任何靈獸的圖案，沒有靈契的連線，但人形的周圍，漂浮著七個大小不一的「影」，那些影的輪廓各異，每一個都帶著不同的形狀，不同的姿態，但都是獨立的，自主的，不需要任何代價換取的存在。</p>\n<p>旁邊是文字記載。</p>\n<p>白無極不認識那些文字，但他看到了旁邊的圖解——那些圖解是在解釋文字，用最直觀的圖畫說明文字的含義。</p>\n<p>圖解的第一幅：人形，和七個影，之間有連線，那連線沒有任何代價符號，沒有等價交換的圖示，連線就是連線，純粹的，自然的，像是呼吸一樣不需要代價。</p>\n<p>圖解的第二幅：人形，和一個靈獸形，之間有連線，連線的中間有一個符號——那個符號像是一個缺口，一個需要填充的空洞，旁邊有小圖示顯示「代價」：血、壽命、靈力。</p>\n<p>圖解的第三幅：一個更大的圖，描繪的是一個時間線——線的左端，第一幅圖的那個世界，萬物自然，精神為源，每個人身旁都有不同數量的影；線的中間，有一個符號，那個符號像是一把鎖的形狀，或者像是一個封印，一個巨大的封印降臨在線條的世界上方；線的右端，第二幅圖的世界，靈契，代價，所有的影都消失了，取而代之的是靈獸和靈師之間必須付出代價才能建立的紐帶。</p>\n<p>白無極的手放在那個「封印」符號上。</p>\n<p>手掌微微發熱。</p>\n<p>不是黃金體驗的金色光芒，是這面牆壁本身發出的熱，那個熱從石壁透過他的掌心往裡傳，帶著某種——認出了什麼的振動。</p>\n<p>「你感受到了嗎？」蘇念卿的聲音從旁邊傳來，她也走到了這面主牆前，「牆壁在回應你。」</p>\n<p>「嗯，」白無極沒有把手移開，「它像是……在等我。」</p>\n<p>「或者在等某一種特定的人，」蘇念卿說，聲音裡有一種她在做分析時特有的冷靜，但冷靜裡帶著某種壓不住的沉重，「這幅圖說的是……精神力體系是這個世界最原始的力量來源。」</p>\n<p>白無極沒有說話，繼續聽。</p>\n<p>「左端的世界，所有人的力量都來自自身的精神力，精神力具現化成影，影可以代替本體戰鬥，不需要代價。影的形態和強度取決於本人的精神力強度，精神力越強，影越多，越有力。這就是牆上那些人形和不同數量影的圖案的含義。」</p>\n<p>「而這個中間的封印符號，」她停頓，手指點了點那個鎖形符號，「是某個力量，把精神力體系封印了。不是自然消亡，不是被取代，是被主動地——強制封印。」</p>\n<p>她抬頭，往主牆的右端看。</p>\n<p>「然後，在封印之後，靈契體系出現了。需要代價，需要靈獸作為載體，需要血脈和資源才能提升等級。一個自然的、人人都有資格擁有的力量體系，被替換成了一個有門檻、有代價、可以被控制的力量體系。」</p>\n<p>最後幾個字，她的語氣沒有起伏，但那幾個字本身就帶著重量。</p>\n<p>「可以被控制的力量體系，」白無極把這幾個字重複了一遍，「封印精神力的人，想做什麼？」</p>\n<p>「掌控所有人能獲得的力量上限，」蘇念卿說，「如果所有人的力量都來自自身，強弱由天賦決定，那無法控制；但如果所有人的力量都依賴靈獸，依賴靈契，依賴從外部獲取的代價，那掌控靈獸資源的人，就掌控了所有人的力量天花板。」</p>\n<p>走廊裡，赫連峰沉默著沒有開口。</p>\n<p>白無極在沉默裡思考了很長時間——長到蘇念卿沒有催他，霜翎安靜地趴在她肩頭，整個核心房間只有金色的光在輕輕呼吸。</p>\n<p>「這就是為什麼我能用替身，」他最後開口，「因為封印不完整，或者說，偶爾會有人天生跳過了封印，能直接用精神力。」</p>\n<p>「蘇家古籍說的『無契之人』，可能就是這個意思，」蘇念卿點頭，「不是異類，是——原版。」</p>\n<p>「原版，」白無極念了這個詞，有點哭笑不得，「那我是走錯時代了。」</p>\n<p>蘇念卿看了他一眼。</p>\n<p>「封印是誰做的，為什麼做，做了多久，還在不在，封印的範圍有多廣——這些都不知道，」她說，「這個記載說明的是『發生了什麼』，但沒有說『是誰』和『怎麼解決』。」</p>\n<p>「留了懸念。」</p>\n<p>「是設計，不是疏漏，」她往主牆的下方看，指了指牆角最下方的一段記載，「這裡，圖案指向了一個方向，不是文字，是座標——某個地方，可能有更完整的記載，或者，有和封印直接相關的東西。」</p>\n<p>白無極蹲下來，看著那個座標圖，把它的方位記在腦子裡。</p>\n<p>「先記下來，回去再研究，」他說，站起身，把手從主牆移開，那股傳入掌心的熱意慢慢散去，「今天能搞清楚這些，已經夠了。」</p>\n<p>他轉身，看向蘇念卿：「拓印這面主牆。」</p>\n<p>「已經開始了，」她手上已經展開了拓印材料，「給我一刻鐘。」</p>\n<p>白無極退到房間入口，和赫連峰並排站了一會兒。</p>\n<p>老者一直沉默著，白無極側過頭看了他一眼：「您之前看到金光的時候，表情有點不對。」</p>\n<p>赫連峰沒有否認，「老夫年輕的時候，在一個更古老的地方，見過相同的光。當時不知道是什麼，現在……」他頓了頓，「現在有點明白了。」</p>\n<p>「那個地方在哪裡？」</p>\n<p>「等你準備好了，再說，」老者轉頭看向正在拓印的蘇念卿，「你現在搞清楚的，只是一小塊。後面還有更大的，更麻煩的東西在等著。」</p>\n<p>白無極沒有反駁，把這句話放進心裡。</p>\n<p>外面的金色光芒繼續輕輕呼吸，照亮整個核心房間，照亮牆上那些等待了千年的記載，照亮站在這裡的幾個人。</p>\n<p>那個光，像是一個漫長等待後終於等到了的應答。</p>"}, {"title": "第89章_蘇念卿的覺醒", "content": "<p>第89章　蘇念卿的覺醒</p>\n<p>拓印完成的時候，蘇念卿收起材料，確認拓印的完整度，又把主要圖案用筆記本手繪補了幾個細節，花了差不多一個半時辰。</p>\n<p>白無極在這段時間守在走廊，偶爾回核心房間看一眼進度，絕大多數時間站在走廊裡，聽著遺跡的動靜，確認沒有新的守衛啟動。</p>\n<p>赫連峰坐在走廊的石塊上閉目，他的靈符在他周圍緩緩轉動，是在恢復之前對抗守衛的靈力消耗。赫連烈的隊伍在更深處的走廊邊界等待，他們找到了靈器的部分，但完整的靈器記憶要等到拿到核心位置才能解鎖，所以也在等。</p>\n<p>「完成了。」蘇念卿從核心房間走出來。</p>\n<p>白無極往裡看了一眼，確認沒留下什麼，點頭：「往出口走。」</p>\n<p>兩組人匯合，重新沿著走廊往上走，出遺跡。</p>\n<p>走到內層走廊和外廳走廊的分叉口，赫連烈往左，白無極和蘇念卿往右——赫連家還需要去靈器的位置做最後的解鎖，他們先去外廳等出口。</p>\n<p>走廊的燈光把兩個人的影子拉長，霜翎跑在前面，尾巴昂起引路。</p>\n<p>走到前廳和外廳之間的那段走廊時，蘇念卿的步伐慢了下來。</p>\n<p>不是因為累，也不是因為受傷。</p>\n<p>是因為那股靈力，開始了。</p>\n<p>白無極先感覺到的——他走在蘇念卿右側，感受到她身旁的靈力濃度猝然上升，那種上升不是外部施加的，是從她自身向外溢出的，像是某種封閉了很久的東西，突然找到了缺口。</p>\n<p>他停下腳步，回頭。</p>\n<p>蘇念卿站在走廊中央，臉上的表情有一點罕見的——不是不適，是被什麼打中了的怔然。</p>\n<p>「念卿？」</p>\n<p>她沒有立刻回答，視線往下，看著霜翎。</p>\n<p>霜翎停了。</p>\n<p>不是正常的停步，是那種身體突然接收到了某種強烈信號之後的反應性靜止——四肢伸直，九條尾巴全部豎起，根根分明，毛髮逆立，眼睛睜到最大，瞳孔縮成一條細縫。</p>\n<p>然後，霜翎開始發光了。</p>\n<p>那個光從它的毛髮末端開始，銀白色，但比平常的靈力光要亮得多，也純粹得多，是一種接近透明的、非常乾淨的白，沒有靛色，沒有靈力波動中常見的雜質，就是那樣純粹地、突然地從霜翎的每一根毛髮尖端開始蔓延。</p>\n<p>「霜翎——」蘇念卿蹲下來，想伸手去扶它。</p>\n<p>但霜翎的光在她手伸過去之前擴張了。</p>\n<p>一個巨大的銀色光球突然在走廊裡炸開，白無極下意識後退了兩步，擋在臉前的手臂感受到了那個光波的衝擊——不是物理打擊，是靈力的，但那個靈力不針對人，它只是在擴張，在響應，在完成某種自身的過程。</p>\n<p>光球在走廊裡撐了三秒，把整條走廊的每一寸都照亮，亮得讓眼睛睜不開，亮得走廊深處的石壁圖案都被映出了影子。</p>\n<p>然後，光收了。</p>\n<p>光球往中心坍縮，速度很快，最後全部回落到霜翎的身上。</p>\n<p>白無極睜開眼，看到了霜翎。</p>\n<p>同樣是霜翎，但不一樣了。</p>\n<p>原本的霜翎是一隻靈巧的小狐狸，體型比普通的狐狸大一倍，九條銀白色的尾巴，很漂亮，但就是一隻靈狐。</p>\n<p>現在的霜翎，體型是原本的三倍。</p>\n<p>它站在走廊裡，四肢穩定，氣勢和原本的霜翎像是兩個物種——雖然輪廓還是狐形，但那個龐大的身軀和肅靜的眼神，有了一種接近神獸的威嚴感。</p>\n<p>尾巴。</p>\n<p>白無極數了一下。</p>\n<p>不是九條。</p>\n<p>是十二條。</p>\n<p>每一條都比原本長了一倍，銀白色的毛髮末端帶著剛才那個光球的殘餘，一絲一縷地還在往外散溢，像是不小心點燃的煙，飄在霜翎周圍，形成一個若有若無的光暈。</p>\n<p>蘇念卿跪在走廊的石板地上。</p>\n<p>她是在霜翎進化的過程中自己跪下去的，不是摔的——是那股從霜翎身上爆發出來的靈力波動，和她的靈契紐帶產生了共振，那種共振的力量讓她的膝蓋自然地彎折，她接受了它，讓它傳過整個身體，沒有抵抗。</p>\n<p>白無極蹲到她身邊：「你還好嗎？」</p>\n<p>蘇念卿沒有立刻說話。</p>\n<p>她感受著那股從霜翎傳過來的靈力，感受著它在自己的靈脈裡流動的方式——和平常的靈力不一樣，這股不是借來的，不是從外部汲取的，是從她的靈脈本身的核心，從最深處，往外湧出來的。</p>\n<p>像泉水，不是水管。</p>\n<p>「我突破了，」她開口，聲音平靜，但裡面有一種說不清楚的震動，「契將。」</p>\n<p>白無極愣了一下，然後把眉頭舒展開，換了一個表情：「恭喜。」</p>\n<p>「不只是我，」她抬起頭，看著已經進化了的霜翎，「霜翎也是。」</p>\n<p>霜翎走過來，龐大的身軀在走廊裡顯得有點擁擠，它低下頭，用鼻子碰了碰蘇念卿的額頭，發出一聲輕柔的鳴叫，那個聲音比以前的音調低了很多，帶著某種渾厚的回響，像是從更深的喉嚨發出來的。</p>\n<p>蘇念卿伸手放在霜翎的頭頂，感受到傳過來的靈力穩定而充沛，那種充沛有別於以前的任何時候。</p>\n<p>她之前的靈力，是通過靈契紐帶從外界汲取的——有上限，有疲憊，有消耗殆盡後的虛空感，那是靈契體系的規則：你借用力量，力量有代價，用完了就要等恢復。</p>\n<p>但這次突破之後，她感受到的靈力不是借來的。</p>\n<p>它從她自身往外湧，源源不斷，不是無限，但它的補充方式不再是「汲取」，而是「生發」——從她自己的靈脈核心，自然地、持續地，往外生長。</p>\n<p>就像遺跡主牆上那個封印前的世界圖描繪的那樣：力量從內而生，不需要代價。</p>\n<p>「這個遺跡的古老靈力，」白無極往走廊深處看了一眼，那股金色的呼吸光芒已經感受不到了，「它做了什麼？」</p>\n<p>「不知道，」蘇念卿站起來，她的動作比之前更穩，靈力從腳底到頭頂的流動順暢得讓她有一種從來沒有過的輕盈感，「但霜翎的靈契等級提升了，我的修為突破了，而且……突破的方式和以前不一樣。」</p>\n<p>「是那種封印之前的方式嗎？」</p>\n<p>她沉默了兩秒，點了點頭：「有那個感覺。」</p>\n<p>霜翎在她身邊走動，十二條尾巴在走廊裡掃出輕微的風，它的體型讓走廊顯得窄了，但它的動作依然靈巧，那種靈巧不是縮減了的，是在龐大的體型裡保留下來的。</p>\n<p>白無極站起來，拍了拍膝蓋：「走吧，出去，別讓遺跡守衛再睡醒了。」</p>\n<p>蘇念卿跟上他，霜翎走在她身邊——因為體型的關係，不能再跳回她的肩頭了，只能在旁邊跟著走，但那個「跟著走」的姿態是一種保護的姿態，龐大的身軀天然形成了一個屏障。</p>\n<p>兩個人一獸，往遺跡出口走。</p>\n<p>走廊裡的藍白色光點在他們身後一一熄滅，像是送別，也像是任務完成後的收工。</p>\n<p>外廳的大門已經在望，外面的荒原天光從門縫裡透進來，帶著枯草的氣息和遠方的風。</p>\n<p>白無極往外走的時候，在大門口停了一步，最後回頭看了一眼那個遺跡的石室——金色的光芒早就看不到了，只有普通的石牆，普通的岩石，普通的一座千年建築。</p>\n<p>但他知道，牆上的圖案還在，記載還在，那個封印的秘密，那個被強制取代的力量體系的故事，刻在那裡，等了千年，剛剛被讀懂了第一頁。</p>\n<p>「走了，」他輕聲說。</p>\n<p>走出了遺跡的大門。</p>\n<p>荒原的風把他的頭髮吹亂，外面的空氣比裡面的要稀薄，但也因此更自由，更流動。</p>\n<p>蘇念卿走到他身邊，霜翎走在兩人之間，三個人踏上了回程的路。</p>"}, {"title": "第90章_有人在等我們回去", "content": "<p>第90章　有人在等我們回去</p>\n<p>遺跡的出口在身後越來越遠。</p>\n<p>荒原的枯草在腳下壓倒，七頭契王守衛的屍體還在原地，沒有人移動它們，估計要再過幾天才會被荒原的食腐生物清理掉。白無極路過的時候往其中一頭瞥了一眼，那頭魔獸的靈核位置有一個清晰的破洞，邊緣乾淨，沒有焦痕，是精準的擊碎而不是爆破。</p>\n<p>白金之星的手法。</p>\n<p>赫連家的人在他們之後出來，赫連烈帶著隊伍，隊伍後方跟著赫連峰——老者的腳步慢，但很穩，看得出靈力恢復了不少。赫連烈懷裡抱著一個長形的布袋，那應該就是靈器，藏在布袋裡沒有露出，但靈力波動被刻意壓制著，能感受到是個有分量的東西。</p>\n<p>兩組人在遺跡門口分道。</p>\n<p>赫連烈沒有說廢話，抬手行了個禮，白無極抬手還了禮，蘇念卿點了頭，就這樣，赫連家的隊伍往北走，走進了荒原更深處，消失在霧氣裡。</p>\n<p>赫連峰在轉身離開之前，停了一下。</p>\n<p>他回頭，看著白無極。</p>\n<p>「你去找老夫之前，」他說，聲音不快不慢，每個字都咬得清晰，「先把自己的事弄清楚。」</p>\n<p>白無極沒有問「什麼事」，因為他知道老者說的是什麼。</p>\n<p>「好，」他說，「到時候我去登門。」</p>\n<p>赫連峰的眼神裡有一點東西動了，那個東西不是輕視，也不是讚許，更像是一個見過了太多人、太多事的老者，在某個年輕人身上看到了某種他認識的形狀，讓他多看了一眼。</p>\n<p>他轉身走了，沒有再說話。</p>\n<p>白無極目送他的背影消失，然後轉向蘇念卿：「我們也走。」</p>\n<p>「嗯。」</p>\n<p>---</p>\n<p>從荒原出來，走上正常的官道，是一整天的路。</p>\n<p>三個人一獸，走得不快，但也沒有刻意拖延。</p>\n<p>霜翎因為體型增大，走路比之前費事，但牠很快適應了新的體型，步伐重新變得穩健。蘇念卿在路上把從遺跡裡拓印和記錄的材料又翻了一遍，確認完整，然後放回儲物戒指，閉上眼感受一下新的靈力狀態，臉上有一種平靜但帶著某種沉澱感的表情。</p>\n<p>白無極在旁邊走著，手插口袋，把遺跡裡看到的主牆圖案在腦子裡過了幾遍。</p>\n<p>精神力體系。</p>\n<p>封印。</p>\n<p>靈契制度是替代品。</p>\n<p>他是能繞過封印的人，或者更準確地說：他是那個封印出現之前那個時代的人，在這個已經被重建了規則的世界裡出現，像一個系統錯誤，像一個被遺忘的程式碼，在所有人都不知道它存在的情況下，忽然運行了。</p>\n<p>這個比喻在他腦子裡轉了一圈，有點哭笑不得。</p>\n<p>「你在想什麼？」蘇念卿的聲音從旁邊傳來。</p>\n<p>「在想，」他說，「如果精神力體系是原版，靈契是替代品，那封印精神力的人，現在還在嗎？」</p>\n<p>蘇念卿沉默了一會兒。</p>\n<p>「不知道，」她說，「三千年以上的歷史，沒有任何人能活那麼久，除非……」</p>\n<p>「除非什麼？」</p>\n<p>「除非不是人在維持，而是那個封印本身有自循環能力，就像遺跡的主控機制一樣，」她說，「設置封印的人可能早就死了，但封印還在運作。」</p>\n<p>「那就意味著有辦法破。」</p>\n<p>「有辦法破。」她重複了這幾個字，停頓了一下，「但遺跡裡沒有說怎麼破，只說了另一個地方有更完整的記載。那個座標——」</p>\n<p>「我記住了，」白無極說，「回天契城把地圖對一下。」</p>\n<p>「嗯。」</p>\n<p>話題到這裡告一段落，兩個人繼續往前走，荒原的枯草地慢慢換成了有色澤的土地，前方遠處出現了幾棵矮樹，那是荒原和正常地域的邊界。</p>\n<p>傍晚，三人在邊界地帶紮了個簡單的營地過夜。</p>\n<p>白無極把剩下的乾糧和肉乾分了一下，數量不多，但夠撐到明天進城補給。霜翎自己出去獵了一頭野豬回來，分量很充足，但體型增大後的霜翎自己就能吃掉大半，所以最後白無極和蘇念卿的份量也就和原本差不多。</p>\n<p>「牠以後要自己養活自己，」白無極看著霜翎扒野豬的那個場面，提出了一個嚴肅的後勤問題，「糧食壓力很大。」</p>\n<p>蘇念卿看了他一眼：「那是我的事。」</p>\n<p>「蘇家養得起嗎？」</p>\n<p>「白無極。」</p>\n<p>「這是合理的問題。」</p>\n<p>「閉嘴。」</p>\n<p>---</p>\n<p>第二天中午，走上了通往天契城的官道。</p>\n<p>遠遠能看到天契城的城牆了，那個輪廓在陽光下清晰，高大，穩固，和他們離開的時候沒有變化——</p>\n<p>但官道上有人在跑。</p>\n<p>不是普通的行人，是全速奔跑的信使，身上的服飾是蘇家的信使服，背著信筒，跑得氣喘吁吁，臉上的表情不是普通的急迫，是那種「壞事發生了、事情很大、必須立刻送達」的緊繃。</p>\n<p>信使看到蘇念卿，幾乎是慣性衝上來的，跑到三步距離才緊急剎車，深吸一口氣，雙手奉上信筒：「小姐，城裡出事了！」</p>\n<p>蘇念卿接過信筒，取出信件，展開，掃了一遍。</p>\n<p>她的臉色沉了下來。</p>\n<p>不是慢慢沉，是那種讀到第一行就已經沉了，後面的幾行只是確認了沉的程度。</p>\n<p>「陳家，」她說，兩個字，聲音平靜，但那個平靜是那種在震驚後快速壓下去、切換成處理模式的平靜，「叛了。」</p>\n<p>「叛了？」白無極往信件上看了一眼，「怎麼叛的？」</p>\n<p>「城門，」蘇念卿的視線繼續往下掃，「陳家突然控制了東城門，打開城門，放進來一批……」她停頓了不到一秒，「域外邪修。」</p>\n<p>白無極的表情動了一下。「多少？」</p>\n<p>信使在旁邊喘著氣補充：「昨天夜裡發生的，大批人，估計不下三百，進城之後立刻四散，開始在城裡各處攻擊，四大家族措手不及，蘇家、慕容家、白家都在組織反擊，赫連家在城外，還沒有收到消息——」</p>\n<p>「赫連家也在城外，」白無極說，這個時間點和地點的巧合有點太整齊，「陳家在選時機。」</p>\n<p>蘇念卿把信件折起來，收進袖中，抬起頭往天契城的方向看，那個眼神裡有一種白無極第一次在她臉上看到的東西——不是恐懼，不是慌亂，是一種已經啟動了的、全面的、戰前狀態的肅殺。</p>\n<p>「蘇家傷亡如何？」她問信使，聲音沒有起伏。</p>\n<p>「父親大人和幾位長老組織了防線，府邸應該是穩的，但城裡的整體態勢不樂觀，邪修散布的方式很像是有計劃的，不是盲目的攻擊，是針對性的——他們在打幾個關鍵位置。」</p>\n<p>「靈陣節點，」蘇念卿說，這個判斷出來的速度快到沒有停頓，「天契城的防禦靈陣有七個節點，如果把節點打掉，整個城的靈陣防護就崩了，之後不管多少人進來都沒有阻礙。」</p>\n<p>白無極把乾糧袋掂了掂，確認重量——還有三分之一，夠走完回城的路，到城門前不用停。</p>\n<p>他把乾糧袋塞進隨身的包裡，繫緊。</p>\n<p>「走，快點回去。」</p>\n<p>他說的是蘇念卿，也是說給自己聽的。</p>\n<p>兩個字，沒有多餘的廢話，沒有分析局勢，沒有商量對策——那些都可以在走路的時候說，現在最重要的只有一件事：縮短還在荒原和天契城之間的這段距離。</p>\n<p>蘇念卿已經邁開腳步了，霜翎跟在她身邊，十二條尾巴全部收攏貼緊，靈力護罩悄無聲息地打開，那是準備戰鬥前的狀態。</p>\n<p>信使跟著他們跑，繼續補充細節：「邪修的戰鬥方式很怪，不是正常的靈契戰法，有人說像是某種被汙染的靈力，白家的二少爺被打傷了，現在在府裡——」</p>\n<p>「我白家的二少爺？」白無極往那邊聽，「哪個白家？」</p>\n<p>信使：「……就天契城的四大家族，白家。」</p>\n<p>「哦，」白無極，「無關。」</p>\n<p>「您……」信使欲言又止。</p>\n<p>「我姓白，不是那個白家，」他說，「沒有關係。」</p>\n<p>信使沉默了一秒，沒有再說這個方向的話，繼續補充其他細節。</p>\n<p>天契城的輪廓越來越大，城牆的細節越來越清晰——從這個距離，還看不到城裡的異常，但白無極的偵查蜥蜴已經提前出發了，沿著最快的路線往城門方向爬，去確認城門和外圍的狀況。</p>\n<p>白無極加快了腳步，蘇念卿在他右側，兩個人的步伐節奏合上了，沒有刻意對拍，是自然而然地走成了同樣的速度。</p>\n<p>荒原的風在身後，天契城在前方。</p>\n<p>他們走進遺跡的時候，是兩個懷著謎題的人。</p>\n<p>他們走出來的時候，多了答案的一角，也多了一個已經等在前方的大麻煩。</p>\n<p>這就是冒險的本質，白無極在加速的腳步裡想，從來都不是走完一段就結束，是走完一段，迎面就是下一段的開頭。</p>\n<p>「城裡的靈陣節點你知道在哪嗎？」他問蘇念卿。</p>\n<p>「知道，七個，我全部知道位置。」</p>\n<p>「那進城之後你去最近的那個，我去第二近的，」他說，「不要讓它們把節點打掉。」</p>\n<p>蘇念卿沒有說「你一個人去第二個節點沒問題嗎」，她回答：「好。」</p>\n<p>就這樣說定了。</p>\n<p>天契城的城牆已經近在眼前，城門的方向有異常的靈力波動，遠遠的，混亂的，嘈雜的，那是戰鬥正在進行中的氣息，是一座城市的某個角落正在燃燒的聲音。</p>\n<p>白無極把包帶在肩上，手插出口袋，邁開腳步。</p>\n<p>前方，有很多事情等著他們去做。</p>\n<p>後方，荒原的遺跡沉默地矗立，繼續守著那個千年的秘密，等待下一個能讀懂它的人到來。</p>\n<p>白金之星在白無極身後無聲地跟著，星空色的鎧甲在陽光下沒有反光，只是靜靜地，和它的主人一起，踏上了回城的路。</p>"}, {"title": "第91章_歸來", "content": "<p>第91章　歸來</p>\n<p>天還沒亮透，天契城的方向就已經燒紅了半邊天際。</p>\n<p>不是日出。</p>\n<p>白無極站在官道的土坡上，望著遠處那片混亂的靈力光芒，沉默了大約三秒鐘。</p>\n<p>那種顏色很奇怪。正常的靈契交戰，是各種屬性的光芒互相撞擊——火是橙紅，冰是青白，雷是金紫，混在一起反而有種奇異的美感。但現在天空上有一大塊深紫色的東西，在所有正常顏色的靈力之間攪動，像是一隻巨大的手在試圖把所有東西都攥進去。</p>\n<p>「域外邪修。」蘇念卿站在他旁邊，聲音平靜，但白無極注意到她的手握緊了霜翎的毛。「他們已經攻進城了。」</p>\n<p>「幾個？」</p>\n<p>「難說。」她扭頭看他，臉上是一貫的面癱表情，但眼神很冷。「陳家是從裡面開的城門，是裡應外合。進來多少我不知道。」</p>\n<p>白無極嘖了一聲，把背包往肩上甩了甩。「行吧，分頭行動？」</p>\n<p>蘇念卿點頭，已經在思考路線。「我帶霜翎去蘇家集合點，南城燈塔下面，父親應該在那裡整合人手。你……」她頓了頓，像是在評估他的存活率。「你直接進城？」</p>\n<p>「對。」白無極已經開始往下走，語氣輕鬆得像是要去便利商店買個飲料。「有沒有什麼地方特別需要人的？」</p>\n<p>「東城門。情報說邪修主力從東邊入城，四大家族的外圍防線在那裡。」她在他身後說，聲音帶著一絲她自己可能都沒意識到的擔憂，「別逞英雄。」</p>\n<p>「我從來不逞英雄，」白無極回頭衝她比了個OK的手勢，嘴角掛著那個她已經熟悉的鬆散笑容，「我就是去做點力所能及的事情。」</p>\n<p>蘇念卿沒有再說話。霜翎在她腳邊低鳴了一聲，十二條尾巴微微展開，把她周身包裹了半圈，像是一個無聲的保護姿態。她最後看了白無極一眼——他已經大步走進了官道下方的草叢，打算抄近路進城——然後轉身，帶著霜翎往南邊疾奔而去。</p>\n<p>---</p>\n<p>靠近城牆的時候，白無極遇到了第一波向外逃的平民。</p>\n<p>不是一兩個，是一整條街的人，拖家帶口，有的人手裡還端著沒來得及放下的碗，有的孩子根本沒穿鞋，被大人架在肩膀上跑著。哭聲、叫喊聲、靈力爆炸的轟鳴聲混在一起，城牆缺口的位置不知道什麼時候被炸開了一個大洞，洶洶的人流就從那個洞往外湧。</p>\n<p>白無極站在洞口旁邊，讓人流從他兩側過去，自己紋絲不動。</p>\n<p>一個撞上他的老頭子抬頭罵了半句，看到他的臉，愣了一下。「年輕人，城裡打仗呢，你往裡走做什麼？」</p>\n<p>「有點事。」</p>\n<p>「裡面全是妖孽！吃人靈魄的妖孽！」老頭緊緊抓住他的袖子，聲音都在抖，「你是練武的不怕死，但那些妖孽不是人啊——他們把人的靈力吸出來，人就變成空殼，站在那裡，眼睛是白的，還在呼吸，但已經……」</p>\n<p>「大爺，」白無極輕輕把他的手從袖子上解下來，扶了他一把，「往西走，走出去三里有個山神廟，你先去那裡躲著。」</p>\n<p>「你——」</p>\n<p>「我沒事的。」</p>\n<p>他說這話的時候語氣很穩，穩得老頭子不由自主地信了，愣愣地點了點頭，隨著人流走了。</p>\n<p>白無極轉回頭，看著城牆缺口那頭的火光和靈力亂流，吐出一口氣。</p>\n<p>「好，」他對著空氣輕聲說，「我們進去吧。」</p>\n<p>空氣中，一片星光靜靜閃爍了一下，像是某個透明的龐大身影在回應他。</p>\n<p>他走進了城。</p>\n<p>---</p>\n<p>東城這一帶，已經完全是戰場了。</p>\n<p>白無極進城的第一眼，就看到一棟三層高的客棧正在燃燒，火焰是奇異的紫黑色，把夜空映得格外詭譎。前方的主街上，十幾個穿著各家服飾的靈契者正在圍攻三個邪修——說圍攻，其實是被壓著打，那三個邪修的力量奇詭混亂，一個出手能同時出現兩三種屬性，靈契者的防禦根本跟不上節奏。</p>\n<p>更遠處，靈力爆炸的聲音一聲接一聲，那是更大規模的戰場。</p>\n<p>白無極沒去更遠的地方，先把目光定在眼前這一幕。</p>\n<p>三個邪修，已經把一個穿著蘇家外袍的年輕契師打倒在地，另外幾個靈契者正在死命往前頂，但明顯撐不住了。其中一個邪修手掌一伸，把那個倒地的蘇家弟子的靈力往外扯，對方當場慘叫出聲。</p>\n<p>白無極走到距離大約十步的地方，停下來，感覺到腦袋裡那個熟悉的、帶著星光質感的存在輕輕震動了一下——像是白金之星在問他：「準備好了嗎？」</p>\n<p>「準備好了，」他在心裡說，「出來吧。」</p>\n<p>時間，停止了。</p>\n<p>---</p>\n<p>五秒鐘，對大多數人來說，是很短的時間。</p>\n<p>短到不夠喝完一口水，不夠換一個表情。</p>\n<p>但白無極的五秒鐘是另一件事。</p>\n<p>他看到了所有人被定格的樣子——那個邪修伸出的手停在半空中，靠近他手掌的空間輕微扭曲著，被抽出一半的靈力絲線靜止在空中，金色中帶著青灰，像是一條被截斷的生命線。邪修的臉上是得意，蘇家弟子的臉上是痛苦，旁邊幾個靈契者的臉上是絕望和憤怒。</p>\n<p>白無極在靜止的世界裡走過去，白金之星的身影在他身旁展開，星空色的重甲在夜色裡發出極淡的光芒。</p>\n<p>拳。</p>\n<p>對著第一個邪修，正正打在他的側腹，八極拳的勁道沉進去，不是表面的破壞力，是那種滲透到內部才爆開的衝擊。</p>\n<p>轉身。</p>\n<p>第二個邪修，拳打後頸，力道精確，不殺人，但確保他在接下來的十分鐘裡無法站立。</p>\n<p>最後一個邪修在時停範圍的邊緣，白無極走過去，白金之星配合他，在最後一秒鐘內，對準這個邪修的腰腹補了一腳。</p>\n<p>時間，恢復了。</p>\n<p>三個邪修同時倒地，沒有任何預兆，沒有任何過程，就是一眨眼，從好端端站著，變成倒在地上抱著不同部位哀嚎。</p>\n<p>那十幾個靈契者全體愣住了。</p>\n<p>一個穿著赫連家服飾的契師，嘴張著，手裡的靈術都忘了收回，呆呆地看著眼前這幕。「那個……那個人，他，他怎麼……他做了什麼？」</p>\n<p>「讓開，」白無極已經邁步往前走，聲音平靜而帶著一點理所當然的輕鬆，「讓我先過。」</p>\n<p>沒有人攔他。</p>\n<p>人群自動分開，讓出一條道。</p>\n<p>白無極從中間穿過去，沒有回頭，往更深處的戰場走去。他聽到身後有人急急忙忙在傳話——是蘇家的人認出了他，壓低的聲音帶著掩蓋不住的振奮：「白無極！白無極回來了！白公子回來了！」</p>\n<p>這話像火一樣往外燒。</p>\n<p>白無極走遠了，但他走過的地方，那些撐得搖搖欲墜的靈契者，隱隱有了一種說不清楚的東西——</p>\n<p>不是勝利的希望，但像是某種支撐的力氣。</p>\n<p>---</p>\n<p>他一路往東城主陣地走，沿途碰上六撥邪修，大的一撥七個，小的一撥兩個。</p>\n<p>時停。清場。走人。</p>\n<p>這三個步驟白無極做得極其流暢，幾乎沒有停頓。每次時停結束，倒地的邪修和目瞪口呆的靈契者就成為一道固定的風景，只有他在其中穩穩地往前移動，像一塊礁石在浪裡走路。</p>\n<p>東城的戰局在他身後，一點一點地鬆動了。</p>\n<p>前線有人喊：「白無極在東城！」</p>\n<p>後方有人喊：「哪個白無極？蘇家那個外來客？」</p>\n<p>「就是那個！時停的！他把邪修整批整批放倒！」</p>\n<p>謠言，或者說消息，在戰場上傳播的速度永遠比任何靈術都快。</p>\n<p>白無極走到東城主街盡頭的時候，遠遠地，看到了四大家族的主陣地——那裡人還在，旗還在，但旗已經退到了城中心廣場的邊緣，往後再退半里，就是城主府了。</p>\n<p>他站在路口，望著那片混戰，把肩膀活動了一下。</p>\n<p>「差不多，」他對著虛空裡的白金之星說，「正事開始。」</p>\n<p>星光在黑夜裡，輕輕地，亮了。</p>"}, {"title": "第92章_白無極參戰", "content": "<p>第92章　白無極參戰</p>\n<p>東城主街的盡頭，是一個十字路口。</p>\n<p>路口四個方向都有人在打，但最慘的是正前方——二十幾個靈契者被十幾個邪修堵在廣場入口，退無可退。靈力爆炸聲連成一片，火光和冰晶和各種屬性的靈術在半空中撞在一起，把整個路口的地面都燒得黑一塊、凍一塊，七零八落的。</p>\n<p>有三個靈契者已經倒下了，他們的靈力被邪修抽走一部分，沒死，但坐在地上，眼神渙散，像是魚缸裡缺氧的魚。</p>\n<p>白無極站在路口邊緣，把整個局面過了一遍。</p>\n<p>十三個邪修，分成三小組，已經形成包夾之勢。被圍住的靈契者大概有七個契師、四個契士，還有一個看起來剛到契將但受傷了的、穿著蘇家長老服飾的中年男人，正在強撐著護著背後的人。</p>\n<p>「蘇家長老，」白無極在心裡標記了一下，「先救他。」</p>\n<p>他沒有喊話，沒有衝刺，甚至沒有擺架勢。</p>\n<p>就是走過去。</p>\n<p>像一個普通人，走進了戰場。</p>\n<p>然後時間停了。</p>\n<p>---</p>\n<p>五秒鐘，白無極直接往中間那組邪修走，白金之星在他身側展開，高大的星空色身影在凝固的空氣裡踩著穩定的步伐。他把手搭在第一個邪修的肩上，用八極拳的「頂肘靠」，力道不大，但方向精確——對準了那個邪修被之前的戰鬥留下的舊傷。</p>\n<p>第二個邪修，拳打喉嚨，這個可以讓他接下來大概二十分鐘說不出話。</p>\n<p>第三個邪修最麻煩，他的靈力在時停前正在外放，時停不能消除他已經在空中的靈術，白無極繞了一下，從側面進去，往他的丹田位置打了一掌——不是要打壞他的修煉根基，只是讓那股外放的靈力失去主人的控制，自然散掉。</p>\n<p>第四個……</p>\n<p>時間恢復。</p>\n<p>四個邪修同時倒地，靈術消失，剛才咄咄逼人的壓制瞬間清空。被包圍的靈契者集體愣了一秒——他們誰都沒看清楚發生了什麼，這四個人就倒了。</p>\n<p>然後他們看到白無極站在那裡。</p>\n<p>「你……你是怎麼……」蘇家長老傷著，但眼神很銳利，他盯著白無極，聲音壓低，「白公子？」</p>\n<p>「是我。」白無極已經轉頭在看另外兩組邪修，「您往後退一步，讓開前面。」</p>\n<p>「可是——」</p>\n<p>「讓開就好。」</p>\n<p>蘇家長老閉嘴了，帶著後面的人往廣場方向退開兩步。</p>\n<p>白無極對著前方剩下的九個邪修，往前走了兩步，然後停下來。</p>\n<p>再一次，時間停了。</p>\n<p>這次五秒鐘他清了左邊那組的四個，一個個精確送倒，沒有花哨，沒有多餘的動作，就是最直接的拳腳，打在最需要被打的地方。</p>\n<p>時間恢復。</p>\n<p>四個人倒地。</p>\n<p>最後那組的五個邪修已經看到了前面的「奇景」，他們不傻，感覺到有什麼不對，其中一個迅速往外撤，想要拉開距離——</p>\n<p>白無極沒有追，讓那個跑了，盯著剩下四個。</p>\n<p>時間，又停了。</p>\n<p>---</p>\n<p>整個過程大概用了一分半鐘。</p>\n<p>當白無極在路口站定，周圍十二個倒地的邪修，剩下一個跑了，留下的靈契者們是集體呆愣的狀態。沒有人第一時間說話，因為沒有人能確定自己剛才看到的是真實的。</p>\n<p>然後，最先回神的，是蘇家長老。</p>\n<p>他大聲喊了出去，聲音衝破了整個路口的喧囂：「白無極回來了！」</p>\n<p>這句話，在戰場上，有它特殊的傳播力。</p>\n<p>它不是在說一個人回來了，它是在說，那個能時停、能無聲清場的白無極回來了——那個從進城開始就一路在東城留下「邪修莫名倒地」奇景的人，他到主戰場來了。</p>\n<p>消息像一把石頭投進水裡，圈圈漣漪往外散。</p>\n<p>「白無極？哪個白無極？」</p>\n<p>「蘇家帶回來的那個外來客，時停的！他在東城把二十幾個邪修全放倒了！」</p>\n<p>「一個人？」</p>\n<p>「一個人！」</p>\n<p>白無極聽著身後的喧嘩，沒有回頭，繼續往廣場裡走。</p>\n<p>廣場中心，是天契城最主要的大戰場——這裡四大家族的主力部隊都集結在此，三家契聖和無數契王、契師，在跟數量不算少的邪修死磕。場面看起來是均勢，但白無極走進去就感覺到了：這是守勢，不是攻勢，是那種咬牙撐著不讓對方推進的守勢。</p>\n<p>「你終於來了。」</p>\n<p>有人在他旁邊說話，他側頭一看，是赫連家的一個青年，神情疲憊但眼睛亮著，「蘇念卿呢？」</p>\n<p>「去南城集合了，」白無極說，「你們現在最大的缺口在哪？」</p>\n<p>那個赫連家青年幾乎沒有思考，直接指向廣場西北角：「那邊，有三個邪修特別難纏，我們換了兩批人過去，都被打退了。」</p>\n<p>白無極往那個方向看了一眼，遠遠的能看到那邊的靈術爆炸格外密集，己方的人往後退了又退，已經快退到一棵大樹旁邊了。</p>\n<p>「好，」他轉身往那個方向走，頭也不回地說，「讓旁邊的人暫時都退開。」</p>\n<p>「退開？但是——」</p>\n<p>「不用整個撤，往兩側讓三步，給我留一條線就夠了。」</p>\n<p>那個赫連家青年愣了一秒，然後迅速去傳令了。</p>\n<p>白無極走向西北角，走向那三個邪修，腳步穩，手放鬆，臉上帶著那個幾乎讓人誤會他在隨便散步的鬆散神情。</p>\n<p>兩側的靈契者按照指令往旁邊讓了讓，給他讓出一條通道，然後他們就看著這個人，就這樣走進了對面三個邪修之間，走進了靈術爆炸最密集的地方，不帶任何靈契，不帶任何防禦，像是個……</p>\n<p>時間停止了。</p>\n<p>五秒鐘之後，三個邪修倒地。</p>\n<p>現場沉默了將近三秒。</p>\n<p>然後整個西北角的靈契者同時爆發出一聲喊，那聲音裡面摻著太多太多的東西——疲憊、緊繃、壓抑、絕望——在這一刻全部找到了一個出口，撕裂般地衝出來。</p>\n<p>「白無極！」</p>\n<p>「白公子！」</p>\n<p>白無極站在三個倒地的邪修中間，抬起頭，看著整個廣場，看著那些疲憊但重新燃起鬥志的臉。</p>\n<p>他沒有說什麼英雄主義的台詞，沒有振臂高呼，沒有什麼豪言壯語。</p>\n<p>他只是往手心哈了口氣，活動了一下手指，看著廣場另一邊還在繼續的戰場，平平靜靜地說：</p>\n<p>「還有多少個？」</p>\n<p>周圍的人楞了一瞬，然後有人哈哈大笑起來，那笑聲傳染開去，帶著一點點出乎意料的解壓：</p>\n<p>「北邊還有一大批！」</p>\n<p>「東邊也沒清乾淨！」</p>\n<p>「那個方向有個特別強的！」</p>\n<p>「好，」白無極點頭，扭了扭脖子，「排個隊，我一個個來。」</p>\n<p>廣場上，難得地，有人在戰場上笑出了聲。</p>\n<p>氣氛，真的開始不一樣了。</p>\n<p>不是勝利，但像是撐住了的感覺，像是潮水退了一點，讓岸邊的人喘到了一口氣。</p>\n<p>白無極走向下一個戰點，身後的星光隱約閃爍，沒人看得見，但它一直在那裡。</p>\n<p>始終在那裡。</p>"}, {"title": "第93章_邪修的力量", "content": "<p>第93章　邪修的力量</p>\n<p>好景不長。</p>\n<p>白無極在廣場清了前後七八撥邪修之後，遇上了真正麻煩的對手。</p>\n<p>是個中年男人的模樣，穿著跟其他邪修一樣的黑灰長袍，但他身上的氣質跟前面那些不一樣。前面那些邪修，雖然能力奇怪、出手不按牌理，但有一種「力量型」的直接感——衝過來用力打，搶靈力，打倒為止，風格粗糙。</p>\n<p>但眼前這個，他站在廣場東南角，周圍沒有其他邪修，單獨一個人，卻讓周圍七八個靈契者沒有一個敢靠近。他只是站著，什麼都沒做，就站著，那種無形的壓力讓所有人都下意識往後退了半步。</p>\n<p>白無極走過來的時候，旁邊有人拉了他一下：「別去，這個不一樣，我們上了四個人，他一句話沒說，靠近他就感覺靈力在外洩，遠一點才好一點。」</p>\n<p>白無極停下腳步，站在距離那個邪修大概十二步的地方，仔細看。</p>\n<p>那個邪修回過頭來，看了他一眼，眼神很平靜，不是輕蔑，是那種掌握局面的人的平靜。</p>\n<p>「有意思，」那個邪修開口，聲音不高，但周圍嘈雜的戰場聲居然沒把它蓋住，「第一個不帶靈契走進來的。」</p>\n<p>白無極沒接話，在心裡快速分析了一下這個人的外放靈力結構。</p>\n<p>說「外放靈力結構」有點不準確——因為他沒有靈契，沒有固定的靈力形態，他身上的能量是一種混雜的東西，像是把很多種不同屬性的靈力強制攪在一起，勉強形成一個統一的「場」。這個場不強，但它是持續的，任何靈契者靠近，都會感覺到自己的靈力被這個「場」緩慢地往外抽。</p>\n<p>「所以這就是為什麼靈契者靠近他會外洩，」白無極在心裡說，「是持續吸收，不是主動攻擊，就是那種……把靈力當空氣一樣自然吸進去的感覺。」</p>\n<p>他身邊那個提醒他的赫連家契師，白無極這時候才注意到，對方臉色很差，剛才大概靠近那個邪修靠得有點久，靈力已經輕微外洩了，手在微微抖。</p>\n<p>「你先退開，」白無極往旁邊輕輕一推，把那個契師推到更安全的位置，然後整個人往前走了兩步，停在十步外，「你到底是哪種邪修？」</p>\n<p>那個邪修不答，先是右手一抬——火焰，橙紅色的，標準的火系靈力，成形為一個拳頭大小的焰球，精準而穩定。</p>\n<p>然後，就在白無極等著他出手的時候，那個焰球……熄滅了。</p>\n<p>不是被打散，是自己熄滅的。</p>\n<p>下一秒，同樣的右手，飄出了青白色的冰晶，成形速度比剛才的焰球更快，更大，瞬間在周圍地面結了一層薄薄的霜。</p>\n<p>白無極往後退了半步，確保腳下沒打滑，同時腦子在高速運轉。</p>\n<p>「剛才是火，現在是冰，同一個人，不到三秒鐘換了兩種屬性。」</p>\n<p>這事讓他有點不舒服。不是恐懼，是一種類似「演算法沒跑通」的不舒服——他過去對付靈契者，有一個很重要的參考維度，就是對方的靈契類型。知道你是火系，我就知道你的強項、弱點、大概會用哪些戰術，心裡有數。但這個邪修，他沒有固定的類型，他的能力是隨機的，或者說是「根據吸收了什麼就用什麼」。</p>\n<p>就在白無極分析的時候，又有事情發生了。</p>\n<p>廣場另一側，傳來一聲慘叫。</p>\n<p>白無極眼角餘光掃過去——一個蘇家弟子，大概是契將修為，在跟另一個邪修的交戰中受了傷，靈力控制出現了混亂，那個負傷的契將往旁邊倒去。但在他徹底倒地之前，白無極清楚地看到，那個讓他對話的邪修，眼神往那邊掃了一眼，然後——</p>\n<p>那個受傷契將身上的靈力，有一部分，就這樣，消失了。</p>\n<p>不是被正面攻擊打散，是自動往邪修的方向流過去，像是水往低處流，靠著那個無形的「場」，被隔空吸走了一截。</p>\n<p>受傷的契將當場昏厥，不是傷重，是靈力驟降到臨界點以下，意識斷掉了。</p>\n<p>白無極盯著眼前的邪修，沉默了兩秒。</p>\n<p>「你能隔空吸別人的靈力。」他說，不是疑問，是確認。</p>\n<p>那個邪修終於有了一點正視他的意思，嘴角稍稍扯了一下：「不壞，看得出來。」</p>\n<p>「你剛才用火，現在用冰，吸了那個蘇家弟子的靈力之後，你下一個能力應該是……」白無極往前走了一步，同時在心裡把剛才的觀察結合起來，「元素系的，偏向控制類。」</p>\n<p>那個邪修沒說話，但那個「沉默」本身就是某種程度的回答。</p>\n<p>「你們邪修，」白無極在十步外停下來，「沒有等級上限，越打越強，越吸越強，你吸的東西越雜，能用的東西越多，但不精——這是代價，對吧？」</p>\n<p>那個邪修這次真正審視了他一眼，帶著一種輕微的訝異。「比我想的聰明。」</p>\n<p>「謝誇。」白無極嘆了口氣，「但這個代價其實沒那麼大，畢竟你量大啊。」</p>\n<p>他往後退了半步，在心裡迅速重新計算。</p>\n<p>問題在這裡了——時停五秒，他打邪修沒問題，他的精神力攻擊是實打實的物理損傷，邪修扛得住嗎？剛才那幾批邪修都是被打倒的，說明肉體上是有效的。但問題是，被打倒的那些邪修，有沒有可能在倒下的過程中還在吸周圍的靈力？他在時停裡打人是單方面行動，時停解除之後，邪修倒地，但如果邪修倒地的同時周圍靈契者的靈力往他那邊流，這個邪修恢復的速度可能遠比他估計的快。</p>\n<p>「你們的數量有多少？」白無極問道，語氣輕鬆，像是在聊天，「在城裡的。」</p>\n<p>那個邪修沒答。</p>\n<p>「能吸靈力補充損耗，能隨機使用多種屬性，沒有固定的靈力波動讓人預判，」白無極自言自語地把威脅點一條一條列出來，「唯一的缺點是，力量不穩定，在打法上沒辦法像靈契者那樣把一個技能用到極致……但你們如果以量取勝，把靈契者直接淹死，這個缺點就不重要了。」</p>\n<p>那個邪修這時候出手了。</p>\n<p>不是火，也不是冰，是剛才從受傷的蘇家契將那裡吸來的——一道元素靈力形成的束縛絲線，往白無極的方向橫掃過來，速度極快，針對的是他的雙腳，想要限制移動。</p>\n<p>白無極側身，讓過了大半，但還是有一絲掛到了他的左臂。</p>\n<p>不重，但他清楚地感到，那絲靈力在接觸到他的瞬間，試圖往他體內滲透，往外抽什麼東西。</p>\n<p>抽精神力。</p>\n<p>那絲線在接觸到白無極的精神力的瞬間，像是抓到了熱鍋，迅速縮了回去——邪修皺了一下眉頭。</p>\n<p>「你的力量，」邪修說，「不是靈契。」</p>\n<p>「對。」白無極看著縮回去的絲線，把這個信息記下來，「你抽不走。」</p>\n<p>這是一個重要的發現。</p>\n<p>邪修靠吸靈契者的靈力作戰，而白無極的精神力不是靈契，邪修的吸附能力對他無效——至少，直接吸取的部分無效，這讓他在這個戰場上有了一個別人沒有的優勢。</p>\n<p>但這也意味著，他是目前唯一一個能在邪修的「吸力場」裡正面交戰而不損耗靈力的人。</p>\n<p>「你們靈契者，打不過我們，」那個邪修說，語氣裡帶著很確定的信息，「你一個人打不過我，更打不過更多的我們。城中還有九十七個，我的同門，比我強的，有四十二個。最強的那個——」他往廣場更深處看了一眼，白無極順著他的目光看過去，看不到什麼，但能感覺到遠處隱約壓來的龐大靈力波動，「他一個人就足夠了。」</p>\n<p>白無極順著那個方向看了很久，沉默地感受著那股越來越近的壓力。</p>\n<p>「九十七個，」他在心裡算，「四十二個比這個強，還有一個最強的。」</p>\n<p>這個數字讓他的心往下沉了一截。</p>\n<p>但他沉默地分析完，還是把目光收回來，看著眼前這個邪修。</p>\n<p>「那先把你解決了。」他說，語氣完全沒有波動，「時停這個東西，你吸不走。」</p>\n<p>說完，時間停止。</p>\n<p>五秒鐘，白無極走進靜止的世界，走到那個邪修面前，白金之星的右拳，沉穩而精確地落在他的胸口正中——不是要打死他，是要打斷他身上那個持續運作的吸力場，那個場是靠他的意識控制的，意識中斷，場就消失，周圍靈契者的靈力就不再外洩。</p>\n<p>時間恢復。</p>\n<p>那個邪修倒地，吸力場消失。</p>\n<p>周圍靠近的靈契者同時感到一陣輕鬆，剛才被壓著的靈力恢復自然流動。</p>\n<p>白無極站在倒地的邪修旁邊，低頭看著他，在心裡把「邪修的力量」整個梳理了一遍。</p>\n<p>越打越強，越吸越強，沒有等級上限，吸取靈力同時也在學習和積累——這種威脅不是一個人的威脅，是一個體系的威脅。</p>\n<p>時間越拖越對他們有利。</p>\n<p>這個仗，必須快。</p>\n<p>白無極抬起頭，往廣場深處那個越來越強的靈力波動看了一眼，眼神少見地帶著一點點嚴肅。</p>\n<p>「最強的那個，快到了。」</p>"}, {"title": "第94章_邪修首領", "content": "<p>第94章　邪修首領</p>\n<p>靈力波動先到，人後到。</p>\n<p>白無極在廣場清完第九批邪修的時候，感受到了那股東西——說「感受到」其實不準確，因為那不是普通意義上的「感受」。那是一種更接近「壓力」的東西，像是空氣密度突然提高，像是有什麼非常重的東西懸在頭頂，讓每一口呼吸都稍微費力了一點點。</p>\n<p>廣場上的所有人，不分靈契者還是邪修，都在同一時間動作遲緩了一下。</p>\n<p>就連白無極，也停下了腳步。</p>\n<p>那個壓力從北邊來，從天契城主街的方向，從更深更廣的戰場方向。</p>\n<p>然後有人喊：「玄冥！是玄冥出現了——」</p>\n<p>那個名字在廣場上炸開，引發的反應讓白無極第一次意識到，這件事有多嚴重——他看到幾個靠近戰場邊緣的契師和契士，聽到這個名字之後，幾乎是條件反射地往後退了兩三步，不是怯戰，是那種「聽到名字就已經感覺到的壓力」讓腿自動往後挪了。</p>\n<p>這個名字，在邪修裡面，大概類似於「傳說等級」的東西。</p>\n<p>白無極往北邊看。</p>\n<p>他沒有立刻看到人，但他看到了過程。</p>\n<p>主街方向，靈力的顏色在變。原本是各種屬性混戰的複雜顏色，正在被一種深沉的紫黑色緩慢地吞噬。不是急劇的爆炸式擴散，是那種非常從容的、一點一點往外延伸的擴張，像是一個本來就已經很滿的容器在溢出，溢出的速度甚至可以說得上優雅。</p>\n<p>然後白無極看到了那個靈力波動的源頭，跟著靈力前沿一起出現的，是一個人。</p>\n<p>不高，比白無極矮了大概半個頭，穿著極深的墨色長袍，頭髮用一根素銀簪子挽起，臉型清瘦，五官深刻，年紀看起來接近四五十歲，但眼神的質感太古老了，古老到和那張臉不太搭，讓人看了之後隱約覺得哪裡不對。</p>\n<p>他走得不快。</p>\n<p>就是正常的步速，一步一步往廣場走來。</p>\n<p>但他走過的地方，靠得近的靈契者，靈力開始自動往他身上匯聚。</p>\n<p>不是一點點。</p>\n<p>是很大的量，很快的速度，像是乾燥的紙靠近火一樣，根本不需要任何主動的動作，靠得近了就開始燒。</p>\n<p>白無極看到北邊廣場入口的一個契王，那是個修為在整個廣場數得上號的強者，剛才還在跟三個邪修正面交鋒，打得有來有往。這個契王距離玄冥大概是三十步，在玄冥走進廣場的瞬間，他的臉色就驟然一變，那種「靈力被抽走」的感覺讓他的控制直接崩了，他的靈術在手上散掉了，他整個人往後踉蹌了兩步，表情是從未見過的不可置信。</p>\n<p>三十步的距離，靈力就開始強制外洩。</p>\n<p>「這個——」白無極看著這一幕，腦子裡那根分析問題的弦往下拉了一截，「比剛才那個，強不止一個等級。」</p>\n<p>不是質的區別，是量的區別。剛才那個邪修的吸力場，是小範圍的持續吸取，需要靠近才有效。玄冥這個，是大範圍的場域壓制，三十步，已經能讓一個契王失去控制。</p>\n<p>那麼，如果是更近的距離呢？</p>\n<p>如果是十步呢？</p>\n<p>「別靠近！所有人往後撤！」有人在喊，白無極聽出來了是赫連峰的聲音，帶著一種他之前從未在這個驕傲的老人身上聽到過的緊迫，「退到廣場南邊！所有契王以上集合！」</p>\n<p>廣場上開始了混亂的後撤，但已經有幾個靠得太近的靈契者靈力外洩過多，腿軟倒地，被旁邊的同伴架著往後拖。</p>\n<p>玄冥，繼續往前走，不快，不慢。</p>\n<p>他的眼神掃過這個廣場，像是在清點庫存，那種眼神讓白無極覺得格外不舒服——他把這裡所有的靈契者，連帶他們的靈力，都當成一種資源在看。</p>\n<p>然後，廣場另一邊，有三道強橫的靈力波動升起。</p>\n<p>白無極轉頭，看到了三個人。</p>\n<p>蘇長淵，元素系，修為契聖，靈力如流水，方向感極強，升起的靈力波動是明亮的銀藍色。</p>\n<p>赫連峰，大地系，修為契聖，靈力如山嶽，厚重沉穩，升起的靈力波動是深沉的土黃色夾雜著岩石的赤褐。</p>\n<p>慕容玄——這個名字讓白無極稍微停了一下腦子，因為之前這個人是敵對關係，但現在他站在蘇長淵旁邊，一樣是攔截玄冥的姿態——元素系巔峰，修為契聖，據說只差一步就能踏入契神，靈力波動是最複雜的那種，混雜了極多種屬性，但不是像邪修那樣強行攪合，而是一種高度融合之後的渾然。</p>\n<p>三個契聖，同時出手。</p>\n<p>不是各自為戰，是明顯排過陣的協同——蘇長淵在左，赫連峰在中，慕容玄在右，三道靈力成扇形往玄冥方向壓去，每一道都是碾壓級別的重量。</p>\n<p>玄冥停下腳步。</p>\n<p>只是停下來。</p>\n<p>他沒有抬手，沒有擺出任何防禦的姿態，就那樣站著，讓三道靈力波動衝向他，然後——</p>\n<p>被吸收了。</p>\n<p>不完全是，但大部分是。三道靈力在接觸到玄冥外放的場域時，就像是被一塊巨型海綿迎面吸去，速度和猛烈程度都驟然降低，到達玄冥身前時，已經從三道碾壓衝擊變成了三陣溫吞的微風。</p>\n<p>玄冥稍微吸收了一下，慢慢呼出一口氣，身上的靈力波動略微增強。</p>\n<p>「不夠，」他說，聲音不大，但廣場上奇異地安靜下來，讓每一個字都落得很清楚，「三個契聖，打不過我。」</p>\n<p>他說這話的時候，沒有什麼炫耀的意思，就是陳述事實一樣的平靜。</p>\n<p>這個平靜比任何狂言都讓人感到壓抑。</p>\n<p>因為它是真的。</p>\n<p>蘇長淵的臉色在收手那一瞬間沉了下來，他往旁邊看了赫連峰一眼，兩個老人之間交換了某個無聲的信息。赫連峰手上攥著拳頭，大地系的靈力在他指節間隱約流動著，但沒有再發動——他在思考，在等。</p>\n<p>慕容玄沒有說話，他的眼神一直釘在玄冥身上，那種眼神白無極認識，那是在做評估的眼神，是在找缺口的眼神——這個老狐狸哪怕現在站在「己方」，他在做的事情也還是在計算勝算。</p>\n<p>白無極在廣場邊緣站著，遠遠看著這一切。</p>\n<p>感受著從玄冥身上傳來的那股壓力，在他站著的位置，大概是六七十步開外，壓力還算可以承受，但「可以承受」的代價是他感到自己的精神力在輕微地往那個方向流動，像是被一股很遠但很持續的吸力拉著。</p>\n<p>不是靈契，是精神力也被影響了？</p>\n<p>還是說距離夠遠所以影響很小，但如果他靠近，精神力也會被吸走？</p>\n<p>這是一個很重要的問題。</p>\n<p>因為如果精神力也會被玄冥吸走，那他唯一的優勢就消失了，他跟廣場上那些節節後退的靈契者沒有任何區別。</p>\n<p>「比慕容玄還猛，」白無極在心裡說，聲音很平靜，但連他自己也承認，這個評估讓他有點——只是有點——不太確定了。</p>\n<p>玄冥繼續往前走。</p>\n<p>廣場上，靈契者的後撤速度加快。</p>\n<p>三個契聖短暫地對視，沒有說話，再一次，三道靈力升起，這次更快，更猛，帶著一種「反正要消耗就讓你消耗得爽快點」的決絕——這是拼消耗的打法，不是指望打倒玄冥，是指望讓他吸收之後撐不住自己的場域控制。</p>\n<p>玄冥吸收，繼續走，身上的靈力繼續增強。</p>\n<p>後方，廣場上倒地的靈契者增加了。不是被打倒，是純粹靈力外洩昏迷。</p>\n<p>白無極看著這一切，低聲說：「差不多是最壞的情況了。」</p>\n<p>他往前走了兩步，讓自己更靠近一點，試探性地感受了一下玄冥的吸力範圍。</p>\n<p>精神力，還沒被影響。</p>\n<p>不是因為精神力免疫，是因為距離還不夠近。</p>\n<p>「那就要在被影響之前，搞清楚多近是臨界點，」他在心裡說，「然後在那個臨界點之外，決定怎麼打。」</p>\n<p>他站在廣場邊緣，看著玄冥一步步走向那三個撐著的契聖，低聲說了一句沒有人聽得到的話：</p>\n<p>「有意思。」</p>\n<p>這一次，他說這話，語氣是認真的。</p>"}, {"title": "第95章_蘇家參戰", "content": "<p>第95章　蘇家參戰</p>\n<p>南城燈塔下，蘇念卿趕到的時候，蘇長淵不在。</p>\n<p>蘇家的集合點聚了大概三十多個人，從外袍顏色判斷，有蘇家精英弟子、三個蘇家長老、七八個外袍較淺的外圍弟子，全部武裝整齊，但沒有指揮，每個人的臉上都掛著或多或少的焦慮。燈塔底部放了十幾個傷員，有人在幫忙治療，有人在低聲說話，氣氛緊繃而壓抑。</p>\n<p>「蘇家大小姐！」</p>\n<p>有人第一個看到了她，這個「報告」像一陣風吹過人群，所有人都轉過頭來。</p>\n<p>蘇念卿環視了一圈，霜翎跟在她身側，十二條尾巴在身後展開，瀑布一樣的銀白色毛海在夜色裡發著柔光，整個輪廓在人群的目光中顯得格外凜然。</p>\n<p>「父親呢？」她開門見山。</p>\n<p>「蘇家主帶著幾位長老去了北廣場，」一個稍年長的弟子站出來回報，聲音裡帶著隱約的釋然——蘇念卿出現了，這件事本身就讓人安心一截，「上一個消息是半個時辰前，說三大契聖在圍攻邪修首領玄冥，但打不穿。」</p>\n<p>「玄冥。」蘇念卿把這個名字在嘴裡過了一遍，霜翎在她腳邊發出一聲低沉的哼鳴，像是對這個名字有反應。「東邊的戰況？」</p>\n<p>「東城在一個時辰前開始有人打回去，說是白公子一個人在清場——」那個弟子說到這裡，語氣裡多了一絲難以言說的東西，帶著一點點「說出來可能讓人覺得在誇大」的猶豫，「說他時停……一個人就把幾十個邪修全放倒了。」</p>\n<p>蘇念卿沒有表情的變化，只是點了點頭，像是這個消息完全在她的預期之內。</p>\n<p>「他去哪了？」</p>\n<p>「最後的消息說他往北廣場走了。」</p>\n<p>「北廣場。」她重複了一遍，眼神在地圖的位置快速掃了一下，然後收回來，看著面前這三十多個人。「我帶你們去北廣場，現在就去。傷員在這裡的繼續守著，能走的跟上。」</p>\n<p>沒有人質疑。</p>\n<p>沒有人問為什麼，或者問她憑什麼指揮。</p>\n<p>她站在那裡，突破契將之後的靈力波動自然而然往外擴散，帶著一種說不清楚的重量，讓周圍的人在第一時間就感受到了差距——不是壓迫，是那種「強者就是強者」的不言而喻。加上霜翎十二條尾巴安靜地展開在她身後，那個視覺本身就是一種無聲的宣告。</p>\n<p>「出發，」她說，轉身，步伐稳，「能跑的跑，跑不了的緊貼我後面。」</p>\n<p>霜翎邁開步子。</p>\n<p>---</p>\n<p>從南城到北廣場，正常時間要走大半個時辰，但蘇念卿帶的這支隊伍在她的靈力氣場加持下，一路速行，把那段路壓縮到了不到兩刻鐘。</p>\n<p>但在路上，他們遭遇了兩波邪修。</p>\n<p>第一波，是七個在街道上劫掠的邪修。他們正在圍攻一個被逼到死巷子裡的契師家族，那家人三代都在，老的老小的小，最強的一個是個契師，已經竭盡全力扛了很久了，靈力快耗盡了。</p>\n<p>蘇念卿沒有讓後面的弟子上前，她只是停下腳步，看了一眼，然後輕聲說了一個字：</p>\n<p>「霜翎。」</p>\n<p>霜翎的十二條尾巴，在這一刻完全舒展開來。</p>\n<p>卷三之前，霜翎的十二條尾巴是分批出現的，每一條都代表一個修煉階段的突破，力量是疊加的，但範圍是有限的。但在蘇念卿突破契將之後，兩人的靈力同頻了——不是字面意義上的「同頻」，是一種更深層的靈契共鳴，讓霜翎的能力和蘇念卿的靈力形成了直接的回路。</p>\n<p>十二條尾巴同時展開，每一條都是飽和的冰藍色，那個顏色在夜色裡亮得刺眼。</p>\n<p>然後，冰晶開始落下。</p>\n<p>不是從天上落，是從霜翎身周擴散出去，範圍在一個呼吸之間覆蓋了整條巷子——七個邪修，在那個瞬間，全部被包在冰晶的覆蓋範圍裡。他們反應很快，有兩個試圖用吸收的靈力來對抗凍結，但他們吸收的速度根本趕不上霜翎輸出的速度，冰晶的覆蓋面積太大，壓量不壓質，就是用量把他們的吸收上限給淹過去。</p>\n<p>三秒鐘。</p>\n<p>七個邪修全部凍住，成為廣場上七個奇異的冰雕，靈力在冰層裡封住，被強制中斷了流動。</p>\n<p>那個死守在巷子裡的靈契師，愣愣地抬起頭，看著突然被凍住的七個邪修，再看著站在巷口的銀色靈狐和它身旁面無表情的少女。</p>\n<p>他說不出話，只是手腳發軟，直接跪坐下去了。</p>\n<p>「不用謝，走。」蘇念卿看都沒看他，回頭繼續走。</p>\n<p>---</p>\n<p>第二波更複雜。</p>\n<p>是二十三個邪修，正在衝擊天契城東市的防線，守在那裡的是一個赫連家的二等長老帶著一隊人，人數不少，但裝備和修為都在對方之下，已經開始潰退。</p>\n<p>這個時候，蘇念卿沒有讓霜翎直接全覆蓋——因為己方的人也在戰場裡面，全覆蓋會傷到自己人。</p>\n<p>她站在戰場邊緣，仔細看了三秒鐘，把陣線分開，認出了己方人員的大概位置，然後開口：「後退三步，往左聚攏。」</p>\n<p>那個赫連家長老顯然不認識她，正要反問，但他的弟子認識霜翎，在他耳邊說了什麼，他回頭看到十二條尾巴展開的霜翎，臉色一變，立刻傳令：「往左！退三步！所有人！」</p>\n<p>己方人員往左側退出了三步的空間。</p>\n<p>蘇念卿轉頭看霜翎，十二條尾巴稍微收攏了幾條，把輸出角度往右偏——覆蓋範圍精確地落在邪修集中的區域，繞開了剛才讓出來的左側。</p>\n<p>二十三個邪修，被這一波冰覆蓋了十七個。</p>\n<p>剩下六個在邊緣，沒完全凍住，但被困在半融半凍的狀態裡，動作遲緩。</p>\n<p>後面蘇念卿帶來的弟子衝上去，把剩下六個收拾掉，前後加起來不到兩分鐘。</p>\n<p>赫連家長老站在那裡，看著整個過程，半晌，緩緩地說：「突破……契將了？」</p>\n<p>蘇念卿沒答，只是繼續往前走。</p>\n<p>她不需要答，霜翎的十二條尾巴，那個範圍，那個速度，本身就是最清楚的回答。</p>\n<p>---</p>\n<p>趕到北廣場的時候，局面比蘇念卿預想的更糟。</p>\n<p>她遠遠地感受到了玄冥的靈力壓制，那股壓力在靠近廣場的時候已經明顯了——不是讓人恐懼，是讓她的靈力系統開始隱約有「往外洩」的衝動，這個衝動讓她皺了一下眉頭，立刻調整了靈力運行方式，用一個更緊密的迴路把自己的靈力鎖住。</p>\n<p>霜翎低鳴了一聲，十二條尾巴往身上收了一收，明顯也感受到了那個壓力。</p>\n<p>蘇念卿往廣場裡看，看到了蘇長淵和赫連峰、慕容玄正在聯手對抗玄冥，三個契聖的靈力勉強形成了一道防線，但玄冥的腳步依然穩定，吸收的速度讓他看起來根本沒有損耗。</p>\n<p>再往右邊，是退後了不知道多少步的大量靈契者，他們靠得不遠，但也不敢太靠近。</p>\n<p>然後她看到了白無極。</p>\n<p>他在廣場邊緣，站著，望著玄冥的方向，那個站姿讓她有一種很奇怪的感覺——他沒在評估要不要上，他在等一個什麼時機。</p>\n<p>她讓帶來的三十多個人就位，然後自己帶霜翎走到廣場南邊——這個位置，是整個戰場裡能讓霜翎輸出覆蓋面積最大的地方，同時能避開己方主要集結區域。</p>\n<p>「好，」她對霜翎說，聲音比平時略低，帶著一種進入「戰鬥模式」的質感，「大範圍，從北邊那批雜兵開始，主力在南邊不動，給父親他們留空間。」</p>\n<p>霜翎的十二條尾巴，這一次，全部展開。</p>\n<p>完全的舒展，沒有保留，沒有控制範圍，就是全力。</p>\n<p>蘇念卿站上霜翎的頭頂，在那個高度，她能俯瞰整個北廣場，能看清楚每一條防線，每一個人員分布，每一個正在衝鋒的邪修。</p>\n<p>下方的靈契者看到霜翎的十二條尾巴完全展開，有人喊了出來：「是蘇家大小姐！蘇念卿來了！」</p>\n<p>霜翎的冰力在那一刻往外大爆炸。</p>\n<p>那個範圍，覆蓋了整個北廣場三分之二的面積。</p>\n<p>大量正在衝鋒的邪修被困在冰晶裡，戰場上突然出現了幾十個靜止的冰雕，夜色裡反著光，壯觀而詭異。</p>\n<p>廣場上的靈契者愣了兩秒，然後喊聲大作。</p>\n<p>蘇念卿站在霜翎頭頂，面不改色，冰冷的風在她發間揚起，她的眼神掃過戰場，找到下一個需要覆蓋的區域，冷靜地發出下一道指令。</p>\n<p>没有豪言壯語，没有多餘的表情，就是這樣。</p>\n<p>但這樣本身，就已經足夠讓人心裡有底了。</p>"}, {"title": "第96章_四大家族聯手", "content": "<p>第96章　四大家族聯手</p>\n<p>蘇念卿的這一波冰系大覆蓋，給了廣場上的靈契者一口喘氣的機會。</p>\n<p>但只有一口。</p>\n<p>玄冥沒有被凍住。</p>\n<p>他站在北廣場中心，霜翎的冰晶在接近他大概十五步的時候，就自然地往外偏轉，無法在他身上停駐。不是玄冥主動用什麼能力去阻擋，是他身上的吸力場太強，連冰晶裡面封存的靈力都在向他匯聚，這個力量讓冰晶本身的結構失去了維持的動力，慢慢消散了。</p>\n<p>霜翎感受到了這個「阻擋」，低鳴了一聲，往後退了一步。</p>\n<p>蘇念卿站在霜翎頭頂，盯著玄冥，眉頭微微皺起，這是她少有的表情——不是恐懼，是遇到問題時的思考。</p>\n<p>「冰系覆蓋對他沒用，」她在心裡整理，「因為封存在冰裡面的是靈力，而他能把靈力在冰晶完全成形之前就吸走，冰晶失去靈力就失去結構，自然散掉。」</p>\n<p>「那換一個方式：純物理的冰。」</p>\n<p>她對霜翎說了一個更細化的指令，霜翎的十二條尾巴調整方向，這次輸出的不是包含靈力的冰系靈術，而是把空氣中的水分強制凝結——這個方式效率差很多，但凝結出來的冰塊是純粹的物理存在，不包含可以被吸走的靈力。</p>\n<p>結果……有效，但效果很有限。</p>\n<p>玄冥身上的衣物稍微結了一層薄霜，他低頭看了一眼，像是在看某個無關緊要的小事，然後繼續往前走。薄霜在他走動的時候自然碎裂脫落，沒有任何影響。</p>\n<p>蘇念卿跳下霜翎的頭頂，落到地面，走向廣場中心的方向，在她父親蘇長淵後方十步停住。</p>\n<p>「父親，」她說，聲音不大，但蘇長淵聽到了，他回頭看她，臉上有那麼一瞬間——不是驚喜，是父親看到女兒在戰場上的那種複雜的什麼——然後迅速恢復了鎮定。「靈力覆蓋對他無效，純物理也影響有限，他的場域吸力半徑大概是二十步，靠近他的所有靈術都會被減弱到原來的三成以下。」</p>\n<p>她在三秒鐘之內說完了她的評估，清晰，準確，沒有一個字的廢話。</p>\n<p>蘇長淵沉默了兩秒，點頭。「你的判斷和我一致。」</p>\n<p>旁邊，赫連峰的聲音很低，帶著幾分艱難：「三個契聖打不穿他，正面頂他只是在給他送補給。」</p>\n<p>「那就不能正面硬頂。」慕容玄開口，這個男人今天的表情一直很奇怪——他和蘇家、赫連家的恩怨是真實存在的，但在這個時候，那些恩怨退到了某個角落，他站在那兩個人旁邊，一樣的目標，一樣的對手，像是一個從來沒有裂縫的聯盟，「他的問題是，靈力越吸越多，但場域的控制需要意識集中，如果我們能在多個方向同時給他壓力，他必須分散注意力，場域控制就會出現不均勻的盲區。」</p>\n<p>蘇長淵和赫連峰都看向他。</p>\n<p>「你提這個方案，」赫連峰說，語氣中帶著一種他本人可能都沒意識到的客觀，「是因為你熟悉他。你見過玄冥。」</p>\n<p>慕容玄沒有否認，也沒有解釋。</p>\n<p>「管它，說下去，」蘇長淵說，「怎麼配合？」</p>\n<p>---</p>\n<p>就在三個契聖達成協議的時候，廣場的另一邊，也在發生另一件事。</p>\n<p>陳家的人，出現了。</p>\n<p>不是陳家的邪修派系，是陳家普通弟子——那些被家主陳雲齊的決定拖下水，卻根本沒有選擇餘地的人。他們大約有四五十個，站在廣場南邊的入口，為首的是一個臉色發白的陳家二公子，他手裡沒有拿任何武器，靠近的時候先喊了一聲：</p>\n<p>「我們來幫忙的！」</p>\n<p>廣場上一片靜默，然後是明顯的不信任——那些蘇家弟子已經拔出了靈器，赫連家的人側身警戒，有幾個年輕氣盛的已經喊出聲：「陳家還有臉出現？你們家主把邪修引進來的！」</p>\n<p>陳家二公子——陳渝，白無極記得這個人，見過一面，還不算壞——沒有頂嘴，也沒有退縮，他繼續往前走，邊走邊說：「家主的決定是他的決定，我沒有能力阻止，但我陳渝不是邪修，也不站邪修那邊。城在這裡，我的根在這裡，我守著我的根。」</p>\n<p>他說完，身後四十多個陳家弟子，同時站穩了腳。</p>\n<p>廣場上的沉默，拉得更長了一截。</p>\n<p>最後，是蘇念卿先說話了，她沒有任何情緒的起伏：「站右邊，跟赫連家的配合，負責把被冰系凍住的邪修徹底解決，不要讓他們解凍之後再爬起來。」</p>\n<p>陳渝愣了一下，顯然沒想到蘇念卿這麼直接給了他一個活，他深呼一口氣，抱拳：「是。」</p>\n<p>這件事就這樣結束了。</p>\n<p>沒有重大儀式，沒有慷慨陳詞，就是很平靜地，一個聯盟成形了。</p>\n<p>四大家族——嚴格說來，四大家族的大部分有效戰力，站在同一邊，面對同一個敵人。</p>\n<p>---</p>\n<p>接下來的半個時辰，是這場戰役裡最接近「均勢」的時段。</p>\n<p>三個契聖採用了慕容玄的分散牽制方案：蘇長淵和赫連峰在玄冥左右兩側各保持十八步距離，持續輸出牽制——不是全力攻擊，是那種足以讓玄冥無法完全無視的持續性壓制；慕容玄在正面，利用他元素巔峰的能力，把輸出分成極多個小型的、方向各異的衝擊，讓玄冥的場域吸力必須分散來應對。</p>\n<p>這個方案有效果。玄冥的前進速度放緩了。</p>\n<p>與此同時，蘇念卿帶霜翎繼續清理廣場四周的雜兵邪修，陳渝帶的人跟上，把凍住的邪修徹底壓制。赫連家和蘇家弟子聯手，開始往回推進。</p>\n<p>東城那邊傳來消息：白無極已經清乾淨了東城的殘餘邪修，把大批靈契者解放出來，這些人正在往北廣場匯合。</p>\n<p>局勢，開始有一點點動。</p>\n<p>但就在這個時候，玄冥停下了腳步。</p>\n<p>他站在廣場中心，讓三個契聖的持續牽制在他身上消耗，吸收，再消耗，再吸收，臉上的表情沒有任何變化，像是這一切根本算不上什麼壓力。</p>\n<p>然後他開口，對著蘇長淵三人說：「你們學得很快。」</p>\n<p>沒有人接話。</p>\n<p>「但，」玄冥抬起一隻手，手掌往下，「你們的人，撐不住了。」</p>\n<p>這個動作本身沒有發出任何靈力攻擊。</p>\n<p>但廣場上，有十七個靈契者同時感到自己的靈力向外洩了一大截——不是正常的「靠近外洩」，是玄冥主動把他的場域瞬間往外擴張了，那個擴張只持續了不到一秒鐘，但在這一秒鐘裡，靠近廣場的所有靈契者都受到了波及。</p>\n<p>十七個人，當場昏迷，靈力被強行抽走到臨界點以下。</p>\n<p>其中，有三個契王。</p>\n<p>三個契王，就這樣，倒下了。</p>\n<p>玄冥收回手，繼續往前走，語氣平靜地說：「還剩多少個契王？你們應該算清楚。」</p>\n<p>赫連峰擋在蘇長淵面前，大地系的靈力在他身上嗡嗡作響，他的臉色難看，但他的腳，沒有退。</p>\n<p>廣場上，所有人都感覺到了，局勢再次傾斜了。</p>\n<p>白無極站在廣場南邊入口，看著這一切，聽到三個契王倒地的消息，低聲說了一句話。</p>\n<p>那句話說給白金之星聽的，沒有人聽到。</p>\n<p>「差不多該我去了。」</p>"}, {"title": "第97章_前線崩潰", "content": "<p>第97章　前線崩潰</p>\n<p>玄冥那一次場域擴張，造成的損傷比任何人預計的都更大。</p>\n<p>不只是三個契王。</p>\n<p>那一秒鐘的擴張，影響範圍其實到了廣場外圍——只是廣場外圍的靈契者修為普遍不高，被抽走的靈力量少，沒有直接昏迷，但靈力受損的程度讓他們的戰鬥力打了一個相當大的折扣。而廣場中心那批相對修為更高的人，在擋了三個契王倒下那波衝擊之後，留下來還能站著的，整體狀態已經從「疲憊」降到了「勉強支撐」。</p>\n<p>人心是最難守住的東西。</p>\n<p>在看到三個契王像空麻袋一樣倒下的那一刻，廣場上不少修為低一些的弟子，腿就軟了。不是完全放棄，就是那種「原來真的打不過」的認知滲進來，把那個撐著的力氣抽走了一截。</p>\n<p>前線就是在這個時候崩的。</p>\n<p>不是大規模潰逃——沒有人跑，每個人都還站在原地——但前線原本的整齊佈陣，開始出現鬆動。有幾個空隙形成了，邪修的雜兵從那幾個空隙鑽進來，直接沖向了後方的靈契者群體。</p>\n<p>「補上！」蘇長淵在遠處大喊，聲音還是穩的，但白無極聽出來了，那個「穩」是靠著意志硬撐出來的，不是真的從容。</p>\n<p>赫連家的人試圖去補那幾個空隙，但赫連峰就在這個時候，被玄冥選擇了。</p>\n<p>玄冥沒有對蘇長淵，沒有對慕容玄，而是把場域的吸收重心指向了赫連峰——赫連峰修為最高，但他的大地系靈力最「厚實」，吸起來也最補。玄冥場域靈力爆炸式地往赫連峰方向集中，不是攻擊，就是吸，赫連峰感到自己的靈力在一秒鐘之內被削掉了一大塊，他的大地護盾瞬間變薄，三個從前線鑽進來的邪修直接衝著他而去。</p>\n<p>「赫連老頭！」蘇長淵喊了一聲，側身撲過去，元素靈力在身前成形，擋住了那三個邪修最猛的那一擊——</p>\n<p>他擋住了，但代價是他自己被這一擊的靠近效應影響到，靈力外洩。</p>\n<p>他踉蹌了一步，幸好赫連峰眼疾手快，一把抓住他的手臂，穩住了他。</p>\n<p>這兩個老人，各有各的狼狽，站在那裡互相扶著，喘了幾口氣。</p>\n<p>周圍的弟子看到這一幕，有幾個人的眼眶紅了。</p>\n<p>「老頭你沒事吧，」赫連峰把蘇長淵扶穩了，粗聲粗氣地說，語氣裡頭有一點這個老頭子一輩子都說不出口的東西，「別撐著個臉，受傷了說。」</p>\n<p>「輕傷，」蘇長淵喘著，「你好多了，別在這裡演戲。」</p>\n<p>赫連峰哼了一聲，沒有鬆手。</p>\n<p>---</p>\n<p>玄冥慢慢走向前線，這個時候他的腳步比之前快了那麼一點點，不是急迫，是那種「差不多可以收尾了」的節奏感。他周圍的靈力漩渦在持續旋轉，吸收範圍沒有擴大，但強度增加了，靠近的一切靈力都在急速往他身上匯聚。</p>\n<p>廣場上，「嗡嗡」的靈力流動聲變得越來越密，那是大量靈力被強行抽離的聲音，在人的靈力系統裡，這個聲音是一種非常不舒服的感覺，像是有什麼東西從你的身體裡往外淌。</p>\n<p>白無極站在廣場南邊，感受著玄冥的靈力壓力。</p>\n<p>他一直在等一個什麼時機，但他不確定在等什麼。他知道自己要上，這是確定的，但玄冥這個對手和之前遇到的所有對手都不一樣，他需要先弄清楚的一件事是：在玄冥的場域吸力範圍內，精神力會不會也被影響？</p>\n<p>這個問題他在廣場邊緣試探了一段時間，得出了一個不算太壞的結論——在距離玄冥二十步以外，精神力的流動是正常的，沒有感覺到被拉扯；在十五到二十步之間，有輕微的被影響感，但不強；真正危險的應該是十步以內。</p>\n<p>這個距離讓他的計算稍微鬆了一點：五秒時停，他可以在十步外進入，用白金之星的速度在時停內接近，打完再退出，理論上來說是可以操作的。</p>\n<p>但理論和實際之間的缺口，永遠讓人難以預估。</p>\n<p>「差不多該我去了。」</p>\n<p>他說出這句話的時候，沒有人聽到，廣場上太嘈雜了。</p>\n<p>但有人聽到了他說話的聲音。</p>\n<p>腳步聲從他身後傳來，很快，明顯是在跑，但壓著聲音，盡量不驚動旁人，跑到他身後的時候，速度驟然降下來，變成了正常的步伐，像是不想讓他看出來「我跑了很久才追上你」。</p>\n<p>蘇念卿。</p>\n<p>他沒有轉頭，但他認出了那個腳步聲。</p>\n<p>她的手腕橫過來，手指扣住他的手腕，不用力，就那樣放著，是一個很輕的、制止的姿態——不是真的要攔他，是一個「我知道你要去，但先等一下」的意思。</p>\n<p>白無極低下頭，看著那隻放在他手腕上的手。</p>\n<p>蘇念卿的手，比他小不少，指節細長，靈力循環讓她的皮膚微微帶著冰感，此刻放在他手腕上，涼涼的。她沒有說話，或者說，她說了一個字，就一個字：</p>\n<p>「小心。」</p>\n<p>沒有請求不要去，沒有說「讓別人去」，沒有任何形式的「你不行」。</p>\n<p>就是這兩個字。</p>\n<p>白無極低著頭，看著那隻手，看了有兩三秒，然後他看到了她手腕上，在靈力外放的時候隱約透出的、細小的靈脈紋路，那是突破契將之後靈力底蘊更深帶出來的外顯，很淡，但在夜色裡隱隱可見。</p>\n<p>他沒有說「我知道了」，沒有說「你等著」，沒有任何形式的保證或者豪言。</p>\n<p>他沒說話。</p>\n<p>就那樣，把目光從她的手挪開，往前看，然後，走了出去。</p>\n<p>蘇念卿的手從他手腕上落下，她沒有跟上去，就站在那裡，目送他走向廣場中心，走向玄冥，走向那片靈力漩渦最密集的地方，走向那個一個人就能讓三個契聖撐不住的存在。</p>\n<p>她的手放回身側，指節微微握了一下，然後放開。</p>\n<p>霜翎走到她旁邊，把一條尾巴輕輕搭在她腿側。</p>\n<p>蘇念卿沒有低頭，繼續看著前方。</p>\n<p>她的表情，和平時一樣，是面癱的，是冷靜的，是讓人猜不透的。</p>\n<p>但她的眼睛，沒有移開。</p>\n<p>她盯著他走進去，一步一步，穩穩當當的，像是要去取一樣很普通的東西，那種步伐本身就有一種讓她說不清楚的什麼東西。</p>\n<p>廣場中心，玄冥感受到了什麼，停下腳步，轉過頭來，把目光落在走過來的那個人身上。</p>\n<p>那個人，不帶靈契，靈力波動是一種他之前從未感受過的形態，走進廣場的時候，沒有任何靈力被他的場域吸走，就像是一個……</p>\n<p>玄冥的眉頭，極微地皺了一下。</p>\n<p>白無極走到廣場中心，停下，和玄冥面對面，中間大概隔著十五步的距離。</p>\n<p>「你，」玄冥打量他，聲音依然是那個從容的平靜，「就是用時停清了我手下幾十個弟子的那個？」</p>\n<p>「對，」白無極說，聲音很鬆，像是在確認某件日常的小事，「你好，我叫白無極，我來和你打一架。」</p>"}, {"title": "第98章_白無極vs邪修首領上", "content": "<p>第98章　白無極 vs 邪修首領（上）</p>\n<p>「你好，我叫白無極，我來和你打一架。」</p>\n<p>廣場上，這一句話傳到四周所有人的耳朵裡，引發了一種奇異的、短暫的、戰場上不應該出現的安靜。</p>\n<p>蘇長淵和赫連峰對視了一眼，那個眼神裡有什麼東西在閃，但說不清楚是什麼。慕容玄往後退了兩步，給白無極讓出了正面的空間，他的眼神是老狐狸看熱鬧的眼神，但不是純粹的看熱鬧，是那種在快速計算「這件事對整體局勢的影響」的眼神。</p>\n<p>玄冥，盯著白無極，沉默了三秒鐘。</p>\n<p>三秒鐘之後，他說：「來。」</p>\n<p>就一個字。</p>\n<p>白無極的嘴角微微扯了一下，然後，時間停了。</p>\n<p>---</p>\n<p>五秒鐘，白無極的時停。</p>\n<p>進入靜止的世界，白無極先走了三步，調整自己的位置——他要在時停裡接近玄冥到五步之內，這是一個風險，因為五步的距離，在時停解除之後，玄冥的場域吸力幾乎可以確定會影響到他的精神力。但五步以內，才能讓白金之星的拳打到需要的深度。</p>\n<p>他計算了一下入手的角度。</p>\n<p>玄冥雖然被定格，但他的場域吸力在時停裡仍然微微存在——這是白無極發現的一個細節，玄冥的這個「場」，像是一種持續的物理現象，而不是靠意識主動控制的靈術，所以時停也沒有完全把它消除，只是大幅減弱了。</p>\n<p>在這個減弱的場域裡，白無極感到自己的精神力在五步之內開始有輕微的外流感。</p>\n<p>「五步，臨界值，」他在靜止的世界裡確認，「打完，立刻退出，不能在這個距離停留超過一秒。」</p>\n<p>他走進五步之內。</p>\n<p>白金之星在他身側展開，高大的星空色身影在寂靜的時停世界裡幾乎沒有聲音，但帶著一種凝重的重量感。白無極舉拳，不是倉促的，是那種在八極拳裡「頂心肘」之前的沉肩收氣，把力道從腳底往上傳，走腰，走肩，走臂，最後到拳面的時候是一個整合了全身動能的爆炸性輸出。</p>\n<p>他打的是玄冥的左肋。</p>\n<p>原因很簡單：在玄冥進廣場的時候，他的左側被三個契聖的聯合靈力打過，留下了最輕微的一絲結構損傷，人的肉體在靈力損傷之後的自我修復是有時間的，玄冥的修復能力再強，這一小時以內這個地方依然是相對薄弱的。</p>\n<p>拳，落下。</p>\n<p>連帶著白金之星傾注的精神力，一起落下。</p>\n<p>時間恢復。</p>\n<p>玄冥，動了。</p>\n<p>不是倒地，不是退後，但他的身體往旁邊錯了一步，那個「錯步」，是一個習武多年的人都知道的動作——那是身體在受到強烈內部衝擊時，自動做出的重心調整。</p>\n<p>他扛住了。</p>\n<p>但他不是毫無感覺地扛住，白無極清楚地看到，玄冥在恢復站姿之後，有一個極短的動作——他的右手，摸了一下自己的左肋。</p>\n<p>那個動作只有半秒鐘，然後他把手放下，抬起頭，看向白無極。</p>\n<p>他的臉上，出現了一個之前白無極從未在他身上看到過的表情：訝異。</p>\n<p>不是震驚，不是恐慌，就是那種「某件事和預期不符」引發的輕微訝異。</p>\n<p>「你，」他說，聲音依然是平靜的，但那個平靜裡多了某種東西，「打疼了我。」</p>\n<p>白無極把時停解除之後迅速退回了十二步，他感受了一下自己的精神力，在那個五步範圍裡停留的時間雖然短，但精神力還是有一點點流失，不嚴重，但是實際存在的。</p>\n<p>「是嗎，」白無極說，語氣不帶任何炫耀，「你那麼大的靈力吸收，還能感覺到疼，說明我的東西你吸不走。」</p>\n<p>玄冥往白無極的方向走了一步，但沒有繼續，他在試探，在評估。</p>\n<p>「你的力量，」他說，「不是靈契。」</p>\n<p>「看出來了？」</p>\n<p>「和靈契的結構完全不同，」玄冥說，他的眼神變得比之前專注了，「是更古老的東西，這個大陸在靈契體系之前的——」他頓了頓，「精神力。」</p>\n<p>白無極沒有接話，但他的眼神輕輕動了一下——不是意外，是對這個「精神力」三個字的確認，覺得玄冥認出來這件事，在意料之中。</p>\n<p>「在域外，也有類似的體系，」玄冥說，像是在聊一件很普通的事，「你從哪裡學的？」</p>\n<p>「不重要，」白無極說，「你上不上？站著說話不如打架。」</p>\n<p>玄冥沒有繼續閒聊，他往前走了兩步，那個場域吸力範圍隨著他的移動往白無極方向靠近。</p>\n<p>白無極往後退了兩步，保持距離。</p>\n<p>玄冥看了他這個動作，微微停了一下：「你知道保持距離。說明你清楚，在我的場域裡，你的精神力也會被影響。」</p>\n<p>「對，」白無極承認，「但你吸我精神力的效率，比吸那些靈契者低很多。」</p>\n<p>「那只是因為你的量也少，」玄冥說，「時停消耗精神力，你用一次時停，消耗一部分，我吸走的量和你自然恢復的量可以互相抵消，你以為你有持續戰的能力。」</p>\n<p>白無極沉默了一秒，這個分析……不全對，但也不全錯。</p>\n<p>「但有一件事你搞錯了，」玄冥繼續說，語氣帶著一種很平靜的確定，「你的精神力，比這個大陸所有的靈契都要對我有吸引力，只是量少，讓你以為安全。」</p>\n<p>白無極回想起剛才那五秒鐘，在五步之內感受到的那個輕微外流感——那個感覺比他預想的更強，或許，他剛才流失的精神力比他以為的要多一點。</p>\n<p>不是嚴重的差距，但這個資訊改變了他後面的計算。</p>\n<p>「那就不讓你有機會多吸，」他說。</p>\n<p>時間，再一次停了。</p>\n<p>這一次，他改變了接近方向——上一次從左側進，玄冥的身體反應讓他判斷出玄冥的習慣性重心是偏右的，補左肋的時候他往右偏了，這次，他從右側進，打玄冥的右邊。</p>\n<p>打了右肋，退出，時間恢復。</p>\n<p>玄冥又是往側邊錯了一步，這次他的應激反應比上一次快了一點點——他的身體在上一次之後已經有了預警，不是靠思維，是靠身體記憶，「要有衝擊」這件事已經被他的肌肉記住了一點。</p>\n<p>但他還是沒有立刻反擊。</p>\n<p>因為時停恢復的瞬間，白無極已經退到了十二步外。</p>\n<p>玄冥看著他，眼神裡那個「訝異」已經沉澱下去，變成了某種更深的東西，是評估，是重新定位這個對手的分量。</p>\n<p>「你，」玄冥說，「讓我想認真打了。」</p>\n<p>「謝誇，」白無極說，然後往旁邊移了一步，重新整理腳下的位置，把背對的方向調整成廣場空曠的那一側，「我很少讓人想認真打的。」</p>\n<p>玄冥身上的靈力波動，在這一刻，開始真正地外放了。</p>\n<p>不是剛才那種「把場域維持著順便吸靈力」的被動模式，而是主動的靈力輸出——那個輸出讓廣場上所有人同時感到了一股窒息感，連最遠的人也能感覺到靈力壓力在瞬間提升了不止一個級別。</p>\n<p>周圍的靈契者退了退，赫連峰大喊了一聲讓大家往外撤，給白無極清場。</p>\n<p>廣場的中心，只剩白無極和玄冥，中間十五步的距離，兩個人，兩種截然不同的力量體系，在夜色裡對峙著。</p>\n<p>白無極深吸一口氣，感受著白金之星在意識裡的存在——星光、沉穩、清晰，像是一顆很遠很遠的星，永遠在那裡。</p>\n<p>「再來，」他說，沒有人知道他是在跟玄冥說，還是在跟白金之星說，「下一個五秒。」</p>"}, {"title": "第99章_白無極vs邪修首領下", "content": "<p>第99章　白無極 vs 邪修首領（下）</p>\n<p>打，退，等，打。</p>\n<p>這是白無極確立的戰術：時停五秒，進入、出手、退出，反覆循環，用這個節奏消耗玄冥，同時盡量讓自己的精神力在兩次時停之間有時間恢復。</p>\n<p>理論上，這是在這個局面裡他能想到的最合理的方案。</p>\n<p>實際上，它比他想象的要更難維持。</p>\n<p>第三次時停，玄冥的場域吸力已經比第一次強了兩三成——不是玄冥主動強化，是他在這段時間裡不停吸收廣場周圍溢散的靈力，積累了更多，那個積累讓他整體的靈力總量提升，場域的強度也跟著水漲船高。</p>\n<p>白無極在第三次時停裡，進入五步之內，感受到的精神力外流已經比第一次明顯強了。</p>\n<p>他出手，打了玄冥的後頸，退出。</p>\n<p>時間恢復，玄冥往前踉蹌了一步，比之前兩次明顯，後頸受到衝擊，他的肌肉反應讓他短暫失去了平衡。但就在他踉蹌的瞬間，他的場域往外爆炸性地擴張了一下——是應激反應，是在肉體受衝擊時，靈力本能地往外暴衝，這個暴衝持續的時間只有零點幾秒，但波及到了廣場上所有人。</p>\n<p>白無極也在波及範圍裡。</p>\n<p>他感到精神力被猛地往外抽了一截，不是緩慢的流失，是一個急促的拉扯，比之前所有的外流加起來都重，像是手指被割了一刀，傷口不大，但出血很急。</p>\n<p>「第三次之後的恢復期，比前兩次長，」他站在廣場邊緣，感受著精神力的狀態，在心裡確認，「而且玄冥受傷之後的應激外放，是額外的損耗，不在我計算之內。」</p>\n<p>他需要重新調整。</p>\n<p>---</p>\n<p>黃金體驗，Life，他還沒用。</p>\n<p>不是忘了，是在等一個合適的機會。Life的能力是把無生命的物質變成生物，這些生物能持續存在，可以操控，可以用於包夾和多方位的干擾攻擊。在對付前面那些邪修的時候，這個能力的效果一般——邪修可以吸走這些生物的靈力，但那個過程有時間差，中間的幾秒鐘，被生物直接接觸到的邪修確實會受到干擾。</p>\n<p>但在對付玄冥的時候，如果能在時停的間隙讓Life創造出生物，從多個方向包圍玄冥，在白無極時停接近的時候形成視覺和物理干擾，讓玄冥的注意力無法完全集中在一個方向——</p>\n<p>他嘗試了。</p>\n<p>第四次出手之前，他先讓黃金體驗在廣場的碎石、倒塌的欄杆、折斷的旗桿上施展Life，把這些東西化作各種形態的生物——不是精密的什麼，就是能動的、有重量的、能衝撞的東西，從四個方向往玄冥圍過去。</p>\n<p>效果是有的，剛開始的兩三秒鐘，八個從廢墟裡冒出來的「碎石生物」往玄冥衝，玄冥的注意力被短暫分散，他轉頭看了那些東西，然後——</p>\n<p>他抬手，場域往外爆了一波。</p>\n<p>那八個生物，瞬間停下來了，然後開始萎縮，原本活動的身軀一點一點失去生氣，在十秒鐘之內，全部倒地，化回了碎石和廢木頭的模樣。</p>\n<p>因為玄冥把這些生物的「靈力」給吸走了。</p>\n<p>Life創造的生物，維持形態需要靈力，這個靈力對玄冥來說是可以吸取的——它不是精神力，是白無極用精神力「催動的靈力轉化物」，成形之後，本質還是靈力。</p>\n<p>白無極看著那八個生物枯萎消失，沉默了大約兩秒鐘。</p>\n<p>「Life，在這裡，等於沒有。」</p>\n<p>這個意識到的瞬間，讓他感到一陣說不清楚的東西。不完全是挫敗感，更像是某種他很久沒有經歷過的、真實的「被剋制」的感覺——他的一個能力，在這個對手面前完全沒有效果，就像是用水去灌一條不進水的船，怎麼灌都白灌。</p>\n<p>他只剩白金之星了。</p>\n<p>白金之星，時停，五秒，循環。</p>\n<p>但精神力是消耗品，每次時停之後他都需要恢復，而恢復的速度在玄冥的場域持續吸取下越來越跟不上消耗。他已經打了第三次，精神力剩下大概六成，感覺還好，但第四次打完，就要剩五成以下了。</p>\n<p>白金之星的時停，精神力低於三成的時候，時間長度會縮短——不是五秒，可能只有三秒，甚至兩秒。到那個時候，他能在一次時停裡完成的事情就更少，和玄冥的交換比就開始變得不划算。</p>\n<p>「玄冥的計算是對的，」白無極在心裡承認，「只要他撐得夠久，讓我把精神力耗完，這場仗就結束了。」</p>\n<p>廣場上，玄冥往白無極這邊走了幾步，停下，聲音平靜：「想清楚了嗎？」</p>\n<p>「還沒，」白無極說，「你急什麼？」</p>\n<p>「不急，」玄冥說，「我只是想讓你知道，每過一秒，你的狀態就比上一秒更差。你的精神力在我的場域裡，哪怕我不主動吸，也在持續流失，只是很慢，但它在流失。」</p>\n<p>這是事實，不是恐嚇。</p>\n<p>白無極往前走了一步，然後，第四次時停。</p>\n<p>進入，接近，這次他把打擊位置換到了玄冥的左膝——膝蓋的受傷會影響移動，玄冥如果移動受限，廣場上其他人的壓力就會輕一些。八極拳的「掃腿踢膝」，不是最能傷敵的打法，但是最能破壞下盤穩定性的。</p>\n<p>打在了。</p>\n<p>退出。</p>\n<p>時間恢復，玄冥的左腳往外錯了一步，膝蓋受到衝擊，站姿輕微失穩。他低頭看了一眼自己的膝蓋，然後抬起頭，這次看白無極的眼神帶著某種更認真的什麼。</p>\n<p>「你每次的打擊位置都不一樣，」玄冥說，「肋骨，頸椎，膝蓋，你在找哪裡是最有效的？」</p>\n<p>「各處試試，」白無極說，他感到精神力已經在五成左右了，說話的語氣是一樣的鬆，但他自己知道，他開始真實地感覺到「消耗」是什麼了——不是疲累，而是那種靈力系統在低位運行時的輕微黏滯感，像是手機快沒電的時候反應會慢一點點。</p>\n<p>玄冥出手了，第一次主動出手。</p>\n<p>他沒有走近，但他把場域的吸力方向集中在白無極身上，同時往外輸出了一道混合靈力的衝擊——那道衝擊不是為了打傷他，是為了讓他在躲避的過程中消耗精神力。</p>\n<p>白無極側身，讓過了大部分，但靈力衝擊的邊緣掃到了他的右肩，那個接觸點，精神力被快速吸走了一截。</p>\n<p>他往後退了三步，感覺到右肩的位置有一種說不清楚的虛空感，那裡的精神力密度降低了，讓他的右臂在接下來可能無法發出完整的力道。</p>\n<p>「受傷了，」他確認，「右肩，功能性損傷，打拳時出力會有折損。」</p>\n<p>玄冥看著他，眼神平靜而確定：「你的右臂不好使了。」</p>\n<p>「你的左膝也不好使，」白無極說，「我們換了。」</p>\n<p>「不公平，」玄冥說，「我的損傷可以用靈力修復，你的精神力損傷需要時間。」</p>\n<p>這是真的。白無極沒有反駁。</p>\n<p>他站在廣場中心，感受著自己的狀態：精神力四成出頭，右肩功能性損傷，時停的時間長度在下次使用的時候可能縮短到四秒。Life的能力無效，只剩白金之星。</p>\n<p>這是他在這場戰鬥開始以來第一次清晰地感覺到，他在走向極限。</p>\n<p>不是到了，但在走向。</p>\n<p>玄冥往前走了兩步，這兩步讓白無極把距離往後退了兩步維持，但退後的同時，白無極感覺到了——</p>\n<p>他後退到的位置，靠近了廣場後方，那裡有撤退的靈契者，有蘇家的人，有……</p>\n<p>他不能再往後退了。</p>\n<p>廣場中心，白無極站穩，停止後退。</p>\n<p>他的精神力四成，右肩受損，對面是接近契神的邪修首領。</p>\n<p>他深呼一口氣，白金之星在他意識裡，星光沉穩，一如既往地在那裡。</p>\n<p>「好，」他說，對著玄冥，對著白金之星，也對著他自己，「下一個五秒，全力。」</p>"}, {"title": "第100章_蘇念卿受困", "content": "<p>第100章　蘇念卿受困</p>\n<p>「下一個五秒，全力。」</p>\n<p>白無極說這話，玄冥停下了腳步。</p>\n<p>不是因為怕，是因為他感受到了什麼。那個感受很微妙——他已經吸取了這個大陸上無數靈契者的靈力，見過各種各樣的力量形態，但在這個人準備發動最後一次全力出擊的瞬間，那個精神力的波動讓他感受到一種有別於以往的東西。不是量，是質。</p>\n<p>像是一顆快要燃盡的星，在最後一刻會爆出比平時更刺眼的光。</p>\n<p>玄冥稍微抬起了右手，把場域吸力往前推了一截，搶先拉扯白無極的精神力——他要在時停之前，先把白無極的底子磨薄一些。</p>\n<p>白無極沒有閉眼，沒有蓄力的動作，就是站在那裡，感受著精神力被往外抽，感受著這個消耗，然後——</p>\n<p>廣場的另一側，傳來一聲短促的叫喊。</p>\n<p>不是戰鬥的喊聲，是那種「出了意外」的聲音。</p>\n<p>白無極的注意力沒有偏移，他繼續看著玄冥。</p>\n<p>但是，一個熟悉的聲音，從廣場左邊傳來：</p>\n<p>「放開她！」</p>\n<p>那是霜翎的聲音。</p>\n<p>白無極的身體在這一刻，有一瞬間非常細微的僵住——他沒有立刻轉頭，但他的呼吸停了一下。</p>\n<p>玄冥的嘴角，很輕地，往上扯了一下。</p>\n<p>---</p>\n<p>廣場左側，發生的事情是這樣的：</p>\n<p>玄冥的副將，姓名不詳，在玄冥和白無極對峙開始之後，就一直在廣場邊緣伺機行動。他比廣場上大部分邪修都強，是個靠近契王的存在，在玄冥的指示下，他負責「防止有人干擾」——換句話說，防止蘇念卿。</p>\n<p>霜翎察覺到他的時候稍晚了一步。</p>\n<p>那個副將懂得選時機，他等到霜翎把注意力集中在前線，把尾巴展開輸出冰系覆蓋的時候，那個瞬間，霜翎的靈力都往外走，防護的重心自然地轉移到了前方——後側輕了半分。</p>\n<p>就是那半分。</p>\n<p>那個副將從後側繞進來，他手上有一個邪器，是某種能暫時封鎖靈契聯繫的東西，像一條無形的繩索，往蘇念卿的方向打去——</p>\n<p>不是攻擊，是抓。</p>\n<p>那個邪器的效果是把靈契者和靈契的聯繫暫時切斷，讓靈契者失去靈力輸出的能力，同時把對方固定住。它對普通靈契者效果極佳，對高階的也有一定的干擾效果。</p>\n<p>蘇念卿感覺到了，她反應很快，側身，讓開了正面，但邪器打出的「繩索」是環形的，不是直線，她讓開了正面，但側面被掃到了。</p>\n<p>她的霜翎靈契聯繫，驟然被截斷了一半。</p>\n<p>不是完全切斷，但那一半的感知丟失讓她的靈力輸出瞬間失衡，就在她試圖重新建立靈力迴路的那零點幾秒，那個副將走到她身後，把她的雙臂往後扣住——</p>\n<
