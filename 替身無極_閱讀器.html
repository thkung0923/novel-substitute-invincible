const CHAPTERS = [{"title": "第一章　加班猝死？不是吧", "content": "<p>深夜十一點四十分。</p>\n<p>整棟辦公大樓只剩五樓還亮著燈。</p>\n<p>白無極盯著螢幕上那份修改到第七版的方案文件，感覺自己的靈魂正在以肉眼可見的速度飄離身體。游標在空白處一閃一閃，像在嘲笑他。</p>\n<p>「白哥，你還沒走啊。」</p>\n<p>助理小林探頭進來，已經換好了外套，臉上掛著那種「我要下班了但又不好意思直接說」的複雜表情。</p>\n<p>「你先走。」白無極沒抬頭，「我再改一下。」</p>\n<p>「那……方案明天早上要嗎？」</p>\n<p>「八點。」</p>\n<p>小林縮回頭，腳步聲迅速消失在走廊盡頭。白無極聽著辦公室漸漸安靜下來，只剩空調的嗡嗡聲和自己偶爾敲擊鍵盤的聲音。</p>\n<p>他揉了揉眼睛，端起旁邊已經冷掉的第三杯咖啡一口灌下去，苦得皺臉。</p>\n<p>三十二歲。未婚。租屋。月薪兩萬八。</p>\n<p>人生的巔峰大概就是這樣了。</p>\n<p>白無極對自己的人生其實沒什麼太大怨言——他這人性格向來隨和，把日子過下去就好，沒什麼遠大目標，也不覺得有什麼特別委屈。唯一的愛好是從高中就跟著老師傅學的八極拳，每週末去公園打兩個小時，圖個身體健康。</p>\n<p>老師傅說他骨架子不錯，可惜性子太懶，不然能有點成就。</p>\n<p>白無極每次都笑著應「是是是」，然後下週繼續打兩個小時回家睡覺。</p>\n<p>他打開了文件最後一頁，開始逐字修改措辭。</p>\n<p>大概又過了半個小時，他剛把最後一個段落改完，正要伸懶腰——</p>\n<p>腦袋裡炸了一下。</p>\n<p>不是誇張的說法。那一瞬間真的像是有什麼東西在顱骨內部爆炸開來，一道滾燙的熱流從頭頂灌下去，直衝脊椎，蔓延到四肢末梢。</p>\n<p>白無極的手指突然僵住，腰沒伸完就定在那裡。</p>\n<p>「……？」</p>\n<p>他有點茫然地眨了眨眼。</p>\n<p>這是什麼感覺？</p>\n<p>其實說來也奇怪——他從小腦袋裡就有一顆東西，像一顆很小的球，金色的，懸在他意識最深處。他問過父母，說是胎記，說是心理暗示，說是可能小時候發燒留下的幻覺。他自己也懶得去深究，這東西除了偶爾在他練拳練得特別投入時會微微發熱以外，從來沒鬧過什麼事。</p>\n<p>但現在它在共鳴。</p>\n<p>劇烈地、失控地共鳴。</p>\n<p>那種感覺像是他腦袋裡有一顆鼓，正以瘋狂的頻率被敲擊著，聲音不是從耳朵傳進來的，而是直接從意識內部震盪開來——轟、轟、轟——</p>\n<p>白無極扶著桌子站起來，腿有點軟。</p>\n<p>「不是吧……」</p>\n<p>他看了看自己的雙手，手指微微發抖。螢幕上的文字開始重影，兩個游標，四行字變成八行字，所有東西都開始旋轉。</p>\n<p>眩暈感來得猝不及防，像有人把地板從腳下直接抽走。</p>\n<p>我難道……要猝死了？</p>\n<p>白無極腦海中飄過這個念頭，帶著一種奇異的平靜。</p>\n<p>不是沒聽過，加班過勞，當場倒下，送醫不治，然後上個三天熱搜，大家感嘆幾句就繼續加班。他甚至隱約記得上個月同棟樓的某個公司剛發生過類似的事。</p>\n<p>……等等，我才三十二歲耶。</p>\n<p>等等，今天方案還沒交。</p>\n<p>等等——</p>\n<p>轟。</p>\n<p>最後一聲震盪，他感覺自己的意識像被一隻手攥住，猛地往下一墜。</p>\n<p>白無極的身體倒在了轉椅上，接著從轉椅上滑落，沉沉地砸在地板上。</p>\n<p>螢幕在黑暗中孤獨地閃著藍光。</p>\n<p>那份修改到第七版的方案文件，靜靜開著。</p>\n<p>游標一閃一閃，一閃一閃。</p>\n<p>---</p>\n<p>意識沉入了黑暗。</p>\n<p>但不是死的那種黑暗。</p>\n<p>白無極後來想，那段時間他像是在一個沒有形狀的空間裡漂浮，既沒有身體的感知，也沒有時間的流逝，就只是「存在著」，像被泡在溫水裡一樣。</p>\n<p>偶爾，他能感受到金球的震動。</p>\n<p>如果說之前那顆球是一顆熟睡中的種子，那麼此刻它正在甦醒。而且是那種把一整片土地都掀翻、破土而出的甦醒方式。</p>\n<p>白無極在黑暗裡想：好煩喔，讓我睡一下。</p>\n<p>金球繼續震。</p>\n<p>白無極嘆了口氣（雖然此時他沒有嘴）：行吧行吧，算了。</p>\n<p>震動變得越來越規律，像一個心跳，像一個呼吸，像某種巨大的、古老的東西正在緩緩睜開眼睛——</p>\n<p>然後他的意識被猛地一拉，朝著遠方某個地方飛速墜落。</p>\n<p>---</p>\n<p>下墜感。</p>\n<p>真正的下墜感。</p>\n<p>不是精神上的——是身體的，是肌肉、骨骼、皮膚全部都在感受的那種。</p>\n<p>白無極一口氣喘進來，胸腔猛地擴張，整個人像剛從水裡被撈出來一樣，大口大口地喘氣。</p>\n<p>他睜開眼睛。</p>\n<p>頭頂是陌生的天空。</p>\n<p>不是辦公室的白色天花板，不是日光燈，是真正的天空——是那種他好久沒見過的、清澈到近乎不真實的藍色天空，幾片白雲懶洋洋地掛著，太陽的角度有點奇怪，像是上午八九點鐘。</p>\n<p>風吹過來，帶著草腥味和泥土的氣息。</p>\n<p>遠處有什麼動物在叫，不是他熟悉的任何聲音。</p>\n<p>白無極盯著天空，沉默了大概十秒鐘。</p>\n<p>然後他開口，聲音沙啞，帶著剛睡醒的粗糙感：</p>\n<p>「……不是吧。」</p>\n<p>他慢慢坐起身，打量著四周。</p>\n<p>荒野。</p>\n<p>是真正的荒野，高草漫過膝蓋，遠處是深色的山脈，更遠處隱約有森林，連個人影都看不到。他身上還穿著昨晚加班的那套西裝，皺巴巴的，衣領上還有咖啡漬。腳邊不遠處，地面有一個奇怪的焦黑圓圈，像是剛發生過什麼的痕跡。</p>\n<p>腦袋裡的金球安靜了。</p>\n<p>但白無極可以感覺到它還在，只是……感覺不太一樣了。它不再是那顆懸在意識深處的小金球，而是像是正在孵化的什麼，帶著一種蓄勢待發的張力。</p>\n<p>「穿越？」白無極喃喃說，聲音奇異地平靜，「是穿越吧。」</p>\n<p>他想了想，聳了聳肩。</p>\n<p>好吧。</p>\n<p>方案交不了了，明天的早八會也開不成了。</p>\n<p>但他現在連肚子餓不餓、渴不渴都顧不上去感受，因為腦袋裡那顆金球，正在以更快的速度，劇烈地共鳴著。</p>\n<p>某種龐大的東西正從裂縫裡探出頭來。</p>\n<p>白無極感覺那東西的目光——不，是兩道目光——落在了自己身上。</p>\n<p>他深吸一口氣，閉上眼睛。</p>\n<p>「好，來吧。」</p>\n<p>他說。</p>\n<p>金球炸開了。</p>"}, {"title": "第二章　金球裂了，裡面有兩個人", "content": "<p>炸開不是一個比喻。</p>\n<p>那一瞬間，白無極感覺腦袋裡那顆金球像一顆蛋，從裡面被什麼東西頂裂了，裂縫沿著球面蔓延，然後轟地一下，整個粉碎。</p>\n<p>疼痛是真實的。</p>\n<p>不是刺痛，是那種鈍重的、像整個大腦被人用兩手捧住然後猛力擠壓的感覺——白無極跪在地上，雙手按著太陽穴，牙關死死咬緊，盡量不讓自己發出什麼丟人的聲音。</p>\n<p>額頭上的汗嘩地流下來。</p>\n<p>他的呼吸急促而凌亂，意識開始變得不穩定，像是一塊浮在水面上的木板，隨時要被拍下去。</p>\n<p>然後他感覺到了兩道東西。</p>\n<p>不是疼痛。不是光芒，不是什麼玄幻的能量震盪——是「存在感」。</p>\n<p>兩道截然不同的存在感，從金球碎裂的廢墟裡浮了出來，像兩朵煙升起，各自佔據了他意識空間的一角，然後靜靜地停在那裡，看著他。</p>\n<p>白無極喘著氣，緩緩把頭抬起來。</p>\n<p>沒有人。</p>\n<p>眼前的荒野還是那片荒野，高草、遠山、奇怪的動物叫聲。陽光曬在身上，西裝的料子有點熱。什麼都沒有。</p>\n<p>但意識裡那兩道存在感真實得像是有人站在他背後，一左一右，呼吸可聞。</p>\n<p>白無極緩緩說：「……你們好。」</p>\n<p>沒有聲音回應。</p>\n<p>但他清楚地感受到——右邊那道存在感向他「看」了一眼。是沉默的、評估的眼神，像一個老兵在看新兵。剛猛、壓迫、但沒有惡意，只是那種純粹「我在打量你」的目光。</p>\n<p>左邊那道存在感則像是——光？生機？白無極想不出更好的形容詞，它的感覺是蓬勃的、充滿活力的，但同樣沒有語言，只是靜靜地向他傳遞著一種「我在這裡」的訊息。</p>\n<p>白無極深吸一口氣，讓腦袋慢慢冷靜下來。</p>\n<p>「你們是……我腦子裡那顆金球孵出來的東西？」他慢慢說，語氣謹慎，像在跟一個剛認識的陌生人說話，「能告訴我你們是什麼嗎？」</p>\n<p>沉默。</p>\n<p>然後，就在這一刻——</p>\n<p>右邊那道存在感，動了。</p>\n<p>白無極來不及反應，就感覺自己的視野突然多了一層。不是蒙在眼睛上的那種，是疊加的——像一塊透明的玻璃從眼前出現，玻璃後面站著什麼。</p>\n<p>他眨了眨眼。</p>\n<p>荒野裡，在他右前方大約三步距離，空氣漸漸凝結出一道輪廓。</p>\n<p>高大。</p>\n<p>極高大。</p>\n<p>比他高出整整一個頭的身形，深色的輪廓，沉默地站在那裡，帶著一種讓人說不出話的壓迫感。五官深邃而冷峻，雙手自然垂在兩側，全身沒有多餘的動作，只是站在那裡，本身就是一種存在。</p>\n<p>眼睛的顏色很深，深得像兩口井，那口井的底部沒有光，卻不讓人覺得陰暗——只是讓人覺得，非常非常深邃。</p>\n<p>白無極愣了三秒，張嘴說：</p>\n<p>「……白金之星？」</p>\n<p>他不知道這個名字從哪裡來的。也許是從金球碎裂時留下的某種印記裡，也許是某種超越語言的直覺。但他一說出口就覺得對了，就是這個名字，沒有第二個可能。</p>\n<p>那道高大的輪廓向他點了點頭。</p>\n<p>就那一個動作，沉默、精準、幅度極小，卻有一種不需要言語的確認感。</p>\n<p>白無極的心跳莫名地穩了一下。</p>\n<p>然後他把注意力轉向左邊。</p>\n<p>左邊那道存在感反應更快，幾乎是在他目光轉過去的同時，另一道輪廓就凝結出現了。</p>\n<p>也是人形，但比白金之星稍小一些，姿態更隨意，頭頂的頭髮紋理和白金之星有點像，同樣高大，但給人的感覺截然不同——如果說白金之星是一塊鐵，那這道輪廓就像一株正在生長的樹，充滿了那種蓬勃的、擋不住的生命力。</p>\n<p>白無極盯著他看了片刻，說：</p>\n<p>「黃金體驗。」</p>\n<p>又是直覺。又是對的。</p>\n<p>這道輪廓沒有點頭，但白無極感覺到了一種輕快的回應，像是在說「對對對就是我」。</p>\n<p>白無極看著站在荒野裡、只有他能看見的兩道輪廓，沉默了一會兒。</p>\n<p>他的思維很快。</p>\n<p>穿越了，這很明顯。</p>\n<p>腦袋裡多年的金球孵化了，這也很明顯。</p>\n<p>金球孵出了兩個……替身？幫手？存在？他一時找不到合適的詞，但那個從記憶深處浮上來的詞感覺是最接近的——替身。他的替身。只有他能看見，只為他存在的兩個存在。</p>\n<p>白無極摸了摸下巴，環顧了一下荒野，確認附近暫時沒有威脅，然後盤腿坐下來，開始用意識試圖和兩道替身建立更清晰的溝通。</p>\n<p>語言不通——不是說完全沒有，而是替身不用語言。他們傳遞的是感受、是意象、是某種直接塞進腦袋裡的「知道」。白無極得花一點時間適應這種溝通方式。</p>\n<p>慢慢地，他開始拼湊出一些訊息。</p>\n<p>白金之星：近身格鬥，精準，速度。他從這道替身身上感受到的是一種極度壓縮的爆發力，像一根彈簧被壓到極限，隨時可以釋放。精密到毫米的移動控制，速度快到難以置信，雙手是他最強的武器。但現在，有些能力還沒有完全甦醒——時間似乎是其中之一，那個方向一片空白，像一個尚未解鎖的房間。</p>\n<p>黃金體驗：創造，生命。白無極把手伸向旁邊一塊石頭，讓這道替身試著碰觸——然後他看見石頭表面緩緩長出了青草，幾根，然後更多，然後石頭的邊緣開始被植物包裹，綠色在陽光下蓬勃生長。</p>\n<p>「……喔。」白無極說。</p>\n<p>無機物變成生命。</p>\n<p>他想起老師傅曾說過一句話：練武之人，先練的是身，後練的是心，最後練的是氣。</p>\n<p>現在他腦袋裡有兩口氣了。</p>\n<p>白無極站起來，拍了拍身上的土，活動了一下手腕和脖子，發出幾聲清脆的響聲。</p>\n<p>然後他意識到了另一件事：身體很不一樣。</p>\n<p>不是痛，不是麻，而是那種從骨子裡透出來的充盈感。他在現代加班熬夜已經熬出了職業病，頸椎、腰椎長期處於亞健康狀態，早上起床腰都是僵的。但現在——他試著跳了一下，腳踝的緩衝比以前強太多了，落地幾乎沒有什麼衝擊感。他握了握拳，一股紮實的力量從拳面傳回來。</p>\n<p>金球孵化之前就在強化他？還是孵化完成後留下了什麼？</p>\n<p>不管是哪種，效果都在這裡。</p>\n<p>白無極抬起頭，看了看天色。太陽還在上方，日頭正好，看起來還有大半天的時間。他身上沒有食物沒有水，周圍是荒野，遠處的山脈和森林是唯一可能找到資源的方向。</p>\n<p>他從小在城市長大，沒有野外生存的實際經驗，但——</p>\n<p>他向右看了一眼。</p>\n<p>白金之星靜靜地站在那裡，兩道深邃的眼睛看著他，沉默，等待。</p>\n<p>白無極突然想笑。</p>\n<p>「有你在旁邊，」他說，「野外生存好像也沒那麼可怕了。」</p>\n<p>白金之星沒有表情變化。</p>\n<p>但他感覺到了替身傳來的那種沉穩的意志：我在這裡。</p>\n<p>白無極抻了個懶腰，調整了一下西裝的領子——這玩意穿著跑路是真的不方便，但現在也沒別的選擇——然後把目光投向遠方的森林。</p>\n<p>「走吧。」</p>\n<p>他踩著高草向前走，白金之星和黃金體驗的輪廓隨著他的步伐，靜靜地跟在兩側。</p>\n<p>荒野上的陽光灑下來，打在那個穿著皺巴巴西裝、腳踩皮鞋的現代人身上。</p>\n<p>開始了。</p>\n<p>新世界，第一天。</p>\n<p>而腦袋裡的那個位置，曾經放著金球的地方，現在空著——但空著的感覺不是缺失，而是像一個房間，兩扇窗剛剛被推開，風進來了，光進來了，帶著某種說不清的、廣闊的可能性。</p>\n<p>白無極咧開嘴，笑了一下。</p>\n<p>「加班猝死穿越，挺有創意的。」他說，「不知道那個方案有沒有人交。」</p>\n<p>風把這句話吹散在荒野裡，沒有人回應。</p>\n<p>他繼續走。</p>"}, {"title": "第三章　荒野生存第一天", "content": "<p>走進森林的邊緣地帶，白無極才真正確認了一件事——</p>\n<p>這個世界的動物，比地球上的普遍大一號。</p>\n<p>不是誇張。一隻從草叢裡跳出來的兔子，體型大概是他家鄉的家兔的三倍，毛色泛著奇怪的藍灰色，眼睛是橙紅色的。牠盯著白無極看了兩秒，然後竄走了。</p>\n<p>白無極目送牠消失，想：跑哪去了，我正餓著。</p>\n<p>但先不急著找食物。</p>\n<p>他在森林邊緣找了一片空地，草地平整，四周視野開闊，沒有什麼遮蔽物可以讓東西埋伏。他脫掉西裝外套搭在一棵樹枝上，鬆開領帶塞進口袋，捲起袖管，站在原地活動了一下關節。</p>\n<p>「試試看。」他說，對著自己也對著兩個替身。</p>\n<p>他先從最基礎的開始——馬步。</p>\n<p>右腳向右踏出半步，左腳跟上，兩腳與肩同寬再稍寬一點，膝蓋微曲，重心下沉，整個人紮進地面。這是八極拳最基礎的站樁，他從高中開始練，十幾年下來紮馬步就像呼吸一樣自然。</p>\n<p>但現在不一樣了。</p>\n<p>重心沉下去的那一刻，他清楚地感覺到腳底與地面之間的聯繫，不是比喻——是真實的那種「根」的感覺，像腳心有什麼東西抓住了地。</p>\n<p>他的老師傅說過，練八極拳最重要的是「接地」，步子要沉，力要從地面傳上來，不是靠肌肉去打，是靠整個身體的重量去傳遞。白無極練了十幾年，懂這個道理，也有一定的基礎，但以前最多就是感覺腳踩得穩。</p>\n<p>現在那個「穩」被放大了不知多少倍。</p>\n<p>他試著動了動。</p>\n<p>先是基本功：挫步衝拳、弓步頂肘。</p>\n<p>衝拳打出去，拳風帶著一道清晰的破空聲——以前練拳也有破空聲，但那是在練習場地打靶打出來的，在空氣中揮拳頂多有一點輕微的風聲。現在這一拳打出去，白無極自己都愣了一下：那道破空聲實實在在的，像什麼東西被拳風切開了。</p>\n<p>他把手收回來，看了看自己的拳頭，再打了一拳。</p>\n<p>一樣的聲音。</p>\n<p>「這身體到底被強化了多少？」他喃喃說。</p>\n<p>接著是頂肘。</p>\n<p>八極拳的肘法很有特色，不像其他拳法那樣以拳為主，八極拳的近戰體系裡，肘膝頭肩都是武器，其中頂肘是核心技法之一。弓步，轉腰，肘尖朝前推出——不是揮，是頂，像一根釘子往前釘——</p>\n<p>他頂在了一棵碗口粗的樹幹上。</p>\n<p>清脆的裂聲。</p>\n<p>白無極的肘尖沒有任何痛感，但樹幹上出現了一道清晰的裂縫，木屑飛濺出去，幾根細枝因為震動而抖落。</p>\n<p>他盯著那道裂縫看了三秒。</p>\n<p>「……好，確認了，我變強了不少。」</p>\n<p>他退後兩步，讓自己平靜一下。這種強化不是無止境的，他知道這個身體的上限還需要更多測試，但光是這個基礎，放在一般人裡就已經是怪物級別了。</p>\n<p>他繼續練，把八極拳的基本套路走了一遍。</p>\n<p>六大開——頂、抱、單、提、跨、纏——八種基礎手法走完，他已經出了一身透汗，但感覺體力消耗不大，呼吸還算穩。以前練完整套功法，最後幾式已經有點力竭，現在走完全程，感覺就像熱了個身。</p>\n<p>他擦了擦汗，喝了幾口從溪邊找到的水——黃金體驗確認過，這溪水沒有問題——坐下來休息，腦子裡在整理這兩個小時得到的訊息。</p>\n<p>就在這時，森林裡傳來了動靜。</p>\n<p>不是小動靜。</p>\n<p>是那種讓地面都微微震動的腳步聲，樹枝折斷的聲音，還有某種介於嘶吼和喘氣之間的聲響，從更深的林子裡傳出來，越來越近。</p>\n<p>白無極站起來，退後了幾步，把空地讓出一些。</p>\n<p>然後他看見了。</p>\n<p>從林子邊緣撞出來的，是一頭牛。</p>\n<p>不，說牛不太準確——體型是牛的一倍半，四條腿粗得像柱子，角上有兩根向前彎曲的長角，灰褐色的皮毛，眼睛是血紅色的，鼻孔噴著白氣。牠衝出林子，踩翻了幾棵直徑兩三寸的小樹，然後看見了白無極，停了下來。</p>\n<p>兩個生命體對視。</p>\n<p>牠低下頭，角尖對準了他。</p>\n<p>「喔，」白無極說，「魔獸是吧。」</p>\n<p>他不知道這算哪個等級，但牠的體型和那股壓迫感讓他本能地做出評估：這玩意如果在現代，那就是一頭成年大水牛加上三分力量，衝過來如果不閃，骨頭得斷幾根。</p>\n<p>問題是白無極現在不想閃。</p>\n<p>這是荒野生存第一天，他需要知道自己的上限在哪裡。</p>\n<p>牛形魔獸衝了過來。</p>\n<p>四條腿踩著地面，震動清晰可感，速度比他預期快——大型動物衝刺起來往往比外表看起來快得多，白無極以前在影片裡看過，但現在是真實的蹄子踩著真實的地向他衝來，第一反應還是讓他往後退了半步。</p>\n<p>但只有半步。</p>\n<p>然後他踩穩了。</p>\n<p>八極拳裡有一個核心理念：以近打遠，以靜待動。</p>\n<p>別的拳法喜歡在外圍打圈子，消耗對手，八極拳不。八極拳要的就是靠近，靠到最近，打出的每一拳都是把整個身體的重量砸進去。</p>\n<p>遠距離打牛的角——這是主流選擇，也是最安全的。</p>\n<p>白無極沒選這個。</p>\n<p>他往前衝了。</p>\n<p>不是迎著角，是往側面衝，在那頭牛衝鋒路線的斜前方，錯開了兩三步的距離，然後——</p>\n<p>「哈！」</p>\n<p>崩拳。</p>\n<p>八極拳的崩拳不是簡單的直拳。它是在步法配合下，以腰帶臂，一拳「崩」出去的力——那個「崩」字說的是整條勁道，從腳底蹬地開始，傳過腿、腰、背，最後在拳面上爆發，像一條蟒蛇突然收緊。</p>\n<p>他的拳打在那頭牛的頸部側面。</p>\n<p>轟。</p>\n<p>白無極自己都沒想到那個轟聲那麼大——牛的脖子被打歪了，整頭牛的衝勢被硬生生地偏了方向，蹄子在地上犁出幾道深痕，踉蹌了兩步。</p>\n<p>牠顯然被這一拳打懵了，搖了搖頭，轉過來繼續對準他。</p>\n<p>白無極活動了一下打拳的手腕，感覺不痛，反而有點滿足。</p>\n<p>「再來一次。」</p>\n<p>牛又衝了。</p>\n<p>這次白無極沒有橫移，他等牠衝到三步之內，一個墊步上前——這是鐵山靠的預備動作，左腳向前，右腳跟進，身體轉側，把右肩和整個上半身的重量凝聚起來——</p>\n<p>牛角從他左側划過，差了半個手臂的距離。</p>\n<p>他的右肩撞進了牛的頸肩交接處。</p>\n<p>鐵山靠。</p>\n<p>這才是八極拳最著名的招式。靠不是一個優雅的技法，它粗暴、直接、不講究，就是用整個身體當武器，把全身的重量集中在肩部，以腰為軸，旋轉撞入。</p>\n<p>白無極體重大概七十幾公斤，但他感覺這一下撞出去的力，絕對不只七十幾公斤。</p>\n<p>那頭將近一噸重的牛形魔獸，被他這一肩撞得整個身體騰起來——前蹄離地，後蹄拖曳，硬生生地向旁邊飛出去七八步，轟地一聲砸在地上，砸出一個不小的坑。</p>\n<p>它試著站起來，兩次，沒成功，然後低嗚了一聲，把頭埋進草地裡，不動了。</p>\n<p>沒死。只是徹底被打懵，暈在那裡。</p>\n<p>白無極看著那個坑，再看看自己的右肩，右肩什麼感覺都沒有，就是一點衝擊的餘震，連淤血都沒有。</p>\n<p>他吸了口氣，輕輕呼出來。</p>\n<p>「行，」他說，「這體型算是能打了。」</p>\n<p>白金之星站在他左後方，沉默地看著他，那道深邃的目光裡有某種細微的東西——白無極讀了一下，大概是……認可？</p>\n<p>或者他想多了。</p>\n<p>但不管怎樣，這一個上午的測試讓他有了清楚的數據：這具身體打普通的大型動物，徒手問題不大。武器會讓他更強，但他目前沒有武器，所以這具手和拳就是他的武器。</p>\n<p>他拍了拍手，撿起掛在樹枝上的西裝外套，重新穿好。</p>\n<p>「行了，接下來找人。」他說，踩著高草向前走，「荒野待著餓死不是穿越主角該有的結局。」</p>\n<p>林子裡，一隻泛著藍灰色毛的大兔子從草叢邊探出腦袋，打量著那個打倒牛形魔獸卻又穿著奇怪的人影遠去。</p>\n<p>然後縮回了草叢。</p>"}, {"title": "第四章　這個世界不太對", "content": "<p>白無極在荒野裡走了大概兩個小時，才終於在一條土路上看到了車輪的輾痕。</p>\n<p>輾痕不新鮮，但也不超過一天，看方向是從東邊來、往西邊去。他沿著輾痕走，走了差不多半個時辰——用時間感大概估了一下，反正就是一段不短的路——然後在一個緩坡後面聽見了嘈雜聲。</p>\n<p>嘈雜聲裡夾著人的喊叫聲。</p>\n<p>以及某種他不熟悉的嘶鳴和衝撞聲。</p>\n<p>白無極三步並兩步翻過緩坡，看見了下面的狀況。</p>\n<p>一支商隊。</p>\n<p>大概七八輛馬車，馬不太一樣，腿比普通馬長一截，脖子是淡藍色的，很奇特。馬車排成一列停在路上，護衛們拔刀的拔刀、舉盾的舉盾，圍成一圈，把人員護在中間。他們面對的，是三頭從矮樹叢裡衝出來的魔獸。</p>\n<p>那三頭魔獸有點像狼，但比狼大三倍，毛色是偏紅的棕色，速度很快，繞著防線不停移動，偶爾猛地衝進去，試圖找到破口。</p>\n<p>商隊的護衛戰力不弱，但那幾個手持長刀的人臉上顯然帶著壓力，刀法也有點亂了。靠後一點有個穿著皮甲的男人，手掌發光，好像在釋放什麼——白無極遠遠看著，光從那人手上流出來，落在一個受傷的護衛身上，傷口以肉眼可見的速度閉合了一點。</p>\n<p>治療？</p>\n<p>這個世界有魔法？</p>\n<p>白無極站在坡頂，快速評估。</p>\n<p>三頭狼形魔獸，速度不慢，但比他今早對付的那頭牛形魔獸力量小一些。商隊護衛大概十幾人，有人受傷了，防線勉強能撐，但撐不了太久——其中一頭魔獸已經找到了空檔，正在準備衝破。</p>\n<p>他在心裡算了一下。</p>\n<p>沒有猶豫太久，就三秒鐘，然後他往坡下走。</p>\n<p>不是衝，是走。腳步穩，速度不慢，七八秒後踩上了平地，進入了那頭正要衝鋒的魔獸的視線範圍。</p>\n<p>那頭紅棕狼停了一下，轉頭看向他。</p>\n<p>白無極對牠揮了揮手：「嗯，我在這裡。」</p>\n<p>狼轉向了。</p>\n<p>牠衝向白無極，速度很快，低姿態貼地疾衝，直接衝著他的腹部撲來。</p>\n<p>白無極等牠衝到三步之內，右腳向前踩了半步，身子微微向右側轉，讓開了那張血盆大口，左手順勢按住了牠衝過來的頭頂，借著牠的衝勢往下一壓，同時右膝頂了上去——</p>\n<p>膝撞魔獸頸部。</p>\n<p>那種沉悶的「轟」聲再次出現。</p>\n<p>狼的頭被壓下去，頸部被膝蓋正面吃到了，整頭魔獸在地上翻滾了兩圈，抬起頭，晃了晃腦袋，喉嚨裡發出一聲嗚鳴，這次沒有再衝。</p>\n<p>白無極松了口氣，轉向剩下兩頭。</p>\n<p>兩頭魔獸同時轉向他了。</p>\n<p>「倒也直接。」他說。</p>\n<p>左邊那頭先動，他往右錯步，右手崩拳打在它的太陽穴側邊——這個位置說是太陽穴當然不確定對不對，但換成人類站在同樣位置，這一拳足夠把人打懵。那頭狼的腦袋被打歪，踉蹌了兩步，但沒倒。</p>\n<p>右邊那頭同時撲了過來。</p>\n<p>白無極沒辦法完全閃，那頭狼的前爪從他右臂划過，留下三道深紅色的抓痕，把他的西裝袖子撕破了一大塊。</p>\n<p>「哎，這西裝——」他看了一眼，歎了口氣，「算了不重要。」</p>\n<p>他轉向那頭撲空的魔獸，追上兩步，一個鐵山靠，肩膀砸進了牠的後腰。</p>\n<p>這是不符合「正常」打法的位置，人的肩膀撞大型魔獸的後腰，一般情況下撞的人先倒。但白無極這一靠出去，那頭紅棕狼被砸飛了出去，在地上滾了三圈，嗚嗚叫著，半天沒起來。</p>\n<p>他轉回去，看著那頭被打懵的第一頭，以及那頭第一次被他膝撞的魔獸——兩頭都在看著他，目光裡有一種他能讀懂的東西。</p>\n<p>不是憤怒，是恐懼。</p>\n<p>「走吧，」白無極說，對著兩頭魔獸，「我不追你們。」</p>\n<p>兩頭對視，低嗚了幾聲，然後帶著滾在地上那頭，夾著尾巴退進了矮樹叢裡，消失了。</p>\n<p>白無極站在原地，拍了拍肩膀上蹭到的泥，轉身看向那支商隊。</p>\n<p>商隊十幾個人，全部靜靜地看著他。</p>\n<p>那種安靜很有趣——不是那種看到好漢的欽佩沉默，是那種腦袋裡的程序卡住、一時不知道該如何反應的沉默。</p>\n<p>白無極活動了一下被抓傷的右臂——抓痕有點疼，但不深——然後對那些人點了點頭：「你們還好嗎？有人受傷了嗎？」</p>\n<p>好一會兒，商隊裡那個手掌發過光的皮甲男人走了出來。</p>\n<p>他大概四十來歲，臉方正，有幾分沉穩，看向白無極的眼神很複雜：「這位……兄台，你剛才是用什麼靈契？」</p>\n<p>白無極：「靈契？」</p>\n<p>「就是……」那男人遲疑了一下，「你打那幾頭血牙狼的方式，不像是一般的體術或刀術，但我也沒感受到任何靈氣波動……你的靈契是什麼屬性？」</p>\n<p>白無極沉默了兩秒。</p>\n<p>「體契。」他說，「我是體契者。」</p>\n<p>這個詞是他臨時腦補的，從剛才那人的問法裡拼湊出來的邏輯——靈氣這個詞他懂，靈契他不懂，但從語境推斷，靈契大概是這個世界的力量體系，體契就是靠肉身打鬥的那種，也許存在，也許不存在，但先說了再說。</p>\n<p>那男人的表情變了一下，變成了那種「哦，原來如此」的了然：「體契者，難怪……我很少見到體契者，兄台的實力很不一般啊。」</p>\n<p>他回頭看了看商隊，然後向白無極拱了拱手：「在下趙遠山，是這支商隊的護衛統領，剛才多虧兄台出手，才保住了商隊的安全，請問兄台怎麼稱呼？」</p>\n<p>「白無極。」白無極說。</p>\n<p>「白兄弟，」趙遠山說，「你現在要去哪裡？」</p>\n<p>「蒼雲城。」白無極說出這個名字的時候自己也有點詫異——這個名字是從哪裡來的？他之前一個地名都不知道，但這個詞從嘴裡說出去，感覺是對的，就是這裡最近的城市。</p>\n<p>也許是金球留下的殘影？異世界的基礎常識？</p>\n<p>趙遠山的表情更輕鬆了：「巧了，我們也是去蒼雲城的，還有大半天的路程。白兄弟要不要同行？」</p>\n<p>白無極看了一眼那些馬車，想了想：「沒問題。」</p>\n<p>商隊重新上路，白無極坐在最後一輛馬車的尾板上，和趙遠山並肩，在顛簸的車上開始了這個世界的第一堂課。</p>\n<p>靈契，就是與天地之間的某種力量立約，借助這種力量進行戰鬥。靈契者分為不同的等級：契徒、契士、契師、契將、契王，往上還有更高的境界，趙遠山沒提，白無極也沒問。魔獸同樣有靈契的力量，只是方式不同，是天生的。</p>\n<p>「最關鍵的，」趙遠山說，語氣變得鄭重，「靈契是有代價的。這是天衍大陸最基本的常識，力量必有代價，沒有例外。低階靈契消耗體力和精神，高階靈契……」他停頓了一下，「消耗更根本的東西。壽命、記憶，甚至情感。」</p>\n<p>白無極把這句話在腦子裡轉了一圈。</p>\n<p>代價。</p>\n<p>他抬起手，看了看自己的拳頭。</p>\n<p>他用來戰鬥的東西——替身，以及他自己的身體——都沒有「靈契」的形式，也沒有可見的代價。</p>\n<p>「那體契者呢？」他問，「體契者也有代價嗎？」</p>\n<p>趙遠山想了想：「體契者也是靈契的一種，只是借的是自身的生命力……通常也有代價，只是體現在對身體的損耗上。白兄弟，你打那幾頭血牙狼，感覺到有損耗嗎？」</p>\n<p>白無極：「沒有。」</p>\n<p>趙遠山沉默了一下，看向他的目光帶著某種審視：「……沒有損耗，打下來的。」</p>\n<p>「對啊，」白無極無所謂地說，「我挺能打的。」</p>\n<p>趙遠山欲言又止，最後只是搖了搖頭，沒有繼續問。</p>\n<p>白無極沒在意，把目光轉向車外的荒野，心裡默默記錄著這些訊息，把它們一條條整理進去。</p>\n<p>力量必有代價。</p>\n<p>所有人都這樣認為，這是天衍大陸的基本規律。</p>\n<p>而他的替身，他的拳頭，沒有代價。</p>\n<p>這個世界的人如果知道了這件事，大概不會覺得這是一件好事——在一個「力量必有代價」的世界裡，存在一種無代價的力量，那意味著什麼，白無極不清楚，但他有一種直覺：最好先別到處說。</p>\n<p>他把右手放在膝蓋上，五指微微收攏成拳，再鬆開。</p>\n<p>馬車轆轆向前，蒼雲城在遠方等待。</p>"}, {"title": "第五章　蒼雲城", "content": "<p>蒼雲城的城牆是灰色的，高大得有點誇張。</p>\n<p>白無極站在城門口，仰頭看著那道足有十幾米高的城牆，以及城牆頂端巡邏的守衛，再看看城門兩側的石柱，石柱上刻著複雜的紋路，紋路裡有隱約流動的光。</p>\n<p>「靈契陣法，」趙遠山在他旁邊說，「城牆的防禦陣法，由城裡的靈契師維持，能大幅削弱魔獸的力量。蒼雲城是這一片最大的城市，城牆的陣法是整個東境最完善的之一。」</p>\n<p>白無極點點頭，表示聽懂了。</p>\n<p>心裡：哦，城牆有BUFF。</p>\n<p>入城的流程還算順暢，趙遠山的商隊有通行文書，驗了一遍就放行。白無極夾在商隊裡，守衛看了他一眼，看了看他那套皺巴巴的奇怪衣服，看了看他手臂上的抓痕，問了一句：「外來的？」</p>\n<p>「對，外來的，」白無極說，「從很遠的地方來。」</p>\n<p>守衛沒再問，在一份文書上寫了幾個字，遞給他一個小牌子：「外來人士七天短期令牌，七天後需要去城管所辦正式憑證，或者離城。」</p>\n<p>白無極接了牌子，低頭看了一眼——上面幾個字，他認識，這很奇怪，他沒學過這個世界的文字，但那些字符在他眼裡就是能看懂的，就像中文一樣自然。</p>\n<p>大概又是金球留下的禮物之一。</p>\n<p>進了城門，白無極的第一個念頭是：</p>\n<p>這個城市比他預想的複雜。</p>\n<p>不是什麼土城，雖然建築物的風格和他熟悉的完全不同，但規模真的不小——寬闊的主幹道，兩側各種店鋪，人流不稀，叫賣聲此起彼伏。最有趣的是，這裡幾乎每隔一段就能看到某種發光的東西，有些是建築物本身，有些是行人身上佩戴的飾物，有些是貨攤上擺著的奇怪物件。</p>\n<p>白無極慢慢走，左看右看。</p>\n<p>他路過一個廣場，廣場上有人在比試靈契。</p>\n<p>兩個青年，大概十八九歲，一個身上起了土色的護盾——「土屬性？」白無極想——另一個手持一柄短刀，刀身亮著藍光。持刀的青年衝上去一刀砍下，對方的護盾硬生生吃了一下，只是有點裂紋，雙方拼了十幾招，圍觀的人在叫好。</p>\n<p>「消耗體力，」白無極聽見旁邊有人解說，「這兩個都是契士，護盾那個靈契代價是每次啟動消耗三十息的體力，短刀那個代價是用完一次要三天後才能再次啟動。」</p>\n<p>「三天？只能用一次？」白無極說。</p>\n<p>那人看了他一眼：「外地來的？這是常識，靈契高階，代價越大，啟動後有冷卻，這很正常的。你看那個護盾，他是低階靈契，代價小，但威力也有限，剛才那刀要是再強一點就破了。」</p>\n<p>白無極嗯了一聲，繼續看。</p>\n<p>他在廣場邊站了一刻鐘，大概摸清了這個世界的靈契戰鬥方式——大部分是屬性附加或者防禦增強，戰鬥的形式很像他熟悉的武俠世界，但代價體系讓整個戰鬥變得更像是資源管理：什麼時候用、用多少、代價算不算划算。</p>\n<p>這個思維邏輯他熟，在現代做專案的時候每天都在算投入產出比。</p>\n<p>只不過他自己的「投入」是零。</p>\n<p>商隊在城東的一個旅館卸了貨，趙遠山帶著商隊人員去休整。他把白無極拉到一邊，塞給他一個錢袋：「這點路費，白兄弟先用著，蒼雲城不大不小，你要找落腳處，城南的客棧比較實惠，要找事做可以去冒險者公會。」</p>\n<p>白無極接了，沒有矯情推辭：「謝了。」</p>\n<p>趙遠山搖搖頭：「是我們該謝，那幾頭血牙狼要是沒白兄弟，商隊今天少說折損三五人。」他停頓了一下，看著白無極的眼睛，認真道，「蒼雲城不是什麼善地，白兄弟初來，有些事要小心。」</p>\n<p>「比如？」</p>\n<p>「等級。」趙遠山說，「這個城市裡，靈契等級就是一切，連走路都有人讓不讓道的說法。你是體契者，但體契者被很多人看不起，因為靈契才是主流，體術是輔助。白兄弟的實力我見過了，但實力不等於地位，這個道理……你懂吧？」</p>\n<p>白無極笑了笑：「懂，我從哪個世界來的，這種邏輯我再熟悉不過了。」</p>\n<p>趙遠山不太明白「哪個世界」是什麼意思，但看白無極表情輕鬆，也沒有再多說什麼。</p>\n<p>兩人拱手道別，白無極帶著那個錢袋和一身皺西裝，開始了他在蒼雲城的第一次街頭漫步。</p>\n<p>第一件事是解決穿著問題。</p>\n<p>他在一家布料店找到了一套看起來最不起眼的普通服裝——深灰色的上衣，寬鬆的長褲，腰帶紮緊，功能性遠大於美觀，但至少不會像現在這樣走在路上被人指指點點。他在店後面的雜物間換好，把皺巴巴的西裝折好塞在一個布袋裡——這玩意是他在現代世界的最後一件遺物，雖然破了一個袖子，他也沒扔。</p>\n<p>換完衣服出來，看鏡子——店裡有一面銅鏡，有點模糊——白無極覺得自己至少從外觀上融入了這個世界七八成。</p>\n<p>然後他繼續逛街。</p>\n<p>蒼雲城的街道很熱鬧，靈契者比他想象的更多，隨時能在街上看到手腕或脖子上亮著靈契紋路的人，不同顏色代表不同屬性，藍是水冰，紅是火，金是土，白是風，還有一些他看不懂的顏色。等級高的人身上的紋路更複雜、更明亮，走在路上帶著一種理所當然的氣場，其他人會自然地讓開路。</p>\n<p>等級低的，或者沒有靈契的普通人，走路靠邊，說話小聲，在高等級靈契者路過時會無意識地把頭低下去。</p>\n<p>白無極看著這一切，心裡那個熟悉的煩躁感慢慢升起來。</p>\n<p>他從小就不喜歡這種東西——那種把人分三六九等、然後讓低等的人習慣性地蜷縮起來的邏輯。他在現代是打工人，也低過頭，但他心裡清楚，那是形勢，不是天意。</p>\n<p>在這個世界，大家把這種邏輯叫做「靈契秩序」，好像這樣就自然而然、理所應當了。</p>\n<p>白無極站在一個路口，看著一個挑著擔子的老人被一個腰上掛著靈契紋路牌的年輕人擠到路邊，擔子差點掉了，年輕人連頭都沒回。</p>\n<p>他看了兩秒。</p>\n<p>沒動。</p>\n<p>這個世界不是他的，這個世界的規則也不是他定的。今天剛來，貿然出頭只會給自己惹麻煩，他懂這個道理。</p>\n<p>但腳步沒動，手卻伸出去了——老人快站不穩的時候，他的手從旁邊探過來，把那根扁擔扶住了。</p>\n<p>「穩了。」他對老人說。</p>\n<p>老人驚訝地看了他一眼，然後低聲道謝，快步離開了。</p>\n<p>白無極收回手，繼續走。</p>\n<p>白金之星沉默地跟在他身邊。</p>\n<p>傍晚，他找到了城南的一家客棧，訂了個最便宜的單人房，房間不大但床是真實的床，比荒野的地面強多了。他躺下去，盯著天花板，腦子裡把這一天的事轉了一遍。</p>\n<p>穿越、金球孵化、雙替身覺醒、荒野打怪、商隊相遇、進城。</p>\n<p>節奏確實很快。</p>\n<p>他轉過身，對著空氣對兩個替身說：「今天辛苦了。」</p>\n<p>替身不說話，但那兩道存在感還在，穩穩的，一左一右。</p>\n<p>白無極閉上眼睛。</p>\n<p>蒼雲城的夜晚，窗外偶爾有人說話聲傳進來，遠處有什麼在叫，不知道是人是獸。風從窗縫鑽進來，帶著這個城市特有的混合氣味。</p>\n<p>他很快睡著了。</p>\n<p>明天還有事要做。</p>"}, {"title": "第六章　你是體契者？", "content": "<p>靈契測試所在城東，緊挨著冒險者公會，佔了一整條街的半邊。</p>\n<p>白無極是第二天早上去的，剛吃完早飯，手上還拿著半根剛買的炸麵餅——這個世界的食物對他來說基本都能吃，調味有些奇怪，但能果腹，他沒挑食的毛病。</p>\n<p>他進測試所的原因很簡單：趙遠山說冒險者公會接任務需要靈契等級認定，沒有等級認定不能接高等級任務。白無極想試試看這個世界的測試儀器對他有什麼反應，順便摸清一下這裡的規則。</p>\n<p>測試所的大廳相當寬敞，正面有一排像石柱一樣的台子，每個台子頂端嵌著一個半透明的球形晶石，晶石在室內的光線下泛著柔和的白光。工作人員站在台子後面，負責記錄和解釋測試結果。</p>\n<p>白無極走進去，前面有三四個人在排隊。</p>\n<p>他站在隊伍裡，一邊啃麵餅一邊打量環境。</p>\n<p>測試流程很直觀：排到的人走上去，把手放在晶石上，晶石會根據人的靈契波動顯示出顏色和強度，工作人員根據顯示判斷等級。</p>\n<p>前面一個穿皮甲的年輕女子把手放上去，晶石亮起了橙紅色的光，有幾分深度，工作人員看了一眼，說：「火屬性，契士中階，記錄完畢。」</p>\n<p>那女子點點頭，接過記錄文書離開。</p>\n<p>再前面一個，是個留著長鬍子的中年男人，晶石亮了幾下，光芒很強，顏色是複雜的雙色混合——工作人員有些振奮地在文書上寫了一大段：「雙屬性，風水混契，契師下階……」</p>\n<p>中年男人帶著一種高冷的微笑走開了，後面有幾個人竊竊私語。</p>\n<p>輪到白無極了。</p>\n<p>他把吃完的麵餅紙隨手扔進旁邊的廢紙桶，走上去，把右手放在晶石上。</p>\n<p>晶石：</p>\n<p>……沒有動靜。</p>\n<p>工作人員抬頭看了一眼，然後低頭看了看台子，確認台子沒問題。</p>\n<p>白無極左看右看，表情平靜。</p>\n<p>「……請稍等，」工作人員說，「我換一塊晶石試試。」</p>\n<p>換了。</p>\n<p>還是沒動靜。</p>\n<p>工作人員的表情開始出現了那種學生考試答不出來時的困惑——不是尷尬，是真的不知道怎麼辦。</p>\n<p>「左手也試試，」白無極說，「萬一右手有問題。」</p>\n<p>「左手一般不……算了，試試。」</p>\n<p>他把左手換上去。</p>\n<p>晶石：沉默。</p>\n<p>工作人員召喚了一個同事過來，兩個人趴在台子上研究了一會，換了第三塊晶石，還是沒有任何反應。</p>\n<p>這時候，周圍已經有幾個人圍了過來，帶著各種各樣的眼神看著白無極和那塊拒絕亮燈的晶石。</p>\n<p>「怎麼了？」有人問旁邊人。</p>\n<p>「測不出來，」旁邊人說，「我活這麼大第一次見測不出來的。」</p>\n<p>「是不是靈根太弱了？」</p>\n<p>「弱的也會亮一點點，這個一點都沒有，這人是完全沒有靈契吧？」</p>\n<p>「那他來測什麼？」</p>\n<p>竊竊私語越來越多，白無極站在台子前，把兩手輪流放在晶石上試了一遍又一遍，神情如常，臉上沒有什麼尷尬，像在做一個沒什麼結果的例行測試。</p>\n<p>然後，從人群後面擠出來一個人。</p>\n<p>這人三十多歲，穿著精緻的藍色長衫，腰間掛著靈契紋路牌，頸上靈脈紋路是複雜的多重紋，明顯是高階靈契者。他擠到前面，帶著一種「讓我來看看」的表情打量了白無極片刻，然後開口：</p>\n<p>「閣下是體契者？」</p>\n<p>聽到「體契者」這個詞，周圍有幾人的表情微妙地改變了——不完全是鄙視，但也有那種「哦，原來這樣」的了然。</p>\n<p>白無極轉頭看了他一眼：「可能是吧。」</p>\n<p>「體契者的靈契波動是內斂的，不向外顯化，」那藍衫男人解釋，語氣像在給一個外行人上課，「所以外部晶石感應不到。蒼雲城的靈契測試所不太接觸體契者，工作人員沒見過很正常。」他頓了頓，「但體契者的等級，一般需要通過實戰評定，而不是儀器測量。」</p>\n<p>「好，那怎麼做實戰評定？」白無極問。</p>\n<p>藍衫男人看了看他，目光在他普通的深灰衣服上停了一下：「需要在靈契師的監督下，與等級已知的靈契者或魔獸進行對戰，然後由靈契師評定。這個流程比較麻煩，需要預約，而且……」他停頓了一下，帶著一點說不清楚是善意還是挑剔的目光，「要自己申請，測試所不主動安排體契者評定。」</p>\n<p>「明白了，謝謝。」白無極對他點了點頭，然後轉向工作人員，「那我的測試結果是？」</p>\n<p>工作人員有點糾結：「……無法通過儀器確認等級，如果是體契者，建議前往冒險者公會，申請實戰評定。」</p>\n<p>「行。」白無極接過那份空白的記錄文書——上面什麼也沒填，就一個「體契者（待評定）」的備注，夾在角落裡——轉身走了。</p>\n<p>背後那些人的竊竊私語在他離開後更大聲了幾分：</p>\n<p>「體契者啊，怪不得……」</p>\n<p>「體契者跑來測試所幹什麼，體契者能比得過靈契師嗎？」</p>\n<p>「也挺少見的，這年頭有幾個人靠純肉身打架的……」</p>\n<p>白無極把這些聲音攏進耳朵，沒有停腳，走出了測試所的大門。</p>\n<p>陽光照下來。</p>\n<p>他對著手上那張空白文書看了幾秒，嘴角微微撇了一下，不是生氣，是那種壓著笑的表情。</p>\n<p>「等級未定，」他喃喃自語，「這麼說挺有意思的。」</p>\n<p>白金之星就站在他左邊，沉默地看著他。</p>\n<p>白無極把那張文書折起來塞進口袋，對著旁邊空氣說：「不需要等級，是吧？」</p>\n<p>替身沒有回應，但那道存在感傳來的意味讓他感覺像有人點了一下頭。</p>\n<p>他抬起頭，看了看緊挨著的那棟建築——冒險者公會的大門上掛著一塊黑底金字的招牌，門口進出著各式各樣的人，有的剛執完任務回來，身上還帶著血污，有的正在熱烈討論什麼。</p>\n<p>白無極把口袋裡的空白文書按了按，確認還在。</p>\n<p>然後他推開了冒險者公會的大門。</p>"}, {"title": "第七章　城裡的規矩", "content": "<p>冒險者公會比他想像的更喧鬧。</p>\n<p>一進門是一個大廳，佔了兩層樓的挑高空間，左邊靠牆是一面巨大的任務欄，密密麻麻地貼著各種任務公告，不同顏色的邊框代表不同等級——白色最低，然後是黃、橙、紅，白無極瞄了一眼最上面那個，紅色邊框的任務紙上寫著一長串字，什麼「契師等級以上」、「高危地帶」之類的，酬勞數字也大得讓他眼睛微微一動。</p>\n<p>但那不是他現在的事。</p>\n<p>右邊是一排長窗口，窗口後坐著幾個工作人員，正在接待排隊的冒險者。大廳中間擺著幾張長桌，冒險者們坐著聊天、看任務、喝酒——這個時候才上午，已經有人開始喝了——氣氛嘈雜但不算劍拔弩張。</p>\n<p>白無極走向窗口，排隊，輪到他，把那張從靈契測試所帶來的文書遞過去。</p>\n<p>窗口後的工作人員是個二十出頭的女孩，頭髮梳得整整齊齊，臉上有一顆小痣，看起來新人入行沒多久的樣子。她接過文書，看了一眼，臉上出現了那種「怎麼辦」的表情，但很快壓住，轉頭問旁邊的前輩：「李姐，體契者待評定的……」</p>\n<p>李姐，一個短髮中年女性，探頭看了一眼，說：「先按F級入冊，等待評定期間只能接F級任務。」她的語氣是那種公事公辦的平淡，不帶什麼個人情緒。</p>\n<p>小痣女孩轉回來，帶著一點歉意的表情：「不好意思，你的靈契等級未定，按規定先入冊F級，您可以先接F級的任務，等到——」</p>\n<p>「行啊，」白無極說，「F級就F級。」</p>\n<p>小痣女孩有點意外他這麼好說話，繼續辦手續。</p>\n<p>入冊需要名字、籍貫、靈契等級——前兩個白無極填了，第三個欄目他指著「體契者待評定」讓她照抄上去——然後是一個血液驗證，食指輕刺出一滴血按在一塊魔法石上，石頭發出嗡的一聲，白無極的信息被記錄進去了。</p>\n<p>他拿到了一個F級牌子。</p>\n<p>那是一塊鐵製的牌子，邊框是白色的，中間刻著公會的徽記，背面有他的名字和等級。入手有點份量，材質普通，但質感還行。</p>\n<p>白無極翻來覆去看了兩眼，把牌子掛在腰帶上，轉身走向任務欄。</p>\n<p>他剛走到任務欄前，旁邊有人哈哈笑了起來。</p>\n<p>聲音來自長桌那邊，一個高大的紅衣男人，腰間的靈契紋路牌是橙色邊的，看起來是契士以上的等級，正帶著幾個同伴看著他。</p>\n<p>「哎，你是剛入冊的吧？」那紅衣男人說，語氣帶著一種居高臨下的玩笑感，「F級？而且是體契者？這年頭體契者還來冒險者公會，挺稀奇的。」</p>\n<p>他旁邊的人跟著笑了幾聲。</p>\n<p>白無極轉頭看了他一眼，說：「對，F級，怎麼了？」</p>\n<p>那紅衣男人還想說什麼，但白無極沒給他繼續的機會，已經轉回頭認真看任務欄了。</p>\n<p>F級任務的欄位在最下面，白色邊框，任務種類倒是不少：採集草藥、傳遞物品、驅逐騷擾牲口的小型魔獸、守夜看倉庫……白無極快速掃了一遍，視線停在其中一張任務紙上。</p>\n<p>「驅逐魔獸：蒼雲城東郊五里，有一頭（或多頭）魔獸近日頻繁出沒，已造成農戶財產損失。委託驅逐，如能擊殺加倍酬勞。等級要求：F級以上。」</p>\n<p>任務說明下面有一行補充：「委託人表示魔獸體型較大，行事謹慎。」</p>\n<p>白無極看著那行「體型較大，行事謹慎」，嘴角微微往上一扯。</p>\n<p>他把那張任務紙抽了下來，轉身走向窗口。</p>\n<p>「接這個。」他把任務紙遞給小痣女孩。</p>\n<p>小痣女孩接過去看了一眼，有點猶豫：「這個……雖然等級標的是F，但委託方有特別備注說魔獸體型較大——」</p>\n<p>「我知道，」白無極說，「沒問題的。」</p>\n<p>小痣女孩看了看他，再看了看任務紙，然後低下頭辦手續，嘴裡輕聲說了一句什麼，白無極沒聽清，但猜測大概是「那就祝你好運」之類的客套話。</p>\n<p>他接了任務牌，轉身準備走。</p>\n<p>「哎，體契者，」紅衣男人的聲音又跟過來了，帶著一點幸災樂禍，「你接的那個任務我知道，那頭魔獸上周咬傷了兩個去驅逐的契士，現在沒人敢接了，才掛了這麼久。你確定你一個F級體契者要去？」</p>\n<p>白無極停下腳步。</p>\n<p>他沒有轉身，只是稍微把頭偏了一點點，從眼角餘光看了那個紅衣男人一眼，然後：</p>\n<p>「契士被咬傷了？」他說，語氣帶著一種奇怪的輕描淡寫，「那他打之前有沒有先活動一下手腕？」</p>\n<p>說完，他推開門走了。</p>\n<p>大廳裡沉默了兩秒。</p>\n<p>然後有人噗嗤一聲笑出來，紅衣男人臉色變了變，想說什麼，但那個穿灰衣的身影已經消失在門口了。</p>\n<p>---</p>\n<p>東郊五里，走路大概一個多小時。</p>\n<p>白無極出城，沿著土路往東走，邊走邊讓白金之星幫他感知周圍——替身的感知比他靈敏許多，方圓幾百米內有什麼東西移動，他都能有個模糊的感受。</p>\n<p>農戶財產損失，體型較大，這個魔獸多半是固定巢域型的，不會跑太遠。</p>\n<p>果然，他走了大概四十分鐘，在一片破損的農田邊找到了痕跡——翻倒的柵欄，地面上深深的爪印，附近散落著幾棵被折斷的樹。爪印的間距和深度，比昨天那三頭血牙狼大了一個等級。</p>\n<p>白無極蹲下來，用手指比了比爪印的大小。</p>\n<p>「大一點，」他說，「但應該也是單頭。」</p>\n<p>他沿著爪印的方向往前，進了一片矮林，在林子邊緣找到了那頭魔獸的窩——一個被樹根和石塊圍成的凹陷，裡面有食物殘骸和磨損的地面。</p>\n<p>然後他看見了魔獸本體。</p>\n<p>那是一種像野豬但更大的東西，灰黑色，背脊上有幾排骨刺，牙齒從嘴兩側伸出來，每根有他的前臂那麼長，眼睛是黃綠色的。體型確實不小，比那頭牛形魔獸還厚實一圈，但沒那麼高，重心低，明顯是個力量型選手。</p>\n<p>牠察覺到了白無極，從窩裡站起來，低頭，骨刺豎起。</p>\n<p>「喔，帶刺的，」白無極說，「那肩膀就不能直接靠了，骨刺很長。」</p>\n<p>他在心裡快速調整了一下思路。</p>\n<p>這頭魔獸的打法應該和之前那頭牛類似，都是力量衝撞型，但背脊的骨刺增加了近身難度，而且牙齒是武器，衝過來如果被那兩根長牙蹭到，不是開玩笑的。</p>\n<p>他換了一個站位，向側面移動，把魔獸的衝鋒方向引偏。</p>\n<p>那頭骨刺野豬嗅了嗅鼻子，然後跺了一下蹄，衝了過來。</p>\n<p>白無極不退，往側面橫移兩步，讓開衝鋒路線，同時右腳向前踩，半身探出去，一個弓步狀態的掛踢——不是正面踢，是從側面勾進牠的前腿之間，借著牠的衝勢讓牠的前腿跌絆——</p>\n<p>那頭魔獸的前半身往下一沉，速度猛地慢了，但沒倒，猛地扭頭，長牙朝著白無極的左肋劃過來。</p>\n<p>白無極已經撤步，錯開了長牙，但那一下距離很近，他感覺到牙尖帶起的風從腰側划過。</p>\n<p>「還挺靈活的，」他說，「比看起來快。」</p>\n<p>他不再試探，直接進入節奏。</p>\n<p>魔獸再次衝來，這次他沒有橫移，往正前方迎了兩步，在距離縮到一步之內的時候，身體急速下沉——降低重心，這是八極拳近戰的核心——然後從下方鑽入，左手按住了那頭魔獸的頸部下方，把牠的頭向上頂，同時右拳從下往上，以腰轉帶動，一個上挑的崩拳打進了牠的下顎。</p>\n<p>那個力道從下到上，把整頭魔獸的腦袋往上震了起來，後腿踉蹌，整個身體的重心後仰。</p>\n<p>白無極順勢從旁側跳上去——不是跳到背上，是跳到牠的側面，抓住牠沒有骨刺的脖頸部位，壓住，然後右膝頂了進去，連頂了三下，部位是頸部與頭部的交接處，脊椎旁邊。</p>\n<p>每一下都有沉悶的撞擊聲。</p>\n<p>第三下，那頭魔獸的膝蓋軟了，轟地一聲跪下去，嘴裡發出一聲低沉的嗚鳴，再沒有掙扎的力氣。</p>\n<p>白無極鬆手，退後幾步，看著那頭癱在地上大口喘氣的骨刺野豬。</p>\n<p>「驅逐，不是擊殺，」他說，「我不用你死，你也別再去農戶那邊，都好。」</p>\n<p>那頭魔獸抬起一隻眼睛看了他一眼，然後掙扎著站起來，搖搖晃晃地往林子更深處走了，走幾步，回頭看了一眼，然後消失在草叢裡。</p>\n<p>白無極看著牠消失的方向，活動了一下右膝。</p>\n<p>「行，收工。」</p>\n<p>他整理了一下衣服，確認身上沒有明顯的傷——任務完成了，打了個圓滿。他摸了摸腰間那塊F級牌子，看著任務說明上那行「委託人表示魔獸體型較大，行事謹慎」，嘴角微微揚了一下。</p>\n<p>謹慎，他謹慎了。</p>\n<p>大概。</p>"}, {"title": "第八章　銀色靈狐", "content": "<p>第二天，白無極接了第二個任務。</p>\n<p>還是任務欄底部的F級位置。還是那種被貼了好幾天、別人沒接的類型。</p>\n<p>這次的任務說明是：「城北十二里，石溪谷一帶，有一隻中型魔獸近期活躍，疑似已建立地盤，威脅過往行人及附近村莊。委託追蹤確認並驅逐，如能擊殺加倍酬勞。等級要求：F級以上。注：目標行蹤不定，有智力，注意規避。」</p>\n<p>「有智力」這三個字白無極在心裡劃了條線，單獨記下來。</p>\n<p>昨天那頭骨刺野豬是純本能反應，打起來算直接。「有智力」的魔獸，意味著牠會跑、會等待時機、也可能會設陷阱。這種目標比無腦衝撞型的要麻煩一點，但也更有趣。</p>\n<p>他確認了任務，出發。</p>\n<p>城北的地形和東郊不同，石溪谷是一條狹長的地形帶，兩側是低矮的石壁，谷底有小溪流過，植被茂密，各種大石頭散布其中，遮蔽物很多。確實是個有智力的魔獸喜歡待的地形。</p>\n<p>白無極進谷之後沒有急著往深處走，先在谷口附近觀察了一陣，讓白金之星幫他感知動靜。</p>\n<p>白金之星傳回來的訊息是：谷中段附近有活動，但在移動，不固定。</p>\n<p>「在移動，」白無極喃喃說，「也許在追什麼，也許在巡邏。」</p>\n<p>他沿著石壁貼行，腳步放輕，盡量減少聲音。谷裡的地面是碎石混合著苔蘚，走起來需要選落腳點，他速度放慢了三分之一，但保持了穩定。</p>\n<p>走到谷中段的時候，他聽見了聲音。</p>\n<p>不是魔獸的聲音——是冰的聲音。</p>\n<p>那種冰晶在空氣中成形的清脆聲，以及伴隨著的低沉爆裂聲，像什麼東西被冰凍後碎裂開來。</p>\n<p>他加快了幾步，繞過一塊大石，然後停住了。</p>\n<p>眼前的情況比他預期的要更熱鬧。</p>\n<p>谷裡有一場戰鬥正在進行。</p>\n<p>戰鬥的其中一方，是一頭黑色的大型魔獸——四條腿，貓科體型但更大更重，鬃毛是深色的，眼睛亮著詭異的黃光，爪子比他的臉還大，這就是任務說明裡那個「有智力的中型魔獸」，白無極在心裡確認。</p>\n<p>戰鬥的另一方，是一個人，以及那個人的靈獸。</p>\n<p>那個人站在一塊高台石頭上，從白無極的角度可以看到她的側臉——十六七歲的樣子，面容輪廓清晰，皮膚白，嘴唇有些薄，表情是那種天生帶著三分冷意的漠然。她身上穿著淡青色的外衣，腰帶收緊，頭髮用一根銀簪束在腦後，沒有多餘的裝飾，整個人站在石頭上的姿態既不是防守也不是鬆懈，就是那種看起來無懈可擊的輕鬆。</p>\n<p>她的靈獸就站在她腳邊——一隻狐狸，但不是普通的狐狸。</p>\n<p>銀白色的，通體沒有雜色，毛色像是月光打在雪地上的那種純粹的白，帶著隱隱的藍色光芒，尾巴有三根，輕盈地搖擺著。那雙眼睛是淺藍色的，清澈得有點不真實，此刻正專注地盯著那頭黑色大型魔獸，眼中有一種沉靜的戰意。</p>\n<p>「霜翎，右側，」那少女開口說，聲音平靜，帶著使喚靈獸的那種輕描淡寫的命令感，「冰封路徑。」</p>\n<p>銀狐霜翎應聲行動，從石台上一躍而下，四爪踏地的瞬間，白色的冰晶從腳底向四周蔓延，一道冰封的路徑從牠的腳下延伸向那頭黑色魔獸的側面，封死了牠的退路。</p>\n<p>那頭有智力的黑色魔獸顯然識得厲害，往另一側跳，但那少女抬起了右手，兩根手指輕輕拂過，空中無聲出現了一道冰牆——</p>\n<p>不，不是牆，是一片冰晶薄翼的屏障，像玻璃一樣，精準地封堵住了那頭魔獸的退路。</p>\n<p>「……」白無極站在後面，看了片刻。</p>\n<p>這個場景，有點問題。</p>\n<p>他掏出了昨天接的任務牌，翻到背面，看了看地點說明：石溪谷，城北十二里。</p>\n<p>再看看眼前這場戰鬥的位置，分毫不差，就是石溪谷。</p>\n<p>然後他看了看那個穿淡青色衣服的少女，以及她腳邊的任務記錄牌——那個牌子的顏色，比他的F級白色牌子深多了，應該是更高等級的記錄牌。</p>\n<p>但牌子上的任務號碼——他眼神還行——和他手裡的任務號碼，是一樣的。</p>\n<p>好家夥。</p>\n<p>同一個任務，兩個人接了。</p>\n<p>這種情況白無極不確定這個世界有沒有規定，但看那個少女的架勢，這個目標基本上已經是她的囊中之物了，再等一刻鐘多，那頭黑色魔獸就要被解決。</p>\n<p>他站在那裡想了三秒鐘，思考要不要直接退出去當沒發生過。</p>\n<p>就在這時，那少女的目光掃了過來。</p>\n<p>她的眼睛掃到他，沒有任何表情的變化，就是那種「掃到了一個東西，確認是什麼，然後分析是否需要處理」的目光。</p>\n<p>白無極對她揮了揮手：「哦，不好意思，打擾了，我也是來接這個任務的，看你在處理，要不我等一下？」</p>\n<p>少女盯著他看了兩秒。</p>\n<p>「同一個任務？」她說。</p>\n<p>「嗯。」</p>\n<p>她的目光從他身上移開，回到那頭被冰晶逼在一角的黑色魔獸身上，語氣平靜：「我先到。」</p>\n<p>「你先到，」白無極說，「但任務還沒完成。」</p>\n<p>少女的目光再次回到他身上，這次停了稍微長一點的時間，帶著一種審視。</p>\n<p>「你是F級，」她說，看了一眼他腰間的白色牌子，「這個任務你接不了的。」</p>\n<p>白無極低頭看了看自己的F級牌子，再抬頭：「F級以上都可以接，任務說明上寫的，你看到那行字了嗎？」</p>\n<p>少女：「……」</p>\n<p>「而且，」他說，「你的靈獸已經把牠圍住了，但還沒解決。我可以幫忙。」</p>\n<p>少女的眉頭動了一下——不是皺眉，只是極細微的一個動作，但在那張天生冷淡的臉上，這已經算是表情豐富了。</p>\n<p>「不需要，」她說，然後對著霜翎：「霜翎，收尾。」</p>\n<p>銀狐霜翎流暢地移動，冰系靈力凝聚在前爪上，準備給那頭黑色魔獸最後的封鎖——</p>\n<p>但那頭有智力的黑色魔獸，在被逼入死角的前一刻，做了一個出乎意料的事：它縱身一躍，越過了冰晶屏障，朝著完全相反的方向，朝著白無極的方向衝了過來。</p>\n<p>少女：「……」</p>\n<p>白無極看著那頭衝過來的黑色魔獸，轉頭對那少女說：「你看，還是需要我的。」</p>\n<p>那少女沉默了一秒，然後開口，語氣帶著第一次明顯的情緒——不耐煩：「讓開。」</p>\n<p>「我看看，」白無極說，腳沒動，「也許我能更快解決。」</p>\n<p>少女冷冷地看了他一眼。</p>\n<p>「你很煩。」她說。</p>\n<p>「謝謝，」白無極說，「你也不好惹。」</p>\n<p>那頭黑色魔獸衝到了他面前三步距離。</p>\n<p>白無極終於動了。</p>"}, {"title": "第九章　拳頭 vs 靈狐", "content": "<p>那頭黑色魔獸被白無極三拳打落，沒有懸念。</p>\n<p>第一拳，崩拳正面迎上牠的衝勢，打在鼻樑中央，頭向上震；第二拳，趁著牠重心後仰，步上前，頂肘打在前胸，把整個衝勢壓下去；第三拳，弓步探身，打在牠的後頸——不是攻擊要害，是用力道讓牠的頸椎肌肉痙攣，讓牠暫時無法控制力量。</p>\n<p>那頭有智力、能繞開冰晶屏障的黑色魔獸，倒在地上，掙扎了幾下，爬起來，看了白無極一眼，然後——夾著尾巴逃了。</p>\n<p>全程不超過十五秒。</p>\n<p>白無極拍了拍手，確認魔獸跑遠了，然後轉向那個站在石台上的少女。</p>\n<p>少女靜靜地看著他。</p>\n<p>霜翎也靜靜地看著他，三條白色的尾巴垂下去，淡藍色的眼睛裡有某種說不清楚的情緒。</p>\n<p>「任務完成，」白無極說，「你看，比你更快。」</p>\n<p>少女的臉沒有什麼特別明顯的變化，仍然是那種冷淡的漠然，但她的目光在他身上停留的時間，比之前更長了一點。</p>\n<p>「你的靈契，」她說，「什麼屬性？」</p>\n<p>「體契，」白無極說，「靠肉打的那種。」</p>\n<p>少女的眼神微微收窄，帶著一點考量的意思：「體契者的力量波動，我剛才在旁邊感知了，你沒有。任何的靈氣波動都沒有，打那幾拳完全是純粹的肉體力道。」她停頓了一下，「但那個力道，不是一般人能有的。」</p>\n<p>「謝你誇獎，」白無極說，「但任務公平吧？我也在任務欄接的，沒搶你的，你的酬勞我不要，我回去交我的差。這樣可以嗎？」</p>\n<p>少女沒有立刻說話，只是繼續看著他，目光深了一點，帶著那種——不是生氣，是某種興趣刺激出來的審視。</p>\n<p>然後她從石台上跳下來，落地沒有聲音，輕盈得像一片葉子，霜翎從她腳邊流動到她身側，三根尾巴輕輕掃過地面。</p>\n<p>她走到距離白無極三步之外，停下，抬頭對他說：</p>\n<p>「我改變主意了。」</p>\n<p>「改變什麼主意？」</p>\n<p>「我要先解決你，再去交任務。」</p>\n<p>白無極：「……你說什麼？」</p>\n<p>「霜翎擋住了目標，你強行介入，任務的成果算誰的？」少女說，語氣依然是那種平靜漠然，但內容顯然不是在商量，「最好的辦法，是直接讓你喪失行動能力，然後由我完成任務，問題就解決了。」</p>\n<p>這個邏輯……白無極在腦子裡轉了一圈，發現按照這個世界強者為尊的邏輯，這其實是「有道理的」。她比他等級高，她有靈獸，如果她真的能壓住他，那任務的完成權確實算她的。</p>\n<p>問題是——她壓不住他。</p>\n<p>「好，」白無極說，「那我們試試？」</p>\n<p>少女的目光沒有任何多餘的動作，只是對著身側的霜翎開口：「霜翎，上。」</p>\n<p>銀白色的靈狐從少女身側流動出去，速度比白無極預料的快——牠的移動方式不像一般動物，更像是融入了地面，然後從地面上重新出現在你的另一個位置，滑動中帶著冰系靈力的輕盈，幾乎沒有聲音。</p>\n<p>白無極來不及完全反應，霜翎已經繞到了他右側，前爪朝著他的右腿彈出。</p>\n<p>爪子亮著藍白色的冰光。</p>\n<p>那冰爪碰到他右腿的時候，有一種刺骨的冷意——不是普通的冰冷，是那種直接侵入皮下、試圖讓肌肉凍僵的靈力屬性冷。</p>\n<p>但白無極的腿沒有凍僵。</p>\n<p>他吃了那一爪，確認了痛感和冰意都在，然後低頭看了看右腿：三道爪痕，有點深，皮膚周圍有薄薄的冰晶成形——但那冰晶在成形後的一秒鐘內，被他腿部肌肉收縮帶動的熱力給碎開了。</p>\n<p>「有點冷，」他說，「但還好。」</p>\n<p>霜翎在一側快速移動，再次攻擊，這次是後腿，又是冰爪。</p>\n<p>白無極轉身，讓開了後腿，那爪子從他的小腿側面划過，把褲腳刮破了一條口子。他趁霜翎攻擊後的回縮動作，往前踩了一步，身體下沉，左手虛晃了一下——霜翎的本能反應是往左閃——他右手已經在左手的掩護下崩出去了。</p>\n<p>那一拳打在霜翎的左前肩，不是全力。</p>\n<p>他清楚這是少女的靈獸，如果打死了，那就是大麻煩。他想的是——打到痛，讓牠收手。</p>\n<p>但霜翎比他預料的更能扛。</p>\n<p>那一拳打在靈狐的肩上，白無極感受到靈力護體的那層阻力，像打在一塊密實的冰上，他的力道有一半被卸走了，另一半傳進去，霜翎的身體確實顫了一下，但牠沒有退開，而是反手一爪打在了白無極的右前臂上。</p>\n<p>冰爪抓開了他的袖子，又是三條道。</p>\n<p>「……這套西裝是真的倒楣，」白無極看了一眼那個被抓破的位置，「等等，這不是西裝，算了。」</p>\n<p>他重新凝神。</p>\n<p>霜翎在他面前站定，那雙淡藍色的眼睛裡，最初的那種情緒已經變了——從最初的輕視，變成了認真對待。牠開始凝聚更多的冰系靈力，白無極能感覺到，那種冷意在牠的周圍積累，變得更厚重。</p>\n<p>準備下一擊了。</p>\n<p>白無極深吸一口氣，重心下沉，腳踩緊地面。</p>\n<p>然後他主動往前走。</p>\n<p>不是衝，是走，一步一步，帶著那種沉穩的、讓重心完全貫入地面的走法——這是八極拳的步法基礎，每一步落地都要「沉」，沉到對手能感覺到震動，沉到你自己的重心像一根錨被釘進地裡。</p>\n<p>霜翎的靈力在積累，但白無極不給牠時間。</p>\n<p>他走進了兩步距離之內，然後崩拳直出——</p>\n<p>這次是全力。</p>\n<p>六七成功力的崩拳打在霜翎的軀幹正面。</p>\n<p>那種沉悶的轟聲再次出現，但比之前打魔獸的聲音更清晰，因為周圍的石谷地形把聲音反射放大了。</p>\n<p>霜翎的靈力護體被那一拳正面捅穿了，那道衝擊傳進牠的身體，把整頭銀狐震飛出去——飛出去六七步，在地上滾了兩圈，白色的毛捲起，冰晶在牠落地的位置炸裂開來，碎成一地的藍白色光芒。</p>\n<p>全場靜了。</p>\n<p>谷裡只剩溪水流動的聲音。</p>\n<p>霜翎在地上愣了兩秒，站起來，搖了搖頭，身上那些冰晶慢慢散去，牠回頭看了看少女，然後再看向白無極，那雙淡藍色的眼睛裡有種很奇怪的情緒。</p>\n<p>白無極活動了一下打拳的右手，手指展開又收攏，確認沒有骨骼損傷——剛才那一拳碰到靈力護體的衝擊，比打石頭還硬，但他的手是完好的。</p>\n<p>他抬起頭，看向那個少女。</p>\n<p>少女站在原地，一隻手微微抬起，那是她準備在霜翎撐不住的時候親自出手的姿勢。但此刻那隻手停在半空中，沒有動。</p>\n<p>她的目光落在白無極臉上，那張天生冷淡的臉上，有什麼細微的東西在改變。</p>\n<p>不是震驚。不算是——她能成為蘇家天才嫡女、能帶著霜翎跑到城外接任務，她不是沒見過強者的人。</p>\n<p>但這樣的強，她沒見過。</p>\n<p>體契者，沒有靈氣波動，沒有靈契加持，就是純粹的肉身和拳法，把她的靈獸霜翎——一個契師級別的冰系靈獸，有靈力護體的銀狐——用一拳打飛。</p>\n<p>她的手慢慢放下來，她向霜翎走過去，在牠身邊蹲下，確認了牠的狀況——震傷，不嚴重，沒有內傷，靈力護體發揮了作用——然後她站起來，重新把目光放回白無極身上。</p>\n<p>兩人對視。</p>\n<p>少女的嘴唇動了一下，說：「你叫什麼名字？」</p>\n<p>「白無極，」白無極說，「你呢？」</p>\n<p>她沒有立刻回答，只是繼續看著他，那雙漠然的眼睛裡有什麼東西在某個更深的地方動了一下，轉瞬即逝。</p>\n<p>然後她開口，聲音平靜，帶著一種讓人說不清是評價還是陳述的語氣：</p>\n<p>「你很有意思。」</p>"}, {"title": "第十章　你很有意思", "content": "<p>「你很有意思。」</p>\n<p>那四個字落下來之後，石溪谷裡沉默了一秒。</p>\n<p>白無極看著眼前這個少女，她的表情沒有任何後續的解釋，說完就說完了，那雙漠然的眼睛裡沒有要繼續對話的意思，只是把那四個字扔過來，就像丟了一塊石子，然後等著看水波紋。</p>\n<p>白無極在腦子裡轉了一圈，決定接這個球：「多謝誇獎。你叫什麼？」</p>\n<p>少女沉默了兩秒，然後：「蘇念卿。」</p>\n<p>「蘇……念卿，」白無極把這個名字在嘴裡過了一遍，「聽起來挺好聽的名字。」</p>\n<p>蘇念卿看了他一眼，那種「我不需要你評價我的名字」的沉默。</p>\n<p>霜翎從她腳邊繞了一圈，在她身旁停穩，三根白色的尾巴微微豎起，帶著一種仍然在評估白無極的警覺，但已經從剛才的戰鬥狀態退下來了——靈獸的本能，在認定對手確實夠強的時候，戰意反而會降低，因為繼續打沒有意義。</p>\n<p>蘇念卿把任務牌從腰間取下來，確認了一下，然後把目光重新落到白無極身上：「任務的完成報告，你自己去交。」</p>\n<p>「我知道，」白無極說，「你不需要跟我說這個。」</p>\n<p>「我只是說清楚，」她說，「這個任務的完成，你有份，酬勞你去拿你該拿的。」</p>\n<p>白無極挑了一下眉：「你剛才還說要讓我喪失行動能力。」</p>\n<p>「那是之前。」蘇念卿的語氣平靜，像在說一件和自己完全無關的事，「現在情況不同了。」</p>\n<p>「哦，那謝了。」白無極沒多問，這個邏輯在她那裡應該是完整的，他懶得去解析。</p>\n<p>蘇念卿對他點了一下頭，算是收場，然後轉身，對著霜翎輕聲說了什麼，霜翎向白無極望了最後一眼，那雙淡藍色的眼睛裡那個奇怪的情緒還沒有完全散去，然後牠跟著蘇念卿，往谷的另一個方向走去。</p>\n<p>白無極站在原地，看著兩道身影——一個高挑冷淡、一個銀白輕盈——走入石壁的轉角，消失在視線裡。</p>\n<p>他站了片刻，活動了一下右臂，看了看那幾道霜翎留下的爪痕。</p>\n<p>冰系靈力的傷口不像普通爪傷那樣滲血，邊緣反而有一種輕微的麻感和殘留的冷意，但已經在慢慢退了。他把袖子捋下來蓋住，轉頭看了看那頭黑色魔獸消失的方向，確認沒有回頭的跡象，然後整理了一下衣服，往谷口走去。</p>\n<p>白金之星從他右側的虛空裡，靜靜地跟著他的步伐移動。</p>\n<p>白無極走著，腦子裡在整理剛才那場短暫交鋒的訊息。</p>\n<p>蘇念卿。她的等級，從霜翎的表現來看，應該是契師等級或者以上。她那個冰晶屏障和冰封路徑的靈契組合，配合也很流暢，顯然是練了很久的戰術。靈獸霜翎就更不用說，銀色靈狐是冰系靈獸裡相當罕見的品種，從牠的動作速度和靈力護體的強度看，不是一般的低階靈獸。</p>\n<p>然後這麼一個人，被他一拳把靈獸打飛了，說了一句「你很有意思」就離開了。</p>\n<p>沒有惱羞成怒，沒有繼續糾纏，也沒有把剛才那個「讓你喪失行動能力」的計劃繼續執行——在確認打不過之後，她乾淨俐落地結束了。</p>\n<p>這個人的處理方式，白無極有點意外地覺得……挺好的。</p>\n<p>幹脆。</p>\n<p>他咧了一下嘴，繼續走。</p>\n<p>---</p>\n<p>回到蒼雲城，白無極直接去了冒險者公會。</p>\n<p>大廳裡的人比上午少了些，但仍然有不少冒險者在喝酒聊天。他走向窗口，今天換了個工作人員，是個三十多歲的男人，方臉，表情公事公辦。</p>\n<p>白無極把任務牌和完成報告遞過去。</p>\n<p>完成報告是在回來路上填的，按照要求寫了：目標魔獸確認，體型符合描述，已驅逐，確認離開石溪谷地帶。</p>\n<p>那個窗口人員接過去，例行地掃了一眼——</p>\n<p>然後他的目光停住了。</p>\n<p>他把目光從任務牌移到完成報告，再回到任務牌，再看了一眼白無極，最後看了一眼完成報告。</p>\n<p>「這個……」他慢慢說，「你確認任務完成了？」</p>\n<p>「對，」白無極說，「驅逐，目標已離開，我目送牠走的，確認跑遠了。」</p>\n<p>「這個任務，」那人指了指任務牌，「是你接的？你個人？」</p>\n<p>「對。」</p>\n<p>「……你一個人去的？」</p>\n<p>「對。」</p>\n<p>那人把完成報告再看了一遍，把任務牌翻過來確認了白無極的名字，然後——他看了旁邊的李姐一眼。</p>\n<p>李姐走過來，接過那份文書，看了一遍，視線在「體契者待評定、F級、單人完成」這幾行之間移動，然後抬頭看了白無極一眼。</p>\n<p>「石溪谷的那頭黑鬃山魘，」李姐說，「上週一個契士小隊三個人去，兩個受傷，一個半殘，沒打完就回來了，這個任務在任務欄掛了十二天。」</p>\n<p>「哦，」白無極說，「所以？」</p>\n<p>「所以……」李姐看了他一眼，「你一個人，去了多久？」</p>\n<p>白無極想了想：「來回加上戰鬥，大概一個半時辰？」</p>\n<p>李姐沉默了三秒。</p>\n<p>「你受傷了嗎？」</p>\n<p>白無極把右臂舉起來，讓她看了看袖子上的幾道爪痕——不是那頭黑色魔獸的，是霜翎的，但這個細節沒必要解釋——然後說：「一點點，不礙事。」</p>\n<p>「一點點，」李姐重複了一遍，「……行，任務完成確認，酬勞在報告完成後三天內到帳。」</p>\n<p>她把文書蓋了章，遞回去，看起來在努力維持公事公辦的表情。</p>\n<p>白無極接過文書，道了謝，轉身走了兩步，忽然停住，回頭：「等一下，酬勞是單人的還是雙人的？」</p>\n<p>李姐：「……什麼意思？」</p>\n<p>「同一個任務，還有另一個人也接了，她在我之前到現場，也有處理那個目標，我是後來的，」白無極說，「你們怎麼算？」</p>\n<p>李姐和旁邊那個方臉男人對視了一眼，方臉男人翻了翻記錄：「石溪谷驅逐任務……確認，同一時段有另一位冒險者也完成了接取，如果兩人對同一目標有貢獻，按規定雙方都算完成，各拿一份基礎酬勞，擊殺獎金另議。」</p>\n<p>「那就按這個算，」白無極說，「另一個人叫蘇念卿，她的份也算上，別漏了她的。」</p>\n<p>「……」</p>\n<p>「謝謝，拜拜。」白無極轉身走了。</p>\n<p>大廳裡那些本來在喝酒聊天的冒險者，幾個坐在附近的人，一直到剛才都把耳朵豎著。現在白無極離開了，大廳裡沉默了一秒。</p>\n<p>然後角落裡有人開口：「等等，他說什麼？石溪谷那個任務，一個半時辰，單人，F級，體契者？」</p>\n<p>「你剛才聽到了？」旁邊人說。</p>\n<p>「我也聽到了。」</p>\n<p>「那個任務上週三個契士沒打完，」第三個人說，「那頭黑鬃山魘的等級是契師級的上限，界定一直有爭議，有說可能是低階契將——」</p>\n<p>「他說一個半時辰。」</p>\n<p>「我知道他說一個半時辰。」</p>\n<p>又是一段沉默。</p>\n<p>窗口那邊，李姐重新盯著那份完成報告，把那幾行字看了第三遍，最後輕輕把文書放下，對旁邊的方臉男人說：</p>\n<p>「那個體契者的評定申請，找個時間安排一下吧。」</p>\n<p>方臉男人點點頭，記了下來。</p>\n<p>---</p>\n<p>白無極從冒險者公會出來，外面的日光斜了，已經是下午。</p>\n<p>他在公會門口站了一下，沒有急著走，就那麼站著，手插在口袋裡——這個世界的衣服沒有口袋，他對這個設計有點意見，但這是另一回事——讓傍晚的風吹過來，感覺腦子慢慢清醒了一點。</p>\n<p>這是他到異世界的第三天。</p>\n<p>第一天，荒野，金球孵化，雙替身覺醒，打了一頭牛形魔獸。</p>\n<p>第二天，進蒼雲城，靈契測試儀器拒絕對他有任何反應，加入冒險者公會F級，打了一頭骨刺野豬。</p>\n<p>第三天，接了石溪谷的任務，遇到蘇念卿和霜翎，用拳頭把靈狐打飛，任務完成。</p>\n<p>節奏挺快的。他沒有抱怨，就是這樣陳述，這個世界確實不讓人慢慢喘息。</p>\n<p>但他感覺還好。</p>\n<p>白無極在心裡做了一個很簡單的評估：目前的狀態，在這個世界的底層混，基本沒有生命威脅；如果想往上走，需要更多資訊，需要摸清替身真正的能力上限，需要找到在這個世界立足的方式。</p>\n<p>不急。</p>\n<p>一步一步來。</p>\n<p>他抬起頭，看著蒼雲城傍晚的天色，那個紅橙色的光把街道和屋頂都染成暖色，行人在光裡走動，靈契者的紋路在黃昏裡格外清晰。</p>\n<p>他想起那個少女離開時說的那四個字：「你很有意思。」</p>\n<p>說不清是什麼評價，但白無極想，那不是壞事。</p>\n<p>有意思的人，至少不容易被忽視。</p>\n<p>「明天繼續，」他對著空氣說，算是對白金之星和黃金體驗說，也算是對他自己說，「先把這個城市摸清楚，然後往上走。」</p>\n<p>白金之星靜靜地站在他旁邊，深邃的眼睛望向前方，沉默，卻實實在在地在那裡。</p>\n<p>白無極把手從「口袋」裡抽出來，理了理衣領，往城南的方向走去。</p>\n<p>晚飯時間到了。</p>\n<p>不管在哪個世界，人都得吃飯。</p>\n<p>蒼雲城的夜晚開始降臨，燈火從街道兩側亮起，把這座城市的輪廓一點點照亮。在某個方向，蘇念卿大概也在回程的路上，帶著她的銀色靈狐，冷淡漠然地走著。</p>\n<p>而在冒險者公會，李姐重新拿起了那份F級體契者白無極的完成報告，在上面附加了一個備注：</p>\n<p>「待評定。建議盡快安排。」</p>\n<p>---</p>\n<p>（卷一第1-10章完）</p>"}, {"title": "第11章_蘇家的邀請", "content": "<p>第11章　蘇家的邀請</p>\n<p>公會的任務大廳在清晨時分總是熱鬧的。</p>\n<p>契徒們三三兩兩聚在任務欄前，對著各色任務牌指指點點，有人爭搶，有人觀望，也有人靠在角落打盹，等著看有沒有肥差漏下來撿。白無極推開大門走進來，身上還帶著昨夜沒睡好的倦意，腰間別著任務牌，徑直走向交差窗口。</p>\n<p>負責接件的職員是個二十出頭的年輕姑娘，叫做林曉蓁，進公會才一年，做事仔細認真。她看見白無極過來，已經習慣性地準備提筆登記，眼神卻在看到任務報告那一瞬間頓住了。</p>\n<p>她拿起那張紙，翻過來，又翻回去。</p>\n<p>「這……」林曉蓁抬起頭，神情有些複雜，「白先生，這是您昨天完成的任務？」</p>\n<p>「對。」白無極把剩下的任務牌一起推過去，「三件都結了，帶子狼、兩隻石皮蜥蜴、還有那個跑掉的偷竊案，抓到人了，已經送衙門了。」</p>\n<p>「我知道，」林曉蓁的手指輕輕點了點報告上的某一行，「我是說……這裡寫，帶子狼頭領，您是用……拳頭打死的？」</p>\n<p>「對。」</p>\n<p>「帶子狼頭領是C級妖獸。」</p>\n<p>「嗯。」</p>\n<p>「您是F級契徒。」</p>\n<p>「所以？」</p>\n<p>林曉蓁盯著他看了三秒，然後低下頭，用一種極度剋制的語氣說：「沒什麼，報告確認完畢，結算獎勵共計三百二十二枚靈幣，請稍候。」</p>\n<p>她轉身去拿獎勵的背影有點僵，白無極大概猜到她在想什麼，也沒去解釋，就靠在窗口等著。旁邊幾個剛進來的契士恰好聽見這段對話，彼此交換了一個「這小子在吹牛吧」的眼神，白無極沒理他們。</p>\n<p>錢拿到手，出門，找了個攤子吃了碗熱湯麵，然後回到他在蒼雲城租的小院。</p>\n<p>這間院子不大，一間正屋一間廂房，院子裡有棵老槐樹，樹皮斑駁，估計活了不少年頭。白無極覺得這棵樹看著順眼，租院子的時候這個也算進去了。他推開院門，在院子裡活動了一下手腳，壓了壓腿，打了一套八極拳。</p>\n<p>異世界的空氣和原來的世界有些不同，厚實一些，呼吸的時候像是帶著某種若有若無的質感，靈契體系的底層基礎大概就是這個。白無極打拳的時候能感覺到這種質感在拳法的發力點上聚集，不是靈契——他沒有靈契，也不打算弄——但八極拳本身的發勁原理和這個世界的氣感有一種奇妙的共振。</p>\n<p>架子打完，他在樹下坐下，半閉著眼。</p>\n<p>腦海裡，那顆精神力金球安安靜靜地懸在那裡，兩道光影在旁邊虛浮著。白金之星偶爾動動手指，黃金體驗在研究從外面摘進來的一片槐樹葉子，把它變成了一隻小甲蟲，然後又變回來。</p>\n<p>日子挺不錯的。</p>\n<p>敲門聲響起。</p>\n<p>「誰啊。」</p>\n<p>「蘇念卿。」</p>\n<p>白無極睜開眼，片刻，站起來去開了門。</p>\n<p>蘇念卿站在門口，換了身衣服，水藍色的外袍，霜翎縮得很小，趴在她的肩膀上，一雙銀色的眼睛漠然地看著白無極，似乎對上次被他震飛一事耿耿於懷。蘇念卿本人的表情同樣沒什麼起伏，手裡拿著一個信封，遞過來。</p>\n<p>「蘇家邀請函。」她說，語氣像在陳述天氣，「家族想見一見你。」</p>\n<p>白無極接過信封，翻了翻，沒拆，「什麼時候的事？」</p>\n<p>「明天午時。」</p>\n<p>「嗯。」他把信封放到一邊，「不去。」</p>\n<p>蘇念卿的眉毛微微動了一下，「理由？」</p>\n<p>「不認識的人家都不去，」白無極把手揣進袖子裡，很理所當然地說，「萬一有危險呢。」</p>\n<p>「蘇家。」蘇念卿的語氣平了平，像是在做一件很費力氣的事，「天衍四大家族，蘇家。」</p>\n<p>「哦，」白無極看了她一眼，「那就算了。」</p>\n<p>這次蘇念卿沉默了明顯更長的一段時間。霜翎的耳朵豎起來，小小的爪子悄悄勾緊了她的外袍，好像在用這個動作提醒什麼。蒼雲城的清晨風還有點涼，院子裡那棵老槐樹的葉子輕輕晃動。</p>\n<p>「……蘇家有廚子，」蘇念卿最後說，語氣比剛才低了半度，「管飯。」</p>\n<p>白無極轉過頭來，認真地看了她三秒，「幾個菜？」</p>\n<p>「你想要幾個菜。」</p>\n<p>「至少六個，有肉的那種。」</p>\n<p>「行。」</p>\n<p>「那就去吧，」白無極非常順暢地改口，把信封撿起來，「明天午時你來接我？」</p>\n<p>蘇念卿：「……」</p>\n<p>霜翎把腦袋扭向了另一邊。</p>\n<p>---</p>\n<p>消息沒有特別傳開，但蒼雲城的地方不算大，蘇念卿親自送邀請函這件事，多少還是讓幾個有心人知道了。</p>\n<p>公會裡，負責處理高階任務分配的主管陸鎮遠聽到這個消息，放下手上的文書，摩挲了一下下巴。他比林曉蓁更早看過那份任務報告，也更早意識到那份報告的異常之處。F級契徒，完成了三件任務，其中一件以拳頭擊殺C級頭領妖獸，且根據其他旁證——昨天在城東巷子裡有幾個目擊者看見一個年輕男人被霜翎衝擊之後，把霜翎打得在空中翻了個跟頭。</p>\n<p>霜翎是蘇念卿的靈狐，冰屬性，戰力在妖獸中評定為B級以上。</p>\n<p>被B級妖獸全力衝擊還能反手打回去，體契者？沒有體契的類型能做到這個？陸鎮遠拿起那份報告，又仔細地看了一遍，越看越覺得這個F級契徒的水很深。</p>\n<p>他在備注欄裡寫了一行字：此人實力評定需重新審查，建議升至暫定C級觀察。</p>\n<p>想了想，又加了一句：注意動向。</p>\n<p>---</p>\n<p>第二天清晨，白無極起得比平時早一些。</p>\n<p>不是為了蘇家的邀請，純粹是因為睡醒了，睡不著就起來打拳。他把架子打完，吃了早飯，換了一身稍微整齊一點的衣服——他在蒼雲城置辦的行頭不多，這件灰藍色的長衫是目前最像樣的，穿上去雖然沒有本土人那種行雲流水的貴氣，但也說得過去。</p>\n<p>午時差一刻，蘇念卿準時出現在院門口。</p>\n<p>她今天穿了件更正式的衣服，白底暗紋，頭髮用玉簪挽起，多了幾分家族嫡女的架勢，霜翎今天沒出現，估計是縮回靈契空間裡了。她掃了一眼白無極，「準備好了？」</p>\n<p>「準備好了，」白無極把院門鎖上，跟著她走，「路遠嗎？」</p>\n<p>「蘇家在城東，馬車一刻鐘。」</p>\n<p>「那挺近的。」</p>\n<p>兩人走出巷子，管家已經候著了，一輛看起來頗為考究的馬車停在街邊，木板和車廂的邊角鑲著細紋，不張揚，但一看就不是普通人家的東西。白無極跟著上了車，在對面坐下。</p>\n<p>馬車動起來，蘇念卿靠著車廂看向窗外，白無極環顧了一下車廂的佈置，覺得這個座椅比他的院子裡那把竹椅舒服多了。</p>\n<p>「你緊張嗎？」蘇念卿忽然開口。</p>\n<p>「不緊張，」白無極說，「我去見過的最大的陣仗是我老闆的老闆的老闆，他請我們吃飯，我吃到撐。」</p>\n<p>蘇念卿：「……什麼意思。」</p>\n<p>「就是說，人再大，飯局就是飯局，」白無極靠在椅背上，「只要有吃的，沒什麼好緊張的。」</p>\n<p>霜翎不知道什麼時候從靈契空間裡探出了半個腦袋，盯著白無極看，眼神裡帶著一種難以言說的複雜情緒。</p>\n<p>蘇念卿收回目光，重新看向窗外，嘴角的弧度幾乎察覺不到地動了一下，很快就壓回去了。</p>\n<p>窗外的蒼雲城在清晨的陽光裡顯出一片熱鬧的景象，街道上人來人往，叫賣聲此起彼伏。白無極把臉湊近車窗，看了一眼外面，心裡想，這個世界其實挺有意思的。</p>\n<p>然後馬車轉過街角，蘇家的大院出現在視野盡頭。</p>\n<p>那是一道很長的白牆，院門飛簷，門頭上四個字：蘇氏別院。</p>\n<p>白無極打了個哈欠，準備應付接下來的飯局。</p>"}, {"title": "第12章_四大家族", "content": "<p>第12章　四大家族</p>\n<p>馬車在蘇氏別院門口停下，管家先行下去通報，白無極跟著蘇念卿從車上下來，站在那道白牆前打量了一眼。</p>\n<p>院子比他想像的要大，格局方正，種了幾棵不知名的大樹，樹葉翠綠，帶著一種清肅的氣息。進院之前還需要等一段時間，蘇念卿站在他旁邊，神情如常，白無極則在旁邊慢慢打量這座城。</p>\n<p>從這個角度看過去，蒼雲城的輪廓比他初來時看到的更完整一些。城牆的輪廓在遠處起伏，建築密集，但有幾塊區域明顯氣質不同——豪宅區、商業區、貧民區，這種分層大概哪個世界都一樣。</p>\n<p>「等著無聊，」白無極開口，「說說這個地方吧，你昨天說四大家族。」</p>\n<p>蘇念卿掃了他一眼，「你不知道？」</p>\n<p>「我是外來的，見識少。」</p>\n<p>這個回答讓蘇念卿沉默了片刻，似乎在斟酌要說多少，最後決定簡單說說，畢竟今天邀他來，讓他兩眼一抹黑進去也不太好。</p>\n<p>「天衍大陸，」她說，語氣如同在念一篇文章，很平，「目前由四大家族維持格局：蘇家、陳家、赫連家、慕容家。四家各有地盤，各有勢力，互相制衡，算不上和睦，但明面上維持著和平。」</p>\n<p>「蘇家在哪一塊？」</p>\n<p>「北境。蒼雲城是蘇家和陳家的邊界城市，兩邊都有勢力在這裡，平時相安無事，有時候摩擦。」</p>\n<p>「陳家是北境另一邊？」</p>\n<p>「陳家在東北，跟蘇家的接壤點就在蒼雲城這條線上，」蘇念卿頓了頓，「這裡的關係比較複雜，你知道就行，不要多問。」</p>\n<p>「赫連和慕容呢？」</p>\n<p>「赫連家在南境，靠著瀚海，以水戰和海靈契出名。慕容家在西境，資源最豐富，靠著靈礦山脈，歷代都出靈契師巔峰高手。」她說到這裡，頓了一下，「四家裡，論純粹的武力，慕容最強，論財富，慕容也最厚，但慕容家有一個問題。」</p>\n<p>「什麼問題？」</p>\n<p>「傲慢，」蘇念卿說，「慕容家的人認為靈礦孕育出的靈契才是天下正統，看不上其他家族，也看不上體契者和獸契師。」</p>\n<p>白無極了然地點了點頭，「那他們看我這種估計……」</p>\n<p>「大概率直接打死你。」蘇念卿說得很平靜，像是在說今天天氣不錯。</p>\n<p>「那就不去那邊。」</p>\n<p>「聰明。」</p>\n<p>白無極把手放在腦後，抬頭看了看天空，想了一下，「那你們蘇家主要做什麼的？」</p>\n<p>「獸契。」蘇念卿說，「蘇家歷代以獸契師為主，與天地靈獸立契，這也是蘇家在四家裡算得上獨一份的地方——靈獸和人立契，靈獸的感知能力能替蘇家提供情報網絡和偵查能力，這是其他三家做不到的。」</p>\n<p>「所以蘇家的護院都是帶寵物上班的？」</p>\n<p>蘇念卿轉頭看了他一眼，「……差不多。」</p>\n<p>白無極笑了笑，沒再說什麼，視線在這一片建築上轉了一圈，「那四家裡，哪家最好打？」</p>\n<p>蘇念卿停頓了大概三秒，然後說：「你是傻子嗎。」</p>\n<p>「就問問，」白無極一臉無辜，「了解一下情況嘛。」</p>\n<p>「沒有最好打的，四家都在頂端，都有契聖坐鎮，」蘇念卿說，「普通人看到任何一家的頂尖高手，連逃都逃不掉。你腦子裡裝什麼的。」</p>\n<p>「那最難打的呢？」</p>\n<p>「白無極。」</p>\n<p>「好，不問了不問了。」</p>\n<p>管家從院內出來，行了個禮，示意可以入內了。蘇念卿整了整衣袖，往前走，白無極跟上，邊走邊打量蘇氏別院的佈局，看了幾眼，大概摸清了進出的路線。</p>\n<p>「你在看什麼？」蘇念卿忽然說。</p>\n<p>「院子的格局，」白無極說，「我習慣先看清楚地形。」</p>\n<p>蘇念卿沉默了一下，沒再說話，但心裡對這個人又多了一個標注。</p>\n<p>這個習慣，不像尋常人。</p>\n<p>---</p>\n<p>蘇氏別院的正廳寬敞，採光極好，兩排長窗把外面的陽光引進來，照在青石地磚上，顯出一種不浮誇的沉穩。廳裡已經有幾個人等著，蘇念卿進去的時候，幾道目光都落過來，掃了一眼白無極。</p>\n<p>白無極本人對這種打量沒什麼反應，跟著蘇念卿進廳，站定。</p>\n<p>「念卿。」上首坐著一個老者，約莫六十歲上下，鬚髮半白，精神矍鑠，氣質沉穩，一雙眼睛不大，但看人的時候有一種若有若無的壓力，是長年掌事的人才養出來的那種眼神。</p>\n<p>「蘇長老，」蘇念卿行了個禮，語氣依然平，「帶人來了。」</p>\n<p>她這樣說，倒是沒有特別介紹的意思，把剩下的工作留給了那個老者自己。</p>\n<p>老者打量了白無極一眼，「這位便是白公子了。老夫蘇遠恆，念卿的族叔，蒼雲城這邊蘇家的主事長老，一些俗務就由老夫出面，請見諒。」</p>\n<p>語氣客套，但「族叔」兩個字說出來，帶著很自然的上位者氣息。</p>\n<p>「白無極，」白無極回了個禮，點了點頭，「蘇長老好。」</p>\n<p>「聽念卿說，你在城裡行走，身手不俗，」蘇遠恆說，笑意帶著幾分從容，「蘇家向來重視英才，難得在蒼雲城碰見一個有趣的年輕人，所以請了過來，也算是互相認識。白公子不見怪？」</p>\n<p>「不見怪，」白無極說，「而且說了管飯。」</p>\n<p>廳裡有幾個人忍住了笑，蘇遠恆沉穩的表情微微一頓，然後也跟著笑了，「哈，豪爽，白公子果然爽快人，那就先請坐，午飯之前，我們隨便聊聊。」</p>\n<p>白無極在側面的椅子上坐下，感覺到蘇念卿在旁邊比他稍遠的位置也落了座，背脊挺直，霜翎已經從靈契空間出來了，縮成小小的一團趴在她肩頭，銀色的眸子在廳裡掃了一圈，懶洋洋的。</p>\n<p>聊聊，白無極很清楚這兩個字意味著什麼。</p>\n<p>試探嘛，他看得出來，那就看看蘇家想試些什麼。</p>"}, {"title": "第13章_蘇家試探", "content": "<p>第13章　蘇家試探</p>\n<p>所謂的「隨便聊聊」，果然是有套路的。</p>\n<p>蘇遠恆先談了幾句蒼雲城的近況，語氣輕鬆，像是閒談，但問題一個接一個往白無極身上引——你從哪裡來，師從何人，在蒼雲城有什麼打算。</p>\n<p>白無極回答得不溫不火：「遠地方來的，沒有師父，在這裡先安頓下來看看。」</p>\n<p>每一個回答都不算敷衍，但也沒有多餘的信息，像是一堵牆，說話客氣，但什麼都沒透進去。蘇遠恆是見過世面的人，聽了幾輪，臉上的笑沒有少，但目光裡多了幾分認真。</p>\n<p>旁邊幾個蘇家的管事也在，偶爾插幾句，試圖從側面打探，白無極一樣是這個模式，閒話說了一堆，等說完，大家發現這個年輕人的底細還是一個字都沒摸著。</p>\n<p>蘇念卿坐在旁邊，沒有插話，偶爾喝一口茶，霜翎縮在她肩頭，把尾巴搭下來，小爪子玩著自己的尾毛，看起來無聊透頂。</p>\n<p>「白公子，」蘇遠恆最終笑著開口，換了個方向，「老夫有個不情之請，蘇家有幾個晚輩，最近在修習切磋，想請白公子指點指點，不知是否方便？」</p>\n<p>白無極放下茶杯，「切磋？」</p>\n<p>「對，」蘇遠恆說，「當然不是動真格的，點到即止，主要是讓晚輩見識一下不同風格的戰法。」</p>\n<p>這番話說得好聽，什麼「點到即止」「見識不同風格」，翻譯一下其實就是：我們想看看你的底。</p>\n<p>白無極看了蘇念卿一眼，蘇念卿的表情沒有變化，只是很自然地把視線移向別處，意思十分明顯：這是長老安排的，跟我沒關係。</p>\n<p>「行，」白無極站起來，「在哪？」</p>\n<p>---</p>\n<p>蘇家別院的演武場在後院，寬闊平整，青石地面，周圍有廊柱，光線通透。蘇遠恆帶著人到場邊坐下，白無極走到場中央，環顧了一下四周，對這個空間大小做了個評估。</p>\n<p>「白公子，」蘇遠恆說，「這是蘇家的三弟子，張岩，契師中品，請白公子指教。」</p>\n<p>對面走出來一個大約二十七八歲的男人，身量高挑，靈契的氣息從他身上若有若無地透出來，體制堅實，是長年修習的底子，手上的護甲型靈契已經半激活，呈現出淡淡的深金色。契師中品，在蒼雲城這個地方算是相當能打的層次了。</p>\n<p>張岩對白無極拱了拱手，「白先生，請。」</p>\n<p>他的神情是客氣的，但眼神裡有一種很微妙的東西——不是輕視，但帶著一種篤定，就是那種「我大概知道這場怎麼打」的從容。在他的認知裡，對方是體契者，就算天賦高，純靠肉身終究有上限，他靠靈契護甲加持，硬碰硬也能壓得住，何況他的速度和技法都不差。</p>\n<p>白無極點點頭，把袖子往上擼了一截，站好了架子。</p>\n<p>八極拳的起手式並不起眼，甚至可以說看起來比較「土」——兩腳開立，拳收腰間，重心微微前傾，整個姿勢比起那些靈契師的瀟灑起手，少了很多視覺上的衝擊感。</p>\n<p>廊柱邊觀看的幾個人都在議論，壓著聲音，但沒壓太低。</p>\n<p>「這是體術？」</p>\n<p>「看起來像是某種拳法，但完全沒有靈契氣息，這種打法……」</p>\n<p>「等著看吧，沒有靈契護體，張岩的護甲一頂，他吃得消？」</p>\n<p>張岩上步，靈契激活，護甲徹底展開，深金色的光芒把他整個人包裹起來，在陽光下反著光，氣勢壓下來，場子裡的氣壓微微一沉。他走得不快不慢，步法沉穩，右拳前導，帶著靈契衝擊，往白無極中路直衝。</p>\n<p>這是試探。</p>\n<p>白無極側身讓了半步，身體後仰的幅度恰好讓那拳擦過去，然後他進步，左腳踩了一個奇特的角度，整個人往張岩的右側斜切進去，緊貼著對方的身體，間距不超過一掌。</p>\n<p>這個距離，護甲的長程衝擊優勢全廢了。</p>\n<p>八極拳的精髓就在這裡——「貼身近打」，就是要讓對手根本沒有展開手腳的空間。</p>\n<p>白無極右肩往前一頂，不是普通的撞肩，是八極拳裡的「鐵山靠」。</p>\n<p>發力的時候，他後腳蹬地，力從腳起，過腰椎，穿脊柱，最後凝在右肩，幾乎是把全身的重量和動能在這一個點上全部爆發出去。這個技法的核心在於那股「崩」的感覺，不是推，是頓發，打出去的一瞬間力量凝實如鐵。</p>\n<p>砰。</p>\n<p>張岩的護甲吃了這一擊，護甲紋路閃了一下，沒碎，但他整個人被那股力道轟出去三大步，腳踩在青石地面上咯噔一聲，硬生生剎住。他的臉色變了，眼神裡的那種從容不見了——這一擊的力道超出了他的預期，而且那股力量的質感非常奇怪，沒有任何靈契波動，純粹是物理衝擊，但又不是尋常體術的發力方式，而是有某種結構的東西在裡面，像是被一道牆直接砸了。</p>\n<p>「還可以，」白無極站直身體，把袖子再往上擼了擼，「繼續？」</p>\n<p>張岩深吸一口氣，這次認真了，靈契全力激活，護甲光芒深了一個層次，他改變了策略，不再上前貼身，而是轉為中距離的靈契衝擊流，試圖用靈契的攻擊範圍把白無極逼退，讓對方沒有近身的機會。</p>\n<p>連續三道靈契衝擊往白無極掃來，白無極後退，但退得有節奏，不是慌亂，更像是在測算步數。廊邊的人看見他退，以為是優勢，結果白無極算準了第三道衝擊的間隙，脚下一個急停，反向加速，轉腰送胯，右拳帶著「崩」的發力方式直衝前去。</p>\n<p>八極拳的崩拳不是直線的，是帶著螺旋勁的貫穿衝擊，往張岩護甲正面轟去。</p>\n<p>護甲紋路這次真的閃了，出現了幾條細微的裂紋，張岩被那股力道頂得後退了一大步，護甲右側半邊的靈契已經出現了明顯的震動崩散痕跡。</p>\n<p>他往後退了幾步，調整氣息，臉色已經難看起來了。</p>\n<p>廊邊的議論聲停了。</p>\n<p>場子安靜下來。</p>\n<p>白無極站在場中央，呼吸平穩，甚至還有功夫轉頭看了一眼廊邊蘇遠恆的方向，「長老，這位算點到了吧？」</p>\n<p>蘇遠恆：「……可以。」</p>\n<p>他確認了張岩退場，張岩走回廊邊，表情說不清楚是什麼，但沉默了。蘇遠恆站了起來，轉頭在旁邊幾個人中間說了幾句什麼，聲音壓得很低，白無極沒聽見，但看那個方向，知道接下來要換人了。</p>\n<p>「白公子，」蘇遠恆重新開口，臉上的笑容沒有散，但多了一分真誠，「再來一位？」</p>\n<p>白無極把架子重新站好，「幾個一起也行吧，省時間。」</p>"}, {"title": "第14章_這小子深不可測", "content": "<p>第14章　這小子深不可測</p>\n<p>蘇遠恆聽到「幾個一起也行」這句話，沉默了大概兩秒，然後點了點頭。</p>\n<p>他身後的幾個管事互相交換了一個眼神，沒有說話，但眉頭都微微皺了皺。他們本來的計畫是輪流派人試探，一次一個，逐步升級，看看這個陌生年輕人的極限在哪裡。結果對方直接說幾個一起，這……</p>\n<p>算了，就讓他見識見識。</p>\n<p>三個人從廊邊走出來，分別站在演武場三個方向，靈契同時激活，那種氣壓疊加的壓迫感立刻把整個場子的氣氛壓沉了一截。這三個人都是契師，其中兩個中品，一個高品，配合有默契，在蘇家的護衛團裡算是能打的組合。他們沒說話，眼神交換之後，默契地選擇了圍點打援的陣型，三角包夾。</p>\n<p>白無極看了一眼三個人站的位置，點了點頭，像是在說「行，這個陣型不錯」。</p>\n<p>然後他動了。</p>\n<p>八極拳的步法不像那些花俏的靈契師步法那樣好看，但是快，而且方向變化出人意料。他不退，反而往最強的那個契師高品直接衝去，步伐急速，在對方還沒來得及反應的瞬間，左肩頂進去，一個「頂肘」——肘尖帶著向上的崩勁直插對方腋下靠肋骨的位置，不是護甲的主要防護區域。</p>\n<p>「嗤」——護甲在這個角度被硬頂出一道縫，對方吃痛，下意識往後仰。</p>\n<p>白無極腳下不停，轉身，右肘橫掃，把從左側圍上來的第二人的靈契護臂格開，借這個接觸點往前推勁，把那人擠開半個身位，緊接著左手抓住那人的衣領，腰腿發力，往地上帶——</p>\n<p>不是摔，是卸力，把那人的衝擊勢頭拆解，讓他在地面上滑出去一段距離。</p>\n<p>第三人從右側繞上來，靈契衝擊已經蓄好，「放！」</p>\n<p>白無極俯身，整個人壓低，那道靈契衝擊從他背後掠過，緊接著他不退反進，半蹲著往那人腿部衝去，雙手抱住對方的小腿上方，整個人往起一頂——</p>\n<p>七扭八歪的八極拳摔法，不講究好不好看，就講究一個結果：對方重重地落在地面上，護甲吸收了大半衝擊，但還是砸出了一個悶響。</p>\n<p>整個過程，白無極沒有停頓，連貫流暢，三個人從被動到落地，前後不超過二十個呼吸。</p>\n<p>他站直身體，拍了拍手，回到場中央，「差不多了？」</p>\n<p>廊邊。</p>\n<p>完全安靜。</p>\n<p>蘇遠恆坐在那裡，臉上的笑容還在，但那種不緊不慢的從容氣息已經悄悄沉澱成了另一種東西，更加認真的東西。他的手指在椅子的扶手上輕輕敲了兩下，沒有聲音，是一個思考時的習慣動作。</p>\n<p>旁邊的管事低聲說了一句什麼，蘇遠恆沒回應，還在看著場中央那個把三個契師打落地還一臉「這就完了？」表情的年輕人。</p>\n<p>他在腦子裡做判斷：這個人的戰力至少在契將級，而且是那種訓練有素、實戰經驗豐富的契將，動作裡面有章法，不是野路子打出來的；但他完全沒有靈契波動，靈契感知幾乎覺察不到他身上有任何靈契的存在。</p>\n<p>純體術的契將？理論上不是不可能，但在天衍大陸，這樣的人幾乎已經是傳說了。</p>\n<p>而且更奇怪的地方在別處——他感知細膩，幾十年的修為讓他對靈契有很高的敏銳度，但這個年輕人的力量方式，就算是體術，也不對。哪裡不對說不上來，就是有某種說不清楚的東西。</p>\n<p>此人，深不可測。</p>\n<p>這個判斷讓蘇遠恆很快理清了接下來應該怎麼做。</p>\n<p>「白公子，」他站起身，打斷了原本還想繼續的幾個管事，「好了，切磋到此為止，白公子辛苦，先去洗漱休息，飯馬上好了。」</p>\n<p>白無極把袖子放下來，理了理衣服，「行，謝謝款待。」</p>\n<p>---</p>\n<p>飯局設在蘇氏別院的偏廳，桌上菜色豐盛，遠不止白無極要求的六個菜，大魚大肉，擺了滿滿一桌。白無極在看到桌子的時候點了點頭，心裡對蘇家的評價提升了一個層次——能說到做到的人，值得多談一談。</p>\n<p>蘇遠恆坐上首，蘇念卿在側，白無極在另一側，幾個管事也在座。</p>\n<p>酒過一巡，蘇遠恆開始說正題，依然是那種不緊不慢的風格，話說得好聽，但意思明確：「白公子天賦異稟，蘇家一向重視英才，若是有意，可在蘇家掛個客卿名號，蒼雲城的事務有需要的時候相互幫扶，蘇家的資源白公子也可使用。」</p>\n<p>客卿，聽起來體面，但本質上是蘇家的外圍人員，對蘇家有義務，名義上受蘇家庇護，實際上是蘇家多了一個刀用。</p>\n<p>白無極夾了一筷子紅燒排骨，嚼了嚼，「蘇長老盛情，我心裡明白，只是有個問題——」</p>\n<p>「白公子請說。」</p>\n<p>「我習慣自由，」白無極放下筷子，「不太適合被人管。我這個人今天想往東走，明天可能往西，要讓我掛個名字說我屬於誰，住在哪裡、做什麼、跟誰打，這個……我做不到。」</p>\n<p>蘇遠恆的眼神微微深了一下，「客卿不需要常駐，只是——」</p>\n<p>「長老，我說清楚點，」白無極的語氣依然是那種平和的，沒有對抗感，「不是資源或待遇的問題，就是不想被綁定，跟誰家都一樣。您的好意我謝謝，飯也吃了，但這個名號，我不掛。」</p>\n<p>廳裡安靜了一瞬。</p>\n<p>蘇遠恆看著他，沉默了片刻，然後慢慢笑了，「白公子是個直人，老夫喜歡。」</p>\n<p>這個「喜歡」是真的，不完全是客套——他見過太多年輕人在蘇家的桌子上要麼諂媚、要麼懾於氣場說不出話，而這個白無極，在一個四大家族的長老面前，把拒絕說得這麼直接、這麼自然，還讓人完全找不到破綻和藉口，這個底氣本身就說明問題。</p>\n<p>「那就不談這個，」蘇遠恆舉杯，「喝酒，喝酒。」</p>\n<p>白無極也舉杯，「喝酒。」</p>\n<p>兩人對飲了一杯，氣氛反而鬆了一些。</p>\n<p>蘇念卿在旁邊沒有說話，只是靜靜地把自己碗裡的食物吃完，霜翎趴在她旁邊的椅子上，把一塊魚肉叼走了。偶爾，她的目光會往白無極的方向偏一下，但每次都偏得很短，像是無意識的，又像是刻意的。</p>\n<p>蘇遠恆看在眼裡，沒說什麼，只是給自己又倒了一杯酒。</p>\n<p>這個年輕人，不是蘇家能輕易拿捏的人，但這樣的人如果真的有機會站在蘇家這邊，那倒是一筆說不清楚的好買賣。</p>\n<p>先結個善緣，其他的，慢慢來。</p>"}, {"title": "第15章_蒼雲城暗流", "content": "<p>第15章　蒼雲城暗流</p>\n<p>從蘇家出來的時候，天色已經偏西，太陽斜掛在蒼雲城的屋脊線上，把整條街道鍍成了橘紅色。</p>\n<p>白無極飽飽地吃了一頓，心情不錯，沒有直接回院子，而是在城裡逛了起來。他這個人就這個習慣，到一個新地方，要親自走一遍，才算摸清楚。</p>\n<p>蒼雲城不算大，但也不小，南邊靠近城門的那一片是市集和商業街，東北方向是冒險者公會和幾個大客棧集中的區域，北面依著城牆有幾條老街，年頭久了，地磚踩出了凹陷，但人氣不差。蘇家的別院在城東，白無極從那邊往西走，穿過幾條街，到了城西的街區。</p>\n<p>說是城西，其實靠近這片的地方氣質已經有些不同了。</p>\n<p>白無極第一個感知到的是聲音的變化，或者說是少了什麼。</p>\n<p>剛才穿過的幾條街，哪怕是普通的住宅街，也有小孩跑來跑去的聲音，有人在院子裡說話，有人扯著嗓子叫街坊吃飯。但從那條叫「清水巷」的地方往西走，聲音漸漸少了，攤子也稀疏了，就連路邊坐著的幾個老人，都是那種把背縮得很緊、眼神往地上看的姿勢。</p>\n<p>白無極放慢了腳步。</p>\n<p>他走過一個賣糖蒸栗子的攤子，那個賣栗子的中年男人一看見他，立刻把目光移開了，手上翻栗子的動作沒停，但整個人變得很緊繃，就像是窗邊的燭火被什麼吹了一下，雖然沒滅，但明顯縮小了。</p>\n<p>白無極走過去，在攤子前站定，「老闆，來兩錢的栗子。」</p>\n<p>「……好，好嘞。」男人低著頭挖栗子，動作有點快，像是想趕緊把錢收了把人送走。</p>\n<p>白無極把錢放在攤子上，等了一下，忍不住問，「老闆，這片街區怎麼了？我剛從東邊過來，感覺這邊……」</p>\n<p>「沒怎麼，」男人的聲音壓得很低，幾乎是在說話和不說話的邊界上，「正常。」</p>\n<p>「不像正常。」</p>\n<p>男人終於抬起頭，往白無極臉上看了一眼，然後非常快地又移開了，「客人，這邊的事情你不要問，拿著栗子，別在這裡多待。」</p>\n<p>他把紙包的栗子遞過來，手有點抖。</p>\n<p>白無極接過來，沒有走，繼續問：「這一片是誰的地頭？」</p>\n<p>男人閉上了嘴。</p>\n<p>旁邊路過的一個老婆婆聽見了，側目看了白無極一眼，那眼神裡有憐憫，也有某種奇怪的悲涼。白無極與她對視，老婆婆嘆了口氣，低下頭繼續走路，什麼都沒說。</p>\n<p>白無極把栗子裝進袖子裡，往城西繼續走。</p>\n<p>再往前走了大約三條街，他看見了一面告示牌。</p>\n<p>是一張很大的公告，貼在街口的磚牆上，紙張的邊角已經有點舊了，但字跡清晰：</p>\n<p>「陳氏商行蒼雲城西區靈力徵繳公告——凡在本區域從事靈契修習者，每月需按靈契等級繳納相應靈力份額，具體標準如下：契徒一至三成，契士三至五成，違者……」</p>\n<p>白無極把後半段看完，把那幾個字在腦子裡消化了一下。</p>\n<p>靈力份額。</p>\n<p>他在進入這個世界之前，已經大致了解了靈契體系的基本原理：靈契者和天地立約，借取力量，但借用的代價因靈契種類和等級而異。有的是消耗體力，有的是消耗壽命，有的是消耗精神，各有不同。底層的契徒，靈契代價本來就已經很重，再在這個基礎上被要求額外繳「靈力份額」——</p>\n<p>白無極把告示從頭看到尾，看了一遍，又看了一遍，把欄目裡「違者沒收靈契資格」幾個字盯了幾秒。</p>\n<p>沒收靈契資格，意思是如果繳不上，強行解除你的靈契。</p>\n<p>強行解除靈契意味著什麼，視靈契種類而定，輕的是從此失去修習能力，重的是人直接廢了，還有更重的……</p>\n<p>「嘿。」</p>\n<p>旁邊一個聲音。</p>\n<p>白無極回頭，是一個大約十五六歲的少年，穿著打補丁的衣服，蹲在牆角，懷裡抱著膝蓋，眼神怯怯地看著他，「大哥，別看那個，陳家的人每隔幾天就在這條街上轉，你別在那個牌子前面站太久，讓他們看見，麻煩。」</p>\n<p>白無極看了那少年一眼，「你在這裡？」</p>\n<p>「我……我阿爺的攤子在那邊，我幫他守著，」少年眼神在告示牌上轉了一下，又移開，「我阿爺是個低階契徒，他這個月的靈力繳不夠，陳家的人說下個月要連補兩個月的，再繳不上就……」</p>\n<p>他沒說完後半句，但白無極聽懂了。</p>\n<p>少年用腳後跟蹭了蹭地面，「你是外地來的吧，外地人不知道，這邊的陳家跟城東的蘇家不一樣，他們在這片區域……反正，你知道就好。」</p>\n<p>白無極把手裡的栗子紙包拆開，把裡面的栗子倒了一半在少年腦袋上的磚牆邊，「吃點。」</p>\n<p>少年愣了一下，沒說話，但手伸過去捏起一顆栗子，慢慢剝了吃了。</p>\n<p>白無極繼續往前走，心裡把這件事沉澱了一下。</p>\n<p>這個世界的底層邏輯他已經大致摸清楚了：四大家族分割地盤，各自用自己的方式管轄，蘇家在城東的氣象和這邊完全不同，城東至少有個「讓人過日子」的底色，城西這一片，則是被人踩在腳下過日子的底色。</p>\n<p>陳家。</p>\n<p>白無極把手攏進袖子裡，眼神裡多了一個什麼東西。</p>\n<p>他從來不是個天生的英雄，沒有那種看見不平事就熱血沸騰、要改天換地的衝動，更不是什麼救世主。但他有一條底線，跟原來世界一樣，換了個地方也不會變——</p>\n<p>有些事看見了就是看見了，轉頭假裝沒看見，這個做不到。</p>\n<p>況且他也沒打算做什麼大事，就是路過，就是逛街，就是看見了。</p>\n<p>他把剩下的栗子一顆一顆嚼完，把紙包捏成一團，扔進了路邊的一個廢料桶裡，繼續往前走。</p>\n<p>街口，有個老人在收攤，動作很慢，收一件東西就要停下來歇一口氣，臉上的皺紋很深，像是被什麼壓了很多年的樣子。旁邊沒有人幫他，過路的人繞著他走，都沒有停下來。</p>\n<p>白無極路過，停了一下，幫他把最重的那個包袱放到了板車上。</p>\n<p>老人抬起頭，驚訝地看了他一眼，嘴唇動了動，「謝……謝謝。」</p>\n<p>「順手。」</p>\n<p>白無極把手拍了拍，轉身，繼續往前走，走出了幾步，又回頭看了那個老人一眼。</p>\n<p>他不知道這個老人是不是那個少年的阿爺，也不知道他繳不繳得出那個月份的靈力，但這個城西街區的壓抑氣氛，像是一塊石頭，壓在了他的某個地方。</p>\n<p>暮色漸深，蒼雲城的燈火在各個方向亮起來，城東那邊燈火密集，城西這裡稀疏，像是兩個不同的世界。</p>\n<p>白無極走了一段，站在街口，看了一眼前方的方向，把方位在腦子裡記住了，轉身往回走。</p>"}, {"title": "第16章_路見不平", "content": "<p>第16章　路見不平</p>\n<p>第二天，白無極原本打算繼續在城裡逛，把他還沒走到的那幾條街摸清楚。</p>\n<p>他出門的時間有點晚，接了公會的一個採集任務，在城外花了大半天，下午才回來。回城的時候從南門走，繞了一段路，不知不覺又走到了城西那片。</p>\n<p>遠遠地，他聽見了動靜。</p>\n<p>不是什麼響亮的聲音，就是那種沉悶的撞擊聲，夾雜著人痛苦時壓著嗓子發出的聲音。這種聲音他聽過，很多人打架的時候聲音其實不大，就是這樣的，悶的。</p>\n<p>白無極往聲音的方向走了過去。</p>\n<p>一條窄巷子，兩棟舊屋之間的夾縫，寬度只夠兩個人並排走。巷子裡有三四個人，穿著統一的深色衣服，腰間掛著一個陳字花紋的腰牌，正在對著一個跪在地上的老人動手。老人一手護著頭，另一手撐著地，喘著粗氣，但沒有叫出聲，就是縮在那裡，脊背弓成了一個很小的弧度，像是一隻縮進殼裡的老烏龜。</p>\n<p>「說清楚，上個月的份額差三成，這個月又欠，你是不是想賴帳？」</p>\n<p>「不是……老漢不敢……老漢真的拿不出來，你們行行好……」</p>\n<p>「行好？陳家的規矩是規矩，你一個老廢物，靈契修到這把年紀連二階都沒到，有什麼用，佔著位置不繳份額……」</p>\n<p>說話的那個人腳尖往前一踢，踢在老人護頭的手臂上，老人往旁邊歪了一下，低呻了一聲。</p>\n<p>白無極停下腳步。</p>\n<p>他站在巷子口，看了整個場面大約三秒，然後開口，聲音不大，但在那條安靜的窄巷子裡很清楚，「停一下。」</p>\n<p>幾個陳家的人同時轉頭，看見了站在巷子口的白無極。</p>\n<p>「滾，」其中一個人說，那口氣很隨意，就是那種「我們在辦正事，路人趕快走」的語氣，「不相干的人，不要在這裡礙事。」</p>\n<p>「礙事，」白無極走進了巷子，「但我就是礙事的性格，怎麼辦。」</p>\n<p>領頭的那個人臉色沉了下來，打量了白無極一眼，「你是什麼人？陳家的事，你少管。」</p>\n<p>「陳家，」白無極在幾步遠的地方停下來，視線從那個老人身上掃了一眼，再回到那幾個人臉上，語氣比剛才輕了一些，但眼神裡的東西變得更直接，「打一個老人，催收靈力份額，這就是陳家的事？」</p>\n<p>「廢話，欠著陳家的份額，不追就算了？」</p>\n<p>「那麼多說無益，」白無極把手攏了攏，向那幾個人走近，「讓開，讓老人走。」</p>\n<p>領頭的人猛地笑了，回頭跟旁邊的人說了句什麼，幾個人哄笑起來，「讓開？你說讓開就讓開？你是什麼來頭，到這個地方來管陳家的事？」</p>\n<p>「讓開。」白無極沒再廢話，重複了一遍，聲音平靜。</p>\n<p>然後其中兩個人同時衝上來——這種路人跳出來說廢話的情況他們見過太多，幾乎是下意識地，就是先打再說的反應。兩個人都是契士，一個激活了護甲型靈契，一個手上亮起了靈契衝擊的前搖光芒。</p>\n<p>白無極沒有後退。</p>\n<p>他往前走了半步，錯開了那個激活護甲的人的正面，身體微微側轉，左手格住對方護臂往外一撥，打破對方的衝勁，緊接著右肘往後一頂——這個動作在技術上叫「頂肘」，是利用自己的手肘去頂住對方靠近的那個人，用整個脊背的旋轉力度作為支點。</p>\n<p>那個護甲契士被頂肘撞了一下，護甲吸收了衝擊但人往右踉蹌了一步。</p>\n<p>第二個人的靈契衝擊已經打出來了，白無極俯身讓過去，沒有停，繼續往前推進，直接進到那人的靈契攻擊有效距離之內，近到靈契展開都是奢望。他抓住那人的右臂，腰腿一發力，把那人整個帶倒，控在地上，膝蓋壓住對方的手臂。</p>\n<p>「嗯！」那人掙扎，但掙不動。</p>\n<p>白無極按著他沒有起來，轉頭看向剩下幾個人。</p>\n<p>「你！」領頭的那人臉色鐵青，抽出了腰間的短刃，靈契在刀刃上亮起，「你知道你在對付誰嗎！你管了陳家的事，你活不了！」</p>\n<p>「你說的這句話，」白無極站起來，手裡還抓著那個被他控住的人的衣領，把他拎了起來，像是拎一隻貓，「我可以還給你。」</p>\n<p>他走近了，走到領頭那人面前，把手裡的人一放，視線直視那個領頭者，「你知道你在打誰嗎？」</p>\n<p>這句話說出來，那個領頭者愣了一下，手裡的短刃本能地往後縮了縮，然後意識到自己退縮了，又逼回來，「說廢話！你一個路人，管陳家——」</p>\n<p>「你知道你在打誰嗎。」白無極重複了一遍，這次語氣更輕，不是在問，是在說。</p>\n<p>那個領頭者對上他的眼神，說不清楚為什麼，手有點抖了。</p>\n<p>不是因為害怕，是因為那雙眼神不像他遇見過的普通人，那種冷靜不是武力強橫的人才有的那種張揚的冷靜，而是某種更讓人不舒服的東西，像是一個人站在更高的位置往下看，覺得這裡的一切都盡在掌握裡，所以才顯得那麼從容。</p>\n<p>「今天算了，」白無極說，「回去。」</p>\n<p>「你！」</p>\n<p>「今天算了，」白無極把他的衣領拎起來，然後推開，「回去。」</p>\n<p>幾個人互相看了一眼，扶起倒地的同伴，最終，那個領頭者咬著牙，往巷子另一頭走，邊走邊道，「你等著，你等著！陳家的事你敢管，等著！」</p>\n<p>聲音越走越遠，消失在巷子盡頭。</p>\n<p>白無極轉過身，跪在地上的老人還沒站起來，還維持著那個縮起的姿勢，整個人在輕微地顫抖，不是因為受傷嚴重，更多是後怕。白無極蹲下來，把老人扶了起來。</p>\n<p>「老人家，傷到了嗎？」</p>\n<p>「沒、沒有大礙，」老人抬起頭，渾濁的眼睛看了白無極半天，眼眶有點紅，「年輕人，謝謝你，謝謝……但你惹了陳家，你要小心……」</p>\n<p>「不礙事，」白無極扶著他站穩，「你住哪裡，我送你回去。」</p>\n<p>「不用，不用，老頭我行的，」老人把腰弓了一下，往前站穩，顫著手把衣服整了整，「你快走，快走，這裡不安全，陳家的人一會兒就會來更多的。」</p>\n<p>白無極看他確實走得穩，才讓他去，目送他拐進了旁邊的一個小巷子。</p>\n<p>他在原地站了一會兒，把腰間的衣帶重新繫了繫，把手攏到袖子裡，走出巷口。</p>\n<p>城西的街道上，日影拉得很長，夕光把地面的石板照得橘紅，沒有什麼人，偶爾有人走過，都不敢看他，或者說不敢看這條剛剛出過事的巷子。</p>\n<p>白無極吸了口氣，把陳家這兩個字在腦子裡轉了一圈，默默記住了。</p>\n<p>然後往回走，找個地方吃飯。</p>"}, {"title": "第17章_陳家的契將", "content": "<p>第17章　陳家的契將</p>\n<p>消息在夜裡傳到了陳家在蒼雲城的辦事處。</p>\n<p>陳家在城西有一棟四層的大樓，是整片城西最高的建築，外牆刷成深灰色，門口常年有人把守，有外人走近就會被示意離開。城西的居民私下管這棟樓叫「灰塔」，不是什麼好詞，但說的人也不多，說了也沒用。</p>\n<p>把守這個分辦事處的人叫魯興，年約四十，一雙圓眼，身量粗壯，是陳家的契將，統管城西區的靈力徵繳和「秩序維護」——後者是官方說法，民間的翻譯是：誰不老實就打誰。</p>\n<p>他聽完手下的匯報，坐在那把厚重的椅子上，把那個「有人攔截徵繳隊」的細節又問了一遍。</p>\n<p>「就一個人？」</p>\n<p>「是，一個年輕人，不到三十，沒有靈契波動，用的是拳腳，兄弟們是契士，但那幾個……兩個被他放倒，領頭的跑了。」</p>\n<p>魯興把手指在桌面上敲了幾下，「體術？」</p>\n<p>「看起來是，但那個力道不像普通體術，打倒的幾個人說，跟捱了一道中品衝擊差不多。」</p>\n<p>「中品衝擊，」魯興重複了一下，眼神往上翻了翻，「體術打出靈契中品的力道？」</p>\n<p>「是說不太對，但現場就是這樣。」</p>\n<p>魯興站起身，在屋子裡轉了幾步，想了一下，「這個人，是在找死，還是想出名？」</p>\n<p>「不知道。」</p>\n<p>「查過他是誰嗎？」</p>\n<p>「問了公會，說是個外來的F級契徒，名叫白無極，」手下的人說，聲音帶著點不確定，「但長老，這個級別……」</p>\n<p>「F級。」魯興停下來，哈了一聲，「一個F級，打了我陳家的人，還讓他們走了？」</p>\n<p>這句話說出來，整個屋子裡的氣氛沉了一截。旁邊站著的幾個人都把頭低了一下，沒有人接話。</p>\n<p>「讓我陳魯興的人走，還讓他說了一句『今天算了』？」魯興的語氣已經不是在發問，更像是在說一件他認為荒謬的事情，「他覺得他有資格說算了。」</p>\n<p>他轉回到桌子旁邊，把桌上的一個杯子端起來，喝了一口，「去，把那個白無極的住址找出來。」</p>\n<p>「長老是要……」</p>\n<p>「不用找，」魯興把杯子放下，「讓他出來，我親自去，廣場，明天正午。」他說，「放話出去，讓蒼雲城的人都知道，我陳魯興要教訓一個不知天高地厚的F級體術者。」</p>\n<p>放話的意思，不只是找白無極，而是要讓城西的人看見，看見陳家處理不聽話的人的方式。</p>\n<p>這種事他做過不少次，效果很好，能讓那些心裡有小動作的人老實一段時間。</p>\n<p>手下的人領命，去安排了。</p>\n<p>---</p>\n<p>消息的傳播速度很快。</p>\n<p>也可能是因為「陳家的契將要在廣場打人」這種事情夠有話題性，不到一個時辰，蒼雲城西區的大半人都知道了這件事，然後消息滲進城東，滲進公會，滲進酒館，滲進各種有人的地方。</p>\n<p>白無極知道這個消息的時候，他正在一個包子攤前坐著。</p>\n<p>夜市剛開，這個包子攤是城裡評價不錯的一家，皮薄餡多，湯汁飽，攤主是個大嗓門的婦人，白無極在這裡吃過兩次，覺得不錯。他正在吃第二個包子，旁邊幾個路人站在那裡壓著聲音說話，說著說著，聲音越來越大，越說越帶勁。</p>\n<p>「……聽說那個體術者是外來的，F級，你沒聽錯，F級，就他打了陳家的人……」</p>\n<p>「F級能把契士放倒？」</p>\n<p>「是啊，所以魯興要出來了，他一個契將，找一個F級，這……」</p>\n<p>「魯興那個人，你是不知道，他手底下不知道死了幾個反抗陳家的契師，他出手沒有輕手，那個外來的孩子死定了……」</p>\n<p>白無極咬了一口包子，嚼了嚼。</p>\n<p>旁邊那幾個路人說得興起，沒注意到他在聽，繼續說，「你說那個外來的，叫什麼白什麼極的，他是真的不知道陳家有多可怕，還是說……」</p>\n<p>「誰知道，沒聽說有什麼背景。」</p>\n<p>「那就是不知死活唄。」</p>\n<p>白無極把包子吃完，用帕子擦了擦手，把錢放在桌上，側頭問了一下旁邊的人，「那個陳家的人，說是在廣場等著，哪個廣場？」</p>\n<p>那幾個人同時轉過頭，看見他，愣了一下，「你……」</p>\n<p>「我想去看看，」白無極站起來，拿起最後一個包子，咬了一口，「謝謝。」</p>\n<p>他走了幾步，又回頭，「明天幾時？」</p>\n<p>那幾個人還沒反應過來，其中一個人機械地回答，「正午，西城廣場……」</p>\n<p>「行，」白無極點了點頭，把包子舉了舉，「包子還不錯，下次你們也來這家試試。」</p>\n<p>他轉身走了，留下幾個一臉茫然的路人站在原地。</p>\n<p>其中一個人呆了半天，慢慢說，「……剛才那個，是那個白無極吧？」</p>\n<p>「我覺得是。」</p>\n<p>「那他剛才問的是……」</p>\n<p>「他打算去，我猜。」</p>\n<p>「……」</p>\n<p>街燈的光照在那幾個人臉上，每個人的神情都有點複雜，說不清楚是為白無極擔心，還是覺得這個人的淡定超出了人類正常的應激範圍。</p>\n<p>白無極拿著半個包子走在夜街上，沒有往家的方向走，反而轉了個方向，往西城廣場走了一趟，把地形看清楚，記在腦子裡。</p>\n<p>廣場挺大，地面平整，四面開口，有利有弊。</p>\n<p>他在廣場邊站了一會兒，腦子裡走了一遍明天可能的交手方式，然後把包子吃完，把手攏到袖子裡，往回走。</p>\n<p>夜風有點涼，蒼雲城的夜晚沒有什麼特別的聲音，偶爾有幾聲犬吠。</p>\n<p>腦海裡，白金之星在那顆金球旁邊踱著步，黃金體驗在研究路邊的一叢雜草，白無極和它們對了個眼神，感覺到一種某種程度上的默契。</p>\n<p>不用說話，那種感覺很奇怪，就是知道對方知道自己知道明天的事。</p>\n<p>「嗯，」白無極輕聲說，也不知道說給誰聽，「明天就讓他們看看吧。」</p>"}, {"title": "第18章_你們看得見嗎", "content": "<p>第18章　你們看得見嗎</p>\n<p>西城廣場在正午前一個時辰就開始聚人了。</p>\n<p>這種事在蒼雲城不算第一次發生，陳家的手下向來喜歡用公開的方式立威，但這次不同的地方在於——魯興要親自出來，而且放話打的是一個F級體術者。這種懸殊，本身就夠吸引人圍觀了。</p>\n<p>廣場四面的街口都站了人，有站得靠前的，有站得靠後的，城西的老住戶很多站在遠處，表情沉默，城東那邊聽到消息好奇跑來看熱鬧的人反而往前擠，嘰嘰喳喳說個不停。</p>\n<p>公會那邊也有人注意到了這件事，陸鎮遠在聽到消息之後靜靜地停頓了一下，然後問了一句，「那個白無極知道消息了？」</p>\n<p>「知道了，昨晚當場問的人，」消息傳來的人說，「他還問了廣場在哪。」</p>\n<p>「他打算去。」陸鎮遠說，這不是問句。</p>\n<p>「看起來是。」</p>\n<p>陸鎮遠沉默了一會兒，叫了一個人去廣場那邊盯著，看看情況。他沒有多說什麼，但心裡把那個備注欄裡的評定又往上移了半格。一個人知道對手是陳家的契將，還主動去，要麼是真的不知死活，要麼就是他有那個底氣。</p>\n<p>而他的備注欄已經寫的是「至少契將級」，所以……</p>\n<p>蘇念卿也知道了這件事。</p>\n<p>消息是霜翎帶來的，霜翎在靈契空間出來的時候就直接把城裡的動向跟她說了，話說完，兩雙眼睛一起看向蘇念卿，等著她的反應。</p>\n<p>蘇念卿放下手上的書，指尖在桌面上輕輕敲了兩下，「白無極要去？」</p>\n<p>霜翎點了點頭。</p>\n<p>「魯興的實力是契將中品，手下的人有十幾個契師，」蘇念卿站起來，把外袍整了整，「他一個人去，蘇家要不要管？」</p>\n<p>這個問題問的是她自己。</p>\n<p>她在屋子裡走了兩步，在窗邊站了一下，外面的陽光照進來，照在她臉上，她想了幾秒，「走，去看看。」</p>\n<p>---</p>\n<p>正午。</p>\n<p>白無極從包子攤那邊出來的時候，剛好是正午時分，廣場已經站了密密麻麻的人。他站在廣場邊上，往人群裡看了一圈，估計了一下圍觀的人數，大概有三四百人，把廣場四面圍得水洩不通，留出了中間一大塊空地。</p>\n<p>他手裡拿著一個包子，還沒吃完，走進廣場中央，找了個中間的位置站定。</p>\n<p>人群裡有聲音起來，「來了來了！」「就是他！就是那個F級！」「這麼年輕？」</p>\n<p>然後另一邊，廣場北面的人群讓開了一條路。</p>\n<p>魯興走出來。</p>\n<p>這個人比白無極高出半個頭，肩寬背厚，靈契的氣息從他身上往外散，帶著一種顯而易見的壓制感，那是長年修習的契將體質帶來的氣場，跟白無極在蘇家見到的那幾個契師完全是不同的量級。他身後跟著四五個人，都是契師，但一眼就能看出來是護衛跟隨，這場戲的主角就是魯興本人。</p>\n<p>魯興走到廣場中央，在白無極面前停下，上下打量了他一眼。</p>\n<p>「就你？」他的聲音很大，帶著某種理所當然的輕蔑，「F級。在城裡攔了我陳家的人，說了一句『今天算了』？」</p>\n<p>「嗯，」白無極點了點頭，把包子咬了最後一口，嚼了嚼，「說了。」</p>\n<p>「F級說今天算了，」魯興重複了一下，然後哈了一聲，那種嘲諷的笑意很明顯，「蒼雲城裡還真有不怕死的東西。」</p>\n<p>「我不是不怕死，」白無極把包子紙袋捏成一團，往旁邊地上一扔，「就是習慣不過頭。」</p>\n<p>「習慣不過頭？」魯興咀嚼了一下這個詞，表情顯示他不太理解，但也沒有興趣多理解，「那你今天就在這裡讓這些人看看，F級不過頭的代價是什麼。」</p>\n<p>他說完，靈契直接激活。</p>\n<p>不是慢慢展開的那種，是一瞬間全力打開——魯興的靈契是「玄石甲」，壓制型護體靈契，激活的瞬間，他整個人的輪廓像是多了一層看不見的厚度，然後這種「厚度」往外延伸，形成了一個以他為中心的壓制領域。</p>\n<p>氣壓驟降。</p>\n<p>這種感覺不是比喻，而是真實的物理效應，魯興的靈契領域能夠在一定範圍內壓縮空氣，讓所有在領域範圍內的人都感受到一種來自四面八方的沉重壓力，像是突然被放進了水底。</p>\n<p>廣場邊緣的圍觀者中，有幾個靈契弱的人下意識往後退了一步，低階契徒們臉色都白了幾分，連站都有點站不穩。</p>\n<p>中央的白無極站在那個領域的中心，是感受最強的地方。</p>\n<p>氣壓壓下來，那種沉重的感覺確實存在，白無極站在那裡，呼吸沒變，只是感覺到肩膀上多了一些重量，腳下的地面像是比剛才更紮實了。</p>\n<p>他把八極拳的架子站好——兩腳開立，拳收腰間，重心微沉。</p>\n<p>魯興看見他的架勢，走了過來，步伐沉穩，不急不慢，因為在他看來，這場不需要急，壓制領域已經讓這個F級喘氣都困難，他走過去直接打就是了。</p>\n<p>第一輪交手，魯興右拳帶著靈契加持直衝過來，那個靈契衝擊在拳面上展開，不只是物理衝擊，還有領域壓制同步疊加，雙重打擊。</p>\n<p>白無極讓了大半步，但那個靈契氣浪還是掃了一下他的左側，他被震得後退了兩步，腳跟在地面上蹭出兩道痕跡。</p>\n<p>人群發出一陣聲音，「果然不行」「F級就是F級」——</p>\n<p>白無極站穩，活動了一下左肩，確認了一件事：純靠肉身硬扛領域壓制疊加靈契衝擊，確實吃虧，這個組合讓他每次被蹭到都比普通挨打要損耗得多，不能一直這樣打。</p>\n<p>好，換個方式。</p>\n<p>他低下頭，嘴角輕輕往上動了一下，一個幾乎看不見的細微弧度，然後精神力從腦海中的金球往外一輸。</p>\n<p>那種感覺像是一道光從腦海往外推，從脊柱往上走，到肩膀的位置，停下，然後——</p>\n<p>白金之星從他背後浮現出來。</p>\n<p>沒有聲音，沒有光效，就是這樣靜靜地從他的身後現身，像是一個影子從牆上走出來，但比影子更實在。它高大，比白無極高出了一個頭，星空色的鎧甲在陽光下沒有反光，反而像是吸收了光線，呈現一種深邃的深藍，臉孔立體，沉默，雙拳垂下，等待著。</p>\n<p>白無極站在那裡，沒動。</p>\n<p>但在所有人的眼中——</p>\n<p>魯興的胸口忽然凹陷了進去。</p>\n<p>就這樣，什麼前搖都沒有，什麼風聲都沒有，就是「砰」的一下悶響，那一拳的衝擊力讓他整個人向後飛了半步，護體靈契的玄石甲應激亮起，但那個護甲在吸收了絕大部分衝擊之後，表面浮現出了幾條細裂紋。</p>\n<p>全場。</p>\n<p>安靜了。</p>\n<p>魯興站在那裡，愣了一秒，然後感覺到胸口傳來的那股鈍痛，低頭看了一眼，護甲的裂紋就在那裡，真實存在的。他猛地抬起頭，看向白無極。</p>\n<p>白無極站在原來的位置，一步都沒動，雙手垂在兩側，面無表情地看著他。</p>\n<p>「什麼……」魯興的眼神裡出現了困惑，第一次，「什麼靈契？」</p>\n<p>他的靈感感知往白無極那個方向探去，探到了——某種力量的殘留，一種極度強烈而且密度極高的精神力衝擊留下來的痕跡，但沒有形體，沒有靈契波動的頻率，就像是打在空氣上的拳頭，留下了痕跡卻找不到源頭。</p>\n<p>「這怎麼可能？」旁邊跟著他來的一個契師低聲說，臉色有些奇怪，「他明明沒動……」</p>\n<p>人群裡，有幾個靈感強的人也隱約感知到了那種殘留，但完全無法判斷那是什麼，只能確認：那裡有東西，強大的東西，但他們什麼都看不見。</p>\n<p>廣場上的氣氛，在那一拳之後，悄悄變了。</p>"}, {"title": "第19章_看不見的拳頭", "content": "<p>第19章　看不見的拳頭</p>\n<p>魯興的靈感感知在那個方向探了幾次，都是同樣的結果：有東西，但看不見，感知邊緣只能捕捉到一種極高密度的精神力殘留，像是什麼東西掠過之後留下來的尾跡，但主體本身完全找不到。</p>\n<p>這讓他第一次感到了某種不適。</p>\n<p>不是恐懼，是困惑，而困惑對一個習慣掌控局面的強者來說，本身就是一種壓力。</p>\n<p>他深吸一口氣，把靈契全力輸出，玄石甲的裂紋在靈契補充下慢慢彌合，同時他的感知範圍往外擴張，試圖找到攻擊的源頭——對方的某種隱形靈契？還是特殊的精神力攻擊型靈契？他沒遇過，但不代表不存在。</p>\n<p>「你用的是什麼。」他盯著白無極，不是問，是在要求回答。</p>\n<p>「拳頭，」白無極說，「天生的。」</p>\n<p>魯興收緊了眼神，「廢話。」</p>\n<p>他往前衝，這次沒有試探的意思，靈契領域加強輸出，氣壓進一步壓下來，整個廣場的圍觀者中，前排的人都感覺到胸口被什麼東西擠壓，下意識地往後退，後排的人感覺不強，但也察覺到了氣氛的沉重。</p>\n<p>魯興的速度很快，契將的身體素質不是契師能比的，在靈契加持下，他的速度幾乎是瞬移，一步衝到白無極面前，連環出拳，三拳，靈契衝擊叠加著氣壓，往白無極上中下三路同時壓來。</p>\n<p>白無極站在那裡，依然沒動。</p>\n<p>或者說，在所有人的眼中，他沒動。</p>\n<p>腦海裡，白金之星接到指令的那一瞬間，就已經出手了。</p>\n<p>它的速度是白無極現在所能達到的最快，沒有之一——不受物理定律的限制，不受空氣阻力的約束，那雙拳的移動速度在眾人的感知盲區裡，從一個方向出現，在另一個方向消失，連殘影都沒有留下。</p>\n<p>它側身讓過魯興的第一拳，然後出手。</p>\n<p>右拳，魯興的靈契護臂位置，側面——</p>\n<p>砰。</p>\n<p>不是大的衝擊聲，而是那種密實的、硬碰硬的悶響，好像兩塊硬物相互撞擊的聲音，但沒有前搖。</p>\n<p>魯興的右臂在他毫無防備的情況下被命中，靈契護臂吃下這一擊，紋路閃動，但他的整條手臂被那股力道打得往旁邊偏了，他第二拳的路線偏移了，第三拳的節奏也因此被打亂。</p>\n<p>他愣住了，停了一下，往被打的位置看了一眼——沒有任何痕跡，沒有人，沒有接觸點，什麼都沒有，但那股衝擊是真實的，精確命中了他靠裡側的護臂薄弱點。</p>\n<p>他感知往那個方向又探了一次，捕捉到了什麼——</p>\n<p>那個東西又動了。</p>\n<p>這次是從他的左後方，那個方向沒有人，他的後側，根本就沒有人在那個角度，但感知告訴他那裡有一個極其強烈的精神力聚集點，正在移動，移動速度快到難以追蹤。</p>\n<p>他本能地往那個方向轉，護甲往左後方加厚。</p>\n<p>然後被打中了右側。</p>\n<p>砰——</p>\n<p>右肋，護甲沒有準備，被那一拳實實在在地命中，靈契在接觸的瞬間應激亮起吸收衝擊，但那拳的力道不是一般的強，是那種穿透力很強的貫穿式衝擊，把靈契護甲的吸收效果打穿了一層，餘勁透進皮肉，他感覺到了真實的鈍痛。</p>\n<p>魯興往後退了一步，穩住。</p>\n<p>「ORA。」</p>\n<p>白無極輕聲說了這個字，就像在做某種確認，或者某種指令。</p>\n<p>腦海裡，白金之星的雙拳同時運動起來。</p>\n<p>那不是普通的連擊，是在對方視野和感知盲區裡的高速連鎖打擊，每一拳都精確地計算落點，精確地回避魯興感知到之後加強防護的那個位置，每當魯興的感知追上了白金之星的移動軌跡，它已經換了一個方向，從另一個角度打進來。</p>\n<p>魯興開始被動了。</p>\n<p>他感覺到攻擊在全身各個方向此起彼伏地落下，但完全找不到對方的主體，那個力量的感知殘留在他的感知範圍內像幽靈一樣穿梭，他每一次伸出手想要格擋或者反擊，手的落點都是錯的，抓到的都是空氣，而那拳已經打到了他沒有護住的地方。</p>\n<p>護甲上的裂紋開始增加。</p>\n<p>右肩，裂紋，砰。</p>\n<p>左側腰，砰。</p>\n<p>正面胸口，這次重，護甲開裂的聲音更大，他被震退了兩步，腳踩在地面上留下了深深的兩個凹陷，才勉強穩住。</p>\n<p>「你！」魯興第一次開口叫了出來，不是在說話，是在用聲音定位，「你在哪裡！」</p>\n<p>廣場周圍，所有圍觀的人都看見了一個畫面：</p>\n<p>魯興，在廣場中央，被一個看不見的對手毆打。</p>\n<p>他在轉，在格擋，在反應，有時候格擋成功了，有時候沒有，護甲上的裂紋越來越多，他的步伐開始從容變成慌亂，但他的對手——那個白無極——站在五六步遠的地方，一步都沒動，雙手垂著，像是在看什麼不重要的事情。</p>\n<p>「這……什麼靈契……」</p>\n<p>「看不見，什麼都看不見……」</p>\n<p>「那個力量，是那個人身上的嗎……」</p>\n<p>圍觀的人群已經開始騷動，壓著聲音討論，前排的幾個靈感強的人試圖感知那個看不見的力量，每次都能感受到那股強大的精神力存在，但就是找不到它的形體。</p>\n<p>人群外側，某個距離廣場稍遠的位置，蘇念卿站在那裡。</p>\n<p>她來得不算早，人群已經密了，她沒有往前擠，就站在外圈，踮起腳能看見廣場中央的情況。霜翎趴在她肩頭，耳朵豎立，眼睛瞪大，那雙銀色的眸子緊盯著廣場中央，尾巴的毛微微炸開了。</p>\n<p>蘇念卿的臉上沒有太多表情，但她的手指悄悄收緊，按在袖邊的位置。</p>\n<p>她感知了一下，那個範圍內的力量——她的靈感比普通人強，但那個看不見的存在，她也只能感覺到它在移動，感覺到它的力量密度，她完全捕捉不到它的形狀。</p>\n<p>那是什麼？</p>\n<p>這個問題在她腦子裡轉了一下，但轉了之後沒有答案。</p>\n<p>廣場中央，魯興的玄石甲已經半崩了，他的臉上第一次出現了流汗的痕跡，不只是因為損耗，而是因為那種打了根本找不到對手的感覺，帶來了一種高強度的心理壓力。他是契將，在蒼雲城，他沒有遇見過對手，他以為這個白無極就算再強也有上限，但那個看不見的東西……</p>\n<p>白金之星調整了位置，繞到魯興的正面，那雙拳聚攏起來，蓄力。</p>\n<p>白無極在那個瞬間感受到了精神力的集中，也感受到了這場打鬥的終點。</p>\n<p>「最後一拳，」他沒有說給在場的任何一個人聽，只是輕聲說，「打他的靈契核心。」</p>\n<p>白金之星的右拳往前，全速。</p>\n<p>那一拳落下的瞬間，魯興感知到了那股力量的集中，做了本能的防禦——把靈契全部聚到正面，玄石甲的最後的完整部分往護胸的位置集中，試圖用最強的防禦層抵擋。</p>\n<p>但那一拳的落點不是護甲最厚的正面。</p>\n<p>白金之星的精準度是這個世界上很少有任何東西能匹敵的，那一拳在半路微微偏了一個角度，從護甲的側面透進去，精確地打在護甲背後魯興靈契核心懸浮的那個位置——那是整個玄石甲靈契的根，是全部靈契能量的凝聚點。</p>\n<p>一拳命中，靈契核心被這股精確而強烈的精神力衝擊打碎了結構，破碎的感覺像一個氣泡瞬間爆裂，玄石甲的全部靈契紋路在同一秒閃爍，崩散，護甲的碎片化作靈光在空中消失。</p>\n<p>魯興靠著本能的慣性往後退了一步，兩步，三步，腳跟踏不住地面，整個人轟然向後倒去，後腦勺在地面上撞出一聲悶響，在廣場上掀起了一股氣流，地面的塵土揚起。</p>\n<p>然後他就躺在那裡，一動不動。</p>\n<p>不是死了，只是靈契崩散之後，整個人的精神力空了，短時間內站不起來。</p>\n<p>廣場上，那種動靜停止了。</p>\n<p>白金之星消失，回到了白無極的背後，然後隱入他的精神力層，就像從來不存在一樣。</p>\n<p>白無極站在那裡，低頭看了一眼倒在地面上的魯興，然後抬起頭，看向廣場四周。</p>\n<p>死寂。</p>\n<p>四面八方的人，所有人都靜著，幾百個圍觀者，沒有任何一個人發出聲音，連呼吸都像是忘了。</p>\n<p>白無極拍了拍手，把袖子放下來，「結束了。」</p>"}, {"title": "第20章_全城震動", "content": "<p>第20章　全城震動</p>\n<p>死寂持續了大概有十個呼吸那麼長。</p>\n<p>這種長度在廣場上顯得不自然，因為通常在一場打鬥結束之後，不管輸贏，圍觀的人總是第一時間發出聲音的，那是人群的本能反應，喝彩、惋惜、議論，什麼都有，總是有的。但這次的安靜超過了正常的長度，那是一種不知道該說什麼、不知道自己看見了什麼，所以暫時失語的狀態。</p>\n<p>然後有人說話了。</p>\n<p>「他……動了嗎？」</p>\n<p>這句話從人群某個不知道哪裡的角落出來，聲音很低，但在那片沉默裡顯得很清晰，</p>\n<p>「他沒動，他根本沒動……」</p>\n<p>「他站在那裡，一步都沒動，但那個陳家的人……」</p>\n<p>「不對，我看見了，有什麼東西，有什麼——就在魯興身邊，但我完全看不清楚，就是有一個……」</p>\n<p>「我也感知到了，是靈契嗎？不對，靈契不是這個頻率，那個東西的精神力密度……我沒辦法描述，比我見過的任何靈契都高，但又完全不像靈契……」</p>\n<p>「那個體術者，他是F級？F級能打出這種結果？」</p>\n<p>「靈契核心被打碎了，我感知到了，就是那最後一拳，精確打進護甲的縫隙，打在核心上，那個精準度……有哪個靈契師的感知能在那麼快的速度下保持這種精準度？」</p>\n<p>「問題是他沒動！你們沒看見嗎，他站在那裡，什麼都沒做，那個陳家的人就倒了！」</p>\n<p>聲音越來越多，人群炸開來，從後排到前排，每個人都在說，每個人都在問，但每個人的問題都得不到答案，因為他們說的那件事，本來就沒有一個符合這個世界常識的解釋。</p>\n<p>「體契者？不可能達到這個速度……」</p>\n<p>「也許是某種隱形攻擊型靈契，但我從沒聽說過這種類型……」</p>\n<p>「那個站著不動就把人打倒的方式，那完全……」</p>\n<p>「什麼都沒看到，他就倒了。」</p>\n<p>「什麼都沒看到，他就倒了。」</p>\n<p>這句話被重複了很多次，從不同的嘴裡說出來，每次說出來，語氣都帶著一種難以消化的震驚。目擊者在嘗試描述他們看見的事情，但語言本身給不了一個合理的框架，所以他們只能反復說這一句話，像是念咒，像是確認這件事真的發生了。</p>\n<p>白無極站在廣場中央，聽著四面的人群把他的事情討論了一個圓，表情沒有什麼起伏，就是那種「聽見了但不太有感覺」的狀態。</p>\n<p>魯興還躺在地上，靈契崩散後人非常虛，但意識是清醒的，他把頭偏了一下，看了一眼倒下的地面，感覺到四面八方的嘈雜聲，再往白無極的方向看了一眼。那個年輕人站在他倒下的地方不遠處，一臉平靜，就像剛才什麼都沒發生。</p>\n<p>魯興嘴唇動了一下，沒說出聲，只是眼神裡有東西在變化，從困惑，到確認，到某種說不清楚的東西。</p>\n<p>白無極沒去看他，轉身往廣場外走。</p>\n<p>「哎，等一下，」旁邊一個聲音突然叫住了他，是個年輕的契士，擠在人群前排，臉上帶著明顯的激動，「你是怎麼做到的？那個……那個看不見的東西，是什麼靈契？你能告訴我嗎？」</p>\n<p>白無極停了一步，看了那個年輕人一眼，「看不見的東西？」</p>\n<p>「就是你剛才打他的時候，那個，根本沒有形狀的，但我能感知到有力量在移動，那到底是……」</p>\n<p>「哦，那個，」白無極想了一下，「就是拳頭。」</p>\n<p>「拳頭？」</p>\n<p>「拳頭。」</p>\n<p>那個年輕人愣了大概三秒，大概是在等一個更詳細的解釋，但白無極顯然沒有繼續說的意思，點了個頭，繼續往外走。</p>\n<p>人群讓出了一條路，白無極走出去，那條路前後的人都往他身上投了視線，安靜的，困惑的，有點敬畏的，各種各樣的，白無極沒有理會任何一個，腳步平穩地走出了廣場。</p>\n<p>廣場外，剛剛走出人群的邊緣，他想起了一件事，停下了腳步，在腦子裡算了一下方向，往包子攤的方向走。</p>\n<p>希望包子還沒涼。</p>\n<p>---</p>\n<p>人群外側。</p>\n<p>蘇念卿站在那裡，看著白無極的背影走出廣場，一直走到轉過街角消失，才把視線收回來。</p>\n<p>她的臉上沒有任何表情，那張臉一貫是這樣的，旁邊的人看不出她在想什麼，就連霜翎趴在她肩頭，也只是把耳朵豎著，時不時把目光往白無極消失的那個方向掃一眼。</p>\n<p>但蘇念卿的右手，悄悄地收緊了。</p>\n<p>就那樣輕輕地，袖邊的布料在指節的位置微微皺了起來，很快又放開，不仔細看看不出來。</p>\n<p>她在消化剛才看見的事情。</p>\n<p>那個她感知到但看不見的東西，那種精神力的密度和移動方式，那種對靈契核心的精準打擊……她不是普通人，她在蘇家從小接受訓練，見過的高手不少，見過的靈契類型也不少，但她從來沒有見過那樣的東西。</p>\n<p>那不像任何一種她知道的靈契，不像任何一種她讀到過的記載。</p>\n<p>那個東西，就算是看不見的，她也感覺到了它的存在——強大，精確，完全服從白無極的指揮，就像是他身體的一部分。</p>\n<p>她想起第一次見到白無極，在那條巷子裡，他徒手震飛了霜翎——霜翎全力衝擊，對上的是他的拳頭。</p>\n<p>她當時說了句「你很有意思」。</p>\n<p>現在，這個評語需要更新一下了。</p>\n<p>蒼雲城的下午，廣場上的人群還沒有完全散去，還有人在說那件事，還有人在問那件事，陳家的幾個契師已經進去把魯興帶走了，臉色很難看，沒有說任何話。</p>\n<p>公會那邊，陸鎮遠在收到現場的消息之後，坐在椅子上，把那份「白無極實力備注」的文件翻出來，在上面寫了一行字，看了看，把剛才寫的那行字劃掉，想了一下，換了一行，寫道：</p>\n<p>「實力評定：未知上限。建議移出常規等級評定，單獨建檔。」</p>\n<p>他停了一下，又加了一行，「密切關注。」</p>\n<p>放下筆，靠回椅背，盯著天花板看了一會兒。</p>\n<p>這個年輕人，是從哪裡來的。</p>\n<p>---</p>\n<p>包子攤的包子還沒涼。</p>\n<p>白無極坐回了剛才的位置，攤主婦人看見他回來，手上還在忙，扯著嗓子問了一句，「怎麼了，廣場那邊是不是出事了？剛才人流都往那邊去，我生意都少了些。」</p>\n<p>「出了點事，」白無極點了一個肉包，「沒事了。」</p>\n<p>「是你幹的嗎？」攤主婦人眼睛一眯，帶著那種江湖老人特有的直覺往他臉上看了一眼，「你這個樣子……」</p>\n<p>「吃包子，」白無極把錢放在桌上，「肉包，再來一個豆沙的。」</p>\n<p>攤主婦人哼了一聲，去拿包子了。</p>\n<p>白無極在桌邊坐著，廣場那邊的嘈雜聲隔著幾條街飄過來，還能隱約聽見，但很快就淡了。蒼雲城的下午有風，把街道上的塵土卷起來，帶著一股淡淡的草木氣息。</p>\n<p>腦海裡，白金之星安安靜靜地回到了金球旁邊，黃金體驗在玩路邊飛過來的一隻蝴蝶，把它接住，又放走，再接住，再放走，玩得不亦樂乎。</p>\n<p>白無極把熱包子咬開，燙，吹了一下，再咬一口，嚼了幾口，嚥下去。</p>\n<p>他沒有覺得今天有什麼特別了不起的地方，就是一件該做的事做了，一個該打的人打了，然後回來吃包子。</p>\n<p>至於蒼雲城今天的震動，至於陳家接下來的反應，至於公會和蘇家那邊怎麼看待這件事——</p>\n<p>這些事，他現在都不想，等遇到了再說。</p>\n<p>風把街道的熱氣帶走，午後的蒼雲城緩緩把這一天的故事往夕陽的方向推，而那個坐在包子攤前吃包子的年輕人，在所有人的視線都還朝著廣場方向凝固的時候，悠悠然地把第二個包子也吃完了。</p>"}, {"title": "第21章_陳家震怒", "content": "<p>第21章　陳家震怒</p>\n<p>消息在午後傳回陳家在蒼雲城的據點。</p>\n<p>陳府的側廳裡，一個身形魁梧的中年男人坐在主位，手邊的茶杯放了許久沒動，茶水早已涼透。他叫陳博鴻，陳家派駐蒼雲城的主事人，在這座城經營了整整八年，手下契師三十餘人，契將兩名，是陳家在西境最穩固的一根釘子。</p>\n<p>直到今天下午，那根釘子被人用手拔掉了。</p>\n<p>「再說一遍。」他的聲音很平靜，平靜得讓跪在地上的探子脊背發涼。</p>\n<p>探子咽了口口水：「大人……陳亮陳將軍，昨晚在蒼雲城東市街口……被人一拳打倒了。」</p>\n<p>「一拳。」</p>\n<p>「是……對方是個年輕人，看起來二十歲出頭，沒有任何靈契波動，但是……但是……」探子說到這裡，臉色變得奇怪，「但是陳亮將軍被打飛了大概……二十幾丈遠，砸穿了一整面磚牆。」</p>\n<p>廳中靜默了足足三秒。</p>\n<p>陳博鴻把茶杯放下，發出一聲輕響。</p>\n<p>「沒有靈契波動。」</p>\n<p>「是。現場十幾個目擊者都說，沒有任何靈契的光芒，也沒有靈契核心的共鳴聲，就像……就像是純粹的拳頭。」</p>\n<p>「契將被人用拳頭打飛二十幾丈。」陳博鴻重複了一遍，聲音依然平靜，但坐在側位的幾個陳家管事已經感覺到，主位那人的手指正緩緩扣緊椅背，扣出了幾道清晰可見的指痕。</p>\n<p>「廢物。」</p>\n<p>那個字從陳博鴻喉嚨裡擠出來，輕飄飄的，卻讓整個廳裡所有人屏住了呼吸。</p>\n<p>他站起身，走到窗邊，看著外面蒼雲城平靜的街道，眼神逐漸沉下去。</p>\n<p>「那個年輕人現在在哪？」</p>\n<p>「……還在城裡。住在天雲客棧，沒有要走的意思。」</p>\n<p>陳博鴻冷笑了一聲。倒是好膽。打了陳家的人，還大搖大擺待在城裡，不知道是真的不把陳家放在眼裡，還是不知道陳家的厲害。</p>\n<p>不管是哪種，他都要讓這個年輕人明白，蒼雲城是誰的地盤。</p>\n<p>「去把王連叫來。」他說，「讓他帶著葛修一起。」</p>\n<p>管事愣了一下：「大人……王連和葛修兩位將軍？」</p>\n<p>「還有聯絡江湖鑣局的許半城。」陳博鴻轉過身，臉上浮出一個不算好看的笑容，「一個不知道天高地厚的小子，用兩個契將對付他，顯得我陳家小題大做。三個，剛剛好。告訴他們，明天清晨在城東舊倉庫那片會合，我要這個年輕人消失在蒼雲城。」</p>\n<p>「是。」</p>\n<p>管事快步退出去，廳裡又安靜了下來。</p>\n<p>陳博鴻重新坐回去，拿起那杯涼了的茶，慢慢喝了一口。</p>\n<p>蒼雲城。一個邊陲小城，能出什麼人物？</p>\n<p>---</p>\n<p>然而蒼雲城的人顯然不這麼想。</p>\n<p>到了傍晚，城裡的茶館酒樓，全都在談同一件事。</p>\n<p>白無極坐在天雲客棧二樓靠窗的位置，要了一壺茶兩碟小菜，一邊慢悠悠地吃著，一邊豎起耳朵聽鄰桌的人說話。</p>\n<p>「你聽說了嗎？昨晚東市那件事？」</p>\n<p>「聽說了聽說了，我表哥就住在附近，親眼看見的！說是一個年輕人，沒用靈契，徒手把陳家的契將打飛了！」</p>\n<p>「噓，小聲點，陳家的耳目……」</p>\n<p>「怕什麼，現在滿城都在說，陳家還能把所有人的嘴堵上不成？再說了，那個年輕人顯然不是普通人，陳家要是真的有腦子，就不應該去惹他。」</p>\n<p>「就是，我聽說……那個人根本就是哪個大家族派來的探子，故意藏著實力。你看他沒有靈契波動，偏偏一拳能打出契王級別的力道，這擺明了是靈契感知壓制，只有到了某個層次才能做到。」</p>\n<p>白無極夾了一塊豆腐，慢條斯理放進嘴裡。</p>\n<p>靈契感知壓制。有意思的說法。</p>\n<p>「我聽另一個版本，」另一個壓低的聲音說，「說他是上古流傳下來的體契者，靈契融入了骨血，所以從外面感知不到，但每一拳都有靈契加持。這種人幾百年才出一個，一旦到了頂峰就是……」</p>\n<p>白無極差點把豆腐噴出來。</p>\n<p>他抬起手，掌心頂著嘴巴，低頭假裝咳嗽，肩膀微微顫抖。</p>\n<p>體契者。幾百年才出一個。</p>\n<p>他他他，他一個穿越過來三個月的前上班族，現在在異世界的民間傳說裡變成了幾百年難得一見的神秘高手？</p>\n<p>「我覺得那些說法都不對，」角落有個老頭搖著扇子，慢悠悠地說，「那個年輕人，我遠遠看過一眼，沒有任何靈契者的氣質，眼神散漫，走路也不是習武之人的步伐。但他出手的那一瞬間……」老頭停頓了一下，扇子停了，「那一拳，不是靈契，也不是普通武學，是我這輩子從沒見過的東西。」</p>\n<p>廳裡安靜了一秒。</p>\n<p>所有人都看向那個老頭。</p>\n<p>老頭把扇子重新搖起來：「所以我說啊，有些事，見了就見了，別想太多。」</p>\n<p>白無極轉過頭，看向窗外的街道，嘴角慢慢彎起來。</p>\n<p>這個老頭，有點意思。</p>\n<p>他把茶杯端起來，輕輕抿了一口。</p>\n<p>傳言嘛，總是比真相更誇張，這是亙古不變的道理。什麼體契者，什麼上古流傳，什麼大家族探子——他就是一個打了人之後懶得跑路的普通穿越者。</p>\n<p>不過，「普通」這個詞，好像從他穿越那天起就跟他沒什麼關係了。</p>\n<p>他低頭看了看自己的右手，掌心平攤，什麼都沒有。白金之星安靜地立在他身側，高大的身影像一座沉默的山，星空色的鎧甲在客棧昏黃的燈光下隱隱發著幽光。</p>\n<p>白無極對它抬了抬下巴，用口型說：謝了昨天。</p>\n<p>白金之星沒有回應。它從來不說話，只是看著他，眼神裡有某種沉靜的、不需要言語的東西。</p>\n<p>白無極轉回頭，繼續吃他的豆腐。</p>\n<p>樓下又來了幾個人，嗓門更大，說陳家今天緊急把附近的合作家族都召集了，說是要圍殺那個體契者，三個契將，還有外圍一堆契師。</p>\n<p>白無極把茶杯放下。</p>\n<p>三個契將。</p>\n<p>他輕輕吐出一口氣，指節在桌面上輕扣了兩下。</p>\n<p>好，那就明天見。</p>\n<p>---</p>\n<p>陳府的探子沒有發現，在他們緊急聯絡各方勢力的同時，消息也在以另一種速度流動著。</p>\n<p>蒼雲城的街道上，普通的商販、小販、茶館夥計，每一個看似不起眼的人，都在用各自的方式傳遞著訊息。</p>\n<p>有人在某個深夜，把一張薄薄的紙條悄悄交到了一個身穿灰色布衣的女子手中。</p>\n<p>女子看了紙條一眼，眼神沒有任何波動，把紙條攏入袖中，轉身消失在小巷的陰影裡。</p>\n<p>霜翎蹲在屋頂的陰影裡，銀白色的尾巴輕輕掃過，眼睛盯著遠處天雲客棧亮著燈的那扇窗戶，低低地哼了一聲。</p>\n<p>蘇念卿站在它旁邊，眼神平靜地看著那扇窗，手指微微收緊。</p>\n<p>「有意思的人，」她輕聲說，「可別死了。」</p>\n<p>她說完，轉身離開屋頂，步伐如同往常一樣穩定，毫無多餘的情緒。</p>\n<p>只是離開前，她回頭看了那扇窗一眼。</p>\n<p>很短暫的一眼。</p>"}, {"title": "第22章_蘇念卿的情報", "content": "<p>第22章　蘇念卿的情報</p>\n<p>三更過後，蒼雲城安靜下來。</p>\n<p>夜風從西邊吹過來，帶著一點涼意。天雲客棧的二樓走廊沒有點燈，只有遠處街角的一盞燈籠在風中搖著，把光影拉得長長的，打在地板上晃來晃去。</p>\n<p>白無極躺在床上，盯著頭頂的木樑，沒有睡著。</p>\n<p>倒不是睡不著——他這個人睡眠素質向來不錯，遇事不糾結，倒頭就睡。只是今晚有點心神不定，說不上是哪裡的感覺，就是沒有睡意。</p>\n<p>他閉上眼，又睜開，翻了個身。</p>\n<p>然後聽到了窗外的動靜。</p>\n<p>不是聲音，準確說是「沒有聲音」。正常的夜晚有風聲、有蟲鳴、有遠處偶爾的犬吠，但在某一個瞬間，窗外一公尺範圍內的所有細小聲響都靜止了——那是一個掌控力極好的人，刻意壓制了自己存在感的結果。</p>\n<p>白無極沒有動。他繼續靜靜地躺著，眼神掃向窗邊。</p>\n<p>一道淺淺的影子，落在窗紙上。</p>\n<p>他等了兩秒，沒等到對方出聲或者動作，便開口了：「敲門都不會，直接站窗外，你家沒教禮貌嗎？」</p>\n<p>窗外沉默了一瞬。</p>\n<p>然後是輕輕的叩窗聲，兩下，不疾不徐。</p>\n<p>白無極坐起身，把窗推開。</p>\n<p>月光灑進來，蘇念卿站在窗外的屋簷上，一身深灰色的窄袖勁裝，頭髮用一根玉簪束起，看起來像是刻意換過了衣裳，但仍然有一種不屬於夜色的清冷氣質。她手裡夾著一張疊成細條的紙，神情平靜，就像是在自家院子裡散步遇到了一個路人。</p>\n<p>「夜深了，」白無極把手肘撐在窗沿，仰頭看她，「蘇姑娘，你爬別人家窗戶有什麼貴幹？」</p>\n<p>蘇念卿沒有接話，把手裡的紙遞過來。</p>\n<p>白無極接過去，展開。</p>\n<p>燈光不夠亮，他靠著窗口借著月色，把紙上的字掃了一遍。</p>\n<p>字很少，很工整，是蠅頭小楷。名字、位置、時間。三個名字，分別標注了「契將」的字樣，還有一張蒼雲城東邊舊倉庫一帶的簡略地圖，包圍的方向和外圍封堵的位置都用細線標明。</p>\n<p>白無極把紙疊起來，捏在手裡，看向蘇念卿：「你來提醒我？」</p>\n<p>蘇念卿把手收回去，神情沒什麼變化：「蒼雲城不需要因為你出亂子。」</p>\n<p>「亂子。」白無極把這兩個字咀嚼了一下，「陳家要圍殺我，這是陳家的亂子，不是我的亂子。」</p>\n<p>「三名契將加上十數個外圍契師，就算你有辦法脫身，城裡也會出大亂子。」她的聲音一如既往地平，像是在分析一件跟自己完全無關的事，「我不希望蒼雲城動亂。」</p>\n<p>「所以你把情報給我，讓我有備而來，反客為主，速戰速決，盡量減少附帶損傷。」白無極點了點頭，「有道理。邏輯自洽，無懈可擊。」</p>\n<p>他把紙收進衣袖，撐著窗沿，微微往前傾了一點。</p>\n<p>「不過蘇姑娘，」他說，「如果你真的只是不想城裡出亂子，讓手下的人來遞個紙條就好了。何必親自爬到三更天，來一個男人的窗外？」</p>\n<p>蘇念卿的眼神往他臉上一落，那種視線像一把細針，不是刺的那種，是精準測量的那種，像是在判斷他說這話是出於得意還是真的在問。</p>\n<p>「你說什麼，我沒有在聽。」她說。</p>\n<p>「是擔心我吧。」</p>\n<p>這四個字說出來，白無極自己也有點意外——他說話的時候沒有調侃的語氣，就是很平靜地說出來。</p>\n<p>蘇念卿臉色沉了一下。</p>\n<p>那是一種微妙的變化，不是生氣，是某種東西被準確觸碰到之後，本能的收縮。她轉過身，衣角一動，準備走。</p>\n<p>「謝了。」</p>\n<p>白無極開口，聲音不大，但是在夜裡聽得很清楚。</p>\n<p>蘇念卿的步子停了。</p>\n<p>就停了那麼一秒，腳尖懸在屋簷邊上，整個人靜止在那裡。月光從她側面打過來，把她的輪廓鍍了一層淡淡的銀色，睫毛的影子落在臉頰上，很細很淡。</p>\n<p>然後她繼續往前走，腳步聲幾乎無聲，轉過屋角，消失了。</p>\n<p>白無極收回視線，把窗輕輕帶上。</p>\n<p>他低頭看了看手裡的紙條，又把它重新展開，在月光下仔細看了一遍地圖。情報很詳細，三個契將的特點和習慣的靈契攻擊方式都有簡略的標注，明顯不是臨時整理的——這需要時間，需要有人去收集。</p>\n<p>蘇念卿，不是今晚才開始關注這件事的。</p>\n<p>白無極把紙折好，放回袖中，重新躺回床上。</p>\n<p>這次有睡意了。</p>\n<p>他閉上眼，嘴角帶著一點說不清的弧度。</p>\n<p>這個世界的人，彎彎繞繞真多。但有些事，其實很簡單，就是不說出口罷了。</p>\n<p>---</p>\n<p>白金之星靜靜立在床邊，像一個沉默的守衛。</p>\n<p>白無極閉著眼，開口說：「你看見了嗎？」</p>\n<p>白金之星沒有回應，但白無極感覺得到，它的視線轉向了窗外，看著蘇念卿消失的方向。</p>\n<p>「她這個人，」白無極說，「挺有意思的。」</p>\n<p>室內靜了下來，只有遠處的風聲。</p>\n<p>白無極把手疊在腦後，在黑暗裡睜開眼，看著頭頂的木樑，表情平靜。</p>\n<p>三個契將。明天清晨。</p>\n<p>他今晚還能睡個好覺，這說明他不是沒有壓力，而是把壓力放在了明天才需要處理的地方。這一點，是他做了多年社畜練出來的本事——焦慮擺在今晚，對明天沒有任何幫助。</p>\n<p>只是在睡著之前，他腦子裡還浮著一個畫面：月光下，屋簷邊，那一秒的停頓。</p>\n<p>「謝了。」</p>\n<p>說來說去，她沒回頭，但她停了。</p>\n<p>挺好的。</p>\n<p>白無極閉上眼，這一次，很快就睡著了。</p>\n<p>---</p>\n<p>蘇家的院子裡，霜翎蜷縮在廊廡下的蒲團上，銀色的毛髮在夜色裡泛著隱約的光。</p>\n<p>蘇念卿回來，在廊廡邊停了一步，俯身摸了摸霜翎的頭。</p>\n<p>霜翎把頭往她手心裡蹭了蹭，喉嚨裡發出輕輕的、低沉的一聲。</p>\n<p>「你早說，」蘇念卿說，「跑腿就跑腿，不需要你的眼神。」</p>\n<p>霜翎的尾巴掃了掃地板，眼睛往天雲客棧的方向看了一眼，喉嚨裡又嚕了一聲，帶著幾分說不清的意思。</p>\n<p>蘇念卿站直身子，把手收回來：「睡你的。」</p>\n<p>她轉身走進廂房，把門帶上。</p>\n<p>在黑暗的房間裡，她在床邊坐了一會兒，沒有點燈。</p>\n<p>「謝了。」</p>\n<p>那個聲音沒有多餘的起伏，就那麼兩個字，說得很直接。</p>\n<p>她伸手抿了抿鬢角，動作平靜，表情也平靜。</p>\n<p>只是那一秒，她確實停了。</p>"}, {"title": "第23章_包圍", "content": "<p>第23章　包圍</p>\n<p>清晨的蒼雲城，天色剛亮，街道上還沒有多少行人。</p>\n<p>東邊的舊倉庫區是城裡最冷清的地方，這片區域曾經是蒼雲城最早一批商行的貨棧，後來商路改道，貨棧陸續廢棄，只剩下幾排斑駁的磚牆和破損的木質屋頂。偶爾有流浪者在這裡過夜，白天也沒有什麼人來。</p>\n<p>陳博鴻選這裡作為圍殺的地點，不算失策。四面的廢棄建築可以作為隱蔽，出入的路口少，一旦圍死，逃脫的可能性極低。</p>\n<p>清晨辰時一刻，三名契將帶著十六名契師，提前兩刻鐘進場，把整個舊倉庫區布置得滴水不漏。</p>\n<p>王連站在最高的廢棄閣樓頂，往下俯視著佈局，嘴角帶著幾分輕鬆。他是陳家在這邊境的第一契將，從契師打到契將巔峰，殺過的人兩隻手數不完，這種圍殺任務他做過不少。</p>\n<p>對付一個不知道天高地厚的年輕人，三個契將，他覺得有點大材小用。</p>\n<p>「聽說那小子打倒了陳亮？」他身旁的葛修開口，語氣帶著幾分不屑，「陳亮那個廢物，跌倒了都能怪地不平的人，打倒他有什麼好說的。」</p>\n<p>「少廢話，」王連掃了他一眼，「今天的事，速戰速決，不要拖泥帶水。對方的情況不明，別大意。」</p>\n<p>葛修聳了聳肩，沒再說話。</p>\n<p>另一邊，許半城站在一個廢棄倉庫的門口，慢慢活動著手腕。他是江湖鑣局的人，和陳家是生意夥伴，這種圍殺的活計他接了不少，酬勞高、風險低，是他喜歡的類型。</p>\n<p>三個契將，外圍十六個契師，對付一個人。</p>\n<p>許半城想，今天能早點回去吃早飯。</p>\n<p>辰時二刻，大約就是這個時候，那個年輕人應該出門了。</p>\n<p>按照計劃，有人負責把他往這個方向引——陳博鴻的人在沿路的酒樓和街道埋了幾個眼線，一旦那年輕人出門，就會用各種方式把他引到這裡。</p>\n<p>然而這個計劃，在辰時整的時候就宣告失效了。</p>\n<p>因為辰時整，那個年輕人已經自己走進來了。</p>\n<p>---</p>\n<p>沒有人引他，他就直接來了。</p>\n<p>白無極踩著碎磚地面的聲音，走進了舊倉庫區的主路口。他穿著昨天那套衣服，手裡提著一個油紙包，走路不緊不慢，像是在晨練之後順路逛集市的普通人。</p>\n<p>油紙包裡裝著剛買的燒餅，還帶著熱氣，他走兩步吃一口，相當自在。</p>\n<p>廢棄建築四周，十幾個契師和三名契將的眼神同時落在他身上。</p>\n<p>沒有人說話，所有人都愣了兩秒。</p>\n<p>因為他們很清楚，自己的部署是嚴格保密的，這個目標根本不應該知道這裡是陷阱——但他就這麼走進來了，走得理所當然，走得坦坦蕩蕩，就差沒有在路口掛個牌子寫「我來了」。</p>\n<p>王連站在閣樓上，皺了皺眉。</p>\n<p>白無極走到路口中央，左右掃了一眼，把油紙包折好夾在腋下，然後抬頭，對著閣樓頂上的王連的方向，微微點了點頭，像是打了個招呼。</p>\n<p>對方顯然愣了一下，然後回過神，揮手。</p>\n<p>圍殺開始了。</p>\n<p>十幾個契師同時從四面的廢棄建築裡湧出來，靈契核心共鳴的聲音一起爆發，七八種屬性的靈契光芒在清晨的薄霧裡亮起，把這片廢棄的倉庫區映得五彩斑斕。三名契將從三個方向移動，王連最快，直接從閣樓躍下，落地的衝擊波把腳下的碎磚炸飛一片，靈契的金色光芒包裹全身，在他周圍凝出半透明的護盾。</p>\n<p>白無極被十六個契師和三名契將，從四面八方包圍在了中心。</p>\n<p>一個人，站在圓心。</p>\n<p>四面是滾滾的靈契光芒，是站定了各方位的強者，是封死所有逃路的嚴密陣型。</p>\n<p>王連在距離白無極八步外停下，俯視著他，語氣平靜：「你能跑哪去？」</p>\n<p>語氣裡帶著一點說不清的東西——不是輕視，而是那種老手在收尾前的確認，是「你已經輸了，現在說最後一句話」的從容。</p>\n<p>白無極把夾在腋下的油紙包轉到手裡，把剩下半個燒餅掏出來，咬了一口。</p>\n<p>他咀嚼了兩下，把嘴裡的東西嚥下去，伸了個懶腰，脊背舒展開的聲音細小而清晰，在這片肅殺的圍合中顯得格外突兀。</p>\n<p>「我沒打算跑。」他說。</p>\n<p>把油紙包對折，疊好，放在旁邊一個廢棄的磚台上，弄得整整齊齊。</p>\n<p>然後轉過身，看向王連，臉上是一種很平靜的表情，說平靜其實也不準確，是那種介於隨意和認真之間的神態，像是一個在工作日早上站在公司門口，準備把手頭的活兒做完好回去休息的人。</p>\n<p>「三個契將，十六個契師，」他說，「你們老闆還挺捨得本的。」</p>\n<p>王連沒有接話，他不是那種會和對手廢話的人。</p>\n<p>他的靈契核心猛地輸出，金色護盾在他周身擴張，右拳蓄力，地面在那股靈契壓力下開始碎裂。</p>\n<p>「動手。」</p>\n<p>這兩個字落下來，三名契將同時出擊，十六個契師的靈契遠程攻擊從四面蓄好，等待著一旦近身戰打亂後，立刻補刀的機會。</p>\n<p>這是一個密不透風的圍殺陣型，進退有序，多年經驗堆出來的戰場默契。</p>\n<p>對付一個人，足夠用了。</p>\n<p>白無極仰頭看了看天色，天光正好，薄霧未散，是個不錯的早晨。</p>\n<p>白金之星在他背後緩緩展開，高大的身影無聲無息，只有白無極看得見那星空色的鎧甲，在晨光裡折射出沉默而凜冽的光芒。</p>\n<p>三個契將的衝擊波同時抵達。</p>\n<p>白無極把右腳往前踏了一步，紮穩了馬步的根基，八極拳練了十幾年的那種重心，沉沉地壓在地面上。</p>\n<p>「來吧。」</p>\n<p>他說。</p>"}, {"title": "第24章_白金之星的極限", "content": "<p>第24章　白金之星的極限</p>\n<p>戰場在一秒內爆炸開來。</p>\n<p>王連是第一個到達的，他的速度在三名契將裡最快，靈契護盾包裹全身，右拳蓄滿金色光芒，衝擊波在地面留下一條深深的裂縫。這一拳的力道，打在城牆上能砸穿半丈厚的磚石，是他積累了二十年的全力一擊。</p>\n<p>他沒有打到白無極。</p>\n<p>白金之星在王連拳頭到達的前半秒，右掌猛地推出。</p>\n<p>那不是可見的靈契光芒，沒有任何屬性的色澤，但那股力量砸進王連的護盾裡，像一根無形的錐子，精準、沉重、不帶絲毫多餘，把那層靈契護盾轟開了一個洞，緊接著反震力把王連的身體直接打得橫向位移了三丈，撞進廢棄的磚牆裡，磚石碎裂，揚起一片白灰。</p>\n<p>沒有人看見白金之星，所有人看到的只是——王連衝出去，然後突然飛出去了。</p>\n<p>衝擊力來自「正前方」，但前方明明只有那個年輕人，而那個年輕人根本沒動。</p>\n<p>葛修和許半城的腳步同時一頓。</p>\n<p>「別停，繼續！」王連在磚石堆裡怒吼，他沒有受重傷，護盾擋住了大半衝擊，但這個結果讓他的臉色變得極度難看。</p>\n<p>葛修從左翼繞進來，他的靈契是風系，速度極快，移動軌跡難以預判，左右交錯的高頻攻擊是他的招牌。他身形一錯，在白無極面前劃出三道連續的弧形衝擊，把方圓一丈的空間切割成碎片。</p>\n<p>白金之星右臂橫掃，三道弧形衝擊被正面格開，反震力讓白無極腳下的地面往下陷了一寸，但他紮著馬步，重心穩穩地沉著，沒有被移位。</p>\n<p>白金之星的反手已經擊出，五連擊，速度快到中間的三擊幾乎是殘影。</p>\n<p>葛修的靈契護盾撐了三擊，第四擊的時候碎裂，第五擊砸在他胸口，護盾不在了，那一擊結結實實打進了血肉裡。</p>\n<p>葛修飛出去的距離比王連更遠，在廢棄的倉庫牆面上砸出一個人形的凹槽，滑落下來，勉強撐著站起來，胸口的靈契核心的光芒急劇搖晃，受了傷，短時間內無法再全力輸出。</p>\n<p>兩個契將，幾十秒內接連被打倒。</p>\n<p>外圍的十六個契師炸開了鍋，但他們看不見打人的東西——他們只看見那個年輕人站在原地，連腳都沒挪，然後他們的將軍就飛出去了，然後又一個飛出去了，中間什麼都沒發生。</p>\n<p>這種看不見、摸不著、但力量真實存在的壓迫感，比看得見的敵人更讓人心寒。</p>\n<p>許半城沒有急著上，他在外圍圍了一個弧形，眼睛眯縫著，仔細觀察著戰場。</p>\n<p>他是三人中最穩重的一個，也是契將巔峰。陳亮、王連、葛修，都在契將中段，而他，在這個層次積累了將近十年，距離契王只差半步之遙。</p>\n<p>他看出了一些東西——那個年輕人的攻擊有方向性，力量是從他的身體某個位置傳出去的，不是全方位的。這意味著它有角度，有角度就有盲區。</p>\n<p>許半城的靈契緩緩展開。</p>\n<p>這是一種特殊的靈契形態，叫「領域」，是契將巔峰以上才能掌握的能力。它不是護盾，也不是攻擊，而是一種以自身為中心向外延展的感知與干涉範圍——在這個範圍內，所有的力量輸出都會被壓縮、緩衝，減弱一到三成，視領域強度而定。</p>\n<p>許半城的領域，能削弱三成。</p>\n<p>他緩步往前走，領域像一個無形的氣泡向外擴張，把半徑三丈的範圍籠罩進去。</p>\n<p>然後他出手了——不是正面衝擊，而是用領域把空間壓縮，像一個無形的大手把範圍內的空氣都往白無極身上推，同時他自己從正面貼上去，拳頭蓄起了厚重的靈契光芒，這一擊不靠速度，靠的是重量和精準。</p>\n<p>白金之星攔截，正面一掌推出。</p>\n<p>這一次不同了。</p>\n<p>那道力量打進了許半城的領域，速度和衝擊力都明顯地——減緩了。</p>\n<p>不是完全消失，還是有力量的，但被削去了三成之後，衝擊力不足以把許半城震飛。許半城腳步往後退了半步，靠著領域穩住身形，然後反手推出，靈契力道貼著那股不可見的力量邊緣，往白無極的右側打去。</p>\n<p>這是第一次，白無極被迫移步躲避。</p>\n<p>他往左橫移了一步，腳跟蹬地，餘震把碎石震出去，但他沒有被打中。</p>\n<p>「有意思，」許半城開口了，聲音低沉，「你的力量是從精神延伸出去的，領域對你有效。」</p>\n<p>白無極沒有回答，但眉頭微微皺了一下。</p>\n<p>這個老頭感覺比前兩個難搞。</p>\n<p>白金之星連續發出七擊，每一擊都被領域緩衝，接觸到許半城護盾的時候力道已經減少了一截，而許半城反擊的節奏又穩又沉，每一下都精準地卡在白金之星攻擊的間隙裡，逼著白無極不斷移位。</p>\n<p>移位就意味著陣腳散亂，陣腳散亂，外圍的靈契師就有機會補刀了。</p>\n<p>也確實來了。</p>\n<p>十六個契師看見自家的許將軍把那個年輕人逼得開始移動，膽子大了，開始鋪開遠程靈契攻擊，火焰、冰錐、土矛，從各個方向打過來，把白無極的站位空間壓縮得越來越小。</p>\n<p>一道冰錐刮過了白無極的左臂，不深，但割破了衣袖和皮肉，滲出細細的血線。</p>\n<p>然後是一個土矛的衝擊波，白金之星側擋，但餘震還是傳到了白無極，讓他踉蹌了一步，右膝撞在了廢棄的石台上，膝蓋的疼痛清晰地傳上來。</p>\n<p>白無極站穩，低頭看了看左臂的傷口，又看了看滲血的膝蓋，抬起頭，把呼吸慢慢調勻。</p>\n<p>這是穿越過來三個月，他第一次真正意義上的「受傷」。</p>\n<p>不是表演，不是輕描淡寫，是真實的切割感和撞擊痛，是血。</p>\n<p>他沒有慌，但有一種東西悄悄收緊了——不是恐懼，是那種在真實危險裡被喚醒的、沉睡了三個月的清醒感。</p>\n<p>這個世界是真實的。力量的碰撞是真實的。</p>\n<p>許半城緩步繞過來，領域持續擴張，把白無極的活動空間再往裡壓了半步，外圍的契師也跟著移動，圓形的包圍圈開始收縮。</p>\n<p>「你很強，」許半城說，臉上沒有輕視，「但今天，沒有人能替你。」</p>\n<p>白無極把受傷的左手攥緊，松開，再攥緊。</p>\n<p>左手掌心，有一點什麼東西，在輕輕地發燙。</p>"}, {"title": "第25章_絕境之中", "content": "<p>第25章　絕境之中</p>\n<p>許半城的領域繼續往裡收縮。</p>\n<p>這種領域的壓迫是全方位的，不像護盾只抵擋特定方向，它把整個空間都變成了一種阻力，讓在其中出拳的每一下都像是在水裡揮臂，力道流失，速度流失，原本精確的節奏開始變形。</p>\n<p>白金之星連出了十一擊，在領域裡每一擊的力道都縮水三成，而許半城站在領域中心，就像站在颱風眼裡，任憑外圍再亂，他自己紋絲不動，等到白金之星的攻擊被消耗得夠多了，才出一拳，穩而重，偏偏打的都是白無極跟著移位之後、平衡最差的那個瞬間。</p>\n<p>這個打法讓白無極有點想罵人。</p>\n<p>他不是沒想過讓白金之星衝出去把這個老頭轟飛，但問題是白金之星是他的延伸，它「站」的位置是以白無極為中心的，一旦貼著許半城的身體全力打，白無極本身就要進入領域的核心範圍，而在那個範圍裡，白金之星的力道減弱更多。</p>\n<p>同時外圍的十六個契師沒有停，靈契遠程攻擊持續施壓，把白無極往許半城那個方向逼，試圖把他趕進領域深處。</p>\n<p>又一道火矛打過來，白無極側身，白金之星攔截了大部分，但尾焰還是燎到了他的右肩，皮肉燒灼的氣味在鼻尖一閃而過，肩膀傳來一陣刺痛。</p>\n<p>白無極把牙關咬了一下，穩住身形。</p>\n<p>受傷清單越來越長了：左臂一道切割傷，膝蓋一個撞傷，右肩一塊燒傷。都不深，但每一個都在持續的消耗他的注意力和體力，讓他的反應速度慢了一點點。</p>\n<p>偏偏就是那一點點，在高速的交鋒裡，是致命的差距。</p>\n<p>許半城感知到了這個變化，攻勢加重了——他不再像剛才那樣四平八穩地等，開始連續出拳，每一擊都精準壓在白金之星攔截的死角，把對方的防線打出漏洞，逼著白無極自己去補。</p>\n<p>但人補和替身補是兩回事，白無極不是武者，他的身體是普通人的底子，八極拳打了十幾年，有功底，但沒有靈契加持，純靠肉身去頂一個契將巔峰的攻擊，硬接一下就是實打實的傷。</p>\n<p>他已經退到廢棄倉庫的磚牆邊上了。</p>\n<p>身後三步就是牆。</p>\n<p>外圍的包圍圈已經收縮到只剩下二十步的半徑，十六個契師站成一個嚴密的圓弧，靈契蓄好，隨時補刀。許半城站在圓弧的缺口裡，領域擴展著，眼神平靜，就差最後幾步，把白無極逼進牆角，徹底沒有退路。</p>\n<p>白無極把後背抵在磚牆上，左手按著左臂的傷口，右手攥緊。</p>\n<p>他深吸一口氣，把腦子裡所有雜亂的思緒往外推，只留下當下的感知——腳下地面的觸感，空氣流動的方向，白金之星的位置，以及——</p>\n<p>左手掌心的那一點發燙。</p>\n<p>它更明顯了。</p>\n<p>不是疼痛，是一種從深處湧上來的溫熱，像是什麼東西被某根線拉著，想要醒過來。</p>\n<p>白無極低頭看了看左手。</p>\n<p>沒有可見的變化，但那股熱意越來越清晰，像是某個沉睡很久的東西，感受到了主人正在流血，正在受傷，然後那個沉睡的東西開始在某個很深的地方躁動。</p>\n<p>「黃金體驗？」白無極在心裡輕輕說了一句。</p>\n<p>它從孵出來之後，就很少出現。白金之星是他天然的戰鬥搭檔，把一切都蓋住了，而黃金體驗更像是一個安靜的、守在後方的存在，偶爾在他練習它的能力時出現，大多數時候只是一種潛伏的感知。</p>\n<p>但現在它在動。</p>\n<p>不是白無極主動喚醒它，而是它感受到了什麼，自己動了。</p>\n<p>許半城踏出第三步，領域核心的壓力隔著空氣都感受得到，他舉起右拳，金色靈契在拳頭表面凝出了最厚的一層，這是準備終結的一擊——</p>\n<p>金色的光芒從白無極的左手掌心湧出來。</p>\n<p>不是靈契的金色，這個光是更溫暖、更深沉的，像是大地的顏色，像是生命最底層的那種燃燒。光芒從掌心蔓延出來，往下流淌，像水，像根系，沿著白無極的手指末端滴落。</p>\n<p>第一滴落在地面的碎石上。</p>\n<p>碎石靜止了一秒。</p>\n<p>然後——動了。</p>\n<p>一根細細的根鬚，從碎石的裂縫裡生長出來，淺灰色，細如絲線，但它是活的，在空氣裡輕輕顫抖著，像是在嗅氣味，像是一種甦醒的感知。</p>\n<p>然後是第二根，第三根，越來越多的根鬚從腳下的碎石和地縫裡生長出來，速度越來越快，往四面蔓延，那些本來毫無生命的磚瓦碎石，在金色光芒的觸碰下開始變得柔軟，開始有形態，開始生長。</p>\n<p>白無極愣了一秒。</p>\n<p>他看著自己左手流出的金色光芒，看著地面悄悄蔓延的根鬚，表情有一種說不清的東西——那種看著自己完全沒有預期到的事情正在發生，同時又覺得「好像還挺合理的」的奇妙感受。</p>\n<p>他抬起頭，看向許半城。</p>\n<p>許半城的腳步停了，他感覺到了腳下的異常，低頭一看，地面上細如絲線的根鬚已經悄悄纏上了他的靴子邊緣，不是攻擊，只是接觸，但它是有生命的，是他從來沒見過的東西，在靈契的感知下，那種生命力波動讓他的直覺發出了警告。</p>\n<p>白無極把左手攥起來，金色的光芒在掌心凝聚，他感覺到它，感覺到那個修長的、金色的身影正在從什麼地方緩緩顯現，站在他的另一側。</p>\n<p>「喔，」白無極說，嘴角往上彎了一點，「你也出來了。」</p>"}, {"title": "第26章_一體三身", "content": "<p>第26章　一體三身</p>\n<p>黃金體驗完全甦醒的瞬間，白無極感受到了一種前所未有的——滿。</p>\n<p>不是力量的滿，而是感知的滿。原本只有白金之星在場，他的延伸是單向的，一條線。現在是兩條線，兩個方向，兩種截然不同的感知同時接入，一個是沉默的、精密的、鋒芒內斂的星光，另一個是流動的、生長的、帶著大地溫度的金色。</p>\n<p>一左一右，一個穿星空鎧甲的高大戰士，一個修長靈動、全身泛著金光的身影。</p>\n<p>白無極站在兩者中間，深呼吸了一口。</p>\n<p>然後他把左手指向外圍的包圍圈，輕輕說：「去。」</p>\n<p>黃金體驗低下頭，看著地面。</p>\n<p>金色光芒從它的十指往下流淌，觸碰地面的瞬間，整片廢棄倉庫區的地面開始震動——不是那種地動山搖的劇烈震動，而是一種從根部傳出來的、很深的、像是大地本身在呼吸的顫抖。</p>\n<p>地縫裡的碎石開始分裂、延伸，細長的裂縫從中心向四面輻射，而每一條裂縫裡，根鬚和藤蔓開始瘋狂生長，速度快得肉眼可見——不是那種溫柔的植物生長速度，是被靈契力量催動的加速版，每一秒都能生長出三五寸的長度，帶著倒刺的藤蔓在地面上鋪開，快速向外圍的契師們的方向蔓延。</p>\n<p>契師們發現不對的時候，藤蔓已經繞上了他們的腳踝。</p>\n<p>不是尋常的草，這些藤蔓在黃金體驗的催動下，密度硬得接近石材，帶著倒刺死死咬住靴子和皮肉，越掙扎越收緊。有人嘗試用靈契割斷，但藤蔓剛斷又生，甚至更快，因為黃金體驗注入的生命力是持續的，被切斷只是刺激它生長得更猛。</p>\n<p>三個契師倒在地上，藤蔓纏過了膝蓋，往腰腹延伸，把他們壓在地面上動彈不得。</p>\n<p>更多的藤蔓從地縫裡鑽出來，形態開始變化——從藤蔓，到有鱗片質感的扭動躰，到完整的蛇形。</p>\n<p>那不是真正的蛇，它是從無機物中生長出來的，有蛇的形態，有蛇的動作，有從黃金體驗流入的生命意志，讓它能夠像真正的生物一樣判斷目標，追蹤，纏繞。</p>\n<p>十六個外圍契師裡，十一個已經被藤蔓或蛇形纏住，剩下五個開始往外跑，但廢棄倉庫區的出口，地縫也在蔓延——跑了兩步，腳下就有新的藤蔓冒出頭，纏上腳踝，把他們拽倒。</p>\n<p>外圍全面陷入混亂。</p>\n<p>白金之星在這同一時間，已經對準了許半城重新發動攻勢。</p>\n<p>許半城的領域仍然存在，但他有一部分注意力被腳下的地面異變拉走了——那種從地底傳來的生命力波動不是靈契，至少不是任何他見過的靈契形態，而他的領域是為了對抗「精神延伸的力量」設計的，對這種大地生長的攻擊方式，干涉效果大打折扣。</p>\n<p>白金之星打出了第一擊，在領域裡依然被削去了兩成力道，但許半城已經沒有辦法做到剛才那樣穩如磐石地等待時機——他的注意力分散了，站位被腳下纏繞的藤蔓干擾了，反應慢了半拍。</p>\n<p>那半拍，讓白金之星的第二擊打在了他護盾正面的薄弱點。</p>\n<p>護盾震動，裂了一條縫。</p>\n<p>許半城後退兩步，強行穩住，靈契護盾重新加厚，眼神的沉靜裡終於出現了一點裂縫——那種老手在突發變數面前，掩飾不住的一絲動搖。</p>\n<p>「到底……是什麼？」他低聲說。</p>\n<p>不是問白無極，是問自己。</p>\n<p>他無法理解。他感知不到那個把地面變成生物的東西，也感知不到那個精準打擊的不可見力量，而這兩種東西同時出現，同時作用，偏偏它們的使用者還站在十步外，身上有傷，氣息有些亂，但眼神是穩的。</p>\n<p>白金之星連續七擊，每一擊都在壓護盾的同一個位置，有規律，有節奏，像是在做一件很確定的工作，從容不迫地把一個方向的護盾打薄。</p>\n<p>同時，黃金體驗的藤蔓繞到了許半城的後方，幾條粗壯的蛇形從地縫裡鑽出來，試探性地往他腳踝方向盤繞，逼著他不斷挪動站位，讓他護盾那個被持續打擊的薄弱點始終朝著白金之星的方向。</p>\n<p>這是一種配合，雖然是第一次，雖然是臨場組合，但它有效。</p>\n<p>許半城終於意識到，他被兩個他看不見的東西夾在中間了。</p>\n<p>他嘶聲爆喝，領域猛地向外擴張，試圖把地面的藤蔓盪開，靈契衝擊波往下壓，磚石碎裂，藤蔓被切斷——但生了，又生了，在靈契衝擊波的能量裡，黃金體驗反而借力，把被切斷的藤蔓殘餘轉化成新的根鬚，從每一個切斷面同時生長，比切斷之前更多，更密，更快。</p>\n<p>三圈，四圈，藤蔓繞上了許半城的腳踝，然後是小腿。</p>\n<p>他的移動速度降了下來。</p>\n<p>白金之星的第十二擊，打在護盾那個已經被反覆衝擊的薄弱點上，這一擊，白無極把自己全部的意志都灌進去，那是一種他說不清楚的感覺，不是憤怒，不是拼命，而是某種清醒而沉靜的、把所有力量集中到一個點上的意志。</p>\n<p>ORA——</p>\n<p>不是喊出來的，是白金之星的拳頭，那一擊本身的速度和重量，在接觸護盾薄弱點的瞬間，爆發出了一種讓空氣都震顫的聲音。</p>\n<p>護盾，在那個點上，炸碎了。</p>\n<p>碎片散開，金色靈契的光芒像玻璃一樣迸開，而白金之星的拳頭繼續往前，打穿護盾碎片，打進許半城胸口的靈契核心。</p>\n<p>靈契核心是靈契者的根基，是所有靈契力量的源點。打碎護盾之後直接衝擊靈契核心，這不是尋常的格鬥打法，這是從感知層面直接瓦解對方戰鬥意志的釜底抽薪。</p>\n<p>許半城的靈契核心的光芒猛地一閃，像是一盞燈被猛然吹了一下——沒有熄滅，但劇烈搖晃，輸出的靈契量驟降，領域在這一瞬間徹底潰散。</p>\n<p>許半城往後倒去，藤蔓纏著他的雙腿，讓他無法站直，重重跪在地上，靠著一隻手撐在磚石上，才沒有完全趴下去。</p>\n<p>他把頭抬起來，看著白無極，胸口的靈契核心的光芒是亂的，臉色是白的。</p>\n<p>他說不出話，或者說，有什麼東西卡在喉嚨裡，不知道說什麼好。</p>\n<p>倉庫區安靜了下來，只有藤蔓還在輕輕搖動，蛇形緩緩遊走，把外圍十六個契師全數困住，按在地面上，動彈不得。</p>\n<p>白無極站在這一切的中心，左邊白金之星，右邊黃金體驗，一個沉默如山，一個流動如水，兩種截然不同的力量，都由他的意志延伸而出。</p>\n<p>他慢慢把舉起的手放下，深吸了一口氣，呼出來。</p>\n<p>衣袖被燒了一個洞，左臂在滲血，右肩的燒傷讓那片皮肉有點麻木，膝蓋磕著了，走起路來大概會有點跛。</p>\n<p>但他站著。</p>\n<p>許半城跪在地上。</p>\n<p>三個契將，全倒了。</p>"}, {"title": "第27章_這不是人類能有的力量", "content": "<p>第27章　這不是人類能有的力量</p>\n<p>廢棄倉庫區沉默著。</p>\n<p>薄霧在這個時候已經散了大半，清晨的陽光從破損的屋頂縫隙裡斜射下來，把廢墟的輪廓照得清晰而殘酷。碎石，倒塌的磚牆，砸出的人形凹槽，蔓延在地面上的藤蔓和蛇形，十幾個契師倒伏在各個角落，三名契將倒下或跪著，整片區域像是剛剛經歷了某種自然災害。</p>\n<p>但製造這一切的那個人，站在廢墟中心，除了衣服破了幾個洞、身上有幾處傷，看起來和剛進來的時候沒有太大差別。</p>\n<p>有幾個城中的早起居民，從廢棄建築的縫隙外往裡看。</p>\n<p>戰鬥中的靈契波動、那幾次震動地面的衝擊，以及後來那種說不清楚的、帶著某種原始生命力的氣息蔓延，早就把周遭的人引過來了。但沒有人進來，大家只是站在外圍，透過廢棄磚牆上的縫隙或倒塌處向裡張望。</p>\n<p>他們看到的是：一個年輕人，孤身站在廢墟中心，三個陳家的契將（其中一個是整個蒼雲城都知道名字的許半城）倒在他周圍，腳下的地面長出了奇怪的蛇形生物，把十幾個靈契師困住。</p>\n<p>沒有人說話。</p>\n<p>長達十幾秒，沒有任何一個人開口。</p>\n<p>有個契師想動，黃金體驗的藤蔓收緊了一下，那個契師倒抽一口冷氣，身體重新老老實實地趴平在地上。</p>\n<p>然後才有人，終於有人打破了這個沉默。</p>\n<p>是一個站在外圍、年紀不大的年輕契師，跟著一個長輩來蒼雲城辦事、今天早上恰好在附近，湊過來看熱鬧的。他的聲音不大，帶著控制不住的顫抖，說出來的話，就像是他喉嚨裡卡了很久、找到了一個縫隙才擠出來的：</p>\n<p>「他……他到底是什麼？」</p>\n<p>沒有人回答他。</p>\n<p>因為沒有人知道。</p>\n<p>那個身穿靛藍色長衫、衣袖被燒了一個洞的年輕人，此刻就站在那裡，看起來二十出頭，面容普通，個子不高不低，如果換上一套平民的麻布衣，扔到蒼雲城的集市裡，會和一百個普通農家子弟的臉沒什麼差別。</p>\n<p>但他腳下是三個契將，周圍是被困住的十六個契師，而這一切，他是靠著別人感知不到、看不見、摸不著的東西完成的。</p>\n<p>沒有靈契的光芒，沒有靈契核心共鳴的聲音，沒有任何已知的靈契者的戰鬥形態。</p>\n<p>只有結果。</p>\n<p>白無極在那十幾秒的靜默裡，把自己的狀態理了一遍。</p>\n<p>傷還在，左臂的切割傷仍然在滲血，血沿著指尖緩緩滴下去，在腳下的碎磚上落出幾個暗紅色的小點。他低頭看了看。</p>\n<p>然後他把受傷的左手抬起來。</p>\n<p>黃金體驗轉過身，修長的金色身影俯低，把一隻手輕輕覆上白無極的手背。</p>\n<p>不是攻擊，不是什麼激烈的動作，只是那個接觸，溫柔而確定，就像把一個燭火重新點燃。</p>\n<p>金色的光芒從那個接觸點漫出來，不刺眼，是那種讓人看了之後會莫名鎮定下來的溫暖色澤。光芒沿著左臂的傷口蔓延，那道切割傷的邊緣開始——閉合。</p>\n<p>肉眼可見的閉合，皮肉的裂縫在金色光芒裡緩緩縫合，速度不快，但肉眼可見。血已經不流了，傷口邊緣從外到裡，一層一層，悄無聲息地癒合。</p>\n<p>右肩的燒傷也在消退，燒傷的那片皮肉從最深處開始，往表面推出新的皮膚，燒傷的痕跡一點一點地淡去，像是被輕輕擦掉。</p>\n<p>整個過程大概用了不到半分鐘。</p>\n<p>半分鐘後，白無極把左手放下，袖子還是破的，上面還有血跡，但傷口已經閉合，只留下一條淺淡的新生皮肉。他動了動手指，沒有任何不適。</p>\n<p>抬頭，看向圍觀的人。</p>\n<p>廢墟外圍的人群裡，有人輕輕倒退了一步，像是看見了什麼超出理解範圍的東西之後，本能的後退。</p>\n<p>白無極環視了一圈，把視線落在那個說出「他到底是什麼」的年輕人身上，對方立刻把頭埋低，像一隻受了驚嚇的小鳥。</p>\n<p>「沒事了，」白無極說，聲音不大，但清晰，「散了吧。」</p>\n<p>散了吧，就這三個字，語氣平平，跟說「吃了嗎」差不多的輕描淡寫。</p>\n<p>但他說完，就是真的沉默了，只是低頭去撫平衣袖上燒穿的那個洞，撫不平，就算了，把那截衣袖捲起來。</p>\n<p>外圍開始有人小聲說話，腳步聲響起，但沒有多少人真的走，大多數只是往後退了幾步，繼續看。</p>\n<p>許半城跪在地上，靈契核心的光芒還在搖晃，他試著站起來，藤蔓鬆了，讓他站起來了，但他的腳是軟的，站起來又緩緩蹲了下去，只是從跪坐變成了蹲坐。</p>\n<p>他把頭抬起來，看著白無極的背影，眼神裡有某種東西正在崩塌，那種東西叫做「認知」。</p>\n<p>他這一輩子打過的人，殺過的人，敬畏過的人，全都符合一套固定的秩序：靈契的強弱，戰力的高低，等級的差距。這套秩序在天衍大陸通行了幾千年，它告訴所有人，力量是有形態的，是有源頭的，是可以被感知、被判斷、被分析的。</p>\n<p>但那個年輕人，打碎了這套秩序。</p>\n<p>不是因為他很強——許半城見過更強的，有幾位契王甚至讓他感受到了真正的碾壓感。</p>\n<p>而是因為他的力量，根本不在這套秩序裡。</p>\n<p>「這不是人類能有的力量。」</p>\n<p>這句話是許半城說出來的，很輕，像是說給自己聽的。</p>\n<p>他說完，低下頭，不再看白無極。</p>\n<p>白無極聽到了，沒有回頭，只是把另一側的衣袖也捲了起來，露出兩截手臂，對稱了一下。</p>\n<p>「行，這樣比較涼快。」他說，自言自語。</p>\n<p>然後他把目光掃向地面的藤蔓和蛇形，黃金體驗緩緩收回金色光芒，那些藤蔓開始萎縮，從外圍往中心消退，蛇形的形態慢慢瓦解，石質的鱗片重新變成普通的碎石，平鋪回地面。</p>\n<p>十幾個契師被鬆開，癱在地上，有人立刻爬起來往外跑，有人呆愣著，一時站不起來。</p>\n<p>王連扶著磚牆站起來，葛修半蹲在牆角，許半城最後慢慢站直，三個契將互相看了一眼，都看出了對方眼底的那點什麼——不是恥辱，是在嘗試接受一件超出預期的事情的、遲緩的過程。</p>\n<p>白無極轉過身，走向廢棄磚台，拿起那個被他整齊放好的油紙包，展開，裡面的燒餅還在，沒有被波及，他掏出來，咬了一口。</p>\n<p>三名契將和十幾個契師看著他吃燒餅。</p>\n<p>他吃完最後一口，把油紙包疊好，往旁邊一扔。</p>\n<p>「回去告訴你們家老闆，」他說，語氣跟剛才平靜，「蒼雲城不大，踩的地方別太多，容易踩到人。」</p>\n<p>說完，他轉身，往倉庫區的出口走去。</p>\n<p>背影不快，帶著一點點膝蓋磕過之後走路的微小不穩，但步子是直的，方向是清楚的，沒有回頭看任何人。</p>\n<p>圍觀的人群在他走近的時候自動讓開了一條路，沒有人說話，只是讓開，像是某種本能的動作。</p>\n<p>白無極從人群裡走過去，消失在蒼雲城的街道上。</p>"}, {"title": "第28章_蒼雲城的新秩序", "content": "<p>第28章　蒼雲城的新秩序</p>\n<p>消息在午前傳遍了整個蒼雲城。</p>\n<p>不是刻意散播，是那些在廢棄倉庫區外圍目睹了一切的普通人，走回各自的住所，走進各自的攤位和店鋪，張口說話，然後消息就這樣沿著人與人之間的連結，以一種無法阻攔的速度向外蔓延。</p>\n<p>「三個契將都倒了。」</p>\n<p>「許半城也倒了？那個許半城？合劍鑣局的許將軍？」</p>\n<p>「就是那個許半城。跪在地上，站不起來。」</p>\n<p>「那個年輕人……他說了什麼？」</p>\n<p>「說，蒼雲城不大，踩的地方別太多，容易踩到人。」</p>\n<p>這句話在流傳的過程裡，版本越來越多，有的變成「蒼雲城是我的地盤，你們給我滾
