」，有的變成「蒼雲城從今天起換人管了」，各種添油加醋的演繹讓故事越來越大，但核心的事實是不變的：陳家三名契將，被那個年輕人打倒了。</p>\n<p>陳家在蒼雲城的據點，在這個消息傳開之後，沒有等到第二天。</p>\n<p>陳博鴻在消息傳回來的一個時辰內，收到了七份報告——他安插在蒼雲城各個角落的眼線的報告，他在周邊村鎮的合作商行的報告，還有城中靠陳家庇護過活的幾個小家族的報告。</p>\n<p>這些報告的內容不同，但都指向一件事：陳家完了。</p>\n<p>不是說陳家整個家族完了，陳家是四大家族之一，根基深厚，蒼雲城這個小據點對陳家本身的影響微乎其微。但「完了」的是陳家在蒼雲城八年辛苦建立的威信，那套建立在武力震懾和利益綁定上的運作體系，在三名契將全部倒下的這一天，已經從根部開始腐爛。</p>\n<p>那些靠著陳家庇護過活的小家族，最先作出反應。</p>\n<p>不是公開宣佈脫離，是那種更微妙的疏遠：本來每旬一次的孝敬少了一半，本來應該上門問好的管事沒有出現，幾個合作的商行以「盤點貨物」為由暫停了往來。</p>\n<p>這些細節落到陳博鴻眼裡，他很清楚，這意味著什麼。</p>\n<p>他在廳裡坐了大半天，沒有說話，沒有動。到了傍晚，他叫人備馬，把所有還能動的人手召集起來，留了最小一批人守著明面上的陳家商號，其餘人全部撤出蒼雲城。</p>\n<p>走之前，他在書案上放了一封信，讓人快馬送往陳家本部。</p>\n<p>信很短，只有一句話：「蒼雲城出了個怪物，請家主定奪。」</p>\n<p>---</p>\n<p>到了傍晚，蒼雲城底層的靈契者開始互相打聽那個年輕人是誰。</p>\n<p>「在天雲客棧住著呢，叫白無極，F級冒險者。」</p>\n<p>「F級？那個打倒三個契將的人是F級冒險者？」</p>\n<p>「他昨天剛加入公會，就是F級沒錯。」</p>\n<p>消息傳到冒險者公會，公會裡幾個老資歷的接待員對看了一眼，都沒說話，只是把白無極的卡檔從F級的抽屜裡取出來，放到桌上，暫時不知道往哪歸類。</p>\n<p>這個人，按現有的等級體系，確實還是F級。</p>\n<p>但這個事，說出去都沒人信。</p>\n<p>---</p>\n<p>蘇家老宅的偏廳裡，一盞茶的時間後，白無極聽到了叩門聲。</p>\n<p>他正在啃從街上買的一塊麥芽糖，把門打開，看見一個穿著蘇家管事服飾的老人站在門外，頭髮花白，眉目深刻，氣質不像普通的管事，背脊挺直，一看就知道是有修為在身的人。</p>\n<p>白無極認出他了。</p>\n<p>蘇家長老，蘇玄昌。</p>\n<p>他見過幾次，是蘇家除了家主之外最有分量的人，在蒼雲城的蘇家產業裡掛了個「顧問」的名頭，實際上是蒼雲城這一片蘇家業務的決策者之一。</p>\n<p>「白先生。」蘇玄昌開口，聲音穩當，帶著幾分平日裡大概很少有的客氣，「打擾了。」</p>\n<p>「不打擾。」白無極把麥芽糖在嘴裡移了一下，讓開了門口，「進來坐？」</p>\n<p>蘇玄昌搖了搖頭，沒有進去，站在門口，看著白無極，停頓了兩秒，然後說：</p>\n<p>「蒼雲城欠你一個人情。」</p>\n<p>說完了，他就看著白無極，等他說話。</p>\n<p>白無極嚼了嚼麥芽糖，把它嚥下去，在齒縫裡過了一下，然後說：</p>\n<p>「記著就好。」</p>\n<p>蘇玄昌沒有說謝謝，也沒有再說多餘的話，只是對白無極點了一下頭，轉身，腳步穩當地走了。</p>\n<p>白無極看著他的背影走遠，把門帶上，重新坐回椅子上，把手邊的麥芽糖拿起來，繼續啃。</p>\n<p>這個老頭說話很簡潔，他喜歡。</p>\n<p>「記著就好」這四個字，是真的沒有複雜意思，就是字面意思——你記著欠我一個，以後用得上再說。白無極對現在的蒼雲城蘇家，不需要任何特別的承諾或保護，但人情這種東西，攢著有用。</p>\n<p>何況，那個欠人情的理由裡，有一半其實是昨晚的深夜和那張紙條的緣故。</p>\n<p>白無極停了一下，嘴角往上彎了一下。</p>\n<p>不過這個，就不用告訴蘇玄昌長老了。</p>\n<p>---</p>\n<p>到了夜裡，蒼雲城的格局已經悄悄變了。</p>\n<p>陳家的產業沒有被明面上沒收，但沒有人再上門，沒有靈契者再過來「拜訪」。幾條巷子裡本來掛著陳家招牌的小攤，悄悄取下了那些招牌，換回了自家的名字。</p>\n<p>底層的靈契者，那些F級、E級的普通人，在茶館裡說話的聲音比往常大了一點點。</p>\n<p>這種改變不是劇烈的，不是一夜之間天翻地覆，而是那種鬆了口氣之後的細微舒展，是一個城市的底層在壓力減輕之後，細胞慢慢重新活動的聲音。</p>\n<p>冒險者公會的老掌事坐在自己的位子上，喝著茶，想了很久，拿出白無極的卡檔，在上面用朱砂筆點了一個小紅點，這是蒼雲城冒險者公會私下的記錄方式，代表「此人需要重點關注」。</p>\n<p>然後他把卡檔放進一個獨立的抽屜，鎖上。</p>"}, {"title": "第29章_霜翎感覺到了", "content": "<p>第29章　霜翎感覺到了</p>\n<p>黃昏時分，蘇家的院子靜得很。</p>\n<p>蒼雲城蘇家的宅院不算大，比起蘇家本部的規模，這裡更像是一個精緻的前哨站，院子裡種著幾株銀梅，這個時節還沒有開花，枝椏光禿禿的，在夕陽裡拉著長長的影子，打在青石地板上。</p>\n<p>蘇念卿坐在廊廡的台階上，膝蓋上擱著一本薄薄的冊子，是各地靈獸的習性記錄，她在翻，但翻得有些漫不經心，目光有時候落在頁面上，有時候落在遠處的院牆上，說不清在看什麼。</p>\n<p>霜翎蜷在她旁邊，銀色的毛髮在夕陽下泛著很淺的金光，尾巴圈住自己的身子，眼睛半開半閉，像是在打盹。</p>\n<p>這是她們每天傍晚的習慣，不做什麼，就在院子裡坐著，讓一天結束得安靜一點。</p>\n<p>然後霜翎動了。</p>\n<p>不是驚跳，是那種從睡意裡被某種東西輕輕拉回來的清醒——緩慢的，確定的。它把頭從尾巴圈成的窩裡抬起來，銀色的耳朵往某個方向轉了轉，轉過去，然後定住了。</p>\n<p>蘇念卿感知到了這個動作，把目光從遠處收回來，低頭看向霜翎。</p>\n<p>霜翎的耳朵還是朝著那個方向，喉嚨裡發出了一個聲音——很低沉，像是在水下的悶響，不是警戒，不是撒嬌，是一種非常認真的聲音，那種牠在感知到什麼重要的事情之後才會發出的聲音。</p>\n<p>蘇念卿的眉頭微微動了一下：「你感覺到什麼？」</p>\n<p>霜翎沒有回頭，眼睛朝著那個方向凝視著，那是蒼雲城東邊的方向，是天雲客棧所在的那片街道的方向。</p>\n<p>銀色的尾巴垂了下去，原本圈成圓形的姿勢舒展開來，霜翎的身子往前傾，爪子輕輕在石板上點了一下，喉嚨裡的低鳴持續著，不急不緩，但那種認真沒有消退。</p>\n<p>蘇念卿放下手裡的冊子，在霜翎旁邊輕輕坐直，視線跟著霜翎的方向，望向院牆那邊。</p>\n<p>她什麼都看不見，院牆外是普通的街道，這個時間街上應該有人在走動，傍晚的蒼雲城不算安靜，但也沒有什麼特別的聲響傳過來。</p>\n<p>然而霜翎在感知什麼，這是確定的。</p>\n<p>蘇念卿伸手，摸了摸霜翎的頭，從兩耳中間往後順了一下，銀色的毛髮柔軟，在她指間輕輕流動。</p>\n<p>「你感覺到什麼？」她又問了一遍，但這次聲音更低，帶著一點探詢。</p>\n<p>霜翎終於把頭轉過來，看了她一眼。</p>\n<p>那對眼睛，冰藍色，清澈得像是剛融化的雪水。它看著蘇念卿，喉嚨裡的低鳴停了，換成了一種更短促的、帶著幾分不確定的輕哼，然後又把頭轉回去，繼續盯著那個方向。</p>\n<p>蘇念卿若有所思。</p>\n<p>霜翎是銀狐，冰屬性的靈獸，天賦之一是精神感知——不是讀心，是那種能感受到精神力波動的能力，就像感受到空氣裡的溫度變化一樣。到了蘇念卿現在契師巔峰的層次，霜翎的精神感知已經相當敏銳，方圓三里內有契師以上的靈契波動，它都能察覺到大致的方向和強弱。</p>\n<p>但那是靈契波動。</p>\n<p>霜翎感知到的，是靈契。</p>\n<p>而天雲客棧那個方向，感知到的任何東西，蘇念卿第一個想到的，是那個年輕人。</p>\n<p>問題是——那個人沒有任何靈契波動，這件事蘇念卿親眼確認過，不是壓制，是真的沒有。她把自己的感知放到最細，在第一次見面的時候，以及之後試探切磋的幾次，她都感知不到那個人身上有任何靈契的氣息。</p>\n<p>但霜翎在感知什麼。</p>\n<p>不是靈契，是另一種東西。</p>\n<p>蘇念卿的手在霜翎的頭頂停下，她的腦子裡轉著一個問題：如果霜翎感知到的不是靈契，那是什麼？</p>\n<p>她見過各種各樣的力量形態，從最普通的靈契，到各種靈獸天賦，到古籍裡記載的幾種稀奇的體質。但霜翎此刻的這種反應，帶著一種她說不太清楚的東西——不是驚慌，不是警戒，更接近於那種遇見了某種陌生但有生命的東西時的、謹慎的好奇。</p>\n<p>就像第一次遇見某種新的靈獸。</p>\n<p>蘇念卿把手收回來，靠著廊廡的柱子，低頭看著腳下的青石板，想了很長時間。</p>\n<p>霜翎的感知捕捉到了那個方向的「精神力波動」。</p>\n<p>但那個精神力，不像任何她認識的靈契波動。</p>\n<p>不像靈契的，精神力。</p>\n<p>蘇念卿把這個定義在腦子裡過了一遍，然後慢慢抬起頭，往院牆外的方向看了一眼。</p>\n<p>夕陽最後的光線正在消退，天色從橙紅漸漸往深藍過渡，蒼雲城的燈火開始一盞一盞地亮起來，暖黃的光點散落在城中各處。</p>\n<p>她看了很久，沒有說話。</p>\n<p>霜翎在她旁邊坐了好一會兒，那個方向的感知似乎漸漸淡了，牠的耳朵緩緩轉回來，尾巴重新圈住自己，在台階上重新縮成了一個球，把頭枕在尾巴上，閉上眼睛。</p>\n<p>這次，像是真的要睡了。</p>\n<p>蘇念卿低頭看了牠一眼，把冊子重新拿起來，翻到剛才看的那一頁，視線落在上面，繼續讀。</p>\n<p>但讀了兩行，她又停下來。</p>\n<p>把冊子合上，放到旁邊。</p>\n<p>「有意思，」她輕聲說，說完自己也停頓了一下，把這句話再過了一遍——這是她第一次見到那個年輕人時說的話，沒想到過了這些天，還是這四個字。</p>\n<p>院子裡安靜，銀梅的枝椏在夜風裡輕輕搖著，霜翎的呼吸放緩，均勻而深沉。</p>\n<p>蘇念卿坐在廊廡的台階上，手指輕輕叩著膝蓋，一下，兩下，三下，然後停了。</p>\n<p>那個人，到底是什麼？</p>"}, {"title": "第30章_遠方的注視", "content": "<p>第30章　遠方的注視</p>\n<p>消息跑得比人快。</p>\n<p>這是天衍大陸上一個亙古不變的事實——只要有利益，消息就不會真正被封鎖。陳家在蒼雲城的三名契將被打倒，這件事的重要性不在事件本身，而在那個「怎麼打倒的」——沒有靈契波動，沒有任何已知的力量形態，一個人，對三個契將加上十六個契師，全勝，自我治療，然後走了。</p>\n<p>這種事，在天衍大陸，從來沒有發生過。</p>\n<p>消息以驛鳥傳書和商隊口耳相傳的雙重方式向外輻射，速度快的，在事發當天夜裡就出了蒼雲城，進入了附近幾個大城的情報網。速度慢的，也在三天之內抵達了各個大勢力的耳朵。</p>\n<p>天衍大陸的權力格局，以四大家族和幾個頂尖的江湖門派為支柱，在這張網上，任何一個角落發生的異動，都逃不過那些長了眼睛的觸鬚。</p>\n<p>---</p>\n<p>蘇家本部，靖淵城。</p>\n<p>家族議事廳裡，主事長老蘇明德把那份情報看了兩遍，放下，對坐在對面的幾個分支長老說：「此人可重用。」</p>\n<p>沉默了一瞬，另一個長老說：「他是體契者？還是某種我們沒見過的靈契形態？」</p>\n<p>「不重要，」蘇明德說，「重要的是，他用我們感知不到的力量，做到了契王才能做到的事。這樣的人，要麼提前納入，要麼提前除掉，不能讓別的勢力搶先。」</p>\n<p>又一個長老問：「他現在在哪？」</p>\n<p>「蒼雲城，還沒走。」</p>\n<p>「好，讓玲瓏司的人去接觸一下，試試他的底細，別急著表態。」</p>\n<p>蘇明德點點頭，把情報收起來，把茶盞端起來，輕輕喝了一口。</p>\n<p>念卿在蒼雲城，他本來是讓她去那邊歷練、打理蘇家的西境事務。現在看來，念卿那邊接觸到的，可能比他預想的更有價值。</p>\n<p>他想了想，沒有給蘇念卿發指令，只是在心裡記了一下。</p>\n<p>以念卿的眼力，她早就在看了。</p>\n<p>---</p>\n<p>陳家本部，遠州城。</p>\n<p>正廳裡只有三個人，家主陳遠山坐在主位，手邊是剛送到的那封信，「蒼雲城出了個怪物」，七個字，他看了很多遍。</p>\n<p>「查清楚來歷了嗎？」</p>\n<p>「沒有。他自稱白無極，F級冒險者，三個月前在蒼雲城附近出現，沒有任何門派師承記錄，沒有家族背景，像是憑空出現的人。」</p>\n<p>「憑空出現的人，打倒了我陳家的三名契將。」陳遠山的語氣很平，但他放下茶盞的時候，茶盞在桌面上碰出了一聲比平時重了幾分的響。</p>\n<p>「必須除掉。」</p>\n<p>他說的時候沒有情緒，就像在說「今晚下雨，備好傘」一樣的口吻。</p>\n<p>「但不能急，蒼雲城出了這麼大的動靜，其他三家的人都盯著，這個時候再出手，是給別人看笑話。」</p>\n<p>「那……暫時觀察？」</p>\n<p>「找個說得過去的機會。」陳遠山把情報放到旁邊，「讓玄殺堂的人注意著，等合適的時機。」</p>\n<p>---</p>\n<p>赫連家，東境燕臨城。</p>\n<p>消息送到赫連燁手裡的時候，他正在練劍，一個人在演武場，劍走得很快，每一式都帶著凌厲的氣勁。</p>\n<p>信使把情報呈上，他收劍，掃了一眼，嘴角慢慢彎起來。</p>\n<p>「有意思。」</p>\n<p>他把情報重新折好，遞還給信使，說：「派人去看看。不要去招惹他，就看著，讓我知道他是什麼人。」</p>\n<p>「是。」</p>\n<p>赫連燁重新把劍舉起來，慢慢走出下一式，停在那個位置上，若有所思。</p>\n<p>「沒有靈契波動，打倒三名契將。」他把這句話在嘴裡過了一遍，「要麼是天才，要麼是怪物，不管哪種，都值得見一見。」</p>\n<p>他繼續走完那一式，演武場上颳起一陣勁風，把劍氣帶出去好幾丈遠。</p>\n<p>---</p>\n<p>慕容家，北境。</p>\n<p>家主慕容玦坐在書房，房間裡只點了一盞燈，光線不亮，把他臉上的輪廓照得半明半暗。</p>\n<p>情報擺在書案上，他看了，沉默了很長時間。</p>\n<p>旁邊的幕僚等他開口，等了快半柱香的時間，才聽到他說了一個字：</p>\n<p>「盯著。」</p>\n<p>就這兩個字。</p>\n<p>幕僚應了聲，退出去。</p>\n<p>慕容玦沒有繼續看情報，他把它翻過去，面朝下，壓在書案上，然後重新拿起筆，繼續批手邊的文件。</p>\n<p>那一個「盯著」，不是輕描淡寫，是一個在他那個層次的人，對一件重要的事情保持最高警惕的方式。</p>\n<p>---</p>\n<p>蒼雲城，入夜後。</p>\n<p>天雲客棧的頂層，白無極爬上了屋頂。</p>\n<p>這是他最近養成的習慣，每天夜裡，客棧打烊、走廊安靜之後，他就從頂層的窗子爬出來，坐在屋頂上，吹會兒風，看看天。</p>\n<p>這個世界的天，比他原來那個世界的夜空更清澈，沒有光汙染，沒有霧霾，星星多得幾乎密集，像是有人把整包的碎鑽全部灑在了一塊黑色的絲絨上，一點都不節省。</p>\n<p>白無極仰躺在屋脊的瓦片上，把兩條腿交叉，手疊在腦後，眼睛看著頭頂的星空。</p>\n<p>白金之星在他左側站著，沉默如常，星空色的鎧甲和真實的星空遙遙呼應，說不清是誰更像誰。黃金體驗在他右側，修長的身影帶著淡淡的金色光暈，輕輕浮在屋瓦邊，像一道流動的燭火。</p>\n<p>三個存在，兩個替身，一個人，共同佔據著蒼雲城一個小客棧的屋頂。</p>\n<p>白無極沒有說話，就靜靜地看著星空。</p>\n<p>他穿越過來三個月了，三個月裡發生的事，比他前二十幾年加起來還多。金球、替身覺醒、蒼雲城、冒險者公會、蘇念卿和霜翎、陳家的一連串麻煩，還有今天的那場架，以及今天之後，他知道，這個世界會有更多的注視落到他身上，更多的力量會開始關注他，試探他，或者試圖除掉他。</p>\n<p>這些他都清楚。</p>\n<p>但此刻，看著頭頂的星空，他感覺到的不是壓力。</p>\n<p>是一種說不清楚的輕鬆，或者說，是那種確認了「我還活著、我站在這裡、這個世界是真實的」之後，最底層的、某種踏實的感覺。</p>\n<p>他在原來的世界，是個很普通的人，上班，下班，打拳，週末睡懶覺，人生的軌跡清清楚楚，一眼能看到退休。不是不好，只是平，平到有時候會覺得，每一天和前一天的差別，小到可以忽略不計。</p>\n<p>現在每一天都不一樣。</p>\n<p>今天和昨天不一樣，明天肯定也和今天不一樣。</p>\n<p>「喂，」白無極對著星空開口，語氣隨意，像是在跟兩個老朋友說話，「你們說，接下來會有什麼？」</p>\n<p>白金之星沒有說話，但它低下頭，朝他看了一眼。那個眼神不是回答，是一種確認——我在，就夠了。</p>\n<p>黃金體驗輕輕晃了晃，那個金色的光暈向外散出去一圈，又收回來，像是嘆了口氣。</p>\n<p>白無極嘴角慢慢彎起來。</p>\n<p>「說得對，兵來將擋，水來土掩。」</p>\n<p>他把手從腦後收回來，在胸口交叉，閉上眼，讓夜風把頭髮吹亂，吹過耳廓，帶著天衍大陸的草木氣息，涼而淡。</p>\n<p>城裡的燈火在屋頂下面亮著，遠遠近近，橙黃色的光點散落在黑夜裡，那是數不清的人在燈下吃飯，說話，入睡，做夢，過著各自的日子。他是其中一個，卻又不完全是——他是那個站在很深的角落裡、還沒有人完全看清楚他的存在。</p>\n<p>這樣也好。</p>\n<p>被看見是以後的事，現在還不急。</p>\n<p>白無極睜開眼，再一次看向那片無邊的星空，那些星星密密麻麻，亮得靜謐，像是一個沉默的見證。</p>\n<p>「這個世界，」他輕聲說，語氣裡有一種確定的東西，不是豪言，不是誓言，只是說給自己和兩個替身聽的，很輕，很私人，「還挺有意思的。」</p>\n<p>夜風吹過，把那句話帶散了，融進蒼雲城的夜裡。</p>\n<p>白金之星和黃金體驗靜靜站著，守著那個躺在屋頂上看星空的人，一左一右，如山，如光。</p>\n<p>蒼雲城的夜，深了。</p>\n<p>天衍大陸的某個地方，燈火通明的廳堂裡，各自的棋手正在落下各自的棋子，棋盤上的格局正在悄悄改變。</p>\n<p>而棋盤中央的那個位置，一個還沒有名字的、空著的格子，正在等待著什麼東西來填滿它。</p>\n<p>那個填滿它的人，此刻正躺在蒼雲城一個小客棧的屋頂上，看著星空，微微笑著，什麼都不知道，或者說，什麼都知道，只是不在乎。</p>\n<p>——卷一完——</p>"}, {"title": "第31章_名聲是雙刃劍", "content": "<p>第31章　名聲是雙刃劍</p>\n<p>蒼雲城的清晨從來不安靜。</p>\n<p>不是因為鳥叫，不是因為市集，而是因為從昨天開始，客棧門口就多了七八個人，或站或蹲，有的假裝在看風景，有的假裝在等人，但每個人的眼神都不約而同地往二樓某扇窗戶瞟。</p>\n<p>白無極掀開窗簾往下看了一眼，又放下窗簾。</p>\n<p>他重新躺回床上，把枕頭蓋在臉上。</p>\n<p>已經是第三天了。</p>\n<p>自從那場三對一的廝殺消息在蒼雲城傳開，他的生活就沒有消停過。起初是街坊鄰居的竊竊私語，接著是各路消息靈通人士登門打探，然後是小勢力的「拜帖」，昨天更是接連來了四撥人，說要「切磋」。</p>\n<p>白無極把四撥人全打出去了——沒有用替身，就是普通的八極拳，逮著人的後脖子拎出門口丟下樓梯。</p>\n<p>問題是這樣並沒有讓人知難而退，反而讓他的名聲又進一步擴散。</p>\n<p>「據說他徒手把陳家的契將打到吐血。」</p>\n<p>「我聽說他的靈契是暗系的，能直接碾碎對方的靈力。」</p>\n<p>「不對不對，我親眼看見的，那個藍色高大的人形……」</p>\n<p>「什麼人形，你那天喝多了吧？」</p>\n<p>樓下的議論聲隱隱約約飄上來，白無極把枕頭壓得更緊了一些。</p>\n<p>他穿越來這個世界已經快一個月，第一週把基本情況摸清楚，第二週試著在蒼雲城找了個短工維持生計，第三週跟蘇念卿一起打退了陳家的圍殺，然後就是這一週——徹底被名聲反噬。</p>\n<p>「所以說，低調做人是有道理的。」他對著天花板說，沒有人回應。</p>\n<p>白金之星靜靜站在房間角落，雙臂交叉，用那張沒什麼表情的臉看著他。</p>\n<p>「……你就不能說點什麼安慰我的話嗎？」</p>\n<p>白金之星的眼神分明是在說：說什麼，事實就在這裡。</p>\n<p>白無極嘆了口氣，把枕頭扔到一邊，坐起來。</p>\n<p>---</p>\n<p>下樓吃早飯的時候，掌櫃親自迎了出來，滿臉堆笑，低頭哈腰，把他引到了一個獨立的小包廂。</p>\n<p>「白先生，這是我們店裡最好的位置，隔音好，清靜，您用早膳的時候不會被打擾。」掌櫃說話的時候眼睛都不敢直視，盯著自己的鞋尖，語氣比上週恭敬了起碼三個等級。</p>\n<p>「我上週住的那個房間那麼小，現在突然換最好的房間，是怎麼個意思？」</p>\n<p>掌櫃額頭沁出薄薄的汗：「白先生說笑了，您是大客……是，是貴客，本來就該住好房間的，之前是小店眼拙，還望見諒……」</p>\n<p>白無極打量了他片刻，轉了個意思：「加錢嗎？」</p>\n<p>「不！不不，分文不加，這是小店的誠意！」</p>\n<p>「哦。」白無極在椅子上坐下，「那把你們店裡最好的叉燒包給我來一籠。」</p>\n<p>包廂的門合上，他才真正鬆了口氣。安靜。</p>\n<p>叉燒包送上來的時候還冒著熱氣，確實比之前在大堂吃的好得多，皮薄汁多，白無極吃了一個，心情稍微好了一點。</p>\n<p>好景不長，包廂的門被輕輕扣了兩下。</p>\n<p>他沒說話。</p>\n<p>門還是被推開了，走進來一個穿著青色長袍的年輕人，約莫二十出頭，臉上掛著討好的笑，進來就拱手：「白先生，在下蒼雲城東街的鄭家，家主讓我送來一份拜帖，還有一份入夥的邀請，希望先生能夠……」</p>\n<p>「沒興趣。」</p>\n<p>「先生不妨聽我說說條件，我們鄭家雖然不算大勢力，但在蒼雲城也算有頭有臉，每月的分紅……」</p>\n<p>「沒興趣。」</p>\n<p>「先生，我家家主說了，只要先生答應，什麼條件都可以談——」</p>\n<p>「你現在這樣說話，」白無極抬頭看了他一眼，「是你家家主說可以不停打斷別人吃飯的嗎？」</p>\n<p>年輕人噎了一下。</p>\n<p>「第一次沒興趣，第二次也沒興趣，第三次有興趣猜猜是什麼？」</p>\n<p>年輕人嚥了口唾沫：「什……什麼？」</p>\n<p>「還是沒興趣。」白無極低下頭繼續吃叉燒包，「把門帶上，謝謝。」</p>\n<p>---</p>\n<p>這是上午。</p>\n<p>下午的麻煩更多。</p>\n<p>先是一個自稱「飛鷹商會」的中年人，送了一個價值不菲的玉牌過來，說是「見面禮」，順帶表達了商會「保護費用全免，還倒貼」的誠意，被白無極讓他把玉牌原封不動帶回去。</p>\n<p>然後是兩個看起來像是修煉派的年輕人，契士等級，說要向白無極「請教靈契感悟」，白無極告訴他們「我沒有感悟，你們去別處請教吧」，兩人面面相覷，不確定這是謙遜還是真的，在門口站了半刻才離開。</p>\n<p>最後一個是個老頭，滿臉皺紋，自我介紹是什麼「太虛門」的掌門，說聽說白無極是體契，太虛門有秘法可以讓體契進階，願意傳授，只要白無極答應替太虛門辦一件事……</p>\n<p>白無極直接問：「什麼事？」</p>\n<p>老頭猶豫了一下，說是幫他們解決一個「麻煩對手」。</p>\n<p>白無極：「不幹。」</p>\n<p>老頭急了：「先生，您聽我說，那個對手也不是什麼好人……」</p>\n<p>「你說他不是好人，那我替你打他，他說你不是好人，他替別人打你，到最後，打了一圈的人都說自己是因為對方不是好人。」白無極站起來，「我一個穿越——我一個外鄉人，不參與你們的恩怨，謝謝。」</p>\n<p>老頭愣在門口，嘴巴張了張，沒說出話來。</p>\n<p>白無極回了房間，把門栓上。</p>\n<p>坐在椅子上，他揉了揉臉。</p>\n<p>名聲這種東西，白無極在現代生活了三十年是從來沒有的——他頂多算是公司裡「那個挺能加班的傢伙」，偶爾在拳館練拳的時候有點小名氣。到了異世界之後，他本來打算繼續低調，結果局勢不允許。</p>\n<p>問題是，名聲起來之後，麻煩就會跟著來，而且越來越多，越來越難打發。</p>\n<p>「這是個正反饋迴路。」他對著空氣自言自語，「越有名，越多人來試探，越試探，越有名。」</p>\n<p>黃金體驗從他左肩旁邊浮現出來，金色的輪廓安靜地漂浮在空中，像是在傾聽。</p>\n<p>「你說我是不是應該找個機會低調消失出城？」</p>\n<p>黃金體驗沒有回應，但那個安靜的姿態讓白無極有點說不清楚的踏實感。</p>\n<p>「算了，先看看。」</p>\n<p>---</p>\n<p>傍晚，他正打算出去找點吃的，剛開門，差點跟蘇念卿撞個正著。</p>\n<p>蘇念卿站在走廊裡，手裡拿著一個折疊的信封，表情和往常一樣，沒什麼情緒起伏，但眉梢隱隱有點沉。</p>\n<p>「有事？」</p>\n<p>「有個消息。」她把信封收起來，「赫連家的使者，後天到蒼雲城。」</p>\n<p>白無極哦了一聲，靠著門框，「來做什麼？」</p>\n<p>「目前還不清楚，但按照赫連家一貫的行事風格……」蘇念卿頓了一下，語氣淡淡的，「應該是來招攬你的。」</p>\n<p>「四大家族就這麼閒？」</p>\n<p>蘇念卿瞥了他一眼：「你現在的名聲在整個蒼雲城都傳開了，而且按消息的傳播速度，最多再過五天，附近所有勢力都會知道。四大家族有人在蒼雲城都布有眼線，想瞞也瞞不住。」</p>\n<p>「那你們蘇家呢？」白無極問，「你們蘇家不來招攬我？」</p>\n<p>蘇念卿沉默了一瞬：「我已經把你的事報上去了，家族的回應還沒下來。」</p>\n<p>「哦。」白無極看了看她，「你覺得赫連家的人好打發嗎？」</p>\n<p>「赫連家不同於陳家，他們不會直接動手，但也正因為如此——」她話說到一半，停了下來。</p>\n<p>「所以？」</p>\n<p>「所以說話可能比動手更麻煩。」蘇念卿扯了扯嘴角，說不清楚是嘲諷還是提醒，「你想好怎麼應對嗎？」</p>\n<p>白無極想了想：「能不能讓他們吃閉門羹？」</p>\n<p>「你可以試試。」</p>\n<p>「……我聽你的語氣，是不行的意思。」</p>\n<p>「你現在住在蒼雲城最大的客棧，赫連家的使者進城之後，用不著打聽就知道你在哪裡。」蘇念卿說，「除非你現在搬走。」</p>\n<p>白無極看了看腳下，掌櫃今天剛剛給他升了最好的房間，還配了一套嶄新的茶具。</p>\n<p>「……算了，」他嘆氣，「見就見吧，大不了再讓他們吃個閉門羹。」</p>\n<p>蘇念卿偏了偏頭，看他的眼神有點說不清楚，像是評估，又像是有什麼話要說，但最後只是短短開口：「後天，你自己看著辦。」</p>\n<p>說完轉身要走，走了兩步，又回頭補了一句：</p>\n<p>「記得少說幾句廢話，赫連家的使者不是蒼雲城的地頭蛇，不太好打發。」</p>\n<p>白無極：「……謝謝你的關心。」</p>\n<p>蘇念卿沒回頭，腳步不停，走廊的燈光把她的背影拉得細長，霜翎在她肩頭縮成一團，銀白色的尾巴搭下來，悄悄往白無極這個方向看了一眼，然後又迅速移開。</p>\n<p>白無極看著她離開，關上門，回去找叉燒包。</p>\n<p>客棧掌櫃這一天換了三次好茶葉，兩次點心，臉上始終掛著那個討好的笑容，活脫脫一幅「拜託別在我這裡出事」的表情。</p>\n<p>白無極坐在窗邊，樓下依然有人在看，他隔著窗朝那幾個人揮了揮手，幾個人立刻縮了縮脖子，裝作在看別的地方。</p>\n<p>名聲這種東西，說有用是有用，說沒用也是真沒用。</p>\n<p>撐不住的時候是雙刃，護得住的時候才是盾。</p>\n<p>他不確定自己算哪一種，但後天的事先過了再說。</p>\n<p>先把剩下的叉燒包吃完。</p>"}, {"title": "第32章_赫連家的使者", "content": "<p>第32章　赫連家的使者</p>\n<p>赫連家的使者比預期早到了半天。</p>\n<p>白無極正在院子裡打拳，早晨的光線斜斜照進來，他的動作不快，是平時養習慣的慢練，一勢接一勢，把八極拳的每個架子都走得扎實。</p>\n<p>院子裡有幾個客棧的夥計假裝掃地，實際上眼睛都在往他這邊瞟。他已經習慣了。</p>\n<p>「白先生。」</p>\n<p>客棧掌櫃快步從門口走進來，臉上的笑容比往常繃得更緊，帶著一種微妙的緊張，「有客人說要見您，說是……說是赫連家派來的。」</p>\n<p>白無極收了勢，拍了拍手上的灰。</p>\n<p>「讓他們等著。」</p>\n<p>「這……」掌櫃左右看了看，壓低聲音，「是赫連家啊，先生，赫連家在天衍大陸是四大家族之一，他們派來的人通常不……不太習慣等。」</p>\n<p>「那就讓他們練練。」</p>\n<p>掌櫃張了張嘴，什麼也沒說，低著頭退回去了。</p>\n<p>白無極繼續打了一套，把動作走完，才慢慢回房間換了件乾淨衣服，洗了把臉，這才下樓。</p>\n<p>---</p>\n<p>客棧的大堂裡坐著三個人。</p>\n<p>為首的是個三十出頭的男人，穿著靛藍色的長袍，腰間繫著一條玄金邊的腰帶，領口袖口都是赫連家特有的回紋刺繡，整個人從頭到腳都在說「我是大家族出來的，你們都得正眼看我」。他的氣息強橫，契將級別，坐在那裡沒有開口，已經壓得周圍的散修縮到了角落。</p>\n<p>兩個隨從站在他身後，同樣是契師級別，表情冷漠。</p>\n<p>白無極從樓梯上走下來，那個靛藍袍子的男人抬起頭，打量了他一眼——打量的方式是從上到下，帶著一種習慣性的評估和俯視。</p>\n<p>「你就是白無極？」</p>\n<p>「我就是。」白無極在他對面坐下，招呼掌櫃，「給我來一壺茶。」</p>\n<p>使者眉頭微微動了一下，顯然不太習慣被這樣對待，但他沒有發作，嘴角扯出一個帶著職業性質的弧度：「在下赫連衡，赫連家少家主身邊的主事，奉家主之命，前來邀請閣下。」</p>\n<p>「哦。」</p>\n<p>赫連衡等了一下，見白無極沒有繼續說話的意思，從袖口取出一個疊得整整齊齊的紙張，放到桌上，往白無極方向推了一推：「這是我們赫連家為閣下準備的條件，請過目。」</p>\n<p>他的動作流暢，一看就是做過不知道多少次的標準動作，語氣裡有一種根深蒂固的自信——赫連家的邀請，從來沒有人拒絕過。</p>\n<p>白無極伸手拿起那份「條件書」，展開，從頭看到尾。</p>\n<p>洋洋灑灑寫了兩頁，字跡工整，格式嚴謹，每一條待遇都列得清清楚楚，從月俸到住所，從保護到資源供給，最後還有一行用朱紅色特別標注的文字：「如有特殊需求，可另行商議。」</p>\n<p>白無極看完，把紙疊好，推回去。</p>\n<p>「我看字不多，你念給我聽。」</p>\n<p>大堂裡陡然安靜了一瞬。</p>\n<p>赫連衡臉上的表情很有趣——那種帶著矜持的職業性微笑，在這一瞬間像是突然搭錯了線，嘴角的弧度微微抽搐了一下，眼眸裡閃過一絲難以置信。</p>\n<p>「……閣下說？」</p>\n<p>「我說，」白無極端起剛送來的茶杯，吹了吹熱氣，「你念給我聽。」</p>\n<p>赫連衡深吸一口氣，把那份紙重新拿起來。</p>\n<p>「赫連家邀請閣下入駐，提供：其一，每月靈玉一千枚……」</p>\n<p>他的聲音平穩，語速適中，但那種被人支使著念稿子的屈辱感讓他臉色肉眼可見地發黑。兩個隨從站在身後，眼神都不知道該往哪兒放。</p>\n<p>大堂角落裡幾個原本縮著的散修，開始悄悄抬頭，目光在赫連衡和白無極之間來回掃。</p>\n<p>赫連衡念完了最後一條，把紙放下，深吸一口氣，把臉上的表情重新整理了一遍，恢復那個職業性的弧度：「條件如此，閣下意下如何？」</p>\n<p>白無極把茶杯放下，想了想：「念完了？」</p>\n<p>「念完了。」</p>\n<p>「不去。」</p>\n<p>又是那種短暫的靜默，彷彿所有人都需要半秒鐘的時間來處理這兩個字。</p>\n<p>赫連衡的臉色從黑轉向一種更複雜的層次：「……閣下，為何？」</p>\n<p>「不想去。」</p>\n<p>「這……」赫連衡深吸一口氣，把那份已經被自己念完一遍的條件書攤開，推到白無極面前，「閣下或許還沒考慮清楚，赫連家提供的條件在整個天衍大陸都算是頂級的，靈玉、資源、地位，每一條都是其他勢力難以比擬的，若閣下有特殊需求……」</p>\n<p>「我說了，不想去。」白無極重複，語氣和第一次一模一樣，沒有強調，也沒有遲疑，就是陳述一個事實，「不是條件的問題。」</p>\n<p>「那是什麼問題？」</p>\n<p>白無極看了他一眼，思考了一下：「你知道為什麼人養了一隻野貓之後，那隻貓通常不太聽話嗎？」</p>\n<p>赫連衡：「……」</p>\n<p>「因為貓不覺得它在被養，它覺得它在做它想做的事，剛好有個地方讓它睡覺。」白無極把茶杯推到一邊，「我的意思是，我在蒼雲城，是因為我想在這裡，不是因為誰給我提供了什麼條件。如果我想離開，我自己離開，如果我想留下，我自己留下，跟赫連家沒有關係。」</p>\n<p>赫連衡沉默了片刻，換了個角度：「閣下在蒼雲城這樣的小地方，難道沒有更大的志向嗎？赫連家的平台可以讓您——」</p>\n<p>「我沒有志向。」</p>\n<p>「……」</p>\n<p>「至少目前沒有。」白無極補充，「等我有了再說。到時候如果覺得赫連家合適，我自己去找你們。」</p>\n<p>赫連衡把那份條件書緩緩疊好，重新收回袖口，臉上已經徹底看不出那個職業性的微笑了，取而代之的是一種隱忍的、被壓下去的複雜情緒。</p>\n<p>「閣下考慮清楚了？」</p>\n<p>「嗯。」</p>\n<p>「赫連家的邀請，不是每個人都能得到的。」他頓了頓，加了一句，聽起來像是最後的提醒，也像是隱晦的警告。</p>\n<p>白無極看著他，過了一拍，說：「我知道。謝謝你跑這一趟，路上慢走。」</p>\n<p>---</p>\n<p>赫連衡走的時候，後背筆直，腳步穩健，什麼表情都沒帶，但兩個隨從跟在他身後出了客棧大門之後，白無極依稀聽見其中一個壓低聲音說了什麼。</p>\n<p>他沒有特意去聽，端起茶杯，茶已經涼了一些，還是喝了。</p>\n<p>掌櫃顛顛地跑過來，臉上的表情是「你剛才做了一件讓我又驚又怕但說不清楚是對是錯的事」。</p>\n<p>「白先生……赫連家那位，好像不太高興？」</p>\n<p>「他當然不高興，」白無極說，「他大概從來沒被人讓他念過自己的文件。」</p>\n<p>「您……真的不考慮去赫連家嗎？」掌櫃小心翼翼地問，「那邊的條件確實……」</p>\n<p>「你是幫我打算，還是幫赫連家打算？」白無極瞥他一眼。</p>\n<p>掌櫃立刻搖頭如撥浪鼓：「打算、打算都不打算，小的多嘴了！」</p>\n<p>白無極點了點頭，站起來，把茶杯放回去，往樓上走。</p>\n<p>走到樓梯口，他想起什麼，回頭問：「今天中午有沒有好的館子推薦？我想吃點肉。」</p>\n<p>掌櫃立刻精神一振，彷彿找到了貢獻的出口：「有有有！南街有家鹿鳴館，他們的紅燒野豬肉是一絕，小的這就去幫您訂包廂！」</p>\n<p>「不用包廂，」白無極說，「大堂就好，我不挑這個。」</p>\n<p>他上了樓，沒再說話。</p>\n<p>走廊裡，蘇念卿站在自己房間門口，手臂環胸，臉上是那副雲淡風輕的表情，也不知道在這裡站了多久。</p>\n<p>「你聽了多少？」白無極問。</p>\n<p>「從你讓他念文件開始。」</p>\n<p>「那就是全部。」</p>\n<p>蘇念卿沒有說什麼，轉身推開房門，停了一下，說：「南街鹿鳴館的紅燒野豬肉確實不錯。」</p>\n<p>說完進去，把門帶上了。</p>\n<p>白無極站在走廊裡，看著那扇關上的門，想了想。</p>\n<p>「……這算是邀請嗎？」他問黃金體驗。</p>\n<p>黃金體驗沒有回答，金色的輪廓平靜地漂在他身邊，安安靜靜。</p>\n<p>白無極搖了搖頭，回房間拿外衣。</p>\n<p>管它算不算，反正中午要吃肉。</p>"}, {"title": "第33章_蘇念卿的麻煩", "content": "<p>第33章　蘇念卿的麻煩</p>\n<p>信是午後送到的。</p>\n<p>蘇念卿剛從市集回來，手裡拎著幾包藥材，都是給霜翎備用的——銀狐體質偏寒，需要定期調理靈力。她把東西放在桌上，坐下來，看見霜翎正蜷在窗台上，銀色的皮毛在陽光裡泛著光，睡得安安靜靜。</p>\n<p>信封是蘇家的信鴿帶來的，在桌上壓著，信封上的封印一眼就能認出，是家族總部直屬的章。</p>\n<p>她拆開。</p>\n<p>信很長，是家族大老爺的親筆，措辭工整，語氣溫和，但字裡行間透出的意思清清楚楚：</p>\n<p>——蒼雲城的事，家族已知。妥善應對，不必張揚。</p>\n<p>——另，慕容家少主慕容燁近日有意結親，指名蘇念卿，已托人傳話至家族。慕容家雖是敵非友，但四大家族之間的平衡需要維繫，此事可作為緩衝，請卿兒認真考量，若有意，家族自會安排。</p>\n<p>——你的判斷向來可靠，但此事關係重大，望慎重。</p>\n<p>蘇念卿把信看完，重新折起來，折了一半，停住了。</p>\n<p>她把信攥在手裡，攥緊，紙面發出細微的褶皺聲。</p>\n<p>霜翎從窗台上抬起頭，銀色的眼睛往她這邊看了一眼，輕叫了一聲。</p>\n<p>蘇念卿沒有說話。</p>\n<p>她把信繼續攥，攥成一個不規則的團。</p>\n<p>---</p>\n<p>門被人敲了兩下。</p>\n<p>「念卿，你在嗎？」</p>\n<p>是白無極的聲音。蘇念卿把信攥得更緊了一下，然後放開，拿起來放進袖口。</p>\n<p>「在，什麼事？」</p>\n<p>門沒有被推開，走廊裡停了一拍，然後是白無極散漫的聲音：「問你下午要不要去外面走走，赫連家那個使者走了，我想出去透透氣。」</p>\n<p>「不去。」</p>\n<p>又是一拍的停頓。</p>\n<p>「你沒事吧？」</p>\n<p>「沒事。」</p>\n<p>走廊裡的腳步聲停了，沒有離開，也沒有靠近，像是人站在原地沉默了片刻。</p>\n<p>「……你臉很黑嗎？」</p>\n<p>蘇念卿沉默了一拍：「門都沒開，你怎麼看到我臉色？」</p>\n<p>「猜的，你說話的聲音不對。」</p>\n<p>蘇念卿把袖口裡的信取出來，看了一眼，重新塞回去。站起來，走到門口，把門開了一條縫。</p>\n<p>白無極就站在外面，手揣在袖子裡，整個人懶洋洋地靠著走廊的柱子，眼神往她臉上掃了一圈，頓了頓。</p>\n<p>「臉還真的挺黑的。」</p>\n<p>「……少廢話。」</p>\n<p>「怎麼了？」</p>\n<p>「家裡的事。」蘇念卿把門開大了一些，轉回去，把袖口裡攥皺的信取出來，舉起來，抖了一下，「你要看嗎？」</p>\n<p>白無極直起身子，走進來，接過去。</p>\n<p>他展開那封被攥得有點褶皺的信，低頭看，視線在紙面上掃了一遍，又從頭掃了一遍，然後疊起來，還給她。</p>\n<p>蘇念卿接回去，等著他說話。</p>\n<p>白無極把手重新揣回袖子裡，表情沒什麼特別的波瀾，若無其事地說：「那挺麻煩的。」</p>\n<p>蘇念卿：「……」</p>\n<p>她翻了個白眼：「廢話。」</p>\n<p>「我是說，你家族的立場挺麻煩的，」白無極補充，語氣像是在討論別人家的事，「慕容家那邊是敵非友，但你家族不想直接撕破臉，所以想用這個當緩衝，但你要是答應了，自己的處境就……」</p>\n<p>「我知道，」蘇念卿說，聲音帶著一點從牙縫裡擠出來的平靜，「所以才麻煩。你還有什麼高見？」</p>\n<p>白無極想了想：「不答應唄。」</p>\n<p>「家族的立場……」</p>\n<p>「你們蘇家的家族立場，是你蘇念卿一個人能決定的嗎？」白無極看著她，「你不答應，天塌了？」</p>\n<p>「天沒塌，但家族的壓力……」</p>\n<p>「那也是家族的事。」白無極說，語氣平靜，「家族要考慮平衡，但要不要嫁人，是你自己的事。」</p>\n<p>蘇念卿看著他，沉默了一拍。</p>\n<p>她認識白無極也不算短了，知道他平時嘴上沒個正形，說話東拉西扯，但偶爾冒出這種直截了當的話，總是在你最沒防備的時候。</p>\n<p>「你說得輕巧。」</p>\n<p>「我說得輕巧，是因為這件事本來就是你說了算。」白無極聳了聳肩，「你是蘇家嫡女，天衍大陸頂尖的契師，你不是那種說一聲要你嫁你就得嫁的人，你自己也知道。」</p>\n<p>「慕容家那邊……」</p>\n<p>「慕容燁這個人我沒見過，」白無極說，「但聽說是少主，習慣被人仰望的那種，」他停了停，「你覺得那種人，值得嗎？」</p>\n<p>蘇念卿沒有回答這個問題。</p>\n<p>她重新把信折起來，這次折得很整齊，放回袖口，站起來，拉了拉袖子，臉上重新恢復了那副風平浪靜的神情。</p>\n<p>「沒什麼事了，你說要出去透氣？」</p>\n<p>「對。」</p>\n<p>「你去吧。」</p>\n<p>白無極站起來，也不勉強，走到門口，停了一下：「霜翎今天看我的眼神有點不對，」他說，語氣輕描淡寫，「你家那隻狐狸，最近有什麼情緒波動嗎？」</p>\n<p>蘇念卿側過頭，霜翎正窩在窗台上，聽見自己的名字，銀色的耳朵動了動，抬起頭，往白無極的方向投去了一個說不清楚是警惕還是評估的眼神。</p>\n<p>「牠沒有。」蘇念卿說，「是你想多了。」</p>\n<p>「哦。」白無極出了門，走廊上的腳步聲漸漸遠去。</p>\n<p>蘇念卿在屋子裡站了片刻，走到窗台邊，霜翎蹭了蹭她的手背，發出一聲輕柔的鼻音。</p>\n<p>「別這樣看他，」她對霜翎說，「他沒有惡意。」</p>\n<p>霜翎把頭偏了偏，尾巴搭下來，銀色的眸子閃了閃，像是在說：我知道沒有惡意，但就是不習慣。</p>\n<p>蘇念卿把窗台邊的藥材重新整理了一遍，放進匣子裡，坐在窗邊，看著外面的蒼雲城街道。</p>\n<p>日光還很好。</p>\n<p>白無極說「不答應唄」，說得很輕，但她把那句話反覆過了幾遍，覺得輕的地方，是因為他確實不覺得這有什麼難以抉擇。他從來不把這些身外的規矩放在心上——家族、立場、臉面——他好像永遠都能從這些東西的縫隙裡找到一個最直接的角度看進去，然後說出一個很簡單的結論。</p>\n<p>她不確定這是因為他聰明，還是因為他和這個世界的規則沒有什麼牽扯，所以看得清楚。</p>\n<p>可能都有。</p>\n<p>袖口裡的信紙硬邦邦的，攥皺再折回去的痕跡還在，摸得出來。</p>\n<p>慕容燁。她在腦子裡把這個名字過了一遍。</p>\n<p>慕容家少主，契將巔峰，據說年少有為，在整個天衍大陸都算是俊傑。</p>\n<p>但他是慕容家的人。</p>\n<p>而慕容家，從來不把別的家族的女兒當人看，只當棋子。</p>\n<p>她把信重新取出來，拿到桌上燈台邊，點燃了燈芯，把那封信的邊角湊了過去。</p>\n<p>紙張在火光裡蜷縮，灰燼落在燈台的瓷盤上，很快就散了。</p>\n<p>---</p>\n<p>晚上，白無極從外面回來，路過蘇念卿房間門口的時候，停了一下，聽見裡面有動靜，是霜翎在叫，很安靜的那種。</p>\n<p>他沒有敲門，繼續走了。</p>\n<p>回到自己房間，把外衣掛起來，坐下，盯著桌上那壺泡剩的茶看了一會兒。</p>\n<p>白金之星在他身後靜靜站著，那個龐大的身影落下一道影子，覆在牆壁上，沉穩。</p>\n<p>「她那個處境，」白無極悶聲說，「其實挺難的。」</p>\n<p>白金之星沒有回答，但那個筆直的站姿說明它在聽。</p>\n<p>「蘇家要她考量，是客氣說法，說白了就是在問她能不能為家族的利益讓一步。」白無極揉了揉臉，「但蘇念卿這個人……你看她平時說話，毒歸毒，冷歸冷，對自己的事她心裡有桿秤，不是那種可以被家族捏著走的。」</p>\n<p>他停頓了一下，自言自語：「她不答應，家族那邊壓下來，我看著她今天的樣子……哎。」</p>\n<p>說完自己先搖搖頭：「管那麼多幹什麼，她不是需要人擔心的那種。」</p>\n<p>他拿起那壺涼茶，喝了一口，放下，閉上眼睛。</p>\n<p>腦子裡浮過白天的畫面——蘇念卿接過信的手，攥皺它的力道，翻白眼說「廢話」的語氣。</p>\n<p>她是個驕傲的人，但驕傲從來不等於不難受。</p>\n<p>白無極不是不知道這一點。</p>\n<p>只是知道，和說得出口，是兩回事。</p>\n<p>他把茶壺放回去，側身躺下，閉上眼睛，對著天花板說了一句沒人聽見的話：</p>\n<p>「隨便，反正慕容家少主要是真的來，我打得贏。」</p>\n<p>說完翻了個身，睡過去了。</p>"}, {"title": "第34章_慕容家少主", "content": "<p>第34章　慕容家少主</p>\n<p>慕容燁進城的動靜不小。</p>\n<p>他帶了八個隨從，都是契師以上，騎著靈馬從南門入，一路招搖過市，蒼雲城的街坊讓道，指指點點，說話聲壓都壓不下去。</p>\n<p>「那是慕容家的少主，」有人說，「慕容燁，聽說是契將巔峰，全天衍大陸都數得著的年輕俊傑。」</p>\n<p>「他來蒼雲城做什麼？」</p>\n<p>「聽說是來找蘇家嫡女的，想要結親。」</p>\n<p>「啊？蘇家那位冷美人？那……」</p>\n<p>這樣的話白無極是在路邊攤吃早飯的時候聽見的，他手裡捏著一個煎餅，咬了一口，繼續聽。</p>\n<p>「那個慕容燁長什麼樣？英俊嗎？」</p>\n<p>「英俊，很英俊，但眼神看人讓人不舒服，看誰都是那種從高處往下俯瞰的感覺。」</p>\n<p>「那蘇家嫡女肯答應嗎？」</p>\n<p>「那誰知道，四大家族的事，咱們小老百姓說不準的……」</p>\n<p>白無極把煎餅吃完，擦了擦手，站起來。</p>\n<p>---</p>\n<p>蘇家在蒼雲城有一個分府，不算大，但佈置精細，是蘇念卿在外歷練期間的落腳地。白無極和蘇念卿認識之後，兩人之間有了個不成文的默契，蘇念卿偶爾讓他過去吃飯，他偶爾過去一趟，算是鬆散的往來。</p>\n<p>今天他本來是去還一本從蘇念卿書架上借來的靈獸習性的冊子，推開分府的側門，走進院子，就感覺氣氛有點微妙。</p>\n<p>幾個蘇家分府的下人站在廊下，縮著脖子，表情各自不安，偶爾用眼角余光往正廳的方向瞟。</p>\n<p>正廳門開著，裡面有說話聲。</p>\n<p>白無極看了看手裡的書，打算悄悄把書放在蘇念卿房門口走人，然後聽見蘇念卿的聲音：</p>\n<p>「蘇家的事，我自有打算。」語氣很冷，是那種不想繼續這個話題的冷。</p>\n<p>「蘇小姐打算的，在下拭目以待。」另一個聲音，男聲，低沉帶著某種漫不經心的自信，「但在此之前，在下還是希望蘇小姐能認真考量，慕容家的誠意是足夠的。」</p>\n<p>白無極停下腳步，想了想，把書夾在腋下，往正廳方向走了過去。</p>\n<p>他走進去，廳裡三個人：蘇念卿坐在主位上，霜翎盤在她肩頭，表情是那種出了名的面癱，但眼神裡帶著隱藏得很深的冷意。</p>\n<p>正廳靠窗的一側，站著一個年輕男人。</p>\n<p>白無極看了他一眼。</p>\n<p>確實英俊，是那種骨骼線條很硬朗、站在人群裡會讓人第一眼就注意到的英俊。穿著月白色的長袍，腰間掛著一塊慕容家特有的丹鳳紋玉佩，眉目舒展，氣度不凡——如果那雙眼睛不是一直帶著那種從上往下看人的神情的話，可能會讓人覺得他是個挺好的人。</p>\n<p>他旁邊站著兩個隨從，都是契師以上。</p>\n<p>白無極走進去，在靠牆的椅子上坐下，把書放在膝蓋上，發現桌上有一碟點心，隨手拿了一塊，放進嘴裡。</p>\n<p>慕容燁轉過頭，看到他，眉頭輕輕皺了一下。</p>\n<p>那皺眉的方式很微妙，不是不滿，也不是疑惑，是那種「你是什麼東西」式的疑惑，帶著一點不值得他放在心上的輕慢。</p>\n<p>「這位是？」他問蘇念卿。</p>\n<p>蘇念卿側過頭，看了白無極一眼，語氣淡淡的：「朋友。」</p>\n<p>「朋友。」慕容燁把這個詞重複了一遍，嘴角扯出一個弧度，意味不太明顯，但說出下一句話之前，那個弧度讓整句話都帶上了漫不經心的輕視，「蘇小姐的朋友，交得倒寬泛。」</p>\n<p>白無極抬起頭，看了慕容燁一眼，臉上掛著一個溫和的笑：「慕容少主，久仰。」</p>\n<p>然後把視線重新移回去，低下頭，繼續翻膝蓋上的書，另一隻手伸去碟子裡又拿了一塊點心。</p>\n<p>廳裡安靜了一拍。</p>\n<p>慕容燁顯然沒有預期到這個反應——他習慣的是，他開口，別人回應，他說話，別人認真聽。就算有人不服氣，也會在他的氣場下表現出某種程度的謹慎。</p>\n<p>但這個人……就在他面前翻書，吃點心。</p>\n<p>完全沒有搭理他的意思。</p>\n<p>那種被忽視的感覺說不清楚讓他是哪裡不舒服，但確實不舒服。他轉回去看蘇念卿，語氣平靜，但眼神裡多了一點什麼：「蘇小姐，今日來是為了誠意而來，希望蘇小姐能給在下一個正式的答覆。」</p>\n<p>「答覆是什麼，我已經說得很清楚了，」蘇念卿說，聲音沒有一絲起伏，「此事我個人沒有興趣，請慕容少主把話帶回去。」</p>\n<p>「個人沒有興趣，」慕容燁重複這幾個字，語氣帶著一種溫吞的堅持，「但蘇家家主那邊，想必有不同的看法？」</p>\n<p>「家族的事，家族自會有結論，」蘇念卿說，「用不著慕容少主替家族操心。」</p>\n<p>兩個人的話鋒都很穩，聽起來是平靜的對話，但那個氣場的拉鋸白無極隔著三步都感覺得到。</p>\n<p>他翻了一頁書，伸手，碟子裡最後一塊點心。</p>\n<p>霜翎的銀色眼睛從蘇念卿肩頭轉過來，盯著那個空掉的碟子，再看白無極，表情有點幽怨。</p>\n<p>白無極把那塊點心咬了一半，考慮了一下，剩下一半放回碟子邊上，算是留給靈狐的。</p>\n<p>廳裡的對話繼續，慕容燁換了個角度，語氣更溫和，態度更誠懇，把慕容家的誠意和四大家族之間合作的長遠利益從頭到尾說了一遍，說得頭頭是道。</p>\n<p>他說話的功夫確實不錯，白無極不得不承認，換個人聽了大概會鬆動幾分。</p>\n<p>但蘇念卿不鬆動，她聽完，平靜地把每個點都接回去，不高聲，不動氣，就是一句接一句地把慕容燁的話擋掉。</p>\n<p>白無極把書翻完，合上，放在旁邊的椅子上，蹺起腿，盯著自己的鞋尖，思考今天中午吃什麼。</p>\n<p>---</p>\n<p>大約過了半個時辰，慕容燁說完了他的話，蘇念卿的態度依然沒有鬆動，廳裡的氣氛已經不是劍拔弩張，而是兩個人都清楚再說下去也不會有結果的那種僵持。</p>\n<p>慕容燁的隨從悄悄往他這邊看了一眼，等他的示意。</p>\n<p>慕容燁端起茶杯，喝了一口，把茶杯放下，轉過頭，看向白無極。</p>\n<p>「這位先生一直在，」他說，語氣很客氣，但客氣裡帶著一種很難忽視的審視，「不知是哪裡的人？」</p>\n<p>「上班族，」白無極說，「前職。」</p>\n<p>慕容燁的眉頭輕輕皺了一下：「什麼族？」</p>\n<p>「沒什麼，說著玩的，」白無極說，臉上依然是那個懶洋洋的笑，「我就是蘇小姐說的朋友。」</p>\n<p>「體契者？」慕容燁打量了他一眼，氣息微微一探，想感知他的靈契，但感知出去之後什麼都沒探到，他的眉頭皺得更深了，「在下試了一下，感覺不到閣下的靈契，這是……」</p>\n<p>「是」，白無極說。</p>\n<p>「是什麼意思？」</p>\n<p>「是感覺不到，」白無極說，「你說什麼是什麼。」</p>\n<p>慕容燁沉默了一拍，用那雙習慣俯瞰的眼睛看著他，評估了一下，說：「閣下頗為有趣。」</p>\n<p>「謝謝。」</p>\n<p>「蘇家在蒼雲城有什麼有趣的人物，在下還是頭一次見，」慕容燁說，說完，目光從白無極身上移開，站起來，整了整衣袍，朝蘇念卿拱了拱手，「今日在下先告辭，此事還請蘇小姐認真考量，在下在蒼雲城停留幾日，隨時恭候佳音。」</p>\n<p>蘇念卿：「慕容少主慢走。」</p>\n<p>慕容燁帶著兩個隨從出了廳門，白無極側過頭，看著他們走出院子，轉過走廊，消失在視線裡。</p>\n<p>廳裡安靜下來。</p>\n<p>蘇念卿的肩膀微微鬆了一下，霜翎從她肩上躍下來，繞著碟子轉了一圈，用鼻子碰了碰那半塊留下來的點心，但沒有吃，而是把頭轉過來，用銀色的眼睛看著白無極，眼神比之前稍微少了一點警惕。</p>\n<p>只是稍微。</p>\n<p>「你在這裡坐了多久？」蘇念卿說。</p>\n<p>「吃完那碟點心多久，就坐了多久，」白無極說，「還挺好吃的，下次讓廚房多做一點。」</p>\n<p>蘇念卿看著那個空碟子，又看看白無極，沉默了一拍，說：「你今天來是有事？」</p>\n<p>「還書。」白無極把那本靈獸習性的冊子拿起來，放到桌上，「謝謝，內容很有趣，我知道為什麼霜翎老是用那個眼神看我了。」</p>\n<p>「為什麼？」蘇念卿的語氣帶著一點意外。</p>\n<p>「銀狐是靈獸裡少見的對氣息非常敏感的品種，」白無極說，「我身上有兩個替身的氣息，對它來說大概很陌生，所以覺得不確定，一直在評估。」</p>\n<p>蘇念卿把那本冊子重新拿起來，翻了一頁，沒說話。</p>\n<p>「那個慕容燁，」白無極說，語氣很隨意，「還會再來的。」</p>\n<p>「我知道，」蘇念卿說，「他不是那種輕易罷手的人。」</p>\n<p>「那也沒關係，」白無極站起來，拍了拍衣袖，「他要再來，我繼續坐在旁邊看書，順便吃點心。」</p>\n<p>蘇念卿抬起頭，看著他，沉默了一拍。</p>\n<p>她的眼神說不清楚是什麼，但白無極覺得，跟平時比，少了一點什麼，多了一點什麼，說不準是哪個方向。</p>\n<p>霜翎悄悄把那半塊點心叼起來，退到一邊，小口小口地吃。</p>\n<p>白無極走出廳門，在院子裡站了站，看了一眼蒼雲城南邊的方向，想起街邊聽到的「英俊」和「俯瞰的眼神」。</p>\n<p>他搖了搖頭，往側門走去。</p>\n<p>不知道從什麼時候開始，他覺得那種俯瞰所有人的眼神特別礙事。</p>\n<p>也許從他在蒼雲城落腳的第一天就開始了。</p>"}, {"title": "第35章_比武招親什麼年代了", "content": "<p>第35章　比武招親？什麼年代了</p>\n<p>慕容燁第二天就回來了。</p>\n<p>這次不是單純的拜訪，他帶來了蒼雲城一個有頭有臉的中間人，名義上說是「切磋」，實際上誰都看得出來是什麼意思。</p>\n<p>蘇家分府的管事叫蘇和，五十出頭，是個謹慎的老人，在分府打理事務十幾年，見過形形色色的麻煩，但慕容家這種規格的麻煩他真沒見過幾次。</p>\n<p>他把這件事轉達給蘇念卿的時候，措辭非常委婉，翻來覆去說了一大段，核心意思是：慕容少主想在分府的院子裡展示一下身手，邀請蘇小姐觀看，作為一種誠意，還望蘇小姐賞個臉……</p>\n<p>蘇念卿打斷他：「說直接的。」</p>\n<p>蘇和苦著臉：「慕容少主想在小姐面前展示靈契實力，以表誠意，希望……希望小姐能給個機會。」</p>\n<p>蘇念卿沉默了一拍，說：「我拒絕。」</p>\n<p>蘇和低頭：「是，小姐，但，慕容家那邊說，若小姐拒絕，可以請其他人代為觀看，慕容少主說他的意思不是非要小姐在場，只是希望在蘇家的地方，展示一次誠意……」</p>\n<p>這話說得繞，蘇念卿聽了一遍，在腦子裡翻譯了一下，明白了：慕容燁是要借蘇家分府的場子，在蘇家的地盤上展示實力，不管蘇念卿看不看，這件事發生了，就算是在蘇家面前高調了一次。</p>\n<p>她不答應，蘇和沒有辦法直接把慕容家的人轟走。</p>\n<p>她答應，就是默許了慕容燁這次的表演。</p>\n<p>兩個選擇都不好。</p>\n<p>蘇念卿正想說話，院子裡傳來一個熟悉的聲音：「蘇和老頭，我那本書還給你家小姐了嗎？昨天我放的時候忘了放在哪個桌子上了——」</p>\n<p>白無極從走廊繞進來，看見這邊的陣仗，頓了一下，目光在蘇念卿、蘇和、以及遠處站著的慕容燁之間掃了一圈。</p>\n<p>「……來得不巧？」</p>\n<p>「沒有，」蘇念卿說，聲音平靜，「剛好。」</p>\n<p>白無極走近了幾步，蘇和低聲把情況說了一遍，他聽完，看了看蘇念卿，看了看慕容燁，轉頭問蘇和：「他要在這院子裡展示一下靈契實力，是嗎？」</p>\n<p>蘇和：「是的。」</p>\n<p>「他要和誰切磋？還是就自己展示？」</p>\n<p>蘇和猶豫了一下：「慕容少主說，若蘇小姐有意，可以請分府裡的護衛代為陪練，展示的是少主的靈契攻擊，規模不大……」</p>\n<p>「護衛？」白無極想了想，「分府最強的護衛是什麼等級？」</p>\n<p>「契師中級。」</p>\n<p>「那不公平，」白無極說，「契將打契師，沒什麼好看的。」</p>\n<p>蘇和：「……是，所以……」</p>\n<p>白無極回頭看了蘇念卿一眼。</p>\n<p>蘇念卿的眼神和他對了一下，沒說話。</p>\n<p>但是沒阻止。</p>\n<p>這個「沒阻止」說明什麼，兩個人都清楚。</p>\n<p>白無極把手從袖子裡抽出來，活動了一下手腕，轉身往院子中間走：「我來陪他玩玩吧。」</p>\n<p>蘇和愣了一下，轉頭往慕容燁那邊看，又回頭，嘴巴張了張，說不出話來。</p>\n<p>慕容燁在院子另一側，聽見這句話，眉頭微微動了一下，打量了白無極一眼，那雙習慣俯瞰的眼睛在他身上停了片刻，帶著一點終於有意思了的意味。</p>\n<p>「昨日那位先生，」他說，「體契者？」</p>\n<p>「算是，」白無極說，走到院子中間，站定，雙手插兜，「你想展示什麼，展示吧，我在這裡站著陪你。」</p>\n<p>慕容燁看著他，沉默了一拍。</p>\n<p>他不是沒打過架，他從小就在慕容家最嚴苛的靈契訓練裡長大，十六歲就突破契師，二十二歲達到契將，當年天衍大陸的少年天驕榜上排在前十，見過各種各樣強橫的對手。</p>\n<p>但他還沒遇過對手在切磋開始之前，是把手插在兜裡的。</p>\n<p>這個姿態說不清楚是輕視還是自信，讓他一時間摸不準對面這個人的底細。</p>\n<p>「閣下確定？」他問，語氣帶著一點提醒的意味，「在下是契將，若是傷到閣下……」</p>\n<p>「你不會，」白無極說，臉上依然是那個懶洋洋的表情，「你在蘇家的地盤上，你沒辦法真的傷人。」</p>\n<p>這話說得直接，讓慕容燁的眉頭微微一跳，說不清楚是哪裡被觸到了，但語氣很快沉穩下來：「那就按切磋的規矩，點到即止。」</p>\n<p>「好，」白無極把手從兜裡抽出來，讓了讓步子，「你先。」</p>\n<p>蘇念卿站在廊下，背靠廊柱，霜翎蜷在她肩頭，一雙銀色的眼睛往院子裡看，尾巴輕輕搖了一下。</p>\n<p>蘇和站在她旁邊，臉上的神情已經不是苦了，是徹底懵了，「蘇小姐，這位白先生……這樣做，合適嗎？」</p>\n<p>「合適，」蘇念卿說，平靜，「他知道自己在做什麼。」</p>\n<p>蘇和低頭，悄悄在心裡為那個院子裡即將發生的事暗暗捏了一把汗，但究竟是在替誰捏，他自己都說不清楚。</p>\n<p>院子裡，慕容燁站在空地中央，緩緩展開靈契。</p>\n<p>那是元素契，風雷雙系，在整個天衍大陸都算是少見的雙系靈契——風是速度，雷是爆發力，兩者合一，造就了慕容燁在契將一級里無人能敵的機動戰鬥風格。</p>\n<p>他展開靈契的時候，空氣裡有電光閃爍，腳下的青石板地面微微震動，分府院子裡站著的幾個下人不自覺地往後退了幾步。</p>\n<p>白無極站在原地，衣角動了動，但人沒有動。</p>\n<p>他把八極拳的下盤架子穩了穩，前腳掌往地上踩實，後腳跟微微抬起，整個人的重心往下沉，沉到他的丹田，沉到他站的這塊地。</p>\n<p>院子裡的風吹到他身上，像是遇到了一堵看不見的牆，在他周圍分開，衣角翻了翻，又落下。</p>\n<p>慕容燁看著這個畫面，皺眉，微微加大了靈契的輸出。</p>\n<p>風更大了，院子裡的樹葉嘩嘩作響，蘇和的袍子被吹得往後翻，他抬手捂住帽子，往柱子邊靠了靠。</p>\n<p>白無極站在那陣風的正中央，衣角亂了，頭髮亂了，但人依然站得穩當，腳下的青石板紋絲未動，整個人像是一根釘進地裡的樁子。</p>\n<p>慕容燁慢慢收回靈契的大規模覆蓋，讓風場縮回自己周身，站在風眼裡，俯視白無極——在他的認知裡，「俯視」從來不是一個比喻，是一個他習慣了的物理事實。</p>\n<p>「體契者，」他說，「有趣，看看你能撐幾招。」</p>\n<p>白無極抬起頭，平靜地看著他，說：「你的風吹到我這裡好像沒多少力氣了，」他頓了一下，眼神裡有點東西閃過，說不清楚是調侃還是如實描述，「湊合用吧。」</p>\n<p>院子裡短暫地安靜了一下。</p>\n<p>慕容燁的兩個隨從面面相覷。</p>\n<p>霜翎從蘇念卿肩頭直起身子，往前探了探，銀色的耳朵豎起來，眼睛裡有某種說不清楚的東西在亮。</p>\n<p>蘇念卿嘴角微微動了一下。</p>\n<p>白無極把右腳往前踩了半步，擺出八極拳的起手勢，兩手微微抬起，掌心朝下，沉肩墜肘，氣沉丹田，那個姿態說不出哪裡不尋常，但偏偏讓人感覺，這個人，是真的準備好了。</p>\n<p>「來吧，」他說，語氣像是在說「你走先」，「我接。」</p>"}, {"title": "第36章_擂台", "content": "<p>第36章　擂台</p>\n<p>慕容燁的靈契領域在院子裡徹底展開的瞬間，氣壓變了。</p>\n<p>那不是一個比喻——是真實的物理意義上的氣壓改變。風雷雙系契將的領域一旦展開，空氣中的靈力密度驟然提升，風的流動帶著靈力的震動，電光在空氣裡游走，連光線都彷彿被某種無形的力量扭曲了一點。</p>\n<p>院子裡原本還站著的幾個下人，這一刻悄悄退進走廊，往廊柱後面藏了藏，只敢從縫隙裡往外看。</p>\n<p>蘇和整個人往後撐著柱子，臉色有點白，捂著胸口，這是正面吃到了契將等級的靈力壓制。</p>\n<p>蘇念卿站在廊下，霜翎在她肩頭緊了緊，毛色在靈力壓制下微微豎起，但蘇念卿本人的氣息平穩，她的靈契在體內運轉，把那個壓制擋在了外頭。</p>\n<p>院子裡，白無極站在原地，沒動。</p>\n<p>風場是從外向內收縮式地籠罩下來，按照慕容燁的習慣，這種籠罩會在對方意識到的瞬間，讓對手本能地想要抵抗或者後退——抵抗的人靈力會被風場反噬，後退的人則落入下風，對後續的心理節奏都有影響。</p>\n<p>這套組合慕容燁用了很多年，對各種等級的靈契師都有效。</p>\n<p>但白無極往那個風場裡站，像一塊石頭扔進水裡，水面在石頭周圍漣漪，石頭本身不動。</p>\n<p>風在他周圍繞。</p>\n<p>慕容燁的眉頭輕輕皺了起來。</p>\n<p>他站在風眼裡，靛藍色的靈光在身上環繞，俯視著白無極，說了那句話：「體契者？有趣，看看你能撐幾招。」</p>\n<p>白無極：「你的風吹到我這裡好像沒多少力氣了，湊合用吧。」</p>\n<p>沉默了一拍。</p>\n<p>然後慕容燁動了。</p>\n<p>---</p>\n<p>他的速度很快。</p>\n<p>契將巔峰的爆發不是普通人能用肉眼追蹤的，風靈契加持移動速度，電靈契加持爆發力，兩者疊加，讓慕容燁在瞬間位移的時候帶出一道殘影，空氣被撕裂，青石板地面上留下細小的電痕。</p>\n<p>他從院子另一側直衝向白無極，拳頭帶著風雷靈力，目標是右肩的外側——這個落點是他慣用的第一擊，衝擊力會讓對手失去站樁，打亂他們的下盤。</p>\n<p>白無極沒有橫移，沒有後退。</p>\n<p>他往側面走了半步，很小的半步，幾乎讓人以為他沒動，但那個半步的落點非常精準——偏偏把慕容燁的拳道讓開了，而不是讓拳道讓開他。</p>\n<p>這兩者有本質的差別。一個是「躲」，一個是「讓」。</p>\n<p>慕容燁的拳打了個空，慣性帶著他往前衝了半步，就在這半步裡，白無極的右手從側面搭上了他的肘關節外側，不是抓，是搭——輕描淡寫的一個搭，但搭上去的那一瞬間，慕容燁感覺他的靈力傳導被切斷了一個節點。</p>\n<p>說不清楚怎麼做到的，就是被切了一下。</p>\n<p>他旋身，調轉攻向，左手帶著電靈力直砍白無極腰側，這是一個角度非常刁鑽的攻擊，縱使被躲開，靈力也會在空氣裡爆開，形成一個小範圍的電場震盪。</p>\n<p>白無極身子微微向右側傾，斜肩，把那一刀的角度化開了，電靈力在他肩膀旁邊炸了一下，細小的電弧跳到他的衣袖上，把布料燎出幾根細線，人沒有受傷。</p>\n<p>他左腳向前踩了一步，是八極拳標誌性的震腳，腳底踩出一聲沉悶的響聲，青石板細小的裂紋往外擴了一圈。</p>\n<p>那一步把整個人的重心前壓，上半身跟著沉，左肘帶勁，往慕容燁的肋骨方向頂出去。</p>\n<p>這一擊不算快，但角度刁鑽，而且肘頂的力道不是靠靈力，是純粹的體重和腰椎發力，是八極拳的纏絲走肘——對練靈契出身的人來說，這種力道的結構非常陌生，因為他們習慣的是靈力的衝擊，而不是物理學上紮實的槓桿力。</p>\n<p>慕容燁迅速往後躍，脫離接觸範圍，電靈力在掌心聚攏，往白無極方向推出一個小型的雷霆衝擊波——這是他的後備手段，用來在被逼退的時候拉開距離。</p>\n<p>衝擊波炸在白無極身前，煙塵瞬間升起，院子裡幾個偷看的人不自覺地屏住呼吸。</p>\n<p>煙塵散去，白無極站在那裡，衣袖上多了幾個燎痕，臉上沾了一點灰，但站姿和開打之前一樣穩當，甚至連腳的位置都沒有太大變化。</p>\n<p>他把臉上的灰抹了一下，看了看自己燎壞的衣袖，嘟囔了一句：「這衣服是新的。」</p>\n<p>慕容燁站在三步之外，表情第一次出現了比「輕視」更複雜的東西。</p>\n<p>他是第一次見到，有人在他的雷霆衝擊波裡站著不退的。</p>\n<p>不是用靈契硬撐，是直接站著。</p>\n<p>「閣下，」他說，語氣不再是那種俯瞰式的漫不經心，帶了一點真正的審視，「你的體契……在下不曾見過這種類型。」</p>\n<p>「很正常，」白無極說，把衣袖上的燎痕撫了撫，沒撫平，也沒再去管，「這個世界上沒有見過的。」</p>\n<p>「能說說——」</p>\n<p>「不能，」白無極說，「繼續打吧，你還沒展示完呢。」</p>\n<p>他重新擺好下盤架子，沉肩，墜肘，腳踩實了，抬起頭，眼神裡有東西在平靜地閃著，不是挑釁，是某種帶著把握的等待。</p>\n<p>慕容燁深吸一口氣。</p>\n<p>靈契的光在他身上更亮了一些。</p>\n<p>他調整了策略——不再用速度壓制，而是把靈力凝聚，準備用一擊重的來試試這個奇怪的體契者。</p>\n<p>「全力了，」他說，算是一個提醒，也算是一種在強者之間的尊重，「若有疏失，還望見諒。」</p>\n<p>「我知道，」白無極說，語氣很平靜，「我等著。」</p>\n<p>院子裡，靈力的波動大了起來，風場旋轉，電光凝聚，院子角落的一棵觀賞樹被靈力氣場壓得枝葉抖動。</p>\n<p>蘇念卿在廊下，霜翎緊貼著她的頸側，銀色的毛豎了半根。她的目光一直落在白無極身上，從他開打到現在，沒有移開過。</p>\n<p>她的眼神裡有什麼東西，說不清楚，是評估，是確認，還是別的什麼。</p>\n<p>院子裡，慕容燁動了。</p>\n<p>這一次，速度比上一次更快。</p>"}, {"title": "第37章_我也來試試", "content": "<p>第37章　我也來試試</p>\n<p>八極拳有句老話，叫「貼山靠」。</p>\n<p>意思是打人要像山壓下來那樣，不是揮出去的力，是壓進去的力，靠近、貼上、整個體重往對方身上送，讓對方的重心崩潰。</p>\n<p>這套東西在現代的武術競賽裡不太常見，因為現代打法有規則限制，不能纏，不能靠，不能貼身，所以八極拳後來越來越多變成表演。但白無極在拳館練的是老師傅那套，不是表演用的，是真正的「把人打壞」用的。</p>\n<p>他在蒼雲城跟人打架到現在，用過替身，用過靈契，但他從來沒有機會在一個旗鼓相當的對手面前完整地走一遍八極拳的路數。</p>\n<p>慕容燁契將巔峰，靈契加持，速度力量都不是普通人能比的。</p>\n<p>但慕容燁是一個純粹用靈契打架的人。</p>\n<p>對白無極來說，靈契和普通人的物理力量，在結構上的邏輯是一樣的——進攻方向、力量傳導路線、重心的分佈，這些東西是通用的，和靈力有沒有在裡面沒有本質的關係。</p>\n<p>所以他打慕容燁，不是在打一個特別強的靈契師，他是在打一個特別快、力氣特別大的對手。</p>\n<p>---</p>\n<p>慕容燁這一輪是把速度提到了極限。</p>\n<p>風靈契加持下，他移動的殘影從三個方向同時逼近，製造視覺干擾，真身從正面切入，電靈力在拳頭上凝成一個藍白色的光核，往白無極的胸口打去。</p>\n<p>這一擊足以讓契師以上的靈契師倒飛出去，靠防禦型靈契硬撐也得吃個小傷。</p>\n<p>白無極的右手往前推，不是格擋，是八極拳的「架」——手臂從裡向外劃出一個弧度，把那個光核的軌道往外側帶，帶偏了三寸，光核從他肩膀外側炸開，衝擊波打在後面的院牆上，院牆上的磚石崩掉一塊。</p>\n<p>他左腳同時往前踩，震腳，全身重量跟著往前壓，右肘從慕容燁的手臂內側鑽進去，沉肩，墜肘，擠靠，把慕容燁的右臂夾住往外扭，這是八極拳的「纏絲」——不是力量正面硬槓，是順著對方的力道，找結構的死角，卸開。</p>\n<p>慕容燁感覺到右臂被拿住，靈力傳導被破壞，立刻往後跳脫，同時左掌推出一個風刃，是近距離的切割型攻擊，橫掃白無極腰側。</p>\n<p>白無極往後沉了下腰，壓低重心，那道風刃從他腰間掃過，切掉了幾根腰帶流蘇，但沒有切到人。</p>\n<p>他腳下沒有後退，沉腰的同時整個人繼續往前貼，用右肩撞進慕容燁的胸口——這是「靠」，鐵山靠，八極拳裡最暴力的技術，用肩膀把對方的重心整個掀翻，借力打力，把對方的靠近變成對方自己的傷。</p>\n<p>慕容燁在最後半秒感覺到那個靠勁的方向不對，電靈力往全身覆蓋，硬撐了這一擊，被衝退了兩步，腳踩在地面上留下兩道深槽，但沒有倒。</p>\n<p>他在那個後退裡重新穩住，眼神裡第一次有了真正的認真。</p>\n<p>不是俯瞰，是平視。</p>\n<p>「你這個打法——」他說，語氣有點不確定，「不是靈契。」</p>\n<p>「對，不是，」白無極說，腳踩回去，把下盤重新穩住，手臂自然垂落，「這是我老師傅那套東西，沒有靈力的。」</p>\n<p>「純粹的體術？」</p>\n<p>「算是。」</p>\n<p>慕容燁深吸一口氣，把他所有關於體契的認知都重新調用了一遍，試圖找到對應的理解框架，但找不到——這不像任何他知道的體契，體契是靠靈力強化肉體，強化之後再打，這個人打架的方式完全是另一套邏輯。</p>\n<p>他的靠是有結構的，那個結構讓慕容燁的靈力輸出在某些角度上失效。</p>\n<p>慕容燁重新出手，這次換成連招——風靈契加速，電靈力爆發，組合起來是三連衝，第一下試探方向，第二下佔位，第三下全力。</p>\n<p>他用這個連招打過無數對手，沒有讓第三下落空過。</p>\n<p>白無極接第一下，側身，用左手臂把那個力接住，不是硬擋，是引——把那個力往自己左側帶，讓慕容燁的重心隨著衝力偏了一點。</p>\n<p>慕容燁第二步落點往右補，白無極右腳往前踩，就在慕容燁的落腳點前面半步，踩實，整個人變成一堵牆，讓慕容燁的第二步落不穩。</p>\n<p>重心偏，落步不穩，第三下爆發的時候，慕容燁感覺自己的發力根沒了——根是腳，腳不穩，再大的靈力也是一拳打在棉花上。</p>\n<p>白無極在他第三下發力的瞬間，左手前推，是八極拳的「崩拳」，不是靠速度，是靠整個人的體重傳導——肩沉、腰轉、胯送、腳蹬，所有力量從腳底往上走，集中在拳頭前兩節指骨，推進去。</p>\n<p>慕容燁靈力覆蓋抵擋，被那個推力撼動，倒退了一步。</p>\n<p>他看著白無極，呼吸沉了一沉。</p>\n<p>「閣下，」他說，語氣裡有一點不是慕容燁慣有的東西——是純粹的戰者對強敵的尊重，「這套打法……叫什麼名字？」</p>\n<p>「八極拳。」</p>\n<p>「何處的傳承？」</p>\n<p>「遠，」白無極說，「你沒聽過的地方。」</p>\n<p>慕容燁沉默了一拍，靈契的光在他身上又提了幾分，明顯是準備再起一輪：「那在下就繼續領教了。」</p>\n<p>「來，」白無極說，腳下踩實，「我接著。」</p>\n<p>---</p>\n<p>這一輪打得更長。</p>\n<p>慕容燁調整了策略，不再用衝擊性的直線進攻，改成繞圈的消耗戰，用風靈契的速度讓白無極的站樁失去意義，強迫他跟著移動，一旦移動，就破壞了八極拳的根。</p>\n<p>這個策略有效，白無極不得不跟著他的移動方向轉，站樁的優勢少了，但他沒有因此亂——他跟著轉，轉的時候找節奏，每次慕容燁風場轉向的那個空隙，他往裡踩一步，蹬腳震地，再找角度切入。</p>\n<p>兩個人在院子裡兜了三圈，青石板地面上的裂縫越來越多，幾棵觀賞樹的樹葉被靈力和震動打得一片片往下落。</p>\n<p>蘇和把眼睛閉上又睜開，閉上又睜開，整個人魂不守舍，嘴裡悄悄嘀咕：「那個石板是上好的蒼岩石，一塊要二十靈玉……那棵金絲木是三年前從南方移來的，光運費就是——」</p>\n<p>「蘇和。」蘇念卿說。</p>\n<p>「小姐！」蘇和立刻噤聲，縮了縮脖子。</p>\n<p>「東西壞了可以修，」蘇念卿說，目光沒有離開院子，「人壞了修不了，注意看哪邊的人壞了就行。」</p>\n<p>蘇和不吭聲了，但心裡悄悄替石板默哀了一下。</p>\n<p>院子裡，白無極找到了第三圈的節奏，在慕容燁風場轉向的那一刻往前衝，不是崩拳，是頂肘——肘尖往前帶，走的是慕容燁右側的盲區，那個角度是人體護甲的接縫位置，如果是貼身戰，這裡的防禦最薄。</p>\n<p>慕容燁反應很快，往側面一閃，避過了肘尖，但沒有避完全，肘的後段帶著震動掃在了他的右臂護甲外側，震出一聲悶響，護甲沒壞，但那個震動讓他的整條右臂靈力傳導被中斷了兩秒。</p>\n<p>兩秒鐘，在常規的靈契對戰裡足夠發動兩三次攻擊。</p>\n<p>白無極沒有乘勝追擊，後退半步，站回去，喘了一口氣，抬手把額頭的汗抹了一下。</p>\n<p>這一輪他自己也累了，慕容燁的靈力壓制持續在場，他沒有靈力抵擋，靠的是把自己的重心和結構穩在靈力壓制裡，這很耗體力，比純粹的武術對練累得多。</p>\n<p>但他摸到了慕容燁的打法規律。</p>\n<p>風靈契走速度，電靈契走爆發，這兩個系統用的是同一條靈力傳導線路，那條線路從他的脊背走，分向兩側。</p>\n<p>攻擊他的脊背方向是不可能的，但如果能在他靈力輸出的那個瞬間，找到那條線路上的一個節點卸掉它……</p>\n<p>白無極在腦子裡把這個思路過了一遍，腳下踩實，深吸一口氣。</p>\n<p>「再來，」他說，「這次我先動。」</p>"}, {"title": "第38章_你到底是什麼人", "content": "<p>第38章　你到底是什麼人</p>\n<p>白無極說「這次我先動」。</p>\n<p>然後他動了。</p>\n<p>他的啟動方式和慕容燁完全不同——沒有靈力的輝光，沒有氣場的提前外放，就是一個普通人起步的樣子，右腳往前墊半步，左腳跟上，上半身稍微前傾，但重心一直壓在後腳，保留著隨時可以發力的蓄勢。</p>\n<p>這種走法讓人很難判斷他什麼時候會真正動，因為起步的每一刻都像在動，又都像沒到發力的時候。</p>\n<p>慕容燁保持戒備，風場環繞在身周，準備對應白無極的進攻方向。</p>\n<p>白無極往前走了三步，第三步的時候突然改方向，往斜前方踏出一大步，這一步踩的是慕容燁身後的斜四十五度——一個繞背的角度，逼著慕容燁轉向。</p>\n<p>慕容燁轉身，風場跟著轉，同時電靈力往掌心集中，準備一個短程的電擊彈射。</p>\n<p>白無極就等這個轉身。</p>\n<p>慕容燁轉身的那一刻，他整個人往前撞，不是跑，是衝——用整個身體的重量往前壓，腳底蹬地，腰椎旋轉，肩膀領著上半身，人貼上去的時候腳底還沒停，一直在踩，每踩一步就把向前的動能疊加一層。</p>\n<p>這是八極拳裡的「硬進」——強行切入對方的近身範圍，讓任何遠程的靈力攻擊都失去距離。</p>\n<p>慕容燁電靈力成型的瞬間，白無極的肩膀已經貼上了他的左胸，兩個人之間的距離是零，那個電靈力想發出去沒有方向，往側面炸了，電弧在兩個人中間爆開，把白無極的袖口又燎了一大塊。</p>\n<p>白無極肩頂之後，右肘往上挑，是八極拳的「挑肘」，往慕容燁的下巴方向送，慕容燁低頭，避開下巴，肘打在他的頸側護甲上，護甲上留下一個凹痕，頸側的肌肉被震了一下，有點麻。</p>\n<p>慕容燁往後跳脫，距離拉開，電靈力再次凝聚，這次是橫掃——低空的電場鋪開，範圍攻擊，逼白無極後退或者跳開。</p>\n<p>白無極沒有後退，也沒有跳，他右腳往旁邊一踩，側身，讓電場從他身邊掠過，左腳跟上，整個身子貼著電場的邊緣貼過去，距離近得電弧在他腰側啪地一跳，把他腰間的布帶打了一個洞。</p>\n<p>但人在電場外側，繞到了慕容燁的右邊。</p>\n<p>慕容燁意識到自己右側的防禦被突破，迅速轉向，風靈契全力爆發，速度提到頂點，右手帶著風刃劈下。</p>\n<p>這一刀的速度已經接近他的極限，殘影重疊，在空氣裡拉出一道淡淡的靈力弧線。</p>\n<p>白無極往斜前方踏步，不是退後，是往側前方，把那刀的力道從右邊讓到左邊，同時他的右手伸出去，不是拳，是掌——八極拳的推掌，從慕容燁的左肩外側往前推，推進去的是整個人的體重，從腳底走上來的那道力。</p>\n<p>這個推的角度是慕容燁靈力傳導線路上的一個節點。</p>\n<p>不是巧合，是白無極用這幾十招試出來的，慕容燁的靈力從脊背分兩路，左路在他揮右手的時候有一個短暫的輸出缺口，就在左肩往下兩寸的地方，那個位置的靈力密度在他集中右手輸出的時候最薄。</p>\n<p>推掌碰到那個位置，白無極腳底蹬地，力道到位。</p>\n<p>慕容燁的靈力傳導被重擊中斷了，右手那道風刃的力量在中途就潰散了，靈力反噬，讓他的右臂震了一下，整個人的站樁跟著一晃。</p>\n<p>白無極不停，右腳繼續往前踩，左肘往慕容燁右側護甲的接縫方向送——</p>\n<p>護甲的接縫在右肩和胸甲之間的鉸接處，是靈契師護甲防禦最薄的地方，也是這種重甲唯一用普通物理衝擊能透進去的位置。</p>\n<p>肘尖帶著白無極整個人前衝的動能，精準地打在了那個接縫處。</p>\n<p>轟。</p>\n<p>這個聲音不大，但很沉，是金屬在衝擊下變形的聲音，帶著深入骨骼的震動感。</p>\n<p>慕容燁感覺到一股力量從右肩的接縫打進來，不是靈力，是純粹的物理衝擊，那個震動穿過護甲直接傳到他的肩關節，肩關節的靈力連結被震得短暫斷開，右側的風雷靈契輸出中斷。</p>\n<p>他往後倒退，一步，兩步，三步，四步，第五步的時候腳跟踩到院子邊緣的石墩，停住了，右肩的護甲在接縫處裂開，靈契的光隨之瓦解，兩側的風場在靈契領域收縮的時候帶出一陣亂流，把院子裡殘留的落葉捲得四處飛。</p>\n<p>慕容燁站在那裡，胸腔起伏，呼吸比平時粗重，右肩的護甲有一條明顯的裂紋，靈契領域已經完全收斂，他整個人的氣場從外放縮了回去。</p>\n<p>院子裡靜了一下。</p>\n<p>然後蘇和悄悄吐出了一口氣，那一口氣吐出來的聲音在這個安靜裡清晰得有點尷尬。</p>\n<p>慕容燁看著白無極。</p>\n<p>白無極站在原地，衣服上多了好幾處燎痕和電弧的燒灼，腰間的腰帶打了個洞，袖口一截幾乎快掉了，頭髮也有點亂。但站姿依然穩，腳踩在地上，上半身沉著，看著慕容燁的眼神裡沒有挑釁，只是等著看他說什麼。</p>\n<p>慕容燁深吸一口氣，開口，語氣已經不是任何他慣有的那種，是真正打出來的那種平靜：</p>\n<p>「你到底是什麼人。」</p>\n<p>不是疑問，是陳述，是他腦子裡到現在都沒有答案的那個問題的說出聲。</p>\n<p>白無極想了想，說：</p>\n<p>「上班族。」</p>\n<p>慕容燁：「……」</p>\n<p>「前職，」白無極補充，「現在失業了，在異鄉找出路。」</p>\n<p>慕容燁沉默了很長一拍，他試圖找一個框架來理解「上班族」這三個字，但找不到，天衍大陸沒有這個詞，他的語言庫裡也沒有對應的概念。</p>\n<p>「閣下說笑了，」他最後說，語氣平靜，帶著一種被打開了眼界之後的克制，「在下輸了，今日的教益，銘記在心。」</p>\n<p>他把右手放在心口，這是天衍大陸對強者的敬禮，低頭，維持了片刻，重新抬起。</p>\n<p>「蘇小姐，」他轉向廊下的蘇念卿，語氣沒有之前那種篤定，「今日的事，在下清楚了。」</p>\n<p>說完，轉身，帶著兩個隨從，走出了院門。</p>\n<p>腳步依然穩健，背依然挺直，但那個俯瞰的弧度不見了。</p>\n<p>---</p>\n<p>院子裡的落葉慢慢靜下來。</p>\n<p>白無極把那截快掉下來的袖口扯了下來，扔在地上，抬頭看了看天。</p>\n<p>「換衣服，」他說，對著空氣說，「今天壞了兩件。」</p>\n<p>白金之星從他背後的虛空里現出輪廓，那張沒什麼表情的臉上，有什麼東西是凝重的，不是擔憂，是某種類似肯定的沉默。</p>\n<p>黃金體驗也現在他旁邊，金色的光漂在空氣裡，安靜得像一盞提燈。</p>\n<p>白無極伸手，讓那個金色的光從他被電弧燒紅的手背上輕輕掠過，皮膚上的灼痛漸漸散去，黃金體驗把那幾處小傷修復了，連帶幫他把腰帶上的洞填上了一個新長出來的植物纖維。</p>\n<p>「謝謝，」他說，低頭看看腰帶上那片生機勃勃的新植物補丁，「……但是顏色不對。」</p>\n<p>黃金體驗沒理他。</p>\n<p>走廊裡，蘇念卿把折扇收起來，走進院子，腳步沒有聲音，在他旁邊停下，低頭看了看他的衣袖，又看了看地上那截被扯下來的布料，說：</p>\n<p>「你那件好點的衣服，昨天被你放在我這裡，我有空幫你補一下。」</p>\n<p>「謝謝，」白無極說，「那這件你不幫補嗎？」</p>\n<p>「這件不補，扔了。」</p>\n<p>「……行吧。」</p>\n<p>霜翎跳下蘇念卿的肩頭，在院子裡踱了幾步，走到白無極腳旁邊，繞了半圈，尾巴竪起，碰了一下他的鞋尖，然後走開了。</p>\n<p>白無極低頭看了看自己的鞋尖，再看看霜翎離去的背影。</p>\n<p>「它剛才是在……」</p>\n<p>「不知道，」蘇念卿說，語氣依然淡淡的，「別多想。」</p>\n<p>白無極把剩下那截衣袖也扯掉，變成一件短袖，把扯下來的布料攏起來，找了個牆角放著，轉頭問：</p>\n<p>「中午吃什麼？」</p>\n<p>蘇念卿看了他一眼，沉默了一拍：「你剛打完架。」</p>\n<p>「打架和吃飯又不衝突，」白無極說，「我現在很餓。」</p>\n<p>蘇和從走廊角落悄悄探出頭，鼓起勇氣說：「小、小的去讓廚房多備一些？」</p>\n<p>白無極朝他點了點頭：「麻煩你了蘇老頭，多備一個紅燒的，謝謝。」</p>\n<p>蘇和如獲大赦，快步往廚房方向去了。</p>\n<p>院子裡的石板裂了幾條，觀賞樹掉了半樹的葉子，院牆上有幾個新的坑。</p>\n<p>白無極站在這片狼藉裡，仰頭看了看天，覺得有點心滿意足。</p>\n<p>是一場打得挺值的架。</p>"}, {"title": "第39章_蘇念卿的選擇", "content": "<p>第39章　蘇念卿的選擇</p>\n<p>慕容燁帶人離開了蘇家分府。</p>\n<p>消息在分府裡傳得很快——蘇和把今日的事大致說了一遍，分府的下人知道的程度各有不同，但核心的結論一致：慕容家少主輸了，輸給了那個叫白無極的體契者，護甲都碎了。</p>\n<p>下人們悄悄議論的時候聲音壓得很低，眼神卻都往同一個方向飄——廚房那邊，白無極正坐在走廊台階上等吃飯，一手撐著下巴，一手拿著從院子裡撿來的一根樹枝，無聊地在地上畫格子。</p>\n<p>有人悄悄走近看了一眼，他在地上畫的是五子棋的棋盤。</p>\n<p>那個人看了半天，沒明白畫的是什麼，悄悄退回去了。</p>\n<p>---</p>\n<p>中飯是在分府的小廳吃的，蘇和把廚房備的菜一道道端上來，蠻有誠意，紅燒的野豬肉、清蒸的靈魚、兩個素菜，還加了一個湯。</p>\n<p>白無極吃得很認真，沒說話，蘇念卿在對面坐著，慢慢喝湯，偶爾動筷，兩個人各吃各的，也沒有說話，但這個安靜不是那種不自在的安靜。</p>\n<p>霜翎蜷在窗台上，窗外的陽光把它的銀毛打得很亮，它偶爾睜開眼睛，往白無極這邊看一眼，然後合上，繼續睡。</p>\n<p>吃到一半，白無極抬頭：「那個聯姻的事，他輸了，大概也沒臉再提了吧？」</p>\n<p>「大概，」蘇念卿說，把湯碗放下，「但慕容家不會就這樣算了，家族那邊……會有後續。」</p>\n<p>「你家族那邊的壓力呢？」</p>\n<p>「慕容燁今天的事，管事已經上報了，」蘇念卿說，語氣很平靜，「家族知道之後，聯姻這條路大概不會再提，慕容家沒有臉面繼續推進。」</p>\n<p>「那就解決了？」</p>\n<p>「短期解決了。」</p>\n<p>白無極把最後一塊紅燒肉吃掉，放下筷子：「你說短期，意思是還有長期的麻煩？」</p>\n<p>蘇念卿把茶杯端起來，喝了一口：「慕容家不會忘記今天。他們記仇，而且報復來的時候通常不是正面的。」</p>\n<p>「哦，」白無極想了想，「但那是之後的事，今天的事先解決了就行。」</p>\n<p>「嗯。」</p>\n<p>兩個人的話到這裡停了，又回到了各自吃飯的狀態。</p>\n<p>---</p>\n<p>飯後，院子裡的石板被下人們去補了幾塊，觀賞樹也有人在收拾。白無極在院子角落靠著牆，把今天打架消耗的體力悄悄用黃金體驗補了一些，讓那個金色的生命感知在他身上走了一圈，幾處被電弧傷到的皮下充血慢慢消退。</p>\n<p>霜翎從廳裡出來，在院子裡繞了幾步，繞到他這邊，在距離他兩步的地方停下，坐下去，尾巴搭在腳上，銀色的眼睛往他身上看。</p>\n<p>和之前的警惕不同，今天它的眼神裡多了一點什麼，像是在觀察，又像是在評估，那個尾巴的尖端輕輕搖了一搖。</p>\n<p>白無極和它對了一下眼神。</p>\n<p>「你最近是看我看順眼一點了嗎？」他問。</p>\n<p>霜翎把頭偏了一下，沒有回應，但尾巴搖了兩下。</p>\n<p>「行，算你接受我了，」白無極說，「要不要我撓一下耳朵後面？據說銀狐的耳根後面……」</p>\n<p>霜翎立刻站起來，往旁邊挪了兩步，把距離拉開，看他的眼神重新帶上了半分警惕。</p>\n<p>「好，好，我不撓，」白無極舉起手，「撤回。」</p>\n<p>霜翎又坐下了，但距離保持在三步。</p>\n<p>這個微妙的互動正在進行的時候，蘇念卿從廳裡走出來，在院子裡站了站，視線先落在霜翎身上，再移到白無極身上，看了看兩者之間的距離，什麼都沒說。</p>\n<p>她走過來，在院子角落的石椅上坐下，沉默了片刻。</p>\n<p>白無極沒有主動說話，靠著牆，閉上眼睛，享受下午的陽光。</p>\n<p>院子裡安靜，只有偶爾的風聲，和不知道從哪棵樹上落下來的葉子的細微聲音。</p>\n<p>霜翎悄悄往蘇念卿這邊靠近了半步，在她腳邊蜷下來，頭枕在她的鞋面上，尾巴繞上來，在她的腳踝邊繞了一圈。</p>\n<p>蘇念卿低下頭，摸了摸霜翎的耳朵後面，霜翎發出一聲舒服的輕鳴。</p>\n<p>白無極沒有睜眼，但耳朵聽著那個細小的聲音，嘴角動了一下。</p>\n<p>「今天，」蘇念卿說，聲音很平靜，「沒必要幫我。」</p>\n<p>「我沒幫你，」白無極說，眼睛還閉著，「我只是想打架。」</p>\n<p>「是嗎。」她的語氣是陳述，不是質問，但帶著一點什麼，說不清楚是不信還是別的。</p>\n<p>「是，」白無極說，「慕容燁那種打法，我在這個世界從來沒碰過，想試試。打下來確實挺有意思的，風雷雙系那個傳導結構，找到節點之後卸掉挺爽的。」</p>\n<p>蘇念卿沉默了一拍：「你剛才說的那些，是在說打架技術。」</p>\n<p>「對，」白無極說，「打架技術很有意思。」</p>\n<p>「跟幫不幫我沒關係。」</p>\n<p>「跟幫不幫你沒關係，」他重複，語氣不快也不慢，就是把她的話接了一遍。</p>\n<p>院子裡又安靜下來，風吹過，帶著一點下午特有的乾燥和微暖。</p>\n<p>霜翎從蘇念卿腳邊抬起頭，又往白無極的方向看了一眼，然後重新把頭埋回蘇念卿的腳踝邊。</p>\n<p>蘇念卿的視線在院子裡轉了一圈，落在那幾塊還沒補完的破碎石板上，轉了一下，重新落回來，說：</p>\n<p>「……謝謝。」</p>\n<p>聲音很輕，但院子裡安靜，白無極聽見了。</p>\n<p>他沉默了三秒，沒有立刻回應，像是在思考說什麼，最後只說了一個字：</p>\n<p>「哦。」</p>\n<p>蘇念卿：「……」</p>\n<p>她側過臉，看了他一眼，眼神裡有什麼東西是複雜的，但嘴角動了一下，沒有說什麼。</p>\n<p>霜翎悄悄抬起頭，在兩個人之間的空氣裡看了一眼，尾巴慢慢搖了兩搖，又把頭放下去了。</p>\n<p>白無極把靠著牆的姿勢往下滑了滑，整個人滑成半個坐半個躺的懶散姿態，眼睛繼續閉著，說：</p>\n<p>「你那件衣服幫我補的時候，針腳往裡藏一點，上次你幫我補的那個，針腳露在外面有點難看。」</p>\n<p>蘇念卿看了看他：「難看你自己補。」</p>\n<p>「我不會，」他說，理直氣壯，「我就是個拳腳功夫，縫紉不在我的技能樹上。」</p>\n<p>「技能樹是什麼？」</p>\n<p>「一個比喻，」他說，「反正就是，麻煩你了。」</p>\n<p>蘇念卿收回視線，重新看向別處，過了一拍，說：「知道了。」</p>\n<p>院子裡的陽光很好，懶懶地鋪在石板地面上，把白無極那個懶散的側影拉得長長的，落在牆上，連輪廓都帶著一股子不知所謂的閒逸。</p>\n<p>蘇念卿低頭，繼續摸霜翎的耳根，霜翎的眼睛眯起來，享受地發出細小的鼻音。</p>\n<p>她沒有再說話，但嘴角的那個弧度，在下午的光線裡，悄悄沒有落下去。</p>"}, {"title": "第40章_慕容家的報復", "content": "<p>第40章　慕容家的報復</p>\n<p>慕容燁離開蒼雲城的第三天，消息回到了慕容家總部。</p>\n<p>慕容家家主慕容恪坐在主廳正中的高背椅上，把慕容燁帶回來的情報從頭到尾聽了一遍，臉色沒有大的變化，甚至可以說是平靜的，一直平靜到聽完最後一句，他端起茶杯，喝了一口，把杯子放下。</p>\n<p>然後把那個茶杯壓碎了。</p>\n<p>不是摔，是壓，是慢慢把力道往下加，一直到茶杯在他掌心崩成碎片，茶水和碎瓷片灑了一桌。</p>\n<p>「在蘇家面前，」他說，語氣很輕，比輕還輕，輕到廳裡所有人都屏住了呼吸，「輸了。」</p>\n<p>沒人說話。</p>\n<p>「蒼雲城，」他繼續說，「那個白無極。」</p>\n<p>還是沒人說話。</p>\n<p>慕容恪站起來，在廳裡走了幾步，停下，說：「讓陳家那邊的人接洽一下，蒼雲城以東的雲嵐峽谷，做一個局。」</p>\n<p>主事低著頭，應了聲是。</p>\n<p>「不是要他死，」慕容恪說，語氣依然輕，「是要他在蘇家面前難看。難看夠了，慕容家的事，後面再說。」</p>\n<p>他走回主位，坐下，把桌上的茶水用袖子抹開，換了一杯新的，繼續喝：「去辦。」</p>\n<p>---</p>\n<p>蒼雲城這邊，白無極和蘇念卿都不知道這個決定，但情報網知道。</p>\n<p>蘇念卿的情報網是她自己建的，從蒼雲城到附近幾個城，各個方向都有不同程度的眼線，有些是付錢的，有些是她自己結的人情，一張說大不大說小不小的網，日常維護的成本不低，但管用。</p>\n<p>消息是第五天送到的，用的是蘇念卿自己的密文，一張小小的紙條，從信使手裡轉了兩道，最後到她手上。</p>\n<p>她解了密文，把紙條正反面看了一遍，坐在書桌前，把紙條夾在兩根手指之間，出了神片刻。</p>\n<p>然後起身，去找白無極。</p>\n<p>---</p>\n<p>白無極在客棧二樓，這些天的拜訪者少了很多——慕容燁那件事傳出去之後，蒼雲城的小勢力和散修們對白無極的態度從「想試探」變成了「不敢試探」，倒是讓他清靜了不少。</p>\n<p>他靠在窗邊，用從集市買來的竹木零件拼一個類似積木的玩意，純粹是打發時間。</p>\n<p>蘇念卿進來，沒有敲門，直接推開，把那張紙條放在他面前。</p>\n<p>白無極放下手裡的竹木零件，拿起紙條看了看。</p>\n<p>密文他看不懂，但蘇念卿既然拿來給他看，就說明已經解了：紙條背面有她用細字寫的翻譯——</p>\n<p>「慕容家與陳家殘部接洽，在蒼雲城以東三十里，雲嵐峽谷設伏，目標：白無極，要求：不殺，製造難堪，在蘇家眼線面前落敗。預計三日內行動。」</p>\n<p>白無極把紙條翻來覆去看了一遍，把背面的翻譯又過了一遍，然後抬頭。</p>\n<p>「他們選的地方不錯，」他說，語氣很平靜，像是在誇對方的眼光，「峽谷地形，靈契打遠程佔便宜。」</p>\n<p>蘇念卿站在他對面，看著他，說：「你還在誇他們選點好？」</p>\n<p>「我說的是，那個地形比較好打，」白無極把紙條放在桌上，手指點了點「峽谷」這個字，「峽谷地形，兩邊是石壁，遠程靈契打進去的衝擊波會在石壁上反彈，範圍打擊的效率是平地的兩倍，這對他們是優勢。但如果你是近戰，峽谷地形反而好，因為兩邊是石壁，對方的包圍就只能從前後兩個方向來，不能從左右側翼展開。」</p>\n<p>蘇念卿看著他：「你確定你是在說打架策略，不是在安撫我？」</p>\n<p>「安撫你幹什麼，」白無極說，聲音帶著點實在，「你又不慌。」</p>\n<p>蘇念卿沉默了一拍，把椅子拉出來坐下，把那個紙條重新拿起來：「他們說三日內行動，三日裡時間點不確定，但應該是在你出城的路上，意味著他們需要在峽谷提前布好陣形，等你進去。」</p>\n<p>「等我進去。」白無極把這幾個字重複了一遍，語氣裡有點什麼，不是擔憂，是某種評估，「他們怎麼判斷我會走那條路？」</p>\n<p>「雲嵐峽谷是蒼雲城往東最主要的商路，任何人離開蒼雲城往東，都要過那個峽谷，」蘇念卿說，「他們不需要確定你走哪天，只要確定你最終要往東走就夠了。」</p>\n<p>「那他們是怎麼知道我要往東走的？」</p>\n<p>蘇念卿在這個問題上停了一拍，說：「我讓人散出去一個消息，說你近期要去東邊的天青城看靈器。」</p>\n<p>白無極看了她一眼：「你是故意釣他們的？」</p>\n<p>「蒼雲城裡有慕容家的眼線，他們遲早知道你的行蹤，與其讓他們在不確定的時間地點下手，不如主動給他們一個確定的目標，」蘇念卿說，語氣依然平靜，「這樣我才能提前知道他們在哪裡等你。」</p>\n<p>白無極盯著她看了幾秒，然後說：「你這個腦子要是用來做生意，蘇家早就把其他三家都買下來了。」</p>\n<p>蘇念卿：「我不做生意，我做情報。」</p>\n<p>「一樣的，」白無極把竹木零件重新拿起來，繼續拼，「然後呢，你有沒有進一步的情報，峽谷那邊有多少人，什麼等級，怎麼布的？」</p>\n<p>「目前只有大概，陳家殘部這邊約莫十到十五人，以契師為主，契將兩到三個，慕容家這邊的人手還在確認中，但慕容恪的要求是不殺，所以不會用太頂尖的人，」蘇念卿說，把信息一條條說清楚，「如果我的判斷沒錯，對方整體在契師到契將，慕容家的人可能是一個偏指揮型的，在外圍協調，不直接出手。」</p>\n<p>白無極把一根竹片插進卡槽，嗒的一聲合上，說：「慕容燁不會親自去的吧？」</p>\n<p>「不會，他輸了，再去是往傷口上撒鹽，」蘇念卿說，「何況他輸了之後打落牙齒吞進肚子這件事處理得還算乾淨，再去就是他自己破壞這個體面。」</p>\n<p>「所以說他這個人，臉面比報復更重要。」</p>\n<p>「慕容家的人都是這樣，」蘇念卿說，語氣平靜，「所以他們出手的方式，一定是要讓你難看，而不是直接把你如何。」</p>\n<p>白無極想了想：「他們想讓我在蘇家眼線面前難看，這個邏輯是，如果我在那個局裡落了下風，消息傳回來，蘇家那邊對我的評估就會下降，對吧？」</p>\n<p>「對，」蘇念卿說，「蘇家現在對你的態度是觀望，如果你在這件事上表現不好，家族可能對你和我之間的往來提出質疑，認為你是個累贅。」</p>\n<p>「所以這是一石二鳥，針對我，也針對你。」</p>\n<p>「慕容恪是個聰明的人，」蘇念卿說，「他不輕易出手，出手了就要佔便宜。」</p>\n<p>白無極把手裡那個拼到一半的竹木玩意放在桌上，站起來，走到窗邊，看著外面的街道，沉默了片刻。</p>\n<p>蒼雲城的傍晚，街上還有人走動，幾個孩子在追著什麼跑，笑聲傳上來。</p>\n<p>「那就進去，」他說，語氣裡有一種奇怪的輕鬆，「峽谷裡有石壁，有回音，打起來應該挺熱鬧的。」</p>\n<p>蘇念卿看著他的背影：「你打算一個人去？」</p>\n<p>「不是，」白無極說，轉過頭，看她，「你要去嗎？」</p>\n<p>蘇念卿沉默了一拍。</p>\n<p>「我的情報網在峽谷附近有人，提前可以確認對方的布置，」她說，「而且你一個人去，峽谷地形，萬一對方把出口也封了……」</p>\n<p>「所以你要去，」白無極說，語氣很直接，「好，那就一起去。」</p>\n<p>「等等，」蘇念卿說，「我沒說我要去。」</p>\n<p>「你說了，」白無極說，「你說你的情報網在峽谷附近有人，你如果不去，讓你的人傳消息就行，不需要你親自去，所以你說這個的意思是，你打算去。」</p>\n<p>蘇念卿看著他，沉默了三秒，說：「……你有時候挺煩的。」</p>\n<p>「謝謝你的評價，」白無極說，轉回去繼續看窗外，「三天後，我們進峽谷。」</p>\n<p>霜翎從窗台上伸了個懶腰，尾巴翹起來，往白無極這邊看了一眼，像是在確認什麼，然後重新縮回去，把頭埋進蓬鬆的銀色尾巴裡。</p>\n<p>白無極看見了，說：「霜翎也要去嗎？」</p>\n<p>廳裡沒人回答，但蘇念卿的嘴角動了一下，那個弧度很輕，在傍晚的光線裡不是很明顯，但白無極側過頭剛好看見了，也沒說什麼，轉回去繼續看外面的街道。</p>\n<p>桌上那個拼到一半的竹木積木，最後的幾個缺口，需要再找幾根合適的竹片來收尾。</p>\n<p>白無極把這個記在腦子裡，打算明天去集市看看有沒有合適的。</p>\n<p>峽谷的事三天後再說，今晚先睡飽。</p>"}, {"title": "第41章_離開蒼雲城", "content": "<p>第41章　離開蒼雲城</p>\n<p>清晨的蒼雲城還沒完全睡醒。</p>\n<p>薄霧掛在城牆頂上，青石板路上有早起賣餛飩的小販，扁擔一頭掛著爐子，一頭掛著木桶，吱呀吱呀地響，把清晨走動的幾隻野貓嚇得跳開。</p>\n<p>白無極從客棧出來的時候，肩上背著一個灰色的背包。</p>\n<p>不大，就是那種登山客常見的雙肩包，他換了個外殼——這個世界找不到背包，所以是黃金體驗把一塊皮革變成幾頭小蜥蜴，讓牠們自己爬滿了包的外形，再定格成皮革包。看起來有點奇怪，有點像是動物死屍拼接的，但基本功能正常。</p>\n<p>他出來的時候，蘇念卿已經站在客棧門口。</p>\n<p>身旁有三個箱子。</p>\n<p>三個。</p>\n<p>白無極停在台階上，俯視那三個整整齊齊堆好的木箱，沉默了大概三秒，然後開口：</p>\n<p>「你這是搬家？」</p>\n<p>蘇念卿站得筆直，神情淡淡，看他的眼神就像在看一個說廢話的人：「女子出行，必需品。」</p>\n<p>「必需品。」白無極重複了一遍，走下台階，繞著那三個箱子轉了一圈，「行，那我問你，三個箱子裡是什麼必需品？」</p>\n<p>「換洗衣物。」</p>\n<p>「一箱。」</p>\n<p>「護膚藥草、備用藥材。」</p>\n<p>「一箱。」</p>\n<p>「出行工具、靈符、陣旗、地圖、路引、乾糧。」</p>\n<p>「一……等等，」白無極眉頭一皺，「這些東西都塞得進去？」</p>\n<p>蘇念卿沒有回答，只是輕輕掃了他一眼，那眼神的意思很明確：你問這麼多，閒的？</p>\n<p>白無極嘆了口氣，走到箱子旁邊蹲下，試著掂了掂重量，站不起來，他把三個箱子都試了一遍，換個姿勢抱起來，差點閃了腰，站起身喘了口氣：「行，我說你怕誰啊，你帶著一隻銀狐，誰敢在路上搶你東西？」</p>\n<p>話音剛落，霜翎從蘇念卿袖口探出半個頭，銀白色的耳尖豎著，朝白無極哼了一聲。</p>\n<p>清脆短促，態度鮮明。</p>\n<p>翻譯過來大概是：少廢話。</p>\n<p>白無極看了牠一眼：「你在哼我？」</p>\n<p>霜翎把頭縮回蘇念卿袖口。</p>\n<p>完全不想搭理你。</p>\n<p>白無極無奈地笑了笑，回頭看蘇念卿：「好，那這三箱誰背？」</p>\n<p>「自有安排。」蘇念卿拍了拍手，隨即彈指，三道靈力光絲從她指間射出，打在三個箱子的鐵環上，箱子悄無聲息地浮了起來，懸停在她身後半尺處，整整齊齊排成一列，就像三隻忠心的大狗。</p>\n<p>白無極：「行，你早說嘛。」</p>\n<p>蘇念卿瞥他：「你沒問。」</p>\n<p>「……」</p>\n<p>就這樣，他們出發了。</p>\n<p>---</p>\n<p>蒼雲城的東門守衛從早班換到現在，見過各式各樣的人出城，商隊、鏢師、走山的獵戶、進貨的小販，但像白無極這樣的組合，確實少見。</p>\n<p>一個穿著樸素、背著奇怪皮包的年輕男人，走路步伐很穩，沒什麼靈力波動，完全看不出深淺；旁邊是個身形修長、氣質清冷的女子，三個箱子跟在她身後飄著；女子袖口裡若隱若現一道銀白色尾巴。</p>\n<p>守衛隊長老周認識蘇念卿，見她要出城，趕緊上前：「蘇小姐，您這是要出遠門？」</p>\n<p>「天契城。」蘇念卿言簡意賅。</p>\n<p>老周點頭，目光移到白無極身上，帶著幾分好奇又帶著幾分說不清楚的東西——不是警惕，是某種說不清楚的……安心？他說不上來，只是覺得這個人站在那裡，不知為何讓人覺得靠得住。</p>\n<p>「二位出行，一路順風。」</p>\n<p>白無極對他擺了擺手，隨口道：「謝了，多喝熱水。」</p>\n<p>老周愣了一下，哈哈笑起來：「好，多喝熱水！」</p>\n<p>---</p>\n<p>出了東城門，路漸漸寬了，官道兩旁是被秋風打黃的楊樹，葉子稀稀拉拉掛著，偶爾一陣風吹過，嘩啦啦地響。</p>\n<p>白無極走在前面，步幅不大不小，很規律，呼吸均勻，是常年走路鍛鍊出來的節奏。</p>\n<p>蘇念卿走在他右後方半步，三個箱子在她身後安靜地跟著。</p>\n<p>霜翎從袖口完全鑽出來，伸展了一下前肢，然後落在蘇念卿肩頭，銀白色的皮毛在晨光裡閃著輕柔的光澤，九條尾巴優雅地垂落。</p>\n<p>「前往天契城，正常趕路要幾天？」白無極問。</p>\n<p>「走官道，快馬十二天，」蘇念卿道，「步行大概二十至二十五天。」</p>\n<p>「中間有幾個補給點？」</p>\n<p>「三個大城，七個驛站，另有幾個散落的村鎮。」</p>\n<p>「路上靈獸多不多？」</p>\n<p>「中段要穿越赤嶺山脈，那段路靈獸較多，但通常是契師以下的等級，不構成威脅。」她頓了頓，「正常來說。」</p>\n<p>白無極聽出了她那個「正常來說」的重音，回頭看了她一眼：「不正常的情況？」</p>\n<p>「每隔幾年，赤嶺山脈的強靈獸會往外擴張領地，那段時間走官道有風險。」她眼神沉了一瞬，「何況，此行我們未必能走得平靜。」</p>\n<p>「你說慕容家。」</p>\n<p>「陳家殘部聯合了慕容家，這是蘇府的消息，」蘇念卿道，「慕容燁在蒼雲城丟了臉，他的性格不會就這麼算了。」</p>\n<p>白無極嗯了一聲，沒有說什麼，視線轉回前方，繼續走。</p>\n<p>蘇念卿觀察了他片刻，這人真的一點都不慌，說到「路上有埋伏」跟說「今天天氣不錯」是同樣的表情，她有時候真的不確定這是真的有底氣，還是沒把這些威脅放在眼裡，還是……單純就是腦子不夠用。</p>\n<p>霜翎似乎感受到主人的疑惑，歪了歪頭，也看了看白無極的背影。</p>\n<p>白無極走在前面，渾然不知自己正在被兩雙眼睛同時鑒定。</p>\n<p>他在腦子裡默默和白金之星打了個招呼。</p>\n<p>白金之星沒說話，但那股存在感沉穩地亮了一下，就像篝火加了塊木柴，不聲不響，但暖的。</p>\n<p>白無極把視線掃了掃四周，官道兩側是開闊的農田，這個季節已經收完，只剩下枯黃的稻梗，再遠一點是起伏的丘陵，天際線清晰。</p>\n<p>沒什麼異常。</p>\n<p>很好，走吧。</p>\n<p>---</p>\n<p>走到正午，太陽升起來，霧散了，路也熱起來。</p>\n<p>白無極把外衫的袖子挽起來兩截，邊走邊從腰間摸出個水袋，仰頭喝了一口，回頭問：「要不要休息一下？」</p>\n<p>「不必。」蘇念卿的呼吸比他平緩很多，靈力修為的人走路確實省力，「你不累嗎？」</p>\n<p>「沒事，我練過。」</p>\n<p>「練什麼？」</p>\n<p>「拳法。」</p>\n<p>蘇念卿想起他打慕容燁那一套拳，確實乾脆，沒有靈力加持，純粹是身體技巧和力量，而且——有一種說不清楚的奇異感，像是拳頭打出去之後，還有什麼繼續打了下去。</p>\n<p>她沒有繼續問，白無極也沒有主動解釋。</p>\n<p>沉默了一段路，蘇念卿忽然開口：「你為什麼要去天契城？」</p>\n<p>「好奇。」</p>\n<p>「就這樣？」</p>\n<p>「想看看。」白無極轉頭對她微微一笑，「大陸中央嘛，有什麼不值得去看的？再說，蒼雲城待膩了。」</p>\n<p>蘇念卿看著他：「你不打算留下來？蘇家可以給你提供庇護，在蒼雲城，以你的能力，站穩腳跟不難。」</p>\n<p>「庇護這種東西，」白無極想了想，「聽起來就不太自由。」</p>\n<p>蘇念卿沉默了一下，沒有反駁。</p>\n<p>她想說「蘇家不是那種束縛人的地方」，但這話說出來她自己也不信——蘇家給了她很多，也要走了很多，那些要走的東西，她從來沒有辦法拒絕，只是不說。</p>\n<p>白無極沒注意到她的沉默，繼續走，不一會兒開口：「對了，天契城是做什麼的？」</p>\n<p>「天衍大陸的中樞城市，」蘇念卿從沉思中回過神，「天契學院在那裡，四大聖家在那裡，每年一次的靈契大試也在那裡。還有天衍令——所有重大靈契事務的裁決，都由天契城的議會決定。」</p>\n<p>「有點像首都。」</p>\n<p>「可以這樣理解。」</p>\n<p>「那四大聖家是什麼來頭？」</p>\n<p>「四大聖家，慕容、羅煜、夏侯、白鹿，」蘇念卿道，「其中慕容家以武力稱霸，羅煜家以靈陣聞名，夏侯家以靈藥稱絕，白鹿家……歷史最悠久，但近幾代沉寂，行事低調。」</p>\n<p>「四大家族，」白無極喃喃，「那蘇家呢？」</p>\n<p>「蘇家是八大名門之一，」蘇念卿的語氣很平靜，但有一種很淡的驕傲，「名門和聖家是不同的層級。」</p>\n<p>「懂了，就是二線。」</p>\n<p>蘇念卿：「……」</p>\n<p>她深呼吸了一下，決定不計較。</p>\n<p>---</p>\n<p>暮色降臨的時候，他們已經走出了蒼雲城方圓二十里。</p>\n<p>官道旁邊有一片密林，白無極看了看天色，拍板：「就在這裡紮營。」</p>\n<p>蘇念卿掃了掃四周，靈力輕輕一探，沒有危險氣息，點頭同意。</p>\n<p>她解開箱子取出帳篷材料，開始布置，動作俐落。白無極去林子邊緣找引火的枯木，霜翎跳下蘇念卿的肩膀，在附近蹓躂，偶爾抬頭看看遠處。</p>\n<p>篝火升起來的時候，天色完全黑了，星星出來了，很亮，密密麻麻，是在都市裡看不到的那種亮。</p>\n<p>白無極坐在火堆旁邊，仰頭看了一會兒，心裡有點東西鬆了鬆。</p>\n<p>不知道為什麼，這個世界的星星讓他覺得好看。</p>\n<p>可能是因為沒有光污染吧。</p>\n<p>霜翎繞著篝火走了半圈，在蘇念卿和白無極中間的空地上盤起來，九條尾巴把自己裹成一個銀白色的圓球，合上眼睛。</p>\n<p>蘇念卿在烤乾糧，白無極看了一眼那幾塊硬梆梆的東西，決定今晚自己去林子裡碰碰運氣。</p>\n<p>「我去打點什麼回來，」他站起身，拍了拍腿上的灰，「不能天天啃乾糧。」</p>\n<p>蘇念卿沒抬頭：「隨你。」</p>\n<p>白無極進了林子，不一會兒，林子裡傳出幾聲悶響。</p>\n<p>他出來的時候手裡提著兩隻野雞和一隻不知名的肥圓靈獸，後者長得像兔子和豬的混合體，圓滾滾的，表情很迷茫。</p>\n<p>蘇念卿看了看那些獵物：「你是怎麼抓到的？」</p>\n<p>「拳頭。」</p>\n<p>「……打的？」</p>\n<p>「嗯。」</p>\n<p>蘇念卿沉默了一下，沒有繼續問。</p>\n<p>白無極把獵物收拾了，開始在篝火上烤，手法嫻熟，是那種長期野外生存練出來的，調味只有隨身帶的鹽和幾根晾乾的藥草，但烤出來的味道還算能入口。</p>\n<p>他把烤好的野雞腿遞給蘇念卿，自己啃了一大口。</p>\n<p>蘇念卿接過，看了看，小口咬了一下。</p>\n<p>味道……還行。就是偏鹹，而且肉有點老，火候掌握得不夠好。</p>\n<p>她沒說什麼，繼續吃。</p>\n<p>白無極吃得很香，邊吃邊仰頭看星星，時不時哼兩聲說不出出處的小調。</p>\n<p>霜翎從圓球裡伸出半個頭，嗅了嗅那塊肉，銀色的眸子裡有片刻的掙扎，然後起身走到白無極身邊，在他面前坐下，眼神直直盯著他手裡的野雞。</p>\n<p>白無極低頭看了牠一眼，掰了一塊胸肉遞過去。</p>\n<p>霜翎頓了一下，鼻子往前湊了湊，然後非常優雅地叼走了。</p>\n<p>白無極笑了笑，沒說什麼。</p>\n<p>遠處蒼雲城的燈火還能隱隱看到，像是幾點星火。</p>\n<p>再過幾天，就看不到了。</p>\n<p>白無極把視線從遠處收回來，繼續啃他的野雞腿，心想，去天契城，那才是真的開始吧。</p>\n<p>---</p>\n<p>白金之星靜靜地站在他身後。</p>\n<p>黃金體驗懶洋洋地靠著一棵大樹。</p>\n<p>篝火的光照不到替身，但那兩道存在感，白無極能清清楚楚地感覺到。</p>\n<p>他嘴角微微翹了翹，對著星空默默想：走吧，這才哪到哪。</p>"}, {"title": "第42章_旅途日常", "content": "<p>第42章　旅途日常</p>\n<p>第二天的太陽出來得很早。</p>\n<p>白無極是被霜翎踩醒的。</p>\n<p>銀狐的爪子踩在他臉上，不是惡意，純粹是牠跳過去的時候沒算好距離，一隻後腳踩到了他的鼻樑，白無極悶哼一聲，猛地睜眼，看見一條銀白色尾巴優雅地甩過他的視線。</p>\n<p>霜翎繼續走，頭都沒回。</p>\n<p>白無極把自己從地上撐起來，揉了揉鼻子，看向蘇念卿那邊的帳篷，帳篷已經收好了，蘇念卿正在整理東西，動作輕快，頭髮梳得一絲不苟，就像完全不介意昨晚在野外打了地鋪一樣。</p>\n<p>「你這麼早就起了？」白無極扯了扯衣領。</p>\n<p>「你太晚。」蘇念卿瞥他一眼，「趕路講究早出晚歸，你這個點才起，今天少走一個時辰。」</p>\n<p>「一個時辰就一個時辰，反正也不趕。」</p>\n<p>「……」</p>\n<p>蘇念卿深呼吸了一下，把到嘴邊的反駁壓回去。</p>\n<p>不值得。不值得。不值得。</p>\n<p>---</p>\n<p>出發的時候，白無極隨口問：「今天走哪條路？」</p>\n<p>蘇念卿展開地圖，這是一張細緻的羊皮地圖，上面的地形和路線用深棕色的墨描繪，清晰得出乎意料。她指了指中間一條比較粗的線：「繼續官道，到夕陽渡口之前都是平路，大概七十里。」</p>\n<p>「七十里。」白無極算了算，「今天能走完？」</p>\n<p>「走得快能。」</p>\n<p>「行，走。」</p>\n<p>走了不到一個時辰，蘇念卿發現一個問題——白無極這個人走路沒辦法閒著。</p>\n<p>他一直在說話。</p>\n<p>不是有什麼特別重要的事情，就是路上看到什麼說什麼，看到一棵奇形怪狀的樹，說「這棵樹長得像我前同事老趙」；看到路邊有個廢棄的石碑，說「這字體有意思，我估計刻這個的人手腕力道不夠，你看這個撇走勢散了」；看到遠處有個放牛的老農，說「這老爺爺背很挺，練過」。</p>\n<p>蘇念卿沉默應對，霜翎冷眼旁觀。</p>\n<p>到第三個時辰的時候，蘇念卿的耐性出現了微妙的裂縫。</p>\n<p>「你能不能安靜一會兒。」</p>\n<p>白無極轉頭：「怎麼了？」</p>\n<p>「趕路要保存體力。」</p>\n<p>「我說話又不費體力。」</p>\n<p>「費神。」</p>\n<p>白無極抬了抬眉毛，然後笑了笑，閉上嘴，走了大約三分鐘，又開口：「對了，你練武嗎？」</p>\n<p>「…………」</p>\n<p>「我是說，靈契師要不要練身體？你用靈術，那近身被人摸到了怎麼辦？」</p>\n<p>蘇念卿停頓了一下，這個問題倒是正常問題：「靈契師一般不近身，霜翎負責防禦和中距離封鎖，我負責靈術輸出，配合起來不給對手靠近的機會。」</p>\n<p>「可萬一呢？」</p>\n<p>「若是真的被突破防線近身，」蘇念卿的語氣很平靜，「那說明對手的實力遠超我，這時候打不打都是敗，打身體技巧意義不大。」</p>\n<p>白無極聽了，點了點頭：「邏輯通，但有漏洞。」</p>\n<p>蘇念卿側目：「哪裡漏洞？」</p>\n<p>「你假設的前提是你的靈術和霜翎的防禦是完整的，但如果對手有辦法壓制靈力呢？」</p>\n<p>蘇念卿沉默了片刻，這個問題確實……</p>\n<p>她想起了山嶽熊的事（那是後來的事，但此刻直覺冒出來），那種靈力被壓制的感覺是真實存在的：「如果靈力被壓制，那確實……」</p>\n<p>「所以，」白無極說，「身體好一點總沒壞處。」</p>\n<p>「你是在說你的拳法？」</p>\n<p>「我是在說跑步，」他認真道，「跑贏對手，戰術撤退，非常實用。」</p>\n<p>蘇念卿半晌說出一個字：「……滾。」</p>\n<p>霜翎從蘇念卿肩頭回頭看了白無極一眼，那眼神裡有一絲很微妙的東西——不是輕視，更像是……忍住笑的表情？</p>\n<p>當然，靈狐不笑，所以白無極也不確定。</p>\n<p>---</p>\n<p>午後的路比較無聊，兩邊從楊樹林換成了矮丘，風吹過來有點乾，卷著黃色的塵土。</p>\n<p>白無極走著走著，視線落在路邊的一棵樹上。</p>\n<p>那棵樹幹枯了，枝條黑褐色，樹皮皺縮，顯然已經死了很久，但根系還紮在地裡，沒有倒下，就這麼杵在路邊，有幾分蒼涼。</p>\n<p>他腳步沒停，但走過去的時候，手不動聲色地往旁邊一伸，指尖輕輕掠過了枯樹的樹幹。</p>\n<p>黃金體驗。</p>\n<p>那股金色的光沒有顯現，非常細微，非常收斂，只是一觸即收，像一口呼出的溫氣，從指尖進了樹幹。</p>\n<p>他繼續走，頭都沒回。</p>\n<p>蘇念卿走在他後方，沒有注意到。</p>\n<p>但霜翎注意到了。</p>\n<p>銀色靈狐的感知是遠超普通靈獸的，那枯樹上傳來的靈力波動雖然極其細小，但在霜翎的感知裡，就像靜水裡丟了一顆沙粒，極淡的漣漪，但有。</p>\n<p>霜翎的耳尖動了動。</p>\n<p>牠慢下步伐，在蘇念卿的肩頭輕輕轉過身，回頭看了看那棵樹。</p>\n<p>枯樹的樹幹上，一點嫩綠的顏色從龜裂的樹皮裡破出來，脆弱、細小，像一根細細的針，但確實是綠的。是活的。</p>\n<p>霜翎凝視了那棵樹大概三秒，然後把視線轉向白無極的背影。</p>\n<p>白無極正在說什麼，蘇念卿正在忽視他，一切如常，他的背影看起來毫無異常，那個包背得端正，步伐穩健，臉上什麼表情都沒有。</p>\n<p>就好像什麼都沒發生過。</p>\n<p>霜翎眨了眨眼。</p>\n<p>再看一眼那棵樹，那一點嫩綠已經把旁邊的一小塊枯皮頂開了，正在悄悄地、固執地往外伸。</p>\n<p>牠慢慢把視線移回前方。</p>\n<p>白無極好像感覺到了什麼，側頭看了牠一眼。</p>\n<p>兩道視線對上了一秒。</p>\n<p>白無極對著霜翎眨了眨眼，嘴角微微一翹，然後若無其事地轉回頭，繼續走路。</p>\n<p>霜翎盯著他的後腦勺看了片刻，九條尾巴輕輕搖了一下，也轉回頭，繼續假裝在看前方的路。</p>\n<p>---</p>\n<p>傍晚的時候，他們找到一個背風的土坡紮營。</p>\n<p>白無極說今天他煮飯，蘇念卿說不必，說她來。</p>\n<p>白無極說好，他去打獵。</p>\n<p>蘇念卿說不必，她帶了乾糧。</p>\n<p>白無極說乾糧是底線，非必要不開動。</p>\n<p>蘇念卿說那你去打。</p>\n<p>白無極去打獵，回來帶了兩條魚，是在不遠處的溪邊摸來的。</p>\n<p>蘇念卿看著那兩條魚，說她來處理。</p>\n<p>白無極說好。</p>\n<p>然後他坐在旁邊看著蘇念卿把那兩條魚收拾好，架上靈火，開始煮。</p>\n<p>靈火比普通火焰更穩定，溫度可以控制，聽起來很好用。</p>\n<p>但大概十分鐘後，那鍋湯飄出來的氣味讓白無極皺了眉頭。</p>\n<p>說不上來哪裡不對，就是……不對。</p>\n<p>他沒說話，等蘇念卿把湯盛出來，推了一碗到他面前。</p>\n<p>他端起來，喝了一口。</p>\n<p>沉默了大概五秒。</p>\n<p>「怎麼樣？」蘇念卿端著自己那碗，等他評價，神情是那種理所當然等著誇的表情。</p>\n<p>白無極慢慢說：「你是不是把鹽和糖放反了？」</p>\n<p>蘇念卿的表情停了一下：「……」</p>\n<p>她低頭看著自己那碗湯，喝了一口。</p>\n<p>沉默。</p>\n<p>霜翎走過來，在那鍋旁邊嗅了嗅，然後退開了。</p>\n<p>「……」蘇念卿把碗放下，臉上那個平靜的表情維持得很艱難，「鹽和糖擺放位置一樣。」</p>\n<p>「我知道，所以你放反了。」</p>\n<p>「…………」</p>\n<p>「行了，」白無極站起身，把她那碗端走，自己重新調味，「你就負責打靈術，煮飯這個事讓我來。」</p>\n<p>蘇念卿靜靜坐著，看他重新翻鍋調味，臉上保持著那個平靜的表情，但耳尖有一點點，非常輕微地，紅了一下。</p>\n<p>霜翎回到她身邊，把頭靠在她腿上。</p>\n<p>主人，那個人說得對。</p>\n<p>蘇念卿用手輕輕按了按霜翎的腦袋：「閉嘴。」</p>\n<p>霜翎：「……」我沒說話啊。</p>\n<p>---</p>\n<p>夜深了，篝火沒有熄，兩個人各自在自己帳篷邊坐著。</p>\n<p>白無極在擦那個皮質包，不知道在思考什麼，偶爾看一眼火，偶爾抬頭看看天。</p>\n<p>蘇念卿在翻地圖，手邊放著一盞小靈燈，光線柔和，把她側臉的輪廓照得很清晰。</p>\n<p>霜翎在她和白無極之間的空地上，身體盤成圓形，九條尾巴展開又收攏，像是在無意識地活動。</p>\n<p>靜得很，只有火星偶爾爆開的聲音。</p>\n<p>白無極忽然說：「你做好吃飯了嗎？」</p>\n<p>蘇念卿：「什麼？」</p>\n<p>「以後的事，你有沒有想過，去了天契城之後要做什麼。」</p>\n<p>蘇念卿把地圖放下：「靈契大試。」</p>\n<p>「大試是什麼？」</p>\n<p>「天衍大陸每三年一次的靈契者排位考核，」蘇念卿的語氣有些淡，但眼神是認真的，「通過大試可以進入天契學院，也可以確立自己的江湖地位，對某些家族而言，大試名次意味著一切。」</p>\n<p>「你要去爭排位？」</p>\n<p>「蘇家希望我進前十。」她說這話的時候沒有波瀾，就好像在說別人的事。</p>\n<p>「你希望呢？」白無極看著她。</p>\n<p>蘇念卿沉默了片刻，「我希望，」她慢慢說，「能在大試上遇到真正值得打的對手。」</p>\n<p>白無極聽了，哈地笑出來：「你這個人，比我還直接。」</p>\n<p>蘇念卿眉頭微微動了一下：「你笑什麼？」</p>\n<p>「沒什麼，覺得挺好的，」他說，語氣是真心的，「知道自己想要什麼，這挺好的。」</p>\n<p>蘇念卿看了他一眼，沒有說話。</p>\n<p>霜翎把頭微微轉向白無極，在這片安靜裡，銀色的眸子裡有什麼東西，很細微，很剋制，但不同於昨天。</p>\n<p>昨天是觀察。</p>\n<p>今天多了一點點，別的東西。</p>\n<p>---</p>\n<p>白無極在進帳篷前，最後看了一眼那棵方向，已經看不見了，太黑了，而且也太遠了。</p>\n<p>但他知道，那棵枯樹的那一點嫩綠，還在生長著。</p>\n<p>非常細小，但是活著。</p>\n<p>他拉開帳篷鑽進去，閉上眼，不一會兒呼吸就沉穩了。</p>\n<p>黃金體驗的光在他的意識邊緣緩緩流動，溫和，沒有攻擊性，就像一盆植物在他旁邊靜靜地呼吸。</p>\n<p>白無極在半夢半醒之間想：這個能力，以後好好琢磨一下，應該能用出更多花樣。</p>"}, {"title": "第43章_黃金體驗的新用法", "content": "<p>第43章　黃金體驗的新用法</p>\n<p>第三天的路走得很順。</p>\n<p>官道保養得還算不錯，至少沒有泥濘，偶爾有幾塊大石頭橫在路上，繞開就是了。</p>\n<p>白無極走路的時候習慣把手插在腰帶上，視線看著前方，腦子裡卻在轉別的事情。</p>\n<p>他在想黃金體驗的用法。</p>\n<p>這個能力的核心，他這幾天摸索下來，大概是「賦予生命」——更準確說是「讓無機物走向有機化的進程」，石頭可以變成蜥蜴，枯木可以長出嫩芽，大地可以長出根系。</p>\n<p>那問題來了：如果把一塊石頭變成蜥蜴，那隻蜥蜴能活多久？牠有沒有自己的意識？牠消失之後，石頭能不能變回去？</p>\n<p>前兩個問題他昨天試過了，變出來的蜥蜴確實活著，有本能反應，會逃跑會覓食，但白無極能感知牠的方位和大致的感受，就像一條很細的線牽著。</p>\n<p>第三個問題也試過了——把蜥蜴捏碎，確實能變回石頭，但石頭的形狀和之前略有不同，像是被揉過一樣。</p>\n<p>然後他想到了一個新問題：如果不捏碎，蜥蜴能活多久？</p>\n<p>他昨晚試了一下，變了一隻小壁虎，讓牠在帳篷角落待著，今早出帳篷的時候壁虎還在，活的，眨著眼睛看他，白無極給牠弄了點蟲子吃，然後出發前把牠捏碎。</p>\n<p>很抱歉，小傢伙，你是個實驗品。</p>\n<p>好，那麼問題集中了：如果他把石頭變成更複雜的生物——比如一隻有較強感知能力的小型靈獸——再透過那條「牽引線」接收到牠的感知，那不就是個完美的偵查工具？</p>\n<p>他走著走著，視線落在路邊一塊雞蛋大小的橢圓形石頭上。</p>\n<p>很好，就你了。</p>\n<p>他彎腰撿起石頭，放在手心裡，讓黃金體驗輕輕覆上去。</p>\n<p>這個過程沒有任何聲音，也沒有明顯的光芒，就是石頭的質地開始變化，從堅硬冰涼慢慢變得有溫度，有紋理，有起伏。</p>\n<p>大概十秒鐘，他手心裡的石頭變成了一隻小蜥蜴。</p>\n<p>不大，比他拇指大一點，鱗片是石頭色的灰棕，眼睛黃色，細小，看起來很不起眼，完全像是路邊普通的野生小蜥蜴。</p>\n<p>白無極把牠放在地上，念頭一動。</p>\n<p>蜥蜴動了，往前方的官道跑去，速度意外地快，四條腿跑起來是一連串的波浪形，低矮貼地，很難注意到。</p>\n<p>「你在做什麼？」蘇念卿走近，看著白無極盯著前方地面。</p>\n<p>「沒事，想事情。」</p>\n<p>「想什麼？」</p>\n<p>「想前面的路好不好走。」</p>\n<p>蘇念卿皺了皺眉，沒再追問，繼續走。</p>\n<p>白無極一邊走，一邊透過那條細細的意識牽引線，感知著蜥蜴傳回來的訊息。</p>\n<p>蜥蜴的感知不複雜——牠沒有人類的視覺清晰度，但嗅覺和地面震動感知很強，跑出去大概半里之後，牠爬上了路邊的一棵大樹，從高處往前看。</p>\n<p>訊息開始傳回來了。</p>\n<p>白無極皺了皺眉頭。</p>\n<p>不是地形，是人。</p>\n<p>大約在前方十里處，官道在一個山坡後面轉了個彎，彎道那裡有一片矮樹林，蜥蜴的感知裡，那片樹林的地面有很多人的腳步震動，有馬，有靈獸，很多，分散在樹林的不同位置——這是故意分散的，不是自然紮營的分布。</p>\n<p>是埋伏。</p>\n<p>白無極收斂了意識，讓蜥蜴折回，小傢伙跑回來花了比去的時候更長的時間——逆風嘛，正常。跑到他腳邊，白無極蹲下身，把牠拿起來，在掌心裡捏了一下。</p>\n<p>蜥蜴消失了，變回一塊石頭。</p>\n<p>石頭的形狀略有不同，比之前多了幾道細紋。</p>\n<p>他站起身，把石頭丟進路邊的草叢，然後很自然地開口：「前面有埋伏。」</p>\n<p>蘇念卿的步伐沒有停，但語氣收緊了一線：「幾人？」</p>\n<p>「大概三十多個，還有兩個契將。」</p>\n<p>蘇念卿側頭看他：「你怎麼知道？」</p>\n<p>白無極聳了聳肩：「猜的。」</p>\n<p>「……」蘇念卿的表情沒有動，但停了兩秒，「你說前方幾里？」</p>\n<p>「十里左右，在彎道那個山坡後面的樹林裡。」</p>\n<p>「……這猜得很準。」</p>\n<p>「哈哈，我比較有感覺。」</p>\n<p>蘇念卿盯著他看了三秒。</p>\n<p>白無極被她盯得有點心虛，咳了一聲，轉移話題：「反正，前面有埋伏，怎麼應對你有想法嗎？」</p>\n<p>蘇念卿收回視線，思考了片刻：「三十多人，兩名契將，這不是臨時湊的，是準備已久的。」她頓了頓，「按照慕容家的行事風格，這個規模對付我們是夠了，但他們不知道你的真實實力。」</p>\n<p>「所以他們覺得三十多個人夠。」</p>\n<p>「夠殺我，」蘇念卿的語氣很平靜，「對於正常評估，契師加一個深不可測的體契者，兩名契將加三十多個契士，勝算足夠。」</p>\n<p>白無極點了點頭：「那我們怎麼走？」</p>\n<p>「繞路要多一天，但更安全。」</p>\n<p>「正面打過去呢？」</p>\n<p>蘇念卿看著他：「你說打就打？」</p>\n<p>「不是衝動，」白無極說，「就是，我有幾個問題——如果我們繞路，慕容家的人會不會重新部署？」</p>\n<p>「……會。他們若是埋伏失敗，會重設。」</p>\n<p>「所以繞路是暫時的，還是一直被追著走。」</p>\n<p>蘇念卿沉默。</p>\n<p>「再說，」白無極繼續道，「你不是說這段路要走二十多天嗎，如果一路上慕容家的人都在後面追著設伏，我們一直繞，什麼時候到天契城？」</p>\n<p>這個問題蘇念卿沒有辦法反駁。</p>\n<p>霜翎從她肩頭跳下來，站在地上，銀色的眸子看了看白無極，又看了看蘇念卿，尾巴輕輕搖了搖，意思模糊，看不出是贊成還是反對。</p>\n<p>白無極說：「這樣，我去前面探一下，確認具體位置和人數，然後我們商量怎麼打。」</p>\n<p>「你怎麼探？」</p>\n<p>「猜的。」</p>\n<p>蘇念卿：「……」你這個答案用得很順手啊。</p>\n<p>---</p>\n<p>但白無極說的是真的。</p>\n<p>他和蘇念卿在路邊找了個位置，讓她先停下來休息，自己繼續往前走了一段，找到一塊視野好的石頭，蹲下來，從地上又撿了一塊石子，再讓黃金體驗覆上去。</p>\n<p>這次他做得更精細一點。</p>\n<p>不是普通蜥蜴，他試著讓那隻蜥蜴的體型更小，更像林地裡常見的那種，讓牠爬得更高，去到能俯視那片樹林的位置。</p>\n<p>十里路，蜥蜴跑得很快，不到半個時辰，意識回傳就多了很多細節。</p>\n<p>人數：三十六，分成六組，每組六人，間隔大約三十步，在彎道兩側都有人，是兩面包夾的陣型。</p>\n<p>靈獸：八頭，都是契士級，用靈鎖扣著。</p>\n<p>契將：兩人，一個在北側高地，一個在官道正前方，是主力，其他人是輔助。</p>\n<p>白無極把訊息接收完，讓蜥蜴退回，直接解散，捏碎，變石子丟掉。</p>\n<p>他站起身，拍了拍腿，回到蘇念卿那裡，把情況說了一遍。</p>\n<p>蘇念卿的眼神越來越奇怪：「你說得如此詳細……」</p>\n<p>「我猜得比較細。」</p>\n<p>「白無極，」她停頓了一下，第一次叫他全名，「你知道嗎，你說謊的時候表情非常自然，但你提供的信息本身就是破綻。」</p>\n<p>白無極：「……」</p>\n<p>「正常人猜埋伏，最多猜出有沒有人，猜不出幾人幾組、靈獸數量和契將位置，」蘇念卿平靜地說，「所以你有某種方式確認過，但你不想說。」</p>\n<p>白無極對她眨了眨眼：「那我就不說。」</p>\n<p>蘇念卿看了他一會兒，眼神裡有某種說不清楚的情緒，最後說：「好。」</p>\n<p>就這樣。</p>\n<p>她沒有繼續追問，只是把得到的情報接過來，在腦子裡重新推演。</p>\n<p>六組、三十六人、兩面包夾、兩名契將——她默默想，如果這些資訊是真的，那這場伏擊不是什麼精銳配置，是消耗型配置，兩個契將負責壓制，其他人負責消磨。</p>\n<p>她側頭看了白無極一眼：「你有把握應對兩名契將？」</p>\n<p>「嗯。」</p>\n<p>「同時？」</p>\n<p>「嗯。」</p>\n<p>「你就一個字——」</p>\n<p>「嗯。」</p>\n<p>蘇念卿深呼吸。</p>\n<p>霜翎的九條尾巴忽然輕輕展開，然後又收回去，那個動作是牠準備戰鬥時的習慣。</p>\n<p>銀色的眸子看向前方的方向，清晰，冷靜。</p>\n<p>白無極看了霜翎一眼，心想，就這隻狐狸，是真的靠得住。</p>\n<p>他站起來，活動了一下肩膀：「行，問題是，今天打還是繼續走？」</p>\n<p>蘇念卿想了想：「走一段，到明天，讓他們繼續等。等了越久，人越鬆懈。」</p>\n<p>白無極點頭：「好主意。」</p>\n<p>兩人繼續沿著官道走，故意保持原本的速度，不快不慢，看起來完全沒有發現前方有任何問題。</p>\n<p>走過那片矮樹林大概一里，蘇念卿才開口：「他們的探子已經發現我們了。」</p>\n<p>「我知道，」白無極說，「讓他們看見，明天再說。」</p>\n<p>蘇念卿沉默了片刻，忽然說：「你不怕嗎？」</p>\n<p>「什麼？」</p>\n<p>「埋伏，三十多個人，」她說，「你不怕。」</p>\n<p>白無極想了一下，搖搖頭：「沒有怕到什麼程度，就是……覺得能過去。」</p>\n<p>「根據什麼？」</p>\n<p>「直覺。」這次不是搪塞，是真的，「而且，」他停頓了一下，「我有你。」</p>\n<p>蘇念卿愣了一秒。</p>\n<p>白無極很自然地繼續說：「還有霜翎，三個……嗯，兩個半，對付三十多個人，能。」</p>\n<p>「……兩個半是什麼？」</p>\n<p>「你算一個，霜翎算半個，我算一個。」</p>\n<p>蘇念卿：「……我和霜翎合起來才等於你一個半？」</p>\n<p>「欸不是，霜翎算你的一部分，你們加起來算一個半，我算一個，合起來兩個半。」</p>\n<p>「……」</p>\n<p>「這不是重點，重點是能打，別想這種數學題了。」</p>\n<p>蘇念卿閉上嘴，看著前方的路，沒有說話。</p>\n<p>霜翎在她肩上，銀白色的尾巴搖了搖。</p>"}, {"title": "第44章_被遺忘的村莊", "content": "<p>第44章　被遺忘的村莊</p>\n<p>翌日清晨，他們沒有繼續走原路。</p>\n<p>昨天蘇念卿在地圖上找到一條小路，繞開那段彎道，從山腰走過去，可以從慕容家埋伏點的後方繞出，再接回官道。</p>\n<p>但問題是，繞路要穿過一段山谷。</p>\n<p>那段山谷，蘇念卿的地圖上有一個很小的標記，用棕紅色的墨水畫了個三角，旁邊寫著兩個字——廢村。</p>\n<p>白無極問：「廢村什麼意思？」</p>\n<p>「以前有人住，後來沒有了，」蘇念卿說，「這種記錄在地圖上通常是為了提醒，廢村可能有靈獸盤據，或者靈力場紊亂，不宜久留。」</p>\n<p>「那可能有什麼？」</p>\n<p>「說不準。」她說，「但通常不是好事。」</p>\n<p>白無極把地圖拿過來看了看，那個三角標記不大，但旁邊還有另一個符號——他不認識這個符號，但蘇念卿解釋說，是「強靈力波動」的意思，評等在契將以上。</p>\n<p>「契將以上就有可能是契王？」他問。</p>\n<p>「契王及以上，」她點頭，「但也可能只是地形原因，某些山谷的靈力石礦層會產生自然波動，跟靈獸沒有關係。」</p>\n<p>「所以不確定。」</p>\n<p>「不確定。」</p>\n<p>白無極把地圖還給她：「走，進去看看就知道了。」</p>\n<p>蘇念卿把地圖收起來，沒有繼續說話，但她讓蜥蜴——</p>\n<p>不，她讓霜翎先探了一下。</p>\n<p>霜翎從她肩頭跳下，在地面上跑了幾步，往山谷方向凝神感知了片刻，回來，在蘇念卿腳邊停下，抬頭看了看她。</p>\n<p>蘇念卿眉頭皺了皺：「確實是靈獸，而且很強。」</p>\n<p>「多強？」</p>\n<p>「霜翎感知到的波動，在契王級左右。」她說，「而且那個靈獸已經把整個山谷當做領地了，走進去會直接觸發牠的領域壓制。」</p>\n<p>白無極哦了一聲，想了一下：「慕容家的人呢？」</p>\n<p>「按照偵查蜥蜴……按照你昨天的判斷，」她改了個說法，默默略過那個奇怪的點，「他們部署在官道彎道，山谷這邊他們沒有人。」</p>\n<p>「因為他們也繞開了這個山谷。」</p>\n<p>「應該是。」</p>\n<p>白無極點了點頭，把視線放到那片山谷的入口方向，遠遠能看到一個低矮的木頭拱門，腐爛了大半，上面長著苔蘚，往裡面是一條石板路，石板縫裡長了草，很多年沒人走過的樣子。</p>\n<p>村子的殘骸若隱若現，幾根斷牆，幾個空窗洞，屋頂早就垮了，木頭爛成黑色，靜靜躺在地上。</p>\n<p>「有人住過的地方，」白無極喃喃，「什麼時候廢掉的？」</p>\n<p>「地圖是七十年前的版本，那時候已經標注為廢村了，」蘇念卿說，「所以至少七十年以上。」</p>\n<p>七十年。</p>\n<p>那就是一隻靈獸在這裡住了七十年，把整個山谷當做自己的地盤，慢慢把所有人的記憶都推開，讓這個地方消失在行人的路線裡。</p>\n<p>白無極默默想了一秒，然後說：「繞路要多走幾天？」</p>\n<p>「繞開這個山谷，往西再走半天，找另一條山路——大概多走兩天。」蘇念卿說，「這兩天，慕容家的人還在等，他們的耐性不會無限。」</p>\n<p>「如果我們兩天後才出現呢？」</p>\n<p>「他們可能重新部署，」她說，「但更可能的是繼續等，因為目前來看，天契城方向的路只有官道和少數幾條山路，他們若是有充足的人手，會同時封鎖幾個出口。」</p>\n<p>白無極嗯了一聲，繼續看那個廢村入口。</p>\n<p>蘇念卿等著他做決定，但心裡大概已經預料到他會說什麼。</p>\n<p>果然，他開口：「繞路要多走兩天，打過去得了。」</p>\n<p>蘇念卿：「那是契王級。」</p>\n<p>「知道。」</p>\n<p>「你知道契王級是什麼概念嗎？」她說，「在天衍大陸，契王級以上的強者寥寥，四大聖家裡，契王以上的人也不超過十個。」</p>\n<p>「那就是很強。」白無極點頭，語氣沒有變。</p>\n<p>「非常強。」</p>\n<p>「嗯。」</p>\n<p>蘇念卿深深看了他一眼：「你說你知道，你是真的知道，還是……」</p>\n<p>「真的知道，」他說，「比蒼雲城那幾個契將強很多倍，」他停頓了一下，「但是——」</p>\n<p>「但是什麼？」</p>\n<p>「但是，如果我說能搞定，那應該能搞定。」</p>\n<p>蘇念卿：「……你這個人，到底是怎麼做到一直這麼……」</p>\n<p>「從容？」白無極接話，嘴角微微翹著。</p>\n<p>「我想說的是『不知死活』。」</p>\n<p>白無極哈地笑出來，沒有生氣，反而更輕鬆：「可能是一樣的東西。」</p>\n<p>蘇念卿閉上嘴，把視線轉向霜翎。</p>\n<p>霜翎坐在她腳邊，銀色的眸子看著白無極，那眼神說不清楚，不是反對，也不是支持，是一種很認真的觀察——牠在評估，在判斷，這個人說能搞定，到底是真的有把握，還是真的不知死活。</p>\n<p>昨天的枯樹，那一點嫩綠，還有那隻突然出現又突然消失的蜥蜴——</p>\n<p>霜翎的耳朵動了動。</p>\n<p>牠選擇相信自己的感知。</p>\n<p>這個人身上有某種東西，不是靈力，不是靈契，但是……很奇異，很強，比牠目前能理解的任何東西都更複雜。</p>\n<p>牠站起身，走到白無極腳邊，在他前面坐下，尾巴輕輕搖了一下。</p>\n<p>白無極低頭看牠，有點意外：「你支持我？」</p>\n<p>霜翎把頭轉開。</p>\n<p>才沒有。</p>\n<p>白無極笑了一下，重新抬起頭：「走吧，進去看看那個契王級是什麼東西。」</p>\n<p>---</p>\n<p>廢村的入口不知道為什麼，走近了有一種說不清的壓迫感。</p>\n<p>不是那種凶戾的、讓人想逃的感覺，更像是——重量。像是有什麼很巨大的東西靜靜坐在前方，不動，但存在感重得像一座山。</p>\n<p>蘇念卿走進入口的時候，腳步微微頓了一下。</p>\n<p>「你沒事吧？」白無極在旁邊問。</p>\n<p>「靈力受到壓制了，」她說，手指輕輕動了動，但靈力波動確實稀薄了不少，「這個領域的覆蓋很廣，從村口就開始了。」</p>\n<p>霜翎落在地上，九條尾巴本能地收緊，那種冰屬性的靈力也被壓縮，光芒變得很暗淡，牠警覺地豎起耳朵，低聲發出一個細小的哼音，不是示威，是告警。</p>\n<p>白無極往前走，感覺了一下。</p>\n<p>沒什麼變化。</p>\n<p>白金之星的存在感完全沒有受到影響，沉穩地站在他後方，黃金體驗也沒有被壓制的感覺，像是那個龐大的靈力領域根本找不到它們的接觸點。</p>\n<p>「這個領域，」白無極說，「會讓靈契打折扣。」</p>\n<p>「是，」蘇念卿說，語氣很平靜，但眼神裡有一絲謹慎，「而你——」</p>\n<p>「我是體契者，正好。」</p>\n<p>蘇念卿說：「你不是體契者嗎，正好。」</p>\n<p>白無極說：「確實，正好。」</p>\n<p>兩個人對了一眼，白無極先笑起來，蘇念卿的嘴角忍了一下，沒有動。</p>\n<p>他們繼續往裡走。</p>\n<p>廢村的格局比想像中大，石板路通向幾條分叉的小道，兩旁是崩塌的屋舍，斷牆上的石頭長了苔蘚，有幾棵樹從廢屋的地基裡長出來，粗壯，顯然已經生長了很多年。</p>\n<p>鳥聲很靜。</p>\n<p>這個地方連鳥都沒有，連蟲鳴都很稀少，就是那種壓抑的、被什麼東西佔據了一切空間的安靜。</p>\n<p>走到村子中央，那裡有一個廢棄的廣場，石板地的縫隙都被草填滿，廣場中間有一口舊井，井邊長了雜草。</p>\n<p>廣場的另一端，是一頭熊。</p>\n<p>不，說熊不夠準確。</p>\n<p>那是一個龐然大物。</p>\n<p>身軀像小山，毛色深棕夾雜著黑，每根毛的末端有淡淡的靈力光澤，那不是普通的顏色，是被靈力長期滲透之後的特有光芒。四隻腳各有臉盆大小，爪子陷在石板地裡，不是壓下去的，是那石板地根本沒辦法承受牠的重量，慢慢凹下去了，像是黏土被按了印。</p>\n<p>山嶽熊。</p>\n<p>牠正在睡覺，巨大的胸腔一起一伏，呼吸聲低沉如雷，每一次吐氣，廢村裡的草葉都輕輕抖動一下。</p>\n<p>白無極站在廣場邊緣，仰著頭看那頭熊，沉默了片刻，然後說：</p>\n<p>「挺大的。」</p>\n<p>蘇念卿站在他旁邊，臉色保持著平靜，但握住霜翎的手微微收緊了一下：「那是契王級的山嶽熊。」</p>\n<p>「嗯，看起來是。」</p>\n<p>「……你打算怎麼辦？」</p>\n<p>「打。」</p>\n<p>「白無極，」她壓低聲音，「它現在在睡覺，我們繞開走——」</p>\n<p>「繞不開，」他說，「你看這個廣場，這個熊的領域，我估計整個山谷它都有感應，我們在村口的時候牠就知道我們進來了，牠只是……懶得動。」</p>\n<p>蘇念卿眼神微縮，霜翎的耳朵豎了起來。</p>\n<p>就在這時，那頭山嶽熊睜開了眼睛。</p>\n<p>眼睛是琥珀色的，充滿了一種深沉的靈智，不是野獸的茫然，是某種年老的、見過很多事情的清醒。</p>\n<p>牠看了白無極一眼，又看了蘇念卿一眼，然後翻了個身，緩緩站起來。</p>\n<p>站起來的過程，地板震動了一下。</p>\n<p>白無極沒有退，腳步穩穩地站在原地，把活動了一下頸椎。</p>\n<p>頸椎發出幾聲清脆的響聲。</p>\n<p>山嶽熊低頭看他，那個俯視的角度相差了大概兩個人的高度。</p>\n<p>白無極回看牠，神情很自然：「大哥，不是要打擾你，就是借個路，你看可以嗎？」</p>\n<p>山嶽熊沒有說話，這個世界的魔獸基本不會人語，但那個琥珀色的眼睛裡有很明顯的回應——答案很顯然是不可以。</p>\n<p>一股巨大的靈力壓迫感從牠的身上散出來，把廢村的空氣壓得厚重，蘇念卿的靈力受壓，霜翎本能地後退了半步。</p>\n<p>白無極仰著頭，感受了一下，那股壓迫感確實很重，但對他來說，就像站在風裡——有感覺，但吹不走。</p>\n<p>他嘆了口氣：「行，打就打吧。」</p>"}, {"title": "第45章_契王級魔獸", "content": "<p>第45章　契王級魔獸</p>\n<p>山嶽熊的靈力領域擴張了。</p>\n<p>這不是直觀看到的東西，但感受得到——廢村的空氣本來就有壓迫感，但這一刻忽然像是升了一個量級，那種無形的重量從四面八方壓過來，把整個山谷罩住，像一隻無形的巨手輕輕扣在頭頂。</p>\n<p>蘇念卿感覺到了。</p>\n<p>不是疼，是靈力被截斷的那種感覺，像是一條水管被捏住，流出來的水突然細了一半，她嘗試溝通霜翎，靈力牽引的反應明顯遲鈍，霜翎在她身邊，九條尾巴緊緊收斂，冰藍色的靈力光芒縮得很小，低聲發出一個警示的音。</p>\n<p>「靈契受到壓制。」蘇念卿說，語氣很平靜，但那個平靜裡有非常細的一絲緊張，「在這個領域裡，我和霜翎的戰力只剩六成左右。」</p>\n<p>「知道，」白無極說，「你們後退，這段我來。」</p>\n<p>蘇念卿沒有反駁，因為在這個領域裡爭辯的成本太高——她若是強行動用靈術，靈力消耗會是正常情況的兩倍，打一場契王級的戰鬥本就是勉強，在領域壓制下強撐只會更快耗盡。</p>\n<p>她退了幾步，拉著霜翎，退到廢村入口方向的一截斷牆後面。</p>\n<p>霜翎在她腳邊，眼神看著白無極。</p>\n<p>白無極站在廣場中央，看著那頭山嶽熊。</p>\n<p>這是他第一次正面面對一個這個量級的對手。</p>\n<p>在蒼雲城打陳家的三個契將，那是三打一，情況確實危急，但陳家的三個契將是人，人有破綻，人有心理，有膽怯，白無極打人的經驗很多，知道怎麼拆解。</p>\n<p>但眼前這個，是一隻佔據了這片山谷七十年的老魔獸。</p>\n<p>牠沒有心理戰術，沒有策略，就是純粹的力量和靈力積累，簡單，純粹，但是——</p>\n<p>非常重。</p>\n<p>山嶽熊往前踏了一步，地板又震動了一下。</p>\n<p>白無極深吸一口氣，把肩膀下沉，整個人的重心降了降，這是八極拳站樁的基礎——紮根，穩住，在對方的氣勢裡找到自己的立腳點。</p>\n<p>「白金之星，」他在心裡說，「試試看。」</p>\n<p>白金之星的光芒在他身後展開，星空色的鎧甲在光線裡沉默地亮著，那雙拳握緊，沉默，等待。</p>\n<p>白無極動了。</p>\n<p>不是衝，是走，穩穩的，腳跟先落地，前腳掌緊隨，這是八極拳的趨步，步小勁短，能隨時調整，也能隨時爆發。</p>\n<p>白金之星跟著他的意念同步，往前衝。</p>\n<p>速度。</p>\n<p>那是白金之星最大的優勢，極高的移動速度，在視線追蹤的極限之外，從廣場中央衝到山嶽熊的右前肢，一拳轟在熊腿上。</p>\n<p>衝擊波炸開，石板地的碎片飛濺，周圍的草葉和枯木被氣浪掃開。</p>\n<p>白無極等待著結果。</p>\n<p>然後他皺起眉頭。</p>\n<p>山嶽熊的右前肢，那個被白金之星打中的位置，毛皮稍微壓下去了一點，然後彈回來，像是打在了很厚的橡皮上，那頭熊低頭看了一眼那個位置，表情……很難描述，就是那種「有什麼東西碰了我一下」的茫然。</p>\n<p>沒有傷。</p>\n<p>白金之星的拳頭打進去，一半力道被那層異常厚實的皮膚吸收了。</p>\n<p>白無極馬上讓白金之星連續出拳，第二拳、第三拳、第四拳，目標換成熊的腹部側面，那裡應該是肉最多、皮最薄的區域，打出去的每一拳都帶著爆炸性的衝擊波，廢村的斷牆在氣浪裡開始崩落，揚起灰塵。</p>\n<p>山嶽熊站在那裡，被打中了幾下，毛皮壓下去，彈回來，壓下去，彈回來。</p>\n<p>牠抬起右前肢，往白無極的方向拍下來。</p>\n<p>那一拍很慢，相對於白金之星的速度，簡直像是停著不動，但那個動作帶出來的靈力波動是實質性的，像一面牆橫掃過來，白無極側步讓開，但那股氣浪還是把他推了半步。</p>\n<p>白無極站穩，再試。</p>\n<p>這次讓白金之星去找頸部，那個位置皮膚相對薄一點，而且靠近頭部，對神經的衝擊會更大，也許可以通過震盪讓牠感到不適。</p>\n<p>白金之星的拳頭打在熊的頸部——</p>\n<p>這次有效果，山嶽熊哼了一聲，頭輕輕晃了一下，但也就只是這樣，沒有真正的傷害。</p>\n<p>白無極退開，讓白金之星停下來，站在廢村廣場的另一端，看著那頭熊。</p>\n<p>他試著讓黃金體驗上去，讓那道金色的光觸碰山嶽熊的皮膚。</p>\n<p>但是一碰到熊的身體，那股金色的光就像被什麼東西頂回來，靈力排斥，山嶽熊身上的靈力場在本能地抵制任何外來的干涉，黃金體驗被推開了。</p>\n<p>兩個替身都找不到突破口。</p>\n<p>白無極皺緊眉頭，退開，思考。</p>\n<p>山嶽熊低頭看著他，那個琥珀色的眼睛裡有一種……很奇特的東西，說不上是輕視，更像是在觀察一個奇怪的存在——這個東西在對牠造成一點點傷害，但它是什麼，牠完全看不懂。</p>\n<p>蘇念卿在斷牆後面，看著這一切。</p>\n<p>她看不見白金之星，也看不見黃金體驗，她看到的是白無極在廣場中央時不時閃動位置，然後那頭熊身上出現衝擊波的效果，但山嶽熊屹立不動。</p>\n<p>她的神情繃緊了。</p>\n<p>霜翎也感覺到了，把身體往她腳邊靠了靠，尾巴捲起來，但眼睛一直盯著白無極。</p>\n<p>白無極站在那裡，沒有慌，但在認真地想。</p>\n<p>他仰頭看了一眼那頭熊，然後把視線移向熊的腳下。</p>\n<p>那四隻大腳，陷在石板地的凹陷裡，像四根粗柱子插在地上。</p>\n<p>他忽然想到什麼。</p>\n<p>「黃金體驗碰不到牠，」他在心裡說，「但我沒試過對牠腳下的地面。」</p>"}, {"title": "第46章_苦戰", "content": "<p>第46章　苦戰</p>\n<p>山嶽熊邁步走向白無極。</p>\n<p>每一步，石板地都會留下一個新的壓痕，廢村的廣場在這頭龐然大物的腳下一點點破碎，裂縫從腳印往四周延伸，像是地面都在表達抗議。</p>\n<p>白無極沒有退。</p>\n<p>他站在那裡，感受著山嶽熊帶來的靈力壓迫，就像站在暴風眼外圍，風壓很重，但中心是靜的，只要找到那個靜，就能站得住。</p>\n<p>這是他練八極拳十幾年裡悟出來的東西，不是技術層面的，是更底層的——人在面對遠超自己的力量時，第一反應是後退，第二反應是崩潰，但還有第三種選擇：站穩，想清楚，然後找那個力量的縫隙。</p>\n<p>山嶽熊走到白無極面前三步的距離，停下來。</p>\n<p>牠俯視著他，那個琥珀色的眼睛裡有一種老獸特有的沉靜，不急，不怒，就是這裡是牠的地盤，不走，那就打。</p>\n<p>白無極先說了：「大哥，我沒有惡意，就是借個路，你讓我過就行了。」</p>\n<p>山嶽熊沒有動。</p>\n<p>「行，那我就當你說不行了。」</p>\n<p>白無極往後退了一步，把左腳踏實，右腳跟上，雙手放在腰側，這是八極拳的起手式，紮根，沉腰，把重心壓到最低，然後——</p>\n<p>他不動了。</p>\n<p>他只是讓白金之星動。</p>\n<p>白金之星在他身後爆發，速度急劇加快，從廢村廣場的這一端到那一端不到一秒，從不同角度猛轟山嶽熊的側腹、後腿、頸部後側，每一拳都帶著最大限度的衝擊，爆炸聲此起彼伏，廢村的斷牆在氣浪裡嘩嘩往下掉，揚起的灰塵把廣場遮了半截。</p>\n<p>山嶽熊在衝擊裡毛皮壓下去，彈起，壓下去，彈起。</p>\n<p>牠皺了皺鼻子，抬起前肢，往側面拍出去。</p>\n<p>那一拍打在空氣裡——白金之星已經移開了。但山嶽熊的反應速度很快，比起那個龐大的身軀，牠的靈覺異常靈敏，雖然看不見白金之星，但牠能感知到攻擊落點的靈力紊亂，開始預判位置。</p>\n<p>第二拍打下來，白金之星側閃，但被氣浪掃中，那股衝擊透過意識牽引傳回來，白無極感覺到了，像是被什麼重物在空中扇了一下，不是直接的身體衝擊，但意識上的衝擊感相當真實，他腳步微晃，迅速穩住。</p>\n<p>「這個熊學習能力很強。」他在心裡說。</p>\n<p>白金之星連續換了七個攻擊角度，全力出拳，每一拳的衝擊波都足以打穿一面石牆，但山嶽熊的皮膚就是吸收，吸收，吸收，那個異乎尋常厚實的皮膚和皮下的靈力層，把白金之星的力量消解了大半。</p>\n<p>白無極讓白金之星退開，站在廣場另一側，喘了口氣。</p>\n<p>不是真正的喘氣，替身不會疲憊，但是——意志消耗。</p>\n<p>連續的高強度攻擊之後，意志力和注意力確實在緩慢下降，白金之星的攻擊是通過白無極的意志驅動的，意志不夠清晰，攻擊的精準度就下降。</p>\n<p>他把這個問題壓住，讓自己重新冷靜。</p>\n<p>山嶽熊轉過身，繼續看著他所站的方向——牠仍然看不見白金之星，但牠能感知到白無極，把白無極當做攻擊源頭。</p>\n<p>這其實是一個優勢。</p>\n<p>白無極忽然意識到，只要白金之星從遠端攻擊，山嶽熊的注意力就在他這裡，而他只要站著不動，山嶽熊就只是在對著一個站著不動的人感到困惑。</p>\n<p>但是困惑解決不了問題，打不進去才是核心困難。</p>\n<p>他再試了一次黃金體驗——這次不是接觸山嶽熊的身體，而是試著去接觸牠身上的毛。</p>\n<p>毛不是皮膚，也許靈力排斥的強度不一樣。</p>\n<p>黃金體驗的金色光芒輕輕伸出去，觸碰了那根最靠近的粗糙熊毛。</p>\n<p>瞬間被彈開。</p>\n<p>連毛都有靈力層保護。</p>\n<p>白無極把黃金體驗收回來，站在那裡，眉頭皺得很深。</p>\n<p>蘇念卿在斷牆後面，觀察著白無極的狀態，她看不見那些隱形的攻擊，但她能看到山嶽熊身上偶爾出現的衝擊效果，以及白無極的反應——</p>\n<p>那個人到目前為止連動都沒動一下，只是站在廣場中央，但山嶽熊身上的毛皮明顯在反覆受到衝擊，這說明確實有什麼在打，而且打得不少，但效果有限。</p>\n<p>她輕輕攏住霜翎：「他遇到麻煩了。」</p>\n<p>霜翎把耳朵壓低，眼睛緊緊盯著白無極，尾巴微微顫動。</p>\n<p>白無極深呼吸了一下，繼續讓白金之星猛攻山嶽熊的頸部後側，那個位置打了十幾拳，山嶽熊終於發出一聲不滿的低吼，往後退了半步——不是被打傷，而是頸部被衝擊波持續刺激感到煩躁。</p>\n<p>但也就只是退了半步。</p>\n<p>牠隨即蹲低身體，像是在準備某個動作，那個琥珀色的眼睛裡有了真正的怒意。</p>\n<p>白無極看著那頭蹲下來的熊，突然意識到牠在做什麼。</p>\n<p>「它要用領域能力。」</p>\n<p>果然，下一秒，山嶽熊的身體開始發出一種低頻的震動，那不是聲音，是靈力頻率，從牠的身體往外擴散，把廢村的空氣壓得更重、更沉，那種沉重感一層一層疊加——</p>\n<p>蘇念卿感覺到了，頭輕輕疼了一下，不嚴重，但是靈力被壓制的程度更深，她抱住霜翎，霜翎在她懷裡顫了一下，那冰藍色的靈力光芒縮得幾乎看不見了。</p>\n<p>白無極感受到那股壓力，它確實存在，但對他的影響很有限——白金之星和黃金體驗不是靈契，那個靈力壓制找不到它們的接觸面，就像試圖擠壓一個空袋子。</p>\n<p>但他還是感覺到了壓力——不是靈力層面的，是物理層面的，那股從山嶽熊身上散出來的頻率，在影響著周圍的空氣密度，讓石板地微微震動，讓廢村的廢牆開始加速崩落。</p>\n<p>這個場地快支撐不住了。</p>\n<p>白無極後退了幾步，把那個壓迫感打量了一下，然後視線落在山嶽熊的腳下。</p>\n<p>他已經想到一個辦法了，但需要一點時間。</p>\n<p>問題是，山嶽熊給不給他這個時間。</p>\n<p>他讓白金之星重新衝上去，繼續狂轟，不求傷害，只求把山嶽熊的注意力吸引在那個方向，讓牠暫時不要把注意力放在地面。</p>\n<p>山嶽熊被持續拳打，終於真的發怒了，低吼聲震動了整個山谷，那個聲音帶著真實的靈力波動，把廢村剩下的幾面斷牆震得嘩嘩往下掉。</p>\n<p>白無極站在原地，讓白金之星繼續分散山嶽熊的注意力，同時，悄悄讓黃金體驗往下，朝著地面延伸。</p>\n<p>地面。</p>\n<p>岩石。</p>\n<p>不是熊的身體，但是，是熊的腳下。</p>"}, {"title": "第47章_黃金體驗的妙手", "content": "<p>第47章　黃金體驗的妙手</p>\n<p>黃金體驗的光，沿著廢村的地面蔓延。</p>\n<p>這個動作非常緩慢，非常細微，細到就像一條細絲從白無極腳下悄悄爬過去，走地面的縫隙，走石板和石板之間的間隙，不碰山嶽熊的身體，不觸發牠身上的靈力排斥——只是地面，只是那幾塊被熊的爪子壓著的岩石。</p>\n<p>白金之星繼續在山嶽熊的上半身猛打，廢村的空氣裡充斥著爆炸的轟鳴聲，山嶽熊被持續的衝擊刺激，全部注意力都集中在那些看不見的攻擊源頭上，低頭甩頭試圖追蹤，琥珀色的眼睛裡有真實的怒意燃燒。</p>\n<p>趁這個機會，黃金體驗悄悄摸到了那塊岩石。</p>\n<p>一塊岩石，很普通，灰棕色，表面被長期踩踏磨得光滑，上面壓著山嶽熊的右前肢，那根臉盆大的爪子深深嵌在岩石的表面。</p>\n<p>黃金體驗接觸到了它。</p>\n<p>沒有排斥。</p>\n<p>岩石不是靈獸，沒有靈力屏障，那道金色的光順順當當地滲了進去。</p>\n<p>白無極感覺到了這個接觸，他呼了口氣，開始認真地讓黃金體驗去作用。</p>\n<p>岩石開始從內部變化。</p>\n<p>這個過程很細微，岩石的礦物結構在黃金體驗的影響下開始轉化，從無機到有機，從固態岩石到——先是縫隙，然後縫隙裡長出纖維，纖維越來越多，越來越粗，然後形狀開始明確——</p>\n<p>根系。</p>\n<p>像樹根一樣的東西，從岩石裡緩緩伸出，細長，柔韌，但密集，數量越來越多，開始往山嶽熊的爪子外側延伸。</p>\n<p>白無極暗暗把注意力分成兩半：一半繼續驅動白金之星在山嶽熊上半身猛打；一半放在黃金體驗上，引導那些根系的生長方向。</p>\n<p>根系從第一塊岩石蔓延到第二塊。</p>\n<p>然後是熊的後肢下方的岩石，然後是左前肢。</p>\n<p>這個過程花了大概兩分鐘。</p>\n<p>兩分鐘裡，白金之星打了不知道多少拳，廢村的廣場已經幾乎被夷平，斷牆全倒了，石板地被氣浪掃成了碎片，滿地的塵土和碎石。</p>\n<p>山嶽熊的身上沒有傷，但牠被反覆刺激，怒意越來越重，已經在準備使出一個更大的靈力技能，白無極能感覺到牠身上靈力的積蓄，那種蓄積感就像暴風雨前的氣壓變化。</p>\n<p>快了。</p>\n<p>再慢一點，山嶽熊的靈技爆發，局面就控制不住了。</p>\n<p>白無極深吸一口氣，把所有注意力放在黃金體驗上，引導那些根系開始——</p>\n<p>收縮。</p>\n<p>不是繼續生長，而是往內收，往山嶽熊的爪子方向包裹，然後——</p>\n<p>泥沼化。</p>\n<p>岩石、根系、碎石、地面的黏土，在黃金體驗的作用下，整體開始泥沼化，那個過程就像石頭地在一瞬間變成了沼澤地，黏稠，下陷，從固體變成半固體，山嶽熊的四隻腳從岩石縫隙開始，慢慢被那個黏稠的東西包住，往下陷。</p>\n<p>不是真的泥沼，是岩石和有機物的混合轉化物，比泥沼更有韌性，比鐵鍊更能貼合不規則的形狀，它不是捆住爪子，而是像橡膠一樣從四面八方把那四隻大腳包裹進去，越掙越緊，越往上拔越陷越深。</p>\n<p>山嶽熊察覺到了。</p>\n<p>牠試圖往上拔起右前肢，那個動作把地面拉扯出一個碗狀的凹陷，但爪子只提起了三寸，就被那個有機黏性物質往下拽，沒有完全脫出來，它強行繼續提，周圍的地面跟著鼓起，卻沒有斷開。</p>\n<p>四隻腳全部被困住。</p>\n<p>山嶽熊暴怒，低吼聲把剩下的廢牆碎石都震碎，那股積蓄的靈技衝動往上湧，想要散出來。</p>\n<p>但是四肢被困，站立不穩，靈力的積蓄被分散到維持平衡上，靈技的聚集被強制打斷。</p>\n<p>白無極看著那頭困在自己設下的泥沼裡的山嶽熊，慢慢呼了口氣。</p>\n<p>「好，」他說，「現在牠不會跑了。」</p>\n<p>他頓了頓，看向那個靈核的位置。</p>\n<p>每個強靈獸都有靈核，是靈力的凝聚點，也是最致命的弱點，但通常保護得很好，周身靈力環繞，位置也不會暴露在外部。</p>\n<p>白無極盯著山嶽熊的頸部看了幾秒。</p>\n<p>頸部後側，靠近枕骨的位置，那裡的毛色比其他地方深一點，有一個微微突起的輪廓——那個突起在普通光線下根本看不出來，但白無極在白金之星連續打擊頸部的過程裡，注意到每次命中那個位置，山嶽熊的反應比其他位置更大，哪怕透過厚實的皮膚大半力道都被吸收，那個位置也能讓牠頭輕微晃動。</p>\n<p>靈核的位置，通常是振動感最強的地方。</p>\n<p>「那裡，」他在心裡說，「頸部後側，枕骨下方，往左三寸。」</p>\n<p>白金之星的拳頭握緊。</p>\n<p>蘇念卿在斷牆廢墟後面站起身，她看到了——山嶽熊被什麼困住了，四隻大腳陷在地面裡動彈不得，那個地面明顯異常，不是正常的岩石地，是某種奇怪的有機物把那四隻腳包起來，山嶽熊在暴怒地掙扎，但移動不了。</p>\n<p>她不知道那個東西是怎麼來的。</p>\n<p>她沒有見到任何靈術，沒有陣旗，沒有靈符，白無極從頭到尾就站在廣場另一端，沒有動——</p>\n<p>但是，那個困獸的泥沼是真實存在的。</p>\n<p>「……」蘇念卿看了白無極一眼，那種說不清楚的感覺又浮上來，這個人到底有什麼她看不見的東西？</p>\n<p>霜翎在她身邊，豎起耳朵，九條尾巴緩緩展開，冰藍色的靈力在壓制的環境裡重新燃起了一點，雖然仍然很微弱，但那尾巴展開的姿態——不是戰鬥，是某種被觸動的、說不清楚的響應。</p>\n<p>牠看著白無極，那個眼神裡有某種東西又加深了一層。</p>\n<p>白無極沒空注意她們，他的全部注意力都在山嶽熊那個靈核位置上。</p>\n<p>「白金之星，」他在心裡說，「全力，一拳。」</p>\n<p>白金之星在他身後凝聚。</p>\n<p>那個凝聚的過程有幾秒鐘，白無極感覺到那股力量在積蓄，像彈弓被拉到最緊的狀態，繃，再繃，繃到臨界點——</p>\n<p>等。</p>\n<p>等什麼？</p>\n<p>等山嶽熊的靈力防禦在掙脫束縛的消耗裡出現一個缺口。</p>\n<p>他很耐心，就站在那裡，看著那頭熊掙扎，看著那四隻大腳一次次往上拔，一次次被拽回去，看著山嶽熊的靈力在這個反覆消耗裡慢慢出現波動，那個積蓄在頸部靈核位置的靈力防護，開始出現周期性的振盪——</p>\n<p>每次掙脫動作後的瞬間，靈核防護的密度降低一點，然後恢復，降低，恢復。</p>\n<p>那個降低的瞬間，非常短，大概零點幾秒。</p>\n<p>夠了。</p>\n<p>「現在。」</p>\n<p>白金之星爆發，速度越過了白無極自己的感知極限，在他眼睛意識到移動之前，那個力量已經衝出去了，越過廢村廣場，從正面繞到山嶽熊的頸部後側，找準了那個靈核上靈力防護剛剛出現波動的瞬間——</p>\n<p>一拳，轟在頸部後側枕骨下方的靈核位置。</p>\n<p>爆炸。</p>\n<p>不是聲音，是靈力爆炸，從那個位置往外衝出一個圓形的衝擊波，把山嶽熊身上所有的靈力屏障撕裂，那道衝擊波順著脊椎往下傳導，把整個軀幹的靈力層震散，白色的靈力從熊的全身迸出，像是被擊破的光球四散開去。</p>\n<p>山嶽熊哀嚎了一聲。</p>\n<p>那個聲音非常巨大，把整個山谷的回聲都震動起來，鳥從遠處的樹林裡紛紛飛起，天空一瞬間充滿了扑翅聲。</p>\n<p>然後，那頭龐然大物，慢慢，倒下去了。</p>\n<p>地面震動了一下，又一下。</p>\n<p>塵土揚起，散開，廢村的廣場安靜了。</p>"}, {"title": "第48章_擊殺契王級魔獸", "content": "<p>第48章　擊殺契王級魔獸</p>\n<p>塵土落定的過程持續了大概十秒鐘。</p>\n<p>山嶽熊側躺在廢村廣場，那個龐大的身軀在倒下之後佔去了廣場幾乎一半的面積，胸腔起伏，但已經很微弱，每一次呼吸都越來越淺，靈力從牠身上一點一點地消散，那個被擊破的靈核位置有一道淡淡的光往外洩，像是燈燃到底了。</p>\n<p>白無極站在廣場中央，看著倒下的熊，沉默了片刻。</p>\n<p>他有點感謝這頭熊，不是諷刺的那種，是真的——這頭熊讓他第一次知道白金之星打不穿的對手是什麼感覺，讓他第一次認真在戰鬥裡想策略，而不是靠速度和力量硬吃。</p>\n<p>也讓黃金體驗第一次在戰鬥裡起到決定性的作用。</p>\n<p>他心裡默默說了句對不起，大哥，是我打擾你了。</p>\n<p>腳步聲從後方傳來，是蘇念卿走過來。</p>\n<p>霜翎走在她前方半步，三角形的耳朵豎著，眼睛高度警戒，靠近倒下的山嶽熊時，腳步放得很輕，鼻子抽了抽，確認那股靈力確實在消散，威脅解除。</p>\n<p>牠走到山嶽熊的胸口位置，低頭嗅了嗅，那裡有靈力散出的氣息，是某種白無極不太熟悉的味道，有點像松樹，但更沉一些。</p>\n<p>蘇念卿在山嶽熊旁邊站住，仰頭看著這個龐然大物，沉默了很久。</p>\n<p>她在做評估。</p>\n<p>契王級，這是一個真實的契王級魔獸，不是普通的契王——山嶽熊這個品種本身就以強大的防禦和靈力壓制聞名，在契王級裡屬於中等偏上的存在。正常交戰，兩個頂級契王級的靈契師聯手，才有把握確保擊殺，而且過程必然損傷慘重。</p>\n<p>然而眼前——白無極一個人，在她和霜翎幫不上什麼忙的情況下，獨自完成了這件事。</p>\n<p>而且在她看來，這個過程……裡面有很多她看不懂的地方。</p>\n<p>白無極沒有使用任何她能識別的靈術，沒有靈符，沒有陣旗，沒有靈契顯化，但山嶽熊的身上出現了真實的攻擊效果，牠的腳下出現了那個奇異的有機束縛物，牠的靈核被精準打擊。</p>\n<p>每一個環節，都是按照某種嚴密的邏輯推進的，不是蠻力，是策略——先用攻擊消耗牠的靈力，再用束縛固定牠的移動，再等靈核防護出現破口，最後一擊。</p>\n<p>這個流程，比她在任何戰鬥教材裡學過的都更貼合那頭熊的弱點。</p>\n<p>「你是怎麼找到靈核位置的。」</p>\n<p>她問出口的時候，聲音比平常低了一點，帶著某種認真的探究。</p>\n<p>白無極轉頭看她：「猜的。」</p>\n<p>蘇念卿：「……」</p>\n<p>她深吸了口氣，把到嘴邊的「靈核位置需要結合靈獸構造學和靈力感知才能精確定位，不是靠猜的」這句話，慢慢地，一個字一個字，嚥下去。</p>\n<p>「你這個人，到底有多少東西在猜？」</p>\n<p>白無極聳了聳肩：「很多。」</p>\n<p>「那你猜得很準。」</p>\n<p>「我也覺得，」他說，「可能天賦不錯。」</p>\n<p>蘇念卿盯著他看了三秒，那個眼神裡有一種很複雜的情緒，說不清楚，有懷疑，有無奈，有某種在她平日極其冷淡的表情下面細細埋著的——好奇。</p>\n<p>不是那種普通的「這個人挺有趣」的好奇，是那種「這個人身後有什麼我完全不了解的東西」的好奇，那個東西像一個沒有入口的房間，她一直在門外走，繞，找，但就是找不到把手。</p>\n<p>她最後什麼都沒說，把視線移開。</p>\n<p>就在這時，霜翎動了。</p>\n<p>牠繞著山嶽熊的身體走了半圈，在那頭熊的頸部後側停下來，那個靈核被擊破的位置，還有一道淡淡的白光在往外洩，霜翎低頭嗅了嗅，然後——往後退了幾步，回頭看白無極。</p>\n<p>不是警戒，不是示威。</p>\n<p>那個眼神是……評估，結束了，白旗？不，不完全是，更像是某種非常複雜的重新定位。</p>\n<p>霜翎站在那裡，看著白無極，尾巴動了一下。</p>\n<p>九條尾巴，之前一直是收緊的，在這個廢村裡一直保持著本能的警覺縮攏，但這一刻，牠的尾巴輕輕展開了，不是全展，但比之前任何時候都更自然、更鬆弛地垂著。</p>\n<p>白無極對牠眨了眨眼。</p>\n<p>霜翎把頭轉開，走回蘇念卿身邊，坐下，假裝很淡定地梳理了一下尾巴上的毛。</p>\n<p>但是那九條尾巴，仍然是展開的。</p>\n<p>蘇念卿低頭看了牠一眼，沒有說話，但眼神裡有一點說不清楚的東西，很淡，一閃即逝。</p>\n<p>白無極把倒下的山嶽熊看了最後一眼，拍了拍手掌上的灰：「行，走吧，路還很長。」</p>\n<p>蘇念卿說：「等一下。」</p>\n<p>她蹲下來，從腰間的錦囊裡取出一個小小的玉瓶，走到山嶽熊的靈核位置旁邊，用一個細小的靈力術法，把那道仍在外洩的靈力引導了一小部分進玉瓶，瓶口封好，站起身。</p>\n<p>白無極看著她那個動作：「你這是在做什麼？」</p>\n<p>「靈核碎片，」蘇念卿把玉瓶收好，「即使靈核已經破碎，裡面的靈力結晶仍然有用，可以作為靈藥材料，也可以作為靈符原料。」她頓了頓，「能得到契王級的靈核碎片，很難得。」</p>\n<p>「所以你是在割韭菜。」</p>\n<p>蘇念卿：「……我在合理利用戰鬥遺留物資。」</p>\n<p>「和割韭菜是一樣的。」</p>\n<p>「……」</p>\n<p>「好了好了，收起來，走了。」</p>\n<p>---</p>\n<p>出了廢村，重新回到山路上，空氣比山谷裡輕了很多，那種被靈力壓著的重量感消散，蘇念卿輕輕呼了口氣，霜翎跳上她的肩膀，九條尾巴在陽光裡展開，冰藍色的靈力慢慢恢復，在毛尖跳動，像一簇一簇小火焰。</p>\n<p>白無極走在前面，步伐和平時一樣穩。</p>\n<p>蘇念卿走在後方，觀察了他一會兒，問：「你有沒有受傷？」</p>\n<p>「沒有，」他說，「我基本上沒怎麼動。」</p>\n<p>「……我知道你沒動，但——」她頓了頓，「那頭熊的靈力壓制，對你真的完全沒有影響？」</p>\n<p>「幾乎沒有。」</p>\n<p>「為什麼？」</p>\n<p>白無極想了一下，該怎麼說：「因為我的……打東西的方式，和你們的靈契不一樣，牠的壓制是針對靈契的，不針對我，所以對我影響不大。」</p>\n<p>蘇念卿沉默了一會兒：「體契者的原理是這樣的？」</p>\n<p>「大概。」</p>\n<p>「那如果遇到針對肉體的壓制呢？」</p>\n<p>「那我就麻煩了，」他很坦誠地說，「所以不能全靠蠻幹，要動腦子。」</p>\n<p>蘇念卿聽到「動腦子」，想起了那個泥沼束縛，沒有繼續問，沉默地走了一段，然後說：「你方才說你動腦子——那個束縛山嶽熊的東西，是你做的。」</p>\n<p>這不是問句，是陳述。</p>\n<p>白無極沒有否認：「嗯。」</p>\n<p>「怎麼做的？」</p>\n<p>「猜的。」</p>\n<p>蘇念卿：「……你說你動腦子，然後告訴我是猜的。」</p>\n<p>「猜也是腦子的一種。」</p>\n<p>「………………」</p>\n<p>霜翎從蘇念卿肩頭回頭看了白無極一眼，那個眼神裡有某種奇怪的東西，如果讓白無極來翻譯，他覺得大概是：你這個人，說謊很沒誠意。</p>\n<p>但霜翎也沒有揭穿他，只是把頭轉回去，繼續看前方的路。</p>\n<p>蘇念卿放棄追問，走了一段，換了個話題：「過了這個山坡，再走半日，就能繞回官道，在慕容家埋伏點的後方出現。」</p>\n<p>「好，」白無極說，「到了再說。」</p>\n<p>「你已經決定要打？」</p>\n<p>「慕容家的人在前面等，不打他們，他們會一路跟著，」白無極說，「趁現在他們還以為我們沒發現，打他們一個措手不及。」</p>\n<p>蘇念卿思考了一下：「……行，我同意。」</p>\n<p>白無極偏頭看她：「今天算你主動同意的，先記上。」</p>\n<p>蘇念卿：「記什麼？」</p>\n<p>「就是想說，你很好說話。」</p>\n<p>「……我是就事論事。」</p>\n<p>「我知道，但還是值得表揚。」</p>\n<p>蘇念卿把視線轉向前方，沒有回應，但嘴角的弧度——非常非常細微地，動了一下，像是有什麼差一點就笑出來，但被她壓了回去。</p>\n<p>霜翎坐在她肩頭，從這個角度，清清楚楚地看見了主人那個極其微小的表情變化。</p>\n<p>牠把頭輕輕偏了偏，看向白無極的背影，再看蘇念卿，再看白無極。</p>\n<p>然後，非常安靜地，把九條尾巴收了一條，換了個更舒服的姿勢，繼續窩在蘇念卿肩頭。</p>"}, {"title": "第49章_精神金球再次共鳴", "content": "<p>第49章　精神金球再次共鳴</p>\n<p>他們在日落前繞回了官道。</p>\n<p>繞回的位置，在慕容家埋伏點後方大概兩里，官道在那裡有一個緩坡，坡頂有幾棵稀疏的矮樹，能看到前後方向，是個不錯的觀察點。</p>\n<p>白無極在坡頂站了一下，往前看了看，那片埋伏的樹林就在下坡方向，距離可以感知，但夜色還沒完全落下，動手的時機不對。</p>\n<p>「今晚紮營，明早動手？」他問。</p>\n<p>蘇念卿點頭：「天亮前一個時辰，是人最容易出現放鬆的時段，巡守會鬆懈。」</p>\n<p>「好，那今晚好好休息。」</p>\n<p>他把背包丟下，找了個背風的地方，熟練地開始生火。</p>\n<p>但是這一晚，他有點心不在焉。</p>\n<p>從下午繞山路到現在，他一直感覺到腦袋後方有什麼在動——不是頭痛，不是疼，更像是某個沉睡很久的東西，有一部分被什麼碰了一下，那個被碰到的部分在輕輕振動，像是老鐘的鐘舌被彈了一下，聲音很小，但餘震在延續。</p>\n<p>那個地方，是精神金球所在的位置。</p>\n<p>在他剛穿越過來的時候，腦海深處有一個金色的球，他一開始以為那是什麼穿越者的意識殘留，後來才搞清楚，那是白金之星和黃金體驗誕生的地方，是他和兩個替身連結的核心點。</p>\n<p>從穿越到現在，那個金球基本上沒有太大變化，白金之星和黃金體驗從裡面出來了，他能使用這兩個替身，金球的作用就算完成了大半，剩下的部分就一直靜靜待在那裡。</p>\n<p>但現在，它在動。</p>\n<p>不是孵化出第三個替身——那種感覺他估計會更劇烈，更明確，這種振動是另一種性質的，更像是某個結構在鬆動，某個連結在加深。</p>\n<p>白無極把火生好，坐下來，試著往內感知。</p>\n<p>黃金體驗的光立刻回應了，那道金色的光芒在他的意識裡微微亮了一下，像是一盞燈聽到了叫聲，把燈芯調高一點。</p>\n<p>然後白金之星也響應，那個星空色的存在感更凝實，更清晰，像是一直在背景裡的低音忽然多了幾個頻率。</p>\n<p>兩個替身同時回應，同時加深連結感——這種感覺，他之前從來沒有過。</p>\n<p>他在意識裡往那個金球看去。</p>\n<p>金球還在，尺寸看起來沒有變化，但表面有些不同——之前是均勻的金色光澤，現在，表面有幾道非常細的光線在流動，就像玻璃球裡有什麼液體在轉動，那個流動非常緩慢，但是持續的，不間斷。</p>\n<p>白無極盯著那個流動的光線看了一會兒，腦子裡在想，這是什麼？進化前兆？等級提升？還是什麼他還沒理解的機制？</p>\n<p>他在這個世界沒有可以參考的資料，他既不是靈契師，也不是什麼正統的武者，他的能力基本上是靠自己摸索出來的，很多根本不清楚原理。</p>\n<p>算了，看看就好，反正金球動了不是壞事。</p>\n<p>他把意識收回來，發現蘇念卿在看他。</p>\n<p>「你在發呆。」她說。</p>\n<p>「在想事情。」</p>\n<p>「想什麼？」</p>\n<p>白無極停頓了一下，說：「可能要變強了。」</p>\n<p>蘇念卿的眉毛微微抬了一下：「什麼意思？」</p>\n<p>「就是，感覺……有什麼東西在進步，」他說，「說不清楚，就是感覺。」</p>\n<p>蘇念卿看著他，那個眼神是她慣常的平靜，但裡面有一點細微的審視：「靈契師的修為提升是有跡可循的，靈力積蓄到一定程度，突破契階，有明顯的靈力暴漲感，你說你要變強，是那種感覺嗎？」</p>\n<p>「不太一樣，」白無極說，「不是靈力的感覺，是……連結感變強了。」</p>\n<p>「連結感？」</p>\n<p>「我和……打東西的方式，那個連結，好像加深了。」他說得很模糊，但這已經是他能說的最接近真相的描述了。</p>\n<p>蘇念卿沉默了片刻：「你說的連結，是指你的體契——你的那個隱形的力量來源。」</p>\n<p>白無極沒有否認：「大概。」</p>\n<p>「這次打山嶽熊，觸發了什麼。」</p>\n<p>「可能。」</p>\n<p>蘇念卿把視線移向火堆，思考了一會兒，說：「在天衍大陸的靈契理論裡，強大的戰鬥會讓靈契師和靈契的共鳴加深，尤其是面臨極限壓力的情況下，那種共鳴可以跨越等級差距帶來短暫的突破，之後再穩固下來。」她停頓了一下，「如果你的那個力量來源也遵循類似的邏輯，那今天觸發共鳴加深是很正常的事。」</p>\n<p>白無極聽了，點了點頭：「說得有道理。」</p>\n<p>「不是說得有道理，」蘇念卿說，「我是在說你，直接說你，你今天打了一個契王級的魔獸，你的力量在回應這件事。」</p>\n<p>白無極笑了一下：「行，那就這麼說。」</p>\n<p>「……我說得通俗一點你就高興了？」</p>\n<p>「主要是你主動分析我，這讓我覺得你有在用心。」</p>\n<p>蘇念卿：「……你想多了。」</p>\n<p>「謙虛。」</p>\n<p>「…………」</p>\n<p>霜翎坐在蘇念卿旁邊，用爪子輕輕拍了拍主人的腿，那個動作像是在說：算了，別和他說。</p>\n<p>蘇念卿低頭看了牠一眼，然後真的閉上嘴，不說了。</p>\n<p>---</p>\n<p>夜深了。</p>\n<p>篝火的燃燒聲很低，偶爾一兩聲爆裂，夜風帶著涼意，把火焰往一側壓。</p>\n<p>蘇念卿進了帳篷，霜翎跟進去，帳篷的簾子放下來，裡面的靈燈光透著帳篷布，暈出一個柔和的光圈，隔了一會兒，那個光暗下去，熄了。</p>\n<p>白無極坐在篝火旁邊沒有動。</p>\n<p>他再次把意識往那個金球的方向感知。</p>\n<p>那些在金球表面流動的光線，比傍晚的時候更清晰了一點，像是積蓄在加快，某個過程在進行。</p>\n<p>白無極把這個感知維持了一段時間，不干涉，只是觀察，就像看著一個種子，不知道裡面裝著什麼，但能感覺到它在向上的方向努力。</p>\n<p>「你們感覺到了嗎？」他在心裡問白金之星和黃金體驗。</p>\n<p>黃金體驗的光回應了，那道金色的光很溫和地亮了一下，有一種說不清楚的感覺從那道光裡傳過來，不是語言，是情緒——類似平靜，又類似某種期待。</p>\n<p>白金之星更直接，那個星空色的存在感從他背後往前挪了半步，那種挪動是非常微妙的，不是物理位置的移動，是存在感的加強，像一個人從背後走到肩旁，站近了一點。</p>\n<p>白無極感覺到了那個「靠近」，說不清楚為什麼，但覺得這個感覺挺好的。</p>\n<p>「好，」他說，「那就等著。」</p>\n<p>他重新把意識收回來，側了側頭，讓頸椎發出幾聲清脆的響，然後平躺在草地上，把手枕在腦後，仰頭看星空。</p>\n<p>這個世界的星星真的很亮。</p>\n<p>不知道白金之星和黃金體驗有沒有在看——他忽然有這個奇怪的想法，這兩個替身，在他不使用的時候，它們是什麼狀態？有沒有意識？有沒有自己的想法？</p>\n<p>在原作裡，替身是沒有獨立意識的，但白無極的這個世界有點不一樣，他感覺得到白金之星的「情緒」，感覺得到黃金體驗的「溫度」，那些是有的，他確定。</p>\n<p>只是那些情緒不是人類的情緒，是某種更基礎、更純粹的東西，沒有雜念，沒有複雜，就是在，就是回應。</p>\n<p>白無極對著夜空說了聲：「明天把慕容家那波人打完，繼續趕路。」</p>\n<p>沒有人回應他，但夜風輕輕吹過，把火堆的溫度送了一點過來，不涼了。</p>\n<p>他閉上眼，不一會兒，呼吸沉穩了下去。</p>"}, {"title": "第50章_白金之星OverDrive", "content": "<p>第50章　白金之星：Over Drive</p>\n<p>天亮前一個時辰，蘇念卿把白無極踢醒。</p>\n<p>白無極從地上坐起來，揉了揉眼睛，第一個反應是把手往旁邊摸，摸到篝火的餘溫，確認方向，然後站起來，拍了拍身上的草屑。</p>\n<p>霜翎已經在蘇念卿肩頭了，尾巴收緊，耳朵豎直，那個姿態跟昨晚完全不同，是完全進入戒備狀態的樣子。</p>\n<p>白無極看了看天色，深藍，不是黑，地平線那邊有一條很細的灰白，黎明前最暗的時候已經過了，但太陽還很遠。</p>\n<p>「走？」他問。</p>\n<p>「走。」</p>\n<p>他們沿著坡道往前，不說話，腳步踩在草地上儘量輕，霜翎縮小了自己的靈力波動到幾乎感知不到，蘇念卿的靈力也全部內斂，整個組合的存在感壓縮得非常小。</p>\n<p>白無極按照昨天偵查的結果，往那片樹林的外側繞——不走官道，走林子旁邊的田埂，那條路比官道窄很多，但不會直接觸發埋伏的視線。</p>\n<p>快接近那片樹林的時候，他停下來，側耳聽了聽。</p>\n<p>很靜。</p>\n<p>但那種靜是刻意的靜，太整齊，沒有蟲鳴，沒有動物，只有風，那種異常的安靜才是最大的異常。</p>\n<p>他回頭看了蘇念卿一眼，比了個手勢——她懂，點頭，往他左側挪了幾步，和他拉開距離，霜翎從她肩頭躍下，在地面悄無聲息地走，冰藍色的靈力控制在極低的頻率，不顯露。</p>\n<p>白無極深吸一口氣，讓腦子清醒，把背包的帶子收緊，讓活動空間更大。</p>\n<p>然後，他繼續往前走，走上了官道。</p>\n<p>那個步伐，是故意的。</p>\n<p>是來引爆的。</p>\n<p>---</p>\n<p>走了大約三十步，埋伏動了。</p>\n<p>不是一點點動，是全面爆發。</p>\n<p>從樹林兩側，三十多個人同時殺出，靈力在黑暗裡點亮，靈符的光、靈獸的光、靈術的光，把那段官道瞬間照得通明，各種顏色的靈力光束從不同方向齊射，目標明確——白無極。</p>\n<p>同時，兩道巨大的氣壓從前後壓下來。</p>\n<p>兩名契將。</p>\n<p>一個從正前方，一個從後方，前後夾擊，靈力覆蓋整條官道，把退路全部封死，就像兩堵移動的牆往中間合攏。</p>\n<p>蘇念卿和霜翎在左側，霜翎衝出去，冰藍色的靈力爆放，一條光芒凜冽的冰弧掃出去，把衝向蘇念卿方向的幾個契士衝開，蘇念卿的右手靈符飛出，一道封印術打在最近的靈獸身上，把牠定住。</p>\n<p>外圍的戰鬥迅速展開。</p>\n<p>白無極站在官道中央，被三十多道靈力光束圍著，但那些光束打中他——或者說，打中了什麼——停住了，那些靈術攻擊像是打到了一堵透明的牆，消散在空氣裡，連衣角都沒有碰到。</p>\n<p>白金之星在他周圍，把那些攻擊全部攔截，完全攔截，就像一個無形的護盾，但這個護盾是主動出擊型的，不是被動防守——白金之星的拳頭同時在各個方向打出去，以肉眼無法追蹤的速度，把靠近的靈力攻擊在到達之前就擊碎。</p>\n<p>外圍的契士看著白無極在靈術光束的中央一動不動，臉色都變了。</p>\n<p>前方的契將衝到了近前。</p>\n<p>這是一個身材高大的男人，靈契顯化，是一頭灰色的鐵甲犀，轟然踏地，靈力覆蓋方圓五丈，他右拳蓄滿靈力，一拳往白無極轟過來，那一拳帶著金色的靈力光芒，是契將級的全力衝擊。</p>\n<p>白無極側步，讓開——</p>\n<p>後面的契將同時殺到，這一個是女性，靈契是一條雙頭靈蛇，兩條蛇頭各吐出一道靈力光柱，從後方夾擊。</p>\n<p>兩個契將前後同時，左右的靈術補射同時到來。</p>\n<p>這是一個精密的合圍，不給任何一個方向留缺口。</p>\n<p>白無極站在這個合圍的中心點，感覺著那些攻擊的弧線和角度，腦子在以極快的速度計算——</p>\n<p>就在這個瞬間，腦海裡那個金色的球，炸了。</p>\n<p>不是真正的炸，是積蓄的光在這一刻全部衝出來，從金球裡湧出一道刺目的金色光芒，穿過意識，穿過感知，衝進全身的每一個末梢——</p>\n<p>然後——</p>\n<p>時間停了。</p>\n<p>---</p>\n<p>白無極站在靜止的世界裡。</p>\n<p>那個金色的光柱在他背後的靈術，停了。</p>\n<p>那個前方契將全力衝出的拳頭，停了，就懸在離他臉三步的距離，靈力光芒靜止在空氣裡，像一幅凍住的畫。</p>\n<p>後方那兩道靈蛇吐出的光柱，停在他後背外側三尺，不動了。</p>\n<p>外圍那三十幾個人，全部靜止，各種姿勢，有的在衝，有的在揮手，有的在蓄力，全部——停了。</p>\n<p>連旁邊的蘇念卿，冰弧掃出的動作，也停在半空，霜翎躍起的身形，冰藍色的靈力停在爪尖，像一個暫停的影像。</p>\n<p>整個世界，靜止。</p>\n<p>白無極站在靜止的世界裡，愣了整整半秒。</p>\n<p>他的大腦在那半秒裡，試圖處理眼前的情況，一個資訊接一個資訊地確認：我還能動，對，他動了一下手指；周圍的人不能動，對，那個契將的眼睛連眨都不動；連光柱都靜止了，那就是說連光速都被停了；空氣裡的塵粒也停了，懸在那裡，那個塵粒白無極走過去，用手撥了一下，它飄了一點，他的干涉是有效的——</p>\n<p>他看了看靜止的契將，看了看靜止的靈術光柱，又看了看靜止的霜翎，霜翎那個被凍住的表情，那雙冰藍色的眼睛，裡面的瞳孔是凝固的。</p>\n<p>他抬起手，輕輕摸了摸鼻子。</p>\n<p>然後，非常真誠地說出了此刻腦子裡第一個念頭：</p>\n<p>「……操，這是時停？」</p>\n<p>這個問題沒有人回答。</p>\n<p>因為整個世界靜止了，沒有人能聽到他說話，也沒有人能回答。</p>\n<p>白無極站在那裡，又愣了大概兩秒，腦子裡亂哄哄地轉：時停，時停，白金之星的時停，原作裡是有的，但——這個世界，這個異世界，白金之星能時停是因為金球的積蓄嗎，那麼時停的時長是多少，一秒？兩秒？幾秒？他不知道，他不知道這個時停能維持多久——</p>\n<p>「別愣著了，操。」</p>\n<p>他對自己說這句話，然後用力把腦子裡的震驚踢開，把注意力集中回眼前：</p>\n<p>兩個契將，前後各一個。</p>\n<p>前方那個靠他最近，三步距離，就那一拳停在那裡。</p>\n<p>白無極繞開那個靜止的拳頭，走到那個契將的身側，白金之星的拳頭已經蓄好，那個在時停裡被凝聚起來的力量，沒有任何阻礙地——</p>\n<p>打在契將的後頸。</p>\n<p>那個衝擊波把靜止的塵粒往四周推了幾圈，但因為時停，塵粒推開之後又靜在那個新的位置，空氣裡出現了一個完美的圓形空白，很好看，白無極沒心思欣賞。</p>\n<p>轉向後方那個女性契將。</p>\n<p>靈蛇的兩道光柱停在他後背三尺，他繞開，走到那個女性契將旁邊，白金之星的拳頭再蓄好——</p>\n<p>打出。</p>\n<p>後頸，同樣的位置。</p>\n<p>完成。</p>\n<p>他站回到自己原本的位置，那個所有靜止攻擊的中心點，深呼吸了一下。</p>\n<p>時停的時間——他感覺快了，快到盡頭，那個金色的光在消退，世界的邊緣開始有輕微的顫動，像是一個暫停的影像快要恢復播放——</p>\n<p>他把腳站穩，把姿勢調好，讓自己看起來和時停之前一樣，什麼都沒發生過。</p>\n<p>然後，時間重啟了。</p>\n<p>---</p>\n<p>一聲轟響，兩聲悶哼，幾乎同時。</p>\n<p>前方契將的拳頭打在空氣裡，那道金色的靈力光芒炸開，卻什麼都沒打到，而且在那拳打出去的瞬間，那個契將的後頸傳來一道劇烈的衝擊震盪，頸部靈力被打散，整個人往前傾倒，膝蓋跪地，手撐著地，低著頭，不明所以。</p>\n<p>後方的女性契將，兩道光柱打出，白無極不在那個位置了——他站在她旁邊，她的後頸同樣傳來那道衝擊，靈力散架，轟地一聲跪地，兩道光柱打到地上，炸開兩個大坑。</p>\n<p>白無極站在兩個跪地的契將中間，身上一塵不染，呼吸平穩，就好像從來沒有被那兩個契將夾擊過一樣。</p>\n<p>外圍的三十幾個契士全部停了。</p>\n<p>他們不知道發生了什麼。</p>\n<p>他們親眼看著兩個契將以全力夾擊，然後就——跪了。那中間發生了什麼，沒有人看清楚，速度太快，或者說根本不是速度的問題，有那麼一瞬間，他們感覺到什麼東西靜止了一下，不是眼花，是真實的——就算在那個靜止裡只有那麼一息的時間，也有人感覺到了。</p>\n<p>那個感覺，說不清楚，但讓人后脊發涼。</p>\n<p>蘇念卿在左側，戰鬥在她回應過來之後的兩秒裡就已經發生了決定性的轉折，她看到兩個契將幾乎同時跪地，看到白無極站在中間，那個……那個靜止感——</p>\n<p>她的靈力感知非常敏銳，那一刻，她感覺到了某種靈力波動，非常短暫，幾乎是幻覺，但她確定感覺到了，那是一種她從來沒有遇到過的頻率，不是任何她認識的靈術，是某種超出認知範疇的東西——</p>\n<p>然後就結束了，兩個契將倒地，世界恢復正常。</p>\n<p>霜翎在她身邊，那九條尾巴，在時間那個極短的靜止瞬間裡——霜翎感覺到了。牠的靈覺比蘇念卿更直接，更原始，那個瞬間，整個世界的靈力流動停止，那不是壓制，是更深層的什麼東西介入，把流動本身按停。</p>\n<p>霜翎的瞳孔在那個瞬間縮小成一個細針。</p>\n<p>然後時間重啟，一切如常，但霜翎的眼睛一直看著白無極，那個目光已經完全不一樣了。</p>\n<p>之前是觀察，之前是保留，之前是等待確認。</p>\n<p>現在是——那雙銀色的眸子裡，某種一直沒有開啟的東西，悄悄，開了一個細小的缺口。</p>\n<p>「……」</p>\n<p>蘇念卿深呼吸了一下，對外圍那三十幾個已經停在那裡不知所措的契士說：「讓開，否則接著打。」</p>\n<p>那三十幾個人互相看了看，看了看跪在地上的兩個契將，又看了看白無極——白無極正在活動手腕，沒有看他們，神情就像剛做完一套廣播體操。</p>\n<p>然後，有人往後退了一步，然後第二個，然後整個陣形開始潰散，幾個人率先轉身跑了，剩下的人像是骨牌，很快跟上。</p>\n<p>地面上跪著的兩個契將靈力散架，站不起來，只能眼睜睜看著自己的人跑光。</p>\n<p>白無極走到前方那個男性契將面前，蹲下來，平視他：「傳個話給慕容燁，就說，我說的，下次在路上設伏就別怪我不客氣。」</p>\n<p>那個契將咬牙，沒說話。</p>\n<p>「聽見了嗎？」</p>\n<p>沉默。</p>\n<p>白無極嘆了口氣，拍了拍那個契將的肩膀：「我當你聽見了，辛苦了，多保重。」</p>\n<p>他站起身，回頭，蘇念卿正在看他，那個眼神裡有太多東西，她沒有開口，就是看著他。</p>\n<p>白無極笑了笑：「走了？」</p>\n<p>蘇念卿沉默了一下，然後說：「……走。」</p>\n<p>她沒有問那個問題，那個此刻最想問的問題。</p>\n<p>因為她知道，就算問了，他也只會說——</p>\n<p>「猜的。」</p>\n<p>霜翎從她身旁走過，在白無極的腳邊頓了一下，那九條尾巴輕輕垂落，有三條，悄悄地，靠近了白無極腳踝邊的地面，輕輕掃了一下，然後收回去。</p>\n<p>白無極低頭看了牠一眼，什麼都沒說。</p>\n<p>霜翎走在前面，銀白色的身影走上了繼續向天契城延伸的官道。</p>\n<p>三個人，一狐，繼續上路。</p>\n<p>身後的廢村方向，太陽剛好爬上地平線，第一道光打過來，把四個身影的影子拉得很長，很長，一直延伸到遠方的路上。</p>\n<p>---</p>\n<p>走了半里，白無極忽然沉默地嘀咕了一句。</p>\n<p>「……時停。」</p>\n<p>蘇念卿：「什麼？」</p>\n<p>「沒事，在想事情。」</p>\n<p>「又在猜？」</p>\n<p>「對，又在猜。」</p>\n<p>蘇念卿停頓了一下，沒有再問，繼續走。</p>\n<p>白無極抬起頭，看著前方的官道，那條路筆直地往遠處延伸，路的盡頭什麼都看不見，但是知道那裡有個地方叫天契城，知道還有慕容家，還有四大聖家，還有更多他不知道的東西。</p>\n<p>然後知道，在他腦子裡，白金之星的光剛剛亮了一度。</p>\n<p>還沒完全了解自己的能力，還有很多事情沒搞清楚，但是——</p>\n<p>他腳步不停，繼續往前走。</p>\n<p>時停嗎。</p>\n<p>還挺好用的。</p>"}, {"title": "第51章_一秒的神", "content": "<p>第51章　一秒的神</p>\n<p>峽谷裡的風聲漸漸平息。</p>\n<p>倒下的人橫七豎八鋪了一地，慕容家這支埋伏隊伍，兩名契將帶隊、十幾個契師壓陣，算得上是精銳配置。此刻全部靜靜躺著，呼吸還在，但大概半個時辰之內是爬不起來的。</p>\n<p>蘇念卿站在峽谷出口，衣袍依然整齊，只有袖角有一點淡淡的霜跡——那是霜翎出手留下的痕跡。她低頭看了看，轉身，視線掃過整個峽谷。</p>\n<p>七具倒地身影聚集在峽谷中央。</p>\n<p>都在同一個位置。</p>\n<p>都是同一種姿勢——向後仰倒，像是被一股無形的力量從正面擊飛。</p>\n<p>她慢慢走過去，蹲下身，看了看其中一名契將的胸口。沒有明顯外傷，但靈脈已經亂了，像是被某種極度精準的力量打穿了防禦核心。不是普通的正面強攻，而是精確到像外科手術一樣，找到最脆弱的點，一擊而入。</p>\n<p>這需要極其可怕的速度和精準度。</p>\n<p>精準到讓人毛骨悚然的那種。</p>\n<p>「你怎麼做到的？」</p>\n<p>她抬起頭，看向站在旁邊拍手掌灰的白無極。</p>\n<p>白無極正低著頭，看著自己右手的指節，表情很認真，像在思考什麼重要的哲學問題。聽到蘇念卿的問題，他抬起頭，沉默了一下。</p>\n<p>他確實在思考。</p>\n<p>不是在思考怎麼解釋——替身這種東西，沒辦法解釋，也沒有解釋的必要。他在思考的是：要給一個什麼說法，才能讓眼前這位面癱女主既不追問，又不起疑？</p>\n<p>思考了大概三秒鐘。</p>\n<p>「天賦。」</p>\n<p>蘇念卿盯著他看了很長時間。</p>\n<p>「……」</p>\n<p>她沒有說話。</p>\n<p>她只是繼續看著他，眼神裡帶著一種「你覺得這個答案能過得了我這關嗎」的平靜質疑。</p>\n<p>白無極挺住了這道目光，表情保持誠懇，一字一句：「真的，天賦，沒什麼好說的，天生的，解釋不了。」</
