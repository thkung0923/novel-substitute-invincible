p>是真實的物理控制，不是靈術，就是用力氣把她的手腕扣在背後，按住。</p>\n<p>霜翎瞬間轉身，十二條尾巴炸開，往那個副將撲去。</p>\n<p>那個副將已經準備好了：「霜翎不動，否則她的手腕斷。」</p>\n<p>他不是在說謊，他的手用力很清楚，蘇念卿能感覺到。</p>\n<p>霜翎停了。</p>\n<p>被迫地，停了。</p>\n<p>霜翎的十二條尾巴收起，身體僵在原地，嘴裡發出一聲低沉的哀鳴，那聲音裡有它平時幾乎不會有的東西——被迫無力的憤怒。</p>\n<p>另一個邪修走過來，把霜翎的頸子套上了另一個邪器，這個是靈力封印類的，把霜翎的靈力輸出強行壓制在很低的水準。</p>\n<p>這一幕，在廣場上，大概只有很少的人看到了全過程。</p>\n<p>---</p>\n<p>玄冥，在白無極面前，緩緩轉頭，往廣場左側看了一眼。</p>\n<p>白無極轉頭了。</p>\n<p>他看到了：蘇念卿，雙臂被扣在背後，那個邪修的副將站在她身後，手腕的角度很確定，如果他用力，蘇念卿的手腕確實會斷。旁邊，霜翎被邪器封印，拼命想掙脫卻無從掙脫，十二條尾巴在邪器的壓制下無法完全展開，就那樣委屈地收著，眼神一直盯著蘇念卿。</p>\n<p>蘇念卿的臉。</p>\n<p>她的臉，不是恐懼。</p>\n<p>她看著白無極的方向，那個眼神不是害怕，不是求救，是憤怒——一種收得很緊、藏在面癱表情下面，但白無極能看出來的憤怒。那個憤怒不是針對那個副將，是針對「自己被當成籌碼」這件事本身，是一種驕傲的人被這樣使用之後，藏不住的憤怒。</p>\n<p>她的眉頭沒有皺，嘴唇沒有動，眼神裡的情緒也是壓著的，但白無極認識她，他在那個眼神裡看清楚了：她在憤怒，並且她比憤怒更強烈的情緒，是不甘心。</p>\n<p>玄冥回過頭，看向白無極：「放下你的力量，或者看她死。」</p>\n<p>廣場上所有的喧囂，在這一刻，奇異地靜了。</p>\n<p>不是真的靜，是大家的注意力在這一刻都集中到了廣場中心這個點上，讓那些嘈雜聲退到了背景裡，讓這兩個人之間的空間變得很清晰。</p>\n<p>赫連峰的聲音在遠處壓低了，低到幾乎聽不見，是在對蘇長淵說什麼。蘇長淵沒有動，他站著，但他的手握緊了。</p>\n<p>白無極站在廣場中心，沒有動作，沒有立刻說話。</p>\n<p>沉默，持續了幾秒鐘。</p>\n<p>那幾秒鐘，不算長，但對每一個站在廣場上的人來說，都感覺很漫長。</p>\n<p>然後，白無極開口了。</p>\n<p>他對玄冥說：「給我一秒鐘。」</p>\n<p>玄冥沒有拒絕，也沒有點頭，就是沉默地等著。</p>\n<p>白無極往廣場左側的方向看過去，看向蘇念卿。</p>\n<p>兩個人的視線，在廣場上，對上了。</p>\n<p>蘇念卿的眼神沒有變，依然是那個壓著的憤怒，但在和他視線對上的瞬間，她的眼神裡出現了一個非常細微的、非常短暫的東西——不是求救，是某種警告，或者說是提醒，像是她在用眼神說一件她沒辦法說出口的事。</p>\n<p>白無極看了一秒，然後他的視線往下移了一點，看了看那個副將扣住她手腕的方式，看了看那個副將站立的位置，看了看地面的角度——</p>\n<p>他把這些全部記了下來。</p>\n<p>然後，他轉回頭，再次看向玄冥。</p>\n<p>他的臉上，有了一個表情。</p>\n<p>那個表情很難形容——不是憤怒，不是絕望，不是悲壯，不是任何一種這個場合「應該」出現的表情。</p>\n<p>那是一個笑容。</p>\n<p>很輕，很淡，嘴角就那樣微微扯了一下，像是心裡某個什麼想通了的人，臉上不由自主地帶出來的那種鬆弛。</p>\n<p>不是冷笑，不是苦笑，不是任何帶著某種情緒色彩的笑，就是……笑。</p>\n<p>好像他剛才想到了什麼事情，讓他覺得這個局面反而有什麼好笑的地方。</p>\n<p>玄冥盯著這個笑容，有那麼一個瞬間，他感覺到了某種說不清楚的東西。</p>\n<p>不是危機感，他見過太多危機了，危機感他能辨認。</p>\n<p>是那種很奇特的、「這個人在做一道我看不到題目的計算題」的感覺——對方手裡顯然沒有任何牌了，精神力耗了大半，Life的能力被剋制，對手在他手裡，局勢完全是他的，但這個人笑了，笑得像是某件事理所當然地在往他想要的方向走。</p>\n<p>這個笑容，讓玄冥隱隱不安。</p>\n<p>他不知道為什麼不安，那個「不安」本身就是陌生的——他不記得上一次感到不安是什麼時候了，可能是幾十年前，可能是更久。</p>\n<p>「你在想什麼？」他問，語氣依然平靜，但那個問題本身出現，就已經說明了什麼。</p>\n<p>白無極看著他，笑容還在，沒有變，沒有解釋。</p>\n<p>廣場上，所有人都在等他說話，等他給出某個答案，等他接受條件，或者等他做出任何一個明確的、可以被理解的反應。</p>\n<p>他什麼都沒說。</p>\n<p>他只是站在那裡，讓那個笑容停在臉上，就那樣，沉默地，看著玄冥。</p>\n<p>那個笑容，像是某個巨大的東西，正在他的沉默之下，開始緩緩成形。</p>"}, {"title": "第101章_再一次為了她", "content": "<p>第101章　再一次，為了她</p>\n<p>那個笑容慢慢消失了。</p>\n<p>不是被憤怒取代，不是被恐懼填充，而是像一層薄薄的霧被風吹散，底下露出的是一種讓人看不透的平靜。</p>\n<p>白無極站在廢墟中央，眼神落在被副將鎖住的蘇念卿身上。那個男人的手臂死死扣住她的喉嚨，另一隻手的五指直直抵著她的後腦——那個姿勢白無極認識，精神穿刺的前置動作，只要靈力一催動，蘇念卿的精神海就會在一瞬間被撕碎。</p>\n<p>蘇念卿沒掙扎。</p>\n<p>她就那樣站著，霜翎縮在她髮間化成一根銀色髮簪，安靜得像是已經接受了什麼。但她的眼睛沒有閉上，一直盯著白無極。</p>\n<p>那雙眼睛在說：別管我。</p>\n<p>白無極把那雙眼睛的意思看得清清楚楚，然後選擇性地無視了。</p>\n<p>「放她。」</p>\n<p>他的聲音很平，沒有顫抖，沒有喊叫，就是兩個字，像是一個確認事實的陳述。</p>\n<p>玄冥站在戰場的另一頭，黑袍在靈力衝擊後的氣流中獵獵作響，他看著白無極，眼神裡是一種高位者才有的審視。這場戰鬥打到現在，他承認這個年輕人超出了他的預期，但承認並不代表忌憚——在這個世界上，能讓他忌憚的東西早就已經不存在了。</p>\n<p>「那你放下你的力量。」</p>\n<p>白無極：「不行。」</p>\n<p>兩個字，依然很平，像是在回答一個非常無聊的問題。</p>\n<p>玄冥眯起眼睛。周圍還站著的邪修們也僵了一下，他們的首領在這場戰鬥中強壓三名契聖聯手，現在輕描淡寫地提出要求，對面這個年輕人的回答是「不行」？</p>\n<p>副將的手收緊了一些。</p>\n<p>蘇念卿的眉頭微微皺起，那個細微的動作出賣了她承受的壓力，但她沒有叫出聲，嘴唇抿得很緊，下巴抬著。</p>\n<p>白無極的眼神變了。</p>\n<p>不是突然爆發的那種變，是一種非常緩慢、非常深沉的改變，像是有什麼東西在他的眼睛最深處慢慢往外浮。他的左手垂在身側，指尖微微蜷起，然後鬆開，再蜷起。</p>\n<p>腦海裡，那顆金球開始震動。</p>\n<p>不是他主動召喚的，是它自己在響應，在呼叫，那種震動的頻率白無極從來沒有感受過，比起之前任何一次激活黃金體驗都要劇烈——像是一顆要從裡面炸開的星。白金之星也在同時共鳴，那種嗡嗡的低頻顫動從精神海蔓延到手指尖，蔓延到脊背，蔓延到雙腳踩著的碎石地面。</p>\n<p>他感覺到了。</p>\n<p>某種門檻就在眼前，薄得像一層紙，而他現在站在那層紙的這一邊，只需要再向前一步。</p>\n<p>但他沒有現在就衝過去。</p>\n<p>因為蘇念卿的眉頭又皺了一下，那個副將還沒鬆手。</p>\n<p>「玄冥。」白無極開口，視線從蘇念卿身上收回來，落在那個黑袍男人身上，「你覺得你現在的處境還有談條件的資格嗎？」</p>\n<p>玄冥輕笑：「我覺得有。」他抬了抬下巴，示意副將方向，「那個姿勢你認識，精神穿刺，我的人不需要靈契，純粹的精神力就夠了，而且比你快。你現在任何一個動作，都可能讓她在你面前成為廢人。」</p>\n<p>白無極沉默了三秒。</p>\n<p>「你說得對，我認識那個姿勢。」他說。</p>\n<p>「那——」</p>\n<p>「所以，」白無極繼續說，聲音平靜得像是在講別人的故事，「我才告訴你，放她。不是求你。是告訴你。」</p>\n<p>玄冥的笑容消失了。</p>\n<p>他第一次正眼打量這個年輕人，不是作為一個戰鬥目標，而是作為一個……他想了一下，找到了那個詞：麻煩。他是個很少使用這個詞的人，因為在他認知裡，絕大多數事情都不夠格被稱為麻煩。</p>\n<p>但這個年輕人站在這裡，渾身是傷，靈力已經不知道消耗到了幾成，被他親手打出過重傷，此刻卻用那種語氣對他說「告訴你」。</p>\n<p>玄冥忽然覺得，也許他低估了一件事。</p>\n<p>「你能怎樣？」他的副將開口，語氣裡帶著嘲弄，「你現在的狀態，連靠近我們都——」</p>\n<p>「閉嘴。」</p>\n<p>玄冥說了兩個字，副將立刻噤聲。</p>\n<p>不是因為他改主意了，是因為他感覺到了一種東西——從白無極身上散發出來的某種震動，非常微弱，幾乎被戰場上所有的靈力餘波淹沒，但他打了一輩子仗，這種本能告訴他，那不是靈力。</p>\n<p>那是更古老的東西。</p>\n<p>「你的眼睛，」玄冥說，聲音壓低了一些，「有什麼東西在你眼睛裡面。」</p>\n<p>白無極低頭看了一眼自己的手。</p>\n<p>他的手掌上，有一層非常淡的金色光芒，薄得幾乎看不見，但確實在那裡。黃金體驗的小人站在他的肩膀上，也在看那層光，然後它轉過頭，用一個白無極從來沒有在它臉上見過的表情看著他。</p>\n<p>那個表情是……期待。</p>\n<p>白無極把這一切看在眼裡，然後深吸了一口氣，視線再次落在蘇念卿臉上。</p>\n<p>她還在看著他。那雙眼睛的意思沒有變：別管我。</p>\n<p>然後，在他們視線交匯的那一刻，她的眼神微微動了一下，白無極懂那個動作的意思。他們相處了這麼久，她不是個喜歡說廢話的人，但她說話的方式不只在嘴上。</p>\n<p>那個眼神說的是：我等你。</p>\n<p>白無極把那個意思收進去，放好，然後轉回來看玄冥。</p>\n<p>那層平靜還在，但平靜底下的東西變了，像是一柄劍終於決定出鞘，但出鞘的動作本身沒有聲音，沒有火花，就是安安靜靜地，從鞘裡出來了。</p>\n<p>「我記性很好，」他說，「今天的事，一條一條的，我都記著。」</p>\n<p>玄冥：「這對你沒有任何意義，因為——」</p>\n<p>「因為你打算把我怎樣？」白無極問，語氣裡帶了一點東西，不是憤怒，是比憤怒更沉的東西，「殺了我？還是讓你的人繼續攔著她，等你有空的時候再處理我？」</p>\n<p>他往前走了一步。</p>\n<p>就一步，廢墟碎石在腳下輕輕發出聲響。</p>\n<p>那一步讓周圍所有邪修都下意識往後退了半步——不是因為他的靈力有多強，他現在確實是強弩之末，而是因為那一步邁出去的姿態，讓人莫名想起某種不知道在哪裡見過的東西。</p>\n<p>那是一種「我已經決定了」的姿態。</p>\n<p>玄冥第一次感到一種非常罕見的不確定感，他的手微微收緊，那道靈力在手指間凝聚，準備隨時先發制人——</p>\n<p>然後白無極腦海裡的金球，炸開了。</p>\n<p>不是比喻，就是那個感覺，像是一顆星在精神海裡燃盡了最後的燃料，然後在那一刻，以比任何爆炸都平靜的方式，向外釋放了全部的光。</p>\n<p>白無極只感覺到一瞬間的目眩，然後他感覺到兩件事同時發生：</p>\n<p>白金之星，在他的精神海深處，換了一個形狀。</p>\n<p>時間，停了。</p>\n<p>不是五秒。</p>\n<p>他數著，一，二，三，四，五，六，七，八，九，十。</p>\n<p>十秒。</p>\n<p>白無極站在靜止的世界裡，看著被定格的玄冥，看著那個手扣在蘇念卿喉嚨上的副將，看著蘇念卿被定格的側臉，那雙眼睛還是睜著的，還是在看他剛才站的地方。</p>\n<p>他深吸了一口氣。</p>\n<p>然後，他感覺到黃金體驗的小人跳下了他的肩膀，站到地面上，抬起頭看著他，臉上的那個表情還在：期待。</p>\n<p>白無極伸出手，黃金體驗把它的手搭上去。</p>\n<p>一種前所未有的感覺——他在靜止的世界裡，可以用黃金體驗。</p>\n<p>攻防一體，十秒，靜止的神域。</p>\n<p>他開始走動。</p>\n<p>腦海裡，那層曾經擋住他的門，已經不在了。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第102章_白金之星Eternal", "content": "<p>第102章　白金之星：Eternal</p>\n<p>十秒。</p>\n<p>整整十秒。</p>\n<p>白無極在靜止的世界裡，第一次有機會清清楚楚地看清楚這一切。</p>\n<p>以前時停五秒，他必須把每一秒都精準地用在移動和出擊上，沒有半秒可以浪費在「想」這件事上。但現在時間多了一倍，在剛啟動的那一瞬間，他下意識就做了一件五秒時代絕對沒有餘裕做的事——他停下來，先環視了一圈。</p>\n<p>戰場。</p>\n<p>被定格的玄冥，右手凝著深紫色靈力，那道靈力的前端已經成形，是一個旋轉的壓縮球體，威力足以在瞬間撕開一個人的防禦——那是他在看出白無極要突破什麼之後搶先發出的攻擊，但是被定格在半途，像一幅靜止的畫。</p>\n<p>被定格的邪修，散亂在戰場各處，有的正在跌倒，有的正在轉身逃，有的還保持著攻擊姿態但無從動彈。</p>\n<p>被定格的副將，那個手勢白無極盯著看了一眼，手臂肌肉的力道、角度，他不是沒有接受過格鬥訓練的人，八極拳練了五年，他能判斷那個人的重心在哪裡，要怎麼破。</p>\n<p>被定格的蘇念卿，側臉朝向他剛才站的位置，睫毛微微下壓，下巴有一點點仰著，那是她在承受壓力的時候習慣的姿勢——不低頭，永遠不低頭。</p>\n<p>白無極把這一切在腦子裡過了一遍，用了大概兩秒。</p>\n<p>然後他開始動。</p>\n<p>黃金體驗就在他的身側，平時它是一個浮在空中的金色小人，從他擁有它以來，這是第一次他感覺到它以一種完全不同的方式存在——不是輔助，不是工具，而是一個完整的個體，與他並肩。</p>\n<p>「第一步，把她移出去。」白無極低聲說，不是對任何人說，只是把動作順序整理清楚。</p>\n<p>他往副將那個方向走去，腳步沒有聲音，廢墟碎石被他踩過，輕輕位移，但靜止的世界裡沒有人感受到任何震動。他繞到副將身後，在那個定格的身影後面站定，先把手搭上去，感受了一下力道分布。</p>\n<p>然後他對黃金體驗示意。</p>\n<p>黃金體驗伸出手，碰觸副將右臂的靈力紋路，白無極感覺到一種熟悉的轉化開始——副將手臂上凝聚的精神穿刺前置靈力，在黃金體驗的干預下開始生長、扭曲，從一個進攻性的凝練靈力，慢慢演變成藤蔓狀的纏繞物，那些藤蔓不攻擊任何人，只是在副將自己的手臂上開始蔓延，輕輕但結實地纏住他的雙手、雙臂，一直蔓延到肩膀。</p>\n<p>這需要一點時間，大概三秒。</p>\n<p>白無極在這三秒裡把空出來的注意力放在蘇念卿身上，他計算了一下位置，然後把手搭上她的手腕，感受了一下。她在靜止狀態裡依然有體重，有質感，他的手指輕輕扣上去——不是抓，是穩穩地握著。</p>\n<p>等藤蔓把副將的手完整纏住，蘇念卿的喉嚨前那條手臂已經沒有力道，白無極托著她的腰，把她從那個姿勢裡移出來，一步一步往安全位置挪。</p>\n<p>戰場邊緣，有一堵還算完整的石牆，旁邊落著幾塊大石頭，可以擋住來自玄冥方向的直線視野。白無極把蘇念卿帶到那裡，讓她靠著石牆站著——靜止狀態裡她的身體是定格的，她能站就讓她站著，蹲下去重啟之後可能不舒服。</p>\n<p>然後他退後兩步，確認位置，確認她不在任何攻擊的射線範圍內。</p>\n<p>七秒。</p>\n<p>還剩三秒。</p>\n<p>他轉身，走回副將正前方，對準後腦位置，八極拳，鐵山靠的變形打法，不用全力，但要確實讓對方當場失去意識——太輕了打不昏，太重了打死人，他在靜止的世界裡沒有辦法看到即時反饋，只能靠感覺。</p>\n<p>他出拳。</p>\n<p>拳落下的瞬間，腦海裡的計時走到了九。</p>\n<p>然後是十。</p>\n<p>世界重新開始動。</p>\n<p>所有的聲音同時回來——風，碎石位移的細微摩擦聲，邪修的喘息聲，遠處還在交戰的戰場餘音，玄冥那道靈力球體轟然崩散，因為打擊目標在時停結束的瞬間從原位消失，靈力失去目標自動潰散。</p>\n<p>副將像一棵被砍斷的樹，向前倒下，身上的藤蔓在時間重啟的瞬間開始在現實世界延續，在那個人的身體外纏繞成一個繭，把他整個人包裹在裡面，動彈不得。</p>\n<p>蘇念卿突然出現在石牆旁，離白無極大概十步遠。</p>\n<p>她怔了一下，回過神，立刻把周圍情況過了一遍，然後視線落在倒地的副將身上，再抬起來，落在白無極身上。</p>\n<p>全場靜了大概兩秒。</p>\n<p>玄冥轉過頭，看到副將倒地，看到蘇念卿站在石牆旁。</p>\n<p>他的眼神劇變。</p>\n<p>不是憤怒，那個變化太複雜，太迅速，在那一瞬間他感覺到的東西，是這場戰鬥以來從未有過的東西——不確定感，像一個站在很穩固的橋上突然感覺到橋微微震動的人，那種震動告訴他：這座橋可能並不像他以為的那樣穩固。</p>\n<p>「你，」他開口，聲音低沉，「剛才做了什麼。」</p>\n<p>白無極站在副將倒地的位置旁，還保持著那個出拳後的姿勢，慢慢把手收回來。</p>\n<p>黃金體驗回到他身旁，站在他肩膀上，那個期待的表情已經換成了一種更平靜的東西——某種到位的滿足。</p>\n<p>白無極低頭看了它一眼。</p>\n<p>然後抬起頭，看著玄冥。</p>\n<p>「沒什麼，」他說，「就是把事情處理了一下。」</p>\n<p>他感覺到了新的東西——進化後的白金之星和進化後的黃金體驗，在他的精神海裡共存，像是兩個原本各自運轉的系統，在剛才那十秒裡完成了第一次真正的協同，而那個協同留下了一種殘影，讓他能更清楚地感受到兩個替身的存在。</p>\n<p>十秒時停，時停中可用黃金體驗。</p>\n<p>他在腦子裡把這個能力的邊界快速摸索了一遍，還有很多他不知道的地方，但大框架他懂了。</p>\n<p>玄冥站在原地，沒有立刻再次發動攻擊。</p>\n<p>他在重新評估。</p>\n<p>白無極沒有給他太多時間。</p>\n<p>「好，剛才算是第一回合，」他說，拍了拍手，像是在拍去掌心的灰塵，「現在我們繼續？」</p>\n<p>玄冥看著他，眼神裡有什麼東西在沉積，像是一個還沒有完全成形的判斷。他是個打了一輩子仗的人，在幾十年的廝殺裡練出了一種本能——那種本能現在正在非常清晰地告訴他一件事。</p>\n<p>這個年輕人，剛才變了。</p>\n<p>不是變強了，而是「變了」，有什麼根本性的東西完成了某種轉變，他說不出那是什麼，但他的直覺不會說謊。</p>\n<p>蘇念卿靠著石牆，把白無極的背影盯著看了幾秒，然後視線落在白金之星最新的形態上——她看不見替身，但她能感覺到白無極現在身上的氣息和以前不一樣，那種星空色的微光更深了，更穩了，像是一顆星終於找到了自己正確的軌道。</p>\n<p>霜翎從她髮間慢慢鑽出來，十二條尾巴一根一根展開，那雙冰藍色的眼睛先看著玄冥，再轉回來看白無極，尾巴輕輕搖了一下。</p>\n<p>蘇念卿把手放到霜翎的頭頂，沒說話。</p>\n<p>戰場的風吹過廢墟，捲起細碎的石屑，打在眾人臉上。</p>\n<p>白無極看著玄冥，感覺著腦海裡白金之星的共鳴頻率，和黃金體驗低低的呼應，那兩種震動已經完全不是陌生的感覺了，它們是他的一部分，一直都是，只是現在，他終於能完整地聽見它們。</p>\n<p>「Eternal。」</p>\n<p>他在腦子裡念出這個名字，不知道為什麼，他覺得這個名字本來就在那裡，白金之星從一開始就知道自己叫什麼，只是在等他也懂。</p>\n<p>永恆。</p>\n<p>十秒的靜止世界，是一種意義上的永恆，在那十秒裡，他是這個靜止宇宙裡唯一動著的東西。</p>\n<p>白無極覺得如果現在有個鏡頭對著他，應該配點音樂。</p>\n<p>但這不是電影，所以他把這個念頭壓下去，繼續看玄冥。</p>\n<p>「要繼續嗎？」他再次問，聲音平靜，「我最近睡眠比較差，體力恢復不算快，不想拖著打，你要打就快點。」</p>\n<p>玄冥深吸了一口氣。</p>\n<p>「你的精神力，」他說，聲音裡有一種很克制的東西，「不是這個世界的東西。」</p>\n<p>白無極聳了聳肩，沒有否認，也沒有確認。</p>\n<p>「打不打？」他問。</p>\n<p>玄冥眼神最後定格了一下，然後發動了全力。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第103章_十秒的神域", "content": "<p>第103章　十秒的神域</p>\n<p>玄冥的全力，是一種讓人窒息的壓力。</p>\n<p>不是比喻，是字面意義上的窒息——那股靈力在他全力釋放的瞬間，以他的身體為圓心向外擴散，周圍半徑十丈的空氣全部在那一瞬間被壓縮，空氣密度驟增，落在人身上像是有什麼東西死死壓著胸口，肺葉試圖擴張卻沒有空間，呼吸道裡像是塞滿了什麼。</p>\n<p>白無極感覺到那股壓力的時候，下意識就把背脊挺直了。</p>\n<p>遠處還在整理傷亡的四大家族成員，最近的幾個人在感受到這股波及過來的壓力尾端之後，腿都軟了，往後退了好幾步才站穩。蘇家的一個年輕弟子直接跪下去，哆嗦著撐住地面，完全無法站立。</p>\n<p>契聖，還是那種踩在契聖頂端往上夠契神邊緣的契聖。</p>\n<p>白無極站在那股壓力的最核心，他的腿沒有軟，但他感覺到他的腳底下碎石在細細地顫動，那不是玄冥靈力的直接衝擊，而是他身體承受這個壓力、反射傳導到地面的震動。</p>\n<p>一個詞從他腦子裡冒出來：現在就可以啟動。</p>\n<p>白金之星的共鳴頻率已經完全穩定，Eternal的進化不只是時停時長的改變，在那十秒的靜止世界裡白無極摸到了一個他之前沒有意識到的東西——時停啟動之後的冷卻，也改變了。</p>\n<p>他不知道具體是多少，但能感覺到比以前短得多。</p>\n<p>「好，」他在心裡說，「那我們試試看。」</p>\n<p>玄冥的攻擊成形了，那是一道他從未見過的術式——不是直線的靈力壓縮，也不是他在前幾場戰鬥裡用過的精神力撕裂，而是一種環繞式的術式，從他身體上四個方位同時展開，像是要把眼前這個人從四個方向同時鑲入。</p>\n<p>圍殺術。</p>\n<p>他見過玄冥用這個術式，一個契聖在「圍殺術」下撐了不到三十秒就徹底崩潰，靈力防禦被從四個方向磨碎。</p>\n<p>那三十秒裡發生的事，不太適合細述。</p>\n<p>白無極看著那四個方向的靈力成形，在它完全形成之前，選了一個特定的時機——</p>\n<p>時停啟動。</p>\n<p>世界靜了。</p>\n<p>這次他站在玄冥正面，近到伸手就能碰到對方的衣袍，玄冥被定格在啟動攻擊術式的瞬間，臉上是一種完全的專注，眼神裡沒有任何多餘的東西，那是一個把殺人當成純粹技術動作的人的表情。</p>\n<p>白無極在靜止的世界裡看著他，客觀地承認——這個人確實很強。</p>\n<p>然後他低下頭，開始工作。</p>\n<p>黃金體驗。</p>\n<p>Eternal的時停世界裡，黃金體驗的工作效率和現實世界完全不同——在現實世界裡，黃金體驗的能力需要接觸目標才能啟動轉化，而且轉化有一個過程，對方的靈力越強，轉化需要的時間越長。</p>\n<p>但在靜止的世界裡，一切都是定格的，包括對方靈力的運動和抵抗，黃金體驗觸碰的目標沒有任何阻力。</p>\n<p>白無極蹲下身，把兩隻手平攤在玄冥周圍的地面上，黃金體驗跟著他，把手掌壓進廢墟的石縫、泥土、塵埃裡，那種金色的光沿著他的手指向外蔓延，緩慢但確定地，向周圍擴散。</p>\n<p>轉化。</p>\n<p>不是把地面轉化成普通的束縛物，那太簡單了，也太容易被靈力強行摧毀。白無極現在做的是一種更精細的轉化——把玄冥周圍半徑五丈範圍內的所有地面物質，轉化成具有靈識的生物。</p>\n<p>每一塊石頭。</p>\n<p>每一捧塵土。</p>\n<p>每一條裂縫。</p>\n<p>黃金體驗的能力核心是「創造生命，賦予現實」，它創造出來的生物是真正存在的，有靈識，有生存本能，有各自的方式感受世界。而且，最重要的一點，白無極在前幾章的戰鬥裡摸索出來的——黃金體驗創造的生物，對邪修的靈力有一種本能的抵抗。</p>\n<p>不是刻意設計的抵抗，是一種根本性的東西。</p>\n<p>邪修的靈力來源於對其他靈契的吞噬和污染，那種被污染的靈力對黃金體驗創造的純粹生命有一種本能的排斥反應，就像健康的免疫系統排斥病毒一樣，不是誰指揮的，就是在那裡，自然而然。</p>\n<p>白無極在靜止的世界裡，用了差不多七秒，在玄冥的周圍創造了四十三種生物。</p>\n<p>他後來自己也記不清楚，那七秒裡，他的腦子運轉的速度超過了他此前任何一次，他想到什麼就讓黃金體驗轉化什麼，不拘形狀，不拘大小，有的是他在記憶裡存著的異世界生物形象，有的是他從小看的動物頻道裡的東西，有的純粹是臨時拼湊的奇異組合——會纏繞的藤蔓生物，有穿刺喙部的飛行生物，有黏液的膠質生物，有尖刺外殼的甲殼生物，有鑽入地面然後從下方攻擊的蠕動生物……</p>\n<p>它們都是靜止的，因為時停，它們在靜止世界裡以「潛伏」的姿態存在，等待時間重啟的那一刻。</p>\n<p>等時間重啟，它們會得到靈識，然後它們會知道自己在哪裡，周圍有什麼，然後它們會……做它們本能的事。</p>\n<p>七秒。</p>\n<p>白無極站起來，往後退出那個範圍，把身位調整到一個相對安全的地方——他離玄冥大概十五丈遠，這個距離，時停結束後玄冥的術式打過來還有一小段路，那段路夠他反應。</p>\n<p>三秒用完。</p>\n<p>世界重啟。</p>\n<p>玄冥的圍殺術轟然成形，靈力向外釋放——然後卡住了。</p>\n<p>不是打到了什麼擋住，是地面在那一瞬間活了。</p>\n<p>四十三種生物同時從定格狀態中甦醒，靈識亮起，它們花了大概零點一秒識別了自己所在的環境，然後本能驅動了它們的行動。</p>\n<p>從玄冥腳下開始，地面裂開縫隙，蠕動生物從縫隙裡鑽出，纏上他的腳踝，往上爬；飛行生物從碎石後面竄出，衝向他的頭部和背部；藤蔓生物的根鬚從地縫裡伸出，在他的袍子上纏繞抓附；膠質生物黏附在他的手臂上，沉重的黏液讓他手臂的動作瞬間受阻；甲殼生物用外殼的尖刺刺進他的靈力防禦層，不是大面積破壞，而是像針一樣，精準地在防禦最薄的縫隙裡扎進去……</p>\n<p>玄冥的圍殺術在那一瞬間被打斷，因為他所有的注意力不得不分出來處理這一場突然爆發的混亂。</p>\n<p>那四十三種生物的每一種，都在以自己特有的方式攻擊他，所有攻擊同時發生，彼此之間沒有協調，但恰恰是因為沒有協調，所以沒有規律，玄冥無法建立起一套統一的防禦來應對——你打一個對手可以有策略，你打四十三個同時從不同方向、以不同方式攻擊你的對手，策略這個東西就很難有用武之地。</p>\n<p>白無極站在十五丈外，靜靜地看著。</p>\n<p>玄冥爆發了一段靈力，強行把周圍最近的幾種生物震飛，但震飛的它們在短暫的失控後又本能地找回方向，繼續往回衝。甲殼生物的尖刺在靈力爆發裡有一部分被摧毀，但沒有死，缺了刺的它繼續用身體壓住玄冥的腳，黏著不放。</p>\n<p>玄冥的靈力在高速消耗。</p>\n<p>不是因為他力量不夠，而是四十三個需要持續應對的目標，每一個目標本身不強，但每一個目標的死亡成本都不是零，他要消滅它們需要靈力，不消滅它們它們就繼續咬、繼續纏、繼續刺、繼續黏。</p>\n<p>而且，最令他不安的是——那些生物對他的邪修靈力有一種本能的排斥，他的靈力施加在它們身上的效果，比施加在普通生物身上的效果要差兩到三成。</p>\n<p>那不是設計，那是天然克制。</p>\n<p>玄冥皺眉，他是幾十年的老手，迅速判斷出了困境的本質：如果他繼續耗在這裡，這些生物不需要殺死他，光是消耗，就能把他的靈力磨得不夠用。</p>\n<p>「這個精神力使用者，」他在心裡說，「和任何一個我見過的精神力使用者，都不一樣。」</p>\n<p>白無極在十五丈外，聽不到玄冥心裡的話，但他看得出來玄冥陷入了真正的困境。</p>\n<p>他感覺了一下Eternal的冷卻——還有一點。</p>\n<p>但不急，先讓這些小夥伴們繼續工作。</p>\n<p>他在心裡悄悄統計了一下損耗，四十三種生物，到這個時候還有三十一種還在活躍，損耗了十二種，但玄冥的靈力因為持續分散應對，已經有可見的波動，那個穩定的契聖頂端氣場，開始出現細微的不穩定。</p>\n<p>白無極：「還不錯。」</p>\n<p>黃金體驗站在他肩上，看著戰場，它的表情裡是一種沉靜的專注，這種狀態白無極以前見過——這是它在認真的時候。</p>\n<p>「接下來，」白無極低聲說，「我們繼續。」</p>\n<p>白金之星的共鳴頻率在他腦海裡穩穩升起，冷卻完畢的感覺像是一個輕輕的響聲——</p>\n<p>時停啟動。</p>\n<p>第二次，十秒，神域開啟。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第104章_黃金體驗Requiem", "content": "<p>第104章　黃金體驗：Requiem</p>\n<p>玄冥的爆發比白無極預計的還要猛烈。</p>\n<p>第二次時停結束後，白無極在玄冥周圍又創造了一批生物，強化了原本還活著的那批，以為可以繼續消耗戰。但玄冥顯然也已經判斷出，再這樣耗下去對他沒有好處。</p>\n<p>他選擇了硬摧毀。</p>\n<p>不是針對那些生物，是針對白無極。</p>\n<p>那道靈力爆發時，整個廢墟戰場的地面都顫動了一下，像是有什麼東西在地底深處猛烈跳動了一拍，然後靈力以絕對碾壓的方式向外傾洩——不是術式，不是有目標的攻擊，就是純粹的靈力洪流，覆蓋性的，大範圍的，讓所有在這個範圍內的東西，無論是生物還是人，全部承受這股壓力。</p>\n<p>白無極周圍那些剩下的生物在那一瞬間全部失去靈識，碎裂，歸零。</p>\n<p>那道靈力繼續前推，衝向白無極。</p>\n<p>他沒有來得及再啟動時停——冷卻還沒有轉好，差了一口氣，那個感覺非常清晰，就差那麼一點點，而那一點點在現實戰鬥裡是一道不可逾越的牆。</p>\n<p>他試圖用黃金體驗擋，黃金體驗的小人張開手，金色光芒向外延伸，轉化在靈力前端形成一個屏障——</p>\n<p>玄冥的靈力洪流把那個屏障在零點三秒內撕開，然後打在白無極身上。</p>\n<p>衝擊不是從一個方向來的，那個大範圍的洪流把他整個人卷起來，在廢墟裡滾了一段，撞在一面殘牆上，那面牆轟然崩塌，他被壓在底下。</p>\n<p>靜了三秒。</p>\n<p>碎石在他身上慢慢位移，他把自己從廢墟裡扒出來，一隻手撐著地面，試圖站起來。</p>\n<p>傷了。</p>\n<p>不是輕傷，他能感覺到胸口有幾根骨骼的狀態不對，呼吸的時候有一種撕拉感，是骨骼碎片在挫動軟組織。他這個世界的肉身沒有煉體，靠的是精神力護體，現在精神力大量消耗，護體層早就薄了，那一下吃到了玄冥全力洪流的邊緣，邊緣都這樣，正面的話……</p>\n<p>白無極沒有往這個方向繼續想，因為沒有意義。</p>\n<p>他把手支在一塊完整的石頭上，半跪著，呼吸調整了幾下，試圖把胸口那個感覺壓下去。</p>\n<p>腦海裡，黃金體驗的小人從廢墟裡走出來，站在他面前，看著他。</p>\n<p>它的臉上有一種白無極從未見過的表情。</p>\n<p>那個表情，白無極盯著看了一秒，然後他懂了——那不是擔憂，那不是憤怒，那是一種非常深沉的、幾乎可以稱為「悲憫」的東西。</p>\n<p>黃金體驗在悲憫他。</p>\n<p>不是因為他受傷了，而是因為它看到了他承受的一切，它看到了他在這個世界裡為了什麼而戰，它看到了他在蘇念卿被扣押的瞬間那個「不行」背後的東西。</p>\n<p>它一直都看得見，從一開始就看得見。</p>\n<p>白無極在看到那個表情的瞬間，某種東西在他喉嚨裡哽了一下，不是難受，而是一種……被看見了的感覺。</p>\n<p>他和這個金色小人相處了這麼久，它一直都在，陪他打每一場仗，陪他從一個什麼都不懂的穿越者慢慢摸索出這個世界的規則，陪他在深夜一個人坐著想「我他媽的為什麼在這裡」的時候也不聲不響地待在他身邊。</p>\n<p>他從來沒有謝過它。</p>\n<p>他也沒有問過它，這一切，對它來說是什麼感受。</p>\n<p>「你，」白無極低聲說，喉嚨有點哽，「一直都知道，是嗎。」</p>\n<p>黃金體驗沒有回答，它不會說話，但它伸出手，把手放在白無極垂著的那隻手的手背上。</p>\n<p>那個接觸沒有任何溫度，沒有任何重量，他感覺不到任何物理意義上的觸碰——但他感覺到了。</p>\n<p>玄冥的腳步聲從廢墟那邊傳來，穩定而緩慢，那是一個有絕對把握的人走路的聲音。</p>\n<p>白無極深吸了一口氣，那口氣帶著胸口的撕拉感，他忍著，把氣息調平，試圖站起來。</p>\n<p>腿有點軟，他強迫自己站直了。</p>\n<p>「你已經到了極限，」玄冥的聲音從廢墟後面傳過來，平靜，「那個奇異的精神力是你的上限，但你的身體不是這個世界的靈契者，它很脆弱。你沒有更多牌了。」</p>\n<p>白無極扶著殘牆站著，低著頭，頭髮有幾縷垂下來擋住了他的眼睛。</p>\n<p>玄冥繞過廢墟，出現在他的視野裡，距離很近，他走的這段路不緊不慢，顯然不認為這個年輕人還有什麼反擊能力。</p>\n<p>「你做得很好，」玄冥說，在他這個位置這是一種很高的評價，「你讓我付出了比預期更多的代價。但結果不會改變。」</p>\n<p>他舉起右手。</p>\n<p>靈力再次凝聚，這一次不是大範圍的洪流，是針對一個目標的、精準的、足以穿透現在這個年輕人的殘餘防禦的精準打擊。</p>\n<p>白無極看著那道靈力成形。</p>\n<p>然後他感覺到了一件事——腦海裡，那顆金球，不是白金之星，是黃金體驗，那顆金球，在他重傷之後，反而以一種奇異的方式，達到了它從來沒有達到過的一個頻率。</p>\n<p>那個頻率，讓他想起一個詞。</p>\n<p>極限。</p>\n<p>黃金體驗的小人抬起頭，看著他。那個悲憫的表情已經不在了，換成的東西更深沉，更安靜，一種白無極用語言很難準確描述的東西——像是「完成了」，但又不是那麼簡單。</p>\n<p>玄冥的攻擊打出來了。</p>\n<p>那道靈力穿過廢墟的空氣，向白無極飛來，速度極快，那種精準性代表它會完整地打在白無極胸口——</p>\n<p>打在了他身上。</p>\n<p>然後消失了。</p>\n<p>不是被擋住，不是被偏轉，是消失了，像是一道筆畫被橡皮擦擦過，像是這件事從來沒有發生過，那道靈力不在了，白無極身上沒有任何新的傷，廢墟的地面也沒有任何多餘的痕跡。</p>\n<p>玄冥站著，怔了一秒。</p>\n<p>然後他再打。</p>\n<p>同樣的消失。</p>\n<p>再打。</p>\n<p>消失。</p>\n<p>三次，每一次一樣的消失，像是這個世界在某個根本性的層面上，已經決定了「這件事不會發生」，所以不管玄冥多少次啟動攻擊，多少次讓靈力飛向那個目標，因果在最源頭的地方就已經把那個結果抹除了。</p>\n<p>玄冥停下來，第一次在這場戰鬥裡，真正無法判斷眼前發生的事情。</p>\n<p>白無極低著頭，也怔了一秒。</p>\n<p>他感覺著自己的身體——第三下之後，他確定了，攻擊確實打在他身上了，他能感覺到那個衝擊落下來的那一刻，然後那個衝擊消失了，連帶著那一刻發生的一切，一起消失了。</p>\n<p>不是護身，不是防禦，而是——那件事，從因果上，就沒有發生過。</p>\n<p>白無極緩緩抬起頭。</p>\n<p>他看著黃金體驗的小人，那個小人也看著他，那個「完成了」的表情，白無極現在能更清楚地讀懂它了。</p>\n<p>那個表情說的是：這是我最後能給你的東西。</p>\n<p>「這是什麼？」白無極低聲問，不是問任何人，是問那個現在在他精神海裡以全新姿態存在的東西。</p>\n<p>黃金體驗。</p>\n<p>Requiem。</p>\n<p>因果歸零。</p>\n<p>任何對他的攻擊，任何試圖傷害他的行為，都永遠無法到達真實的他——不是打不穿，而是在因果的最源頭，那個「打到他」的結果就不存在。</p>\n<p>「……」</p>\n<p>白無極站著，把這個能力的意義在腦子裡理了一圈，理出來之後，他站著沉默了大概五秒。</p>\n<p>然後玄冥第四次抬手。</p>\n<p>打在他身上。</p>\n<p>消失。</p>\n<p>玄冥：「……」</p>\n<p>白無極：「……」</p>\n<p>戰場上的風吹過，帶走一些碎石塵土，也帶走一些奇怪的沉默。</p>\n<p>「所以，」白無極慢慢開口，聲音有點奇怪，像是一個試圖用平靜語氣描述一件完全不平靜的事的人，「我現在是……打不到的那種？」</p>\n<p>玄冥沒有回答，他的眼神不再是評估，是真正的迷惘。</p>\n<p>白無極低頭看了一眼黃金體驗，它站在他旁邊，穩穩的，那身金色光芒比以往任何時候都更深，更實在，像是一個終於到達了自己應該在的地方的東西。</p>\n<p>因果歸零。</p>\n<p>Requiem。</p>\n<p>白無極緩緩吐出一口氣。</p>\n<p>然後他感覺了一下Eternal的冷卻，已經轉好了。</p>\n<p>他直起腰，把那幾根碎肋骨的不對勁壓到意識底層，腿站直，面對玄冥，臉上的表情從那種沉默回到了一種更平靜的東西。</p>\n<p>「好，」他說，「現在換我問你了。」</p>\n<p>玄冥沒有開口。</p>\n<p>「你打算怎麼辦？」</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第105章_邪修首領的末路", "content": "<p>第105章　邪修首領的末路</p>\n<p>玄冥沒有慌亂。</p>\n<p>這是他真正讓白無極感到某種程度上的「對手感」的地方——在發現自己的攻擊對眼前這個人完全無效之後，他用了大概三秒時間，讓自己完全平靜下來，像是一台精密的運作機器在遭遇外部衝擊之後，冷靜地讀取損失，然後重新計算。</p>\n<p>「精神力，」他說，「還是精神力。你的力量全部來自精神力，那個讓時間停止的東西是精神力，那個讓攻擊消失的東西也是精神力。」</p>\n<p>白無極站著，沒有否認。</p>\n<p>「精神力是有極限的，」玄冥繼續說，「你現在這個狀態，受了重傷，精神力的消耗已經在負荷的邊緣，那個讓攻擊消失的能力，需要消耗嗎？」</p>\n<p>白無極想了一下，誠實回答：「不知道。」</p>\n<p>這個回答讓玄冥停了一下，他顯然沒有預期對方會這樣回答。</p>\n<p>「你在說笑？」</p>\n<p>「沒有，我是真的不知道，」白無極說，「這個東西剛才才出現，我還沒摸清楚。」</p>\n<p>玄冥沉默了幾秒，看著他，像是在判斷這是不是一種心理戰術。</p>\n<p>然後他得出了結論——不是。這個年輕人說謊的時候有一種很容易看透的特徵，但他現在說這句話的時候，那個特徵不在，他是真的不清楚自己的能力邊界。</p>\n<p>這反而讓玄冥的局面更難判斷。</p>\n<p>「如果它有消耗，我拖著你，讓你精神力耗盡，那個能力自然消失。」</p>\n<p>「如果它沒有消耗，」白無極接著說，幫他把話說完，「你就是打不到我。」</p>\n<p>玄冥：「……對。」</p>\n<p>白無極聳了聳肩，「那你還有別的選項嗎？」</p>\n<p>玄冥沒有立刻回答，他在思考，那個思考的過程白無極隱約能看出來，因為玄冥的眼神有一種微妙的運動，像是在調用大量的記憶和知識在快速搜尋。</p>\n<p>然後他找到了一個東西，白無極看到他眼神裡出現了一種鋒利的光——</p>\n<p>「蘇家那個女孩，」玄冥說，「那個能力能讓你不受傷，但它能讓她不受傷嗎？」</p>\n<p>白無極的表情沒有變化。</p>\n<p>「你已經試過那個方法了，」他說，「效果怎麼樣，你自己知道。」</p>\n<p>那句話讓玄冥想起副將，那個人現在還裹在藤蔓繭裡，沒有死，但也沒有任何行動能力。他們這邊的邪修，從白無極啟動新能力之後，到現在已經有不少人選擇逃跑或者投降——不是因為懦弱，是因為那個沒有任何攻擊能打到他的畫面，太過打擊士氣。</p>\n<p>玄冥環視了一下周圍。</p>\n<p>他的手下，還剩多少。</p>\n<p>「你在清點，」白無極說，「算出來了嗎？」</p>\n<p>玄冥轉回來看他，眼神裡第一次出現一種很克制但確實存在的東西——疲憊。不是身體疲憊，而是一種更深的東西，像是某個長期承受著的重量，在這一刻終於從某個縫隙透出來了一點點。</p>\n<p>白無極看到了那個東西。</p>\n<p>他沒有說話，等著。</p>\n<p>「你的精神力，」玄冥說，聲音比之前低了一些，「從你出現到現在，我一直在感受它。那種精神力的質地，我見過，很久很久以前見過。」</p>\n<p>「是嗎，」白無極說，「在哪裡見過。」</p>\n<p>「書裡。」</p>\n<p>白無極：「……」</p>\n<p>「一本很古老的書，記載著一段被刻意抹除的歷史，」玄冥說，「那段歷史裡有一種力量，在靈契體系確立之前存在，後來消失了，有人說是被封印了，有人說是自然枯竭了，沒有定論。那種力量被稱為——」</p>\n<p>「精神力，」白無極說，「我知道。」</p>\n<p>玄冥停了一下，「你知道。」</p>\n<p>「知道一些，」白無極說，「不多。」</p>\n<p>他們就這樣面對面站著，廢墟裡的風繼續吹，遠處還有交戰聲，但這個區域有一種奇特的靜，像是兩個人站在一個暫時脫離了周圍戰場的位置，說著另一件事。</p>\n<p>「那你知道那段歷史的結局，」玄冥說，「那種力量消失的原因。」</p>\n<p>「你要告訴我嗎？」</p>\n<p>「不，」玄冥說，「我只是想說，你的力量很強，但你還不知道你在對抗什麼。」</p>\n<p>白無極看著他，等著。</p>\n<p>「算了，」玄冥說，把那半句話吞回去，「這不是我應該說的。」</p>\n<p>他抬起手，再次蓄力——不是之前那種大範圍洪流，也不是精準打擊，而是一種白無極看不懂的術式，那個術式的方向不是對著他，而是對著地面。</p>\n<p>「你的能力是讓攻擊消失，」玄冥說，「那如果我攻擊的不是你呢。」</p>\n<p>地面爆炸了。</p>\n<p>不是靈力爆炸，而是從地面到腳下的完整崩裂，那個術式把白無極腳下的地基全部化成粉塵，讓整個人失去立足點，在重力和靈力共同的作用下，向下墜落——</p>\n<p>白無極在開始墜落的瞬間就啟動了時停。</p>\n<p>Eternal，十秒。</p>\n<p>世界靜了。</p>\n<p>他懸在空中，那個墜落的姿態被定格，塵土和碎石也在空中定格。玄冥站在對面，臉上帶著那個術式的後續判斷，也定格了。</p>\n<p>十秒。</p>\n<p>白無極在靜止的空中，把姿態調整過來，踩著定格的碎石，找到了一個能落腳的點，然後借著黃金體驗，在玄冥的腰部位置，創造了一組緊密糾纏的藤蔓根系，根系連接著地面下三丈的岩層，足以承受一個人的重量。</p>\n<p>然後他走到玄冥面前。</p>\n<p>十秒很夠了。</p>\n<p>他站在玄冥面前，正面對著他，那個定格的臉上有什麼東西，白無極細看了一下，然後移開視線。</p>\n<p>白金之星，Eternal，十秒靜止世界，最純粹的攻擊無敵。</p>\n<p>黃金體驗，Requiem，因果歸零，最純粹的防禦無敵。</p>\n<p>攻無不克，防無不破。</p>\n<p>沒有什麼漏洞，沒有什麼破解方法，就是在這個意義上，完整的、不可動搖的、無法被推翻的——</p>\n<p>無敵。</p>\n<p>時間重啟。</p>\n<p>玄冥的術式的後續落下，但白無極已經站在穩定的地面上，那個「讓地面崩塌」的攻擊，在Requiem的因果歸零下，消失了。</p>\n<p>玄冥發現自己的腰被藤蔓固定，身體的動作受到限制，他的靈力試圖切斷那些藤蔓，但黃金體驗創造的生物不是普通藤蔓，切不斷，燒不盡，反而越掙越緊。</p>\n<p>白無極站在他面前，一丈距離。</p>\n<p>「我前面說了，我記性很好，」他說，「剛才那些，一條一條，都記著。」</p>\n<p>他抬起右手，白金之星的光芒圍繞著他的拳頭，星空色的光芒在廢墟的空氣裡靜靜燃燒，不是燦爛的，是深沉的。</p>\n<p>「還有她被你的人扣著的那幾分鐘，」他說，聲音非常平，「這個要算利息。」</p>\n<p>ORA。</p>\n<p>第一拳打實。</p>\n<p>玄冥的靈力防禦在白金之星的加持下，在白無極完全不需要擔心反擊的情況下，被打出一個缺口，那種缺口不大，但它真實存在。</p>\n<p>ORA。</p>\n<p>第二拳，同樣的位置，讓那個缺口更深。</p>\n<p>玄冥嘗試反擊，打出靈力——</p>\n<p>消失了。</p>\n<p>Requiem在每一次攻擊上都平靜地工作著，不管那個攻擊有多強，有多快，它都平靜地把那個結果從因果鏈上抹除。</p>\n<p>ORA ORA ORA。</p>\n<p>白無極沒有停，連擊不是爽文裡的那種節奏感，是一種非常實際的戰術選擇——玄冥的靈力防禦極強，需要持續的破壞來累積裂縫，每一拳單獨看都不足以打穿，但持續連擊的每一拳都精準地落在同一個累積的裂縫上，像是在一塊岩石上持續用同樣的力道鑿同一條縫。</p>\n<p>周圍的邪修看到這個場面，有幾個徹底放棄了，丟下兵器跪了下來。</p>\n<p>有幾個想衝進來，被四大家族那邊的人攔住了。</p>\n<p>蘇念卿靠著石牆，霜翎盤在她肩膀上，她看著白無極打出的每一拳，一言不發。</p>\n<p>白無極的胸口還在痛，碎肋骨的不舒服沒有消失，他只是把它放在一個他決定暫時不去感受的地方。他的精神力在消耗，但消耗的速度在可接受的範圍內，連擊本身的精神力消耗不大，大的是Eternal的啟動，但Eternal他沒有再次啟動，這場打法不需要時停，Requiem已經足夠讓他無所顧忌地近身。</p>\n<p>玄冥的靈力防禦在第二十七拳的時候出現了可見的崩裂。</p>\n<p>白無極感覺到了那個崩裂，換了一個角度，下一拳打向那個崩裂的核心。</p>\n<p>玄冥退了一步。</p>\n<p>那是整場戰鬥裡，他第一次後退。</p>\n<p>「精神力……」他開口，那個崩裂的防禦讓他的聲音有一點點的顫動，他在盡力保持平靜，但白無極能聽出來那個保持的努力，「精神力……真的回來了……」</p>\n<p>他的身體開始傾倒，那個動作很慢，像是一個高大的建築物在所有承重點都失效之後的倒塌，有一種奇怪的莊嚴感，和倒下的速度本身不相稱。</p>\n<p>白無極站著，看著他倒下。</p>\n<p>玄冥的眼神在倒下的瞬間還是睜著的，那雙眼睛望著天空，望著廢墟上方的那一片灰白色的天，嘴角有一個很輕微的弧度。</p>\n<p>不是笑，是某種非常複雜的表情，最後穩定成那個形狀，然後在他的意識完全消失之前，固定在那裡。</p>\n<p>白無極低頭看著他，沉默了幾秒。</p>\n<p>「精神力真的回來了，」他在心裡把那句話過了一遍，「所以你知道這件事。」</p>\n<p>他把這個細節收進去，放好。</p>\n<p>然後他抬起頭，看著戰場上還剩下的邪修，以及開始鬆動的戰線。</p>\n<p>玄冥倒了。</p>\n<p>那個消息在接下來的幾分鐘裡，以一種非常快速的方式擴散開去。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第106章_戰後", "content": "<p>第106章　戰後</p>\n<p>消息擴散的方式比白無極預想的還要快。</p>\n<p>玄冥倒下去的時候，最近的幾個邪修首先感受到了——不是看到，是感受到。玄冥的靈力場存在就像一個龐大的磁場，這麼多年的積累讓那個磁場已經成了邪修們本能的一部分，他們隨時都能感覺到它的存在，不需要任何意識上的感知。</p>\n<p>然後那個磁場消失了。</p>\n<p>就是這樣，它在某一個瞬間，從所有人的感知裡消失了。</p>\n<p>反應最快的幾個人，在那個消失降臨的一秒之後，已經開始往反方向跑了。不是撤退，是潰逃，兩者的區別是有沒有目的地，有沒有建制，有沒有人在統籌。潰逃是純粹的本能，是獸性在理性之前率先做出的判斷——首領倒了，我要跑。</p>\n<p>白無極站在廢墟裡，看著那個潰逃像是漣漪一樣從他所在的地方向外擴散。</p>\n<p>遠處，四大家族的人們感受到了那個轉變，幾個契聖快速交換了眼神，沒有開口，達成了一致。慕容家的戰隊第一個壓上去，跟著是江家的弟子，然後是蘇家和陳家，整個戰場的態勢在不到兩分鐘的時間裡完全倒轉。</p>\n<p>追擊，清場。</p>\n<p>天契城保衛戰，進入了最後的掃尾。</p>\n<p>白無極站在原地，感覺到腿有點軟，不是恐懼，是純粹的力竭。他把重心往旁邊的殘牆上靠了一些，那面牆還算堅固，勉強撐住。他的胸口還在疼，那幾根碎肋骨的問題沒有辦法靠意志力解決，需要有人幫他看。</p>\n<p>但現在不是時候。</p>\n<p>他就這樣靠著殘牆，看著清場的進行，看著天契城的廢墟，看著那些還站著的人在廢墟裡穿行，有的在救人，有的在追擊，有的在清點同伴。</p>\n<p>風裡夾著血腥氣，還有燃燒過的土地特有的焦味，以及……白無極辨識了一下，還有一種他說不清楚的氣味，沉重的，潮濕的，像是大雨之後泥土翻起的那種氣息，但更深，更濃，帶著一種讓人說不清楚的悲涼。</p>\n<p>是死亡的氣息。</p>\n<p>不是一兩個人，是很多人。</p>\n<p>這場仗打完，兩邊都有代價，這一點白無極很清楚，他只是沒有親眼看到那些傷亡，他一直在戰場最前端和玄冥對打，其他地方發生的事，他沒有辦法同時關注。</p>\n<p>現在他看著那些收攏傷亡的人，感覺到某種東西沉在胸口，和碎肋骨的痛是不同的東西，那是另一種重量。</p>\n<p>腳步聲。</p>\n<p>他沒有抬頭，感覺到有人走近，然後停在他旁邊。</p>\n<p>蘇念卿。</p>\n<p>她沒有說話，霜翎縮在她的髮間，十二條尾巴收得很小，安靜地待著。蘇念卿靠著殘牆，和他站著的姿勢對稱，也把重心搭在牆上，然後低頭看了看他的手——他的右手指節上有血，一部分是玄冥的，一部分是他自己的，蜷握的時候傷口裂開。</p>\n<p>她沒有說「你受傷了」，也沒有說「讓我看看」，就是看了那個手一眼，然後轉回來繼續看廢墟。</p>\n<p>白無極感覺到她看那個手的視線，也沒有說話。</p>\n<p>兩個人就這樣站著，看著清場的進行，直到遠處的交戰聲慢慢稀疏，最後安靜下來。</p>\n<p>然後腳步聲從多個方向同時靠近，白無極抬起頭。</p>\n<p>四大家族的幾個核心人物，在清場接近尾聲的時候，聚攏過來，向他站著的方向走。走在最前面的是蘇長淵，旁邊是慕容玄，江家的長老在後面兩步，陳家家主跟著，他們身後跟著各自家族的幾個主要戰力。</p>\n<p>不只是他們。</p>\n<p>周圍廢墟裡還沒有離開的靈契者，也在跟著走向同一個方向——那些人不是家族核心，是普通弟子，是士兵，是援軍裡的普通成員，他們在走動，但走動的方向是一致的，都在向白無極所在的位置靠攏。</p>\n<p>白無極感覺到了一種讓他有點不自在的壓力。</p>\n<p>蘇長淵走到他面前，停下來，看了他一眼，然後看了一眼他身後那個倒下的玄冥，再看回白無極的臉。</p>\n<p>然後，蘇長淵單膝跪下去了。</p>\n<p>那個動作沒有猶豫，沒有遲疑，乾淨利落，他跪下去的時候膝蓋落在廢墟碎石上，那個聲音很輕，但在四周沉寂的戰場裡，清清楚楚。</p>\n<p>慕容玄在他旁邊慢了半秒，跟著跪下去。</p>\n<p>江家長老，陳家家主，然後是他們身後的人，一個接一個，那個動作像是一種波，沿著廢墟擴散開去。</p>\n<p>沒有人說話，沒有人喊口號，就是跪下去，沉默地，以這個姿態面對那個站在廢墟裡靠著殘牆的年輕人。</p>\n<p>白無極站著，感覺到了那個被注視的感覺，那是一種讓他脊背有點微妙的東西，他想了想，決定先開口。</p>\n<p>「起來，」他說，聲音有點乾，「幹嘛，我腰不好，受不了這個。」</p>\n<p>沒有人立刻動。</p>\n<p>白無極：「……真的，我是說真的，我腰不好，你們這樣跪著，我回憶起小時候被長輩教訓的感覺，很不舒服。」</p>\n<p>蘇長淵先站起來，他站起來的時候動作很穩，那種穩是一個經歷了大半場戰鬥還能保持體力的人的穩，但白無極在他站起來之後，看到他的眼眶。</p>\n<p>有點紅。</p>\n<p>不是剛哭過，是那種努力控制著不要溢出的狀態，那種狀態下眼眶的紅，是最真實的。</p>\n<p>白無極沒有說話，等著。</p>\n<p>「謝謝，」蘇長淵說，那兩個字說得很平，平到幾乎沒有音調，但白無極聽到了，那個平靜背後的東西，比任何情緒激動的表達都要重，「謝謝你回來。」</p>\n<p>白無極看著他，沉默了一下。</p>\n<p>然後說：「算了，今天的事我記帳了，以後有機會還。」</p>\n<p>蘇長淵怔了一下，看著他。</p>\n<p>「我不是喜歡做好人做到底的那種，」白無極繼續說，語氣非常認真，「記帳的意思是真的記帳，不是客氣。你家的伙食費，蘇念卿那個霜翎對靈獸用的通路費，還有之前我在蘇家的住宿費，一起算，下次找時間把帳本理出來。」</p>\n<p>蘇長淵沉默了很長的幾秒，然後點了點頭，「好。」</p>\n<p>慕容玄站起來，拍了拍膝蓋上的塵土，看著白無極：「帳本的事等以後說，你現在看起來不太對，讓人看看傷。」</p>\n<p>「幾根肋骨，沒問題，」白無極說，「等人手寬裕了再說，現在肯定有更需要的。」</p>\n<p>「不行，」蘇念卿在他旁邊開口，聲音沒有起伏，「一直不處理會影響精神力的恢復。」</p>\n<p>白無極看了她一眼。</p>\n<p>她沒有看他，視線向前，那個側臉非常平靜，但她說那句話的語氣是一種白無極已經聽出來是什麼的語氣——那是她在擔心的時候說話的方式，她不會說「我擔心你」，她說的是更具體的東西，具體到一個讓她沒有辦法反駁的理由。</p>\n<p>白無極沒有再說什麼，點了個頭，「那就讓人看看。」</p>\n<p>慕容玄轉頭，叫了一個擅長療傷的弟子過來。</p>\n<p>其他人也開始散開，重新投入清場和救援的工作，那個短暫的聚攏結束了，但它留下的東西沒有消失，那個沉默的單膝跪地，那個被壓在語氣最底下的「謝謝你回來」，那些都在廢墟裡，留在所有在場的人的記憶裡。</p>\n<p>白無極在療傷弟子開始處理肋骨的時候，把眼神投向遠處廢墟的輪廓，天契城的城牆有一段倒塌了，但大部分還在，城內的建築損毀了很多，但城還在。</p>\n<p>保住了。</p>\n<p>他在心裡把這件事確認了一下，然後感覺到某種鬆弛，從肩膀開始，慢慢往下散。</p>\n<p>代價是有的，有人回不來了，那個重量不會因為城保住了就消失，它一直都在，今後也在。</p>\n<p>但城在，人在，那就還可以繼續。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第107章_真正的敵人", "content": "<p>第107章　真正的敵人</p>\n<p>傷勢處理完之後，白無極把玄冥的屍體附近走了一圈。</p>\n<p>不是出於什麼特別的目的，只是他在等傷勢處理、在廢墟裡坐著休息的時候，有一個念頭一直沒有離開：玄冥最後說的那句話。</p>\n<p>「精神力……真的回來了……」</p>\n<p>那不是一個臨死前的隨機感嘆，那是一個見多識廣的人，在看到某樣東西之後，發出的確認——他認識精神力，或者說他認識關於精神力的某些東西，那種認識讓他用了「真的回來了」這個措辭。</p>\n<p>「回來」，代表它曾經存在，然後消失，然後現在重新出現。</p>\n<p>白無極把這個邏輯在腦子裡理了一遍，然後決定去找找看玄冥身上有沒有什麼值得看的東西。</p>\n<p>玄冥倒下的地方，已經被四大家族的人圍起來，幾個蘇家的年輕弟子在外圍守著，那個安排是蘇長淵做的，他是個謹慎的人，知道首領的屍體可能有情報價值，所以沒有讓人隨意翻動。</p>\n<p>白無極走過去，守門的弟子認出他，往旁邊退了半步，讓開一個路。</p>\n<p>他蹲下來，開始在玄冥的袍子上找。</p>\n<p>不是那種挑選式的搜索，是地毯式的，把每一個可能藏東西的地方都過一遍，他的手指在衣袍的內層找到一個縫紉過的暗袋，暗袋裡裝著三樣東西：一個貌似通訊用的結晶球，一個小巧的靈器，以及一塊石板。</p>\n<p>那塊石板不大，比手掌略小，厚度大概半寸，材質不像是這個地區常見的石料，顏色接近深灰，但帶著一種非常輕微的藍色光澤，摸起來略有溫度，不是體溫傳導的溫度，而是它本身就帶著的。</p>\n<p>石板的正反兩面都刻著符文。</p>\n<p>不是白無極認識的符文，他在這個世界這麼久，見過不少靈契符文，也跟著蘇家的書庫翻過各種記載，對這個世界的文字有基本的辨識能力，但石板上的符文，他看了兩遍，確認自己完全認不出任何一個。</p>\n<p>他把這三樣東西收好，站起來，往蘇長淵那邊走。</p>\n<p>蘇長淵在和幾個長老說話，看到白無極走過來，往旁邊讓了讓位置。</p>\n<p>「這個，」白無極把石板拿出來，遞給他，「在玄冥身上找到的，你看得出來是什麼嗎？」</p>\n<p>蘇長淵接過去，先看了正面，表情沒有特別的變化，然後翻到背面——他的眼神停了一下。</p>\n<p>「慕容，」他轉過頭，叫了一聲，「過來看看。」</p>\n<p>慕容玄走過來，接過石板，眯著眼看了幾秒，然後他的眉頭皺起來了，那個皺眉不是困惑，更接近確認到了某件他不太想確認的事情的皺眉。</p>\n<p>「通訊符，」他說，「不普通的那種，是遠程通訊用的高等符陣。而且這個符文的刻法，我見過——」他停了一下，「在《天衍前志》裡見過。」</p>\n<p>蘇長淵的臉色變了一些，那個變化很細微，但白無極注意到了。</p>\n<p>「《天衍前志》，」白無極重複這個名字，「是什麼。」</p>\n<p>蘇長淵沉默了一下，然後說：「蘇家的藏書之一，記載大陸靈契體系確立之前的歷史，非常古老，有些部分的記載對現在的靈契者而言幾乎難以置信，所以大部分人把它當作傳說性質的典籍，不當作信史。」</p>\n<p>「裡面有關於精神力的記載嗎，」白無極問。</p>\n<p>蘇長淵再次沉默，這次更長，他看著白無極的眼神有一種在考量什麼的東西，最後點了個頭，「有。」</p>\n<p>「那這個符文，」白無極指了指石板，「和裡面什麼內容相關。」</p>\n<p>「封印者，」慕容玄開口，代替蘇長淵回答，他的聲音很平靜，像是在陳述一件需要距離感才能說出口的事，「《天衍前志》裡有關於一個被稱為「封印者」的存在的記載，那個存在使用的符文體系，和這塊石板上的，高度相似。」</p>\n<p>白無極把石板握在手裡，感覺著那個從石板傳來的輕微溫度。</p>\n<p>「封印者，」他說，「封印什麼。」</p>\n<p>「封印了精神力，」慕容玄說，「以及其他一些東西，書上的記載不完整，而且我現在也不確定書裡說的和眼前這個東西是不是同一件事，我需要把書拿來對照。」</p>\n<p>「對照要多久。」</p>\n<p>「如果今晚開始，明天應該有結論，」慕容玄說，「但結論未必是好消息。」</p>\n<p>白無極把石板在手裡翻了一下，看著那些他不認識的符文，那些符文刻得非常精細，不是隨手刻的，是一個對自己刻的東西非常熟悉的人刻的，那種熟悉帶來的流暢感甚至有一點奇異的美。</p>\n<p>「所以玄冥是被人指使的，」他說。</p>\n<p>不是問句，是陳述。</p>\n<p>「這塊石板是通訊符，代表他在和某人保持聯繫，而那個人使用封印者的符文，」白無極繼續說，「換句話說，玄冥帶著這麼多邪修來攻打天契城，不是他自己的決定，是有人讓他來的，或者，有人在他背後推著他來的。」</p>\n<p>慕容玄：「這個推斷是合理的。」</p>\n<p>「那個在他背後的人，」白無極說，「你覺得是什麼。」</p>\n<p>慕容玄看著他，沉默了一會兒，然後說：「白小兄弟，你到這個世界多久了？」</p>\n<p>這個問題讓白無極愣了一下，然後他明白了那個問題的意思，「你知道我不是本地人。」</p>\n<p>「有猜測，」慕容玄說，「從你第一次使用精神力的時候開始猜，後來越來越確定。這個世界的精神力使用者，不是沒有，是已經很久很久沒有了，而你使用它的方式，和古籍記載裡的方式完全吻合，但你顯然不是在這裡學的。」</p>\n<p>白無極：「……算你聰明。」</p>\n<p>「問你這個問題，是因為有些事，」慕容玄說，「你也許不在這個世界的時候就已經接觸過了，以一種你沒有意識到的方式。」</p>\n<p>那句話讓白無極沉默了幾秒。</p>\n<p>他想到了那兩個替身，想到了黃金體驗，想到了白金之星，想到了它們的形態，它們的能力，它們的名字——他從來沒有在這個世界看到過任何和它們形態相似的東西，它們的設計、它們的風格，都是他從小的記憶裡的東西。</p>\n<p>有人在他穿越之前，就已經把這兩個東西放在他身上了嗎。</p>\n<p>「這個問題，」白無極說，「我回頭再想。現在的問題是，」他把石板握得更緊了一下，「玄冥背後的那個存在，接下來會怎麼動？」</p>\n<p>「會繼續動，」蘇長淵開口，他的聲音很平，但那個平靜有一種重量，「玄冥失敗了，但計畫如果沒有達到它的目的，那個存在不會就此停手。」</p>\n<p>「你說的計畫，」白無極問，「你知道它的目的是什麼嗎？」</p>\n<p>蘇長淵和慕容玄交換了一個眼神。</p>\n<p>「不確定，」蘇長淵說，「但有一個方向的猜測。等慕容老先生把《天衍前志》對照完，應該能更清楚。」</p>\n<p>白無極把石板在手裡轉了一下，放進衣袍裡的口袋。</p>\n<p>「好，」他說，「那今晚先讓大家休息，明天再說。」</p>\n<p>他往廢墟外走了幾步，停下來，沒有回頭：「對了，玄冥那句話，「精神力真的回來了」——他說的「回來」，應該不只是說我一個人。他是說，精神力這件事，本身回來了。」</p>\n<p>沒有人回答，但他也不需要回答，這句話只是他把自己的判斷說出來，讓它留在空氣裡。</p>\n<p>他繼續往外走。</p>\n<p>背後，慕容玄低聲對蘇長淵說：「他很快。」</p>\n<p>蘇長淵沒有說話，點了個頭。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第108章_蘇念卿的告白", "content": "<p>第108章　蘇念卿的告白</p>\n<p>戰後深夜，天契城還沒有睡。</p>\n<p>整個城在廢墟的狀態下亮著燈，那些燈不是慶祝的燈，是正在工作的燈——療傷的，清理的，搜救的，統計傷亡的，整理物資的，修繕最危險的結構的。每一盞燈背後都有人，每一個人都在做某件需要做的事，那種忙碌不是喧鬧的，而是一種沉默的、疲憊的、但還在繼續的忙碌。</p>\n<p>白無極坐在城牆的一段比較完整的地方，腿垂著晃。</p>\n<p>那個姿勢不太莊重，腿從城牆邊緣垂下去，腳尖踢著空氣，像個閒著沒事的人在等公交車，完全不像一個幾個小時前剛打完一場決定性戰役的人。但他確實就是這樣坐著，因為他找不到更舒服的方式，躺下來肋骨會頂著，站著腿痠，索性就坐在這裡，讓腿自己晃著。</p>\n<p>夜風很涼，帶著廢墟的焦味和泥土氣息，以及從城外吹進來的野地氣味。</p>\n<p>白無極把手搭在城牆邊沿，低著頭，看著天契城在下方展開的輪廓。那些燈火，那些在廢墟裡穿行的身影，那些廢墟本身——有些建築的斷面在燈火的映照下有一種奇異的紋路，像是某種被橫截的地層，把它的過去和現在都暴露出來。</p>\n<p>他在這裡待了大概半個時辰。</p>\n<p>沒有想什麼特別的事，有時候什麼都沒想，有時候一個念頭飄過來，停一下，飄走，他沒有刻意去追它。今天的事太多，信息量太大，他的腦子不想在這個時候做整理，它需要先停一下，讓所有東西沉澱。</p>\n<p>腳步聲從城牆上的臺階傳來。</p>\n<p>不算輕，也不算重，是一種很穩定的步伐，白無極不用回頭就知道是誰。這個世界裡他認識的腳步聲不多，但蘇念卿的他聽了夠久，聽得出來。</p>\n<p>她走過來，站到他旁邊，看了一眼他坐著的位置，然後也坐下來，腿同樣垂到城牆外側，兩個人並排，看著城裡的燈火。</p>\n<p>霜翎沒有出來，它留在她的髮間，安靜地縮著。</p>\n<p>沉默了一段時間。</p>\n<p>不是尷尬的沉默，那種沉默有一種質感，是兩個人都不需要開口填充、自然存在的安靜，像是把彼此的存在當成一種理所當然的背景，不需要特別確認。</p>\n<p>城裡有人在喊話，是在協調搬運物資的位置，那個聲音在夜風裡傳過來，很遠，但清晰。旁邊有一個方向，有人在低聲說話，聲音很輕，白無極聽不清楚說的是什麼，但能感覺到那是在安慰什麼人，或者在陪著什麼人。</p>\n<p>白無極低著頭，把視線放在下方的一盞特別亮的燈上，那盞燈在一個開闊一些的廢墟空地，那個空地上有幾個人在忙著什麼，他看不清細節。</p>\n<p>然後他感覺到一隻手碰到了他的手。</p>\n<p>不是碰，是握住。</p>\n<p>蘇念卿的手，從旁邊伸過來，把他搭在城牆邊沿的手握住了。</p>\n<p>就這樣。</p>\n<p>沒有說話，沒有任何鋪墊，也沒有任何解釋，她的手指扣在他的手背上，那個力道不輕不重，像是她確認過自己要這樣做，然後就這樣做了。</p>\n<p>白無極愣了一秒。</p>\n<p>不是不知道這是什麼意思，是那一秒裡他的大腦先於他做了一個暫停，就像程式碰到了一個需要確認的操作，停了一下，確認了，然後繼續。</p>\n<p>他低下頭，看了看她握住他的手。</p>\n<p>她的手比他的小，指節細，虎口那裡有一點繭，那是長期和霜翎互動留下的痕跡，她的手掌是涼的，大概是被夜風吹的。</p>\n<p>白無極把視線從她的手收回來，沒有說話。</p>\n<p>然後他反手，把她的手握回去。</p>\n<p>他的手包住她的手，那個力道也不輕不重，和她的力道差不多，像是回應一個問題，用同樣的方式，同樣的重量。</p>\n<p>兩個人繼續看著城裡的燈火。</p>\n<p>夜風還在吹，帶走廢墟的氣息，帶來城外野地的氣息，兩種氣息在城牆上混合，然後被風帶走，消失在更遠的夜裡。</p>\n<p>白無極感覺著她手掌的溫度，那個涼慢慢被他的手溫帶走，她的手開始有了溫度，他的手指輕輕收了一下，確認那個接觸還在。</p>\n<p>在那裡。</p>\n<p>他想說什麼，或者不想說什麼——他說不清楚，他的腦子在這一刻空得很，沒有什麼需要被說出來的東西，所有的東西都已經在那個握手裡了，已經在她主動伸過來的那個動作裡了，多說一個字，反而是減法。</p>\n<p>蘇念卿也沒有說話。</p>\n<p>她的視線還在城裡，那雙一向平靜的眼睛，在燈火的映照下，有一種白無極以前見過但沒有這麼清楚見過的東西——她是一個喜歡把自己收得很緊的人，她的外殼很硬，有時候硬得讓人覺得她根本不需要任何東西，但這一刻，那個外殼有一個地方，是鬆著的。</p>\n<p>那個鬆著的地方，朝向他。</p>\n<p>白無極把眼神從她臉上收回來，重新落在城裡的燈火上。</p>\n<p>不需要說什麼。</p>\n<p>這一刻就是它本來的樣子，不需要被解釋，不需要被確認，不需要被一個儀式或者一句話來標記，它就在這裡，兩個人都清楚，就夠了。</p>\n<p>廢墟裡亮著的那些燈，一盞一盞的，在夜裡安靜地燃燒著，那些燈下有疲憊的人，有在工作的人，有在哀悼的人，有在被照顧的人，有在照顧別人的人——這個城在今晚這樣的樣子裡，包含了很多東西，那些東西沉在夜裡，比白天的廝殺更真實。</p>\n<p>霜翎從蘇念卿的髮間輕輕鑽出一個頭，十二條尾巴裡有兩條悄悄垂下來，搭在她的肩膀，那隻靈狐的眼睛看了白無極一眼，然後縮回去，繼續安靜待著，好像什麼都沒有發生。</p>\n<p>白無極低頭看到了那個畫面，但沒有說破。</p>\n<p>夜裡，城在廢墟中慢慢亮起燈火，兩個人坐在城牆上，其中一個人的腿還在慢悠悠地晃著，手握著手，看著這一切。</p>\n<p>城還在。</p>\n<p>人還在。</p>\n<p>這就夠了。</p>\n<p>後來，不知道過了多久，白無極的腿晃著晃著慢了下來，靠在城牆邊沿的身體微微往她那側傾了一點，不是刻意的，是那種長時間保持一個姿勢之後的自然偏移，他也沒有撐回去。</p>\n<p>蘇念卿感覺到了，沒有動，也沒有說話，就那樣讓他微微靠著。</p>\n<p>風繼續吹，燈繼續亮，廢墟裡的工作繼續進行。</p>\n<p>城牆上的兩個人，靠著夜，靠著彼此，安靜地待在這個他們都不打算說出口的東西裡面。</p>\n<p>什麼都不需要說。</p>\n<p>就這樣。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第109章_契神的傳說", "content": "<p>第109章　契神的傳說</p>\n<p>第二天的長老會議，在天契城一處還算完整的議事廳裡召開。</p>\n<p>窗框的木頭有一半燒焦了，但框還在，窗紙換成了臨時掛上去的布，夜風把那塊布吹起來，讓屋裡的光線有一種不穩定的感覺，像是隨時可能變化。</p>\n<p>四大家族的核心人物都在，蘇長淵帶著蘇家的幾個長老，慕容玄帶著他手下最信任的兩個人，江家和陳家各自坐著自己的位置，白無極坐在靠牆的一個角落，那個位置不是主位，是一個旁聽的位置，他自己選的。</p>\n<p>沒有人讓他往主位坐，但如果他坐過去，大概也沒有人會說什麼。</p>\n<p>蘇念卿坐在蘇長淵旁邊，她的位置是正式的，蘇家嫡系的位置，她沒有看白無極，但她坐的方向讓她的視線偶爾可以掃到那個角落。</p>\n<p>霜翎在她懷裡縮著，安靜地聽。</p>\n<p>慕容玄把一本書放在桌上，那本書很老，書頁的顏色已經接近黃褐，但保存得很好，書頁沒有脆化，能正常翻動。封面上用一種白無極認識的文字寫著幾個字：《天衍前志》。</p>\n<p>「昨晚翻了一夜，」慕容玄說，他看起來確實沒有睡，眼下有一種沉的質感，但精神還在，「找到了幾個關鍵的部分，和那塊石板的符文比對過，我有比較高的把握說——玄冥背後那個存在，書裡有記載。」</p>\n<p>屋裡的空氣微微沉了一下。</p>\n<p>「《天衍前志》的最後一卷，記載了一段在靈契體系確立之前的歷史，那段歷史裡有一個核心的存在，書裡稱它為「契神」。」</p>\n<p>「契神，」江家長老重複，聲音帶著一種謹慎，「這個名字……」</p>\n<p>「是的，」慕容玄說，「就是我們現在這個靈契體系名字的來源。只不過，我們現在說「契神」是一個概念，是最高的境界，是靈契者追求的終點，但書裡的「契神」，是一個具體的存在。一個真實的、現在還活著的東西。」</p>\n<p>沉默。</p>\n<p>白無極在角落裡，把背靠直了一些，聽著。</p>\n<p>「千年前，」慕容玄翻開書，找到一頁，「有一個存在，它的力量超出了任何正常的靈契者可以企及的上限，它以某種方式突破了靈契體系最高境界的邊界，到達了書裡稱為「神域」的層次。」</p>\n<p>「這我見過，古籍多少都有提到，」蘇長淵說，「那個傳說歷來有之。」</p>\n<p>「但傳說裡沒有提到後半段，」慕容玄說，「那個「契神」在到達神域之後，做了一件事。」</p>\n<p>他頓了一下，確認在場所有人都在聽，然後繼續說：</p>\n<p>「它封印了精神力。」</p>\n<p>屋裡徹底靜了。</p>\n<p>白無極的手指在腿上輕輕扣了一下，那個動作很細微，他自己沒有意識到。</p>\n<p>「精神力在靈契體系確立之前，是這個大陸上兩種並存的力量體系之一，」慕容玄說，「靈契是人和靈獸之間的連結，精神力是人本身內在的力量，兩者在那個時代並行存在，各有使用者，也各有發展的流派。但契神出現之後，強行把精神力體系封印，讓它對所有人都不可見、不可觸及，同時強制推行靈契制度，讓大陸上所有人只能走靈契這一條路。」</p>\n<p>「為什麼，」陳家家主開口，「它這樣做的理由是什麼。」</p>\n<p>「《天衍前志》裡的記載，說的是維持自身的不朽，」慕容玄說，「靈契體系有一個性質，這個性質很多人知道但很少人深想——靈契是要付出代價的，靈契越強，代價越高，那個代價可以是壽命，可以是情感，可以是記憶，可以是各種形式的「損耗」。這個代價不是消失的，是被什麼東西吸收了。而那個吸收的，就是契神。」</p>\n<p>蘇長淵的臉色緩緩變了，那個變化很慢，但很深，像是有什麼認知在這一刻被根本性地動搖了。</p>\n<p>「所有靈契者付出的代價，」他緩慢地說，「全部流向了它。」</p>\n<p>「是的，」慕容玄說，「千年來，整個大陸的靈契者，每一次突破，每一次使用靈契的高階能力，每一次達到更高的境界——每一個代價，都是在供養它。它用這個方式維持了一千年的不朽，而且它不需要動，它就在那裡，整個靈契體系作為一個系統，自動把代價輸送給它。」</p>\n<p>屋裡沒有人說話。</p>\n<p>那個沉默有一種特殊的質感，是人在接受一個根本性的衝擊之後的反應時間，所有人都在以各自的方式處理剛剛聽到的東西，而那個東西太重，需要一點時間。</p>\n<p>蘇念卿的手緊了一下，她的手放在膝上，那個緊是內斂的，沒有表現出來，但她的眼神有一種東西沉下去了。</p>\n<p>霜翎在她懷裡動了一下，伸出一條尾巴，輕輕搭上她的手腕。</p>\n<p>「契神被封印了嗎，」白無極從角落開口，他的聲音在這個沉默裡顯得格外清晰。</p>\n<p>「是，」慕容玄說，「但不是被人封印，是它自己做的某種意義上的封印——它吸收了太多，到了某個臨界點，它的存在本身對大陸造成了無法忽視的損耗，靈契者的平均壽命開始下降，靈契獸開始大量消亡，大陸的靈力濃度開始稀薄。它在某個時刻，做了一個決定，讓自己進入了一種半休眠的狀態，封印在大陸最深處的某個位置。」</p>\n<p>「它不是被消滅，」江家長老說，「它只是休眠了。」</p>\n<p>「休眠了，但封印從未真正穩固，」慕容玄說，「《天衍前志》裡的記載到這裡基本結束，後面的是作者的推測——如果封印不穩固，那麼只要外部條件滿足，它就會甦醒。」</p>\n<p>「外部條件是什麼，」蘇長淵問。</p>\n<p>「消耗，」慕容玄說，「封印的維持，靠的是大陸靈契力量的整體穩定，那個穩定是一種平衡，就像一個很精密的天平，兩邊的重量維持在一個微妙的均衡上，天平保持水平，封印就穩固。」</p>\n<p>「那如果有什麼東西打破了那個均衡，」白無極說。</p>\n<p>「封印就鬆動，」慕容玄說，「如果鬆動到臨界點，它就甦醒。」</p>\n<p>他把書合上，放在桌上，兩隻手搭在書封上，低頭看了一眼，然後抬起來，掃過在場所有人的臉。</p>\n<p>「玄冥帶著邪修來打天契城，消耗了大量靈契高手，那個消耗不只是人，是整個大陸靈契力量體系的穩定性，是那個平衡的天平的其中一端，」慕容玄說，「這不是玄冥自己的想法，是有人讓他來的，那個人使用封印者的符文，那個符文體系屬於契神，所以——」</p>\n<p>「所以，」白無極接著說，「契神讓玄冥來，目的是打破那個平衡，加速封印鬆動，讓它自己更快甦醒。」</p>\n<p>「這是我的推測，」慕容玄說，「但我相信這個推測。」</p>\n<p>白無極靠著牆，把這整段話在腦子裡理了一遍，從頭到尾，把邏輯鏈條一截一截地接起來，確認每一截都對上了，然後把整個圖景看了一眼。</p>\n<p>精神力被封印，整個靈契體系是契神設計的系統，所有靈契者的代價供養它，它休眠在大陸最深處，正在加速甦醒。</p>\n<p>他的精神力是它封印的那個體系，他的存在，在某種意義上，就是它最不想看到的東西。</p>\n<p>或者，也許不是最不想看到，是它早就預見到了，而那個預見，才是讓它開始動的原因之一。</p>\n<p>「玄冥最後說的那句話，」白無極開口，「「精神力真的回來了」，現在看，那句話應該是傳給契神的信息，不是對我說的。」</p>\n<p>慕容玄：「是這個意思。」</p>\n<p>「它在等待的其中一個信號，就是精神力重新出現，」白無極說，「因為精神力出現，代表封印出現了足夠的裂縫，讓精神力透出來了，這本身就是封印鬆動的標誌。」</p>\n<p>「對，」慕容玄說，「所以你的出現，不只是一個變量，而是一個節點。」</p>\n<p>屋裡的沉默換了一種質感，不是接受衝擊的沉默，是所有人同時在面對同一件事的沉默。</p>\n<p>---</p>\n<p>*（本章完）*</p>"}, {"title": "第110章_封印鬆動", "content": "<p>第110章　封印鬆動</p>\n<p>慕容玄喝了一口水，把那個空杯放回桌上，那個聲音在安靜的議事廳裡很清晰。</p>\n<p>「我還有一個推測，需要說出來，」他說，「關於封印的現狀。」</p>\n<p>所有人看著他。</p>\n<p>「昨晚翻閱《天衍前志》的時候，我找到了一段記載，是那個作者根據他自己時代觀察到的現象做的推算，他計算了封印鬆動的速率，以及推算甦醒所需要的時間，」慕容玄說，「那個推算是千年前做的，但如果他的計算邏輯是對的，那麼對照現在——」</p>\n<p>他停了一下。</p>\n<p>「現在距離封印崩塌，也許只剩幾個月。」</p>\n<p>江家長老的手停了，陳家家主把握著茶杯的力道不自覺收緊了，蘇家的兩個長老對看了一眼，都沒有說話。</p>\n<p>蘇長淵的臉色沒有太大的變化，那種平靜不是麻木，是一個長期承受壓力的人練出來的臉，那張臉的底下是什麼，只有他自己知道。</p>\n<p>「幾個月，」他說，「是大概幾個月。」</p>\n<p>「最樂觀估計，半年，」慕容玄說，「但玄冥這次帶來的消耗，可能讓這個時間更短。三到四個月，是更接近現實的估計。」</p>\n<p>屋裡的空氣有一種密度，讓人呼吸的時候感覺到它的存在。</p>\n<p>「封印崩塌之後，」蘇念卿開口，她的聲音很平，在那個沉默裡格外清晰，「它的狀態是什麼。」</p>\n<p>「書裡的描述是甦醒後需要一段恢復期，在恢復期結束之前，它的力量不會立刻回到休眠前的巔峰，」慕容玄說，「但即使是恢復期，它也已經遠遠超過任何一個存在於大陸上的靈契者——包括現在所有人聯手。」</p>\n<p>「包括白無極嗎，」蘇念卿問。</p>\n<p>所有人的視線往角落那個方向移了一下。</p>\n<p>白無極在角落裡，靠著牆，兩條腿伸直放在地上，聽到這個問題，沒有立刻開口。</p>\n<p>他在想。</p>\n<p>不是在想這個問題的答案，那個答案他說不出來，因為他不知道契神甦醒之後具體是什麼狀態，他沒有辦法拿自己現在的能力去跟一個他完全不了解的存在做比較。他在想的是另一件事——玄冥最後說的「你不知道你在對抗什麼」，現在他知道了一些，但「知道一些」和「真正明白」之間還差很遠。</p>\n<p>「不知道，」他說，誠實回答，「我不知道契神甦醒之後有多強，我現在的能力是什麼上限我也沒有完全摸清楚。所以我沒有辦法給你一個有把握的答案。」</p>\n<p>蘇念卿沒有繼續追問，她轉回來，繼續看著慕容玄。</p>\n<p>「如果封印崩塌，大陸的靈契體系，」她說，「會發生什麼。」</p>\n<p>「書裡有一段描述，」慕容玄說，「說的是如果供養停止，它會主動索取——屆時所有靈契者的靈契連結，都可能被它強行切斷，或者反過來，被它強行接管。」</p>\n<p>「接管，」蘇家的一個長老重複這個詞，「意思是……」</p>\n<p>「意思是，你的靈契不再是你和你的靈獸之間的連結，而是你和它之間的連結，」慕容玄說，「你的力量，你的靈獸，你的靈識，全部成為它的延伸。」</p>\n<p>霜翎在蘇念卿的懷裡猛地顫了一下，那個顫抖很細微，但蘇念卿感覺到了，她的手放在霜翎身上，輕輕壓了一下。</p>\n<p>霜翎沒有縮回去，它的十二條尾巴展開了幾條，那個動作在它身上是少有的，通常只有在它感到威脅的時候才會這樣。</p>\n<p>蘇念卿沒有說話，但她的手繼續放在霜翎身上，那個安撫的意思很清楚。</p>\n<p>議事廳裡又是一段沉默，這段沉默和之前的性質不一樣，之前那些是接受信息的沉默，而這個是所有人在同時面對同一個問題、但都還沒有找到出口的沉默。</p>\n<p>白無極在角落裡，把整個局面在腦子裡過了最後一遍。</p>\n<p>三到四個月。</p>\n<p>封印崩塌。</p>\n<p>契神甦醒，力量超出所有人聯手的上限。</p>\n<p>大陸所有靈契者的靈契連結被接管。</p>\n<p>這個局面，用他穿越前的話說，叫做「最終BOSS」，而且是那種如果你沒有在它出來之前做好準備、等它出來就直接game over的那種最終BOSS。</p>\n<p>他在腦子裡把這個框架確認了一遍，然後站起來。</p>\n<p>那個動作讓屋裡所有人的視線聚過來，他不是第一次感受這種被注視，但這麼多位置的目光同時落過來，還是讓他有一點點不自在。</p>\n<p>「那個封印在哪裡，」他問。</p>\n<p>「《天衍前志》裡說是大陸最深處，但沒有具體位置，」慕容玄說，「這個需要更多的調查。」</p>\n<p>「好，那先調查這個，」白無極說，「另外，精神力這個體系，有沒有關於如何增強的記載，不是我自己，是說這個體系整體有沒有辦法恢復——如果精神力能在更多人身上重新出現，封印就繼續鬆動，但那個力量是可以對抗契神的力量，不是供養它的力量。」</p>\n<p>慕容玄沉吟了一下，「這個需要看書裡其他部分，我今天繼續找。」</p>\n<p>「還有，玄冥的副將，」白無極說，「那個人還在嗎？」</p>\n<p>「活著，被關著，」蘇長淵說，「你想問他什麼。」</p>\n<p>「問他玄冥接受指令的方式，以及那個石板通訊用了多久，傳遞過什麼，」白無極說，「他未必知道全部，但他知道的任何一點，都有用。」</p>\n<p>蘇長淵點頭，「安排。」</p>\n<p>白無極把這幾件事在心裡記了一遍，確認沒有漏，然後往門口走。</p>\n<p>「等一下。」</p>\n<p>蘇念卿的聲音，從她的座位方向傳來。</p>\n<p>白無極停下來，轉頭。</p>\n<p>她站起來，從蘇家的座位走過來，在他面前一步的距離停下，看著他。</p>\n<p>「你在想什麼，」她說。</p>\n<p>不是「你打算怎麼辦」，不是「你有什麼計畫」，是「你在想什麼」——那是一個問的是他此刻在腦子裡的東西的問題，不是問策略，是問人。</p>\n<p>白無極看著她，在她的眼睛裡找了一下他想找的東西，然後說：</p>\n<p>「在想我是不是得去打一個神。」</p>\n<p>蘇念卿的眼神沒有動，「打得過嗎。」</p>\n<p>「不知道，」白無極說，「但打不過的事，在這個世界我也不是第一次碰上了。」</p>\n<p>他說這句話的時候，語氣非常平靜，不是故作輕鬆，而是真的平靜——那種平靜不是冷漠，而是一種他自己也說不清楚從什麼時候開始有的東西，大概是從他第一次時停開始，或者更早，大概是他決定留在這個世界的那個瞬間就已經在了。</p>\n<p>蘇念卿看著他，「我也去。」</p>\n<p>那三個字說得很平，不是商量，不是請求，是陳述一個事實，就像「天空是藍色的」那樣，不需要任何多餘的解釋。</p>\n<p>白無極看了她一秒，然後說：</p>\n<p>「知道。」</p>\n<p>也是兩個字，同樣沒有任何多餘的東西，就是知道，就是她說她去，他說知道，這件事就這樣定了，不需要再說第三個字。</p>\n<p>屋裡的幾個長老看著這個交換，各自有各自的理解，但沒有人開口打斷。</p>\n<p>慕容玄在旁邊，把那本《天衍前志》重新拿起來，他的眼角有一點點的東西，那個東西如果要有一個名字，大概叫做「這兩個年輕人讓我覺得也許還有機會」，但他沒有說出來，這個年紀的人知道有些話放在心裡比說出來更有力量。</p>\n<p>霜翎的十二條尾巴，在蘇念卿轉身準備跟著白無極出去的時候，靜靜地展開，那個展開的姿態不是威脅，是一種更接近準備的姿態——它準備好了。</p>\n<p>白無極站在門口，等了她一下。</p>\n<p>她走到他身邊，兩個人並排，往議事廳外走。</p>\n<p>天契城的早晨，陽光從廢墟的缺口透進來，落在殘牆和碎石上，那些光有一種不管昨天發生了什麼、今天還是會升起來的平靜。</p>\n<p>城外的原野，遠方的山，更遠方的天際，在這個早晨一樣都在。</p>\n<p>封印鬆動了，契神在甦醒，三到四個月，最終決戰的倒數從這一刻開始計時。</p>\n<p>白無極走在廢墟裡，感覺著身側的人，感覺著精神海裡的Eternal和Requiem，那兩個替身安靜地待著，不響應任何威脅，只是存在，像是兩顆一直在他身邊的星，不管前方是什麼，它們都在。</p>\n<p>「你昨晚睡了嗎，」蘇念卿在他旁邊問，沒有轉頭，聲音很平。</p>\n<p>「睡了，」白無極說，「城牆上睡著的，睡了大概兩個時辰，被風吹醒的。」</p>\n<p>蘇念卿沉默了一下：「之後睡城牆記得帶個東西擋風。」</p>\n<p>白無極：「……好。」</p>\n<p>廢墟裡的清晨繼續進行，有人在搬運廢料，有人在修繕，有人在分配糧食和藥材，城還在忙碌，城還在運作，城還在。</p>\n<p>號角還沒有真正響起，但它的聲音已經在最遠的地方開始凝聚了，等著那個時機到來，等著那個決戰的早晨。</p>\n<p>白無極和蘇念卿並排走在廢墟的道路上，前方是天契城還沒有被清理的角落，後方是他們剛從那裡出來的議事廳。</p>\n<p>一神，一道封印，三到四個月，整個大陸的命運。</p>\n<p>還有，兩個替身，一個穿越者，一個面癱毒舌的天才獸契師，以及一隻十二條尾巴的銀色靈狐。</p>\n<p>「行，」白無極在心裡說，對他的兩個替身，也對他自己，「那就去打一個神吧。」</p>\n<p>---</p>\n<p>*（本章完）*</p>\n<p>*卷四終*</p>"}, {"title": "第111章_金球的記憶", "content": "<p>第111章　金球的記憶</p>\n<p>夢是從黑暗開始的。</p>\n<p>不是那種睡著了什麼都沒有的黑暗，而是有深度的黑暗，像是站在一個沒有邊際的虛空裡，腳下沒有地面，四周沒有牆壁，連空氣都是靜止的。</p>\n<p>白無極不知道自己是怎麼站在這裡的。</p>\n<p>他記得自己洗完澡躺下去，赫連峰剛剛送來的一壺天衍特釀還沒喝完，放在床邊的木桌上。他記得蘇念卿最後路過他房間，敲了一下門框說「睡了」，他說「嗯，你也是」，然後她走了，他把燈熄了。</p>\n<p>然後就是這裡。</p>\n<p>虛空裡忽然有了光。</p>\n<p>不是火光，不是日光，而是一種非常溫暖的金色——那種金色白無極認識，是他每次凝聚精神力時都會看到的顏色，是白金之星展開時的光，是黃金體驗的光，是那顆陪著他從另一個世界漂流過來的精神金球的光。</p>\n<p>金色的光在虛空的最深處凝聚，慢慢變成一個球形，懸在半空中，旋轉，脈動，像一顆有生命的心。</p>\n<p>白無極想走近，腳下沒有地面，但他確實在移動，或者說，那顆金球在靠近他。</p>\n<p>然後他感覺到了。</p>\n<p>那不是他的記憶。</p>\n<p>這是一個非常奇怪的感覺——像是有人把一本書塞進你的腦子裡，那本書裡的每一頁你都能看見，每一行字你都能讀懂，但你清清楚楚知道那不是你寫的，那些事情不是你經歷過的。是金球的記憶，是這顆東西在遇見他之前，在某個遙遠的時間和地方，所存著的一切。</p>\n<p>畫面出現了。</p>\n<p>---</p>\n<p>是一座城，或者說曾經是一座城的地方。</p>\n<p>廢墟。</p>\n<p>四周的建築都斷裂了，石塊散落，有些地方還在燃燒，但不是正常的火焰，是藍色的，精神力的火，燃得沉默而徹底。天空是暗的，雲層厚重，偶爾有閃電在雲中跳動，那閃電也是金色的，每一道都帶著極度精準的力量意志。</p>\n<p>這是一場戰爭結束後的場景。</p>\n<p>有很多人倒在廢墟裡，白無極看不清楚他們的臉，但他能感覺到他們身上殘留的精神力氣息——都是精神力使者，都是最頂尖的那種，卻全部沉默躺著，生死不知。</p>\n<p>虛空深處傳來一個聲音：「輸了。」</p>\n<p>不是絕望，也不是憤怒，就是非常平靜地在陳述一個事實。</p>\n<p>「輸了，但還沒有結束。」</p>\n<p>白無極循著聲音轉過頭，在廢墟的最高處，有一個人站在一截斷裂的石柱上，背對著他。</p>\n<p>看不清臉。</p>\n<p>只能看見背影——是個很瘦的人，穿著某種白色的長袍，袍子有一半已經破碎了，邊緣焦黑，但那個人站著的姿態非常穩，像是生了根。他的手裡，托著一顆正在凝聚的金球，金色的光在他掌心旋轉，從一個小小的光點開始慢慢變大，變亮，就像白無極此刻正在看著的那顆一樣。</p>\n<p>「還沒有結束。」那個人輕聲說，再說一次，像是在說給自己聽，也像是在說給那顆金球聽。</p>\n<p>金球凝聚完成，懸在他掌心上方，旋轉，等待。</p>\n<p>那個人沉默了很久，久到白無極開始懷疑時間在這個夢裡是靜止的。然後他開口說話了，對著金球說：</p>\n<p>「裡面放了兩個，夠他用了。一個讓他停住時間，一個讓他讓因果歸零——這兩件事加在一起，應該夠了。應該。」</p>\n<p>他說完，把手輕輕一送，金球就飄了起來，慢慢升起，越升越高，穿過沉重的雲層，消失在看不見的地方。</p>\n<p>他的手還保持著送出去的姿勢，抬著，停在半空中，像是在目送。</p>\n<p>然後白無極聽見他說了最後一句話。</p>\n<p>聲音很輕，輕到幾乎被廢墟裡燃燒的藍色火焰聲蓋過去，但白無極聽清楚了：</p>\n<p>「去找那個能承載你的人。」</p>\n<p>---</p>\n<p>白無極從夢裡醒來的時候，天還沒亮。</p>\n<p>他坐在床上，發了很久的呆。</p>\n<p>床邊桌上那壺天衍特釀還在，他伸手拿起來喝了一口，酒勁不小，但他完全沒有感覺，腦子裡還在回放剛才那個背影——那件破碎的白袍，那雙把金球送出去的手，那句話的語調。</p>\n<p>白金之星和黃金體驗靜靜地站在房間裡，他們永遠都在，永遠都沉默，永遠都看著他。</p>\n<p>白無極看了白金之星一眼：「你知道那個人是誰嗎？」</p>\n<p>白金之星沉默。</p>\n<p>「不說話是沒想法還是說不了？」</p>\n<p>還是沉默。</p>\n<p>「行吧。」</p>\n<p>他放下酒壺，抬頭看窗外。天色極深的藍，還差著一段才到黎明。他知道自己睡不著了，但也沒有要起床的意思，就坐在那裡，把剛才的夢在腦子裡過了一遍又一遍，把每一個細節都記清楚——那座廢墟城市的樣子，那個人的身形比例，那些倒下的精神力使者的輪廓，那顆金球凝聚的過程，還有最後那句話說話時的語氣。</p>\n<p>「去找那個能承載你的人。」</p>\n<p>他找到了。就是白無極。</p>\n<p>白無極不覺得這有什麼讓人熱血沸騰的地方——被選中這種事，在他上班那個世界裡是主角光環，是爽點，是讀者喜歡的橋段。但他不是那個世界裡的主角，他就是一個普通的上班族，業餘打打八極拳，996到猝死，然後稀里糊塗穿越了。</p>\n<p>被選中？</p>\n<p>選中的又不是原來的他，選中的是「能承載金球的人」，只不過碰巧是他。</p>\n<p>但有一件事讓他安靜不下來。</p>\n<p>那個人的背影，那個站在廢墟上、把最後的希望送出去的人的背影，讓他感覺非常熟悉。</p>\n<p>不是「見過面」那種熟悉，是更底層的、更模糊的熟悉。像是在什麼地方見過這個人的姿勢，或者這個人的站法，或者這個人說話的方式——在哪裡？</p>\n<p>他想不起來，但那種熟悉感壓在胸口，說不清楚。</p>\n<p>天漸漸亮了。</p>\n<p>白無極坐到了天亮，然後站起來，穿衣服，決定找蘇念卿說說這件事。</p>\n<p>---</p>\n<p>蘇念卿起得早，他到她院子裡的時候，她正在廊下喂霜翎。</p>\n<p>霜翎見到他，抬起頭看了一眼，尾巴搖了搖——這個動作已經算是相當熱情了，畢竟當初它見到他是直接撲上去要把他打飛的。</p>\n<p>「怎麼了？」蘇念卿沒回頭，但她顯然聽到了他的腳步聲。</p>\n<p>「做了個夢，有點奇怪。」白無極在她旁邊蹲下來，霜翎把頭湊過來讓他摸，他就摸了一下，「金球的記憶。不是我的記憶，是金球自己的。」</p>\n<p>蘇念卿這才回頭看他，眼神掃了一下他的臉：「沒睡好？」</p>\n<p>「坐到天亮。」</p>\n<p>她沉默了一下，把手裡剩下的靈果遞給霜翎，站起來，拍了拍手：「說。」</p>\n<p>白無極就把夢裡的事從頭說了一遍，一個字不漏，包括那座廢墟，那個人的背影，那顆金球的凝聚過程，還有最後的那句話。</p>\n<p>蘇念卿聽完，沒有說話，只是看著他。</p>\n<p>「我知道你想說什麼，」白無極說，「你想說這不是偶然穿越，是被選中的。」</p>\n<p>「你不想說這個？」</p>\n<p>「我想說另一件事，」白無極停了一下，「那個人的背影，我感覺很熟悉。但我完全不知道那是誰，也不知道為什麼熟悉。這個讓我有點在意。」</p>\n<p>霜翎在兩人腳邊繞了一圈，捲起一片晨霧，又散了。</p>\n<p>「去找慕容玄，」蘇念卿說，語氣平靜，像在下一個判斷，「他的古籍裡，或許有答案。」</p>\n<p>白無極點點頭，站起來，望了一眼晨光裡的天契城，天邊的雲是金色的。</p>\n<p>那個顏色，和夢裡的一模一樣。</p>"}, {"title": "第112章_精神力的起源", "content": "<p>第112章　精神力的起源</p>\n<p>慕容玄的住處在天契城的東角，不是什麼顯眼的地方，反而像是刻意縮在城市的邊緣裡。</p>\n<p>他住的院子不大，但裡面堆著很多箱子，每個箱子都嚴密封著，用某種特殊的靈力印記封口，外人打不開。慕容家少主在天契城住著，隨行的東西卻像是一個圖書館。</p>\n<p>白無極和蘇念卿敲門的時候，慕容玄已經起來了，甚至已經梳洗完畢，一身黑色的長袍穿得一絲不苟，正坐在窗邊翻一本書。</p>\n<p>他見到兩人，沒有表情：「什麼事？」</p>\n<p>「有事請教，」白無極說，然後把夢裡的事又說了一遍，說到最後，「我想知道，那個用精神力創造金球的人，在你的古籍裡有沒有記載？」</p>\n<p>慕容玄聽完，沉默了片刻。</p>\n<p>他放下手裡的書，站起來，走向靠牆的一排箱子，打開其中一個，翻了一會兒，取出一本非常古舊的冊子——封面已經看不清楚原本的顏色，只能隱約辨認出上面有幾個字的痕跡，墨跡已經淡得快要消失了。</p>\n<p>「坐。」他說。</p>\n<p>三個人在窗邊坐下，慕容玄把那本古籍放在桌上，翻到某一頁，指著上面的文字：「這是慕容家珍藏了五百年的東西，從未對外公開過。」</p>\n<p>白無極看了一眼那頁的文字，是古體字，有些他認識，有些他不認識，但字裡行間他能感覺到那股東西——不是靈力，是精神力，是某種非常遙遠的、幾乎已經徹底消散在歷史裡的力量殘留，就在這幾頁紙上，還沒有完全死透。</p>\n<p>慕容玄開口，聲音平靜得像在背書：</p>\n<p>「千年以前，天衍大陸上存在一套與靈契截然不同的力量體系，叫做精神力文明。那個時候沒有靈契師，沒有靈契師，沒有靈獸，沒有代價，只有精神力使者。」</p>\n<p>「精神力使者，」蘇念卿輕聲重複。</p>\n<p>「他們以精神意志為根基，具現出『影』，」慕容玄繼續說，「影，是精神力的具現形態，每個人的影都不一樣，取決於使者的精神特質、意志方向、還有他對自身力量的理解。力量沒有上限，沒有代價，不消耗壽命，不消耗情感，唯一的限制，是使者自身精神意志的強度與廣度。」</p>\n<p>白無極聽到這裡，下意識看了一眼白金之星和黃金體驗。</p>\n<p>「替身，」他說，「『影』就是替身。」</p>\n<p>慕容玄看了他一眼：「你自己已經想到了。」</p>\n<p>「那個金球裡有兩顆種子，一個停時間，一個歸零因果，就是那個人把自己兩個影的力量種子封存進去的，」白無極說，「他把力量送出去，是因為……他用不了了？」</p>\n<p>「那場戰爭，」慕容玄緩緩說，翻了一頁古籍，「精神力文明的終結，不是自然消亡。是有人親手終結的。」</p>\n<p>房間裡安靜了一下。</p>\n<p>「誰？」蘇念卿問，但她眼神裡已經有了答案，只是在等確認。</p>\n<p>「後來被封印的那個人，」慕容玄說，聲音裡沒有任何感情起伏，只是在陳述，「契神。」</p>\n<p>---</p>\n<p>慕容玄把古籍從頭說了一遍，說得非常詳細，比他平時說話的字數多了不知道多少倍——白無極感覺這件事他憋了很久，也許是從他繼承這本古籍的那天開始，就一直在等一個可以說出來的時機。</p>\n<p>千年前的故事是這樣的：</p>\n<p>精神力文明鼎盛的時代，精神力使者分布在整個大陸，最強的一批人幾乎可以改變自然法則，以精神意志重塑山河，力量是這個世界有史以來最強大的。那個時代沒有戰爭，因為沒有人打得過精神力使者的聯合，各地的聚落相對和平，文明在緩慢但穩定地發展。</p>\n<p>然後出現了一個人。</p>\n<p>那個人最初也是精神力使者，而且是那個時代裡精神意志最強的一個，他的影達到了其他使者無法企及的層次，他看見了精神力的本質，看見了這套體系的終極形態。</p>\n<p>但他想要更多。</p>\n<p>「更多是什麼意思？」白無極問。</p>\n<p>「不朽，」慕容玄說，「精神力使者不論多強，壽命終究有限。他不甘心。他開始研究另一條路——不以精神意志為根，而是以外部力量為源。靈契，就是他的答案。」</p>\n<p>靈契制度的原型，就是那個人設計的。靈獸作為外部力量的載體，靈契師通過儀式與靈獸締結契約，獲得遠超精神力使者的力量上限——代價，是壽命、記憶、情感，是使用者的生命本質。</p>\n<p>表面上，靈契制度讓力量大眾化了，讓普通人也可以擁有強大的力量，不再需要天賦異稟的精神意志。</p>\n<p>「所以一開始，大家是歡迎的？」蘇念卿說。</p>\n<p>「是，」慕容玄說，「起初。有很多人主動選擇靈契，放棄了精神力，因為靈契的力量更快，更大，更直接。然後他開始強制推行。」</p>\n<p>強制推行的方式非常徹底——他以無可匹敵的力量橫掃整個大陸，凡是拒絕放棄精神力、拒絕接受靈契的人，全部消滅。精神力使者一個一個倒下，或者死，或者被迫轉換，那場戰爭持續了幾十年，最終以精神力文明的幾乎全面覆滅告終。</p>\n<p>幾乎。</p>\n<p>「有少數人撐到了最後，」慕容玄說，把古籍往前翻了幾頁，指著一段文字，「古籍裡說，最後一批精神力使者，在精神力文明最後的城市裡，進行了最後一場戰鬥。他們輸了，但在輸之前，其中一個人，做了一件事。」</p>\n<p>白無極坐直了身體。</p>\n<p>「他把自己兩個影的力量種子，封存進一顆精神金球裡，然後把金球送了出去，」慕容玄說，聲音第一次有了一點點波動，輕微得幾乎察覺不到，「古籍裡沒有記載那個人的名字，只說他是最後的精神力使者裡，力量最強的那個。他送走了金球，在那場戰爭裡，他的下落，史籍無從考察。」</p>\n<p>房間裡徹底安靜了。</p>\n<p>蘇念卿看著白無極。</p>\n<p>白無極看著桌上那本古籍，古老的墨跡，古老的字體，在晨光裡靜靜待了千年。</p>\n<p>「所以，金球飄了一千年，」白無極緩緩說，「然後穿越了世界，找到了我。」</p>\n<p>「找到了能承載它的人，」蘇念卿輕聲說。</p>\n<p>「那個人選的不是我，」白無極說，「他選的是一個標準：能承載這兩個影的人。只是碰巧，那個標準對上了我。」</p>\n<p>「你覺得這有什麼差別？」慕容玄問，語氣依然淡漠，但眼睛裡有一點東西在看著他。</p>\n<p>白無極想了一下，發現這個問題沒什麼意義，就放棄了：「沒有差別，知道一下。」</p>\n<p>他站起來，在房間裡走了幾步，然後轉過頭：「那個人，送走金球的人，最後的精神力使者，你覺得他是在哪裡消失的？」</p>\n<p>慕容玄搖頭：「古籍沒有記載。」</p>\n<p>「契神知道嗎？」</p>\n<p>慕容玄沉默了一下，才說：「也許，只有契神知道。」</p>\n<p>窗外的天光已經完全亮了，天契城的早晨是熱鬧的，遠處有訓練的喊聲，有靈力的波動，有普通人生活的聲音，像一個完全正常的城市。</p>\n<p>白無極看著窗外，在心裡把那個夢裡的背影再過了一遍。</p>\n<p>破碎的白袍，送出金球的手，廢墟，藍色的火焰。</p>\n<p>熟悉感。</p>\n<p>他還是不知道那種熟悉感從哪裡來，但他現在有一個新的感覺，壓在心底——</p>\n<p>那個人輸了，但他沒有放棄。他把最後的希望送了出去，他相信總有一天，有人會拿著這顆金球，接著走他沒有走完的路。</p>\n<p>這條路已經等了一千年了。</p>\n<p>白無極伸了個懶腰，轉身往外走：「我回去練一練，Requiem有幾個用法還沒全弄清楚。」</p>\n<p>蘇念卿跟上他，走到門口，回頭看了慕容玄一眼。</p>\n<p>慕容玄把那本古籍輕輕合上，放回桌上，沒有說話，但他的表情比平時少了一點點什麼，說不清楚是什麼，只是少了一點。</p>\n<p>也許是壓了很久的事，終於說出口以後，少了一點。</p>"}, {"title": "第113章_契神的陰謀", "content": "<p>第113章　契神的陰謀</p>\n<p>第二天下午，慕容玄主動來找了他們。</p>\n<p>這是少見的事。慕容玄這個人的習慣是等別人來找他，他幾乎不主動，讓他主動上門，基本需要天塌了。</p>\n<p>白無極正在院子裡跟白金之星對練，測試Eternal時停中的移動精度，蘇念卿坐在廊下看，霜翎趴在她腳邊打盹。見到慕容玄走進來，白無極停了手，收了時停：「怎麼了？」</p>\n<p>「昨天說的，沒說完，」慕容玄說，站在院子中間，「靈契的代價，去哪裡了。」</p>\n<p>白無極和蘇念卿對視了一眼。</p>\n<p>「你說，靈契代價是壽命、記憶、情感——」蘇念卿說，「消散了？」</p>\n<p>「不，」慕容玄說，語氣很平，像是在說一件他已經想清楚了很久的事，「不是消散，是流向了一個地方。」</p>\n<p>他在院子裡找了一塊石頭坐下，這個動作難得的有點人味，白無極於是也坐下來，蘇念卿在廊邊站著，霜翎把頭抬起來，警覺地看著慕容玄，然後又放下去。</p>\n<p>「靈契制度的設計者，是契神，」慕容玄說，「靈契制度推行了一千年，但你們有沒有想過一件事——契神為什麼要推行靈契制度？」</p>\n<p>「你昨天說了，他想要不朽，」白無極說，「但靈契制度讓普通人也能用強大的力量，這和他的不朽有什麼直接關係？」</p>\n<p>「有，」慕容玄說，「關係非常直接。靈契的代價，從來不是消散的。那些被支付出去的壽命、記憶、情感，每一分，每一毫，都通過靈契的力量通道，流向了封印地，流向了被封印在那裡的契神。」</p>\n<p>院子裡很安靜。</p>\n<p>白無極感覺自己的腦子轉了一轉，把這句話的意思理清楚，然後他說：</p>\n<p>「所以，千年來每一個靈契師，每一次使用靈契力量，每一次支付代價——」</p>\n<p>「全部都在養他，」慕容玄說，「你明白了。整個天衍大陸的靈契者，從來不知道自己在做什麼。他們以為代價是力量的平衡，是這個世界的規則，但事實是，那些代價從沒有消失，一絲一毫都沒有消失，全部流進了契神的封印地，成為他不朽的養分，讓他在封印中繼續存活，繼續強壯。」</p>\n<p>蘇念卿的臉色沒什麼變化，但她的手指悄悄收緊了。</p>\n<p>霜翎站了起來，毛炸開了一點，那是它感受到主人情緒波動的反應。</p>\n<p>白無極沉默了很久。</p>\n<p>他坐在那裡，手撐著膝蓋，看著院子裡的地面，想著這件事的規模。</p>\n<p>一千年。</p>\n<p>整個大陸。</p>\n<p>每一個靈契師，每一次使用力量，都在無意識地供養著一個被封印的怪物——那是幾億人，是幾十億次靈契的使用，是無數個老人縮短的壽命，無數個人喪失的珍貴記憶，無數個人磨滅的情感，以為那是規則，以為那是代價，以為那是公平的交換，但事實是，那一切都進了一個人的口袋，用來喂養那個把精神力文明踩碎的人。</p>\n<p>「所以，」白無極開口了，聲音有點低，「這個世界的人，用自己的命在養他。」</p>\n<p>「是，」慕容玄說，「一千年。」</p>\n<p>「每一個靈契師，」白無極繼續說，「蘇家，赫連家，慕容家，所有人，所有那些支付了代價的人，」他停了一下，「你的家族，一千年來的每一個人，你的父親，你的祖父，那些老去的，死掉的，失去記憶的，失去情感的……全都進了他那裡。」</p>\n<p>慕容玄沒有說話，但他沒有否認。</p>\n<p>「你早知道這件事？」白無極問。</p>\n<p>「古籍裡有記載，只是那本古籍，一千年來只有慕容家族長一個人看過，」慕容玄說，「我是第一個把它說出口的人。」</p>\n<p>白無極看著他。</p>\n<p>慕容玄的臉依然是那副冷淡的樣子，但他坐在那裡，背脊很直，眼睛看著院子裡某個固定的地方，像一根在風裡撐著的柱子——撐得很穩，但讓人看一眼就知道它承受著什麼。</p>\n<p>「你明白為什麼必須有人阻止他了嗎？」慕容玄說，聲音還是很平，「不是為了什麼大義，不是為了什麼蒼生，就是——這件事本身，不能繼續了。」</p>\n<p>---</p>\n<p>白無極在院子裡坐了很久，慕容玄說完就走了，蘇念卿也沒有說話，只是坐在廊邊，讓霜翎把頭枕在她腿上，摸著它的毛，靜靜的。</p>\n<p>天空很藍，天契城的午後陽光很好，有人在遠處練功的聲音，有市集的人聲，有完全正常的生活氣息。</p>\n<p>白無極看著這些，想著那些代價。</p>\n<p>他認識的人裡，蘇念卿的靈契是銀狐，契約締結的代價她沒有說過，他沒有問，但那個代價是真實存在的，而且不是消散的，是流走的，流進了某個黑暗的地方，去喂養某個東西。</p>\n<p>赫連峰，蘇長淵，慕容玄，城裡那些普通的靈契師，大街上那些路人，那些走路時靈獸跟在身邊的人——他們以為他們在使用一套公平的力量體系，他們以為代價是這個世界的規則，他們甚至為了那個規則感謝命運，感謝靈契制度讓他們有了力量。</p>\n<p>但事實是，他們全都在被吸血，一千年了，每一代人都在被吸血，連意識到這件事的機會都沒有。</p>\n<p>「你在想什麼？」蘇念卿的聲音從廊邊傳來。</p>\n<p>「在想那些代價，」白無極說，「在想你的代價，赫連峰的代價，所有人的代價，到底進了哪個角落，在那裡做什麼。」</p>\n<p>蘇念卿沉默了一下：「不要多想。」</p>\n<p>「不是多想，」白無極說，「是這件事本身讓人很難不往深處想。你有沒有想過，契神被封印了一千年，但他靠著全大陸的靈契代價在不斷強壯，那個封印，現在還能壓住多少他的實際力量？」</p>\n<p>蘇念卿的手在霜翎頭頂停了一下。</p>\n<p>「慕容玄說封印快撐不住了，」她說，「你剛才問的那個問題，我也在想。」</p>\n<p>「封印崩潰，不是因為封印本身老化，」白無極說，把這個念頭說出來，「是因為他養得足夠強了，強到封印快壓不住他了——他在裡面等了一千年，用整個大陸的靈契代價把自己喂得足夠強，現在封印快碎了。」</p>\n<p>「他一直在等這一天，」蘇念卿輕聲說。</p>\n<p>「玄冥，那些各地的騷亂，那些試探，那些消耗天契城防禦力量的行動，」白無極說，「全都是提前佈局，為了讓封印碎得更快，讓阻止他的力量提前損耗。」</p>\n<p>霜翎低鳴了一聲，蘇念卿輕輕拍了拍它的頭。</p>\n<p>「所以不管願不願意，最後還是要去那裡，」白無極站起來，在院子裡站了一下，天空依然很藍，「打是一定要打的，這沒什麼好說的。問題是，打完以後，靈契制度怎麼辦？」</p>\n<p>蘇念卿仰頭看他：「什麼意思？」</p>\n<p>「契神死了，或者徹底廢掉以後，靈契制度的代價通道還在嗎？流向封印地的那些，能不能追回來？那些失去的壽命，喪失的記憶，磨滅的情感……」他說到這裡，停了一下，「算了，打完再說，這些是打完以後的事。」</p>\n<p>蘇念卿看著他，沒說話。</p>\n<p>「你現在的表情是什麼意思？」白無極問。</p>\n<p>「我在想，」蘇念卿說，「你剛才在替所有人想這個問題——那些代價，那些失去的東西，能不能追回來。你自己沒有靈契，你沒有支付過任何代價，但你在想這個。」</p>\n<p>「那有什麼問題嗎？」</p>\n<p>「沒有問題，」蘇念卿說，語氣難得的輕了一點，「只是你這個人，有時候挺讓人意外的。」</p>\n<p>「意外在哪裡？」</p>\n<p>她沒有回答，低下頭繼續摸霜翎，但白無極瞥見她臉側的輪廓，嘴角是放鬆的。</p>\n<p>霜翎在她腿上翻了個身，把肚子露出來讓她撓，懶洋洋的，像什麼都不知道，又像什麼都知道。</p>\n<p>院子外面，天契城的午後繼續響著生活的聲音，一千年的債，壓在每一個不知情的人身上，而他們全都還活著，還在說話，還在呼吸，還在等一個不知道什麼時候才到的明天。</p>\n<p>白無極看著這些，在心裡把那句話想了一遍：</p>\n<p>這件事本身，不能繼續了。</p>"}, {"title": "第114章_白無極的使命", "content": "<p>第114章　白無極的使命</p>\n<p>那天晚上，白無極一個人坐了很久。</p>\n<p>沒有喝酒，沒有練功，就坐在房間裡的椅子上，對著窗外的夜色發呆。</p>\n<p>白金之星和黃金體驗一如既往地站在房間裡，高大的身影在夜裡有淡淡的光，那個光不刺眼，白無極有時候覺得那個光很像夜燈，讓人覺得不那麼孤獨。</p>\n<p>他在想很多事，又感覺好像什麼都沒在想。</p>\n<p>思緒在一個圈子裡轉：精神力文明，千年前那場戰爭，那個站在廢墟上的背影，金球飄了一千年然後找到他，靈契代價的真相，一整個大陸的人不知道自己在被供養一個怪物，封印快碎了，玄冥只是個棋子，契神在等了一千年之後就要出來了。</p>\n<p>圓圈轉到最後，落腳點永遠是同一個地方：</p>\n<p>所以然後呢？</p>\n<p>白無極是一個普通人。他沒有想過這個問題，但他其實非常清楚這一點——他是一個普通人，上班族，業餘練八極拳，死之前最大的成就是把公司的一個項目順利交付了，他的人生裡沒有什麼天命，沒有什麼偉大的東西，他只是一個正常過日子的普通人。</p>\n<p>然後他穿越了，帶著一顆精神金球，金球裡有兩個替身的力量種子，那是一個人在千年前送出來的。</p>\n<p>那個人選的標準是「能承載你的人」。</p>\n<p>能承載，就是說那個人在算，在推演，一千年後會有什麼樣的人出現，那個人能夠使用這兩個影，能夠把力量發揮出來，能夠走到最後——</p>\n<p>然後算到的是白無極。</p>\n<p>白無極不知道那個計算是怎麼算的，也不知道精神力的預測能到什麼程度，他只知道有個人在千年前相信，這顆金球最終會遇到一個合適的人，那個人能做他沒做完的事。</p>\n<p>問題是，他想好了嗎？</p>\n<p>不是「願不願意」，他很早就沒有在糾結這個——這個世界待了他這麼久，這個世界的人接待了他，幫了他，讓他走到今天，蘇念卿，赫連峰，蘇長淵，慕容玄，那些在天契城保衛戰裡一起戰鬥過的人，他沒有辦法說「不關我的事」然後走掉。</p>\n<p>不是「能不能打贏」，他不確定，但他見過Requiem的效果，所有針對他的攻擊都無法到達真實，因果歸零——他不敢保證這能打贏一個積累了千年力量的怪物，但至少是現有最高的保險係數。</p>\n<p>他在想的是另一件事。</p>\n<p>他在想那個千年前的人。</p>\n<p>那個人在最後一刻做的事，不是拼死戰鬥，不是奮勇赴死，是想到了下一步——在所有人都倒下的廢墟裡，在精神力文明即將徹底終結的那一刻，他在想的是：這件事還沒完，還需要有人繼續，那個人還沒出現，所以我先把力量準備好，等他來取。</p>\n<p>那是一種非常清醒的、非常冷靜的、甚至有點殘忍的選擇。</p>\n<p>因為那個人選擇了不去死，也沒有去拼一個確定無望的勝利，而是選擇了留下一把鑰匙，然後消失在史書裡。</p>\n<p>白無極想，那個人當時是什麼心情？</p>\n<p>他把力量送出去的時候，知不知道送出去這顆球之後自己怎麼樣了？知不知道那顆球要飄多久？知不知道承接這顆球的人，要走多少路、要面對多少事？</p>\n<p>他說「去找那個能承載你的人」，他對那顆金球說話，就像是在拜託一個朋友，把一件最重要的東西交付出去。</p>\n<p>白無極在椅子上又坐了一會兒，然後站起來，在房間裡走了幾步。</p>\n<p>窗外的夜空很好，有星星，比他那個世界的夜空乾淨得多，天衍大陸沒有工業污染，大氣層是原色的。</p>\n<p>他伸手，白金之星安靜地靠近，他伸出去的手碰到了白金之星的手指，有一種非常輕微的精神力共鳴，溫和的，像老朋友之間的確認。</p>\n<p>黃金體驗在旁邊看著他，那雙眼睛永遠是靜止的，但白無極有時候感覺，那雙眼睛裡有某種東西——不是情感，是某種更原始的東西，像是意志，像是認可。</p>\n<p>「既然選了，」白無極輕聲說，不是說給任何人聽，就是說，「那就打吧。」</p>\n<p>---</p>\n<p>蘇念卿來敲門的時候，夜色已經深了。</p>\n<p>白無極說「進來」，她推門進來，看見他站在窗邊，白金之星和黃金體驗在他旁邊，房間沒有點燈，只有三個人影在夜裡的輪廓。</p>\n<p>「霜翎感覺到你的精神力波動有點不穩，」蘇念卿說，「過來看看。」</p>\n<p>「我沒事，就在想點東西。」</p>\n<p>她沒有走，在門口站了一下，走進來，在他旁邊站著，一起看窗外的夜色。</p>\n<p>過了一會兒，她問：「在想什麼？」</p>\n<p>「在想那個把金球送出來的人，」白無極說，「千年前就知道有一天需要對抗契神，所以提前準備了這個。」</p>\n<p>蘇念卿：「你覺得那個人是誰？」</p>\n<p>「不知道，」白無極說，「但他選了我。」</p>\n<p>說出口的瞬間，他自己頓了一下。</p>\n<p>那句話說起來比他想像的要輕鬆——他以為說出這句話應該有某種沉重感，但沒有，就是非常平靜地說出去了，像在陳述今天天氣很好。</p>\n<p>他看著自己的手，掌心裡有淡淡的金色光澤，那是他精神力的常態——白金之星安靜地站在他右側，黃金體驗站在他左側，兩個沉默的影，千年前的兩顆種子，千年後在他身上紮根，長成了現在的樣子。</p>\n<p>「既然選了，那就打吧，」他說。</p>\n<p>蘇念卿側頭看他，她的眼睛在夜裡很亮，一向冷靜的眼神裡有一點什麼在看他，細細的，像在量他的重量。</p>\n<p>然後她問：「你從來不問值不值得嗎？」</p>\n<p>白無極想了一下，回頭看她：「值不值得是打完再說的事。」</p>\n<p>蘇念卿沒有說話。</p>\n<p>她看著他，沉默的時間比平常長了一點，白無極不太確定她在想什麼，她的臉這個角度在夜色裡很難讀，但他感覺她沒有在想什麼負面的事，因為霜翎沒有炸毛——霜翎是個很好的情緒指示器。</p>\n<p>「你這個人，」蘇念卿終於開口，聲音比剛才輕了一點，「真的很奇怪。」</p>\n<p>「奇怪在哪裡？」</p>\n<p>「別人到了你這個位置，要麼熱血沸騰，要麼惶恐不安，要麼裝作很淡定，」她說，「你是真的淡定。」</p>\n<p>「沒什麼好不淡定的，」白無極說，「事情擺在那裡，選擇已經做了，剩下的就是去做，在去做之前熱血沸騰或者惶恐不安都沒有用，只是浪費力氣。」</p>\n<p>蘇念卿又沉默了一下。</p>\n<p>「我是說，你有沒有想過，你本來不屬於這個世界，」她說，「那個把金球送出來的人，選的標準不是你這個人，是一個能承載力量的人，那個人碰巧是你，但也可以是任何人。你有沒有覺得……」她停了一下，「不公平？」</p>\n<p>白無極認真想了一想。</p>\n<p>「不公平，」他說，「是有一點。但這個世界上不公平的事多了，我猝死穿越就是第一件，後來也遇到了不少，都過來了。不公平不代表不能做，不代表不該做，」他說，「而且，」他停頓了一下，「我現在有這兩個，」他看了一眼白金之星和黃金體驗，「有Eternal，有Requiem，有你，有赫連峰，有慕容玄，有天契城。如果說這些不夠打一個契神，那我不知道什麼才夠。」</p>\n<p>他說完，感覺自己這段話有點長，不太像自己的說話風格。</p>\n<p>「說太多了，」他說，「意思就是值不值得是打完再說的事，就這個。」</p>\n<p>蘇念卿看著他，然後她做了一件讓他意外的事——她轉過身，靠在窗邊，肩膀輕輕靠在他的手臂上，沒說話。</p>\n<p>就這樣靠著。</p>\n<p>霜翎在外面沒有動靜，院子裡很安靜，夜風從窗縫裡進來，涼的。</p>\n<p>白無極沒有動，就讓她靠著，看著窗外的星空，想著打完再說，想著一千年前的那個背影，想著那句話的重量——</p>\n<p>去找那個能承載你的人。</p>\n<p>找到了。</p>\n<p>在這裡，在這個夜裡，在這個他稀里糊塗穿越過來的世界裡，站在這裡，有她靠著，有白金之星和黃金體驗靜靜陪著，準備好了。</p>\n<p>打吧。</p>"}, {"title": "第115章_備戰", "content": "<p>第115章　備戰</p>\n<p>消息是慕容玄發出去的。</p>\n<p>不是一封正式的戰書，也不是什麼大義凜然的號召，就是幾個字，通過慕容家在各地的聯絡渠道傳出去：契神封印即將崩潰，天衍大陸靈契制度的根本真相已明，欲知詳情者，往天契城。</p>\n<p>就這幾個字。</p>\n<p>然後消息就像是被人點燃的一把火，在乾燥的原野上燒起來，擋都擋不住。</p>\n<p>三天之內，第一批靈契師從最近的城市抵達天契城，五天之內第二批，七天之內第三批，到第十天的時候，天契城的城門外已經有了一個不小的營地，各地自發聚集的靈契師在那裡紮下來，旗幟各異，靈獸各異，但他們來的目的是一樣的。</p>\n<p>白無極每天早上出門，看著那個營地，感覺有點不真實。</p>\n<p>「你怎麼看起來比較意外？」赫連峰站在他旁邊，手裡抱著一壺靈泉水，嘴裡咬著一根草，看著城外的營地，表情是他慣常的大咧咧，「人心這東西，有時候用不著多說。」</p>\n<p>「我只是沒想到那麼快，」白無極說。</p>\n<p>「靈契真相一出，人人都是受害者，」赫連峰說，「你以為大家願意被人喂了一千年血？」</p>\n<p>這倒是。</p>\n<p>---</p>\n<p>備戰期間，白無極的主要工作是訓練。</p>\n<p>他本來就每天練八極拳——這是習慣，從他還在那個世界的時候就有的習慣，穿越過來也沒斷，反而因為有了白金之星和黃金體驗，有了Eternal和Requiem，多了很多可以測試的新東西。</p>\n<p>Eternal，時停十秒。</p>\n<p>這個能力本身很清晰，但怎麼用是大學問。時停的瞬間，他可以移動，可以攻擊，可以使用黃金體驗，對方完全靜止——理論上十秒鐘他能做非常多事情，問題是每次能做多少，取決於他對時停狀態的熟悉程度。</p>\n<p>他花了幾天測試移動精度——在時停狀態下，他的移動不受任何阻礙，但他需要精確知道自己在時停結束時會在哪個位置，如果算錯了，時停一恢復，對方的攻擊就會繼續，而他的位置如果算錯，那十秒鐘反而是白費的。</p>\n<p>Requiem，因果歸零。</p>\n<p>這個更複雜。任何針對他的攻擊永遠無法到達真實——這個效果讓他在防禦上幾乎無敵，但這個「幾乎」讓他在意。他測試了幾種情況：直接的物理攻擊，Requiem完全無效化；靈力的直接衝擊，Requiem完全無效化；大範圍的環境改變，比如凍結空氣、融化地面，Requiem處理的方式不是讓攻擊消失，而是讓他在那個改變了的環境中不受影響。</p>\n<p>但Requiem對他自己的攻擊沒有限制，他依然可以主動出拳，主動使用白金之星。</p>\n<p>「所以你的問題不是防禦，是輸出，」蘇念卿在旁邊說。</p>\n<p>「對，」白無極說，「Requiem太偏向防禦了，在Eternal時停的十秒裡，我能打多少就是關鍵。」</p>\n<p>「那就練速度，」蘇念卿說，語氣平靜，跟說「那就多吃點飯」一樣理所當然，「白金之星在時停中速度上限是多少？」</p>\n<p>「我還在測試。」</p>\n<p>「測試就繼續測試，我陪你，」她說，站起來，霜翎也跟著站起來，抖了抖十二條尾巴，「我用霜翎的冰壁當靶子，你計時。」</p>\n<p>就這樣，兩個人在院子裡，一個計時攻擊冰壁，一個在一邊統計數據，偶爾蘇念卿提出改進意見，白無極照著試，試完再說哪裡不對，再改。</p>\n<p>這種訓練做起來其實挺枯燥的，但枯燥得很紮實，白無極不介意，蘇念卿更不介意，她這個人就是那種能把枯燥的訓練做得非常認真的性格。</p>\n<p>兩個人的配合越來越默契。</p>\n<p>不是一天兩天，是在蒼雲城、在天契大比、在上古遺跡、在天契城保衛戰一路走來的那種默契，不需要多說，一個眼神，一個動作，就知道對方下一步要做什麼，然後銜接上去。</p>\n<p>霜翎已經把白無極當成自己人了，用實際行動來說就是：它以前見到他頂多點個頭，現在偶爾會湊過來讓他摸，雖然摸的時間從來不超過三秒，超過了它就走開，但已經是非常大的進步了。</p>\n<p>---</p>\n<p>赫連峰主動來找他是在第五天。</p>\n<p>下午，白無極剛練完一輪，正在喝水，赫連峰就進來了，他進門的動靜向來不小，腳步又重，霜翎側頭看了他一眼，懶洋洋地沒有反應——也已經習慣了。</p>\n<p>「有話說，」赫連峰拖了個凳子坐下，沉默了一下，「正事。」</p>\n<p>白無極把水壺放下，看著他。</p>\n<p>「赫連家這次我帶人來，家主點了頭，」赫連峰說，「契神的事，算我赫連家一份。」</p>\n<p>「我知道，你之前說過，」白無極說。</p>\n<p>「說過是說過，我是來正式說的，」赫連峰把手放在膝蓋上，難得的有點認真的樣子，「赫連家的靈師，我帶了四百人，都是精銳，最低契將，其中契王二十一人。你怎麼用，說。」</p>\n<p>白無極想了一下：「不歸我指揮，你是主將，你帶你的人，我負責衝最前面。」</p>\n<p>赫連峰皺眉：「你衝最前面做什麼？你有Requiem，那個保險是最足的，讓你衝可以理解，但你衝了然後呢，我們怎麼跟？」</p>\n<p>「Requiem展開的時候，針對我的攻擊全部歸零，在我身後跟著走，阻力會小很多，」白無極說，「打契神本體是我的事，其他的——擋下外圍的亂局，保護後方的人，這些是你們的。」</p>\n<p>赫連峰盯著他看了一會兒，點頭：「行，清楚了。」然後他站起來，走到門口，停了一下，回頭說：「你知道嗎，我以前見過幾個人說『我去打那個最強的，你們負責其他的』，那種人有兩種——一種是真的能打，一種是膨脹了。你是前者。」</p>\n<p>「你怎麼確定？」白無極問。</p>\n<p>「因為你說這話的時候，臉上一點膨脹的表情都沒有，」赫連峰說，笑了一下，「你就是在說一件很普通的事，『打最強的，算我一個』，就這個。這種人，一般都能扛住。」</p>\n<p>他說完出去了。</p>\n<p>白無極坐了一下，拿起水壺又喝了一口。</p>\n<p>蘇念卿從旁邊說：「你這個人有時候讓人很放心。」</p>\n<p>「你也覺得我能打贏嗎？」</p>\n<p>「我說的不是這個，」她說，翻了個白眼，然後站起來，「繼續，下一組。」</p>\n<p>白無極站起來，白金之星和黃金體驗同步站直，三個人——兩個替身，一個主人，在院子裡的午後陽光裡，繼續那無窮無盡的枯燥訓練。</p>\n<p>城外的營地在那一天又大了一圈。</p>\n<p>又有人來了，帶著靈獸，帶著行李，帶著憤怒，帶著在這個世界活了幾十年之後第一次知道真相的衝擊，帶著想做些什麼的衝動，來到天契城，在城牆外把旗幟插下去，說我在這裡，算我一個。</p>"}, {"title": "第116章_蘇念卿的突破", "content": "<p>第116章　蘇念卿的突破</p>\n<p>那是備戰第八天的午後。</p>\n<p>天氣很好，微風，薄雲，院子裡的光線柔和，訓練做到一半，蘇念卿突然停下來了。</p>\n<p>白無極正在計時第三十七組，抬頭看她：「怎麼了？」</p>\n<p>蘇念卿沒有說話，站在院子中間，表情出現了一個非常細微的變化——她這個人平時的臉是標準的不動如山，但此刻白無極看出來了，她眼神裡有某種東西在震動，輕微的，但他認識她夠久了，一看就知道。</p>\n<p>霜翎先反應。</p>\n<p>它猛地站起來，十二條尾巴全部炸開，然後——然後那十二條尾巴開始生長，白色的尾巴從尖端開始延伸，慢慢地，每一條都在增長，銀白色的毛光在下午的陽光裡變得更亮，像是有什麼東西從內部點燃了。</p>\n<p>白無極退後了兩步。</p>\n<p>不是因為害怕，是因為那個氣場需要空間，他本能地知道現在不應該站太近，讓她有地方。</p>\n<p>霜翎的十二條尾巴繼續變化，十二條，然後在尾端生出更多，分叉，生長，再分叉——白無極數了一下，他不確定，但他大約數到了十四條，十五條——</p>\n<p>整個天契城的靈力在那一刻微微震動了一下。</p>\n<p>不是劇烈的，是一種非常深沉的、來自地底的那種震動，像是一塊大石頭沉入水底，在水面上激起的漣漪雖然不大，但每一圈都傳得很遠，傳到整個城市的每一個角落。</p>\n<p>然後靜止。</p>\n<p>蘇念卿睜開眼，深吸了一口氣。</p>\n<p>她的氣息完全不同了。</p>\n<p>契聖的那種壓迫感，白無極認識——他見過蘇長淵，見過赫連家的老祖宗，見過慕容玄，那種壓迫感是一種特定的厚度，像是此人站在那裡，空氣都有重量。但蘇念卿現在的氣息是另一種東西，更深，更靜，像是契聖之上有一個新的層次，那個層次的氣息不壓迫人，但讓人感受到一種非常古老的、非常原始的力量形態。</p>\n<p>契王。</p>\n<p>霜翎走到蘇念卿身邊，把頭湊進她的手裡，蘇念卿低頭看著它，看著它十五條純白的尾巴在陽光裡緩緩搖動，看著它冰藍色的眼睛。</p>\n<p>「突破了，」她說，聲音很平。</p>\n<p>白無極看著她，然後看著霜翎，然後看著整個院子，院子外面遠處已經有人在議論，剛才那個靈力波動，整個城的人都感受到了。</p>\n<p>「知道，」白無極說，「剛才整個天契城都感受到了。」</p>\n<p>蘇念卿轉頭看他，眼裡有一點點什麼：「你在誇我嗎？」</p>\n<p>「在陳述事實。」</p>\n<p>她翻了個白眼，但嘴角往下壓的動作比往常慢了一點點，壓不太住。</p>\n<p>霜翎在她手裡蹭了蹭，然後展開翅膀——霜翎一直有翅膀，但此刻那對翅膀的形態也變了，翼面更寬，羽毛的顏色從銀白變成了接近純白，翼尖有淡淡的冰晶在凝聚，不是普通的冰，是更深的東西，是連靈力本身都能被凍結的那種冰晶藍。</p>\n<p>「霜翎的能力，」白無極說。</p>\n<p>「可以凍結靈力本身，」蘇念卿說，看著霜翎翼尖的冰晶，「不是凍結靈力的載體，是靈力本身——任何人的靈力輸出通道在霜翎的冰晶覆蓋範圍內，都會被直接凍結。」</p>\n<p>白無極想了一下這個的戰場意義：「凍結靈力通道，等於廢掉靈契師的力量來源。」</p>\n<p>「對，」蘇念卿說，「他們用靈力的通道，我就凍它的通道。」</p>\n<p>「你和你的靈狐，一直都很搭，」白無極說。</p>\n<p>蘇念卿看了他一眼，沒說話，但那個眼神是「這是廢話」的語氣。</p>\n<p>---</p>\n<p>晚些時候，赫連峰聽說了，衝過來的。</p>\n<p>他進門看見霜翎多了三條尾巴，整個人愣了一下，然後大聲說：「你突破了？！」</p>\n<p>蘇念卿：「你這麼大聲。」</p>\n<p>「我激動，」赫連峰說，毫不掩飾，「蘇念卿，契王，整個天衍大陸數得出來的女性契王，上一個是一百二十年前，赫連家的一位老祖宗，我還小的時候聽過她的名字——」</p>\n<p>「不用說那麼多，」蘇念卿說。</p>\n<p>「我就是想表達，你很強，」赫連峰說，然後轉頭看白無極，「你不意外？」</p>\n<p>「早就覺得她要突破了，」白無極說，「蘇念卿的精神力強度一直在漲，那個積累到了臨界點，是早晚的事。」</p>\n<p>蘇念卿看了他一眼，那個看法的眼神，白無極讀懂了：這傢伙在說什麼。</p>\n<p>「他觀察你，」赫連峰說，毫無惡意地直接，「白無極你平時一副什麼都不在意的臉，但你其實很注意身邊的人對不對？」</p>\n<p>「日常習慣，」白無極說，「練八極拳要觀察對手，習慣帶到生活裡了。」</p>\n<p>赫連峰：「……所以你說的不是感情，是武術習慣。」</p>\n<p>「說的是事實，」白無極說，然後看了蘇念卿一眼，「你覺得呢？」</p>\n<p>蘇念卿：「你閉嘴。」</p>\n<p>她說「你閉嘴」的對象是白無極，但她看的方向不太對——她看的是院子的另一個方向，霜翎的方向，白無極看著她側臉的輪廓，在晚霞的光裡，那個嘴角的弧度跟剛才下午的那個一模一樣，壓不住的那種。</p>\n<p>赫連峰抬頭看天，裝作什麼都沒看見，但他的肩膀在抖。</p>\n<p>白無極決定放過這個話題，問了一個實際的問題：「突破到契王，靈力恢復速度和消耗比例有沒有變化？」</p>\n<p>蘇念卿整個人的狀態立刻切換回正常，靠著廊邊，認真思考：「速度快了，消耗比降低了。霜翎的冰凍靈力這個能力，觸發消耗比以前的技能低很多，但持續時間的話，我還需要測試範圍上限。」</p>\n<p>「明天繼續練，把那個範圍上限測出來，」白無極說，「在戰場上，知道自己能覆蓋多大範圍，才能判斷站哪個位置。」</p>\n<p>「我知道，」蘇念卿說。</p>\n<p>「我知道你知道，我就說一下，」白無極說。</p>\n<p>蘇念卿：「……謝謝你說一下。」</p>\n<p>赫連峰：「你們兩個說話的節奏這麼奇怪，你們自己知道嗎？」</p>\n<p>兩個人同時看向他。</p>\n<p>赫連峰：「……我去巡營，再見。」</p>\n<p>他走了。</p>\n<p>霜翎看著他的背影，搖了搖其中三條尾巴，有種「把人嚇跑了哦」的悠閒氣質。</p>\n<p>夜色漸深，天契城在備戰的氣氛裡沉著，但那個沉著裡有一種特別的東西——不是沉重，是那種在做完準備之後，等待的那種平靜，像出征前把鎧甲繫好、把武器磨好之後，坐下來等天亮的感覺。</p>\n<p>蘇念卿突破契王的消息傳開了，在備戰的隊伍裡引發了一陣小小的振奮，那也是這段時間難得的輕鬆時刻——即將去面對的是什麼大家都清楚，但今天，先為這件事高興一下，無妨。</p>"}, {"title": "第117章_盟友們", "content": "<p>第117章　盟友們</p>\n<p>決戰前三天，最後一次戰略會議在天契城最高的瞭望台上召開。</p>\n<p>瞭望台是天契城的制高點，從那裡可以俯瞰整個城市，也可以看見城外連綿的備戰營地，更遠處是起伏的山脈，再遠，是天衍大陸深處，是天淵谷的方向，雖然隔著幾百里，但此刻站在那個高台上，白無極覺得他能感覺到那個方向有什麼東西在那裡，沉默地等著，像一個已經拉開的弓，等著箭發出去。</p>\n<p>到的人是五個：蘇長淵、赫連峰、慕容玄，以及白無極和蘇念卿。</p>\n<p>蘇長淵是蘇家家主，契聖，蘇念卿的父親——他這個人白無極見過幾次，話不多，但每次開口說的都是關鍵的話，氣場不像赫連峰那麼外放，但安靜得讓人信服，像一塊沉在水底的鐵，不說話，但分量在那裡。</p>\n<p>赫連峰是赫連家年輕一輩的主將，契聖。他之前突破了，說起來也是這段時間的事，但他突破的動靜比蘇念卿安靜多了，沒有整個城市都感受到，只是他本人結結實實地強了一個層次。</p>\n<p>慕容玄，慕容家少主，契聖，知道的事情最多，但一直不是最多說話的那個。</p>\n<p>白無極，沒有頭銜，精神力使者，有兩個只有他看得見的替身，一個可以時停十秒，一個可以讓因果歸零。</p>\n<p>蘇念卿，蘇家嫡女，剛突破的契王，銀色靈狐霜翎，可以凍結靈力本身。</p>\n<p>五個人站在瞭望台上，城裡的風在這個高度比下面大，把衣角吹動，把說話的聲音帶遠了一點。</p>\n<p>蘇長淵先開口，他說話的方式是從結論開始的：「這場仗的核心問題只有一個——阻止契神在封印完全崩潰後重建靈契制度的控制網絡，這個控制網絡一旦重建，他的力量將再次覆蓋全大陸，在場所有人加起來，也打不過那個狀態下的他。所以，時間窗口是封印剛崩潰後，那是他最弱的時刻，也是唯一的時機。」</p>\n<p>「有多弱？」赫連峰問。</p>\n<p>「不知道，」蘇長淵說，「沒有人知道封印崩潰後他的實際狀態，這是未知數。」</p>\n<p>「已知數呢？」白無極問。</p>\n<p>「封印地的位置，天淵谷，已確認，」慕容玄接過話，聲音依然冷淡，「古籍記載天淵谷的封印地有六層防禦法陣，都是千年前留下的，但那些法陣是用來封印契神的，對我們的阻礙效果如何，沒有記載。靠近天淵谷的靈力壓迫，根據古籍描述，是契神力量的自然溢出，越靠近越強，普通靈契師在五里外就會行動受阻，契王以下在三里外就會失去靈力掌控能力。」</p>\n<p>「我走最前面，」白無極說，「Requiem展開，針對我的靈力壓迫被因果歸零，我能走進去，你們跟著走我走過的路，壓迫會小很多。」</p>\n<p>「這條路你能確保有效嗎？」蘇長淵問。</p>\n<p>「測試過了，」白無極說，「備戰期間在城外模擬過一次，Requiem對環境類的靈力干擾，效果是讓我不受影響，跟在我後面五米以內的人，同樣受影響的程度大幅降低。五米之外的話，效果遞減，但也比完全沒有我好。」</p>\n<p>蘇長淵點了點頭，沒有繼續質疑，接受了這個答案。</p>\n<p>---</p>\n<p>接下來是分工。</p>\n<p>蘇長淵說他帶蘇家的主力陣線負責守後方——在他們推進的時候，契神的力量溢出會產生靈力異變，可能會有魔獸或者亂象，後方需要有人穩住陣腳，不能讓推進的隊伍被後方的混亂打散。</p>\n<p>赫連峰說他帶他的四百精銳負責中段——他們在白無極和蘇念卿的後面，如果前方有需要大規模靈力輸出的局面，他頂上去，同時保護沒有契王以上實力的人。</p>\n<p>慕容玄說他的任務是找古籍裡提到的封印陣殘骸，那些殘骸有可能還殘留一些對契神有制約效果的古法陣能量，他去判斷能不能借用——他說這句話的時候臉上什麼表情都沒有，但白無極感覺他說的是他最確定自己能做的事，其他他不敢說保證，但找古籍裡的線索，他能做。</p>\n<p>「我，」蘇念卿說，是五個人裡第四個說話的，「霜翎的冰凍靈力能力，在契神周圍展開，凍結他的靈力輸出通道，讓他的攻擊難以成形。持續時間有限，窗口期是二十秒左右，這二十秒，夠用嗎？」她的眼神看向白無極。</p>\n<p>白無極想了一下：「我的Eternal是十秒，這二十秒是兩次Eternal。夠了。」</p>\n<p>「兩次Eternal裡，你能做什麼？」</p>\n<p>「打他，」白無極說，「Eternal+Requiem的組合，時停中對他輸出，他的任何反擊到不了我——如果霜翎能凍他的靈力通道，讓他連反擊成形都成形不了，那我打出去的東西，他只能硬接。」</p>\n<p>「這是假設他的靈力通道能被凍住，」蘇長淵說，「他是契神，靈契制度的設計者，靈力的掌控程度，我們無法預測。」</p>\n<p>「所以才說是時機，」慕容玄說，「封印剛崩潰，那是他最弱的時刻，他的力量還沒恢復，那個時刻霜翎的能力才有效。晚了，或者他恢復得比我們預計的快，就不一定有效。」</p>\n<p>所有人都沉默了一下。</p>\n<p>然後輪到最後一個人說話。</p>\n<p>所有人都看著白無極。</p>\n<p>他站在瞭望台的邊緣，手搭在石欄上，低頭看了一眼城外連綿的營地，然後抬頭，看向天淵谷的方向，那個方向此刻只有起伏的山脈，只有普通的天光，看不見任何異常，但他感覺那個方向有什麼東西在等著，等了一千年了，再等三天。</p>\n<p>「我去打契神本體，」他說，「你們幫我擋其他的。」</p>\n<p>台上靜了一下。</p>\n<p>慕容玄開口：「就這樣？」</p>\n<p>「就這樣，」白無極說。</p>\n<p>赫連峰：「分工說得很……簡潔。」</p>\n<p>「有什麼複雜的，」白無極說，轉過身來，看著台上四個人，「每個人的特長和能做的事都說了，分工按特長來，最後那個關鍵的攻擊，是我打，因為我有Requiem，我打的時候不怕他反擊，你們打他反擊一下你們就完了——這不是我特別厲害，這是因為我的能力特性正好適合打這個，就這個。」</p>\n<p>「『這不是我特別厲害』，」赫連峰低聲重複了一遍，然後搖頭，「你這個人的自我認知很有意思。」</p>\n<p>「我就是普通人，」白無極說，「普通人用普通人的方法做事，效率高，不費腦子。」</p>\n<p>蘇長淵看著他，沉默了一下，說了一句話：「我把念卿交給你帶。」</p>\n<p>這句話的分量很重，蘇長淵說得很平，但白無極聽清楚了那個重量。</p>\n<p>他看了蘇念卿一眼，蘇念卿側頭，視線剛好也過來，兩個人對視了一秒。</p>\n<p>「好，」白無極說。</p>\n<p>蘇念卿沒有說「我不需要帶」，她平時會說的那種話，但她今天沒有說。</p>\n<p>她只是轉過頭，繼續看向天淵谷的方向。</p>\n<p>風在瞭望台上吹著，五個人在那個高處站著，城外的旗幟在風裡飄，千里以外的天淵谷在等，一千年的舊債在等，一個準備了千年的問題，終於要到要解答的那天了。</p>"}, {"title": "第118章_封印之地", "content": "<p>第118章　封印之地</p>\n<p>大軍在出發前一夜沉默地整備。</p>\n<p>沒有人大聲說話，沒有人喝酒慶功，沒有出征前那種熱血沸騰的叫喊——那些在小說裡常見的場面，在現實裡不太發生，因為每個人都清楚明天要去面對什麼，清楚了，就不怎麼叫得出聲音來。</p>\n<p>白無極坐在院子裡，把八極拳的每個樁式從頭到尾過了一遍，慢速的，每個動作都做到位，感受每個姿勢裡力量的走向，呼吸，重心，出拳的路徑，收回的角度，全部都是他練了十幾年的東西，現在加上了精神力的底，做起來有不同的質感，但本質是一樣的——把自己調到最好的狀態，把每一個動作做扎實，然後去做要做的事。</p>\n<p>蘇念卿在隔壁院子，白無極能感覺到霜翎的靈力波動，是穩定的，有節律的，說明她也在整備，也在讓自己進入狀態。</p>\n<p>赫連峰來道過晚安，說明天見，走了。</p>\n<p>慕容玄來放了一本薄薄的冊子在他桌上，什麼都沒說，走了，白無極翻開一看，是天淵谷的地形記錄，慕容家的古籍裡抄錄出來的，每一條路，每一個可能的地形特徵，每一個古籍裡記載的危險點，全部都標注出來了，字非常小，但非常清晰。</p>\n<p>白無極把那本冊子從頭看到尾，然後放好，躺下，閉眼。</p>\n<p>睡著了。</p>\n<p>沒有做夢。</p>\n<p>---</p>\n<p>天亮得很快，出發在辰時。</p>\n<p>天契城的南門打開，大軍從那裡出發，規模比白無極想像的大，赫連峰的四百精銳是最核心的戰力，外圍還有自發跟來的各地靈契師，蘇家的後勤部隊，以及慕容玄帶著的幾個古籍研究的學者——那些學者看起來完全不像戰士，但慕容玄說他們有用，就把他們帶上了。</p>\n<p>白無極走在最前面。</p>\n<p>這不是刻意擺的什麼姿態，是分工決定的位置——Requiem要開路，開路的人要走最前，就這個。</p>\n<p>蘇念卿走在他旁邊，霜翎在前方三米的位置輕盈地走著，它的十五條尾巴微微展開，像一個移動的感應器，隨時在探測前方的靈力環境。</p>\n<p>白無極沒有出發就展開Requiem，因為那個消耗是持續的，路途幾百里，他要在刀刃上用力，不在刀背上耗。他讓白金之星和黃金體驗走在隊伍兩側，他們不干涉任何人，只是走著，但他們的存在，讓整個隊伍有某種說不清楚的底氣。</p>\n<p>沒有人看得見兩個替身，但大家都知道白無極有替身，知道他的力量是什麼——也許就是這個認知，讓後面的人跟著走的步伐比較穩。</p>\n<p>---</p>\n<p>天淵谷在大陸的最深處，從天契城走需要兩天半的行程，第一天是普通道路，穿過幾個村莊，越過兩條河流，地形開闊，行軍速度不慢。</p>\n<p>第二天開始不一樣了。</p>\n<p>進入山地，道路變窄，植被越來越稀，地面的顏色開始往深處走，不是那種正常的土地顏色，是一種偏暗的灰褐，像是這片土地的養分被什麼東西抽走了，只剩下外殼。</p>\n<p>然後他們開始感受到壓迫。</p>\n<p>在距離天淵谷還有三十里的地方，隊伍裡的普通靈契師開始皺眉——那是一種非常細微的不適感，不像被人攻擊，更像是走進了一個靈力濃度過高的環境，每一口呼吸裡都有靈力，但那個靈力不是中性的，是帶著某種傾向的，像是在說「這裡不是你的地方，離開」。</p>\n<p>白無極感覺到了，但對他沒什麼效果，Requiem把那個「離開」的信號在到達他之前就歸零了。</p>\n<p>「展開，」蘇念卿輕聲說，走在他旁邊。</p>\n<p>白無極讓黃金體驗微微張開，Requiem開始覆蓋周圍，那個覆蓋的半徑是一個比較有限的範圍，但白無極讓隊伍收緊，縮短前後的間距，盡可能讓更多人在Requiem的覆蓋影響裡。</p>\n<p>後面的人明顯感覺到了差異——就像是走進了一個無形的遮蔽裡，那個靈力壓迫的強度驟然降低了，還有，但是能走。</p>\n<p>赫連峰在後方發了一個聲音，那是信號，意思是「收到，繼續推進」。</p>\n<p>大軍繼續前進。</p>\n<p>十里，二十里，二十五里。</p>\n<p>天色開始奇怪，不是陰天，是天光的顏色本身變了，從正常的藍白，慢慢往一種更深的灰藍走，像是距離那個封印越近，這片天空的光線就越被壓低，被吸收，被那個巨大的存在吸納進去。</p>\n<p>地面的裂縫開始出現，細的，像是乾旱的地面，但那些裂縫的走向不是隨機的，它們有方向感，每一條都指著同一個地方，像是大地在向那個方向傾斜。</p>\n<p>三十里，走過一個山口，天淵谷出現了。</p>\n<p>白無極在山口停了一下，看著那個谷地。</p>\n<p>它比他想像的要大，也比他想像的要靜——那個靜不是正常的靜，是一種深度的、完全沒有生命氣息的靜，沒有鳥，沒有蟲，沒有風，連空氣流動的聲音都消失了，像是這個空間把時間也一起凍住了。</p>\n<p>谷地的中心，遠遠能看見一個隱約的光暈——不是亮的光，是那種黑暗中最後殘留的一點發光體的那種光，昏沉的，垂死的，但還在。</p>\n<p>那是封印陣。</p>\n<p>「還沒有完全碎，」慕容玄走上來，站在白無極旁邊，看著那個遠處的光暈，「但很快了，光暈這個顏色，是封印力量的最後殘存，那個光消失的那一刻——」</p>\n<p>「封印崩，」白無極說。</p>\n<p>「是。」</p>\n<p>白無極看著那個昏沉的光，讓自己的呼吸慢下來，讓精神力的流動平穩，讓白金之星和黃金體驗站在他的兩側，感受一下它們的狀態，感受一下Eternal和Requiem的精神感應——全部正常，全部準備好了。</p>\n<p>他往前走。</p>\n<p>沒有宣言，沒有回頭，就是往前走，腳踩在那片灰褐色的、被力量抽空的土地上，Requiem在他身邊展開，那個展開的範圍像一個無形的氣泡，把所有針對他的靈力壓迫全部抹去，他走得非常輕鬆，像是在自家院子裡散步。</p>\n<p>蘇念卿跟上去，霜翎在前方，白色的身影在那片灰暗的土地上非常顯眼，幾乎是唯一的白色。</p>\n<p>身後，赫連峰帶著隊伍跟上，腳步聲在那個異常的靜謐裡特別清晰，每一步都踏實，有分量。</p>\n<p>慕容玄走在赫連峰旁邊，拿著那本古籍，翻著，比對著眼前的地形，低聲對旁邊的學者說著什麼。</p>\n<p>蘇長淵壓在最後，帶著蘇家的後勤陣線，他回頭看了一眼所有人，然後轉過頭，跟著往前走。</p>\n<p>天淵谷在前方等著，昏沉的封印光暈在遙遠的谷心閃爍，像一盞快要熄滅的燈。</p>\n<p>白無極走在最前面，腳下的土地沉默，頭頂的天空壓低，千年等待的終點，在幾十里之外，在那個光熄滅的瞬間，正在倒計時。</p>"}, {"title": "第119章_封印崩碎", "content": "<p>第119章　封印崩碎</p>\n<p>抵達天淵谷核心需要走最後的三里路。</p>\n<p>那三里路是整段行程裡最難走的，不是因為地形複雜，而是因為靈力壓迫在這個範圍以幾何倍數增長——每往前一步，空氣就重一分，那個重量不是物理的，是精神上的，像有什麼東西在你的腦子裡說：不要走，回頭，這裡不是人能待的地方，你不應該來這裡。</p>\n<p>赫連峰咬著牙跟著走，他的臉色白了一截，但腳沒有停。</p>\n<p>後面的人有幾個開始踉蹌，赫連峰一把扶住旁邊的契王，喝了一聲：「撐住，跟緊前面！」</p>\n<p>蘇念卿走在白無極旁邊，臉上沒有特別的表情，但她的手微微收緊，霜翎緊貼著她的腿，那個動作不是怕，是守護，是「我在這裡」的意思。</p>\n<p>白無極感覺到了Requiem的消耗比平時大——那個消耗說明這裡的靈力密度是真實的、龐大的，Requiem在持續抹去每一個試圖壓制他的因果，工作量比之前大了很多。但它沒有撐不住的跡象，還在，還穩。</p>\n<p>谷心越來越近。</p>\n<p>封印陣的光暈，在近處看，遠比遠處看時更讓人感覺到一種東西——那個光不是發亮的，是在消耗殆盡前的那種殘留，像一根蠟燭燃到了最底部，油已經燒盡，但燭芯還有最後一點火，勉強撐著，每燃一下都是最後一下。</p>\n<p>古老的封印陣在那裡，千年前留下的，用來封住那個終結了精神力文明的人。</p>\n<p>白無極站在封印陣外十步，停下來了。</p>\n<p>他第一次停下來，低頭看了看腳下——地面不是灰褐色了，是黑色的，那個黑是從下往上滲出來的，細細的裂縫在地面蔓延，每一條裂縫都有黑色的東西在流動，不是液體，是純粹的力量，是被封印了千年的東西，從最細小的縫隙裡滲出來，試探著，尋找著。</p>\n<p>「那個，」蘇念卿輕聲說，「是他的力量。」</p>\n<p>「嗯，」白無極說，「在滲。」</p>\n<p>「封印還沒碎，」慕容玄跟上來，看著那些黑色裂縫，聲音有點緊，「但這個滲透速度，比古籍裡描述的快，他比我們預計的更急迫。」</p>\n<p>「他知道我們來了，」白無極說。</p>\n<p>慕容玄沉默了一下，沒有否認。</p>\n<p>身後的隊伍全部停下來，沒有人說話，所有人都感受到了那個東西——從地縫裡滲出的黑色力量，每一絲都帶著巨大的壓迫感，那個壓迫感和剛才靈力環境的壓迫不同，這個是有意識的，是有某種意志在後面推動的，在說：我在這裡，我快出來了。</p>\n<p>然後，封印陣的光暈開始快速減弱。</p>\n<p>不是慢慢減弱，是那種突然的、急速的消耗，像是某個東西在裡面從內部猛烈撞擊，燭光在劇烈的晃動裡急速燃盡。</p>\n<p>白無極：「後退二十步。」</p>\n<p>他說這話的語氣很平，但蘇念卿立刻把手臂往後一擺，那個動作讓她旁邊的人本能地往後退，赫連峰跟著喝令：「全隊後撤！」</p>\n<p>隊伍快速往後移動，白無極沒有動，他站在原地，蘇念卿停在他身後五步，霜翎在她旁邊，沒有後退，三個人——兩個人一隻靈狐——站在那裡，看著封印陣的光暈急速消減，看著地面的黑色裂縫快速蔓延，越來越多，越來越寬。</p>\n<p>封印陣的光，在顫抖中閃了幾下，那個顫抖是無規則的，像心臟驟停前的最後幾下亂跳——</p>\n<p>然後，所有的光消失了。</p>\n<p>完全消失，一瞬間，什麼都沒有了，那個存在了千年的封印陣，在這一刻徹底死透了，沉默，靜止，只剩下一堆在黑暗裡幾乎看不見的殘骸輪廓。</p>\n<p>然後地面開始震動。</p>\n<p>不是地震那種全面的震，是從那個核心點向外傳導的震，有節律的，像巨大的腳步聲，像什麼東西正在站起來，第一次在千年之後調動自己的力量，讓凍僵的身軀重新活動。</p>\n<p>黑色的力量從地縫裡噴湧出來。</p>\n<p>不再是滲，是噴，是完全解放的那種噴湧，像是一道被壓了千年的水壩驟然崩塌，億萬噸的力量在一瞬間找到了出口，往外衝，往上衝，往每個方向衝。</p>\n<p>天地色變。</p>\n<p>那個「色變」不是比喻，是真實的視覺——天空的藍色被黑色的力量染了，從谷心的位置往外蔓延，像墨滴進水裡，一圈一圈地暈染，越來越大，越來越深，整個天淵谷的天空在幾秒之內從正常的天藍變成了一種暗沉的、幾乎沒有光的深灰黑。</p>\n<p>地面的裂縫在那個力量的衝擊下徹底斷裂，大塊的地面翻起來，像翻書一樣，那些碎裂翻起的石板在半空中停了一下，然後被黑色的力量托著，緩緩懸浮，像是這個空間的物理規則本身在那個力量的影響下變形了。</p>\n<p>隊伍後方有人驚叫出聲，被赫連峰喝止了，但那聲驚叫的人不奇怪，任何一個第一次見到這個場面的人，都得叫一下。</p>\n<p>白無極站在那裡，看著黑色的力量像洪水一樣蔓延，看著懸浮的石板，看著變色的天空，感受著Requiem在他周圍持續工作，把每一個觸及他的黑色力量觸鬚全部抹去——</p>\n<p>他沒有動，因為他知道，這只是開始。</p>\n<p>洪水蔓延，越來越廣，漫過了整個谷地，那個黑色在地面和天空之間形成一種厚重的幕布，把所有的正常光線都隔絕在外。</p>\n<p>谷心的黑暗裡，那個力量開始凝聚。</p>\n<p>不再是擴散，是收縮，是聚集——那些蔓延出來的力量從四面八方往中心回流，像一個巨大的漩渦把所有力量吸回去，然後在那個中心點，一個形態開始出現。</p>\n<p>從輪廓，到細節，從細節，到完整。</p>\n<p>人形。</p>"}, {"title": "第120章_契神", "content": "<p>第120章　契神</p>\n<p>那個人形在黑色的力量裡緩緩成形。</p>\n<p>緩慢，但不是因為力量不足，而是像一個沉睡了很久的人醒來，不急，一點一點地確認自己的每個部分，讓沉睡的記憶回流，讓千年的封閉逐漸解開——那個從容，比急迫更讓人不安，因為它說明那個存在不覺得自己有任何理由需要匆忙。</p>\n<p>黑色的力量最後全部歸位，天空的墨色凝定，懸浮的石板在半空靜止，整個天淵谷重新安靜下來，但這個安靜和之前的不一樣——之前是空洞的、無生命的靜，現在是有重量的、有意識的靜，是有一個極大的存在站在那裡，讓整個空間本能地閉上嘴巴。</p>\n<p>白無極看著那個人形完全成形，然後看清楚了那個人。</p>\n<p>他愣了一秒。</p>\n<p>是一個老人。</p>\n<p>看起來像一個非常普通的老人，鬚髮皆白，面容平靜，身上穿的是非常簡樸的灰色長袍，樣式毫無特點，沒有任何紋路或者裝飾，就是那種集市上一百文錢能買到的普通衣服。他個子不高，也不壯，站在那個黑色的力量慢慢消散後的空地上，看起來就是任何一個城市角落都能見到的、賣豆腐或者修鞋的老頭。</p>\n<p>但是。</p>\n<p>白無極感覺到了。</p>\n<p>不是看見，不是聽見，是感覺到——那個老人站在那裡，整個天淵谷的天地法則都在向他傾斜。不是比喻，是真實的力量現象，是法則本身在向一個存在低頭，像是這個世界在骨子裡認識這個人，在他面前有一種動物見到頂端捕食者時的本能臣服，靜的，深的，無法用意志壓制的。</p>\n<p>赫連峰在身後某個位置，白無極沒有回頭，但他感覺到赫連峰的靈力波動有一個瞬間的失控，那個失控被強行壓制住了，但那一瞬，說明了一件事——即使是契聖，在這個存在面前，精神力會本能地顫抖。</p>\n<p>蘇念卿站在白無極身後，他感覺到她的存在，穩定的，沒有失控，但她的呼吸節律有一個細微的改變。</p>\n<p>霜翎沒有出聲，但它的十五條尾巴全部豎起來了，那個動作不是攻擊姿態，是極度警覺的姿態。</p>\n<p>那個老人睜開了眼睛。</p>\n<p>他的眼睛是黑色的，不是暗褐色，不是深灰色，就是黑，純粹的黑，像兩個沒有底部的洞，你往裡看，感覺自己能一直看下去，看不到盡頭。</p>\n<p>他站在那裡，眼睛慢慢掃過了在場的所有人，掃得很慢，像是在清點，像是在確認一件他早就預計到的事，一個一個地掃——</p>\n<p>最後，目光落在白無極身上。</p>\n<p>停在那裡，久久沒有移開。</p>\n<p>白無極也在看他。</p>\n<p>這個時刻說起來應該是什麼都說不出口的對峙，但白無極的腦子裡，在那個老人的目光落在他身上的瞬間，有一個非常奇怪的感覺——</p>\n<p>熟悉。</p>\n<p>那個熟悉感，跟他在夢裡見到金球記憶裡那個背影時的感覺，是同一種。</p>\n<p>他說不清楚這是哪裡來的，說不清楚一個千年前終結了精神力文明、被封印了一千年的怪物，為什麼會讓他有熟悉感。但那個感覺就在那裡，不是幻覺，是真實存在的感受，讓他的眉頭微微皺了一下。</p>\n<p>那個老人開口說話了。</p>\n<p>聲音很平，年邁的、不高的嗓音，但每個字都清晰傳進了在場所有人的耳朵，沒有特別放大，就是自然地傳到了，像是這個空間本身在幫他傳聲。</p>\n<p>「精神力……」他說，然後停了一下，停的那一下不長，但有某種東西在那個停頓裡，像是意外，或者像是某種更複雜的感情，「沒想到還有後繼者。」</p>\n<p>白無極聽到這句話，確認了一件事：他看得見白金之星和黃金體驗。</p>\n<p>那兩個替身，只有精神力使者能看見，普通人，包括靈契師，都看不見——但這個老人說「精神力還有後繼者」，他看到了，他認出了，那就說明他能看見。</p>\n<p>這個世界上，除了白無極，第一個能看見兩個替身的，是這個人。</p>\n<p>白無極把這件事記下，然後開口：「你就是契神？」</p>\n<p>那個老人看著他，那雙黑色的眼睛，在那個問題落下之後，有一個什麼東西在最底層動了一下，輕微的，幾乎察覺不到，但白無極察覺到了。</p>\n<p>「是，」那個老人說，然後頓了一下，他的聲音在那個頓停裡有一絲說不清楚的東西，不是平靜，也不是驕傲，「也曾經不是。」</p>\n<p>這句話讓整個場面安靜了下來。</p>\n<p>也曾經不是。</p>\n<p>白無極站在那裡，看著這個已經終結了精神力文明、推行靈契制度一千年、用整個大陸的代價喂養自己的存在，聽著那句「也曾經不是」，感受著那個熟悉感，感受著Requiem在他周圍沉穩地工作，感受著白金之星和黃金體驗在他兩側，感受著蘇念卿的存在在他身後。</p>\n<p>他的右手微微收了一下拳。</p>\n<p>那個老人還在看著他，那雙黑色的眼睛，千年了，在封印裡等了千年，此刻看著他的眼神裡有一種東西，讓白無極一時無法判斷那是什麼——不是敵意，至少此刻不是，但也不是善意，是某種白無極沒有見過的、需要更多信息才能讀懂的東西。</p>\n<p>風在天淵谷裡動了一下，第一次，從封印崩碎以來，有風了，帶著地底的寒意，從谷底往上刮。</p>\n<p>背後，赫連峰的靈力波動穩定了，他重新掌控住了自己，白無極沒有回頭，但他知道。</p>\n<p>慕容玄在後方某個位置低聲說了一個字，那個字被風帶走了，白無極沒有聽清，但他知道慕容玄在說什麼，他在看那個老人，在對上古籍裡的記載，在確認。</p>\n<p>蘇念卿輕輕往前走了半步，站到白無極左側，和他並肩，不是因為他需要，而是因為這一步說明了她站在哪裡。</p>\n<p>霜翎的翼尖冰晶開始凝聚，無聲的，剋制的，但準備好了。</p>\n<p>天淵谷在那個安靜裡，在那個剛結束了千年封印的、黑色力量還未完全散盡的空間裡，等著那個最後的問題被問完，等著那個回答被聽清，等著下一秒鐘到來。</p>\n<p>千年的等待，在這裡走到了終點。</p>\n<p>終戰，開始。</p>\n<p>---</p>\n<p>**〔第四卷終〕**</p>"}, {"title": "第121章_神的力量", "content": "<p>第121章　神的力量</p>\n<p>天淵谷的空氣凝固了。</p>\n<p>不是比喻，是字面意義上的凝固——那一刻，所有人的肺都停止了擴張，風停了，雲停了，連草葉上的露水都忘記了滴落，整個世界像是被一隻無形的手捏住，強行按下了靜止鍵。</p>\n<p>然後，那隻手輕輕一抬。</p>\n<p>沒有法術，沒有咒語，甚至沒有任何可見的能量波動。只是一個普通老人的普通動作——就像一個坐了太久的老頭站起來活動手腳。</p>\n<p>重力翻轉了。</p>\n<p>距離谷心三百步的區域內，大地不再向下，而是向上。八名契士來不及反應，腳下的土地從他們的鞋底撕裂，整個人向天空「墜落」。他們驚叫著試圖展開靈契，但靈力在離體的瞬間就像被一隻看不見的手掐住，嗤的一聲，散了。</p>\n<p>八個人在半空中失去了所有靈力。</p>\n<p>然後重力回歸正常，他們真正向下墜落。</p>\n<p>蘇長淵揮袖，氣流托住了其中四人；赫連峰大步衝出，硬生生用血肉之軀接住了另外兩人；最後兩人落地，骨折，昏迷，沒有死，但已失去戰力。</p>\n<p>這一切發生在五秒之內。</p>\n<p>契神站在天淵谷的正中心，他的外表依然是那個普通的老人——白髮，皺紋，一件洗得發白的舊袍子，如果放在街頭，絕對是那種被年輕人讓座的老大爺形象。但此刻他站在那裡，就像一塊被插入棋盤正中心的異物，整個天地都在他周圍悄悄變形，宛如一張薄紙被頂著它中心的手指微微拱起。</p>\n<p>他低頭看了看自己的手，像是在確認什麼。</p>\n<p>「千年了。」他的聲音很輕，像是在自言自語，「真的千年了。」</p>\n<p>沒有人敢說話。</p>\n<p>天衍大陸有史以來最強的陣仗——三大家族的契聖坐鎮，十七名契王環繞，一百三十餘名契師精英，外加各家族的壓箱底底牌。這個陣容放在任何時代，都足以橫掃一切已知威脅。</p>\n<p>但所有人都感受到了同一種東西：壓迫。</p>\n<p>不是力量的壓迫，不是靈力的壓迫，而是某種更根本的東西——就像一隻螞蟻感受到人腳踏下的那種，不是傷害，是存在本身的不對等。</p>\n<p>蘇念卿站在中陣，霜翎趴在她肩頭，銀色的毛髮豎了起來。那十五條尾巴微微顫抖，不是寒意，是某種本能的恐懼。靈狐的感知比人類更敏銳，霜翎感受到的東西蘇念卿猜不到，但那種顫抖讓她握緊了拳頭。</p>\n<p>她掃視四周，所有人——她的父親，赫連峰，慕容玄，所有她認識的強者——此刻都有一個共同的表情：茫然。</p>\n<p>那是從未遭遇過的茫然。他們練了一輩子靈契，戰了一輩子，但從來沒有遇到過這種感覺——對面的存在讓他們的所有經驗全部失效，就像一個只玩過棋盤遊戲的人突然被放進了現實戰場，規則不一樣了，完全不一樣了。</p>\n<p>然後她看到了白無極。</p>\n<p>白無極站在所有人的最前面。</p>\n<p>他是唯一一個站得筆直的人。</p>\n<p>周圍所有人都在那股無形的壓力下弓著背，有人跪了半膝，有人扶著地，就連蘇長淵那樣的契聖都在用靈力硬撐著維持站姿——但白無極站在那裡，像一根釘進地裡的木樁，既沒有靈力波動，也沒有任何防禦姿態，就是站著，雙臂自然垂落，甚至連表情都沒有特別凝重，只是皺著眉頭，帶著一種「這是什麼情況」的正常困惑。</p>\n<p>黃金體驗·Requiem在他的外圍無聲運轉。</p>\n<p>因果歸零。</p>\n<p>那股針對所有人的壓力，對他而言不是壓力，是一陣風，是一片落葉，是完全無法抵達的東西。它不是被擋住的，它是在抵達之前就被抹除了「會傷害白無極」這個可能性本身。</p>\n<p>契神的目光落在他身上，停了一秒。</p>\n<p>那是第一次，契神的目光有了焦點。</p>\n<p>白無極感覺到那道視線，對視了回去。在那雙看起來渾濁的老人眼睛裡，他看到了某種東西——不是人類的那種情緒，而是某種更古老、更平靜的東西，像是深淵在看他。</p>\n<p>「有意思。」契神說。</p>\n<p>他又抬了抬手，這次力道稍稍重了一些。</p>\n<p>方圓兩百步，大地龜裂，向上翻卷，石塊向四面八方飛射，不是爆炸，是像有人用手指輕輕撥了一下棋盤上的棋子。三十餘名中階契師瞬間昏厥，不是被打中，是靈力被強制剝奪——那種剝奪不是破壞，而是「收回」，就像房東收回了租出去的東西。</p>\n<p>有人大叫起來。有人試圖後退，有人試圖攻擊。</p>\n<p>混亂在後排蔓延。</p>\n<p>白無極沒動。</p>\n<p>他站在那裡，看著那個老人，看著那些從地上翻卷起來的石塊在他身周繞了一圈，沒有一塊能真正砸到他——不是因為他躲開了，是因為那些石塊在接近他的瞬間就失去了「能傷害他」的可能性，Requiem讓一切傷害在抵達之前就消散於因果之中。</p>\n<p>他清了清嗓子。</p>\n<p>回頭看了一眼身後那些跪地、昏倒、茫然的人群。</p>\n<p>然後重新看向契神。</p>\n<p>契神也看著他。</p>\n<p>「你。」老人開口，聲音依然平靜，「靠過來一些。」</p>\n<p>白無極沒有靠過去，但也沒有退。他雙腿微微分開，擺出一個八極拳的起手式。</p>\n<p>這個姿勢放在普通人身上看起來相當正常，放在此刻的天淵谷，放在這個全場最強者都被壓得抬不起頭的絕境之中，卻產生了某種奇異的效果——像是整個戰場的荒謬被他這一個姿勢給具象化了。</p>\n<p>蘇念卿盯著他的背影，不知道為什麼，那股壓迫感輕了一些。</p>\n<p>不是因為白無極做了什麼，只是因為他站在那裡。</p>\n<p>有些人的存在本身就是定心丸，不在於他有多強，而在於他讓你知道：哪怕再荒謬的絕境，也有人選擇站著面對。</p>\n<p>契神低下頭，那副普通老人的面孔上，浮現了一個很淡的表情。</p>\n<p>很難定義那個表情，不是笑，不是怒，不是輕蔑，更不是讚賞。</p>\n<p>只是某種久違的東西。</p>\n<p>「千年了，」他再次輕聲說，這次似乎是對著白無極說的，「終於又有人讓我覺得有點意思了。」</p>\n<p>他伸了個懶腰。</p>\n<p>方圓五十里，天地法則同時震動，雲層翻湧，大地低鳴，遠處山峰的頂端無聲崩碎。</p>\n<p>這是他「活動筋骨」的力道。</p>\n<p>他還沒有出手。</p>\n<p>白無極皺著眉頭，盯著對面那個老人，心裡轉過一個念頭：</p>\n<p>這傢伙打起來應該很麻煩。</p>\n<p>然後他想到了另一個問題，回頭對蘇念卿喊了一句：「你沒事吧？」</p>\n<p>蘇念卿：「……你認真的嗎。」</p>\n<p>「認真的，我看你臉色不太好。」</p>\n<p>「我臉色一直這樣。」</p>\n<p>「哦，那沒事了。」他重新轉向契神，「好，我們繼續。」</p>\n<p>契神沉默片刻，說：「你很奇怪。」</p>\n<p>「聽過。」白無極說，「不是第一個說這個的。」</p>\n<p>後方，三個契聖對視了一眼。</p>\n<p>他們的靈力都在硬撐，承受著那股無形的壓力，卻都沒有說話。</p>\n<p>只是看著那個站在最前面、用最沒有高手架勢的姿勢、跟那個神說話的普通年輕人。</p>\n<p>蘇長淵低聲說了一個字：「撐。」</p>\n<p>撐住陣型，配合那個年輕人。</p>\n<p>不是因為他們有把握，而是因為此刻他是唯一一個還能正常站著的人。</p>\n<p>那就足夠了。</p>"}, {"title": "第122章_聯軍出擊", "content": "<p>第122章　聯軍出擊</p>\n<p>蘇長淵撐起來了。</p>\n<p>他用了整整三成的靈力頂住那股壓迫，強行讓自己的脊梁挺直，然後朝身後揮了一下手——那是他們事先商定好的信號。</p>\n<p>赫連峰第一個動。</p>\n<p>他的靈契是「磐石」，最頂級的防禦系靈契，在天衍大陸名列前茅。此刻他以契聖之力全力催動，腳下大地隆起，岩石從地底湧現，在他身前堆疊成一道兩丈高的石牆，然後那道石牆向前推進——不是攻擊，是掩護，是為後面的人爭取展開靈契的空間。</p>\n<p>慕容玄隨後跟進。慕容家世代精研攻伐靈契，他的「玄雷」是天衍最烈的攻擊系靈契之一。他右手抬起，七道漆黑的雷柱同時從天空落下，目標是契神所站的位置，沒有試探，直接全力。</p>\n<p>蘇長淵壓陣，「蒼瀾」靈契展開，他的靈力化作藍色的洪流，沿著赫連峰和慕容玄的攻擊夾縫灌入，三個契聖的力量在三個方向同時抵達。</p>\n<p>這是天衍大陸有史以來第一次三名契聖聯手出擊。</p>\n<p>他們知道這個陣仗的重量。在他們之前的歷史中，從來沒有任何敵人需要三個契聖同時全力攻擊——那超越了任何已知的威脅等級。他們本以為這個陣容足以讓天地變色。</p>\n<p>攻擊抵達契神所在位置的那一刻，所有人都在看。</p>\n<p>磐石的推進停了。</p>\n<p>不是被阻擋，是那道石牆在距離契神十步的位置，無聲無息地停下來，就像一隻衝刺中的猛獸突然被繩子拉住。然後，那些岩石緩緩崩解，碎成沙粒，在契神周圍形成一圈漩渦，被他輕輕吸入……不，是被他的存在吸入，就像石頭在進入他的氣場範圍之後，主動歸還了赫連峰借走的那部分天地之力。</p>\n<p>玄雷落下的七道雷柱更誇張。它們在半空中改變了顏色，從漆黑變成銀白，然後銀白變成透明，就像有人從玻璃杯裡抽走了有色液體，只剩下容器的形狀——然後連容器都消失了。七道雷柱在契神頭頂兩丈的位置，無聲消散。</p>\n<p>蒼瀾的洪流衝入那個區域，然後……滋養了它。</p>\n<p>沒有比這更荒謬的戰鬥結果：三個契聖的全力一擊，非但沒有傷害到契神，反而被他輕鬆吸收，化為養分，讓他的氣機不增反增。</p>\n<p>契神站在攻擊的正中心，沒有移動。</p>\n<p>他就這樣站著，被三個契聖的靈契轟炸，卻像是在享受一場細雨。</p>\n<p>後排的十七名契王見狀，齊聲爆發——不需要指令，這是本能的填補，契聖受阻，契王頂上，各種屬性的靈契交疊爆發，火系、風系、水系、土系、光系，天空被各色靈光染成萬花筒，轟鳴聲從天淵谷的每一個方向傳來，迴響在山壁之間。</p>\n<p>契神站在那場萬彩風暴的中心。</p>\n<p>他的白髮被靈氣激蕩帶起，在半空中飄揚，就像一個老人站在山頂上感受晨風。</p>\n<p>他的臉上沒有任何表情。</p>\n<p>轟炸繼續了整整三十秒。</p>\n<p>三十秒是一個概念——對於修行者的全力爆發而言，三十秒足以把一座城夷平，足以把一條河流截斷，足以在山壁上刻出百丈深的溝壑。天衍大陸最強陣容，全力三十秒。</p>\n<p>然後靈力耗盡，攻擊停止。</p>\n<p>煙塵散去。</p>\n<p>契神站在那裡。</p>\n<p>他的袍子上多了幾個褶皺，是氣流衝擊留下的。</p>\n<p>除此之外，沒有任何傷害。</p>\n<p>三個契聖互換了一個眼神。</p>\n<p>就在那個眼神裡，他們把彼此都想到的話說完了——不需要開口，因為那個念頭太過震撼，說出來反而顯得輕了：</p>\n<p>靈契，這個天衍大陸一切力量的根基，這個他們用一生去追求、去完善、去發揮的體系，對他根本沒有任何意義。</p>\n<p>不是太弱，是根本就沒有意義。</p>\n<p>蘇長淵想起了他在古籍上看到的一段記載，以前以為是誇張的寓言，現在才明白那是直白的事實描述：</p>\n<p>「契神立契，天地從之。靈力者，乃契神之恩賜，契者之力，不過是從那雙手裡借來的東西。」</p>\n<p>用借來的東西傷害借出者。</p>\n<p>這就是靈契體系對上契神的本質困境。</p>\n<p>赫連峰低聲說：「他在補充力量。」</p>\n<p>慕容玄：「我知道。」</p>\n<p>蘇長淵沒有說話，只是看著對面那個普通老人，看著他那副在接受了所有攻擊後依然平靜的表情。</p>\n<p>他在想白無極。</p>\n<p>在這場轟炸開始之前，他叫白無極退後，白無極說了一句「先讓你們試試看，我在旁邊看著」，然後真的退到一側，把正面交給了三個契聖。</p>\n<p>現在蘇長淵慶幸那個決定。</p>\n<p>不是因為白無極退了就安全，而是因為如果白無極和他們一起衝，把牌全押上，那麼等他們失敗之後，就沒有後手了。</p>\n<p>留著白無極，就是留著最後一張牌。</p>\n<p>契神抬起頭，看向三個契聖的方向。</p>\n<p>「靈契，是我在千年前給這個大陸的禮物，」他說，聲音依然沒有起伏，「你們用了一千年，把這個禮物磨練得很好。」</p>\n<p>他頓了頓。</p>\n<p>「但禮物終究是禮物，用禮物來傷害送禮的人，這件事……」</p>\n<p>他略微歪了歪頭。</p>\n<p>「荒唐了點。」</p>\n<p>赫連峰捏緊了拳頭。</p>\n<p>蘇長淵閉上眼，深吸一口氣，重新睜開，讓自己的神色回歸平靜：「各家壓制靈力消耗，保存底牌。」</p>\n<p>然後，他大聲說：「白無極。」</p>\n<p>白無極從側面走出來，把手插進口袋：「輪到我了？」</p>\n<p>「輪到你了。」</p>\n<p>白無極點頭，看著遠處的契神。</p>\n<p>契神也在看他。</p>\n<p>老人的目光落在他身上，那道視線比之前更認真了一些，帶著某種說不清楚的東西。</p>\n<p>白無極走上前，停在距離契神五十步的位置。</p>\n<p>他沒有立刻出手。他看著那個老人，那個站在萬彩轟炸中心毫髮無傷、輕描淡寫說著「荒唐了點」的老人，心裡評估著。</p>\n<p>Requiem在他的外圍運轉，因果歸零，任何對他的攻擊都無法到達。</p>\n<p>但他要攻擊的問題，Requiem沒辦法解決。</p>\n<p>他需要思考的是：怎麼打，打哪裡，什麼時機。</p>\n<p>契神又開口：「你叫什麼名字？」</p>\n<p>「白無極。」</p>\n<p>「無極，」老人低聲重複了一遍這個名字，「倒是個好名字。」他頓了頓，「你和他們不一樣。」</p>\n<p>「我知道。」</p>\n<p>「你不怕我。」</p>\n<p>「有一點，」白無極說，「但沒有到怕得動不了的程度。」</p>\n<p>「因為你知道我傷不了你。」</p>\n<p>「也不完全是，」白無極說，「更主要的是……你讓我想到以前碰到的一些麻煩，一開始也覺得沒辦法，但最後都解決了。所以我現在的習慣是，先不怕，實在不行再說。」</p>\n<p>契神沉默了一下。</p>\n<p>「你從哪裡來的？」</p>\n<p>白無極想了想：「很遠的地方。」</p>\n<p>「那裡有你這樣的力量？」</p>\n<p>「沒有，」白無極說，「我這個力量是到這裡之後才有的。那邊只有我自己練的幾手拳腳。」</p>\n<p>契神低頭看了看自己的手，那隻手在一剛才吸收了三個契聖和十七個契王的全力轟炸，此刻卻平靜得像一片葉子。</p>\n<p>「精神力，」他說，「千年前我封印它，是因為它是我控制不了的東西。我以為把它封起來，這個大陸就只剩靈契，就只剩我的規則。」</p>\n<p>他抬頭看白無極。</p>\n<p>「沒想到千年後，它自己找了個容器回來。」</p>\n<p>白無極沒有接這個話。</p>\n<p>他在心裡把Eternal的狀態確認了一遍，十秒時停，時停中可以使用黃金體驗，時停結束後有冷卻。</p>\n<p>一次機會。他要確保第一次出手打到正確的位置。</p>\n<p>「好，」他說，「廢話說夠了，我出手了。」</p>\n<p>契神看著他，沒有擺出任何防禦姿態。</p>\n<p>這個動作本身，就是最大的輕視。</p>\n<p>白無極深吸一口氣。</p>\n<p>Eternal——啟動。</p>"}, {"title": "第123章_螳臂當車", "content": "<p>第123章　螳臂當車</p>\n<p>最後一章在白無極出手前結束。</p>\n<p>這一章要倒回去——在白無極走出來之前發生的事。</p>\n<p>不，等一下。</p>\n<p>這一章要繼續。</p>\n<p>---</p>\n<p>三個契聖的聯手進攻沒有奏效。</p>\n<p>這個結果，蘇長淵其實在某個深藏的直覺裡早就有預感，只是他沒有說出口，因為說出口之後，這場戰鬥就沒有開始的理由了。</p>\n<p>但預感歸預感，真正眼睜睜看著三個契聖的全力一擊被當成補品吸收，和心裡有預感，是兩種完全不同的震撼。</p>\n<p>後排的士兵們亂了。</p>\n<p>不是逃跑，是那種精神上的崩潰——他們是各大家族挑選出來的精英，其中許多人跟著蘇長淵、赫連峰、慕容玄打了十幾年，見過無數大戰，親歷了天契城保衛戰，眼睜睜看著白無極和邪修首領對轟。他們以為他們已經見識過這個世界所能給出的一切絕境。</p>\n<p>他們錯了。</p>\n<p>這個世界還留著更深的絕境，沒有展示過，等著他們。</p>\n<p>「穩住！」赫連峰的聲音像一道雷，穿透了人群的嘈雜，「後退者，軍法從事！」</p>\n<p>他不是一個溫柔的領袖，但他是一個有效的領袖。那一嗓子讓後排的混亂凍住了。</p>\n<p>但凍住不等於穩定，那只是強行壓住的恐慌，隨時會在下一個衝擊之後重新湧出。</p>\n<p>慕容玄靠近了赫連峰，壓低聲音說：「我們還有多少靈力？」</p>\n<p>「三成。」赫連峰說，「剛才打了七成出去。」</p>\n<p>「蘇長淵？」</p>\n<p>「也差不多。」</p>\n<p>慕容玄閉了閉眼：「那場面攻擊沒有用，下一步……」</p>\n<p>「沒有下一步了，」赫連峰說，「至少不是靈契的下一步。」他看向白無極站著的方向，「看他的。」</p>\n<p>慕容玄沉默了一秒，點頭。</p>\n<p>就在這個時候，契神動了。</p>\n<p>不是為了攻擊，他只是移動了一步，向前一步，但那一步帶來的氣場變化，讓周圍二十步內的所有人都感受到了一種物理上的壓力——像是有一塊無形的巨石從天空往下壓，每個人的骨骼都發出細微的哢哢聲。</p>\n<p>三名契王率先支撐不住，噗通噗通跪下去。</p>\n<p>不是跪拜，是膝蓋在壓力下彎曲，他們咬著牙試圖站直，靈力催到最大，肌肉已經在顫抖。</p>\n<p>慕容玄眼睛一紅，大喝一聲：「玄雷！」</p>\n<p>他把剩下的靈力全部壓上，玄雷再次爆發。這一次沒有三成，只有一成，但他把這一成化成了最精純的點攻擊，不是面的轟炸，而是一道細如針芒的雷柱，瞄準契神的眉心。</p>\n<p>那道雷柱是他這輩子打出去最精準的一擊，凝聚了他三十年契聖生涯所有的技巧。</p>\n<p>契神歪了歪頭。</p>\n<p>那道細針在距離他眉心三指的位置，被他的氣場無聲偏轉，擦過臉頰，消失在身後的虛空中。</p>\n<p>偏了三指。</p>\n<p>慕容玄靈力耗盡，膝蓋彎下去，強行用一隻手撐在地上，沒有完全跪倒，但已經站不直了。他咳出一口血，臉色白如紙，眼睛裡仍然燒著一簇火。</p>\n<p>契神低頭看了他一眼。</p>\n<p>「你的靈契，玄雷，對嗎？」老人的聲音裡沒有任何情緒，平靜到近乎無情，「這個靈契的雛形，我記得，是千年前第一代慕容家族主，用他自己的性命換來的。一命換一靈契，傳承至今。」</p>\n<p>慕容玄咬緊牙關沒有說話。</p>\n<p>「他當時跪在我面前，求了七天七夜，」契神說，「我最後給他，是因為他讓我有一瞬間不覺得無聊。你們這一代人，也讓我有一瞬間不覺得無聊。」</p>\n<p>他頓了頓，然後說出那句話：</p>\n<p>「靈契終究是我給的力量。用它來傷我，本來就是笑話。」</p>\n<p>話音落下，沒有人能反駁。</p>\n<p>不是因為沒有勇氣，是因為那是事實，剝開所有的悲憤和不甘，那是鐵板釘釘的事實。</p>\n<p>然後，他真的動手了。</p>\n<p>不是向白無極動手，他的眼神直接越過了白無極，對著三個契聖。</p>\n<p>一個隨手的揮。</p>\n<p>就是那樣，一個隨手的揮，像揮開一隻蒼蠅。</p>\n<p>那隻手帶起的氣流，讓空間本身都彎曲了——蘇長淵第一個飛出去，他用蒼瀾在身前撐起一道水牆，但那道水牆在氣流中爆開，他倒退了十幾步，腳跟在地面上犁出兩道深溝，才勉強停住，右臂靈契被衝擊干擾，暫時失效。</p>\n<p>赫連峰往前衝，擋在蘇長淵面前，磐石靈契全力展開，整個人像一塊岩石一樣硬頂上去。那股氣流打在他的磐石護盾上，護盾碎了，碎成幾十塊石板，石板打在赫連峰身上，他的胸甲凹陷下去，悶哼一聲，退了五步，腳下的地面被踩出裂縫。</p>\n<p>他沒有倒。</p>\n<p>但他在流血——磐石護盾的碎片劃破了他的手臂，鮮血順著石屑的邊緣滴落，他低頭看了一眼，把傷口握住，沒有時間處理。</p>\n<p>慕容玄在他們後面，靈力已空，他徒手衝上去——沒有靈契，就用血肉之軀，用三十年練出的身法，試圖找到契神身上任何一個破綻。</p>\n<p>他衝到距離契神十步的位置。</p>\n<p>契神側目看了他一眼。</p>\n<p>那一眼讓慕容玄的腳步頓住，不是膽怯，是身體在那道視線下本能地停滯——就像一隻鳥飛進了電網，翅膀不是主動停的，是麻了。</p>\n<p>然後那股無形的氣場重重轟下，慕容玄在沒有任何靈契保護的情況下，被擊中了。</p>\n<p>他飛出去三丈，背後的巨石擋住了他，他貼著石面滑落，最後坐在地上，低著頭，沒有動。</p>\n<p>「慕容玄！」有人大叫。</p>\n<p>他沒有回應，不是死了，是沒力氣回應。</p>\n<p>他的眼睛還睜著，看著地面，看著自己手背上的靈契紋路——那道用慕容家先祖性命換來、傳承三十代的玄雷靈契，此刻紋路暗淡，靈力耗盡，像是熄滅的火焰。</p>\n<p>他想起父親臨死前對他說的最後一句話：玄雷要傳下去，比什麼都重要。</p>\n<p>傳下去，他傳了——他有兒子，有弟子，玄雷不會在他這裡斷掉。</p>\n<p>但現在，他傳承的那個力量，在這個存在面前，是笑話。</p>\n<p>那個念頭讓他覺得無力，但也讓他覺得悲憤。不是因為輸了，是因為這場戰鬥從一開始就是他們站在錯誤的位置，用錯誤的工具，面對一個本質上無法用他們手中工具解決的問題。</p>\n<p>然而他們能怎麼辦？不上去嗎？</p>\n<p>大地上到處是倒下的士兵，各家精英死的死傷的傷，後排一片混亂，有人在哭，有人在對著帶隊的將領茫然地等待命令。</p>\n<p>蘇長淵站在混亂的中心，他的右臂在抖，那道傷比他表現出來的要重，但他沒有彎腰，扶住赫連峰的肩，然後喊了一聲讓所有人停止混亂的話：</p>\n<p>「白無極！」</p>\n<p>那個名字就像一個錨，把所有人散亂的注意力重新拉回了同一個方向。</p>\n<p>白無極走出來。</p>\n<p>他走得不快，步子均勻，把手插進口袋，就這樣走到了最前面。</p>\n<p>後排那些倒下的、跪著的、茫然的人，目光跟著他移動。</p>\n<p>有人小聲說：「他沒事？」</p>\n<p>「他從頭到尾都沒事，」旁邊有人回答，聲音裡夾著說不清楚的情緒，「那個壓力對他，就像沒有。」</p>\n<p>「他是什麼人？」</p>\n<p>「……我也想知道。」</p>\n<p>契神看著走過來的白無極，看著那個把手插在口袋裡的年輕人，看著他身後那一片混亂的戰場——死的，傷的，跪的，站不直的。</p>\n<p>他的表情始終沒有波動。</p>\n<p>但如果仔細看，他的眼神有細微的移動：他在看白無極，一直在看，從白無極走出來的那一刻就在看。</p>\n<p>「你知道嗎，」契神說，「在你之前，千年來沒有一個人讓我想認真看一眼。」</p>\n<p>白無極停在距離他五十步的位置，回頭看了一眼身後那片廢墟般的戰場。</p>\n<p>三個契聖，十七名契王，一百三十餘名精英。</p>\n<p>現在的戰力，加起來可能還不如一個狀態飽滿的契王。</p>\n<p>他轉回頭，看著那個老人。</p>\n<p>心裡沒有那麼複雜。就是：好，輪到我了。</p>\n<p>「廢話說夠了，我出手了。」</p>\n<p>Eternal，啟動。</p>\n<p>時間靜止。</p>\n<p>世界在那一刻凍住，所有的聲音消失，所有的動作停止，白無極在靜止的時間裡走動，白金之星漂浮在他身旁，就像一個沉默的影子。</p>\n<p>他走到契神面前，近距離地打量那張普通老人的臉，在靜止的時間裡，那張臉完全平靜，像一幅畫。</p>\n<p>他選好了位置。</p>\n<p>然後全力出拳。</p>"}, {"title": "第124章_白無極出手", "content": "<p>第124章　白無極出手</p>\n<p>時間靜止的世界是白色的。</p>\n<p>不是那種純粹的雪白，而是一種褪色的感覺——就像把世界的飽和度調到零，所有顏色都還在，但失去了生命，停在半途的火焰是灰色的，半空中的塵粒是灰色的，蘇念卿臉上的表情是灰色的，連契神那雙深不見底的眼睛也是灰色的。</p>\n<p>只有白金之星Eternal是活的，它飄在白無極身旁，白金色的光芒在灰色的世界裡極為醒目，就像黑夜裡的燈。</p>\n<p>白無極走向契神。</p>\n<p>五十步，在靜止的時間裡，他走得不快也不慢，步子均勻，眼睛一直盯著那個凍住的老人，計算著。</p>\n<p>這十秒他只有一次，要打，就要打有意義的地方。</p>\n<p>他走到契神面前，近到能看清老人臉上每一道皺紋，能看清那件洗得發白的舊袍子上的每一個細節。近到Eternal都在他肩膀旁邊收緊了一些，像是感知到了什麼。</p>\n<p>白無極的手從口袋裡拿出來。</p>\n<p>他在心裡默數：三秒已過，還有七秒。</p>\n<p>他打量著契神的身體，打量著他站立的重心，打量著他的骨骼結構，打量著哪裡是最關鍵的支撐點。</p>\n<p>不是什麼高深的分析，就是八極拳的基本判斷：打哪裡最有效。</p>\n<p>八極拳講究「寸勁」，不是大力的擺動，而是力量在接觸的瞬間爆發，透過表層直達深處，震的是骨髓，不是皮肉。白無極練了幾年，在現代那個加班過勞的世界裡練，沒有靈氣，沒有什麼奇遇，就是一個普通打工人的業餘愛好。</p>\n<p>穿越之後，他有了精神力。</p>\n<p>精神力裝進了八極拳，就是另一個概念了。</p>\n<p>他盯著契神的肋骨位置，定好了目標。</p>\n<p>七秒過去。還有三秒。</p>\n<p>他調整呼吸，把姿勢沉下來——白金之星在同一時間也做出了同樣的動作，它是他的替身，它的動作和他的念頭同步，它的拳頭和他的拳頭在同一瞬間凝聚力量。</p>\n<p>兩秒。</p>\n<p>他想起在天契城城牆上，Requiem第一次完全展開的感覺，那種「因果之外」的感覺，像是站在世界的規則邊緣，往外再邁一步，就是規則無法觸及的地方。</p>\n<p>那是他的位置。</p>\n<p>一秒。</p>\n<p>他出拳。</p>\n<p>白金之星Eternal的拳頭和他的拳頭同時落下，兩股精神力疊加在同一個點上，不是靈契，不是天地法則，是純粹的精神力爆發——那種力量不屬於天衍大陸的靈契體系，不屬於契神的規則，是規則之外的存在。</p>\n<p>然後時間重啟。</p>\n<p>世界的顏色在一瞬間全部歸位，灰色變成彩色，靜止變成流動，所有的聲音同時湧回來——</p>\n<p>那一拳，結結實實地命中了契神的左肋。</p>\n<p>精神力的衝擊沒有華麗的爆發，沒有光芒，沒有煙塵，只有一聲悶響，像一塊巨石落進深水，低沉，實在，帶著穿透感。</p>\n<p>契神——</p>\n<p>退了半步。</p>\n<p>就是半步，他的左腳向後移動了一個腳距，重心向後偏移，身體在那一瞬間細微地晃動。</p>\n<p>然後他站穩了。</p>\n<p>全場靜止。</p>\n<p>不是時間靜止，是所有人都靜止了——那三十秒轟炸沒有讓任何人閉嘴，那一聲「靈契終究是我給的力量」的嘲諷沒有讓任何人閉嘴，那一下把三個契聖打飛的隨手揮讓後排喧嘩起來。</p>\n<p>但這一刻，所有人都閉嘴了。</p>\n<p>沒有人說話。沒有人出聲。沒有人動。</p>\n<p>赫連峰用受傷的手臂扶著地，保持著半跪的姿勢，眼睛瞪大，視線定在那個位置——那個契神向後退了半步的位置。</p>\n<p>慕容玄靠著石壁坐著，靈力耗盡，虛弱到說話都費力，但他的眼睛直視著前方，那兩個眼睛在嘴角微微的動作裡，有一種說不清楚的東西。</p>\n<p>蘇長淵右臂的抖動停了，他不知道自己在什麼時候屏住了呼吸，直到這一刻才重新吸進一口氣，那口氣讓他幾乎有些眩暈。</p>\n<p>後排那些坐著、跪著、趴著的人，他們看著那個方向，有人嘴唇在動，說的什麼聽不清楚，也許是某個人的名字，也許只是一個語氣詞。</p>\n<p>蘇念卿站在她的位置，霜翎縮在她懷裡，一動不動，就連那十五條銀色的尾巴都凝住了。她不知道自己的表情是什麼，只知道她的心臟跳得很快，快到幾乎能聽見。</p>\n<p>白無極收回了拳。</p>\n<p>他看著退了半步的契神，確認了那半步，然後把手重新插進口袋。</p>\n<p>契神低下頭，看了看被打中的位置。</p>\n<p>那件舊袍子的左肋，被打中的地方有輕微的皺褶，就這樣，沒有裂痕，沒有血跡，從外表上幾乎看不出任何異常。</p>\n<p>老人低頭看了很久。</p>\n<p>然後他抬起頭，看向白無極，眼睛裡第一次出現了清晰可辨的情緒。</p>\n<p>不是憤怒，不是疼痛，而是某種很複雜的東西——像是久久不變的湖面突然出現了一道漣漪，那道漣漪讓人意識到湖面之下確實有東西，有深度，有溫度，有生命。</p>\n<p>沉默了三秒，他開口：</p>\n<p>「精神力。」</p>\n<p>那兩個字說得很輕，但所有人都聽見了。</p>\n<p>「果然。」</p>\n<p>他說的「果然」像是某種印證，印證了他早就猜到的事，但猜到和真的發生，依然是兩種感受。</p>\n<p>白無極看著他：「感覺怎麼樣？」</p>\n<p>「疼。」</p>\n<p>「那就對了。」</p>\n<p>契神再次沉默，這次的沉默帶著思考的質感。他在評估，在計算，在用千年的智識和閱歷，重新丈量面前這個年輕人的重量。</p>\n<p>後排，那股靜止的氣氛，在某個沉默的分界線之後，爆發了。</p>\n<p>不是整齊的歡呼，是那種壓抑已久的東西突然從每個人喉嚨裡衝出來，有人喊白無極的名字，有人喊什麼聽不清，有人只是發出一個毫無意義的聲音，但那個聲音裡面有的東西，所有人都懂。</p>\n<p>那是第一次，有人讓契神退步。</p>\n<p>一千年，沒有人做到的事，這個年輕人用一拳做到了。</p>\n<p>不是擊敗，不是傷重，只是退了半步。</p>\n<p>但那半步的意義，遠超過任何人之前打出去的任何一次攻擊。</p>\n<p>赫連峰在那聲歡呼裡，慢慢把壓在地上的手收回來，坐直了身體，臉上的血跡風乾了，他沒有去擦，就這樣坐著，眼睛定定地看著白無極的背影。</p>\n<p>蘇長淵把右臂放下來，發現傷比他以為的嚴重一些，骨頭可能有問題，但現在不重要，他讓自己站得更直，讓聲音更穩：「傷者後撤，戰力整隊，準備支援。」</p>\n<p>有人按照他的命令動起來，那種有事可做的感覺讓後排的混亂重新有了秩序。</p>\n<p>前方，白無極和契神繼續對視。</p>\n<p>契神的目光從剛才的複雜，慢慢沉澱為平靜——但那個平靜和之前的平靜不一樣了。之前的平靜是「你們傷不到我」的無動於衷，現在的平靜是某種重新被喚醒的東西，像一個沉睡太久的獅子，忽然感到了一絲飢餓。</p>\n<p>「你，」他說，「值得我認真對待。」</p>\n<p>白無極沒有回答這句話，他只是把重心沉下來，調整好站姿，把精神力的運轉確認了一遍。</p>\n<p>Requiem在外圍無聲展開，因果的屏障環繞著他，讓一切傷害在抵達之前消散。</p>\n<p>Eternal的冷卻還沒結束，他需要時間。</p>\n<p>但最難的一步，已經邁出去了。</p>\n<p>他打到了，打到了那個千年無人能傷的存在。</p>\n<p>那就夠了，那就是「有辦法」的最好證明。</p>\n<p>蘇念卿在人群裡，把霜翎抱緊了一點，那隻銀色的靈狐把鼻子抵在她的胸口，尾巴輕輕搖了一下。</p>\n<p>她盯著白無極的背影，心裡那個聲音說：</p>\n<p>你做到了。</p>\n<p>但還沒完。</p>"}, {"title": "第125章_規則之外vs規則制定者", "content": "<p>第125章　規則之外 vs 規則制定者</p>\n<p>正式交手。</p>\n<p>這兩個字說起來簡單，但真正開始的時候，白無極才意識到，這場戰鬥和他之前打過的所有戰鬥，是完全不同的東西。</p>\n<p>不是難度的差距，是維度的差距。</p>\n<p>Eternal的冷卻結束，他第一個念頭就是再次啟動——時停，進攻，黃金體驗輔助，用最快的速度打出最多的傷害。理論是對的，但問題在執行的瞬間出現了。</p>\n<p>時間靜止。</p>\n<p>他走向契神，距離拉近，他出拳——然後他感覺到了什麼不對。</p>\n<p>空間變了。</p>\n<p>不是空間扭曲了，而是「他和契神之間的距離」這個概念本身變了。他走了十步，但距離沒有縮短，他感覺自己在移動，但那種移動沒有帶來位置的變化，就像在跑步機上走路——腳步在動，周圍的空間在流動，但他始終停在原地。</p>\n<p>他停下來，在靜止的時間裡環顧四周。</p>\n<p>天淵谷的地形沒變，光線沒變，所有凍住的人還在原來的位置，但就是他和契神之間的那個區域，產生了某種扭曲——不是視覺的扭曲，是邏輯上的扭曲，那段空間對白無極「縮短」的請求，不予響應。</p>\n<p>他試了另一個方向，繞弧線靠近，結果一樣。</p>\n<p>時間快用完了，他改變策略，直接讓Eternal飛向契神，替身沒有他這個空間障礙的限制——Eternal在靜止的時間裡順利飛到了契神面前，重拳打出去。</p>\n<p>命中。</p>\n<p>時間恢復。</p>\n<p>那一拳的效果比第一次略小，但契神確實又受到了衝擊，他的身體微微震動了一下。</p>\n<p>然後，契神回應了。</p>\n<p>不是對白無極，是對環境。</p>\n<p>他抬起一根手指，輕輕往旁邊一點。</p>\n<p>白無極腳下的地面旋轉了。</p>\n<p>不是地震，不是地裂，是地面像一個轉盤一樣旋轉，把白無極所站的方向物理性地調轉了九十度——白無極沒有移動，但他面朝的方向變了，他的正面突然對著一面石壁。</p>\n<p>這不是針對白無極的攻擊。</p>\n<p>Requiem沒有響應。</p>\n<p>因為那不是傷害，是環境。</p>\n<p>白無極皺了皺眉，調整方向，重新面對契神，但就在他調整的同時，地面再次旋轉，然後頭頂的重力輕了，輕到一半，他的腳離開了地面幾寸——他往下踩，地面響應，他落地，但那種「輕」的感覺還在，讓他的每個動作都缺少了支撐感。</p>\n<p>契神沒有試圖傷害他。</p>\n<p>他只是把戰場改了。</p>\n<p>白無極試著啟動Eternal，在時停的十秒裡思考：Requiem擋的是針對他的攻擊，是因果上「以他為目標的傷害」，但契神沒有以他為目標——契神改的是地，改的是重力，改的是空間的拓撲結構，那些東西本身不是對白無極的攻擊，所以Requiem對此沒有反應。</p>\n<p>這就是維度差距。</p>\n<p>力量在規則之外，沒問題。</p>\n<p>但規則本身，是這個戰場的底層代碼，而契神能改代碼。</p>\n<p>兩人的本質差異在這裡：白無極是
